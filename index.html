<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>Relatório Fotográfico – Inspeção Noturna (UI Pro)</title>
<style>
  :root{
    --bg:#0d132b; --surface:#0f1731cc; --fg:#e8eeff; --muted:#a9b7df; --border:#1e284d;
    --ok:#22c55e; --warn:#eab308; --danger:#ef4444; --accent:#35eb85; --accent2:#22c55e;
    --shadow: 0 12px 30px rgba(0,0,0,.40);
    --radius: 14px; --camH: 44vh;
    --btnGradA:#0e1432; --btnGradB:#0a0f26; --btnBorder:#223363;
    --camGradA:#0b1230; --camGradB:#07102a; --camBorder:#213066;
    --pdfA:#eab308; --pdfB:#b98a06; --pdfText:#231c00;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--fg);
    background:
      radial-gradient(1100px 520px at 10% -10%, #15305f33, transparent 70%),
      radial-gradient(900px 520px at 120% 10%, #0a4b3355, transparent 70%),
      var(--bg);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    padding:12px; line-height:1.35; overflow-x:hidden;
  }
  h1{margin:0 0 10px;text-align:center;font-size:1.24rem; letter-spacing:.02em}

  .card{
    background: linear-gradient(180deg, var(--surface), rgba(15,23,49,.7));
    backdrop-filter: saturate(140%) blur(6px);
    -webkit-backdrop-filter: saturate(140%) blur(6px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding:12px; margin:0 auto 12px;
    max-width:980px; box-shadow: var(--shadow);
  }

  /* ===== Status ===== */
  #statusBar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; max-width:980px; margin:0 auto 10px; }
  .st{
    display:inline-flex; align-items:center; gap:6px;
    background: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.28));
    border:1px solid rgba(255,255,255,.14);
    padding:6px 10px; border-radius:999px; font-size:.82rem; font-weight:800; color:#dfe7ff;
    box-shadow: 0 4px 12px rgba(0,0,0,.28);
  }
  .ok{ color:#b1ffd1 } .warn{ color:#ffdfa8 }

  /* ===== Câmera fixa ===== */
  #camCard{
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top, 0px)); transform: translateX(-50%);
    width: calc(100vw - 24px); max-width:980px; height: var(--camH);
    z-index: 100; padding: 0; margin: 12px auto; border-radius: var(--radius);
    background: linear-gradient(180deg, var(--camGradA), var(--camGradB));
    border:1px solid var(--camBorder); box-shadow: 0 14px 36px rgba(0,0,0,.45), inset 0 0 0 1px #0d1b4e;
  }
  #wrap{
    position: relative; height: 100%; border-radius: var(--radius); overflow: hidden;
    /* cria contexto de empilhamento para overlays */
    isolation:isolate;
  }
  #vid{
    width: 100%; height: 100%; display:block; background:#000; border-radius: var(--radius);
    object-fit: contain; z-index:0;
  }
  /* Afastador sob a câmera */
  #camSpacer{ height: calc(var(--camH) + 26px + env(safe-area-inset-top, 0px)); max-width:980px; margin: 0 auto 8px; }

  /* ===== TopBar (sobre o vídeo) ===== */
  #topBar{
    position:absolute; inset:auto 0 auto 0; top:8px; z-index:5;
    display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 8px;
    width:100%;
    pointer-events:none; /* cada botão recoloca pointer-events */
  }
  .toolbar{
    display:flex; align-items:center; gap:8px; padding:6px 8px;
    background: linear-gradient(180deg, rgba(10,16,40,.75), rgba(8,12,28,.72));
    border:1px solid rgba(255,255,255,.16); border-radius:12px; box-shadow: var(--shadow);
  }
  .btn{
    pointer-events:auto; min-width:44px; height:40px; padding:0 10px;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:1px solid rgba(255,255,255,.18);
    background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.45));
    color:#e6ebff; border-radius:10px; font-weight:900; font-size:.92rem; cursor:pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,.30);
  }
  .btn:active{ transform:translateY(1px); }
  .btn.critical{ background: linear-gradient(180deg, #cc3e36, #a72b25); border-color:#b52d27; color:#fff; }
  .btn.success{ background: linear-gradient(180deg, #35eb85, #22c55e); color:#0b2c21; border-color:#1aa455; }

  /* ===== BottomBar (sobre o vídeo) ===== */
  #bottomBar{
    position:absolute; inset:auto 0 8px 0; z-index:5; width:100%;
    display:flex; align-items:center; justify-content:space-between; gap:8px; padding:0 8px;
    pointer-events:none;
  }

  /* Zoom pad (discreto) */
  #zoomPad{
    pointer-events:auto;
    display:none; align-items:center; gap:8px; padding:6px 10px;
    background: linear-gradient(180deg, rgba(10,16,40,.75), rgba(8,12,28,.72));
    border:1px solid rgba(255,255,255,.16); border-radius:12px; box-shadow: var(--shadow);
  }
  #zoomLbl{ min-width:52px; text-align:center; font-weight:900 }

  /* Counters */
  .pill{
    pointer-events:auto; display:inline-flex; align-items:center; gap:8px;
    background: linear-gradient(180deg, rgba(10,16,40,.75), rgba(8,12,28,.72));
    border:1px solid rgba(255,255,255,.16); color:#e6ebff;
    padding:6px 10px; border-radius:12px; font-size:.86rem; font-weight:900;
    box-shadow: var(--shadow);
  }

  /* Popup presets */
  #presetMenu{
    position:absolute; left:70px; top:56px; z-index:6;
    display:none; flex-direction:column; gap:6px; padding:8px;
    background: linear-gradient(180deg, rgba(10,16,40,.95), rgba(10,16,35,.92));
    border:1px solid rgba(255,255,255,.18); border-radius:12px; box-shadow: var(--shadow);
  }
  #presetMenu .btn{ width:100%; justify-content:flex-start }

  /* Chip status (top center) */
  .chip{
    position:absolute; left:50%; top:8px; transform:translateX(-50%); z-index:6;
    background: linear-gradient(180deg, rgba(127,29,29,.9), rgba(90,14,14,.82));
    border:1px solid #dc2626; color:#ffe2e2; padding:6px 10px; border-radius:999px; font-weight:900; font-size:.84rem;
    box-shadow: var(--shadow); display:none;
  }
  .chip.on{ display:inline-flex; align-items:center; gap:8px }

  /* ===== Ações (fora do vídeo) ===== */
  .row{display:flex;gap:8px;flex-wrap:wrap}
  button.action{
    flex:1 1 180px; padding:12px 14px; font-size:.98rem; border:0; border-radius:12px; cursor:pointer;
    background: linear-gradient(180deg, var(--btnGradA), var(--btnGradB)); color:var(--fg); font-weight:800;
    border:1px solid var(--btnBorder); box-shadow: 0 6px 18px rgba(0,0,0,.25);
  }
  button.action:active{ transform: translateY(1px) }
  #btnSelectFolder{ background: linear-gradient(180deg, #35eb85, #22c55e); color:#072414 }
  #btnAutoCapture{ background: linear-gradient(180deg, #ff7b45, #e5612e); color:#1b0b02 }
  #btnVideoRecord{ background: linear-gradient(180deg, #f2544b, #cc3e36); color:#fff }
  #btnFinalizePdf{ background: linear-gradient(180deg, var(--pdfA), var(--pdfB)); color:var(--pdfText) }
  #btnClear{ background: linear-gradient(180deg, #ff6161, #ef4444); color:#fff }
  button.action:disabled{opacity:.55;cursor:not-allowed; filter:grayscale(.2)}
  @media (max-width:420px){ button.action{flex:1 1 140px;font-size:.95rem} }

  /* Lista de fotos */
  #foto{width:100%;display:block;border:1px solid #2a335a;border-radius:12px;margin-top:8px; box-shadow: var(--shadow)}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .thumb{border:1px solid #243053;border-radius:10px;overflow:hidden;background:#0a122a}
  .thumb img{width:100%;display:block}
  .meta{padding:6px 8px;font-size:.78rem;color:#c7d2fe}

  #kmPlaque{
    text-align:center; padding:8px 12px;
    background: linear-gradient(180deg, #0d3b8e, #0a2e6d);
    border:2px solid #e6ecff; border-radius:12px; margin:0 auto 8px; max-width:980px;
    font-weight:900; font-size:1rem; color:#ffffff; box-shadow:0 6px 16px rgba(0,0,0,.28); text-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  #kmPlaque span{ letter-spacing:.02em }

  /* ===== Splash ===== */
  #splash{
    position: fixed; inset: 0; z-index: 2000;
    background: radial-gradient(1200px 600px at 50% -10%, #0c2a3f, transparent 65%), #060a12;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  #rainCanvas{ position:absolute; inset:0; width:100%; height:100% }
  .splash-inner{ position: relative; z-index: 2; text-align: center; padding: 24px 18px; }
  .title{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-weight: 900; font-size: clamp(1.1rem, 4vw, 2.2rem);
    letter-spacing: .06em; color: #b7ffcf;
    text-shadow: 0 0 10px #22c55e55, 0 0 22px #22c55e77, 0 0 40px #22c55e55, 0 1px 0 #0b1d14;
    white-space: nowrap; overflow: hidden; border-right: 2px solid #43ff9b;
    margin: 0 auto 10px; width: 0;
    animation: typing 1200ms steps(24, end) forwards, caret 650ms step-end 6;
  }
  .subtitle{ font-weight:700; color:#9fe9ff; letter-spacing:.04em; opacity:.9 }
  .splash-actions{ margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap }
  .splash-btn{
    padding:10px 14px; border-radius:12px; border:1px solid #1b3b32;
    background: linear-gradient(180deg, #1b4c3b, #123c2e); color:#c8ffdf; font-weight:900; cursor:pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,.35);
  }
  .splash-fade{ animation: splashout .5s ease forwards }
  @keyframes splashout{ to{ opacity:0; transform: scale(1.01) } }
  @keyframes typing { from { width: 0 } to { width: 24ch } }
  @keyframes caret { 0%, 100% { border-right-color: transparent } 50% { border-right-color: #43ff9b } }

  /* ===== Modal PDF ===== */
  #pdfModal{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:3000;
  }
  #pdfModal .inner{
    background:linear-gradient(180deg, rgba(10,16,40,.96), rgba(10,16,35,.94));
    border:1px solid rgba(255,255,255,.18); border-radius:14px; padding:16px; max-width:340px; width:92%;
    box-shadow:0 18px 40px rgba(0,0,0,.45);
  }
  #pdfModal h3{ margin:0 0 10px; font-size:1.02rem }
  #pdfOpts{ display:flex; flex-wrap:wrap; gap:8px; }
  #pdfOpts .btn{ flex:1 1 68px }
</style>
</head>

<script>
/* ---------- Splash (com proteção anti-trava) ---------- */
(() => {
  const splash = document.getElementById('splash');
  const btnStart = document.getElementById('btnStart');
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  let started = false, raf=null;

  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function draw(){
    const W=canvas.width,H=canvas.height, font=Math.max(14,Math.min(24,Math.floor(W/64)));
    ctx.fillStyle='rgba(6,10,18,.08)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#39ff88'; ctx.font=`${font}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
    for(let x=0;x<W;x+=font){ const y=(Math.random()*H)|0; const ch=String.fromCharCode(0x30A0 + Math.floor(Math.random()*96)); ctx.fillText(ch,x,y); }
    raf=requestAnimationFrame(draw);
  }
  function startNow(){
    if(started) return; started=true;
    splash.classList.add('splash-fade');
    setTimeout(()=>{ splash.remove(); window.__BOOT && window.__BOOT(); }, 520);
    if(raf){ cancelAnimationFrame(raf); raf=null; }
  }
  window.addEventListener('resize', resize, {passive:true});
  resize(); draw();
  btnStart.addEventListener('click', startNow, {once:true});
  // fallback auto-start
  setTimeout(()=>{ if(!started) startNow(); }, 2400);
})();
</script>

<script>
/* ===== Utilitários e Estado global ===== */
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function fmtKm(v){ let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function bytesToMB(b){ return (b/1048576).toFixed(1); }

let dataset=[], kmPoints=[]; let csvReady=false, camReady=false, gpsReady=false;
let lastPos=null; let isAutoCapturing=false; let autoCaptureInterval=null;
let kmUpdateInterval=null; let isRecordingVideo=false;

/* Sessão */
let sessionPhotos = 0;
const sessionPhotoFiles = []; // {handle,w,h,name}

/* Referências */
const vid=document.getElementById('vid'), foto=document.getElementById('foto'), wrap=document.getElementById('wrap'), chip=document.getElementById('chip');
const stCsv=document.getElementById('stCsv'), stCam=document.getElementById('stCam'), stGps=document.getElementById('stGps'), stFotos=document.getElementById('stFotos'), stFolder=document.getElementById('stFolder'), stPdf=document.getElementById('stPdf');
const kmTop=document.getElementById('kmTop'), gal=document.getElementById('gal');

const btnSelectFolder=document.getElementById('btnSelectFolder'), btnFinalizePdf=document.getElementById('btnFinalizePdf'), btnClear=document.getElementById('btnClear');
const btnAutoCapture=document.getElementById('btnAutoCapture'), btnVideoRecord=document.getElementById('btnVideoRecord'), btnNarrationMode=document.getElementById('btnNarrationMode');

const btnMiniCycle=document.getElementById('btnMiniCycle'), btnMiniPreset=document.getElementById('btnMiniPreset'), btnMiniPower=document.getElementById('btnMiniPower'), btnRecStop=document.getElementById('btnRecStop'), btnPTT=document.getElementById('btnPTT');
const presetMenu=document.getElementById('presetMenu');

const zoomPad=document.getElementById('zoomPad'), btnZoomDec=document.getElementById('btnZoomDec'), btnZoomInc=document.getElementById('btnZoomInc'), zoomLbl=document.getElementById('zoomLbl');

const hudPhotos=document.getElementById('hudPhotos'), hudRight=document.getElementById('hudRight'), hudVideoSize=document.getElementById('hudVideoSize');

const pdfModal=document.getElementById('pdfModal'), pdfOpts=document.getElementById('pdfOpts');

const overlayOpts = { showKM:true, showTs:true, showIds:true, showGps:false };
const can=document.createElement('canvas'), ctx=can.getContext('2d',{alpha:false});
const CAP_MAX_DIM = 1600;

/* ===== Pasta ===== */
let rootDirHandle = null;

function statusChip(el, text, state){ el.textContent = text; el.className = 'st ' + (state||''); }
function updateStatusBar(){
  statusChip(stCsv,  'CSV: '  + (csvReady?'OK':'Carregando…'), csvReady?'ok':'warn');
  statusChip(stCam,  'Câmera: ' + (camReady?'OK':(cameraPaused?'Parada':'Aguardando…')), (camReady?'ok':'warn'));
  const gpsTxt = gpsReady ? (lastPos? `OK (±${Math.round(lastPos.acc||0)} m)`:'OK') : 'Aguardando…';
  statusChip(stGps,  'GPS: ' + gpsTxt, gpsReady?'ok':'warn');
  statusChip(stFotos,'Fotos: ' + sessionPhotos, sessionPhotos>0?'ok':'');
}
function setPdfStatus(text, ok){ stPdf.textContent='PDF: '+text; stPdf.className='st '+(ok?'ok':'warn'); }

async function selectOutputFolder(){
  if(!('showDirectoryPicker' in window)){ alert('Use Chrome/Edge (HTTPS) para escolher pasta.'); return; }
  rootDirHandle = await window.showDirectoryPicker({ mode:'readwrite' });
  const name = rootDirHandle.name || 'OK';
  stFolder.textContent = 'Pasta: ' + name; stFolder.className='st ok';
  btnSelectFolder.textContent = '📁 Pasta: ' + name;

  // reset sessão
  sessionPhotos=0; hudPhotos.textContent=sessionPhotos; stFotos.textContent='Fotos: 0';
  sessionPhotoFiles.length=0;
  setPdfStatus('—', false);
  btnFinalizePdf.disabled = true;
}

/* ===== CSV (IDs + KM) ===== */
const CELL=0.005; const idGrid=new Map(), kmGrid=new Map();
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=60,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${ky+dy},${kx+dx}`); if(a) out.push(...a);
      }
    }
  } return out.length?out:[];
}
async function loadIDs(){
  const txt=await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  const head=lines[0].toLowerCase().split(';');
  const iId=head.findIndex(h=>h.includes('id') && !h.includes('lat') && !h.includes('long'));
  const iLat=head.findIndex(h=>h.includes('lat')); const iLon=head.findIndex(h=>h.includes('lon'));
  dataset=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(';'); const id=String(c[iId]||'').trim(), lat=parsePt(c[iLat]), lon=parsePt(c[iLon]);
    if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    if(lat===0 && lon===0) continue; if(Math.abs(lat)>90 || Math.abs(lon)>180) continue;
    dataset.push({id,lat,lon});
  }
  idGrid.clear(); for(const p of dataset) gridInsert(idGrid,p);
}
function pickTrio(c){
  const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon)) return t1;
  const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
  if(Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon)) return t2;
  return null;
}
async function loadKM(){
  const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  kmPoints=[]; let lastKeep=null; const MIN_STEP=5;
  for(let i=0;i<lines.length;i++){
    const c=lines[i].split(';'); if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue;
    const t=pickTrio(c); if(!t) continue;
    kmPoints.push(t); // pontos densos; a grade otimiza
  }
  kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
}
async function loadCSVs(){ try{ await Promise.all([loadIDs(),loadKM()]); csvReady=dataset.length>0 && kmPoints.length>0; }catch{ csvReady=false; } updateStatusBar(); }

/* ===== KM/IDs ===== */
function nearestN(lat,lon,n=5){
  if(!dataset.length) return [];
  const cand=gridCands(idGrid,lat,lon,Math.max(60,n*20));
  const arr=cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0,n);
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const cand=gridCands(kmGrid,lat,lon,100); if(!cand.length) return null;
  let best=null,bd=Infinity; for(const p of cand){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best;
}

/* ===== Câmera / Zoom / Presets ===== */
let currentStream=null, currentTrack=null, currentCap=null; let deviceList=[], deviceIndex=0;
let cameraPaused=false; let videoAR=16/9;
let currentZoom=1, zoomMin=1, zoomMax=1, zoomStep=0.1;

function computeAvailableW(){ const pad = 24; return Math.min(window.innerWidth - pad, 980); }
function applyCamHeight(){
  const w = computeAvailableW(); const h = Math.round(w / (videoAR || (16/9)));
  document.documentElement.style.setProperty('--camH', Math.max(220, Math.min(h, (window.visualViewport?.height||window.innerHeight)-160)) + 'px');
}
window.addEventListener('resize', applyCamHeight);
if(window.visualViewport){ visualViewport.addEventListener('resize', applyCamHeight); visualViewport.addEventListener('scroll', applyCamHeight); }

function saveCamPrefs(){
  const dev=deviceList[deviceIndex]; if(dev){
    localStorage.setItem('camDeviceId',dev.deviceId);
    if(currentCap?.zoom) localStorage.setItem('camZoom_'+dev.deviceId, String(currentZoom));
  }
}
function loadCamPrefsFor(id){ const z=localStorage.getItem('camZoom_'+id); return z?Number(z):null; }

async function enumerateCameras(){
  try{ await navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(s=>s.getTracks().forEach(t=>t.stop())); }catch{}
  const devices=await navigator.mediaDevices.enumerateDevices();
  deviceList=devices.filter(d=>d.kind==='videoinput');
  deviceList.sort((a,b)=>{ const A=/back|rear|environment/i.test(a.label), B=/back|rear|environment/i.test(b.label); if(A && !B) return -1; if(!A && B) return 1; return a.label.localeCompare(b.label); });
  const savedId=localStorage.getItem('camDeviceId'); const idx=Math.max(0, deviceList.findIndex(d=>d.deviceId===savedId));
  deviceIndex=idx>=0?idx:0;
}

async function startCamera(deviceIdx=deviceIndex){
  try{
    if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
    currentStream=currentTrack=currentCap=null;
    const dev=deviceList[deviceIdx];
    const constraints=dev? {video:{deviceId:{exact:dev.deviceId}, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30,max:30}}, audio:false}
                         : {video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30,max:30}}, audio:false};
    const st=await navigator.mediaDevices.getUserMedia(constraints);
    currentStream=st; vid.srcObject=st;

    await new Promise(res=>{ if(vid.readyState>=1 && vid.videoWidth) return res(); vid.onloadedmetadata=()=>res(); setTimeout(res,1000); });
    currentTrack=st.getVideoTracks()[0];
    currentCap=currentTrack.getCapabilities? currentTrack.getCapabilities(): null;

    if (vid.videoWidth && vid.videoHeight) videoAR = vid.videoWidth / vid.videoHeight;
    applyCamHeight();

    // Zoom discreto
    if(currentCap && currentCap.zoom){
      zoomMin=currentCap.zoom.min??1; zoomMax=currentCap.zoom.max??1; zoomStep=currentCap.zoom.step??0.1;
      let z=loadCamPrefsFor(deviceList[deviceIndex]?.deviceId) ?? (currentCap.zoom.min ?? 1);
      z=Math.max(zoomMin, Math.min(zoomMax, z)); await applyZoom(z);
      zoomPad.style.display='flex';
    } else { zoomPad.style.display='none'; }

    camReady=!!vid.videoWidth; deviceIndex=deviceIdx; saveCamPrefs();
    stCam.textContent='Câmera: OK'; stCam.className='st ok';
    cameraPaused=false; btnMiniPower.textContent='⏻';
  }catch(e){
    camReady=false; stCam.textContent='Câmera: —'; stCam.className='st warn';
  }
  updateStatusBar();
}

async function applyZoom(z){
  if(!(currentTrack && currentCap && currentCap.zoom)) return;
  const val = Math.max(zoomMin, Math.min(zoomMax, Number(z)));
  try{ await currentTrack.applyConstraints({advanced:[{zoom:val}]}); }catch{ try{ await currentTrack.applyConstraints({zoom:val}); }catch{} }
  currentZoom=val; zoomLbl.textContent = currentZoom.toFixed(1)+'×'; saveCamPrefs();
}
btnZoomDec.addEventListener('click', ()=>applyZoom(currentZoom - zoomStep));
btnZoomInc.addEventListener('click', ()=>applyZoom(currentZoom + zoomStep));

});

function startGPS(){

/* ===== Carimbo ===== */
function stampOverlay(ctx, w, h, kmStr, ids, ts, gpsLine){
  const bandH=Math.max(144,Math.round(h*0.16));
  ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,h-bandH,w,bandH);
  if(overlayOpts.showKM && kmStr){
    ctx.fillStyle='#b7ffcf'; ctx.textAlign='left'; ctx.font=`900 ${Math.round(h*0.055)}px system-ui`;
    ctx.shadowColor='rgba(34,197,94,.45)'; ctx.shadowBlur=16;
    ctx.fillText(kmStr,20,h-bandH+Math.round(bandH*0.52)); ctx.shadowBlur=0;
  }
  if(overlayOpts.showTs){
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.font=`700 ${Math.round(h*0.032)}px system-ui`;
    ctx.fillText(ts,20,h-Math.round(bandH*0.22));
  }
  if(overlayOpts.showGps && gpsLine){
    ctx.fillStyle='#d7e5ff'; ctx.textAlign='left'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
    ctx.fillText(gpsLine,20,h-Math.round(bandH*0.5));
  }
  if(overlayOpts.showIds && Array.isArray(ids)){
    ctx.textAlign='right'; ctx.fillStyle='#d7e5ff'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
    ids.forEach((e,i)=>ctx.fillText(e.id,w-20,h-bandH+28+i*26));
  }
}

function addPreview(url, meta){

function buildFilename(kmStr, ts){
  const safeKm = (kmStr||'KM_—').replace('KM ','').replace('+','_').replace(/\s/g,'');
  const t = new Date(ts);
  const stamp = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}_${String(t.getHours()).padStart(2,'0')}-${String(t.getMinutes()).padStart(2,'0')}-${String(t.getSeconds()).padStart(2,'0')}`;
  return `FOTO_${safeKm}_${stamp}.jpg`;
}

async function captureOnce(){

  const scale = (Math.max(vw,vh)>CAP_MAX_DIM) ? (CAP_MAX_DIM/Math.max(vw,vh)) : 1;
  const w = Math.round(vw*scale), h = Math.round(vh*scale);

/* ===== Vídeo – MP4/WebM (com narração) ===== */
let videoWritable=null, videoBytesWritten=0, mediaRecorder=null, wc={encoder:null,muxer:null,vTrack:null}, rafId=null;
const VID_FPS=30, VID_BITRATE=1_200_000, REC_W=1280, REC_H=720;

function showVideoHUD(on){
  hudRight.style.display = on ? 'inline-flex' : 'none';
  btnRecStop.style.display = on ? 'inline-flex' : 'none';
  btnPTT.style.display = (on && narrationMode==='ptt') ? 'inline-flex' : 'none';
}
async function openVideoWriter(nameExt){
  if(!rootDirHandle){ await selectOutputFolder(); if(!rootDirHandle) throw new Error('Pasta não selecionada'); }
  const name = `VIDEO_${new Date().toISOString().replace(/[:.]/g,'-')}.${nameExt}`;
  const h = await rootDirHandle.getFileHandle(name, {create:true});
  videoWritable = await h.createWritable();
  videoBytesWritten=0; hudVideoSize.textContent='0.0'; showVideoHUD(true);
}
async function closeVideoWriter(){ if(videoWritable){ await videoWritable.close(); videoWritable=null; } showVideoHUD(false); }

async function startVideoRecordingMP4(){
  if(!(window.VideoEncoder && window.VideoFrame && window.MP4Muxer)) throw new Error('WebCodecs indisponíveis');
  if(narrationMode!=='off') throw new Error('NarrationOnUseWebM'); // áudio garantido no WebM
  await openVideoWriter('mp4');

  wc.muxer = new MP4Muxer.MP4Muxer({
    target:"file", fastStart:"in-memory", firstTimestampBehavior:"offset",
    onData: async (data)=>{ if(videoWritable){ await videoWritable.write(data); videoBytesWritten+=data.byteLength; hudVideoSize.textContent=bytesToMB(videoBytesWritten);} }
  });
  wc.vTrack = wc.muxer.addTrack({ codec:"avc1.42E01E", width:REC_W, height:REC_H, timescale:1e6 });

  const support=await VideoEncoder.isConfigSupported({ codec:"avc1.42E01E", width:REC_W, height:REC_H, bitrate:VID_BITRATE, framerate:VID_FPS, avc:{format:"annexb"} });
  if(!support.supported) throw new Error('H.264 não suportado');

  wc.encoder=new VideoEncoder({
    output:(chunk)=>wc.muxer.addSample(wc.vTrack, chunk, { duration:Math.round(1e6/VID_FPS), dts:chunk.timestamp, pts:chunk.timestamp, keyframe:chunk.type==="key" }),
    error:(e)=>console.error('VideoEncoder error:',e)
  });
  wc.encoder.configure({ codec:"avc1.42E01E", width:REC_W, height:REC_H, bitrate:VID_BITRATE, framerate:VID_FPS, avc:{format:"annexb"} });

  const overlayCanvas=document.createElement('canvas'); overlayCanvas.width=REC_W; overlayCanvas.height=REC_H; const overlayCtx=overlayCanvas.getContext('2d');
  let startTs=performance.now(), lastKeySec=-1;

  const draw=()=>{
    if(!isRecordingVideo) return;
    overlayCtx.drawImage(vid,0,0,REC_W,REC_H);
    const kmObj=nearestKM(lastPos?.lat||0,lastPos?.lon||0), kmStr=kmObj?fmtKm(kmObj.km):'KM —';
    const ids=nearestN(lastPos?.lat||0,lastPos?.lon||0,5), ts=new Date().toLocaleString();
    const gpsLine=overlayOpts.showGps && lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
    stampOverlay(overlayCtx,REC_W,REC_H, overlayOpts.showKM?kmStr:'', overlayOpts.showIds?ids:[], overlayOpts.showTs?ts:'', gpsLine);
    const elapsed=performance.now()-startTs, tUS=Math.round(elapsed*1000);
    const vf=new VideoFrame(overlayCanvas,{timestamp:tUS}); const sec=Math.floor(elapsed/1000); const key=(sec!==lastKeySec); if(key) lastKeySec=sec;
    wc.encoder.encode(vf,{keyFrame:key}); vf.close();
    rafId=requestAnimationFrame(draw);
  };

  isRecordingVideo=true; updateChip(); showVideoHUD(true); draw();
  return {
    async stop(){
      if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
      try{ await wc.encoder.flush(); wc.encoder.close(); }catch{}
      try{ wc.muxer.finalize(); }catch{}
      await closeVideoWriter();
      wc={encoder:null,muxer:null,vTrack:null};
      isRecordingVideo=false; updateChip();
    }
  };
}
async function startVideoRecordingSafariMP4(){
  const videoStream=vid.srcObject; if(!videoStream) throw new Error('Câmera indisponível');
  await openVideoWriter('mp4');

  const overlayCanvas=document.createElement('canvas'); overlayCanvas.width=REC_W; overlayCanvas.height=REC_H; const overlayCtx=overlayCanvas.getContext('2d');
  const canvasStream=overlayCanvas.captureStream(VID_FPS);
  if(narrationMode!=='off'){ await ensureMic(); micTrack.enabled=(narrationMode==='direct'); canvasStream.addTrack(micTrack); }

  const mime='video/mp4;codecs=h264,mp4a.40.2'; if(!MediaRecorder.isTypeSupported(mime)) throw new Error('MP4 não suportado');
  mediaRecorder=new MediaRecorder(canvasStream,{mimeType:mime, videoBitsPerSecond:VID_BITRATE});
  mediaRecorder.ondataavailable=async e=>{ if(e.data?.size && videoWritable){ await videoWritable.write(e.data); videoBytesWritten+=e.data.size; hudVideoSize.textContent=bytesToMB(videoBytesWritten);} };
  mediaRecorder.onstop=async()=>{ await closeVideoWriter(); isRecordingVideo=false; updateChip(); };

  mediaRecorder.start(1000);
  isRecordingVideo=true; updateChip(); showVideoHUD(true);

  const draw=()=>{ if(!isRecordingVideo) return;
    overlayCtx.drawImage(vid,0,0,REC_W,REC_H);
    const kmObj=nearestKM(lastPos?.lat||0,lastPos?.lon||0), kmStr=kmObj?fmtKm(kmObj.km):'KM —';
    const ids=nearestN(lastPos?.lat||0,lastPos?.lon||0,5), ts=new Date().toLocaleString();
    const gpsLine=overlayOpts.showGps && lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
    stampOverlay(overlayCtx,REC_W,REC_H, overlayOpts.showKM?kmStr:'', overlayOpts.showIds?ids:[], overlayOpts.showTs?ts:'', gpsLine);
    requestAnimationFrame(draw);
  };
  draw();

  // PTT durante gravação
  btnPTT.onpointerdown=()=>{ if(narrationMode==='ptt' && micTrack){ micTrack.enabled=true; narrationActive=true; updateChip(); }};
  btnPTT.onpointerup=()=>{ if(narrationMode==='ptt' && micTrack){ micTrack.enabled=false; narrationActive=false; updateChip(); }};
  btnPTT.onpointerleave=btnPTT.onpointerup;

  return { async stop(){ try{ mediaRecorder.stop(); }catch{} } };
}
async function startVideoRecordingWebM(){
  await openVideoWriter('webm');

  const overlayCanvas=document.createElement('canvas'); overlayCanvas.width=REC_W; overlayCanvas.height=REC_H; const overlayCtx=overlayCanvas.getContext('2d');
  const canvasStream=overlayCanvas.captureStream(VID_FPS);
  if(narrationMode!=='off'){ await ensureMic(); micTrack.enabled=(narrationMode==='direct'); canvasStream.addTrack(micTrack); }

  const options={ mimeType:'video/webm;codecs=vp9,opus', videoBitsPerSecond:VID_BITRATE };
  const mimeOk=MediaRecorder.isTypeSupported(options.mimeType)? options.mimeType : 'video/webm';
  mediaRecorder=new MediaRecorder(canvasStream,{...options,mimeType:mimeOk});
  mediaRecorder.ondataavailable=async e=>{ if(e.data?.size && videoWritable){ await videoWritable.write(e.data); videoBytesWritten+=e.data.size; hudVideoSize.textContent=bytesToMB(videoBytesWritten);} };
  mediaRecorder.onstop=async()=>{ await closeVideoWriter(); isRecordingVideo=false; updateChip(); };

  mediaRecorder.start(1000);
  isRecordingVideo=true; updateChip(); showVideoHUD(true);

  const draw=()=>{ if(!isRecordingVideo) return;
    overlayCtx.drawImage(vid,0,0,REC_W,REC_H);
    const kmObj=nearestKM(lastPos?.lat||0,lastPos?.lon||0), kmStr=kmObj?fmtKm(kmObj.km):'KM —';
    const ids=nearestN(lastPos?.lat||0,lastPos?.lon||0,5), ts=new Date().toLocaleString();
    const gpsLine=overlayOpts.showGps && lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
    stampOverlay(overlayCtx,REC_W,REC_H, overlayOpts.showKM?kmStr:'', overlayOpts.showIds?ids:[], overlayOpts.showTs?ts:'', gpsLine);
    requestAnimationFrame(draw);
  };
  draw();

  // PTT
  btnPTT.onpointerdown=()=>{ if(narrationMode==='ptt' && micTrack){ micTrack.enabled=true; narrationActive=true; updateChip(); }};
  btnPTT.onpointerup=()=>{ if(narrationMode==='ptt' && micTrack){ micTrack.enabled=false; narrationActive=false; updateChip(); }};
  btnPTT.onpointerleave=btnPTT.onpointerup;

  return { async stop(){ try{ mediaRecorder.stop(); }catch{} } };
}

let activeStopper=null;
async function startVideoRecording(){
  if(isRecordingVideo) return;
  if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; }

  // Safari MP4 com áudio
  if('MediaRecorder' in window && MediaRecorder.isTypeSupported?.('video/mp4;codecs=h264')){
    try{ activeStopper = await startVideoRecordingSafariMP4(); return; }catch(e){ console.warn('Safari MP4 falhou:', e); }
  }
  // Chrome/Edge: MP4 sem áudio (narration off)
  try{
    activeStopper = await startVideoRecordingMP4(); return;
  }catch(e){
    if(String(e).includes('NarrationOnUseWebM')) console.warn('Narration ativa → usar WebM');
    else console.warn('WebCodecs MP4 falhou:', e);
  }
  // Fallback WebM
  try{ activeStopper = await startVideoRecordingWebM(); }catch(e){ console.error('WebM falhou:', e); alert('Não foi possível iniciar a gravação.'); }
}
async function stopVideoRecording(){
  if(!isRecordingVideo || !activeStopper) return;
  isRecordingVideo=false;
  try{ await activeStopper.stop(); }catch(e){ console.warn('stop error:', e); }
  activeStopper=null; updateChip();
}
btnVideoRecord.addEventListener('click', async ()=>{ if(isRecordingVideo){ await stopVideoRecording(); } else { await startVideoRecording(); }});
btnRecStop.addEventListener('click', async ()=>{ if(isRecordingVideo) await stopVideoRecording(); });

/* ===== Interações ===== */
wrap.addEventListener('click', ()=>{ /* nada aqui, para não distrair na direção */ });
btnSelectFolder.addEventListener('click', async ()=>{ await selectOutputFolder(); });

/* ===== MODAL PDF + Gerador consolidado ===== */
function openPdfOptions(){ if(sessionPhotoFiles.length===0){ alert('Nenhuma foto na sessão.'); return; } pdfModal.style.display='flex'; }
function closePdfOptions(){ pdfModal.style.display='none'; }
btnFinalizePdf.addEventListener('click', openPdfOptions);
pdfOpts.addEventListener('click', async (e)=>{
  const pp = e.target.closest('.btn')?.dataset?.pp; if(!pp) return;
  if(pp==='cancel'){ closePdfOptions(); return; }
  closePdfOptions();
  try{
    await generateConsolidatedPdf(Number(pp));
    setPdfStatus('GERADO', true);
    const clear = confirm('PDF gerado com sucesso. Limpar sessão (mantém os arquivos na pasta)?');
    if(clear){
      sessionPhotoFiles.length=0; sessionPhotos=0; hudPhotos.textContent=sessionPhotos; stFotos.textContent='Fotos: 0'; btnFinalizePdf.disabled=true;
    }
  }catch(err){ alert('Falha ao gerar PDF: '+err.message); }
});

async function generateConsolidatedPdf(perPage){
  if(!rootDirHandle) throw new Error('Pasta não selecionada');
  const fileName = `RELATORIO_INSPECAO_${perPage}ppg_${new Date().toISOString().slice(0,10)}_${Date.now()}.pdf`;
  const handle = await rootDirHandle.getFileHandle(fileName, { create:true });
  const stream = await handle.createWritable();
  const enc=new TextEncoder(); let pos=0, objNo=0; const xref=[0];
  const write=async s=>{ const b=(s instanceof Uint8Array)?s:enc.encode(s); await stream.write(b); pos+=b.length; };
  const addObj=async body=>{ objNo++; xref.push(pos); await write(`${objNo} 0 obj\n${body}\nendobj\n`); return objNo; };
  const addStream=async (dict,bin)=>{ objNo++; xref.push(pos); await write(`${objNo} 0 obj\n${dict.replace('>>','')} /Length ${bin.length} >>\nstream\n`); await write(bin); await write(`\nendstream\nendobj\n`); return objNo; };

  await write('%PDF-1.4\n');
  const PW=595, PH=842, M=24;
  const L={1:[1,1],2:[2,1],4:[2,2],8:[4,2],16:[4,4]}; const [COLS, ROWS] = L[perPage] || [1,1];
  const CELL_W=Math.floor((PW-2*M)/COLS), CELL_H=Math.floor((PH-2*M)/ROWS);
  const pages=[]; let i=0;

  while(i<sessionPhotoFiles.length){
    const xobjs=[], ops=[];
    for(let r=0;r<ROWS && i<sessionPhotoFiles.length;r++){
      for(let c=0;c<COLS && i<sessionPhotoFiles.length;c++,i++){
        const rec=sessionPhotoFiles[i]; const file=await rec.handle.getFile(); const bin=new Uint8Array(await file.arrayBuffer());
        const imgW=rec.w||800, imgH=rec.h||450;
        let dw=CELL_W, dh=Math.round(imgH*(CELL_W/imgW));
        if(dh>CELL_H){ dh=CELL_H; dw=Math.round(imgW*(CELL_H/imgH)); }
        const tx=M + c*CELL_W + Math.round((CELL_W-dw)/2);
        const ty=PH - (M+(r+1)*CELL_H) + Math.round((CELL_H-dh)/2);
        const n=await addStream(`<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode >>`, bin);
        const alias=`/Im_${r}_${c}`; xobjs.push(`${alias} ${n} 0 R`); ops.push(`q\n${dw} 0 0 ${dh} ${tx} ${ty} cm\n${alias} Do\nQ\n`);
      }
    }
    const cont=await addStream(`<< >>`, enc.encode(ops.join('')));
    const pg=await addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << ${xobjs.join(' ')} >> >> /Contents ${cont} 0 R >>`);
    pages.push(pg);
  }
  const pagesNum=await addObj(`<< /Type /Pages /Kids [ ${pages.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pages.length} >>`);
  const catalog=await addObj(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`);
  const startXref=pos; let xr=`xref\n0 ${xref.length}\n0000000000 65535 f \n`; for(let k=1;k<xref.length;k++){ xr+=String(xref[k]).padStart(10,'0')+' 00000 n \n'; }
  await write(xr); await write(`trailer\n<< /Size ${xref.length} /Root ${catalog} 0 R >>\nstartxref\n${startXref}\n%%EOF`); await stream.close();
}

/* ===== Boot (proteção anti-trava) ===== */
let bootStarted=false;
window.__BOOT = async function(){
  if(bootStarted) return; bootStarted=true;
  try{
    await Promise.all([loadCSVs(), enumerateCameras()]);
    await startCamera(deviceIndex);
    camReady = !!vid.videoWidth;
    startGPS(); startKmUpdate();
    setInterval(updateStatusBar, 700);
  }catch(e){ console.error('Falha no boot:', e); }
};
