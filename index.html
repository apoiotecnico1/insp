<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO FOTOGRÁFICA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; touch-action: manipulation; }

        /* SPLASH */
        #splash-hypnos { 
            position: fixed; inset: 0; background: #000; z-index: 7000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s;
        }
        .vortex { width: 80px; height: 80px; border: 3px solid var(--accent); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; animation: rot 2s linear infinite; }
        @keyframes rot { 100% { transform: rotate(360deg); } }

        /* SEGURANÇA */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #333; padding: 25px; border-radius: 15px; max-width: 400px; background: #0a0a0a; text-align: center; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; }

        /* UI MOBILE OPTIMIZED */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM - SEMPRE VISÍVEL */
        #km-hud { 
            position: absolute; top: 40px; left: 20px; 
            background: var(--placa-verde); padding: 10px 20px; 
            border: 2px solid #fff; border-radius: 8px; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #km-txt { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }

        /* STATUS E CONTROLES - OCULTOS POR PADRÃO */
        #ui-overlay {
            position: absolute; inset: 0; 
            display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px 20px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 100;
        }
        #ui-overlay.active { opacity: 1; pointer-events: auto; }

        #status-hud { align-self: flex-end; text-align: right; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; backdrop-filter: blur(5px); }
        .stats-row { font-size: 12px; font-weight: bold; color: #fff; text-transform: uppercase; }
        .stats-row b { color: var(--accent); font-size: 14px; }

        #ui-controls { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .btn-ui { border: none; border-radius: 50px; font-weight: 800; cursor: pointer; padding: 20px 40px; background: var(--accent); color: #000; text-transform: uppercase; font-size: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        #btn-stop { background: var(--danger); color: #fff; }

        #gear-btn { background: rgba(255,255,255,0.2); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        #settings-panel { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); z-index: 2000; padding: 40px 20px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-hypnos">
    <div class="vortex"></div>
    <h1 style="margin-top:20px; font-size: 1rem; letter-spacing: 4px;">INSPEÇÃO FOTOGRÁFICA</h1>
</div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:10px;">DESTINO DOS ARQUIVOS</h2>
        <p style="font-size:14px; color:#ccc; margin-bottom:20px;">Selecione a pasta onde os relatórios PDF serão salvos automaticamente.</p>
        <button class="btn-aware" onclick="requestFolder()">Selecionar Pasta</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>

    <div id="ui-overlay">
        <div id="status-hud">
            <div style="display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-bottom:5px;">
                <div id="rec-dot" style="width:10px; height:10px; background:var(--danger); border-radius:50%; display:none;"></div>
                <span id="rec-status" style="font-size:10px; font-weight:800;">AGUARDANDO</span>
            </div>
            <div class="stats-row">FOTOS: <b id="stat-total">0</b></div>
            <div class="stats-row">PDFs: <b id="stat-pdfs">0</b></div>
            <div class="stats-row" style="font-size:9px; margin-top:5px; opacity:0.7;">LOTE: <span id="stat-lote">0</span> / <span id="max-lote">50</span></div>
        </div>

        <div id="ui-controls">
            <div id="gear-btn" onclick="toggleSet()">⚙️</div>
            <button id="btn-start" class="btn-ui" onclick="initCapture(event)">Iniciar</button>
            <button id="btn-stop" class="btn-ui" style="display:none;" onclick="stopCapture(event)">Finalizar PDF</button>
        </div>
    </div>
</div>

<div id="settings-panel">
    <div style="text-align:right; margin-bottom:30px; font-weight:bold; color:var(--accent);" onclick="toggleSet()">FECHAR ×</div>
    <label style="font-size:10px; color:#666;">CÂMERA</label>
    <select id="cam-select" onchange="switchCam(this.value)" style="width:100%; padding:12px; background:#222; color:#fff; border:none; margin-bottom:20px;"></select>
    <label style="font-size:10px; color:#666;">FOTOS POR PDF</label>
    <input type="number" id="cfg-lote" value="50" onchange="document.getElementById('max-lote').innerText=this.value" style="width:100%; padding:12px; background:#222; color:#fff; border:none;">
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
let countTotal = 0, countPDFs = 0;

const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash-hypnos').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-hypnos').remove();
            document.getElementById('safety-gate').style.display = 'flex';
        }, 600);
    }, 2000);
    loadCSV();
};

async function requestFolder() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams();
        initG();
    } catch(e) { alert("Acesso à pasta é obrigatório."); }
}

function wakeUI() {
    const ui = document.getElementById('ui-overlay');
    ui.classList.add('active');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => {
        ui.classList.remove('active');
    }, 2500); // Some após 2.5 segundos
}

function updateStats() {
    document.getElementById('stat-lote').innerText = buffer.length;
    document.getElementById('stat-total').innerText = countTotal;
    document.getElementById('stat-pdfs').innerText = countPDFs;
}

async function initCapture(e) {
    if(e) e.stopPropagation();
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-dot').style.display = 'block';
    document.getElementById('rec-status').innerText = "CAPTURANDO";
    document.getElementById('rec-status').style.color = "var(--danger)";
    loop();
}

async function stopCapture(e) {
    if(e) e.stopPropagation();
    rec = false;
    document.getElementById('rec-status').innerText = "GERANDO PDF...";
    document.getElementById('rec-status').style.color = "#fff";
    
    await savePDF(); // Força salvar o que tiver no buffer
    
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-dot').style.display = 'none';
    document.getElementById('rec-status').innerText = "AGUARDANDO";
    updateStats();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.5), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            ts: new Date().toLocaleTimeString('pt-BR') 
        });
        countTotal++;
        updateStats();
        
        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if(buffer.length >= limit) savePDF();
    }
    setTimeout(loop, 250); // Ajuste de tempo para não travar o mobile
}

async function savePDF() {
    if(!buffer.length) return;
    
    const items = [...buffer]; 
    buffer = []; // Limpa imediato para evitar duplicidade
    
    const kmI = items.km.replace(/\+/g, '_');
    const kmF = items[items.length - 1].km.replace(/\+/g, '_');
    const d = new Date();
    const dataStr = `${d.getDate()}-${d.getMonth()+1}`;

    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; 
                ctx.fillRect(0, can.height-barH, can.width, barH);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText("Km " + items[i].km, 50, can.height-(barH*0.45));
                ctx.font = `${barH * 0.18}px Arial`;
                ctx.fillText(items[i].ts + " | INSPEÇÃO FOTOGRÁFICA", 50, can.height-(barH*0.18));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }

    const nome = `Relatorio_Km_${kmI}_ao_${kmF}_${dataStr}_${Date.now()}.pdf`;
    try {
        const f = await hDir.getFileHandle(nome, {create:true});
        const s = await f.createWritable();
        await s.write(doc.output('blob')); 
        await s.close();
        countPDFs++;
        updateStats();
    } catch(e) { console.error("Erro no FileSystem:", e); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Lente ${i + 1}`;
        sel.appendChild(opt);
    });
    // Seleciona a última (geralmente a traseira melhor)
    initC(videoDevices[videoDevices.length-1].deviceId);
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1280}, height: {ideal: 720} } 
    });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initG() { 
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
