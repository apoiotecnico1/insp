<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Apoio - Captura Pro</title>

    <!-- ORIGINAL – CORRETO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --accent:#ffcc00; --placa-verde:rgba(0,121,52,.6); --danger:#ff4444; --glass:rgba(10,10,10,.9); }
        *{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
        body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh;width:100vw}

        #safety-gate{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center}
        .alert-box{border:1px solid #333;padding:40px;border-radius:15px;text-align:center;background:#0a0a0a;max-width:90%}
        .btn-aware{background:var(--accent);color:#000;border:none;padding:20px 50px;font-weight:900;border-radius:8px;cursor:pointer;margin-top:20px}

        #app-shell{position:relative;width:100vw;height:100vh;visibility:hidden}
        #vid{width:100%;height:100%;object-fit:cover;cursor:crosshair}

        #km-hud{
            position:absolute;top:20px;left:20px;
            background:var(--placa-verde);
            padding:10px 20px;
            border:3px solid rgba(255,255,255,.7);
            border-radius:8px;z-index:100;
            pointer-events:none;
            min-width:160px;
            display:flex;flex-direction:column;
            align-items:center;text-align:center
        }

        /* ✅ ÚNICA MUDANÇA VISUAL: BR NÃO APARECE */
        #br-txt{display:none;}

        #km-txt{font-size:2.2rem;font-weight:900}

        #rec-tag{
            position:absolute;top:40px;right:15px;
            display:flex;align-items:center;gap:6px;
            background:rgba(0,0,0,.5);
            padding:5px 12px;border-radius:15px;
            opacity:0;pointer-events:none;z-index:100
        }
        .dot{width:8px;height:8px;background:#f00;border-radius:50%;animation:blink 1s infinite}
        @keyframes blink{50%{opacity:0}}

        #ui-controls{
            position:absolute;bottom:40px;left:50%;
            transform:translateX(-50%);
            display:flex;gap:20px;z-index:500
        }

        .btn-main{border:none;padding:18px 40px;border-radius:12px;font-weight:900;cursor:pointer;min-width:160px}
        #btn-start{background:var(--accent);color:#000}
        #btn-stop{background:var(--danger);color:#fff;display:none}
        #gear-btn{width:60px;height:60px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}

        canvas{display:none}
        #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:1000}
    </style>
</head>

<body>

<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent)">SISTEMA DE APOIO</h2>
        <p>Captura Automática + Foto Manual</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>

    <div id="km-hud">
        <span id="br-txt">BR-116</span><!-- permanece, mas não aparece -->
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="rec-tag">
        <div class="dot"></div>
        <span>Registrando fotos no PDF...</span>
    </div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null;
let brAtual="BR-116"; // ✅ mantido (não quebra nada)
let buffer=[], kmInicialLote="";
let curLat="0.0000", curLon="0.0000";

const vid=document.getElementById('vid');
const can=document.getElementById('c');
const ctx=can.getContext('2d');

function handleTouch(){ takeManualPhoto(); }

async function takeManualPhoto(){
    ctx.drawImage(vid,0,0,can.width,can.height);
    const km=document.getElementById('km-txt').innerText.replace("Km ","");
    const bh=can.height*0.10;

    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(0,can.height-bh,can.width,bh);

    ctx.fillStyle="#fff";
    ctx.font=`bold ${bh*0.35}px Arial`;

    /* ✅ NÃO MOSTRA BR, SÓ KM */
    ctx.fillText(`Km ${km}`,20,can.height-(bh*0.55));

    ctx.font=`${bh*0.22}px Arial`;
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`,20,can.height-(bh*0.25));

    const blob=await new Promise(r=>can.toBlob(r,'image/jpeg',0.95));
    const fh=await hDir.getFileHandle(`MANUAL_${Date.now()}.jpg`,{create:true});
    const w=await fh.createWritable();
    await w.write(blob); await w.close();
}

/* ✅ PDF – MESMA COISA: SÓ NÃO ESCREVE BR */
async function savePDF(dataList, kmIni, kmFim){
    const doc=new jspdf.jsPDF(can.width<can.height?'p':'l','mm','a4');
    const pw=doc.internal.pageSize.getWidth(), ph=doc.internal.pageSize.getHeight();

    for(let i=0;i<dataList.length;i++){
        if(i) doc.addPage();
        const img=new Image();
        await new Promise(r=>{
            img.onload=()=>{
                ctx.drawImage(img,0,0);
                const bh=can.height*0.10;
                ctx.fillStyle="rgba(0,0,0,0.6)";
                ctx.fillRect(0,can.height-bh,can.width,bh);
                ctx.fillStyle="#fff";
                ctx.font=`bold ${bh*0.35}px Arial`;
                ctx.fillText(`Km ${dataList[i].km}`,20,can.height-(bh*0.55));
                ctx.font=`${bh*0.22}px Arial`;
                ctx.fillText(`${dataList[i].ts} | GPS: ${dataList[i].gps}`,20,can.height-(bh*0.25));
                doc.addImage(can.toDataURL('image/jpeg',0.7),'JPEG',0,0,pw,ph);
                r();
            };
            img.src=dataList[i].img;
        });
    }

    const fh=await hDir.getFileHandle(`RELATORIO_${Date.now()}.pdf`,{create:true});
    const w=await fh.createWritable();
    await w.write(doc.output('blob')); await w.close();
}
</script>

</body>
</html>
