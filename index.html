<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Captura Pro - Operacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #safety-gate { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #000; }
        .btn-start { padding: 40px 80px; font-size: 1.5rem; background: #ffcc00; border: none; border-radius: 20px; font-weight: 900; }
        #vid { width: 100vw; height: 100vh; object-fit: cover; }
        .hud { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); padding: 20px; }
        .controls { position: absolute; top: 30px; right: 30px; z-index: 1000; }
        .btn-ctrl { padding: 30px 60px; font-size: 1.2rem; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="safety-gate">
    <button class="btn-start" onclick="initApp()">INICIAR SISTEMA OPERACIONAL</button>
</div>

<video id="vid" autoplay playsinline muted></video>
<div class="hud">
    <div id="status-info" style="font-size: 1.2rem; margin-bottom: 10px;">Km: 000 | GPS: 0.000, 0.000</div>
    <div id="nota-status" style="font-size: 1rem; color: #ffcc00; font-weight: bold;">Nota: ---</div>
</div>
<div class="controls">
    <button id="btn-start" class="btn-ctrl" style="background:#ffcc00" onclick="startCapture()">GRAVAR</button>
    <button id="btn-stop" class="btn-ctrl" style="background:#ff4444; color:#fff; display:none" onclick="stopCapture()">PARAR</button>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let stream, rec, hDir, capturing = false, buffer = [], notaAtual = "";
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

async function initApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: 1280, height: 720 }, 
            audio: true 
        });
        vid.srcObject = stream;
        
        // Configuração Estável do Reconhecimento
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        rec = new SR();
        rec.lang = 'pt-BR'; 
        rec.continuous = true; 
        rec.interimResults = false; 
        
        // Bloqueia a permissão repetida não tentando dar start se já estiver rodando
        rec.onresult = (e) => { 
            notaAtual = e.results[e.results.length - 1][0].transcript;
            document.getElementById('nota-status').innerText = "Nota: " + notaAtual;
        };
        
        // Em vez de reiniciar agressivamente, apenas verificamos o estado
        rec.onend = () => { try { rec.start(); } catch(e) {} };
        rec.start();
        
        document.getElementById('safety-gate').style.display = 'none';
    } catch(e) { alert("Permissão necessária."); }
}

function startCapture() {
    capturing = true; buffer = [];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    loop();
}

function stopCapture() {
    capturing = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    saveBatch();
}

function loop() {
    if(!capturing) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    // Dados para o buffer
    buffer.push({ 
        img: can.toDataURL('image/jpeg', 0.6), 
        nota: notaAtual,
        km: "Km " + (Math.floor(Math.random()*1000)), // Substitua pela lógica do seu GPS
        gps: "-23.21, -45.42",
        data: new Date().toLocaleDateString()
    });
    
    notaAtual = ""; 
    document.getElementById('nota-status').innerText = "Nota: ...";
    
    if(buffer.length >= 20) saveBatch();
    setTimeout(loop, 1000);
}

async function saveBatch() {
    if(buffer.length === 0) return;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    
    for(let i=0; i<buffer.length; i++) {
        if(i > 0) doc.addPage();
        const img = new Image();
        img.src = buffer[i].img;
        await new Promise(r => img.onload = r);
        ctx.drawImage(img, 0, 0);
        
        // Estampa Inferior Organizada
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, can.height - 180, can.width, 180);
        
        // Linha 1: Dados Originais
        ctx.fillStyle = "#fff";
        ctx.font = "bold 40px Arial";
        ctx.fillText(`${buffer[i].km} | GPS: ${buffer[i].gps} | ${buffer[i].data}`, 40, can.height - 110);
        
        // Linha 2: Nota Narrada (Adicional)
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 35px Arial";
        let txt = buffer[i].nota || "Sem observações.";
        if(txt.length > 80) txt = txt.substring(0, 77) + "...";
        ctx.fillText("Nota: " + txt, 40, can.height - 40);
        
        doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
    }
    
    const fh = await hDir.getFileHandle(`Relatorio_${Date.now()}.pdf`, { create: true });
    const w = await fh.createWritable();
    await w.write(doc.output('blob'));
    await w.close();
    buffer = [];
}
</script>
</body>
</html>
