<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bancada de Manutenção – Luminárias</title>

<style>
:root{
  --primary:#0b7a39;
  --secondary:#085e2c;
  --bg:#0b0f16;
  --card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.12);
  --ok:#22c55e;
  --bad:#ef4444;
}
body{
  margin:0;background:var(--bg);color:#eaf2ff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}
header{
  position:fixed;top:0;left:0;right:0;
  background:#0c1220;border-bottom:1px solid var(--border);
  padding:14px;text-align:center;font-weight:900;
}
main{padding:70px 14px 110px;}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:14px;margin-bottom:14px;
}
label{display:block;font-weight:800;margin:8px 0 4px;}
input,select,textarea{
  width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);
  background:#0d1731;color:#fff;font-weight:700;
}
textarea{resize:vertical;min-height:80px}
.checks label{display:flex;gap:8px;font-weight:700;margin-bottom:6px}

.tabs{
  display:flex;gap:8px;margin-bottom:12px;
}
.tabs button{
  flex:1;border-radius:12px;padding:10px;font-weight:900;
  border:1px solid var(--border);background:#111827;color:#eaf2ff;
}
.tabs button.active{background:var(--primary)}

.fab{
  position:fixed;right:16px;bottom:16px;
  background:linear-gradient(180deg,#35eb85,#22c55e);
  border-radius:999px;padding:16px 22px;
  font-weight:900;color:#042f1e;border:0;
}

.photo{
  width:100%;border-radius:12px;border:1px solid var(--border);margin-top:8px;
}
</style>
</head>

<body>
<header>🔧 Bancada de Manutenção – Luminárias</header>

<main>
  <div class="tabs">
    <button class="active" onclick="showTab('entrada')">ENTRADA</button>
    <button onclick="showTab('servico')">SERVIÇO</button>
    <button onclick="showTab('saida')">SAÍDA</button>
  </div>

  <!-- ENTRADA -->
  <section id="entrada" class="tab">
    <div class="card">
      <label>Ordem de Serviço (OS)</label>
      <input id="os">

      <label>Patrimônio / Código</label>
      <input id="patrimonio">

      <label>Tipo de luminária</label>
      <select id="tipo">
        <option>LED pública</option>
        <option>Vapor metálico</option>
        <option>Vapor de sódio</option>
        <option>Refletor</option>
        <option>Outro</option>
      </select>

      <label>Defeitos encontrados</label>
      <div class="checks">
        <label><input type="checkbox"> Não liga</label>
        <label><input type="checkbox"> Driver queimado</label>
        <label><input type="checkbox"> LED danificado</label>
        <label><input type="checkbox"> Fiação rompida</label>
        <label><input type="checkbox"> Vidro / lente danificada</label>
      </div>

      <label>Observações iniciais</label>
      <textarea id="obsEntrada"></textarea>
    </div>
  </section>

  <!-- SERVIÇO -->
  <section id="servico" class="tab" style="display:none">
    <div class="card">
      <label>Serviço executado</label>
      <textarea id="servicoExec"></textarea>

      <label>Componentes substituídos</label>
      <textarea id="componentes"></textarea>
    </div>
  </section>

  <!-- SAÍDA -->
  <section id="saida" class="tab" style="display:none">
    <div class="card">
      <label>Testes realizados</label>
      <div class="checks">
        <label><input type="checkbox"> Ligação em bancada</label>
        <label><input type="checkbox"> Medição elétrica</label>
        <label><input type="checkbox"> Teste térmico</label>
      </div>

      <label>Status final</label>
      <select id="status">
        <option value="OK">✅ APROVADA</option>
        <option value="NOK">❌ REPROVADA</option>
      </select>

      <label>Observações finais</label>
      <textarea id="obsFinal"></textarea>
    </div>
  </section>
</main>

<button class="fab" onclick="gerarPDF()">📄 GERAR PDF</button>

<script>
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function gerarPDF(){
  alert('✅ PDF gerado (implementar motor PDF semelhante ao sistema anterior)');
}
</script>
</body>
</html>
