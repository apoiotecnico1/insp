<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Apoio Tecnico Relatorio Km</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; background: #0a0a0a; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 25px; border: 3px solid #fff; border-radius: 8px; z-index: 100; text-align: center; min-width: 140px; }
        #br-txt { font-size: 0.9rem; font-weight: 800; display: block; opacity: 1; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.5); margin-bottom: 4px; padding-bottom: 2px; }
        #km-txt { font-size: 2.2rem; font-weight: 900; line-height: 1; }

        #rec-tag { position: absolute; top: 25px; right: 20px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; opacity: 0; font-weight: bold; z-index: 100; }
        .dot { width: 12px; height: 12px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .auto-hide { transition: opacity 0.5s ease; opacity: 1; }
        .hidden { opacity: 0; pointer-events: none; }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; }
        .btn-main { border: none; padding: 18px 40px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 14px; cursor: pointer; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 4000; padding: 60px 25px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        
        input, select { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; margin-top: 5px; margin-bottom: 15px; }
        label { font-size: 12px; color: #aaa; text-transform: uppercase; }

        #no-sleep-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<video id="no-sleep-video" playsinline muted loop></video>
<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:10px;">FOTO-CAPTURA</h2>
        <p style="margin-bottom:20px; font-size: 0.9rem; color: #888;">NÃO DIRIJA USANDO O CELULAR</p>
        <button class="btn-aware" onclick="startApp()">Acessar</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:30px; font-weight: bold;">X  Fechar</div>
    <label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200">
    <label>Fotos por Relatório</label><input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleScreenClick(event)"></video>
    
    <div id="km-hud">
        <span id="br-txt">Inicializando GPS</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>ON</span></div>

    <div id="ui-controls" class="auto-hide">
        <div id="gear-btn" onclick="event.stopPropagation(); toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="event.stopPropagation(); startCapture()">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" onclick="event.stopPropagation(); stopCapture()">Fechar relatorio</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null, wakeLock=null, hideTimeout;
let kmInicialLote = "", brAtual = "---", buffer = [];
let curLat = "0.0000", curLon = "0.0000";

const vid = document.getElementById('vid');
const noSleepVid = document.getElementById('no-sleep-video');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function keepScreenAlive() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }
    if (noSleepVid.paused) {
        noSleepVid.src = "https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3";
        noSleepVid.play().catch(()=>{});
    }
}
setInterval(keepScreenAlive, 15000);

function handleScreenClick(e) {
    const controls = document.querySelector('.auto-hide');
    controls.classList.remove('hidden');
    captureJPG(); 
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => { if(capturing) controls.classList.add('hidden'); }, 3000);
}

function doFlash() {
    const f = document.getElementById('flash');
    f.style.opacity = '0.5';
    setTimeout(() => f.style.opacity = '0', 150);
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        keepScreenAlive();
        listCams(); 
        await loadCSV(); 
        initGPS();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Selecione a pasta de destino."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1280}, height: {ideal: 720} } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    document.querySelector('.auto-hide').classList.remove('hidden');
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ 
        img: can.toDataURL('image/jpeg', 0.4), 
        km: currentKm, br: brAtual, 
        ts: new Date().toLocaleString('pt-BR'),
        gps: `${curLat}, ${curLon}`
    });

    const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
    if (buffer.length >= limit) {
        savePDF([...buffer], kmInicialLote, currentKm);
        buffer = []; kmInicialLote = currentKm;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function captureJPG() {
    doFlash();
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const agora = new Date();
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.18; 
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${bh * 0.30}px Arial`;
    ctx.fillText(`${brAtual} - Km ${km}`, 30, can.height - (bh * 0.65));
    ctx.font = `${bh * 0.20}px Arial`;
    ctx.fillText(`${agora.toLocaleString('pt-BR')}`, 30, can.height - (bh * 0.40));
    ctx.font = `italic ${bh * 0.18}px Arial`;
    ctx.fillText(`GPS: ${curLat}, ${curLon}`, 30, can.height - (bh * 0.15));
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.9));
    const nome = `FOTO_${brAtual.replace(/\//g,'-')}_Km_${km}_${agora.getTime()}.jpg`;
    try {
        const fh = await hDir.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(blob);
        await wr.close();
    } catch (e) {}
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        await new Promise(res => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.10;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height - bh, can.width, bh);
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${bh * 0.35}px Arial`;
                ctx.fillText(`${dataList[i].br} - Km ${dataList[i].km}`, 20, can.height - (bh * 0.55));
                ctx.font = `${bh * 0.22}px Arial`;
                ctx.fillText(`${dataList[i].ts} | GPS: ${dataList[i].gps}`, 20, can.height - (bh * 0.25));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                res();
            };
            img.src = dataList[i].img;
        });
    }
    const nome = `RELATORIO_${brAtual.replace(/\//g,'-')}_Km_${kmIni}_ao_${kmFim}_${new Date().getTime()}.pdf`;
    const fh = await hDir.getFileHandle(nome, { create: true });
    const wr = await fh.createWritable();
    await wr.write(doc.output('blob'));
    await wr.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const header = rows.shift().split(';').map(v => v.trim().toLowerCase());
        
        // Identifica colunas
        const ik = header.indexOf('km');
        const ilt = header.findIndex(x => x.includes('lat'));
        const iln = header.findIndex(x => x.includes('lon'));
        
        // Busca coluna da BR/Rodovia (tentando vários nomes comuns)
        let ibr = header.indexOf('br');
        if (ibr === -1) ibr = header.indexOf('rodovia');
        if (ibr === -1) ibr = header.indexOf('via');

        kmDB = rows.map(r => {
            const c = r.split(';');
            return { 
                km: c[ik], 
                lt: parseFloat(c[ilt].replace(',', '.')), 
                ln: parseFloat(c[iln].replace(',', '.')), 
                br: ibr !== -1 ? c[ibr].trim() : "BR-???" 
            };
        }).filter(d => !isNaN(d.lt));
        
        console.log("Banco de dados carregado com " + kmDB.length + " pontos.");
    } catch(e) {
        console.error("Erro ao carregar CSV:", e);
    }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); 
        curLon = p.coords.longitude.toFixed(6);
        
        if (!kmDB.length) return;

        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            // Cálculo de distância simples (Pitágoras) - ideal para curtas distâncias
            const d = Math.sqrt(Math.pow(pt.lt - p.coords.latitude, 2) + Math.pow(pt.ln - p.coords.longitude, 2));
            if (d < minD) { minD = d; best = pt; }
        }

        if (best) {
            brAtual = best.br; // Aqui ele pega o nome exato da rodovia do CSV
            document.getElementById('br-txt').innerText = brAtual;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, e => {
        console.error("Erro GPS:", e);
    }, { 
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 5000 
    });
}

document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepScreenAlive(); });
</script>
</body>
</html>
