<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Apoio - Captura Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: rgba(0, 121, 52, 0.6); --danger: #ff4444; --glass: rgba(10, 10, 10, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; background: #0a0a0a; max-width: 90%; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: 20px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; cursor: crosshair; }

        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 20px; border: 3px solid rgba(255, 255, 255, 0.7); border-radius: 8px; z-index: 100; pointer-events: none; min-width: 160px; backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; }
        #narration-status { font-size: 0.8rem; color: #fff; margin-top: 5px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; }
        .hud-pulse { transform: scale(1.05); border-color: var(--accent) !important; }

        #br-txt { font-size: 0.85rem; font-weight: 800; display: block; width: 100%; padding-bottom: 2px; margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.3); }
        #km-txt { font-size: 2.2rem; font-weight: 900; line-height: 1; }

        #rec-tag { position: absolute; top: 40px; right: 15px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 15px; opacity: 0; pointer-events: none; z-index: 100; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; transition: opacity 0.3s ease, visibility 0.3s; }
        .ui-hidden { opacity: 0; visibility: hidden; }

        .btn-main { border: none; padding: 18px 40px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 160px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 4000; padding: 60px 25px; transition: 0.4s; overflow-y: auto; }
        #settings-panel.open { right: 0; }
        #settings-panel label { display: block; margin-top: 15px; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; font-weight: bold; }
        #settings-panel input, #settings-panel select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-top: 5px; }

        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.05s ease-out; }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:10px;">SISTEMA DE APOIO</h2>
        <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:20px; font-weight: bold;">← FECHAR</div>
    <label>Câmera Ativa</label>
    <select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Intervalo (ms)</label>
    <input type="number" id="cfg-int" value="200">
    <label>Fotos/Lote</label>
    <input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>
    <div id="km-hud">
        <span id="br-txt"></span>
        <h1 id="km-txt">Km ---</h1>
        <div id="narration-status">Aguardando voz...</div>
    </div>
    <div id="rec-tag"><div class="dot"></div><span>Gravando...</span></div>
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null, notaAtual = "";
let kmInicialLote = "", buffer = [];
let curLat = "0.0000", curLon = "0.0000";

const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

function initNarration() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;
    const rec = new SpeechRecognition();
    rec.lang = 'pt-BR'; rec.continuous = true; rec.interimResults = false;
    rec.onresult = (e) => {
        notaAtual = e.results[e.results.length - 1][0].transcript;
        document.getElementById('narration-status').innerText = "Nota: " + notaAtual;
    };
    rec.onend = () => { setTimeout(() => rec.start(), 500); };
    rec.start();
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams(); loadCSV(); initGPS(); initNarration();
    } catch(e) { alert("Permissão de pasta necessária."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
}

function handleTouch() { takeManualPhoto(); }

async function takeManualPhoto() {
    if(!hDir) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.10;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff"; ctx.font = `bold ${bh * 0.3}px Arial`;
    ctx.fillText(`Km ${document.getElementById('km-txt').innerText.replace("Km ", "")} | ${notaAtual}`, 20, can.height - (bh * 0.5));
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fileHandle = await hDir.getFileHandle(`MANUAL_${Date.now()}.jpg`, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob); await writable.close();
    notaAtual = ""; document.getElementById('narration-status').innerText = "Aguardando voz...";
}

function startCapture() {
    capturing = true; buffer = []; kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none'; document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1'; captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = []; document.getElementById('btn-start').style.display = 'block'; document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ img: can.toDataURL('image/jpeg', 0.5), km: document.getElementById('km-txt').innerText.replace("Km ", ""), ts: new Date().toLocaleString(), gps: `${curLat}, ${curLon}`, nota: notaAtual });
    notaAtual = ""; document.getElementById('narration-status').innerText = "Aguardando voz...";
    if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
        savePDF([...buffer], kmInicialLote, buffer[buffer.length-1].km);
        buffer = []; kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image(); img.src = dataList[i].img;
        await new Promise(r => img.onload = r);
        ctx.drawImage(img, 0, 0);
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, can.height*0.9, can.width, can.height*0.1);
        ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial";
        ctx.fillText(`Km ${dataList[i].km} | Nota: ${dataList[i].nota}`, 40, can.height*0.96);
        doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
    }
    const fileHandle = await hDir.getFileHandle(`RELATORIO_${Date.now()}.pdf`, { create: true });
    const w = await fileHandle.createWritable(); await w.write(doc.output('blob')); await w.close();
}

function initGPS() { navigator.geolocation.watchPosition(p => { curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6); }, null, {enableHighAccuracy: true}); }
async function loadCSV() { /* Mantido conforme original */ }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
