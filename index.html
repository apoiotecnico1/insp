<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>INSPEÇÃO ELITE V10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --green: #007934; 
            --gold: #ffcc00; 
            --danger: #ff3b30; 
            --dark: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        /* CONTAINER PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* VISÃO DA CÂMERA */
        #cam-view { 
            flex: 1; 
            position: relative; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - PLACA DE KM */
        #km-hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: var(--green); 
            padding: 15px 30px; 
            border: 4px solid #fff; 
            border-radius: 12px; 
            z-index: 50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #km-hud h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

        /* BOTÃO ENGRENAGEM FLUTUANTE */
        #gear-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 55px; 
            height: 55px; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; 
            z-index: 100; 
            font-size: 28px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #gear-btn:active { transform: scale(0.8) rotate(90deg); }

        /* MENU LATERAL (FLYOUT) */
        #settings-flyout { 
            position: fixed; 
            top: 0; 
            right: -320px; 
            width: 300px; 
            height: 100%; 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            z-index: 200; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px; 
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        #settings-flyout.open { right: 0; }
        .set-header { font-size: 14px; font-weight: 900; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .set-row { margin-bottom: 25px; }
        .set-row label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; color: #aaa; font-weight: bold; }
        select, input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; outline: none; }

        /* PAINEL DE CONTROLE */
        #ui-panel { 
            width: 320px; 
            background: var(--dark); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 15px; 
            border-left: 1px solid #222;
            z-index: 60;
        }

        @media (max-width: 900px) {
            #app-shell { flex-direction: column; }
            #ui-panel { width: 100%; height: auto; border-left: none; border-top: 1px solid #222; }
            #km-hud h1 { font-size: 1.8rem; }
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #252525; }
        .stat-card small { color: #666; font-size: 9px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-card b { font-size: 1.2rem; color: var(--gold); }

        .btn { border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-folder { background: #333; color: #fff; height: 55px; font-size: 12px; }
        .btn-start { background: var(--green); color: #fff; height: 85px; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(0,121,52,0.3); }
        .btn-stop { background: var(--danger); color: #fff; height: 85px; font-size: 1.2rem; display: none; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn:disabled { opacity: 0.1; cursor: not-allowed; }

        #status-bar { font-size: 10px; text-align: center; color: #444; margin-top: 5px; }
        canvas { display: none; }
    </style>
</head>
<body onclick="toggleFullScreen()">

    <div id="gear-btn" onclick="toggleSettings(); event.stopPropagation();">⚙️</div>

    <div id="settings-flyout">
        <div class="set-header">CONFIGURAÇÕES TÉCNICAS</div>
        <div class="set-row">
            <label>Exibir Data/Hora</label>
            <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
        </div>
        <div class="set-row">
            <label>Exibir GPS (Lat/Lon)</label>
            <select id="cfg-gps"><option value="S">SIM</option><option value="N">NÃO</option></select>
        </div>
        <div class="set-row">
            <label>Fotos por Lote</label>
            <input type="number" id="cfg-batch" value="50">
        </div>
        <div class="set-row">
            <label>Frequência (ms)</label>
            <input type="number" id="cfg-int" value="700">
        </div>
        <button class="btn btn-folder" style="width: 100%;" onclick="toggleSettings()">FECHAR E APLICAR</button>
    </div>

    <div id="app-shell">
        <div id="cam-view">
            <video id="vid" autoplay playsinline muted></video>
            <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
        </div>

        <div id="ui-panel">
            <div class="stats-grid">
                <div class="stat-card"><small>Lote Atual</small><b id="v-batch">0/50</b></div>
                <div class="stat-card"><small>Total Capturas</small><b id="v-total">0</b></div>
            </div>

            <button id="btn-dir" class="btn btn-folder" onclick="initFileSystem(); event.stopPropagation();">📁 SELECIONAR PASTA DESTINO</button>
            <button id="btn-start" class="btn btn-start" disabled onclick="startCapture(); event.stopPropagation();">▶ INICIAR INSPEÇÃO</button>
            <button id="btn-stop" class="btn btn-stop" onclick="stopCapture(); event.stopPropagation();">■ FINALIZAR LOTE</button>
            
            <div id="status-bar">FULL IMMERSIVE SYSTEM V10 • GPS ACTIVE</div>
        </div>
    </div>

    <canvas id="proc"></canvas>

<script>
    let kmDB = [], gps = null, active = false, buffer = [], totalCount = 0, hFolder = null, batchNum = 0;
    const vid = document.getElementById('vid'), proc = document.getElementById('proc'), ctx = proc.getContext('2d');

    window.onload = () => { setupCamera(); loadCSV(); initGPS(); };

    function toggleSettings() { document.getElementById('settings-flyout').classList.toggle('open'); }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        }
    }

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            vid.srcObject = stream;
            vid.onloadedmetadata = () => {
                proc.width = vid.videoWidth;
                proc.height = vid.videoHeight;
                vid.play();
            };
        } catch(e) { alert("Câmera não acessível."); }
    }

    async function initFileSystem() {
        try {
            hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('btn-dir').innerText = "PASTA OK ✓";
            document.getElementById('btn-dir').style.background = "#1a1a1a";
            document.getElementById('btn-start').disabled = false;
        } catch(e) { console.log("Pasta não selecionada."); }
    }

    async function loadCSV() {
        try {
            const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
            const t = await r.text();
            const rows = t.split('\n').filter(l => l.includes(';'));
            const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
            const ik = head.indexOf('km'), ilt = head.findIndex(x => x.includes('lat')), iln = head.findIndex(x => x.includes('lon'));
            
            kmDB = rows.map(r => {
                const c = r.split(';');
                return { km: c[ik], lt: parseFloat(c[ilt]?.replace(',','.')), ln: parseFloat(c[iln]?.replace(',','.')) };
            }).filter(d => !isNaN(d.lt));
        } catch(e) { document.getElementById('status-bar').innerText = "Erro ao carregar banco de dados"; }
    }

    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            gps = { lat: p.coords.latitude, lon: p.coords.longitude };
            if(kmDB.length) {
                let near = kmDB.reduce((prev, curr) => 
                    Math.hypot(curr.lt - gps.lat, curr.ln - gps.lon) < Math.hypot(prev.lt - gps.lat, prev.ln - gps.lon) ? curr : prev);
                document.getElementById('km-txt').innerText = "Km " + near.km;
            }
        }, null, { enableHighAccuracy: true });
    }

    function drawCarimbo(meta) {
        const w = proc.width, h = proc.height;
        const barH = h * 0.12;
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, h - barH, w, barH);
        
        ctx.fillStyle = "#fff";
        ctx.textAlign = "left";
        ctx.font = `900 ${barH * 0.45}px Arial`;
        ctx.fillText("Km " + meta.km, w * 0.04, h - (barH * 0.38));

        ctx.font = `bold ${barH * 0.18}px monospace`;
        ctx.textAlign = "right";
        let info = "";
        if(document.getElementById('cfg-date').value === 'S') info += meta.ts + "  ";
        if(document.getElementById('cfg-gps').value === 'S') info += `[${meta.lat}, ${meta.lon}]`;
        ctx.fillText(info, w * 0.96, h - (barH * 0.45));
    }

    async function savePDF() {
        if(!buffer.length) return;
        const items = [...buffer]; 
        buffer = []; 
        batchNum++;
        
        const doc = new jspdf.jsPDF(proc.width > proc.height ? 'l' : 'p', 'mm', 'a4');
        const pw = doc.internal.pageSize.getWidth();
        const ph = doc.internal.pageSize.getHeight();

        for(let i=0; i < items.length; i++){
            if(i > 0) doc.addPage();
            await new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                    drawCarimbo(items[i]);
                    doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                    resolve();
                };
                img.src = items[i].raw;
            });
        }

        const fileName = `INSPEC_LOTE_${batchNum}_KM_${items.km}.pdf`;
        try {
            const f = await hFolder.getFileHandle(fileName, {create:true});
            const s = await f.createWritable();
            await s.write(doc.output('blob')); 
            await s.close();
            console.log("Salvo: " + fileName);
        } catch(e) { alert("Erro ao salvar lote."); }
    }

    function startCapture() {
        active = true;
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'flex';
        loop();
    }

    function stopCapture() {
        active = false;
        savePDF();
        document.getElementById('btn-start').style.display = 'flex';
        document.getElementById('btn-stop').style.display = 'none';
    }

    function loop() {
        if(!active) return;
        
        ctx.drawImage(vid, 0, 0, proc.width, proc.height);
        const bLimit = parseInt(document.getElementById('cfg-batch').value) || 50;
        
        buffer.push({
            raw: proc.toDataURL('image/jpeg', 0.5),
            km: document.getElementById('km-txt').innerText.replace("Km ", ""),
            ts: new Date().toLocaleString('pt-BR'),
            lat: gps ? gps.lat.toFixed(6) : "0",
            lon: gps ? gps.lon.toFixed(6) : "0"
        });

        totalCount++;
        document.getElementById('v-total').innerText = totalCount;
        document.getElementById('v-batch').innerText = `${buffer.length}/${bLimit}`;

        if(buffer.length >= bLimit) savePDF();
        
        setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 700);
    }
</script>
</body>
</html>
