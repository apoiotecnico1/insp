<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V24 - KM INTELLIGENT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #d00; --glass: rgba(10, 10, 10, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* SPLASH DDS */
        #splash-dds { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; transition: opacity 0.8s ease; }
        .dds-card { text-align: center; max-width: 400px; border-top: 4px solid var(--accent); padding-top: 30px; }
        .dds-icon { font-size: 50px; margin-bottom: 20px; color: var(--accent); }
        .dds-title { font-size: 12px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; }
        .dds-msg { font-size: 18px; line-height: 1.5; font-weight: 300; color: #fff; margin-bottom: 30px; }
        .btn-dds { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 15px 40px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA DE KM */
        #km-hud { position: absolute; top: 25px; left: 25px; background: var(--placa-verde); padding: 8px 18px; border: 2px solid #fff; border-radius: 5px; z-index: 10; pointer-events: none; }
        #km-hud h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }

        /* INDICADOR DE CAPTURA */
        #rec-tag { position: absolute; top: 30px; right: 30px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        .dot { width: 6px; height: 6px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; transition: 0.6s; z-index: 100; }
        .ui-hidden { opacity: 0; bottom: 15px; pointer-events: none; }
        .btn-ui { border: none; border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 18px 45px; font-size: 11px; background: var(--accent); color: #000; }
        #gear-btn { width: 48px; height: 48px; border-radius: 4px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* MENU LATERAL */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 2000; padding: 60px 25px; transition: 0.5s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: #777; display: block; margin-bottom: 8px; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-dds">
    <div class="dds-card">
        <div class="dds-icon">⚠</div>
        <div class="dds-title">DDS Operacional</div>
        <p class="dds-msg">A inspeção é importante, mas a sua <b>vida</b> é essencial. Nunca manuseie o celular fora do suporte.</p>
        <button class="btn-dds" onclick="startApp()">Estou ciente e seguro</button>
    </div>
</div>

<div id="settings-panel">
    <div style="text-align:right; margin-bottom:20px; cursor:pointer;" onclick="toggleSet()">FECHAR ×</div>
    <div class="field"><label>Câmera do dispositivo</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Tempo da foto (Milissegundos)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Salvar relatório a cada X fotos</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><span>Capturando</span><div class="dot"></div></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-ui" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar Relatório</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], gps=null, rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('splash-dds').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-dds').remove();
            document.getElementById('app-shell').style.visibility = 'visible';
            document.getElementById('app-shell').style.opacity = '1';
            listCams();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            wakeUI();
        }, 800);
    } catch(e) { alert("A seleção da pasta é obrigatória."); }
}

function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = "";
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = `Lente ${i + 1}`;
        sel.appendChild(opt);
    });
    const back = videoDevices.find(d => d.label.toLowerCase().includes('back')) || videoDevices;
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function switchCam(id) { initC(id); }

async function initCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    wakeUI();
    loop();
}

function stopCapture() {
    rec = false;
    savePDF();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.45), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            ts: new Date().toLocaleString('pt-BR').toUpperCase() 
        });
        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if(buffer.length >= limit) savePDF();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    
    const items = [...buffer]; 
    buffer = [];
    
    // Captura o Km da primeira e da última foto do relatório
    const kmInicial = items.km;
    const kmFinal = items[items.length - 1].km;
    
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.16;
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, can.height-barH, can.width, barH);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText("Km " + items[i].km, 60, can.height-(barH*0.5));
                ctx.font = `${barH * 0.18}px Arial`;
                ctx.fillText(items[i].ts, 60, can.height-(barH*0.22));
                doc.addImage(can.toDataURL('image/jpeg', 0.75), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }

    // Nome conforme solicitado: Relatorio_Km_[INICIAL]_Km_[FINAL]
    const nomeArquivo = `Relatorio_Km_${kmInicial}_Km_${kmFinal}_${Date.now()}.pdf`;
    
    try {
        const f = await hDir.getFileHandle(nomeArquivo, {create:true});
        const s = await f.createWritable();
        await s.write(doc.output('blob')); 
        await s.close();
    } catch(e) { console.error("Erro ao salvar arquivo:", e); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initG() { 
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
    }, null, {enableHighAccuracy:true});
}

window.onload = () => { loadCSV(); initG(); };
</script>
</body>
</html>
