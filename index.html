<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5 - MODO ENGENHARIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 65vw !important; height: 100vh !important; }
            #controls { width: 35vw; height: 100vh; overflow-y: auto; background: #050a16; }
        }

        #viewport { position: relative; width: 100vw; height: 42vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 10px;
            font-size: 2.8rem; font-weight: 900; border: 4px solid #fff;
            margin: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        #settings-trigger {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.5); border-radius: 50%; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%;
            background: rgba(10, 15, 28, 0.98); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; padding: 15px; border-left: 3px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #1a2235; border: none; color: #888; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .setting-group { display: none; }
        .setting-group.active { display: block; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; padding: 5px 0; }
        
        select, input { background: #050a16; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; }

        .status-bar { display: flex; justify-content: space-around; padding: 8px; background: var(--panel-bg); font-size: 0.7rem; }
        .st { padding: 2px 8px; border-radius: 10px; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px; }
        .card { background: #111; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.action { padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #dirSelector { background: var(--gold); color: #000; grid-column: span 2; }
        #dirSelector.ready { background: #00ff66; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h3 style="color:var(--accent)">WORKSTATION SETUP</h3>
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tabCam')">CÂMERA</button>
        <button class="tab-btn" onclick="openTab(event, 'tabAuto')">AUTOMAÇÃO</button>
        <button class="tab-btn" onclick="openTab(event, 'tabGps')">GPS</button>
    </div>

    <div id="tabCam" class="setting-group active">
        <div class="setting-item">Lente: <select id="cfgCam" onchange="initCamera()"><option value="environment">Traseira</option><option value="user">Frontal</option></select></div>
        <div class="setting-item">Brilho: <input type="range" id="cfgBright" min="50" max="150" value="100"></div>
        <div class="setting-item">Contraste: <input type="range" id="cfgContrast" min="50" max="150" value="100"></div>
    </div>

    <div id="tabAuto" class="setting-group">
        <div class="setting-item">Captura (ms): <input type="number" id="cfgDelay" value="500" style="width:60px"></div>
        <div class="setting-item">Fotos por Lote: <input type="number" id="cfgBatch" value="100" style="width:60px"></div>
        <div class="setting-item">Qualidade JPG: <input type="range" id="cfgQuality" min="10" max="100" value="75"></div>
    </div>

    <div id="tabGps" class="setting-group">
        <div class="setting-item">Exibir Info: <input type="checkbox" id="cfgShowGps" checked></div>
    </div>
    
    <button onclick="toggleSettings()" style="width:100%; margin-top:20px; padding:10px; background:red; color:white; border:none; border-radius:5px">FECHAR</button>
</div>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: ...</div>
            <div id="stGps" class="st">GPS: ...</div>
        </div>

        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/100</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer">FORÇAR PDF<span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="dirSelector" class="action">1. DEFINIR PASTA DE DESTINO</button>
            <button id="btnStart" class="action" disabled>2. INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

/* ======= MOTOR DE ESTAMPA TÉCNICO ======= */
function drawStamp(data) {
    const w = can.width, h = can.height;
    const base = h / 720; // Escala base
    
    ctx.save();
    
    // Configurações da Placa
    const margin = 20 * base;
    const pW = 340 * base;
    const pH = 100 * base;
    const pX = margin;
    const pY = h - pH - margin;

    // 1. Fundo da placa (Verde Rodoviário Semi-transparente)
    ctx.fillStyle = "rgba(5, 107, 60, 0.85)";
    ctx.fillRect(pX, pY, pW, pH);

    // 2. Moldura Fina Branca
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2 * base;
    ctx.strokeRect(pX + (5 * base), pY + (5 * base), pW - (10 * base), pH - (10 * base));

    // 3. Texto do KM
    ctx.fillStyle = "white";
    ctx.font = `bold ${42 * base}px Arial`;
    ctx.fillText("KM " + data.km, pX + 20 * base, pY + 50 * base);

    // 4. Legenda GPS e Data (Discreta)
    if(document.getElementById('cfgShowGps').checked) {
        ctx.font = `${14 * base}px 'Courier New', monospace`;
        ctx.fillStyle = "#ffffff";
        const info1 = `LAT: ${data.lat} | LON: ${data.lon}`;
        const info2 = `${data.ts}`;
        ctx.fillText(info1, pX + 20 * base, pY + 72 * base);
        ctx.fillText(info2, pX + 20 * base, pY + 88 * base);
    }

    ctx.restore();
}

/* ======= LÓGICA DE CAPTURA E PDF ======= */
async function captureLoop() {
    if(!isRecording) return;

    can.width = vid.videoWidth;
    can.height = vid.videoHeight;

    // Aplica Brilho/Contraste
    ctx.filter = `brightness(${document.getElementById('cfgBright').value}%) contrast(${document.getElementById('cfgContrast').value}%)`;
    ctx.drawImage(vid, 0, 0);
    ctx.filter = 'none';

    const currentData = {
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        ts: new Date().toLocaleString('pt-BR')
    };

    drawStamp(currentData);

    const quality = parseInt(document.getElementById('cfgQuality').value) / 100;
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', quality),
        ...currentData
    });

    photoCount++;
    const limit = parseInt(document.getElementById('cfgBatch').value);
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${limit}`;

    if(activeBuffer.length >= limit) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

async function savePDF() {
    if(!activeBuffer.length || !directoryHandle) return;
    
    const batch = [...activeBuffer];
    activeBuffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });

    for(let i=0; i < batch.length; i++) {
        if(i > 0) doc.addPage();
        doc.addImage(batch[i].img, 'JPEG', 0, 0, 297, 210);
    }

    try {
        const fileName = `INSPECAO_LOTE_${pdfCount}.pdf`;
        const fileHandle = await directoryHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (e) { doc.save(`LOTE_${pdfCount}.pdf`); }
}

/* ======= INICIALIZAÇÃO E GPS ======= */
async function initCamera() {
    const mode = document.getElementById('cfgCam').value;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: mode, width: {ideal: 1280}, height: {ideal: 720} }
        });
        vid.srcObject = stream;
    } catch(e) { alert("Câmera indisponível."); }
}

document.getElementById('dirSelector').onclick = async () => {
    directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('dirSelector').textContent = "PASTA OK ✓";
    document.getElementById('dirSelector').classList.add('ready');
    document.getElementById('btnStart').disabled = false;
};

document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
document.getElementById('btnSaveManual').onclick = savePDF;

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
function openTab(e, name) {
    document.querySelectorAll('.setting-group').forEach(g => g.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    e.target.classList.add('active');
}

// GPS e CSV (Lógica mantida do seu original)
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const lines = t.split('\n').slice(1);
        kmDataset = lines.map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(d => !isNaN(d.lat));
        document.getElementById('stCsv').className = 'st ok';
        document.getElementById('stCsv').textContent = 'CSV: OK';
    } catch(e) {}
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').className = 'st ok';
    document.getElementById('stGps').textContent = 'GPS: OK';
    if(kmDataset.length) {
        let best = null, minDist = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < minDist) { minDist = d; best = pt; }
        });
        if(best) document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

loadCSV(); initCamera();
</script>
</body>
</html>
