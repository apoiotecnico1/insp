<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V22 - PURE HIGHWAY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --danger: #ff003c; 
            --placa-verde: #0a8a4d;
            --panel: rgba(10, 15, 20, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- SPLASH VORTEX --- */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .vortex { width: 80px; height: 80px; border: 4px solid var(--accent); border-radius: 40%; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- VIEWPORT --- */
        #app-shell { height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        /* --- PLACA DE KM (ESTILO ENGENHARIA RODOVIÁRIA) --- */
        #km-container { 
            position: absolute; 
            top: 40px; 
            left: 30px; 
            z-index: 100; 
            pointer-events: none;
        }

        #km-plate { 
            background: linear-gradient(180deg, #0d9655 0%, #066b3c 100%); 
            padding: 15px 35px; 
            border: 6px solid #ffffff; /* Borda grossa de placa */
            border-radius: 14px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.9);
            display: inline-block;
        }

        #km-txt { 
            font-size: 3.5rem; /* Letra extra grande */
            font-weight: 900; 
            color: #ffffff;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.4); 
            letter-spacing: -2px;
            line-height: 1;
        }

        /* --- STATUS DE GRAVAÇÃO --- */
        #rec-tag { 
            position: absolute; top: 45px; right: 30px; z-index: 100;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px;
            color: #ff4444; font-weight: 900; font-size: 14px;
            display: none; align-items: center; gap: 10px; border: 1px solid rgba(255,0,0,0.4);
        }
        .dot { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* --- CONTROLES --- */
        #ui-controls { 
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); 
            z-index: 500; display: flex; gap: 25px; transition: 0.5s;
        }
        .ui-hidden { opacity: 0; transform: translate(-50%, 60px); pointer-events: none; }

        .btn-main { 
            border: none; border-radius: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            padding: 22px 55px; font-size: 15px; box-shadow: 0 15px 45px rgba(0,0,0,0.8);
        }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: var(--panel); color: #fff; padding: 22px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }

        /* --- PAINEL LATERAL --- */
        #settings { 
            position: fixed; right: -360px; top: 0; width: 340px; height: 100%; 
            background: var(--panel); backdrop-filter: blur(40px); z-index: 2000; 
            padding: 45px 30px; transition: 0.4s; border-left: 3px solid var(--accent);
        }
        #settings.open { right: 0; }
        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 8px; font-weight: 900; }
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 14px; border-radius: 10px; font-weight: bold; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash"><div class="vortex"></div></div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-container">
        <div id="km-plate">
            <h1 id="km-txt">KM ---+---</h1>
        </div>
    </div>

    <div id="rec-tag"><div class="dot"></div> FOTOS: <span id="batch-count">0</span></div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-main" onclick="toggleSet(); event.stopPropagation();">⚙</button>
        <button id="btn-start" class="btn-main" onclick="startApp(); event.stopPropagation();">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-main" onclick="stopApp(); event.stopPropagation();">Finalizar PDF</button>
    </div>
</div>

<div id="settings">
    <h2 style="color:var(--accent); margin-bottom:35px; letter-spacing: 2px;">ENGENHARIA</h2>
    <div class="field"><label>Lente</label><select id="cam-sel" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Frequência (ms)</label><input type="number" id="cfg-int" value="500"></div>
    <div class="field"><label>Limite Lote</label><input type="number" id="cfg-lote" value="150"></div>
    <div class="field"><label>Qualidade Imagem</label><input type="number" id="cfg-qual" value="0.7" step="0.1" min="0.1" max="1.0"></div>
    <div class="field"><label>Destino</label><button onclick="pickFolder()" style="width:100%; padding:12px; background:#111; border:1px solid var(--accent); color:var(--accent); border-radius:10px; font-weight:900; cursor:pointer;">Selecionar Pasta</button></div>
    <button class="btn-main" onclick="toggleSet()" style="width:100%; background:#222; color:#fff; margin-top:30px; border: 1px solid #444;">Salvar e Sair</button>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], buffer=[], hDir=null, rec=false, uiTimer, lastPos=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => { document.getElementById('splash').style.opacity='0'; setTimeout(()=>document.getElementById('splash').remove(), 800); }, 1500);
    loadKM();
    initGPS();
    listCams();
};

async function pickFolder() {
    try { hDir = await window.showDirectoryPicker({ mode: 'readwrite' }); } catch(e) { console.warn("Pasta não selecionada."); }
}

function hav(a,b,c,d){
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

async function loadKM() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("CSV não carregado."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude };
        if(!kmDB.length) return;
        let bKM=null, dKM=Infinity;
        for(const pt of kmDB){
            const d=hav(lastPos.lt, lastPos.ln, pt.lt, pt.ln);
            if(d<dKM){ dKM=d; bKM=pt; }
        }
        if(bKM) document.getElementById('km-txt').innerText = "KM " + bKM.km;
    }, null, {enableHighAccuracy:true});
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-sel');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initC(video[video.length-1].deviceId);
}

async function initC(id) {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startApp() {
    if(!hDir) { alert("Por favor, selecione a pasta de destino primeiro!"); toggleSet(); return; }
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.display = 'flex';
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    loop();
}

function stopApp() {
    rec = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
    savePDF();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', parseFloat(document.getElementById('cfg-qual').value)),
        km: document.getElementById('km-txt').innerText,
        lat: lastPos?.lt.toFixed(6), lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleString('pt-BR')
    });
    document.getElementById('batch-count').innerText = buffer.length;
    if(buffer.length >= parseInt(document.getElementById('cfg-lote').value)) savePDF();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF() {
    if(!buffer.length) return;
    const batch = [...buffer]; buffer = [];
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const kmStart = batch.km.replace('+', '_');
    const kmEnd = batch[batch.length-1].km.replace('+', '_');

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.16;
                // Tarja técnica
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, can.height - bh, can.width, bh);
                
                // Texto de Engenharia
                ctx.fillStyle = "#ffffff";
                ctx.font = `900 ${bh * 0.45}px Arial`;
                ctx.fillText(batch[i].km, 60, can.height - (bh * 0.4));
                
                ctx.fillStyle = "#00f2ff";
                ctx.font = `700 ${bh * 0.15}px Arial`;
                ctx.fillText(`${batch[i].ts} | LAT: ${batch[i].lat} LON: ${batch[i].lon}`, 60, can.height - (bh * 0.15));
                
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                r();
            };
            img.src = batch[i].img;
        });
    }

    const d = new Date();
    const nome = `INSP_KM_${kmStart}_AO_${kmEnd}.pdf`;
    try {
        const fh = await hDir.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch(e) { doc.save(nome); }
}

function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}
</script>
</body>
</html>
