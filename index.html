<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INSPEÇÃO PRO – KM GPS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Segoe UI,sans-serif;overflow:hidden}
#viewport{width:100vw;height:40vh}
video{width:100%;height:100%;object-fit:cover}

#kmPlaque{
background:linear-gradient(#0a8a4d,#056b3c);
color:#fff;
padding:12px;
font-size:3.2rem;
font-weight:900;
border:5px solid #fff;
margin:10px;
border-radius:15px;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
padding:10px
}
.card{
background:#111;
padding:12px;
border-radius:10px;
text-align:center;
border:1px solid #222
}
.val{
display:block;
font-size:1.4rem;
font-weight:bold;
color:#00d9ff
}
.btn-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px
}
button{
padding:18px;
font-size:1.1rem;
font-weight:900;
border:none;
border-radius:12px
}
#btnStart{background:#00ff66;color:#000}
#btnStop{background:#ff3333;color:#fff}

canvas{display:none}
</style>
</head>

<body>

<div id="viewport">
<video id="vid" autoplay playsinline muted></video>
</div>

<div id="kmPlaque">KM --+---</div>

<div class="dashboard">
<div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
<div class="card">LOTE<span id="txtBuffer" class="val">0/200</span></div>
<div class="card" id="btnSaveManual" style="background:#1e3a8a;cursor:pointer">
PDF<span id="txtPdfs" class="val">0</span>
</div>
</div>

<div class="btn-row">
<button id="btnStart">INICIAR</button>
<button id="btnStop" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
/* ===== VARIÁVEIS ===== */
let kmDataset=[], lastPos=null;
let isRecording=false, photoCount=0, pdfCount=0;
let activeBuffer=[];

const vid=document.getElementById("vid");
const can=document.getElementById("can");
const ctx=can.getContext("2d");

/* ===== FUNÇÕES CSV / KM ===== */
function normalizeStr(s){
return String(s||'').trim().toLowerCase()
.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
.replace(/[^a-z0-9 ]+/g,' ');
}
function findColumnIndex(h,c){
const m=h.map(x=>normalizeStr(x));
for(const k of c){const i=m.indexOf(k);if(i>=0)return i;}
return-1;
}
function parsePt(v){
const s=String(v||'').trim();
return /,\d+$/.test(s)?Number(s.replace(/\./g,'').replace(',','.')):Number(s);
}
function hav(a,b,c,d){
const R=6371000;
const x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;
const u=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

/* ===== CSV ===== */
async function loadKMCSV(){
const r=await fetch("SNVBR116SPRJ.csv?v="+Date.now(),{cache:"no-store"});
let t=await r.text(); if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);
const L=t.split(/\r?\n/).filter(l=>l.trim());
const h=L.shift().split(";");
const iKm=findColumnIndex(h,["km"]);
const iLat=findColumnIndex(h,["lat","latitude"]);
const iLon=findColumnIndex(h,["lon","longitude"]);
kmDataset=L.map(l=>{
const r=l.split(";");
let lat=parsePt(r[iLat]), lon=parsePt(r[iLon]);
if(Math.abs(lat)>90&&Math.abs(lon)<=90){const tmp=lat;lat=lon;lon=tmp;}
return{km:r[iKm],lat,lon};
}).filter(p=>p.km&&Number.isFinite(p.lat)&&Number.isFinite(p.lon));
}

/* ===== KM ===== */
function updateKM(){
if(!lastPos||!kmDataset.length)return;
let best=null,d0=Infinity;
for(const p of kmDataset){
const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
if(d<d0){d0=d;best=p;}
}
if(best) kmPlaque.textContent="KM "+best.km;
}

/* ===== OVERLAY ARTÍSTICO (KM + DATA + GPS) ===== */
function drawOverlay(km,ts,lat,lon){
const x=20,y=can.height-150,w=460,h=120;

// GRADIENTE
const g=ctx.createLinearGradient(x,y,x+w,y+h);
g.addColorStop(0,"#0b0b0b");
g.addColorStop(1,"#056b3c");

ctx.fillStyle=g;
ctx.fillRect(x,y,w,h);

// CONTORNO
ctx.strokeStyle="#ffffff";
ctx.lineWidth=5;
ctx.strokeRect(x,y,w,h);

ctx.fillStyle="#fff";
ctx.font="bold 44px Segoe UI";
ctx.fillText("KM "+km,x+20,y+55);

ctx.font="22px Segoe UI";
ctx.fillText(ts,x+20,y+85);

ctx.font="18px Segoe UI";
ctx.fillText("GPS: "+lat+", "+lon,x+20,y+110);
}

/* ===== CAPTURA ===== */
function captureLoop(){
if(!isRecording)return;

ctx.drawImage(vid,0,0,can.width,can.height);

const kmAtual=kmPlaque.textContent.replace("KM","").trim();
const ts=new Date().toLocaleString("pt-BR");
const lat= lastPos ? lastPos.lat.toFixed(6) : "0";
const lon= lastPos ? lastPos.lon.toFixed(6) : "0";

drawOverlay(kmAtual,ts,lat,lon);

activeBuffer.push({img:can.toDataURL("image/jpeg",0.7)});

photoCount++; txtTotal.textContent=photoCount;
txtBuffer.textContent=activeBuffer.length+"/200";

if(activeBuffer.length>=200) savePDF();
setTimeout(captureLoop,200);
}

/* ===== PDF (SOMENTE FOTO) ===== */
function savePDF(){
if(!activeBuffer.length)return;
const {jsPDF}=window.jspdf;
const doc=new jsPDF("l","mm","a4");
pdfCount++; txtPdfs.textContent=pdfCount;

activeBuffer.forEach((p,i)=>{
if(i)doc.addPage();
doc.addImage(p.img,"JPEG",10,10,277,190);
});

activeBuffer=[];
doc.save("INSPECAO_"+pdfCount+".pdf");
}

/* ===== CONTROLES ===== */
btnStart.onclick=()=>{isRecording=true;btnStart.disabled=true;btnStop.disabled=false;captureLoop();}
btnStop.onclick=()=>{isRecording=false;btnStart.disabled=false;btnStop.disabled=true;savePDF();}
btnSaveManual.onclick=savePDF;

/* ===== INIT ===== */
(async()=>{
await loadKMCSV();
const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
vid.srcObject=s;
vid.onloadedmetadata=()=>{can.width=vid.videoWidth;can.height=vid.videoHeight;}
navigator.geolocation.watchPosition(p=>{
lastPos={lat:p.coords.latitude,lon:p.coords.longitude};
updateKM();
},{},{enableHighAccuracy:true});
})();
</script>

</body>
</html>
