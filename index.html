<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>Relatório Fotográfico – Iluminação (Ultra‑Leve • Fix Cam)</title>
<style>
  :root{
    --bg:#203e92; --surface:#0f1731cc; --fg:#e8eeff; --muted:#a9b7df; --border:#1e284d;
    --ok:#22c55e; --warn:#eab308; --danger:#ef4444;
    --radius: 14px; --camH: 42vh;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; color:var(--fg); background: radial-gradient(1200px 600px at 10% -10%, #16306a33, transparent 70%), #203e92; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif; padding:12px; line-height:1.35; overflow-x:hidden}
  h1{margin:0 0 10px;text-align:center;font-size:1.28rem}
  .card{background:linear-gradient(180deg, var(--surface), rgba(15,23,49,.7)); backdrop-filter:saturate(140%) blur(6px); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin:0 auto 12px; max-width:980px}
  #statusBar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;max-width:980px;margin:0 auto 10px}
  .st{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.28));border:1px solid rgba(255,255,255,.14);padding:6px 10px;border-radius:999px;font-size:.82rem;font-weight:800;color:#dfe7ff}
  .ok{ color:#b1ffd1 } .warn{ color:#ffdfa8 } .bad{ color:#ffc1c1 }
  #camCard{position: fixed; left: 50%; top: 0; transform: translateX(-50%); width: calc(100vw - 24px); max-width:980px; height: var(--camH); z-index: 100; padding: 0; margin: 12px auto; border-radius: var(--radius); background: linear-gradient(180deg, #0b1230, #07102a); border:1px solid #213066}
  #wrap{ position: relative; height: 100%; border-radius: var(--radius); overflow: hidden }
  #vid{ width: 100%; height: 100%; display: block; background:#000; object-fit: contain; object-position: center; touch-action: none; transform-origin: 50% 50%; border-radius: var(--radius) }
  #can{display:none}
  #camSpacer{ height: calc(var(--camH) + 24px); max-width:980px; margin: 0 auto 8px }
  .row{display:flex;gap:8px;flex-wrap:wrap}
  button{flex:1 1 180px; padding:12px 14px; font-size:.98rem; border:0; border-radius:12px; cursor:pointer; background: linear-gradient(180deg, #0d1430, #0a0f26); color:#e7edff; font-weight:900; border:1px solid #20305e}
  button:disabled{opacity:.5;cursor:not-allowed}
  #btnAutoCapture{ background: linear-gradient(180deg, #ff7b45, #e5612e); color:#1b0b02 }
  #btnFinalizePdf{ background: linear-gradient(180deg, #857b5d, #eab308); color:#231c00 }

  /* Diagnóstico */
  #diag{ max-width:980px; margin:0 auto 12px; padding:10px 12px; border-radius:12px; border:1px dashed #eab308; background:#201b03; color:#ffe9a6; font-size:.9rem; display:none }
  #diag.bad{ border-color:#ef4444; background:#2a0e0e; color:#ffd3d3 }
  #diag.ok{ border-color:#22c55e; background:#0e2217; color:#b7ffd1 }
  #diag pre{ white-space:pre-wrap; word-break:break-word; margin:6px 0 0; color:#cfe7ff }

  /* Splash simples */
  #splash{ position:fixed; inset:0; background:#060a12cc; display:flex; align-items:center; justify-content:center; z-index:2000 }
  .splash-inner{ text-align:center; color:#cfe7ff }
  .splash-inner h2{ margin:0 0 6px }
  .splash-inner p{ margin:4px 0 12px; opacity:.9 }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-inner">
    <h2>RELATÓRIO FOTOGRÁFICO</h2>
    <p>Para começar, clique no botão abaixo e autorize o uso da <b>câmera</b> e de <b>arquivos</b>.</p>
    <div class="row" style="justify-content:center">
      <button id="btnStart">✅ Começar (autorizar câmera)</button>
    </div>
    <p id="splashNote" style="font-size:.9rem;opacity:.8;margin-top:10px"></p>
  </div>
</div>

<h1>📸 Relatório Fotográfico (Ultra‑Leve)</h1>
<div id="statusBar" aria-live="polite">
  <span id="stCsv" class="st">CSV: —</span>
  <span id="stCam" class="st">Câmera: —</span>
  <span id="stGps" class="st">GPS: —</span>
  <span id="stFotos" class="st">Fotos: 0</span>
  <span id="stFolder" class="st">Pasta: —</span>
  <span id="stPdf" class="st">PDF: —</span>
</div>

<div id="diag"></div>

<div id="camSpacer"></div>
<div class="card" id="camCard">
  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can" width="1280" height="720"></canvas>
  </div>
</div>

<div class="card">
  <div class="row">
    <button id="btnSelectFolder">📁 Selecionar pasta</button>
    <button id="btnTestCam">🎥 Testar/Reiniciar câmera</button>
    <button id="btnAutoCapture" disabled>🎬 Captura Auto</button>
    <button id="btnFinalizePdf" disabled>📄 Finalizar PDF</button>
  </div>
</div>

<div class="card">
  <h2 style="margin:0 0 6px;font-size:1rem">Prévia (última foto)</h2>
  <img id="foto" alt="Prévia da foto capturada">
</div>

<script>
// ========== Diagnóstico UI ==========
const diagEl = document.getElementById('diag');
function diag(msg, level='warn'){ diagEl.style.display='block'; diagEl.className=''; if(level==='bad') diagEl.classList.add('bad'); else if(level==='ok') diagEl.classList.add('ok'); else diagEl.classList.add('warn'); diagEl.innerHTML = msg; }
function diagAppend(text){ if(!diagEl.innerHTML) diagEl.innerHTML = ''; diagEl.style.display='block'; const pre = document.createElement('pre'); pre.textContent = String(text||''); diagEl.appendChild(pre); }

// ========== Estado mínimo p/ câmera ==========
let currentStream=null, currentTrack=null; let camReady=false; let deviceList=[]; let deviceIndex=0; const vid=document.getElementById('vid'); const stCam=document.getElementById('stCam'); const stFolder=document.getElementById('stFolder'); const stCsv=document.getElementById('stCsv'); const stPdf=document.getElementById('stPdf'); const stGps=document.getElementById('stGps'); const stFotos=document.getElementById('stFotos'); const btnAuto=document.getElementById('btnAutoCapture'); const btnTest=document.getElementById('btnTestCam'); const btnSelect=document.getElementById('btnSelectFolder'); const can=document.getElementById('can'); const ctx=can.getContext('2d',{alpha:false}); const foto=document.getElementById('foto');

function statusChip(el, text, cls){ el.textContent = text; el.className = 'st ' + (cls||''); }
function updateStatus(){ statusChip(stCam, 'Câmera: ' + (camReady?'OK':'Aguardando…'), camReady?'ok':'warn'); }
function isSecure(){ return window.isSecureContext || location.hostname==='localhost'; }

// ========== Permissões / Teste ==========
async function ensureCameraPermission(){
  if(!navigator.mediaDevices?.getUserMedia){ diag('<b>Seu navegador não oferece acesso à câmera.</b><br>Use <b>Chrome</b> ou <b>Edge</b>.', 'bad'); return false; }
  try{
    const test = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
    test.getTracks().forEach(t=>t.stop());
    return true;
  }catch(e){
    diag('<b>Permissão de câmera negada ou indisponível.</b><br>Conceda acesso à câmera nas permissões do navegador e toque em <b>Testar/Reiniciar câmera</b>.', 'bad');
    diagAppend(e.message||e);
    return false;
  }
}

async function enumerateCameras(){
  try{ await navigator.mediaDevices.getUserMedia({video:true, audio:false}).then(s=>s.getTracks().forEach(t=>t.stop())); }catch{}
  const devs = await navigator.mediaDevices.enumerateDevices();
  deviceList = devs.filter(d=>d.kind==='videoinput');
  if(!deviceList.length){ diag('<b>Nenhuma câmera encontrada.</b><br>Verifique se este dispositivo possui câmera e se a permissão foi concedida ao navegador.', 'bad'); }
}

async function startCamera(idx=0){
  try{
    if(!isSecure()){
      diag('<b>Contexto não seguro.</b><br>A câmera pode não funcionar ao abrir o arquivo diretamente. Use <b>https://</b> ou <b>http://localhost</b>.', 'warn');
    }
    if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
    currentStream=null; currentTrack=null; camReady=false; updateStatus();

    const dev = deviceList[idx];
    const constraints = dev? { video:{ deviceId:{ exact:dev.deviceId } }, audio:false } : { video:{ facingMode:{ ideal:'environment' } }, audio:false };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    currentStream=stream; vid.srcObject=stream;
    await vid.play().catch(()=>{});

    await new Promise(res=>{ if(vid.readyState>=2 && vid.videoWidth) return res(); vid.onloadedmetadata=()=>res(); setTimeout(res,1000); });

    currentTrack = stream.getVideoTracks()[0];
    camReady = !!(vid.videoWidth);
    updateStatus();
    btnAuto.disabled = !camReady;

    if(!camReady){ diag('Câmera iniciada mas sem vídeo. Tente alternar permissões, fechar outros apps que usam a câmera ou reiniciar o navegador.', 'warn'); }
  }catch(e){
    camReady=false; updateStatus();
    diag('<b>Falha ao iniciar a câmera.</b> Verifique permissões e tente novamente com o botão <b>Testar/Reiniciar câmera</b>.', 'bad');
    diagAppend(e && (e.name+': '+e.message));
  }
}

async function testCameraFlow(){
  const ok = await ensureCameraPermission();
  if(!ok) return;
  await enumerateCameras();
  await startCamera(0);
}

// ========== Splash / Boot ==========
const btnStart=document.getElementById('btnStart');
const splash=document.getElementById('splash');
const splashNote=document.getElementById('splashNote');

splashNote.textContent = isSecure()? 'Dica: se a câmera não abrir, confira as permissões do navegador.' : 'Atenção: abra este arquivo via https:// ou localhost. Acesso à câmera/arquivos pode falhar sem contexto seguro.';

btnStart.addEventListener('click', async ()=>{
  await testCameraFlow();
  splash.remove();
});

btnTest.addEventListener('click', async ()=>{ await testCameraFlow(); });

btnSelect.addEventListener('click', async ()=>{
  if(!('showDirectoryPicker' in window)){
    diag('Seu navegador não suporta seleção de pasta (File System Access API). Use Chrome/Edge no Android ou Desktop.', 'bad');
    return;
  }
  try{ const dir = await window.showDirectoryPicker({mode:'readwrite'}); stFolder.textContent = 'Pasta: OK'; stFolder.className='st ok'; }
  catch(e){ diag('Seleção de pasta cancelada/negada.', 'warn'); }
});

// ========== Captura simples (apenas para validar câmera) ==========
async function quickShot(){ if(!camReady) return; const vw=vid.videoWidth||1280, vh=vid.videoHeight||720; const scale=(Math.max(vw,vh)>1280)? 1280/Math.max(vw,vh):1; const w=Math.round(vw*scale), h=Math.round(vh*scale); can.width=w; can.height=h; ctx.drawImage(vid,0,0,w,h); const blob = await new Promise(r=>can.toBlob(r,'image/jpeg',0.82)); if(blob&&blob.size){ const url=URL.createObjectURL(blob); foto.src=url; } }

// Toca na tela do vídeo para tirar uma foto de teste
wrap.addEventListener('click', ()=>{ quickShot(); });

// Atualiza status inicial
updateStatus(); stCsv.textContent='CSV: (opcional)'; stPdf.textContent='PDF: —'; stGps.textContent='GPS: —'; stFotos.textContent='Fotos: 0';
</script>
</body>
</html>
