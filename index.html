<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Anotações de Manutenção</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --p: #0a192f; --s: #172a45; --a: #64ffda; --text: #ccd6f6; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--p); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 50px 20px 20px; background: var(--s); text-align: center; border-bottom: 2px solid var(--a); }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 3px; color: var(--a); text-transform: uppercase; }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--s); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7); }
        
        label { display: block; margin: 10px 0 5px; font-size: 0.8rem; color: var(--a); font-weight: bold; }
        input, select, textarea { 
            width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #233554;
            background: #112240; color: white; font-size: 16px; margin-bottom: 10px;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { 
            border: none; border-radius: 8px; padding: 15px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem;
        }
        .btn-record { background: #f44336; color: white; }
        .btn-photo { background: #2196F3; color: white; }
        .btn-save { background: var(--a); color: var(--p); width: 100%; margin-top: 15px; font-size: 1rem; }
        
        .recording-active { animation: pulse 1.5s infinite; background: #b71c1c !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .log-entry { border-left: 3px solid var(--a); padding: 15px; background: #112240; border-radius: 8px; margin-bottom: 15px; }
        .log-time { font-size: 0.7rem; color: var(--a); margin-bottom: 5px; }
        .log-title { font-weight: bold; color: var(--white); margin-bottom: 5px; }
        audio { width: 100%; height: 35px; margin-top: 10px; border-radius: 5px; }
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--a); }

        #quick-note { border: 1px dashed var(--a); min-height: 80px; }
    </style>
</head>
<body>

<header>
    <h1>ANOTAÇÕES</h1>
    <div id="clock" style="font-size: 0.9rem; margin-top: 5px;"></div>
</header>

<div class="content">
    <div class="card">
        <label>SETOR / INTERLOCUTOR</label>
        <div style="display:flex; gap:5px;">
            <select id="setor" style="flex:1">
                <option>Iluminação</option>
                <option>Climatização</option>
                <option>Fibra Ótica</option>
                <option>ADM</option>
            </select>
            <input type="text" id="pessoa" placeholder="Quem ligou?" style="flex:1">
        </div>

        <label>RELATO DO EVENTO</label>
        <textarea id="relato" rows="3" placeholder="O que aconteceu agora?"></textarea>

        <div class="btn-row">
            <button class="btn btn-record" id="btnMic" onclick="toggleMic()">
                <i class="fas fa-microphone"></i> <span id="micText">Gravar Voz</span>
            </button>
            <button class="btn btn-photo" onclick="document.getElementById('fileIn').click()">
                <i class="fas fa-camera"></i> Foto/Doc
            </button>
        </div>
        <input type="file" id="fileIn" hidden accept="image/*" onchange="previewImg()">
        <div id="imgPreview"></div>

        <button class="btn btn-save" onclick="saveEntry()">
            <i class="fas fa-check-circle"></i> SALVAR NO DIÁRIO
        </button>
    </div>

    <div class="card" style="background: #112240;">
        <label>LEMBRETES / RASCUNHO</label>
        <textarea id="quick-note" oninput="saveDraft()" placeholder="Anote algo rápido aqui..."></textarea>
    </div>

    <h3 style="color: var(--a); margin-left: 10px;">HOJE</h3>
    <div id="logContainer"></div>
    
    <button class="btn btn-photo" style="width:100%; background:#455a64" onclick="exportPDF()">
        <i class="fas fa-file-pdf"></i> GERAR RELATÓRIO FINAL
    </button>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let currentAudioBase64 = null;
    let currentImgBase64 = null;
    let logs = JSON.parse(localStorage.getItem('logs_manutencao')) || [];

    // Relógio
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString('pt-br');
    }, 1000);

    // Gravação de Voz Real
    async function toggleMic() {
        const btn = document.getElementById('btnMic');
        const text = document.getElementById('micText');

        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => { currentAudioBase64 = reader.result; };
                alert("Áudio processado com sucesso!");
            };

            mediaRecorder.start();
            btn.classList.add('recording-active');
            text.innerText = "Parar Gravação";
        } else {
            mediaRecorder.stop();
            btn.classList.remove('recording-active');
            text.innerText = "Gravar Voz";
        }
    }

    // Foto Preview
    function previewImg() {
        const file = document.getElementById('fileIn').files;
        const reader = new FileReader();
        reader.onloadend = () => {
            currentImgBase64 = reader.result;
            document.getElementById('imgPreview').innerHTML = `<img src="${currentImgBase64}">`;
        };
        reader.readAsDataURL(file);
    }

    // Salvar Log
    function saveEntry() {
        const entry = {
            id: Date.now(),
            time: new Date().toLocaleTimeString('pt-br'),
            setor: document.getElementById('setor').value,
            pessoa: document.getElementById('pessoa').value,
            relato: document.getElementById('relato').value,
            audio: currentAudioBase64,
            img: currentImgBase64
        };

        if(!entry.relato && !entry.audio) return alert("Adicione um relato ou áudio!");

        logs.unshift(entry);
        localStorage.setItem('logs_manutencao', JSON.stringify(logs));
        renderLogs();
        resetForm();
    }

    function renderLogs() {
        const container = document.getElementById('logContainer');
        container.innerHTML = logs.map(l => `
            <div class="log-entry">
                <div class="log-time">${l.time} - ${l.setor}</div>
                <div class="log-title">${l.pessoa || 'Sem identificação'}</div>
                <div>${l.relato}</div>
                ${l.audio ? `<audio controls src="${l.audio}"></audio>` : ''}
                ${l.img ? `<img src="${l.img}">` : ''}
            </div>
        `).join('');
    }

    function resetForm() {
        document.getElementById('relato').value = '';
        document.getElementById('pessoa').value = '';
        document.getElementById('imgPreview').innerHTML = '';
        currentAudioBase64 = null;
        currentImgBase64 = null;
    }

    function saveDraft() { localStorage.setItem('draft_note', document.getElementById('quick-note').value); }

    window.onload = () => {
        renderLogs();
        document.getElementById('quick-note').value = localStorage.getItem('draft_note') || '';
    };

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("RELATÓRIO DE ATIVIDADES - ABRIL", 10, 10);
        let y = 20;
        logs.forEach(l => {
            doc.setFontSize(10);
            doc.text(`${l.time} | ${l.setor} | De: ${l.pessoa}`, 10, y);
            doc.text(`Relato: ${l.relato}`, 10, y + 5);
            y += 15;
        });
        doc.save("Relatorio_Diario.pdf");
    }
</script>

</body>
</html>
