<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b7a39">
<title>Painel de KM – Modo Veicular</title>

<style>
:root{
  --green:#0b7a39;
  --green2:#064e24;
  --border:#e6f0ea;
  --text:#ffffff;
  --warn:#ffdd88;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  overflow:hidden;
}

/* Painel principal */
#panel{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Cartão estilo placa */
#card{
  width:96vw;            /* margem maior p/ não cortar */
  height:88vh;
  background:linear-gradient(180deg,var(--green),var(--green2));
  border:12px solid var(--border);
  border-radius:28px;
  box-shadow:
    0 40px 70px rgba(0,0,0,.65),
    inset 0 0 0 4px rgba(255,255,255,.55);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* KM gigante – nunca quebra */
#km{
  white-space:nowrap;
  max-width:100%;
  font-weight:1000;
  color:var(--text);
  line-height:1;
  font-size:clamp(64px, 22vw, 260px); /* reduzido p/ não cortar */
  text-shadow:
    0 4px 0 rgba(0,0,0,.45),
    0 18px 55px rgba(0,0,0,.65);
}

/* GPS pequeno abaixo */
#gps{
  margin-top:12px;
  font-size:clamp(12px, 2.8vw, 20px);
  font-weight:700;
  opacity:.9;
}

#warn{
  margin-top:6px;
  font-size:clamp(11px, 2.6vw, 18px);
  font-weight:900;
  color:var(--warn);
  display:none;
}

/* Barra inferior – sobre o verde, fundo preto */
#bottomBar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:48px;
  background:rgba(0,0,0,.85);
  color:#eaf2ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
  letter-spacing:.06em;
}
</style>
</head>

<body>

<div id="panel">
  <div id="card">
    <div id="km">KM —</div>
    <div id="gps">GPS: aguardando…</div>
    <div id="warn">Preciso baixa • KM pode variar</div>
  </div>
</div>

<div id="bottomBar">DISTÂNCIA LATERAL — m</div>

<script>
/* ================= ESTADO ================= */
let lastPos = null; // {lat,lon,acc}
let kmPoints = [];
let lastDist = null;

/* ================= FUNÇÕES ================= */
function hav(a,b,c,d){
  const R=6371000;
  const x=(c-a)*Math.PI/180;
  const y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function fmtKm(v){
  if(!Number.isFinite(v)) return 'KM —';
  let K=Math.floor(v);
  let m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K++;}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}
function parsePt(v){
  if(!v) return NaN;
  return /,\d+$/.test(v)?Number(v.replace(/\./g,'').replace(',','.')):Number(v);
}

const kmEl=document.getElementById('km');
const gpsEl=document.getElementById('gps');
const warnEl=document.getElementById('warn');
const bottomBar=document.getElementById('bottomBar');

/* ================= GPS ================= */
function startGPS(){
  if(!('geolocation' in navigator)) return;
  navigator.geolocation.watchPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
  },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
}

/* ================= KM CSV ================= */
async function loadKM(){
  try{
    const txt = await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    txt.split(/\r?\n/).forEach(l=>{
      const c=l.split(';');
      const km=parsePt(c[0]), lat=parsePt(c[1]), lon=parsePt(c[2]);
      if(Number.isFinite(km)&&Number.isFinite(lat)&&Number.isFinite(lon)){
        kmPoints.push({km,lat,lon});
      }
    });
  }catch{}
}

/* ================= ATUALIZA ================= */
function updatePanel(){
  if(lastPos && kmPoints.length){
    let best=null, bd=Infinity;
    for(const p of kmPoints){
      const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
      if(d<bd){bd=d;best=p;}
    }
    kmEl.textContent = best ? fmtKm(best.km) : 'KM —';
    lastDist = bd;
  }

  if(lastPos){
    gpsEl.textContent = `GPS ±${Math.round(lastPos.acc)} m`;
    warnEl.style.display = lastPos.acc>15?'block':'none';
  }else{
    gpsEl.textContent = 'GPS: aguardando…';
    warnEl.style.display = 'block';
  }

  if(Number.isFinite(lastDist)){
    bottomBar.textContent = `DISTÂNCIA LATERAL ATÉ O KM: ${Math.round(lastDist)} m`;
  }
}
setInterval(updatePanel,500);

/* ================= START AUTOMÁTICO ================= */
startGPS();
loadKM();
if('wakeLock' in navigator){try{navigator.wakeLock.request('screen');}catch{}}
</script>

</body>
</html>
