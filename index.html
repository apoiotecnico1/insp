<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - ULTRA FULLSCREEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --neon: #00ff88; 
            --gold: #ffcc00; 
            --danger: #ff4444; 
            --glass: rgba(0, 0, 0, 0.7);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        /* FUNDO DE VÍDEO TOTAL */
        #cam-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - PLACA DE KM ESTILO PAINEL */
        #km-hud { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: 20px; 
            background: linear-gradient(180deg, #056b3c 0%, #034426 100%); 
            padding: 10px 25px; 
            border: 2px solid #fff; 
            border-radius: 15px; 
            z-index: 100; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        #km-txt { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; color: #fff; }

        /* BOTÃO ENGRENAGEM FLUTUANTE */
        #gear-btn { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            right: 20px; 
            width: 50px; height: 50px; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(255,255,255,0.2); 
            z-index: 100; font-size: 24px;
        }

        /* PAINEL DE CONTROLE FLUTUANTE (DOCK) */
        #ui-dock {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ui-minimized { bottom: -120px !important; opacity: 0.3; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { text-align: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 15px; }
        .stat-box small { font-size: 10px; color: #aaa; text-transform: uppercase; display: block; }
        .stat-box b { font-size: 1.4rem; color: var(--gold); font-family: monospace; }

        /* BOTÕES ESTILIZADOS */
        .btn {
            border: none; border-radius: 20px; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 14px;
        }
        .btn-folder { background: #fff; color: #000; padding: 15px; }
        .btn-start { 
            background: linear-gradient(90deg, #00ff88, #00bd65); 
            color: #004422; padding: 22px; font-size: 16px;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.3);
        }
        .btn-stop { 
            background: linear-gradient(90deg, #ff4444, #cc0000); 
            color: #fff; padding: 22px; font-size: 16px;
            box-shadow: 0 10px 25px rgba(255, 68, 68, 0.3);
        }
        .btn:active { transform: scale(0.95); filter: brightness(1.2); }
        .btn:disabled { opacity: 0.2; pointer-events: none; }

        /* SETTINGS */
        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px;
            height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 1000; padding: 40px 25px; transition: 0.4s;
            border-left: 1px solid var(--gold);
        }
        #settings-panel.open { right: 0; }
        .set-item { margin-bottom: 20px; }
        .set-item label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-top: 8px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="cam-container">
    <video id="vid" autoplay playsinline muted></video>
</div>

<div id="km-hud">
    <div id="km-txt">KM ---+---</div>
</div>

<div id="gear-btn" onclick="toggleSet()">⚙️</div>

<div id="ui-dock">
    <div class="stats-row">
        <div class="stat-box"><small>NO LOTE</small><b id="v-batch">0/50</b></div>
        <div class="stat-box"><small>TOTAL PDF</small><b id="v-total">0</b></div>
    </div>

    <button id="btn-dir" class="btn btn-folder" onclick="pickFolder()">📁 SELECIONAR PASTA</button>
    <button id="btn-start" class="btn btn-start" disabled onclick="startApp()">▶ INICIAR INSPEÇÃO</button>
    <button id="btn-stop" class="btn btn-stop" style="display:none" onclick="stopApp()">■ FINALIZAR LOTE</button>
    
    <div id="status" style="font-size:10px; color:#666; text-align:center">ENGINE V10 FULLSCREEN</div>
</div>

<div id="settings-panel">
    <h2 style="margin-bottom:30px">AJUSTES</h2>
    <div class="set-item">
        <label>Fotos por Lote</label>
        <input type="number" id="cfg-batch-size" value="50">
    </div>
    <div class="set-item">
        <label>Intervalo (ms)</label>
        <input type="number" id="cfg-interval" value="800">
    </div>
    <div class="set-item">
        <label>Data no PDF</label>
        <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>
    <button class="btn btn-folder" style="width:100%; margin-top:20px" onclick="toggleSet()">FECHAR</button>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB=[], gps=null, active=false, buffer=[], total=0, batchCount=0, hFolder=null, uiTimer;
const vid=document.getElementById('vid'), proc=document.getElementById('proc'), ctx=proc.getContext('2d');

window.onload = () => { initCam(); loadCSV(); initGPS(); wakeUI(); };

async function initCam() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: 1920, height: 1080 }
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('status').innerText = "ERRO CSV"; }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        if(kmDB.length) {
            let near = null, dMin = Infinity;
            for(const pt of kmDB) {
                const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
                if(d < dMin) { dMin = d; near = pt; }
            }
            if(near) document.getElementById('km-txt').innerText = "KM " + near.km;
        }
    }, null, {enableHighAccuracy: true});
}

function wakeUI() {
    const dock = document.getElementById('ui-dock');
    dock.classList.remove('ui-minimized');
    clearTimeout(uiTimer);
    if(active) uiTimer = setTimeout(() => dock.classList.add('ui-minimized'), 4000);
}

async function pickFolder() {
    hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btn-dir').innerText = "PASTA OK ✓";
    document.getElementById('btn-start').disabled = false;
    if(navigator.vibrate) navigator.vibrate(50);
}

function startApp() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    active = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';
    loop();
}

function stopApp() {
    active = false;
    document.getElementById('btn-start').style.display = 'flex';
    document.getElementById('btn-stop').style.display = 'none';
    saveBatch();
}

function loop() {
    if(!active) return;
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    buffer.push({
        raw: proc.toDataURL('image/jpeg', 0.6),
        km: document.getElementById('km-txt').innerText.replace("KM ", ""),
        ts: new Date().toLocaleString('pt-BR').toUpperCase()
    });
    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${document.getElementById('cfg-batch-size').value}`;
    if(buffer.length >= parseInt(document.getElementById('cfg-batch-size').value)) saveBatch();
    setTimeout(loop, parseInt(document.getElementById('cfg-interval').value));
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; buffer = []; batchCount++;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = proc.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, proc.height-bh, proc.width, bh);
                ctx.fillStyle = "#ffcc00"; ctx.font = `bold ${bh*0.45}px Arial`;
                ctx.fillText("KM " + items[i].km, 60, proc.height-(bh*0.45));
                if(document.getElementById('cfg-date').value === 'S') {
                    ctx.fillStyle="#fff"; ctx.font=`${bh*0.18}px monospace`;
                    ctx.fillText(items[i].ts, 60, proc.height-(bh*0.18));
                }
                doc.addImage(proc.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const handle = await hFolder.getFileHandle(`LOTE_${batchCount}.pdf`, {create:true});
    const writable = await handle.createWritable();
    await writable.write(doc.output('blob')); await writable.close();
    if(navigator.vibrate) navigator.vibrate();
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
