<video id="vid" autoplay playsinline muted loop style="width: 100%; height: 100%; object-fit: cover;"></video>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer, wakeLock = null;

// --- FUNÇÃO REFORÇADA PARA TELA ATIVA ---
async function stayAwake() {
    // 1. Tentar Wake Lock API (Método Oficial)
    if ('wakeLock' in navigator) {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            console.log("Wake Lock Oficial Ativado.");
        } catch (err) {
            console.log("Wake Lock falhou, tentando fallback de vídeo...");
        }
    }

    // 2. Método de Segurança (Fallback): Forçar o vídeo a nunca pausar
    // Isso engana o Android/iOS fazendo-os pensar que você está assistindo um filme
    if (vid) {
        vid.play();
        // Impede que o sistema pause o vídeo para economizar energia
        vid.addEventListener('pause', () => {
            if (rec) vid.play(); 
        });
    }
}

// Liberar a tela quando parar a captura
function releaseSleep() {
    if (wakeLock !== null) {
        wakeLock.release().then(() => { wakeLock = null; });
    }
}

// Reativar se o usuário minimizar e voltar para o app
document.addEventListener('visibilitychange', async () => {
    if (rec && document.visibilityState === 'visible') {
        stayAwake();
    }
});

// --- ATUALIZAÇÃO NAS FUNÇÕES EXISTENTES ---

async function initCapture() {
    rec = true;
    
    // INVOCA O BLOQUEIO DE DESCANSO
    await stayAwake(); 
    
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    wakeUI();
    loop();
}

function stopCapture() {
    rec = false;
    
    // LIBERA A TELA
    releaseSleep(); 
    
    savePDF();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

// No acceptSafety, também chamamos o stayAwake para garantir desde o início
async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('safety-gate').remove();
            document.getElementById('app-shell').style.visibility = 'visible';
            document.getElementById('app-shell').style.opacity = '1';
            listCams();
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            stayAwake(); // Garante tela ativa ao entrar
            wakeUI();
        }, 600);
    } catch(e) { alert("Selecione uma pasta para salvar."); }
}
</script>
