<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO FOTOGRÁFICA PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; --glass: rgba(10, 10, 10, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* SPLASH - FOCO NO NOME SOLICITADO */
        #splash-hypnos { 
            position: fixed; inset: 0; background: #000; z-index: 7000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .vortex {
            width: 150px; height: 150px; border: 3px solid var(--accent); border-radius: 40% 60% 70% 30%;
            animation: rotate-vortex 4s linear infinite; box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            margin-bottom: 30px;
        }
        #splash-txt { letter-spacing: 3px; font-weight: 700; text-transform: uppercase; font-size: 1.2rem; color: #fff; }
        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }

        /* CHECKLIST & FOLDER SELECT */
        #safety-gate { 
            position: fixed; inset: 0; background: #000; z-index: 5000; 
            display: none; align-items: center; justify-content: center; padding: 20px; 
        }
        .alert-box { 
            border: 1px solid #333; padding: 30px; border-radius: 12px; 
            max-width: 500px; background: #080808;
        }
        .btn-aware { 
            background: var(--accent); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px;
        }

        /* INTERFACE */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 0.8s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { 
            position: absolute; top: env(safe-area-inset-top, 25px); left: 25px; 
            background: var(--placa-verde); padding: 8px 18px; border: 2px solid #fff; border-radius: 5px; z-index: 10;
        }

        /* STATUS HUD - QUANTIDADE E RELATÓRIOS */
        #status-hud {
            position: absolute; top: env(safe-area-inset-top, 25px); right: 25px;
            display: flex; flex-direction: column; align-items: flex-end; gap: 5px; z-index: 100;
        }
        .rec-info { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; }
        .stats-row { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: flex; gap: 10px; }
        .stats-row b { color: var(--accent); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn-ui { border: none; border-radius: 4px; font-weight: 800; cursor: pointer; padding: 18px 45px; background: var(--accent); color: #000; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 2000; padding: 60px 25px; transition: 0.5s; }
        #settings-panel.open { right: 0; }
        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-hypnos">
    <div class="vortex"></div>
    <h1 id="splash-txt">INSPEÇÃO FOTOGRÁFICA</h1>
</div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:15px; text-align:center;">CONFIGURAÇÃO INICIAL</h2>
        <p style="font-size:14px; margin-bottom:20px; color:#ccc;">Para iniciar, você deve selecionar a <b>pasta de destino</b> onde os relatórios PDF serão salvos automaticamente.</p>
        <div style="font-size:12px; color:#777; border-top:1px solid #333; pt:15px;">
            <p>• O celular deve estar no suporte.</p>
            <p>• Não manuseie o app com o veículo em movimento.</p>
        </div>
        <button class="btn-aware" onclick="requestFolder()">SELECIONAR PASTA E INICIAR</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>

    <div id="status-hud">
        <div class="rec-info" id="rec-tag" style="opacity:0;">
            <div class="dot"></div>
            <span style="font-size:11px; font-weight:bold;">GRAVANDO</span>
        </div>
        <div class="stats-row">
            <span>Lote: <b id="stat-lote">0</b></span>
            <span>Total: <b id="stat-total">0</b></span>
            <span>PDFs: <b id="stat-pdfs">0</b></span>
        </div>
    </div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:8px; cursor:pointer;">⚙️</div>
        <button id="btn-start" class="btn-ui" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar Relatório</button>
    </div>
</div>

<div id="settings-panel">
    <div style="text-align:right; margin-bottom:20px; cursor:pointer;" onclick="toggleSet()">FECHAR ×</div>
    <div style="margin-bottom:20px;">
        <label style="font-size:11px; color:#777;">Câmera</label>
        <select id="cam-select" onchange="switchCam(this.value)" style="width:100%; padding:10px; background:#222; color:#fff; border:none;"></select>
    </div>
    <div style="margin-bottom:20px;">
        <label style="font-size:11px; color:#777;">Fotos por Relatório (Lote)</label>
        <input type="number" id="cfg-lote" value="50" style="width:100%; padding:10px; background:#222; color:#fff; border:none;">
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
let countTotal = 0, countPDFs = 0;

const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash-hypnos').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-hypnos').remove();
            document.getElementById('safety-gate').style.display = 'flex';
        }, 600);
    }, 2500);
    loadCSV();
};

async function requestFolder() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        initG();
    } catch(e) {
        alert("É necessário selecionar uma pasta para salvar os arquivos.");
    }
}

function updateStats() {
    document.getElementById('stat-lote').innerText = buffer.length;
    document.getElementById('stat-total').innerText = countTotal;
    document.getElementById('stat-pdfs').innerText = countPDFs;
}

async function initCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    loop();
}

function stopCapture() {
    rec = false;
    savePDF();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.45), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            ts: new Date().toLocaleString('pt-BR').toUpperCase() 
        });
        countTotal++;
        updateStats();
        
        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if(buffer.length >= limit) savePDF();
    }
    setTimeout(loop, 200);
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; 
    buffer = [];
    updateStats();
    
    const kmI = items.km.replace(/\+/g, '_');
    const kmF = items[items.length - 1].km.replace(/\+/g, '_');
    const d = new Date();
    const dataStr = d.getDate().toString().padStart(2, '0') + '-' + (d.getMonth() + 1).toString().padStart(2, '0');
    
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-barH, can.width, barH);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText("Km " + items[i].km, 50, can.height-(barH*0.45));
                ctx.font = `${barH * 0.15}px Arial`;
                ctx.fillText(items[i].ts + " | INSPEÇÃO PRO", 50, can.height-(barH*0.2));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }

    const nome = `Relatorio_Km_${kmI}_ao_${kmF}_${dataStr}_${Date.now()}.pdf`;
    try {
        const f = await hDir.getFileHandle(nome, {create:true});
        const s = await f.createWritable();
        await s.write(doc.output('blob')); 
        await s.close();
        countPDFs++;
        updateStats();
    } catch(e) { console.error("Erro ao salvar", e); }
}

// Auxiliares de Câmera e UI
async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i + 1}`;
        sel.appendChild(opt);
    });
    initC(videoDevices[videoDevices.length-1].deviceId);
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function switchCam(id) { initC(id); }
function wakeUI() {
    document.getElementById('ui-controls').style.opacity = '1';
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { if(rec) document.getElementById('ui-controls').style.opacity = '0.2'; }, 5000);
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initG() { 
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
