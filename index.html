<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5</title>
    <style>
        :root { --p: #007934; --a: #ffcc00; --w: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; color: #fff; 
            font-family: sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* Tela de Ativação */
        #gate { 
            position: fixed; inset: 0; background: #000; 
            z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .start-btn { 
            background: var(--a); color: #000; border: none; 
            padding: 30px 60px; font-size: 2rem; font-weight: 900; 
            border-radius: 20px; cursor: pointer;
            box-shadow: 0 0 40px rgba(255,204,0,0.4);
        }

        #app { position: relative; width: 100%; height: 100%; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM GIGANTE */
        #hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--p); border: 4px solid #fff; 
            padding: 20px; border-radius: 15px; z-index: 100;
        }
        #br-tag { font-size: 1.2rem; color: #fff; font-weight: bold; }
        #km-display { font-size: 6rem; font-weight: 900; line-height: 1; display: block; }

        /* Botão WhatsApp */
        #snap-btn { 
            position: absolute; bottom: 40px; right: 30px;
            width: 130px; height: 130px; background: var(--w); 
            border-radius: 50%; border: 6px solid #fff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 500;
        }

        #debug {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 10px; font-family: monospace; color: #aaa;
        }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <button class="start-btn" onclick="boot()">INICIAR SISTEMA</button>
    <p style="margin-top:20px; color:#555;">Clique para ativar Câmera e GPS</p>
</div>

<div id="app">
    <video id="v" autoplay playsinline muted></video>
    
    <div id="hud">
        <span id="br-tag">RODOVIA</span>
        <span id="km-display">Km ---</span>
    </div>

    <div id="debug">GPS: Buscando... | Cam: OK</div>

    <div id="snap-btn" onclick="capture()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="70">
    </div>
</div>

<canvas id="c"></canvas>

<script>
    let db = [], lat = 0, lon = 0;
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');

    async function boot() {
        // Força Fullscreen
        try {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        } catch (e) {}

        // Esconde botão inicial
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        // Inicia Câmera imediatamente
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
        }).then(stream => {
            v.srcObject = stream;
            v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
        }).catch(err => alert("Erro Câmera: " + err));

        // Inicia GPS e Dados
        initGPS();
        loadCSV();
    }

    function initGPS() {
        navigator.geolocation.watchPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            document.getElementById('debug').innerText = `LAT: ${lat.toFixed(5)} | LON: ${lon.toFixed(5)} | Precisão: ${pos.coords.accuracy.toFixed(0)}m`;
            updateKM();
        }, err => console.error(err), { enableHighAccuracy: true });
    }

    async function loadCSV() {
        try {
            const r = await fetch('SNVBR116SPRJ.csv');
            const t = await r.text();
            
            // Auto-detect BR
            if(t.includes("116")) document.getElementById('br-tag').innerText = "BR-116";
            else if(t.includes("101")) document.getElementById('br-tag').innerText = "BR-101";

            const lines = t.split('\n').slice(1);
            db = lines.map(line => {
                const cols = line.split(';');
                if (cols.length < 3) return null;
                return { km: cols[0], lat: parseFloat(cols[1].replace(',','.')), lon: parseFloat(cols[2].replace(',','.')) };
            }).filter(i => i && !isNaN(i.lat));
        } catch(e) { document.getElementById('debug').innerText = "Erro ao carregar CSV"; }
    }

    function updateKM() {
        if (!db.length) return;
        let minD = Infinity, nearest = db[0];
        for (let i = 0; i < db.length; i++) {
            const d = (db[i].lat - lat)**2 + (db[i].lon - lon)**2;
            if (d < minD) { minD = d; nearest = db[i]; }
        }
        document.getElementById('km-display').innerText = "Km " + nearest.km;
    }

    function capture() {
        const km = document.getElementById('km-display').innerText;
        const time = new Date().toLocaleString();

        // Desenha na tela
        ctx.drawImage(v, 0, 0);
        
        // Carimbo preto
        const h = c.height * 0.15;
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, c.height - h, c.width, h);
        
        ctx.fillStyle = "#ffcc00";
        ctx.font = `bold ${h * 0.4}px sans-serif`;
        ctx.fillText(km, 30, c.height - (h * 0.45));
        
        ctx.fillStyle = "#fff";
        ctx.font = `${h * 0.2}px sans-serif`;
        ctx.fillText(time, 30, c.height - (h * 0.15));

        // Envia
        c.toBlob(blob => {
            const item = new ClipboardItem({ "image/png": blob });
            navigator.clipboard.write([item]).then(() => {
                window.location.href = "whatsapp://send";
            }).catch(() => {
                // Se o clipboard falhar, tenta compartilhar
                const file = new File([blob], "foto.png", {type: "image/png"});
                navigator.share({ files: [file] });
            });
        }, 'image/png');
    }
</script>
</body>
</html>
