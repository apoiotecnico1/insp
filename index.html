<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inspeção - Angstrom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; padding: 15px; }
        .tech-card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .btn-foto { background: #2c2c2c; color: #00e676; border: 2px dashed #00e676; width: 100%; padding: 15px; font-weight: bold; margin-top: 10px; }
        .btn-final { background: #00e676; color: #000; width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 10px; margin-top: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .gallery img { width: 100%; height: 70px; object-fit: cover; border-radius: 5px; border: 1px solid #444; }
        .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

<div style="max-width: 500px; margin: auto;">
    <h3 class="text-center fw-bold text-success mb-4">INSPEÇÃO TÉCNICA</h3>

    <div class="tech-card">
        <label class="small fw-bold opacity-50">DADOS DO LOCAL</label>
        <div class="row g-2 mt-1">
            <div class="col-8"><input type="text" id="km" class="form-control" placeholder="KM 142+500"></div>
            <div class="col-4">
                <select id="sentido" class="form-select form-control">
                    <option value="Norte">Norte</option>
                    <option value="Sul">Sul</option>
                </select>
            </div>
        </div>
    </div>

    <div class="tech-card">
        <span class="badge bg-primary mb-2">FIBER TECH (CCR)</span>
        <input type="text" id="tecCCR" class="form-control mb-2" placeholder="Técnico Fiber Tech">
        <label class="btn btn-foto">
            <i class="bi bi-camera"></i> ADICIONAR FOTO
            <input type="file" accept="image/*" capture="camera" hidden onchange="processPhoto(this, 'CCR')">
        </label>
        <div id="galCCR" class="gallery"></div>
    </div>

    <div class="tech-card">
        <span class="badge bg-danger mb-2">EQUIPE CLARO</span>
        <input type="text" id="tecClaro" class="form-control mb-2" placeholder="Técnico Claro">
        <label class="btn btn-foto" style="color:#ff5252; border-color:#ff5252;">
            <i class="bi bi-camera"></i> ADICIONAR FOTO
            <input type="file" accept="image/*" capture="camera" hidden onchange="processPhoto(this, 'Claro')">
        </label>
        <div id="galClaro" class="gallery"></div>
    </div>

    <button class="btn-final shadow" onclick="gerarPDF()">
        FINALIZAR E GERAR PDF
    </button>
</div>

<script>
    const fotosCCR = [];
    const fotosClaro = [];

    function processPhoto(input, tipo) {
        const file = input.files;
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result;
            if (tipo === 'CCR') fotosCCR.push(base64); else fotosClaro.push(base64);
            
            // Preview na tela
            const img = document.createElement('img');
            img.src = base64;
            document.getElementById('gal' + tipo).appendChild(img);
        };
        reader.readAsDataURL(file);
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        const km = document.getElementById('km').value || "000";
        const dataHora = new Date().toLocaleString();

        // 1. Cabeçalho
        pdf.setFontSize(18);
        pdf.text("RELATÓRIO DE INSPEÇÃO DE CAMPO", 10, 20);
        pdf.setFontSize(10);
        pdf.text(`Data/Hora: ${dataHora} | Protocolo: ${Math.floor(Date.now()/1000)}`, 10, 28);
        pdf.line(10, 32, 200, 32);

        // 2. Dados do Trecho
        pdf.setFontSize(12);
        pdf.setFont(undefined, 'bold');
        pdf.text("LOCALIZAÇÃO:", 10, 42);
        pdf.setFont(undefined, 'normal');
        pdf.text(`KM ${km} - Sentido ${document.getElementById('sentido').value}`, 45, 42);

        let y = 55;

        // 3. Seção Fiber Tech
        pdf.setDrawColor(0, 74, 153);
        pdf.rect(10, y, 190, 8, 'S');
        pdf.text("SONDAGEM FIBER TECH (CCR)", 15, y + 6);
        y += 15;
        pdf.text(`Técnico: ${document.getElementById('tecCCR').value || "N/A"}`, 10, y);
        y += 10;

        // Estampar Fotos CCR
        if(fotosCCR.length > 0) {
            let x = 10;
            for(let foto of fotosCCR) {
                if (x > 150) { x = 10; y += 45; }
                if (y > 250) { pdf.addPage(); y = 20; }
                pdf.addImage(foto, 'JPEG', x, y, 40, 40);
                x += 45;
            }
            y += 50;
        } else {
            pdf.text("Nenhuma foto registrada.", 10, y);
            y += 10;
        }

        // 4. Seção Claro
        if (y > 230) { pdf.addPage(); y = 20; }
        pdf.setDrawColor(238, 29, 35);
        pdf.rect(10, y, 190, 8, 'S');
        pdf.text("SONDAGEM EQUIPE CLARO", 15, y + 6);
        y += 15;
        pdf.text(`Técnico: ${document.getElementById('tecClaro').value || "N/A"}`, 10, y);
        y += 10;

        // Estampar Fotos Claro
        if(fotosClaro.length > 0) {
            let x = 10;
            for(let foto of fotosClaro) {
                if (x > 150) { x = 10; y += 45; }
                if (y > 250) { pdf.addPage(); y = 20; }
                pdf.addImage(foto, 'JPEG', x, y, 40, 40);
                x += 45;
            }
        } else {
            pdf.text("Nenhuma foto registrada.", 10, y);
        }

        // Rodapé
        const totalPages = pdf.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            pdf.setPage(i);
            pdf.setFontSize(8);
            pdf.text("Documento Técnico de Campo - Inspeção de Fibras", 10, 285);
            pdf.text(`Página ${i} de ${totalPages}`, 180, 285);
        }

        // Salvar
        const nomeArquivo = `Relatorio_KM_${km.replace('+','-')}_${Date.now()}.pdf`;
        pdf.save(nomeArquivo);
        alert("PDF Salvo com sucesso!");
    }
</script>

</body>
</html>
