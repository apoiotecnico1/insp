<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Captura Técnica - Total Wake</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00ff88; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.7); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; background: #0a0a0a; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video#vid { width: 100%; height: 100%; object-fit: cover; }

        /* ANTI-ESCURECIMENTO: Elemento que pisca quase invisivelmente para enganar o sensor de ociosidade */
        #anti-dim { 
            position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background: white; opacity: 0; transition: opacity 0.1s;
        }

        /* Botão Central */
        #click-area { position: absolute; inset: 0; z-index: 50; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shutter-mini { width: 60px; height: 60px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); transition: 0.2s; }
        .shutter-mini::after { content: ''; width: 20px; height: 20px; background: var(--accent); border-radius: 50%; }
        .shutter-label { font-size: 10px; color: #fff; text-transform: uppercase; margin-top: 10px; font-weight: bold; opacity: 0.6; text-shadow: 1px 1px 2px #000; }

        /* Placa KM */
        #km-hud { position: absolute; top: 20px; left: 20px; background: rgba(0, 121, 52, 0.7); padding: 10px 18px; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 10px; z-index: 100; backdrop-filter: blur(5px); text-align: center; }
        #km-txt { font-size: 1.8rem; font-weight: 900; margin: 0; }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .btn-ui { border: 1px solid rgba(255,255,255,0.3); padding: 15px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; background: var(--glass); color: #fff; backdrop-filter: blur(10px); }
        #btn-stop { background: var(--danger); border: none; display: none; }
        #gear-btn { width: 50px; height: 50px; background: var(--glass); border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #0a0a0a; z-index: 4000; padding: 60px 25px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        .input-group input, select { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; }

        canvas { display: none; }
        .flash { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 6000; pointer-events: none; transition: 0.1s; }
    </style>
</head>
<body>

<div id="anti-dim"></div>
<div id="flash-effect" class="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:10px;">MODO OPERAÇÃO ATIVO</h2>
        <p style="color:#666; margin-bottom:30px;">Bloqueio de suspensão reforçado (V3).</p>
        <button class="btn-aware" onclick="startApp()">INICIAR AGORA</button>
    </div>
</div>

<div id="settings-panel">
    <h3 onclick="toggleSet()" style="cursor:pointer; color:#fff; margin-bottom:30px;">← FECHAR</h3>
    <div class="input-group"><label>CÂMERA</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="input-group"><label>INTERVALO PDF (MS)</label><input type="number" id="cfg-int" value="500"></div>
    <div class="input-group"><label>FOTOS POR LOTE</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <div id="click-area" onclick="takeInstantJPG()">
        <div class="shutter-mini"></div>
        <span class="shutter-label">Salvar foto atual</span>
    </div>
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud">
        <span id="br-txt" style="font-size: 0.9rem; font-weight: 800; display: block;">RODOVIA</span>
        <h1 id="km-txt">Km ---</h1>
    </div>
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-ui" onclick="startCapture()">PDF</button>
        <button id="btn-stop" class="btn-ui" onclick="stopCapture()">PARAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer = [], hDir=null, currentStream=null, wakeLock=null;
let brAtual = "BR-000", kmInicialLote = "";

const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');
const antiDim = document.getElementById('anti-dim');

// ESTRATÉGIA REFORÇADA: WakeLock + Pulso de Brilho + Fullscreen
async function keepAlive() {
    // 1. Tenta a API oficial
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
    
    // 2. Pulso de Brilho (Engana o sensor a cada 15 seg)
    setInterval(() => {
        antiDim.style.opacity = "0.01";
        setTimeout(() => { antiDim.style.opacity = "0"; }, 200);
    }, 15000);
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        await keepAlive();

        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        listCams(); loadCSV(); initGPS();
    } catch(e) { alert("Permissão de pasta e tela cheia necessária."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

async function takeInstantJPG() {
    if (!hDir) return;
    const flash = document.getElementById('flash-effect');
    flash.style.opacity = "0.5"; setTimeout(() => flash.style.opacity = "0", 100);

    const kmRaw = document.getElementById('km-txt').innerText;
    const kmClean = kmRaw.replace('Km ', '').replace('+', '-');
    const agora = new Date();
    const dataHora = agora.toLocaleDateString('pt-BR').replace(/\//g, '-') + '_' + agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}).replace(/:/g, '-');

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.15;
    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff"; ctx.font = `bold ${bh * 0.35}px Arial`;
    ctx.fillText(`${brAtual} - ${kmRaw}`, 40, can.height - (bh * 0.45));
    ctx.font = `${bh * 0.18}px Arial`; ctx.fillText(agora.toLocaleString('pt-BR').toUpperCase(), 40, can.height - (bh * 0.15));

    can.toBlob(async (blob) => {
        const nomeFinal = `${brAtual}_KM-${kmClean}_${dataHora}.jpg`.replace(/\s+/g, '');
        const handle = await hDir.getFileHandle(nomeFinal, { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
    }, 'image/jpeg', 0.95);
}

// LOGICA PDF (Mesma das anteriores, integrada)
function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText);
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
}

function captureLoop() {
    if (!capturing) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ img: can.toDataURL('image/jpeg', 0.4), km: document.getElementById('km-txt').innerText, br: brAtual, ts: new Date().toLocaleString('pt-BR') });
        if (buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) {
            const b = [...buffer]; const kF = document.getElementById('km-txt').innerText;
            const kI = kmInicialLote; buffer = []; kmInicialLote = kF;
            savePDF(b, kI, kF);
        }
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 500); 
}

async function savePDF(data, kI, kF) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < data.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, can.height - bh, can.width, bh);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${bh * 0.35}px Arial`;
                ctx.fillText(`${data[i].br} - ${data[i].km}`, 40, can.height - (bh * 0.45));
                ctx.font = `${bh * 0.18}px Arial`; ctx.fillText(data[i].ts.toUpperCase(), 40, can.height - (bh * 0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = data[i].img;
        });
    }
    const nomeRel = `PDF_${brAtual}_KM_${kI}_ao_${kF}.pdf`.replace(/\s+/g, '');
    const f = await hDir.getFileHandle(nomeRel, { create: true });
    const s = await f.createWritable(); await s.write(doc.output('blob')); await s.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon')), ibr = h.indexOf('br');
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')), br: ibr !== -1 ? c[ibr] : null };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            brAtual = best.br || "BR-116";
            document.getElementById('br-txt').innerText = brAtual;
        }
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
