<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Inspeção Rodoviária – Captura Segura</title>

<style>
html,body{
  margin:0; height:100%;
  background:#050912; color:#eaf2ff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}
#cam{
  position:fixed; inset:0;
  background:#000;
}
video{
  width:100%; height:100%;
  object-fit:contain;
}
#hud{
  position:absolute; inset:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:12px;
  pointer-events:none;
}
.bar{
  background:rgba(0,0,0,.65);
  padding:10px 14px;
  border-radius:12px;
  font-weight:700;
  display:inline-flex;
  gap:12px;
}
.center{
  text-align:center;
}
button{
  pointer-events:auto;
  width:260px;
  height:64px;
  font-size:18px;
  font-weight:900;
  border-radius:14px;
  border:none;
  background:#22c55e;
  color:#052014;
}
button.stop{
  background:#ef4444;
  color:white;
}
#toast{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  padding:8px 14px;
  border-radius:10px;
  display:none;
}
</style>
</head>
<body>

<div id="cam">
  <video id="vid" autoplay playsinline muted></video>

  <div id="hud">
    <div class="bar">
      <span id="status">⏸ Parado</span>
      <span>📷 <b id="count">0</b></span>
    </div>

    <div class="center">
      <button id="btn">▶ INICIAR CAPTURA</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================= CONFIG ================= */
const INTERVAL_MS = 1500;     // intervalo seguro
const MAX_PIX = 1600;        // reduz stress de memória
/* ========================================= */

const vid = document.getElementById('vid');
const btn = document.getElementById('btn');
const statusTxt = document.getElementById('status');
const countTxt = document.getElementById('count');
const toast = document.getElementById('toast');

let dirHandle = null;
let running = false;
let count = 0;
let lastPos = null;
let capturing = false;

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d',{alpha:false});

/* ================= UTIL ================= */
function toastMsg(m,ms=1200){
  toast.textContent=m;
  toast.style.display='block';
  clearTimeout(toast.t);
  toast.t=setTimeout(()=>toast.style.display='none',ms);
}
function stamp(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}_${d.getHours()}-${d.getMinutes()}-${d.getSeconds()}`;
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
/* ======================================== */

/* ================= CAMERA ================= */
async function startCamera(){
  const st = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ideal:"environment"} },
    audio:false
  });
  vid.srcObject = st;
  await new Promise(r=>vid.onloadedmetadata=r);
}
/* ======================================== */

/* ================= GPS ================= */
navigator.geolocation.watchPosition(p=>{
  lastPos={
    lat:p.coords.latitude,
    lon:p.coords.longitude,
    acc:p.coords.accuracy
  };
},{},{enableHighAccuracy:true});
/* ======================================== */

/* ================= FOTO ================= */
async function capturePhoto(){
  if(capturing) return;
  capturing = true;

  let writer=null;

  try{
    const vw=vid.videoWidth, vh=vid.videoHeight;
    if(!vw || !vh) return;

    const scale=Math.min(1, MAX_PIX/Math.max(vw,vh));
    const w=Math.round(vw*scale);
    const h=Math.round(vh*scale);

    canvas.width=w;
    canvas.height=h;
    ctx.drawImage(vid,0,0,w,h);

    if(lastPos){
      ctx.fillStyle="rgba(0,0,0,.6)";
      ctx.fillRect(0,h-70,w,70);
      ctx.fillStyle="#fff";
      ctx.font="20px system-ui";
      ctx.fillText(
        `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} ±${Math.round(lastPos.acc)}m`,
        12, h-26
      );
    }

    const blob = await new Promise(r=>canvas.toBlob(r,"image/jpeg",0.88));
    if(!blob || blob.size<1000) return;

    const name = `FOTO_${stamp()}.jpg`;
    const fh = await dirHandle.getFileHandle(name,{create:true});
    writer = await fh.createWritable();
    await writer.write(blob);
    await writer.close();
    writer=null;

    count++;
    countTxt.textContent=count;

  }catch(e){
    console.error(e);
    toastMsg("Erro ao salvar foto");
  }finally{
    try{ await writer?.close(); }catch{}
    capturing=false;
  }
}
/* ======================================== */

/* ================= LOOP ================= */
async function loop(){
  while(running){
    statusTxt.textContent="📸 Capturando...";
    await capturePhoto();
    await sleep(INTERVAL_MS);
  }
}
/* ======================================== */

/* ================= BOTÃO ================= */
btn.onclick = async ()=>{
  if(!dirHandle){
    dirHandle = await showDirectoryPicker({mode:"readwrite"});
    toastMsg("Pasta selecionada");
    return;
  }

  running = !running;

  if(running){
    btn.textContent="⏹ FINALIZAR";
    btn.classList.add("stop");
    statusTxt.textContent="📸 Capturando...";
    loop();
  }else{
    btn.textContent="▶ INICIAR CAPTURA";
    btn.classList.remove("stop");
    statusTxt.textContent="✅ Finalizado";
  }
};
/* ======================================== */

startCamera();
</script>

</body>
</html>
``
