<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom Elite - Multi-Botões Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --ccr: #00aaff; --claro: #ee1d23; --danger: #ff1744; --warning: #ffea00; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM AO VIVO */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 74, 153, 0.85); 
            padding: 12px 25px; border: 3px solid #fff; border-radius: 10px; 
            z-index: 500; text-align: center; backdrop-filter: blur(5px);
        }
        #km-txt { font-size: 2.5rem; font-weight: 900; line-height: 1; display: block; }
        #gps-status { font-size: 0.65rem; font-weight: bold; margin-top: 4px; opacity: 0.9; }

        /* PAINEL DE BOTÕES DE ESTAMPARIA (DIREITA) */
        #event-grid {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            display: grid; grid-template-columns: repeat(2, 75px); gap: 10px; z-index: 500;
        }
        .stamp-btn {
            height: 70px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(30,30,30,0.9); color: #fff; font-size: 0.6rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center; text-align: center;
            text-transform: uppercase; backdrop-filter: blur(10px);
        }
        .stamp-btn:active { background: var(--accent); color: #000; transform: scale(0.95); }
        .b-ccr { border-bottom: 5px solid var(--ccr); }
        .b-claro { border-bottom: 5px solid var(--claro); }
        .b-danger { border-bottom: 5px solid var(--danger); }
        .b-warn { border-bottom: 5px solid var(--warning); }

        /* CONTROLES INFERIORES */
        #footer {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 500;
        }
        .btn-main { border: none; padding: 18px 35px; border-radius: 50px; font-weight: 900; font-size: 1rem; }
        #btn-rec { background: var(--accent); color: #000; }
        #btn-rec.active { background: var(--danger); color: #fff; animation: pulse 1s infinite; }
        .trigger-manual { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: transparent; }

        @keyframes pulse { 50% { opacity: 0.6; } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate">
    <h1 style="color:var(--accent); font-weight: 900; letter-spacing: 2px;">ANGSTROM PRO</h1>
    <p style="color:#555; margin-bottom: 30px;">INSPEÇÃO TÉCNICA DE ALTA VELOCIDADE</p>
    <button class="btn-main" style="background:var(--accent)" onclick="startApp()">ENTRAR NO SISTEMA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-hud">
        <span id="km-txt">Km ---</span>
        <div id="gps-status">BUSCANDO GPS...</div>
    </div>

    <div id="event-grid">
        <button class="stamp-btn b-ccr" onclick="setLabel('FIBRA CCR')">FIBRA<br>CCR</button>
        <button class="stamp-btn b-claro" onclick="setLabel('FIBRA CLARO')">FIBRA<br>CLARO</button>
        <button class="stamp-btn" onclick="setLabel('CAIXA EMENDA')">CAIXA<br>EMENDA</button>
        <button class="stamp-btn" onclick="setLabel('POSTE/ANCORA')">POSTE<br>ANCORA</button>
        <button class="stamp-btn b-warn" onclick="setLabel('VEGETAÇÃO')">PODA<br>VEGETAC.</button>
        <button class="stamp-btn b-danger" onclick="setLabel('FALHA/RISCO')">FALHA<br>CRÍTICA</button>
        <button class="stamp-btn" onclick="setLabel('EQUIPAMENTO')">EQUIPAM.<br>TÉCNICO</button>
        <button class="stamp-btn" onclick="setLabel('LIMPEZA/FAIXA')">LIMPEZA<br>FAIXA</button>
    </div>

    <div id="footer">
        <button id="btn-rec" class="btn-main" onclick="toggleRec()">INICIAR LOTE</button>
        <button class="trigger-manual" onclick="snap()"></button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false, hDir = null, buffer = [], currentLabel = "INSPEÇÃO NORMAL";
let curLat = 0, curLon = 0;

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker();
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
        document.getElementById('vid').srcObject = stream;
        document.getElementById('vid').onloadedmetadata = () => { 
            const can = document.getElementById('c');
            can.width = vid.videoWidth; can.height = vid.videoHeight;
        };

        loadCSV();
        initGPS();
    } catch(e) { }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude; curLon = p.coords.longitude;
        if (kmDB.length) {
            let closest = null, minD = Infinity;
            for (let pt of kmDB) {
                const d = Math.hypot(pt.lt - curLat, pt.ln - curLon);
                if (d < minD) { minD = d; closest = pt; }
            }
            if (closest) {
                document.getElementById('km-txt').innerText = `Km ${closest.km}`;
                document.getElementById('gps-status').innerText = `LAT: ${curLat.toFixed(5)} LON: ${curLon.toFixed(5)}`;
            }
        }
    }, null, { enableHighAccuracy: true });
}

function setLabel(txt) {
    currentLabel = txt;
    const hud = document.getElementById('km-hud');
    hud.style.background = "rgba(255, 23, 68, 0.9)";
    setTimeout(() => { 
        currentLabel = "INSPEÇÃO NORMAL"; 
        hud.style.background = "rgba(0, 74, 153, 0.85)";
    }, 1500);
}

function snap() {
    document.getElementById('flash').style.opacity = "0.5";
    setTimeout(() => document.getElementById('flash').style.opacity = "0", 70);
    renderFrame(true);
}

function toggleRec() {
    capturing = !capturing;
    const btn = document.getElementById('btn-rec');
    if (capturing) {
        btn.innerText = "FINALIZAR";
        btn.classList.add('active');
        buffer = [];
        recordLoop();
    } else {
        btn.innerText = "SALVANDO...";
        btn.classList.remove('active');
        generatePDF();
    }
}

function recordLoop() {
    if (!capturing) return;
    renderFrame(false);
    setTimeout(recordLoop, 450); 
}

async function renderFrame(isManual) {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    const km = document.getElementById('km-txt').innerText;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    // Cor do marcador no carimbo
    ctx.fillStyle = currentLabel.includes('CCR') ? '#00aaff' : (currentLabel.includes('CLARO') ? '#ee1d23' : '#00e676');
    ctx.fillRect(0, can.height - bh, 15, bh);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 42px Arial";
    ctx.fillText(`${currentLabel} | ${km}`, 40, can.height - (bh * 0.55));
    ctx.font = "24px Arial";
    ctx.fillText(`${new Date().toLocaleString()} | GPS: ${curLat.toFixed(6)}, ${curLon.toFixed(6)}`, 40, can.height - (bh * 0.22));

    const data = can.toDataURL('image/jpeg', 0.75);
    if (isManual) {
        const blob = await (await fetch(data)).blob();
        const handle = await hDir.getFileHandle(`FOTO_${km}_${Date.now()}.jpg`, {create:true});
        const w = await handle.createWritable();
        await w.write(blob); await w.close();
    } else {
        buffer.push(data);
    }
}

async function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < buffer.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const blob = doc.output('blob');
    const handle = await hDir.getFileHandle(`LAUDO_FIBRA_${Date.now()}.pdf`, {create:true});
    const w = await handle.createWritable();
    await w.write(blob); await w.close();
    
    document.getElementById('btn-rec').innerText = "INICIAR LOTE";
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const text = await r.text();
        const rows = text.split('\n').filter(row => row.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iKm = h.indexOf('km'), iLat = h.findIndex(v => v.includes('lat')), iLon = h.findIndex(v => v.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[iKm], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { }
}
</script>
</body>
</html>
