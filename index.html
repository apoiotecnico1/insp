<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SISTEMA DE RELATÓRIO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
    --danger:#ff0000;
    --accent:#ffcc00;
    --green:#007934;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body,html{width:100%;height:100%;background:#000;color:#fff;overflow:hidden}

/* ===== TELA DE ABERTURA ===== */
#safety-gate{
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.safety-box{
    max-width:420px;
    text-align:center;
    border:2px solid #333;
    border-radius:14px;
    padding:30px;
}
.safety-box img{
    max-width:220px;
    margin-bottom:20px;
}
.safety-box h2{
    color:var(--danger);
    font-size:1.2rem;
    margin-bottom:15px;
    text-transform:uppercase;
}
.safety-box p{
    font-size:16px;
    font-weight:bold;
    margin-bottom:25px;
}
.btn-proceed{
    width:100%;
    padding:18px;
    font-weight:900;
    background:var(--accent);
    color:#000;
    border:none;
    border-radius:8px;
    cursor:pointer;
    text-transform:uppercase;
}

/* ===== APP ===== */
#app-shell{
    display:none;
    width:100%;
    height:100%;
    position:relative;
}
video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
#km-hud{
    position:absolute;
    top:20px;
    left:20px;
    background:var(--green);
    padding:10px 20px;
    border:3px solid #fff;
    border-radius:8px;
    z-index:10;
}
#km-hud h1{font-size:2rem}

#ui-controls{
    position:absolute;
    bottom:40px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:30px;
    z-index:20;
}
.btn-round{
    width:80px;
    height:80px;
    border-radius:50%;
    border:4px solid #fff;
    font-weight:900;
}
#btn-start{background:#ffcc00;color:#000}
#btn-stop{background:#ff0000;color:#fff;display:none}
</style>
</head>

<body>

<!-- ===== ABERTURA COM IMAGEM ===== -->
<div id="safety-gate">
    <div class="safety-box">
        <img src="proibido.png" alt="Proibido uso de celular ao dirigir">
        <h2>Não utilize o celular enquanto dirige</h2>
        <p>O uso deste sistema durante a condução do veículo é proibido.</p>
        <button class="btn-proceed" onclick="liberar()">Estou ciente</button>
    </div>
</div>

<!-- ===== SISTEMA ===== -->
<div id="app-shell">
    <video id="vid" autoplay muted playsinline></video>

    <div id="km-hud">
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="ui-controls">
        <button id="btn-start" class="btn-round">Iniciar</button>
        <button id="btn-stop" class="btn-round">Parar</button>
    </div>
</div>

<script>
function liberar(){
    document.getElementById('safety-gate').style.display='none';
    document.getElementById('app-shell').style.display='block';
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen().catch(()=>{});
    }
}
</script>

</body>
</html>
``
