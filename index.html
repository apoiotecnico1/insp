<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SUPORTE DE CAMPO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE ALERTA */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 4000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .alert-box { border: 1px solid #333; padding: 35px; border-radius: 12px; max-width: 450px; text-align: center; background: #080808; }
        .alert-box h2 { color: var(--accent); margin-bottom: 15px; font-size: 18px; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 16px 45px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); padding: 10px 20px; 
            border: 2px solid #fff; border-radius: 6px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 10;
        }
        #km-hud h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }

        #rec-tag { position: absolute; top: 85px; right: 20px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; font-size: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* MENU DE AJUSTES */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(25px); z-index: 3000; 
            padding: 60px 25px; transition: 0.5s; border-left: 1px solid #444;
        }
        #settings-panel.open { right: 0; }
        .close-settings { position: absolute; top: 20px; left: 20px; font-size: 14px; cursor: pointer; color: #aaa; text-transform: uppercase; }

        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: #aaa; display: block; margin-bottom: 8px; }
        select, input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; }

        /* CONTROLES */
        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 20px; z-index: 100; transition: 0.5s;
        }
        .btn-round { border: none; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 20px 40px; font-size: 12px; background: var(--accent); color: #000; }
        #gear-btn { width: 55px; height: 55px; border-radius: 6px; background: rgba(255,255,255,0.15); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>Monitoramento Ativo</h2>
        <p>A tela não apagará. Mantenha o carregador conectado.</p>
        <button class="btn-aware" onclick="acceptSafety()">Estou Ciente</button>
    </div>
</div>

<div id="settings-panel">
    <div class="close-settings" onclick="toggleSet()">← Voltar</div>
    <div class="field"><label>Câmera (Lente)</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Tempo da foto (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Salvar relatório a cada X fotos</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted loop></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>CAPTURA ATIVA</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-round" onclick="initCapture()">Iniciar captura</button>
        <button id="btn-stop" class="btn-round" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer, wakeLock = null;
let kmInicialLote = "", kmFinalLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// MANTER TELA ACESA
async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
}

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        requestWakeLock();
    } catch(e) { alert("Acesso à pasta necessário."); }
}

function wakeUI() {
    document.getElementById('ui-controls').style.opacity = '1';
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').style.opacity = '0.2', 4000);
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = "";
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = `Lente ${i + 1}`; 
        sel.appendChild(opt);
    });
    const back = videoDevices.find(d => d.label.toLowerCase().includes('back')) || videoDevices[videoDevices.length - 1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1280 }, height: { ideal: 720 } } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

async function initCapture() {
    rec = true;
    requestWakeLock();
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    loop();
}

function stopCapture() {
    rec = false;
    if (wakeLock) wakeLock.release();
    savePDF();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        if(buffer.length === 0) kmInicialLote = currentKm;
        kmFinalLote = currentKm;

        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.45), 
            km: currentKm, 
            ts: new Date().toLocaleString('pt-BR').toUpperCase() 
        });

        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if(buffer.length >= limit) savePDF();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    
    const items = [...buffer];
    const ini = kmInicialLote;
    const fim = kmFinalLote;
    buffer = [];

    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; 
                ctx.fillRect(0, can.height-barH, can.width, barH);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText("Km " + items[i].km, 40, can.height-(barH * 0.45));
                ctx.font = `${barH * 0.2}px Arial`;
                ctx.fillText(items[i].ts, 40, can.height-(barH * 0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = items[i].raw;
        });
    }

    // FORMATAÇÃO DA DATA E HORA PARA O NOME DO ARQUIVO
    const agora = new Date();
    const dataFmt = agora.toLocaleDateString('pt-BR').replace(/\//g, '-');
    const horaFmt = agora.toLocaleTimeString('pt-BR').replace(/:/g, '-');
    const nomeArquivo = `Relatorio_Km_${ini}_a_${fim}_${dataFmt}_${horaFmt}.pdf`;

    try {
        const handle = await hDir.getFileHandle(nomeArquivo, {create:true});
        const writable = await handle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (err) { console.error(err); }

    if(rec) kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initG() { 
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
    }, null, {enableHighAccuracy:true});
}

window.onload = () => { loadCSV(); initG(); };
</script>
</body>
</html>
