<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>INSPEÇÃO PRO - Georreferenciamento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --placa-verde: linear-gradient(180deg, #007934 0%, #005a27 100%); 
            --accent: #ffcc00; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: #fff; }

        /* PLACA DE RODOVIA 3D */
        #hud-placa { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); 
            padding: 10px 20px; 
            border: 4px solid #fff; 
            border-radius: 12px; 
            z-index: 100;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 160px;
        }
        #br-val { font-size: 1.2rem; font-weight: 800; border-bottom: 2px solid rgba(255,255,255,0.3); margin-bottom: 5px; }
        #km-val { font-size: 2.8rem; font-weight: 900; }

        #vid { width: 100vw; height: 100vh; object-fit: cover; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 200; }
        
        .btn { border: none; padding: 15px 30px; border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        #btn-rec { background: var(--accent); color: #000; }
        #btn-stop { background: #ff4444; color: #fff; display: none; }
        
        #gate { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color:var(--accent)">INSPEÇÃO PRO - APOIO TÉCNICO</h2>
    <p>Selecione o CSV com as colunas BR, KM, LAT, LONG</p>
    <input type="file" id="csv-input" accept=".csv" style="color:#fff">
    <button class="btn" id="btn-rec" onclick="initApp()">Iniciar Sistema</button>
</div>

<div id="ui" style="visibility: hidden;">
    <video id="vid" autoplay playsinline muted onclick="clickFoto()"></video>
    <div id="hud-placa">
        <div id="br-val">BR ---</div>
        <div id="km-val">Km ---</div>
    </div>
    <div id="controls">
        <button id="btn-start" class="btn" style="background:var(--accent)" onclick="startRelatorio()">Gerar Relatório</button>
        <button id="btn-stop" class="btn" onclick="stopRelatorio()">Finalizar PDF</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let db = [], dirHandle = null, isCapturing = false, buffer = [];
let curBR = "BR", curKM = "0", curLat = "0", curLon = "0";

async function initApp() {
    const file = document.getElementById('csv-input').files[0];
    if(!file) return alert("Selecione o arquivo CSV primeiro.");

    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        await processCSV(file);
        document.getElementById('gate').remove();
        document.getElementById('ui').style.visibility = 'visible';
        startCamera();
        startGPS();
    } catch(e) { alert("Permissão de pasta necessária."); }
}

async function processCSV(file) {
    const text = await file.text();
    const rows = text.split('\n').filter(r => r.length > 5);
    const header = rows.shift().toLowerCase();
    const sep = header.includes(';') ? ';' : ',';

    db = rows.map(r => {
        const c = r.split(sep);
        return {
            br: c[0].trim(),
            km: c[1].trim(),
            // Substitui vírgula por ponto para o cálculo do GPS
            lat: parseFloat(c[2].replace(',', '.')),
            lon: parseFloat(c[3].replace(',', '.'))
        };
    }).filter(d => !isNaN(d.lat));
}

function startGPS() {
    navigator.geolocation.watchPosition(pos => {
        curLat = pos.coords.latitude.toFixed(6);
        curLon = pos.coords.longitude.toFixed(6);
        
        let closest = null, minDist = Infinity;
        db.forEach(pt => {
            const d = Math.hypot(pt.lat - pos.coords.latitude, pt.lon - pos.coords.longitude);
            if(d < minDist) { minDist = d; closest = pt; }
        });

        if(closest) {
            curBR = "BR-" + closest.br;
            curKM = closest.km;
            document.getElementById('br-val').innerText = curBR;
            document.getElementById('km-val').innerText = "Km " + curKM;
        }
    }, null, { enableHighAccuracy: true });
}

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920 } });
    document.getElementById('vid').srcObject = stream;
}

function drawStamp(ctx, w, h) {
    const hStamp = h * 0.15;
    const grad = ctx.createLinearGradient(0, h-hStamp, 0, h);
    grad.addColorStop(0, "#007934"); grad.addColorStop(1, "#004d22");
    
    ctx.fillStyle = grad;
    ctx.fillRect(0, h-hStamp, w, hStamp);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, h-hStamp, w, 4);

    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 4;
    ctx.font = `bold ${hStamp * 0.2}px Arial`;
    ctx.fillText(curBR, 25, h - (hStamp * 0.65));
    ctx.font = `900 ${hStamp * 0.45}px Arial`;
    ctx.fillText("Km " + curKM, 25, h - (hStamp * 0.2));
    
    ctx.font = `bold ${hStamp * 0.15}px monospace`;
    ctx.textAlign = "right";
    ctx.fillText(`${new Date().toLocaleString()} | LAT:${curLat} LON:${curLon}`, w - 25, h - (hStamp * 0.2));
    ctx.textAlign = "left";
}

async function clickFoto() {
    const v = document.getElementById('vid');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0);
    drawStamp(ctx, c.width, c.height);
    
    const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.9));
    const handle = await dirHandle.getFileHandle(`${curBR}_KM${curKM}_${Date.now()}.jpg`, {create:true});
    const writable = await handle.createWritable();
    await writable.write(blob); await writable.close();
}

function startRelatorio() {
    isCapturing = true;
    buffer = [];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    captureFrame();
}

async function captureFrame() {
    if(!isCapturing) return;
    const v = document.getElementById('vid');
    const c = document.getElementById('canvas');
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0);
    drawStamp(ctx, c.width, c.height);
    buffer.push(c.toDataURL('image/jpeg', 0.7));
    setTimeout(captureFrame, 2000);
}

async function stopRelatorio() {
    isCapturing = false;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    buffer.forEach((img, i) => {
        if(i > 0) doc.addPage();
        doc.addImage(img, 'JPEG', 0, 0, 297, 210);
    });
    const handle = await dirHandle.getFileHandle(`RELATORIO_${curBR}_${Date.now()}.pdf`, {create:true});
    const writable = await handle.createWritable();
    await writable.write(doc.output('blob')); await writable.close();
    location.reload();
}
</script>
</body>
</html>
