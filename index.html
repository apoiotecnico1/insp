<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Pro - Corrigido</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --glass-verde: rgba(0, 121, 52, 0.6); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* Placa Visual na Tela */
        .placa-estilizada {
            background: var(--glass-verde);
            padding: 8px 15px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            backdrop-filter: blur(8px);
            box-shadow: 4px 4px 12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .br-val { font-size: 1rem; font-weight: 900; text-shadow: 1px 1px 2px #000; }
        .km-val { font-size: 2.2rem; font-weight: 900; text-shadow: 2px 2px 0px #004d21; }
        #km-hud { position: absolute; top: 20px; left: 20px; z-index: 100; }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; }
        .btn-main { border: none; padding: 18px 40px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.1s; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="safety-gate">
    <button class="btn-main" style="background:var(--accent)" onclick="startApp()">ATIVAR E SELECIONAR PASTA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="takeManualPhoto()"></video>
    
    <div id="km-hud">
        <div class="placa-estilizada">
            <span class="br-val" id="br-txt">---</span>
            <span class="km-val" id="km-txt">Km ---</span>
        </div>
    </div>

    <div id="ui-controls">
        <button id="btn-start" class="btn-main" style="background:var(--accent)" onclick="startCapture()">INICIAR LOTE</button>
        <button id="btn-stop" class="btn-main" style="background:#ff4444; display:none;" onclick="stopCapture()">PARAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let buffer = [], brAtual = "000", curLat = "0.0000", curLon = "0.0000";

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function startApp() {
    try {
        // Solicita acesso à pasta
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        
        // Verifica se temos permissão
        const permission = await hDir.requestPermission({ mode: 'readwrite' });
        if (permission !== 'granted') {
            alert("É necessário dar permissão de escrita na pasta!");
            return;
        }

        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        await listCams();
        loadCSV();
        initGPS();
    } catch(e) {
        console.error("Erro na inicialização:", e);
        alert("Erro ao selecionar pasta. Certifique-se de usar Chrome ou Edge.");
    }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => {
        can.width = vid.videoWidth;
        can.height = vid.videoHeight;
        console.log("Resolução da captura:", can.width, "x", can.height);
    };
}

function drawStylizedPlaca(km, br) {
    const scale = can.height / 1080;
    ctx.save();
    
    // Desenho da Placa
    const rw = 280 * scale;
    const rh = 130 * scale;
    ctx.translate(40 * scale, 40 * scale);
    
    // Sombra da Placa
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 15 * scale;
    ctx.shadowOffsetX = 5 * scale;
    ctx.shadowOffsetY = 5 * scale;
    
    ctx.fillStyle = "rgba(0, 121, 52, 0.8)";
    ctx.beginPath();
    ctx.roundRect(0, 0, rw, rh, 15 * scale);
    ctx.fill();
    
    // Texto BR
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${35 * scale}px Arial`;
    ctx.fillText(br, rw/2, 45 * scale);

    // Texto KM com 3D
    ctx.font = `900 ${75 * scale}px Arial`;
    ctx.shadowColor = "#004d21";
    ctx.shadowOffsetX = 3 * scale;
    ctx.shadowOffsetY = 3 * scale;
    ctx.fillText("Km " + km, rw/2, 110 * scale);
    
    ctx.restore();
}

async function takeManualPhoto() {
    if(!hDir) { alert("Pasta não selecionada!"); return; }
    
    // Efeito Visual
    document.getElementById('flash').style.opacity = "1";
    setTimeout(() => document.getElementById('flash').style.opacity = "0", 100);

    // Renderiza
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const kmAtual = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawStylizedPlaca(kmAtual, brAtual);
    
    try {
        const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.90));
        const nomeArquivo = `FOTO_BR${brAtual}_KM${kmAtual}_${Date.now()}.jpg`;
        
        const fileHandle = await hDir.getFileHandle(nomeArquivo, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        console.log("JPG salvo com sucesso:", nomeArquivo);
    } catch (err) {
        console.error("Erro ao salvar arquivo:", err);
        alert("Erro ao gravar na pasta. Tente selecionar a pasta novamente.");
    }
}

// Funções de Lote e PDF simplificadas para garantir funcionamento
function startCapture() {
    capturing = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    if(buffer.length > 0) {
        savePDF([...buffer]);
        buffer = [];
    }
}

async function captureLoop() {
    if (!capturing) return;
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const kmAtual = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawStylizedPlaca(kmAtual, brAtual);
    
    buffer.push(can.toDataURL('image/jpeg', 0.6));
    
    if (buffer.length >= 30) {
        savePDF([...buffer]);
        buffer = [];
    }
    setTimeout(captureLoop, 500);
}

async function savePDF(dataList) {
    try {
        const doc = new jspdf.jsPDF('l', 'mm', 'a4');
        for (let i = 0; i < dataList.length; i++) {
            if (i > 0) doc.addPage();
            doc.addImage(dataList[i], 'JPEG', 0, 0, 297, 210);
        }
        const blob = doc.output('blob');
        const fileHandle = await hDir.getFileHandle(`LOTE_${Date.now()}.pdf`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
    } catch (e) { console.error("Erro PDF:", e); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brAtual = best.br;
            document.getElementById('br-txt').innerText = best.br;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr = h.indexOf('br'), ikm = h.indexOf('km'), ilat = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Erro ao carregar CSV:", e); }
}
</script>
</body>
</html>
