<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Inspeção Técnica Rodoviária</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: #007934; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; }

        /* Gate de Entrada Full Screen */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .btn-start { background: var(--accent); color: #000; border: none; padding: 30px 80px; font-weight: 900; border-radius: 60px; cursor: pointer; font-size: 1.8rem; box-shadow: 0 0 30px rgba(255,204,0,0.5); }

        #app { position: relative; width: 100vw; height: 100vh; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - PLACA DE KM GRANDE */
        #hud { position: absolute; top: 40px; left: 25px; background: var(--placa); padding: 20px 35px; border: 5px solid #fff; border-radius: 15px; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        #br-name { font-size: 14px; color: #fff; display: block; margin-bottom: 5px; opacity: 0.9; }
        #km-val { font-size: 4rem; font-weight: 900; margin: 0; line-height: 1; letter-spacing: -2px; }
        #gps-debug { font-size: 11px; font-family: monospace; margin-top: 10px; display: block; font-weight: normal; }

        /* BOTÃO WHATSAPP GIGANTE */
        #btn-wa { 
            position: absolute; bottom: 60px; right: 30px;
            background: var(--whatsapp); width: 130px; height: 130px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 6px solid #fff; z-index: 500; box-shadow: 0 0 50px rgba(37, 211, 102, 0.6);
            transition: transform 0.1s;
        }
        #btn-wa:active { transform: scale(0.9); }
        #btn-wa span { font-size: 14px; font-weight: bold; color: #fff; margin-top: 8px; text-transform: uppercase; }

        /* CONFIGURAÇÕES */
        #btn-cfg { position: absolute; bottom: 60px; left: 30px; background: rgba(0,0,0,0.6); color: #fff; border: 2px solid #fff; padding: 20px; border-radius: 20px; font-size: 30px; cursor: pointer; }
        
        #panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: rgba(0,0,0,0.95); padding: 60px 25px; transition: 0.4s; z-index: 2000; border-left: 3px solid var(--accent); }
        #panel.open { right: 0; }
        .field { margin-bottom: 25px; }
        label { font-size: 12px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 16px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color:var(--accent); margin-bottom:20px;">SISTEMA DE INSPEÇÃO</h2>
    <button class="btn-start" onclick="ativarTudo()">INICIAR</button>
    <p style="margin-top:20px; color:#666;">BR-116 / BR-101 (Auto-Detect)</p>
</div>

<div id="app">
    <video id="v" autoplay playsinline muted></video>
    
    <div id="hud">
        <span id="br-name">RODOVIA</span>
        <h1 id="km-val">Km ---</h1>
        <span id="gps-debug">Aguardando GPS...</span>
    </div>

    <div id="btn-wa" onclick="enviarInspecao()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60">
        <span>ENVIAR</span>
    </div>

    <button id="btn-cfg" onclick="document.getElementById('panel').classList.toggle('open')">⚙️</button>
</div>

<div id="panel">
    <button onclick="document.getElementById('panel').classList.remove('open')" style="color:red; background:none; border:none; margin-bottom:30px; cursor:pointer; font-weight:bold;">[ FECHAR ]</button>
    
    <div class="field">
        <label>WhatsApp (DDD+Número):</label>
        <input type="text" id="wa-num" placeholder="5511999999999">
    </div>

    <div class="field">
        <label>Lente da Câmera:</label>
        <select id="cam-sel" onchange="mudarCamera(this.value)"></select>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let stream, db = [], lat = 0, lon = 0;
const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');

async function ativarTudo() {
    // Forçar Full Screen
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Iniciar Câmera
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-sel');
    sel.innerHTML = cams.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    
    mudarCamera(cams[cams.length - 1].deviceId);
    
    // Iniciar Dados e GPS
    carregarCSV();
    iniciarGPS();
}

async function mudarCamera(id) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    v.srcObject = stream;
    v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
}

async function enviarInspecao() {
    const km = document.getElementById('km-val').innerText;
    const br = document.getElementById('br-name').innerText;
    const agora = new Date().toLocaleString('pt-BR');

    // 1. Captura com carimbo
    ctx.drawImage(v, 0, 0, c.width, c.height);
    const th = c.height * 0.18;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, c.height - th, c.width, th);
    
    ctx.fillStyle = "#ffcc00"; 
    ctx.font = `bold ${th * 0.35}px Arial`;
    ctx.fillText(`${br}: ${km}`, 40, c.height - (th * 0.55));
    
    ctx.fillStyle = "#fff";
    ctx.font = `${th * 0.15}px Arial`;
    ctx.fillText(`${agora} | LAT: ${lat.toFixed(6)} LON: ${lon.toFixed(6)}`, 40, c.height - (th * 0.22));

    // 2. Copiar para o WhatsApp (Funcionalidade estável)
    c.toBlob(async (blob) => {
        try {
            const data = [new ClipboardItem({ [blob.type]: blob })];
            await navigator.clipboard.write(data);
            
            const num = document.getElementById('wa-num').value;
            const link = num ? `https://wa.me/${num}` : `whatsapp://send`;
            
            // Abre o WhatsApp. O usuário só precisa clicar em "Colar"
            window.open(link, '_blank');
        } catch (err) {
            alert("Erro ao copiar imagem. Verifique as permissões do navegador.");
        }
    }, 'image/png');
}

async function carregarCSV() {
    try {
        const response = await fetch('SNVBR116SPRJ.csv');
        const text = await response.text();
        
        // Detectar qual BR está no arquivo
        if(text.includes("BR-116") || text.includes("BR116")) document.getElementById('br-name').innerText = "BR-116 / RJ";
        if(text.includes("BR-101") || text.includes("BR101")) document.getElementById('br-name').innerText = "BR-101 / RJ";

        const rows = text.split('\n').slice(1);
        db = rows.map(r => {
            const cols = r.split(';');
            if (cols.length < 3) return null;
            return {
                km: cols[0],
                lat: parseFloat(cols[1].replace(',', '.')),
                lon: parseFloat(cols[2].replace(',', '.'))
            };
        }).filter(item => item !== null && !isNaN(item.lat));
        
        console.log("CSV Carregado: " + db.length + " pontos.");
    } catch (e) {
        document.getElementById('gps-debug').innerText = "Erro ao ler CSV.";
    }
}

function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        
        document.getElementById('gps-debug').innerText = `LAT: ${lat.toFixed(5)} | LON: ${lon.toFixed(5)}`;

        if (db.length > 0) {
            let maisProximo = db[0];
            let menorDistancia = Infinity;

            db.forEach(ponto => {
                const d = Math.sqrt(Math.pow(ponto.lat - lat, 2) + Math.pow(ponto.lon - lon, 2));
                if (d < menorDistancia) {
                    menorDistancia = d;
                    maisProximo = ponto;
                }
            });
            document.getElementById('km-val').innerText = "Km " + maisProximo.km;
        }
    }, err => {
        document.getElementById('gps-debug').innerText = "GPS Inativo ou Bloqueado.";
    }, { enableHighAccuracy: true });
}
</script>
</body>
</html>
