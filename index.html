
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V10.4 - ULTRA VISION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        @media (orientation: landscape) { #app-shell { flex-direction: row; } #cam-v { flex: 3; } #ui-p { flex: 1; } }
        @media (orientation: portrait) { #cam-v { height: 60vh; } #ui-p { height: 40vh; } }

        #cam-v { position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #km-live { 
            position: absolute; top: 15px; left: 15px; background: var(--green); 
            padding: 12px 24px; border: 3px solid #fff; border-radius: 10px; 
            font-size: 2.2rem; font-weight: 900; z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.8); 
        }

        #gear-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--gold); cursor: pointer; z-index: 100; font-size: 30px; }

        /* Painel de Ajustes */
        #set-panel { position: fixed; top: 0; right: -100%; width: 310px; height: 100%; background: #111; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; border-left: 5px solid var(--gold); overflow-y: auto; }
        #set-panel.open { right: 0; }
        #close-x { position: absolute; top: 15px; right: 15px; font-size: 14px; color: #fff; background: #444; cursor: pointer; padding: 8px 12px; border-radius: 6px; font-family: sans-serif; font-weight: bold; }
        
        .set-row { margin-bottom: 22px; }
        label { font-size: 11px; color: var(--gold); display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; background: #222; color: #fff; border: 1px solid #555; padding: 14px; border-radius: 10px; font-size: 15px; }

        #ui-p { background: #0d0d0d; display: flex; flex-direction: column; padding: 25px; gap: 15px; justify-content: center; border-left: 1px solid #333; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat { background: #1a1a1a; padding: 18px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat b { font-size: 1.8rem; color: #fff; display: block; }

        .btn { width: 100%; border: none; border-radius: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s active; }
        .btn-f { background: var(--gold); color: #000; height: 60px; font-size: 0.9rem; }
        .btn-on { background: var(--green); color: #fff; height: 90px; font-size: 1.4rem; box-shadow: 0 4px 15px rgba(5,107,60,0.4); }
        .btn-off { background: var(--danger); color: #fff; height: 90px; font-size: 1.4rem; }
        button:disabled { opacity: 0.1; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gear-btn" onclick="toggleS()">⚙️</div>

<div id="set-panel">
    <div id="close-x" onclick="toggleS()">X FECHAR</div>
    <h3 style="margin: 25px 0 30px 0; font-size: 18px; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">CONFIGURAÇÕES V10.4</h3>
    
    <div class="set-row">
        <label>SELECIONAR LENTE</label>
        <select id="cfg-cam" onchange="switchCam(this.value)"></select>
    </div>

    <div class="set-row">
        <label>INTERVALO (MS)</label>
        <input type="number" id="cfg-int" value="200">
    </div>

    <div class="set-row">
        <label>FOTOS POR LOTE</label>
        <input type="number" id="cfg-lote" value="300">
    </div>

    <button onclick="toggleS()" style="width:100%; padding:20px; background:var(--green); border:none; color:#fff; border-radius:12px; font-weight:900; margin-top:10px">SALVAR E VOLTAR</button>
</div>

<div id="app-shell">
    <div id="cam-v">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-live">Km ---+---</div>
    </div>
    <div id="ui-p">
        <div class="grid-stats">
            <div class="stat"><small style="color:var(--gold)">LOTE</small><b id="v-batch">0/300</b></div>
            <div class="stat"><small style="color:var(--gold)">TOTAL</small><b id="v-total">0</b></div>
        </div>
        <button id="btn-f" class="btn btn-f">📁 1. DEFINIR PASTA DESTINO</button>
        <button id="btn-on" class="btn btn-on" disabled>▶ 2. INICIAR CAPTURA</button>
        <button id="btn-off" class="btn btn-off" disabled>■ PARAR E SALVAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null;
let currentStream = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

window.onload = () => { listCams(); loadCSV(); initG(); };

async function listCams() {
    try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cfg-cam');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `Lente Especial ${i + 1}`;
            sel.appendChild(opt);
        });
        if(videoDevices.length > 0) initC(videoDevices.deviceId);
    } catch(e) { alert("Permita o acesso à câmera."); }
}

async function initC(id) {
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
    }
    const constraints = {
        video: {
            deviceId: id ? { exact: id } : undefined,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
    };
    try {
        const s = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = s;
        vid.srcObject = s;
        vid.onloadedmetadata = () => { 
            can.width = vid.videoWidth; 
            can.height = vid.videoHeight; 
            vid.play(); 
        };
    } catch(err) {
        console.error("Erro ao trocar lente: ", err);
    }
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("CSV Fail"); }
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-live').innerText = "Km " + n.km;
}

/* ======= ESTAMPA DE ALTA VISIBILIDADE V10.4 ======= */
function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    
    const barH = h * 0.12; 
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, h - barH, w, barH);

    ctx.lineJoin = "round";
    ctx.shadowColor = "rgba(0,0,0,1)";
    ctx.shadowBlur = 15;
    
    // KM - SUPER DESTAQUE
    const fK = barH * 0.45;
    ctx.font = `900 ${fK}px Arial Black`;
    ctx.textAlign = "left";
    
    // Borda preta dupla para contraste total
    ctx.lineWidth = 10;
    ctx.strokeStyle = "black";
    ctx.strokeText("Km " + m.km, w * 0.04, h - (barH * 0.5));
    
    ctx.fillStyle = "white";
    ctx.fillText("Km " + m.km, w * 0.04, h - (barH * 0.5));

    // DATA - DISCRETA MAS NITIDA
    const fD = barH * 0.22;
    ctx.font = `900 ${fD}px Arial`;
    ctx.textAlign = "right";
    
    ctx.lineWidth = 6;
    ctx.strokeStyle = "black";
    ctx.strokeText(m.ts, w * 0.96, h - (barH * 0.2));
    ctx.fillText(m.ts, w * 0.96, h - (barH * 0.2));
    
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = 297, ph = 210;

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, pw, ph, undefined, 'FAST'); 
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`INSPECAO_LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const limit = parseInt(document.getElementById('cfg-lote').value) || 300;
    buffer.push({
        raw: can.toDataURL('image/jpeg', 0.6), // Leve aumento na qualidade da captura
        km: document.getElementById('km-live').innerText.replace("Km ", ""),
        ts: new Date().toLocaleString('pt-BR')
    });
    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${limit}`;
    if(buffer.length >= limit) save();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

document.getElementById('btn-f').onclick = async () => {
    hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btn-f').innerText = "PASTA SELECIONADA ✓";
    document.getElementById('btn-on').disabled = false;
};

document.getElementById('btn-on').onclick = () => {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    rec = true; loop();
    document.getElementById('btn-on').disabled = true;
    document.getElementById('btn-off').disabled = false;
};

document.getElementById('btn-off').onclick = () => { 
    rec = false; 
    save(); 
    document.getElementById('btn-on').disabled = false; 
    document.getElementById('btn-off').disabled = true; 
};

function toggleS() { document.getElementById('set-panel').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
