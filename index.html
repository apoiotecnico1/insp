<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --danger: #ff003c; 
            --bg: #000;
            --panel: rgba(20, 25, 30, 0.95);
            --placa-verde: #06723b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* --- UI ELEMENTS --- */
        #app-shell { visibility: hidden; opacity: 0; transition: 1s; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .hud-left { position: absolute; top: 25px; left: 25px; z-index: 100; }
        #km-hud { 
            background: var(--placa-verde); padding: 12px 30px; border: 5px solid #fff; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #km-hud h1 { 
            font-size: 3rem; font-weight: 900; font-family: 'Arial Black', sans-serif; 
            letter-spacing: -2px; text-shadow: 2px 2px 0px #000;
        }

        /* HUD INFO (ESTATÍSTICAS) */
        #hud-stats {
            position: absolute; top: 25px; right: 25px; text-align: right;
            font-family: monospace; font-size: 14px; text-shadow: 1px 1px 2px #000;
        }

        #rec-tag { color: var(--danger); font-weight: bold; display: none; margin-bottom: 5px; }

        /* CONTROLES */
        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; z-index: 500; transition: 0.4s;
        }
        .ui-hidden { opacity: 0; pointer-events: none; }
        
        .btn-main { 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer; 
            padding: 20px 40px; text-transform: uppercase; font-size: 14px;
        }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: #333; color: #fff; padding: 20px; }

        /* PAINEL */
        #settings-panel { 
            position: fixed; right: -400px; top: 0; width: 380px; height: 100%; 
            background: var(--panel); backdrop-filter: blur(20px); z-index: 2000; 
            padding: 40px 30px; transition: 0.4s; overflow-y: auto;
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .field label { font-size: 11px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 8px; }
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; }
        
        .btn-action { 
            background: #444; color: #fff; border: none; padding: 12px; 
            width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold;
        }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate" style="position:fixed; inset:0; background:#000; z-index:8000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; max-width:400px; padding:20px;">
        <h2 style="color:var(--accent); margin-bottom:20px;">INSPEÇÃO PRO V6</h2>
        <button class="btn-main" id="btn-start" onclick="acceptSafety()" style="width:100%">Abrir Câmera e Definir Pasta</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div class="hud-left">
        <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    </div>

    <div id="hud-stats">
        <div id="rec-tag">● GRAVANDO</div>
        <div id="stat-lote">LOTE: 0/0</div>
        <div id="stat-total">TOTAL SESSÃO: 0</div>
    </div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-main" onclick="toggleSet()">⚙</button>
        <button id="btn-start" class="btn-main" onclick="startInspeção()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-main" onclick="stopInspeção()">Finalizar Relatório</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:20px">CONFIGURAÇÕES</h3>
    
    <div class="field">
        <label>Qualidade do Relatório</label>
        <select id="cfg-qual">
            <option value="0.4">Baixa (Arquivo leve)</option>
            <option value="0.7" selected>Média (Padrão)</option>
            <option value="0.9">Alta (Máximo detalhe)</option>
        </select>
    </div>

    <div class="field">
        <label>Mostrar Coordenadas no Relatório?</label>
        <select id="cfg-coords">
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>
    </div>

    <div class="field">
        <label>Fotos por Lote PDF</label>
        <input type="number" id="cfg-lote" value="50">
    </div>

    <div class="field">
        <label>Intervalo de Captura (ms)</label>
        <input type="number" id="cfg-int" value="300">
    </div>

    <div class="field">
        <label>Câmera Ativa</label>
        <select id="cam-select" onchange="initC(this.value)"></select>
    </div>

    <hr style="border-color:#333; margin-bottom:15px;">
    
    <button class="btn-action" style="background: #06723b;" onclick="openFolder()">📁 Ver Pasta de Relatórios</button>
    <button class="btn-action" onclick="toggleSet()">FECHAR</button>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], buffer=[], hDir=null, currentStream=null, rec=false, uiTimer, lastPos=null;
let totalSessao = 0;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        loadKMData();
        initGPS();
    } catch(e) { alert("Permissão necessária para salvar arquivos."); }
}

async function openFolder() {
    alert("Para ver os arquivos, abra o Gerenciador de Arquivos do seu dispositivo e vá até a pasta que você selecionou no início.");
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude };
        updateHUD();
    }, null, {enableHighAccuracy:true});
}

async function loadKMData() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateHUD() {
    if(!lastPos || !kmDB.length) return;
    let bestKM = null, minDist = Infinity;
    kmDB.forEach(pt => {
        const d = Math.hypot(lastPos.lt - pt.lt, lastPos.ln - pt.ln);
        if(d < minDist) { minDist = d; bestKM = pt; }
    });
    if(bestKM) document.getElementById('km-txt').innerText = "KM " + bestKM.km;
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initC(video[video.length-1].deviceId);
}

async function initC(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startInspeção() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.display = 'block';
    captureLoop();
}

function stopInspeção() {
    rec = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
    savePDF();
}

function captureLoop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const loteLimit = parseInt(document.getElementById('cfg-lote').value);
    
    buffer.push({
        img: can.toDataURL('image/jpeg', parseFloat(document.getElementById('cfg-qual').value)),
        km: document.getElementById('km-txt').innerText,
        lat: lastPos?.lt.toFixed(6),
        lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleString()
    });

    totalSessao++;
    document.getElementById('stat-lote').innerText = `LOTE: ${buffer.length}/${loteLimit}`;
    document.getElementById('stat-total').innerText = `TOTAL SESSÃO: ${totalSessao}`;

    if(buffer.length >= loteLimit) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF() {
    if(!buffer.length) return;
    const batch = [...buffer];
    buffer = [];
    const showCoords = document.getElementById('cfg-coords').value === 'sim';

    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height - barH, can.width, barH);
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText(batch[i].km, 50, can.height - (barH*0.45));
                
                ctx.font = `${barH * 0.15}px Arial`;
                let info = batch[i].ts;
                if(showCoords) info += ` | LAT: ${batch[i].lat} LON: ${batch[i].lon}`;
                ctx.fillText(info, 50, can.height - (barH*0.2));
                
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = batch[i].img;
        });
    }

    const nome = `INSP_${Date.now()}.pdf`;
    try {
        const file = await hDir.getFileHandle(nome, { create: true });
        const writable = await file.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch(e) { doc.save(nome); }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { if(rec) document.getElementById('ui-controls').classList.add('ui-hidden'); }, 5000);
}
</script>
</body>
</html>
