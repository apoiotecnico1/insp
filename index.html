<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Premium BR - 3D Real</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --verde-topo: #007934;
            --verde-base: #004d21;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* HUD - PLACA DE TRÂNSITO 3D GRADIENTE */
        #km-hud { 
            position: absolute; 
            top: env(safe-area-inset-top, 30px); 
            left: 25px; 
            z-index: 100; 
        }

        .placa-road {
            background: linear-gradient(135deg, var(--verde-topo) 0%, var(--verde-base) 100%);
            padding: 12px 28px;
            border: 3px solid #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 190px;
            position: relative;
        }

        /* Reflexo superior para parecer metal/placa real */
        .placa-road::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, transparent 100%);
            pointer-events: none; border-radius: 10px 10px 0 0;
        }

        .br-label { 
            font-size: 1.5rem; font-weight: 800; color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: -5px; letter-spacing: 2px;
        }

        .km-label { 
            font-size: 3.2rem; font-weight: 900; color: #fff;
            /* Efeito 3D Profundo */
            text-shadow: 2px 2px 0px #002d14, 4px 4px 0px #001a0b, 6px 6px 12px rgba(0,0,0,0.9);
        }

        /* Controles */
        #ui { 
            position: absolute; bottom: env(safe-area-inset-bottom, 35px); 
            left: 0; width: 100%; display: flex; justify-content: center; 
            gap: 20px; z-index: 500; align-items: center;
        }

        .btn { 
            border: none; padding: 20px 45px; border-radius: 50px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }
        
        .circle-btn {
            width: 65px; height: 65px; background: rgba(0,0,0,0.7);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; border: 2px solid rgba(255,255,255,0.3);
        }

        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        #rec-log { color: #ff0000; font-weight: 900; animation: blink 1s infinite; display: none; text-shadow: 0 0 10px rgba(0,0,0,1); }
        @keyframes blink { 50% { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <h1 style="color:var(--accent)">SISTEMA BR PRO</h1>
    <button class="btn" style="background:var(--accent)" onclick="init()">ATIVAR & ESCOLHER PASTA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="snap()"></video>
    
    <div id="km-hud">
        <div class="placa-road">
            <span class="br-label" id="br-txt">BR ---</span>
            <span class="km-label" id="km-txt">Km ---</span>
        </div>
    </div>

    <div id="ui">
        <div class="circle-btn" onclick="toggleFS()">⛶</div>
        <button id="btn-start" class="btn" style="background:var(--accent)" onclick="startLote()">INICIAR LOTE</button>
        <button id="btn-stop" class="btn" style="background:#ff0000; color:#fff; display:none;" onclick="stopLote()">GERAR RELATÓRIO PDF</button>
        <div id="rec-log">● GRAVANDO</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, stream=null;
let buffer = [], brGlobal = "---", lat="0", lon="0";

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function init() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        const d = await navigator.mediaDevices.enumerateDevices();
        const v = d.filter(i => i.kind === 'videoinput');
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: v[v.length-1].deviceId, width: 1920, height: 1080 } 
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
        
        loadCSV(); startGPS();
    } catch(e) { alert("Pasta necessária para operação."); }
}

// RENDERIZAÇÃO DA PLACA 3D NO CANVAS (PARA JPG E PDF)
function drawPlaca3D(km, br) {
    const s = can.height / 1080;
    ctx.save();
    
    const w = 360 * s, h = 180 * s;
    const x = 50 * s, y = 50 * s;
    
    // 1. Sombra projetada no asfalto (foto)
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 30 * s;
    ctx.shadowOffsetX = 12 * s;
    ctx.shadowOffsetY = 12 * s;
    
    // 2. Fundo Gradiente Realista
    const grad = ctx.createLinearGradient(x, y, x + w, y + h);
    grad.addColorStop(0, "#007934"); // Verde claro topo
    grad.addColorStop(1, "#004d21"); // Verde escuro base
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 15 * s);
    ctx.fill();
    
    // 3. Borda Branca da Placa
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 5 * s;
    ctx.stroke();

    // 4. Reflexo de brilho superior
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.beginPath();
    ctx.roundRect(x + 5*s, y + 5*s, w - 10*s, h/2, 10 * s);
    ctx.fill();

    ctx.textAlign = "center";
    
    // 5. Texto BR
    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${52 * s}px Arial`;
    ctx.shadowColor = "rgba(0,0,0,0.9)";
    ctx.shadowBlur = 5 * s;
    ctx.fillText("BR " + br, x + w/2, y + 65 * s);
    
    // 6. Texto KM (3D Camadas)
    ctx.font = `900 ${100 * s}px Arial`;
    // Sombra de profundidade (dark green)
    ctx.shadowColor = "#00240f";
    ctx.shadowOffsetX = 4 * s;
    ctx.shadowOffsetY = 4 * s;
    ctx.shadowBlur = 0;
    ctx.fillText("Km " + km, x + w/2, y + 145 * s);
    
    ctx.restore();

    // Rodapé de Dados
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, can.height - (50*s), can.width, 50*s);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${24 * s}px Arial`;
    ctx.fillText(`${new Date().toLocaleString()} | BR ${br} | GPS: ${lat}, ${lon}`, 30*s, can.height - (18*s));
}

async function snap() {
    if(!hDir) return;
    document.getElementById('flash').style.opacity = "1";
    setTimeout(() => document.getElementById('flash').style.opacity = "0", 100);

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawPlaca3D(km, brGlobal);
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fh = await hDir.getFileHandle(`BR${brGlobal}_KM${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function startLote() {
    capturing = true; buffer = [];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-log').style.display = 'block';
    loop();
}

function stopLote() {
    capturing = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-log').style.display = 'none';
    if(buffer.length > 0) savePDF([...buffer]);
}

async function loop() {
    if (!capturing) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawPlaca3D(km, brGlobal);
    buffer.push(can.toDataURL('image/jpeg', 0.65));
    
    if (buffer.length >= 50) { savePDF([...buffer]); buffer = []; }
    setTimeout(loop, 400);
}

async function savePDF(imgs) {
    const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < imgs.length; i++) {
        if (i > 0) pdf.addPage();
        pdf.addImage(imgs[i], 'JPEG', 0, 0, 297, 210);
    }
    const fh = await hDir.getFileHandle(`LOTE_BR${brGlobal}_${Date.now()}.pdf`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(pdf.output('blob')); await sw.close();
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude.toFixed(6); lon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let b = null, m = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < m) { m = d; b = pt; }
        }
        if (b) {
            brGlobal = b.br;
            document.getElementById('br-txt').innerText = "BR " + brGlobal;
            document.getElementById('km-txt').innerText = "Km " + b.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr = h.indexOf('br'), ikm = h.indexOf('km'), ilat = h.findIndex(x=>x.includes('lat')), ilon = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat].replace(',','.')), ln: parseFloat(c[ilon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}
</script>
</body>
</html>
