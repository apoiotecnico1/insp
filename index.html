<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V24 - OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --danger: #ff003c; 
            --placa-verde: #0a8a4d;
            --panel: rgba(15, 20, 25, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: #050505; color: #fff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; height: 100vh; user-select: none;
        }

        /* --- SPLASH VORTEX --- */
        #splash-hypnos { 
            position: fixed; inset: 0; background: #000; z-index: 9000; 
            display: flex; align-items: center; justify-content: center; transition: opacity 0.8s;
        }
        .vortex {
            width: 100px; height: 100px; border: 4px solid var(--accent); 
            border-radius: 35% 65% 60% 40% / 45% 45% 55% 55%;
            animation: rotate-vortex 2s linear infinite, glow-pulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }
        @keyframes glow-pulse { from { box-shadow: 0 0 10px var(--accent); } to { box-shadow: 0 0 40px var(--accent); } }

        /* --- SAFETY GATE --- */
        #safety-gate { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 8000; 
            display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(10px);
        }
        .alert-box { 
            border: 1px solid #333; padding: 30px; border-radius: 20px; 
            max-width: 400px; background: #111; text-align: center;
        }
        .btn-aware { 
            background: var(--accent); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 12px; cursor: pointer; width: 100%; text-transform: uppercase;
        }

        /* --- UI PRINCIPAL --- */
        #app-shell { visibility: hidden; opacity: 0; transition: 1s; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }

        /* --- PLACA DE KM (ESTILO ENGENHARIA) --- */
        #km-container { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; }
        #km-plate { 
            background: var(--placa-verde); 
            padding: 15px 25px; border: 4px solid #fff; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        #km-txt { font-size: 2.8rem; font-weight: 900; font-family: 'Courier New', monospace; color: #fff; line-height: 1; }

        /* --- REC INDICATOR --- */
        #rec-tag { 
            position: absolute; top: 30px; right: 30px; z-index: 100;
            display: none; align-items: center; gap: 8px; 
            background: rgba(255,0,0,0.2); padding: 6px 12px; border-radius: 6px;
            color: #ff3333; font-weight: bold;
        }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* --- CONTROLES --- */
        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 20px; z-index: 500; transition: 0.5s;
        }
        .ui-hidden { opacity: 0; bottom: 20px; pointer-events: none; }

        .btn-main { 
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; padding: 20px 50px; font-size: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: var(--panel); color: #fff; padding: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        /* --- PAINEL CONFIGURAÇÕES --- */
        #settings-panel { 
            position: fixed; right: -380px; top: 0; width: 350px; height: 100%; 
            background: var(--panel); backdrop-filter: blur(30px); z-index: 2000; 
            padding: 50px 30px; transition: 0.4s; border-left: 1px solid rgba(255,255,255,0.1); 
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        select, input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #444; color: #fff; padding: 14px; border-radius: 10px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-hypnos"><div class="vortex"></div></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:20px;">INSPEÇÃO OPERACIONAL</h2>
        <div style="text-align:left; color:#ddd; font-size:0.9rem; margin-bottom:30px;">
            <p>• Veículo em posição segura.</p>
            <p>• Dispositivo fixado no suporte.</p>
            <p>• Mãos livres para condução.</p>
        </div>
        <button class="btn-aware" onclick="acceptSafety()">Configurar Pasta e Iniciar</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-container">
        <div id="km-plate"><h1 id="km-txt">KM ---+---</h1></div>
    </div>

    <div id="rec-tag"><div class="dot"></div> GRAVANDO</div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-main" onclick="toggleSet(); event.stopPropagation();">⚙</button>
        <button id="btn-start" class="btn-main" onclick="startInspeção(); event.stopPropagation();">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-main" onclick="stopInspeção(); event.stopPropagation();">Finalizar Relatório</button>
    </div>
</div>

<div id="settings-panel">
    <h2 style="color:var(--accent); margin-bottom:30px; font-weight:300">OPÇÕES</h2>
    <div class="field"><label>Selecionar Câmera</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="300"></div>
    <div class="field"><label>Fotos por Lote</label><input type="number" id="cfg-lote" value="100"></div>
    <button class="btn-aware" onclick="toggleSet()" style="background:#222; color:#fff; border:1px solid #444">FECHAR</button>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], buffer=[], hDir=null, currentStream=null, rec=false, uiTimer, lastPos=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash-hypnos').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-hypnos').remove();
            document.getElementById('safety-gate').style.display = 'flex';
        }, 800);
    }, 2000);
    loadKM();
    initGPS();
};

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        wakeUI();
    } catch(e) { alert("Acesso à pasta é obrigatório."); }
}

function hav(a,b,c,d){
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

async function loadKM() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.warn("Erro ao carregar CSV."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude };
        if(!kmDB.length) return;
        let bKM=null, dKM=Infinity;
        for(const pt of kmDB){
            const d=hav(lastPos.lt, lastPos.ln, pt.lt, pt.ln);
            if(d<dKM){ dKM=d; bKM=pt; }
        }
        if(bKM) document.getElementById('km-txt').innerText = "KM " + bKM.km;
    }, null, {enableHighAccuracy:true});
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = `${i+1}`; // Apenas o número da câmera
        sel.appendChild(opt);
    });
    if(video.length) initC(video[video.length-1].deviceId);
}

async function initC(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startInspeção() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.display = 'flex';
    captureLoop();
}

function stopInspeção() {
    rec = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
    savePDF();
}

function captureLoop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.7), // Qualidade fixa para estabilidade
        km: document.getElementById('km-txt').innerText,
        lat: lastPos?.lt.toFixed(6), lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleString()
    });
    if(buffer.length >= parseInt(document.getElementById('cfg-lote').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const batch = [...buffer]; buffer = [];
    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                // Desenha imagem original no canvas
                ctx.drawImage(img, 0, 0);
                // Lógica de salvamento idêntica à base: desenha tarja e texto no canvas antes de converter
                const barH = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, can.height - barH, can.width, barH);
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${barH * 0.3}px Arial`;
                ctx.fillText(batch[i].km, 50, can.height - (barH*0.5));
                ctx.font = `${barH * 0.12}px Arial`;
                ctx.fillText(`${batch[i].ts} | LAT: ${batch[i].lat} LON: ${batch[i].lon}`, 50, can.height - (barH*0.25));
                
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = batch[i].img;
        });
    }

    const d = new Date();
    const nome = `INSP_${d.getFullYear()}${d.getMonth()+1}${d.getDate()}_${Date.now()}.pdf`;
    try {
        const file = await hDir.getFileHandle(nome, { create: true });
        const writable = await file.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch(e) { doc.save(nome); }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => { document.getElementById('ui-controls').classList.add('ui-hidden'); }, 4000);
}
</script>
</body>
</html>
