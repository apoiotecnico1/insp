<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00d9ff; --dark-bg: #000; }
        body { margin: 0; background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* VIEWPORT MAXIMIZADO */
        #viewport { position: relative; width: 100vw; height: 65vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 5;
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 6px 16px;
            font-size: 2.2rem; font-weight: 900; border: 3px solid #fff;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none;
        }

        #controls { flex-grow: 1; display: flex; flex-direction: column; background: #111; padding: 0; margin: 0; justify-content: space-between; }

        .status-bar { display: flex; justify-content: space-around; padding: 5px; font-size: 0.65rem; background: #1a1a1a; }
        .st { padding: 2px 8px; border-radius: 10px; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; background: #000; }
        .card { background: #111; padding: 10px 5px; text-align: center; border-bottom: 1px solid #222; }
        .card label { font-size: 0.6rem; color: #666; display: block; margin-bottom: 2px; }
        .val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--accent); }

        /* BOTÕES SEM ESPAÇOS - COLADOS NO RODAPÉ */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin: 0; padding: 0; }
        button.action { height: 70px; border: none; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; border-top: 1px solid rgba(255,255,255,0.1); }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #btnStart:disabled { background: #00441b; color: #555; }

        #settings-trigger { position: absolute; top: 15px; right: 15px; z-index: 1000; background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
        #settings-panel { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: #0b1224; z-index: 2000; transition: 0.4s; padding: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        #settings-panel.active { right: 0; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px;">CONFIGURAÇÕES</h3>
    <div style="margin:20px 0">Câmera: <select id="cfgCam" onchange="initCamera()" style="width:100%; padding:8px;"><option value="environment">Traseira</option><option value="user">Frontal</option></select></div>
    <div style="margin:20px 0">Fotos Lote: <input type="number" id="cfgBatch" value="200" style="width:100%; padding:8px;"></div>
    <div style="margin:20px 0">Ajuste Brilho: <input type="range" id="cfgBright" min="50" max="150" value="100" style="width:100%;"></div>
    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; font-weight:bold; margin-top:20px;">SALVAR</button>
</div>

<div id="main-container">
    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: ...</div>
            <div id="stGps" class="st">GPS: ...</div>
        </div>

        <div class="dashboard">
            <div class="card"><label>FOTOS TOTAL</label><span id="txtTotal" class="val">0</span></div>
            <div class="card"><label>NO LOTE</label><span id="txtBuffer" class="val">0/200</span></div>
            <div id="btnSaveManual" class="card" style="background:#002244; cursor:pointer"><label style="color:#fff">GERAR PDF</label><span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="action">INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

// --- MOTOR DE CSV COMPLETO ---
async function loadKMCSV(){
    try {
        const resp = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const text = await resp.text();
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        const head = lines.shift().split(';');
        
        // Localiza as colunas de KM, Lat e Lon
        const iKm = head.findIndex(h => h.toLowerCase().includes('km'));
        const iLat = head.findIndex(h => h.toLowerCase().includes('lat'));
        const iLon = head.findIndex(h => h.toLowerCase().includes('lon') || h.toLowerCase().includes('long'));
        
        kmDataset = lines.map(l => {
            const r = l.split(';');
            return { 
                km: r[iKm], 
                lat: parseFloat(r[iLat]?.replace(',', '.')), 
                lon: parseFloat(r[iLon]?.replace(',', '.')) 
            };
        }).filter(p => !isNaN(p.lat));
        
        document.getElementById('stCsv').textContent = "CSV: OK (" + kmDataset.length + ")";
        document.getElementById('stCsv').classList.add('ok');
    } catch(e) { document.getElementById('stCsv').textContent = "CSV: ERRO"; }
}

// --- GPS E CÁLCULO ---
navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    document.getElementById('stGps').classList.add('ok');
    updateKM();
}, null, {enableHighAccuracy:true});

function updateKM() {
    if(!lastPos || !kmDataset.length) return;
    let best = kmDataset, bd = Infinity;
    for(const p of kmDataset){
        const d = Math.hypot(p.lat - lastPos.lat, p.lon - lastPos.lon);
        if(d < bd){ bd = d; best = p; }
    }
    document.getElementById('kmPlaque').textContent = "KM " + best.km;
}

// --- CÂMERA ---
async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: document.getElementById('cfgCam').value, width: 1280, height: 720 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// --- DESENHO DO PDF (CENTRALIZADO NA PLACA VERDE) ---
function drawStamp(item) {
    const w = can.width, h = can.height;
    const textKM = "KM " + item.km;
    const placaH = h * 0.14;
    ctx.font = `900 ${placaH * 0.65}px Arial Black`;
    const textW = ctx.measureText(textKM).width;
    const paddingX = placaH * 0.45; 
    const placaW = textW + (paddingX * 2);
    const posX = 50, posY = h - placaH - 70;

    ctx.save();
    const grd = ctx.createLinearGradient(posX, posY, posX, posY + placaH);
    grd.addColorStop(0, "#0a8a4d"); grd.addColorStop(1, "#056b3c");
    ctx.fillStyle = grd; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 8;
    
    // Placa Verde
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(posX, posY, placaW, placaH, 15);
    else ctx.rect(posX, posY, placaW, placaH); // Fallback
    ctx.fill(); ctx.stroke();
    
    // Texto KM
    ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
    ctx.fillText(textKM, posX + (placaW/2), posY + (placaH/2));
    
    // Data e GPS
    ctx.restore(); ctx.fillStyle = "white"; ctx.font = "bold 24px Arial";
    ctx.shadowColor = "black"; ctx.shadowBlur = 5;
    ctx.fillText(`${item.ts} | LAT: ${item.lat} LON: ${item.lon}`, posX, h - 25);
}

async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++; document.getElementById('txtPdfs').textContent = pdfCount;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i>0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.filter = `brightness(${document.getElementById('cfgBright').value}%)`;
                ctx.drawImage(img, 0, 0);
                drawStamp(batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].img;
        });
    }
    doc.save(`INSPECAO_LOTE_${pdfCount}.pdf`);
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        lat: lastPos?.lat.toFixed(6) || "0",
        lon: lastPos?.lon.toFixed(6) || "0",
        ts: new Date().toLocaleString()
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${document.getElementById('cfgBatch').value}`;
    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(captureLoop, 200); 
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
document.getElementById('btnSaveManual').onclick = savePDF;

// Inicia
loadKMCSV();
initCamera();
</script>
</body>
</html>
