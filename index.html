<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a5ccf" />
<title>Inspeção – Captura Direta (Foto)</title>
<style>
  :root{
    --panelA:rgba(8,14,30,.82); --panelB:rgba(6,10,24,.78);
    --blue:#0a77d5; --blueDark:#095fb0; --border:#e9f2ff;
    --btnH:68px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0; background:linear-gradient(180deg,#0b122b,#0a1024); color:#eaf2ff;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,"Noto Sans",sans-serif;
    overflow:hidden; -webkit-user-select:none; user-select:none;
  }

  /* Tela cheia */
  #app{ position:fixed; inset:0; display:grid; grid-template-rows:1fr; }
  #camWrap{ position:relative; width:100%; height:100%; overflow:hidden; background:#000; isolation:isolate; }
  #vid{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000 }

  /* HUD topo: placa azul + compartilhar */
  #hudTop{
    position:absolute; top:10px; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; z-index:3;
    padding:0 10px; pointer-events:none;
  }
  .road-sign{
    display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:128px; padding:12px 16px 14px;
    background:linear-gradient(180deg, var(--blue), var(--blueDark));
    color:#ffffff; border-radius:14px;
    border:6px solid var(--border);
    box-shadow: 0 8px 24px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.75);
    text-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  .km-label{ font:900 1.05rem system-ui; letter-spacing:.02em; line-height:1 }
  .km-eq{ font:900 1.65rem system-ui; letter-spacing:.02em; line-height:1.05 }   /* “km = XX” */

  .chipBtn{
    pointer-events:auto;
    display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:12px;
    background:linear-gradient(180deg,var(--panelA),var(--panelB));
    border:1px solid rgba(255,255,255,.16); box-shadow:0 14px 36px rgba(0,0,0,.45);
    cursor:pointer; user-select:none; color:#eaf2ff; font-weight:900;
  }

  /* HUD base: único botão */
  #hudBottom{
    position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; z-index:3;
  }
  .btn{
    pointer-events:auto;
    height:var(--btnH); min-width:240px; padding:0 22px;
    border-radius:14px; border:2px solid #1f2b56;
    background:linear-gradient(180deg,#0f1a45,#0c1436);
    color:#eaf2ff; font-weight:900; font-size:1.12rem; letter-spacing:.02em;
    display:flex; align-items:center; justify-content:center; gap:12px; cursor:pointer;
    box-shadow:0 14px 36px rgba(0,0,0,.45);
  }
  .btn:active{ transform:translateY(1px) }
  .btn.auto-on{ background:linear-gradient(180deg,#ff8f49,#e06a2d); color:#1b0b02; border-color:#c45722 }
  .btn.primary{ background:linear-gradient(180deg,#31e27b,#22c55e); color:#062a1a; border-color:#1fb85b }

  /* Gate pasta */
  #folderGate{
    position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%, #0c2a3f, transparent 65%), #060a12;
  }
  .gateCard{
    background:linear-gradient(180deg, rgba(16,26,64,.9), rgba(14,22,52,.9));
    border:1px solid rgba(255,255,255,.16); border-radius:16px; padding:20px; width:min(92vw, 480px);
    color:#cfe1ff; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .gateCard h2{ margin:0 0 10px } .gateCard p{ margin:0 0 14px; opacity:.9 }
  .gateCard .btn{ width:100%; height:56px }

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%); display:none; z-index:20;
    background:linear-gradient(180deg, rgba(0,0,0,.78), rgba(0,0,0,.64));
    border:1px solid rgba(255,255,255,.16); color:#eaf2ff; padding:10px 14px; border-radius:12px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>

    <!-- HUD topo: placa azul + compartilhar -->
    <div id="hudTop">
      <div class="road-sign">
        <div class="km-label">km</div>
        <div class="km-eq" id="kmEq">km = —</div>
      </div>
      <div id="btnShare" class="chipBtn" title="Enviar por WhatsApp">📤 Compartilhar</div>
    </div>

    <!-- HUD base: único botão -->
    <div id="hudBottom">
      <button id="btnAuto" class="btn primary">🎬 INICIAR AUTO</button>
    </div>
  </div>
</div>

<!-- Gate: selecionar pasta -->
<div id="folderGate" aria-modal="true" role="dialog">
  <div class="gateCard">
    <h2>Selecionar Pasta de Saída</h2>
    <p>As <b>fotos (JPG)</b> serão gravadas automaticamente na pasta escolhida.</p>
    <button id="btnPickFolder" class="btn">📁 Escolher pasta</button>
    <p style="margin-top:10px;opacity:.85">Requisitos: Chrome/Edge em <b>HTTPS</b>. Mantenha <code>SNVBR116SPRJ.csv</code> (KM) na mesma pasta do HTML.</p>
  </div>
</div>

<div id="toast"></div>

<script>
/* =================== ESTADO/REFS =================== */
let rootDirHandle=null;           // pasta destino
let csvKMReady=false, camReady=false, gpsReady=false;
let lastPos=null;
let isAuto=false, autoTimer=null, writing=false, queue=Promise.resolve();

const vid=document.getElementById('vid');
const kmEq=document.getElementById('kmEq');
const btnAuto=document.getElementById('btnAuto');
const folderGate=document.getElementById('folderGate'), btnPickFolder=document.getElementById('btnPickFolder');
const btnShare=document.getElementById('btnShare');
const toast=document.getElementById('toast');

/* CONFIG FIXA (sem opções na tela) */
const AUTO_MS = 800;        // intervalo fixo
const MAX_DIM = 1920;       // resolução máxima (maior lado)
const JPG_Q   = 0.92;       // qualidade JPG
const SHOW_TS = false;      // sem data/hora no carimbo por padrão
const SHOW_GPS= false;      // sem coordenadas no carimbo por padrão
const KM_STAMP_MODE = 'comma'; // sempre "km K,mmm" dentro da FOTO

/* =============== WAKE LOCK (manter tela ligada) =============== */
let wakeLock=null, keepAliveTimer=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener?.('release', ()=>{ if(isAuto) requestWakeLock(); });
    }else{
      keepAliveTimer = setInterval(()=>{}, 30000);
    }
  }catch(e){ console.warn('WakeLock falhou:', e); }
}
async function releaseWakeLock(){
  try{ await wakeLock?.release?.(); }catch{} finally{ wakeLock=null; }
  if(keepAliveTimer){ clearInterval(keepAliveTimer); keepAliveTimer=null; }
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && isAuto){ requestWakeLock(); }});
window.addEventListener('pagehide', releaseWakeLock);
window.addEventListener('beforeunload', releaseWakeLock);

/* =================== UI/UTILS =================== */
function showToast(msg,ms=1500){ toast.textContent=msg; toast.style.display='block'; clearTimeout(showToast.t); showToast.t=setTimeout(()=>toast.style.display='none',ms); }
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function stampStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours())}-${String(d.getMinutes())}-${String(d.getSeconds())}`; }
function fmtKMMM(val){ const K=Math.floor(val); let m=Math.round((val-K)*1000); if(m>=1000){m-=1000;} return {K, mmm:String(m).padStart(3,'0')}; }

/* =================== PASTA/PERMISSÃO =================== */
async function verifyPermission(handle, rw){
  const opt={mode:rw?'readwrite':'read'};
  const q=await handle.queryPermission?.(opt);
  if(q==='granted') return true;
  const r=await handle.requestPermission?.(opt);
  return r==='granted';
}
async function pickFolder(){
  try{
    rootDirHandle = await window.showDirectoryPicker({mode:'readwrite'});
    const ok=await verifyPermission(rootDirHandle,true);
    if(!ok){ showToast('Permissão negada na pasta'); return; }
    folderGate.style.display='none'; showToast('Pasta OK');
  }catch(e){ showToast('Seleção cancelada'); }
}
btnPickFolder.addEventListener('click', pickFolder);

/* =================== KM (CSV) =================== */
let kmPoints=[], kmGrid=new Map();
const CELL=0.005;
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=120,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${ky+dy},${kx+dx}`); if(a) out.push(...a);
      }
    }
  } return out;
}
async function loadKM(){
  try{
    const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
    kmPoints=[];
    for(const ln of lines){
      const c=ln.split(';');
      const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
      const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
      const t=(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon))?t1:
               (Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon))?t2:null;
      if(t) kmPoints.push(t);
    }
    kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
    csvKMReady = kmPoints.length>0;
  }catch{ csvKMReady=false; }
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const c=gridCands(kmGrid,lat,lon,140); if(!c.length) return null;
  let best=null,bd=Infinity; for(const p of c){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best;
}
function refreshSign(){
  if(!lastPos || !csvKMReady) return;
  const n=nearestKM(lastPos.lat,lastPos.lon);
  if(!n){ kmEq.textContent='km = —'; return; }
  const {K} = fmtKMMM(n.km);
  kmEq.textContent = `km = ${K}`;
}
setInterval(refreshSign, 600);

/* =================== CÂMERA =================== */
async function startCamera(){
  try{
    const st=await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30,max:30} },
      audio:false
    });
    vid.srcObject=st;
    await vid.play().catch(()=>{});
    await new Promise(res=>{ if(vid.readyState>=2 && vid.videoWidth) res(); else vid.onloadeddata=()=>res(); });
    camReady=true;
  }catch(e){ camReady=false; showToast('Falha na câmera'); }
}

/* =================== GPS =================== */
function startGPS(){
  if(!('geolocation' in navigator)){ gpsReady=false; return; }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true;
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
    },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
  },()=>{ gpsReady=false; }, {enableHighAccuracy:true, timeout:12000});
}

/* =================== CARIMBO NA FOTO =================== */
/* — pequeno, alinhado, linha única: “km K,mmm” — */
function drawStamp(ctx,w,h,kmText,tsStr,gpsStr){
  const bandH=Math.max(72,Math.round(h*0.10));  // faixa menor pra não sobrepor
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,h-bandH,w,bandH);
  const fMain=Math.round(h*0.038);   // tamanho contido
  const fSub =Math.round(h*0.026);

  // KM (sempre)
  ctx.fillStyle='#d8ffe6'; ctx.textAlign='left'; ctx.font=`900 ${fMain}px system-ui`;
  ctx.fillText(kmText,16,h-bandH+Math.round(bandH*0.60));

  // Data/Hora (opcional, default OFF)
  if (SHOW_TS){
    ctx.fillStyle='#fff'; ctx.font=`700 ${fSub}px system-ui`;
    ctx.fillText(tsStr,16,h-16);
  }
  // GPS (opcional, default OFF)
  if (SHOW_GPS && gpsStr){
    ctx.fillStyle='#cfe7ff'; ctx.font=`600 ${fSub}px system-ui`;
    ctx.fillText(gpsStr,16,h-bandH+24);
  }
}

/* =================== CAPTURA → toBlob → write(blob) =================== */
async function frameToJpegBlob(){
  const vw=vid.videoWidth||1920, vh=vid.videoHeight||1080;
  const sc=(Math.max(vw,vh)>MAX_DIM)? (MAX_DIM/Math.max(vw,vh)) : 1;
  const w=Math.round(vw*sc), h=Math.round(vh*sc);

  const can=document.createElement('canvas'); const ctx=can.getContext('2d',{alpha:false});
  can.width=w; can.height=h; ctx.drawImage(vid,0,0,w,h);

  // KM para o carimbo na FOTO: “km K,mmm”
  let kmText='km —';
  if (csvKMReady && lastPos){
    const n=nearestKM(lastPos.lat,lastPos.lon);
    if(n){ const {K, mmm}=fmtKMMM(n.km); kmText = `km ${K},${mmm}`; }
  }
  const ts=new Date().toLocaleString();
  let gps=''; if(SHOW_GPS && lastPos) gps=`${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)`;

  drawStamp(ctx,w,h,kmText,ts,gps);

  // ESQUEMA DO RELATÓRIO
  const blob = await new Promise(res=>can.toBlob(res,'image/jpeg',JPG_Q));
  if(blob && blob.size>0) return blob;

  // Fallback simples: dataURL → Blob
  const dataURL = can.toDataURL('image/jpeg', JPG_Q);
  const bin = atob(dataURL.split(',')[1]); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
  return new Blob([u8], {type:'image/jpeg'});
}

async function savePhotoOnce(){
  if(writing) return;
  if(!(rootDirHandle && camReady && gpsReady && csvKMReady && vid.videoWidth)) return;

  writing=true;
  try{
    const ok=await verifyPermission(rootDirHandle,true);
    if(!ok){ showToast('Permissão na pasta'); writing=false; return; }

    const blob = await frameToJpegBlob();

    // Nome: FOTO_km_K_mmm_YYYY-MM-DD_HH-MM-SS.jpg (usa vírgula no carimbo, mas no nome usa "_")
    let kPart='K', mPart='000';
    if (csvKMReady && lastPos){
      const n=nearestKM(lastPos.lat,lastPos.lon);
      if(n){ const {K, mmm}=fmtKMMM(n.km); kPart=String(K); mPart=mmm; }
    }
    const name = `FOTO_km_${kPart}_${mPart}_${stampStr()}.jpg`;

    const fh = await rootDirHandle.getFileHandle(name,{create:true});
    const w = await fh.createWritable();
    await w.write(blob);          // ← igual ao relatório
    await w.close();

    // checagem simples
    const f=await fh.getFile();
    if(f.size===0){
      const blob2=await frameToJpegBlob();
      const w2=await fh.createWritable(); await w2.write(blob2); await w2.close();
    }
  }catch(err){
    console.error('Salvar foto erro:', err); showToast('Falha ao salvar foto');
  }finally{
    writing=false;
  }
}

/* =================== AUTO c/ Wake Lock =================== */
function startAuto(){
  if(isAuto) return;
  if(!(rootDirHandle && camReady && gpsReady && csvKMReady)){ showToast('Aguarde Pasta/Câmera/GPS/CSV'); return; }
  isAuto=true;
  btnAuto.textContent='⏹ PARAR AUTO'; btnAuto.classList.add('auto-on'); btnAuto.classList.remove('primary');

  requestWakeLock();                 // mantém a tela ligada
  queue = queue.then(()=>savePhotoOnce()).catch(()=>{});
  autoTimer=setInterval(()=>{ queue = queue.then(()=>savePhotoOnce()).catch(()=>{}); }, AUTO_MS);
  showToast('Auto ON');
}
function stopAuto(){
  if(!isAuto) return;
  isAuto=false;
  btnAuto.textContent='🎬 INICIAR AUTO'; btnAuto.classList.remove('auto-on'); btnAuto.classList.add('primary');
  clearInterval(autoTimer); autoTimer=null;
  releaseWakeLock();
  showToast('Auto OFF');
}
btnAuto.addEventListener('click', ()=>{ if(isAuto) stopAuto(); else startAuto(); });

/* =================== Compartilhar (WhatsApp via Web Share) =================== */
async function shareInstant(){
  try{
    const blob = await frameToJpegBlob();
    const file = new File([blob], `captura_${stampStr()}.jpg`, {type:'image/jpeg', lastModified:Date.now()});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], text:'Evidência de inspeção – captura instantânea.' });
    }else{
      const msg = encodeURIComponent('Evidência de inspeção – captura instantânea.');
      window.open(`https://wa.me/?text=${msg}`, '_blank');
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
    }
  }catch(err){ console.error('Share erro:', err); showToast('Não foi possível compartilhar'); }
}
btnShare.addEventListener('click', ()=>{ shareInstant().catch(()=>{}); });

/* =================== BOOT =================== */
async function boot(){
  await startCamera();
  startGPS();
  await loadKM();
  refreshSign();
}
boot();
</script>
</body>
</html>
