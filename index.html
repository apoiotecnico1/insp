<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angstrom - Gestão de Ativos por KM</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0f172a;
            --slate: #1e293b;
            --white: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Header Elite */
        .header-ceo { background: var(--slate); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .km-badge { background: var(--gold); color: black; padding: 10px 20px; border-radius: 8px; font-weight: 900; font-size: 1.2em; border: 2px solid white; }

        /* Painel de Controle */
        .control-panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); margin-bottom: 15px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }

        /* Botão de Voz e Ação */
        .action-grid { display: grid; grid-template-columns: 60px 1fr 1fr; gap: 10px; align-items: center; }
        .voice-btn { height: 60px; border-radius: 50%; border: none; background: #ef4444; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .voice-btn.active { background: #22c55e; animation: pulse 1s infinite; }
        .btn-main { height: 60px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-start { background: var(--gold); color: black; }
        .btn-stop { background: #334155; color: white; border: 1px solid var(--gold); }

        /* Atalhos Angstrom */
        .shortcuts { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; }
        .btn-short { white-space: nowrap; background: #334155; border: 1px solid #475569; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85em; }
        .btn-short:hover { background: var(--gold); color: black; }

        /* Tabela de Referência (O que você pediu) */
        .ref-table { width: 100%; border-collapse: collapse; background: var(--slate); border-radius: 10px; overflow: hidden; margin-top: 15px; font-size: 0.9em; }
        .ref-table th { background: #111827; color: var(--gold); padding: 12px; text-align: left; }
        .ref-table td { padding: 12px; border-bottom: 1px solid #334155; }
        .km-cell { font-weight: bold; color: var(--gold); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ceo">
        <div>
            <h2 style="margin:0">ANGSTROM <span style="font-weight:100">OPERATIONS</span></h2>
            <small id="current-date"></small>
        </div>
        <div id="status-box" style="text-align:right">
            <div class="km-badge" id="last-km">REF: KM --</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="input-row">
            <div>
                <label><small>LOCALIZAÇÃO (KM)</small></label>
                <input type="text" id="kmInput" placeholder="Ex: 145+200">
            </div>
            <div>
                <label><small>SENTIDO / PISTA</small></label>
                <select id="sentidoInput">
                    <option value="Norte">Norte (SP)</option>
                    <option value="Sul">Sul (RJ)</option>
                    <option value="Interno">Interno (ADM)</option>
                    <option value="Canteiro">Canteiro Central</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom:10px">
            <label><small>DESCRIÇÃO TÉCNICA DA OPERAÇÃO</small></label>
            <textarea id="descInput" rows="2" placeholder="O que foi executado neste ponto?"></textarea>
        </div>

        <div class="action-grid">
            <button class="voice-btn" id="voiceBtn" onclick="startVoice()">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <div id="timer" style="font-family:monospace; font-size:1.5em; text-align:center">00:00:00</div>
            <button id="mainBtn" class="btn-main btn-start" onclick="handleAction()">Iniciar Registro</button>
        </div>
    </div>

    <div class="shortcuts">
        <button class="btn-short" onclick="setFast('Inspeção Elétrica de Ativos', 'Mitigação de falhas e conformidade técnica')">⚡ Elétrica</button>
        <button class="btn-short" onclick="setFast('Manutenção em Rede de Fibra Óptica', 'Garantia de integridade do backbone Angstrom')">🌐 Fibra</button>
        <button class="btn-short" onclick="setFast('Acompanhamento Técnico de Terceira', 'Gestão de qualidade e conformidade de campo')">👥 Terceira</button>
        <button class="btn-short" onclick="setFast('Logística de Materiais Críticos', 'Garantia de suprimentos e prontidão')">📦 Logística</button>
        <button class="btn-short" onclick="setFast('Auditoria de Sistemas de Monitoramento', 'Cybersecurity e governança de dados')">🖥️ Sistemas</button>
    </div>

    <h3 style="color:var(--gold); border-bottom: 1px solid #334155; padding-bottom: 5px;">HISTÓRICO DE OPERAÇÕES DO DIA</h3>
    <table class="ref-table">
        <thead>
            <tr>
                <th>LOCAL (KM)</th>
                <th>HORÁRIO</th>
                <th>OPERAÇÃO / ATIVO</th>
                <th>IMPACTO GESTOR</th>
            </tr>
        </thead>
        <tbody id="logBody">
            </tbody>
    </table>

    <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="exportExcel()" style="flex:1; padding:15px; border-radius:8px; border:none; background:#34495e; color:white; cursor:pointer">Baixar CSV para Excel</button>
        <button onclick="sendWA()" style="flex:2; padding:15px; border-radius:8px; border:none; background:#25D366; color:white; font-weight:bold; cursor:pointer">Gerar Relatório WhatsApp</button>
    </div>
</div>

<script>
    let activities = JSON.parse(localStorage.getItem('ang_km_acts')) || [];
    let startTime = localStorage.getItem('ang_km_start') ? new Date(localStorage.getItem('ang_km_start')) : null;
    let timerInt;

    window.onload = () => {
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-br', {day:'2-digit', month:'long', year:'numeric'});
        render();
        if(startTime) startUI();
    };

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        const btn = document.getElementById('voiceBtn');
        recognition.onstart = () => btn.classList.add('active');
        recognition.onresult = (e) => {
            document.getElementById('descInput').value = e.results.transcript;
            btn.classList.remove('active');
        };
        recognition.start();
    }

    function setFast(txt, imp) {
        document.getElementById('descInput').value = txt;
        document.getElementById('descInput').dataset.impacto = imp;
    }

    function handleAction() {
        const btn = document.getElementById('mainBtn');
        if(!startTime) {
            startTime = new Date();
            localStorage.setItem('ang_km_start', startTime.toISOString());
            startUI();
        } else {
            const entry = {
                km: document.getElementById('kmInput').value || "ADM",
                sentido: document.getElementById('sentidoInput').value,
                inicio: startTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fim: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                txt: document.getElementById('descInput').value || "Operação Angstrom",
                impacto: document.getElementById('descInput').dataset.impacto || "Eficiência Operacional",
                duracao: document.getElementById('timer').innerText
            };
            activities.push(entry);
            localStorage.setItem('ang_km_acts', JSON.stringify(activities));
            startTime = null;
            localStorage.removeItem('ang_km_start');
            clearInterval(timerInt);
            location.reload();
        }
    }

    function startUI() {
        document.getElementById('mainBtn').innerText = "Finalizar Ponto";
        document.getElementById('mainBtn').className = "btn-main btn-stop";
        timerInt = setInterval(() => {
            const diff = new Date(new Date() - startTime);
            document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    function render() {
        const body = document.getElementById('logBody');
        body.innerHTML = activities.map(a => `
            <tr>
                <td class="km-cell">KM ${a.km}<br><small>${a.sentido}</small></td>
                <td>${a.inicio} - ${a.fim}</td>
                <td>${a.txt}</td>
                <td style="color:#22c55e">✓ ${a.impacto}</td>
            </tr>
        `).reverse().join('');
        if(activities.length > 0) document.getElementById('last-km').innerText = `ÚLTIMO: KM ${activities[activities.length-1].km}`;
    }

    function sendWA() {
        let t = `*RELATÓRIO DE GESTÃO - ANGSTROM*\n_Foco: Manutenção e Ativos por KM_\n\n`;
        activities.forEach(a => {
            t += `📍 *KM ${a.km} (${a.sentido})*\n🛠 ${a.txt}\n📈 Impacto: ${a.impacto}\n⏱ ${a.inicio} às ${a.fim}\n\n`;
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    function exportExcel() {
        let csv = "KM;Sentido;Inicio;Fim;Duracao;Atividade;Impacto\n";
        activities.forEach(a => {
            csv += `${a.km};${a.sentido};${a.inicio};${a.fim};${a.duracao};${a.txt};${a.impacto}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'relatorio_angstrom.csv');
        a.click();
    }
</script>

</body>
</html>
