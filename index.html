<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a1024" />
<title>Inspeção – Captura Direta (Foto)</title>
<style>
  :root{
    --panelA:rgba(8,14,30,.82); --panelB:rgba(6,10,24,.78);
    --badgeBg:rgba(10,16,40,.78); --badgeBr:rgba(255,255,255,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0; background:linear-gradient(180deg,#0b122b,#0a1024); color:#eaf2ff;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,"Noto Sans",sans-serif;
    overflow:hidden; -webkit-user-select:none; user-select:none;
  }

  /* Canvas da app */
  #app{ position:fixed; inset:0; display:grid; grid-template-rows:1fr; }
  #camWrap{
    position:relative; width:100%; height:100%; overflow:hidden; background:#000; isolation:isolate;
    touch-action:none; /* pinch-zoom custom sem zoom da página */
  }
  #vid{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000 }

  /* Topo: apenas Opções (⚙️) à direita */
  #hudTop{
    position:absolute; top:10px; left:0; right:0; display:flex; justify-content:flex-end; z-index:7;
    padding:0 10px; pointer-events:none;
  }
  .chipBtn{
    pointer-events:auto; display:flex; align-items:center; justify-content:center;
    width:44px; height:44px; border-radius:12px; font-size:20px;
    background:linear-gradient(180deg,var(--panelA),var(--panelB));
    border:1px solid rgba(255,255,255,.16); box-shadow:0 14px 36px rgba(0,0,0,.45);
    cursor:pointer; user-select:none; color:#eaf2ff; font-weight:900;
  }

  /* KM central no topo */
  #kmHud{ position:absolute; z-index:5; pointer-events:none; }
  .kmBadge{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--badgeBg); border:1px solid var(--badgeBr);
    border-radius:12px; padding:6px 10px; font-weight:900; font-size:1rem;
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }
  .kmBadge .label{ opacity:.9; letter-spacing:.02em }
  .kmBadge .val{ font-variant-numeric:tabular-nums; letter-spacing:.01em }
  .pos-top-center{ top:10px; left:50%; transform:translateX(-50%); }

  /* Chips (GPS/contador) deslocados para não sobrepor o ⚙️ */
  #chipsRight{
    position:absolute; top:60px; right:10px; display:flex; gap:8px; z-index:6; pointer-events:none;
  }
  .chipSmall{
    display:inline-flex; align-items:center; gap:6px; pointer-events:none;
    background:linear-gradient(180deg,var(--panelA),var(--panelB));
    border:1px solid rgba(255,255,255,.16);
    border-radius:12px; padding:6px 10px; font-weight:900; font-size:.92rem;
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }

  /* FAB AUTO (ícone) */
  #fabWrap{
    position:absolute; bottom:14px; left:0; right:0; display:flex; justify-content:center; z-index:7;
  }
  #btnAuto{
    width:72px; height:72px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:900; cursor:pointer;
    background:linear-gradient(180deg,#31e27b,#22c55e); color:#042d1a; border:2px solid #1fb85b;
    box-shadow:0 14px 36px rgba(0,0,0,.45);
  }
  #btnAuto.on{ background:linear-gradient(180deg,#ff8f49,#e06a2d); color:#1b0b02; border-color:#c45722 }

  /* Gate de pasta */
  #folderGate{
    position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; background:#060a12;
  }
  .gateCard{
    background:linear-gradient(180deg, rgba(16,26,64,.92), rgba(14,22,52,.92));
    border:1px solid rgba(255,255,255,.16); border-radius:16px; padding:18px; width:min(92vw, 420px);
    color:#cfe1ff; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .gateCard h2{ margin:0 0 10px; font-size:1.15rem }
  .gateCard p{ margin:0 0 14px; opacity:.95; font-weight:700 }
  .iconBtn{
    width:72px; height:56px; border-radius:12px; font-size:24px; display:inline-flex; align-items:center; justify-content:center;
    border:2px solid #1f2b56; background:linear-gradient(180deg,#0f1a45,#0c1436); color:#eaf2ff; font-weight:900; cursor:pointer;
  }

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%); display:none; z-index:20;
    background:linear-gradient(180deg, rgba(0,0,0,.78), rgba(0,0,0,.64));
    border:1px solid rgba(255,255,255,.16); color:#eaf2ff; padding:10px 14px; border-radius:12px;
  }

  /* Opções (abre sob o ⚙️) */
  #opts{
    position:absolute; right:10px; top:58px; z-index:8; display:none;
    background:linear-gradient(180deg,var(--panelA),var(--panelB)); border:1px solid rgba(255,255,255,.16);
    border-radius:12px; box-shadow:0 14px 36px rgba(0,0,0,.45); padding:12px; min-width:320px; pointer-events:auto;
  }
  #opts h4{ margin:0 0 8px; font-size:1rem }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:10px 0; flex-wrap:wrap }
  .row select, .row input[type="range"]{
    border-radius:10px; border:1px solid rgba(255,255,255,.16); background:#0c1436; color:#eaf2ff; font-weight:800;
  }
  .row select{ padding:8px 10px; max-width:100% }
  .row input[type="range"]{ width:160px }
  .dim{ font-size:.86rem; opacity:.85 }
</style>
</head>
<body>
<div id="app">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>

    <!-- KM central -->
    <div id="kmHud" class="pos-top-center">
      <div class="kmBadge"><span class="label">KM</span> <span class="val" id="kmText">—</span></div>
    </div>

    <!-- Chips deslocados -->
    <div id="chipsRight">
      <div class="chipSmall">📡 <b id="gpsTxt">—</b></div>
      <div class="chipSmall">📷 <b id="countTxt">0</b></div>
    </div>

    <!-- Topo: somente Opções -->
    <div id="hudTop">
      <div class="chipBtn" id="btnGear" title="Opções" aria-label="Opções">⚙️</div>
    </div>

    <!-- FAB AUTO -->
    <div id="fabWrap">
      <button id="btnAuto" class="" title="Iniciar/Pausar" aria-label="Iniciar captura automática">⏺</button>
    </div>
  </div>
</div>

<!-- Opções -->
<div id="opts" role="dialog" aria-label="Opções">
  <h4>Opções</h4>
  <div class="row">
    <span>Intervalo (ms)</span>
    <input id="rngInterval" type="range" min="300" max="2000" step="50" />
    <span class="dim"><b id="lblInterval">—</b> ms</span>
  </div>
  <div class="row">
    <span>Qualidade JPG</span>
    <input id="rngJpgQ" type="range" min="70" max="100" step="1" />
    <span class="dim"><b id="lblQ">—</b>%</span>
  </div>
  <div class="row">
    <span>Resolução máx. (px)</span>
    <select id="selMaxDim">
      <option value="1280">1280</option>
      <option value="1600">1600</option>
      <option value="1920" selected>1920</option>
      <option value="2560">2560</option>
    </select>
    <span class="dim">Atual: <b id="lblDim">—</b> px</span>
  </div>
</div>

<!-- Gate: selecionar pasta -->
<div id="folderGate" aria-modal="true" role="dialog">
  <div class="gateCard">
    <h2>Selecionar pasta de saída</h2>
    <p>As <b>fotos (JPG)</b> serão gravadas diretamente na pasta escolhida.</p>
    <button id="btnPickFolder" class="iconBtn" title="Selecionar pasta" aria-label="Selecionar pasta">📁</button>
    <div class="dim" style="margin-top:10px">Requisitos: Chrome/Edge em <b>HTTPS</b>. Mantenha <code>SNVBR116SPRJ.csv</code> na mesma pasta do HTML.</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ========================= ESTADO/REFS ========================= */
let rootDirHandle=null; let csvReady=false, camReady=false, gpsReady=false; let lastPos=null;
let isAuto=false, autoTimer=null, writing=false;
let wakeLock=null, keepAliveTimer=null;
let sessionCount=0;

/* DOM */
const vid=document.getElementById('vid');
const kmText=document.getElementById('kmText');
const gpsTxt=document.getElementById('gpsTxt');
const countTxt=document.getElementById('countTxt');
const btnAuto=document.getElementById('btnAuto');
const btnGear=document.getElementById('btnGear');
const opts=document.getElementById('opts');
const folderGate=document.getElementById('folderGate');
const btnPickFolder=document.getElementById('btnPickFolder');
const rngInterval=document.getElementById('rngInterval'), lblInterval=document.getElementById('lblInterval');
const rngJpgQ=document.getElementById('rngJpgQ'), lblQ=document.getElementById('lblQ');
const selMaxDim=document.getElementById('selMaxDim'), lblDim=document.getElementById('lblDim');
const toast=document.getElementById('toast');

/* ========================= CONFIG (persistida) ========================= */
const state={
  autoMs:Number(localStorage.getItem('auto_ms')||'700'),
  jpgQ:Number(localStorage.getItem('jpg_q')||'90'),
  maxDim:Number(localStorage.getItem('max_dim')||'1920')
};

/* ========================= UTILS ========================= */
function showToast(msg,ms=1400){ toast.textContent=msg; toast.style.display='block'; clearTimeout(showToast.t); showToast.t=setTimeout(()=>toast.style.display='none',ms); }
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function stampFile(){ const d=new Date(); const YY=d.getFullYear(); const MM=String(d.getMonth()+1).padStart(2,'0'); const DD=String(d.getDate()).padStart(2,'0'); const HH=String(d.getHours()).padStart(2,'0'); const m=String(d.getMinutes()).padStart(2,'0'); const s=String(d.getSeconds()).padStart(2,'0'); return `${YY}-${MM}-${DD}_${HH}-${m}-${s}`; }
function fmtKmKmmm(val){ const K=Math.floor(val); let m=Math.round((val-K)*1000); if(m>=1000){m-=1000;} return `${K}+${String(m).padStart(3,'0')}`; }

/* ========================= WAKE LOCK ========================= */
async function requestWakeLock(){ try{ if('wakeLock' in navigator){ wakeLock=await navigator.wakeLock.request('screen'); wakeLock.addEventListener?.('release',()=>{ if(isAuto) requestWakeLock(); }); } else { keepAliveTimer=setInterval(()=>{},30000); } }catch{} }
async function releaseWakeLock(){ try{ await wakeLock?.release?.(); }catch{} finally{ wakeLock=null; } if(keepAliveTimer){ clearInterval(keepAliveTimer); keepAliveTimer=null; } }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&isAuto){ requestWakeLock(); }});

/* ========================= Pasta / permissão ========================= */
async function verifyPermission(handle,rw){ const opt={mode:rw?'readwrite':'read'}; const q=await handle.queryPermission?.(opt); if(q==='granted') return true; const r=await handle.requestPermission?.(opt); return r==='granted'; }
btnPickFolder.addEventListener('click', async ()=>{ try{
  rootDirHandle = await window.showDirectoryPicker({mode:'readwrite'});
  if(!await verifyPermission(rootDirHandle,true)){ showToast('Permissão negada'); return; }
  folderGate.style.display='none'; showToast('Pasta OK');
}catch{ showToast('Seleção cancelada'); }});

/* ========================= CSV (KM) ========================= */
let kmPoints=[], kmGrid=new Map(); const CELL=0.005;
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=120,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${ky+dy},${kx+dx}`); if(a) out.push(...a);
      }
    }
  } return out;
}
async function loadKM(){
  try{
    const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
    kmPoints=[];
    for(const ln of lines){
      const c=ln.split(';');
      const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
      const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
      const t=(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon))?t1:
               (Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon))?t2:null;
      if(t) kmPoints.push(t);
    }
    kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
    csvReady = kmPoints.length>0;
  }catch{ csvReady=false; }
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const c=gridCands(kmGrid,lat,lon,140); if(!c.length) return null;
  let best=null,bd=Infinity; for(const p of c){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best;
}

/* ========================= HUD KM + GPS ========================= */
setInterval(()=>{
  if(lastPos){
    const n=nearestKM(lastPos.lat,lastPos.lon);
    kmText.textContent = n ? fmtKmKmmm(n.km) : '—';
  }
}, 600);

/* ========================= Câmera ========================= */
async function startCamera(){
  try{
    const st=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30,max:30}},
      audio:false
    });
    vid.srcObject=st; await vid.play().catch(()=>{});
    await new Promise(res=>{ if(vid.readyState>=2&&vid.videoWidth) res(); else vid.onloadeddata=()=>res(); });
    camReady=true;
  }catch{ camReady=false; showToast('Falha na câmera'); }
}

/* ========================= GPS ========================= */
function startGPS(){
  if(!('geolocation' in navigator)){ gpsReady=false; gpsTxt.textContent='—'; return; }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true; gpsTxt.textContent=`±${Math.round(p.coords.accuracy||0)}m`;
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
      gpsTxt.textContent=`±${Math.round(lastPos.acc||0)}m`;
    },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
  },()=>{ gpsReady=false; gpsTxt.textContent='—'; }, {enableHighAccuracy:true, timeout:12000});
}

/* ========================= Carimbo na foto ========================= */
function stampOverlay(ctx,w,h,kmStr,tsStr,gpsStr){
  const bandH=Math.max(100,Math.round(h*0.14));
  ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,h-bandH,w,bandH);

  // GPS (linha superior)
  if(gpsStr){
    ctx.fillStyle='#cfe7ff'; ctx.textAlign='left'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
    ctx.fillText(gpsStr, 20, h - bandH + 28);
  }
  // KM (linha central)
  if(kmStr){
    ctx.fillStyle='#b7ffcf'; ctx.textAlign='left'; ctx.font=`900 ${Math.round(h*0.05)}px system-ui`;
    ctx.shadowColor='rgba(34,197,94,.45)'; ctx.shadowBlur=16;
    ctx.fillText(kmStr, 20, h - bandH + Math.round(bandH*0.50));
    ctx.shadowBlur=0;
  }
  // Data/Hora (rodapé)
  if(tsStr){
    ctx.fillStyle='#ffffff'; ctx.textAlign='left'; ctx.font=`700 ${Math.round(h*0.03)}px system-ui`;
    ctx.fillText(tsStr, 20, h - 18);
  }
}

/* ========================= Pinch‑zoom (virtual, sai na foto) ========================= */
const pointers=new Map(); let startDist=0, startZoom=1, virtualZoom=1;
function distance(a,b){ const dx=b.x-a.x, dy=b.y-a.y; return Math.hypot(dx,dy); }
camWrap.addEventListener('pointerdown',(e)=>{ camWrap.setPointerCapture?.(e.pointerId); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); });
camWrap.addEventListener('pointermove',(e)=>{
  if(!pointers.has(e.pointerId)) return; pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){
    const [p1,p2]=[...pointers.values()]; const dist=distance(p1,p2);
    if(!startDist){ startDist=dist; startZoom=virtualZoom; return; }
    virtualZoom=Math.max(1, Math.min(6, startZoom*(dist/startDist)));
  }
});
['pointerup','pointercancel','pointerleave'].forEach(ev=>camWrap.addEventListener(ev,(e)=>{ pointers.delete(e.pointerId); if(pointers.size<2) startDist=0; }));

/* ========================= Canvas e captura ========================= */
const capCanvas=document.createElement('canvas'), capCtx=capCanvas.getContext('2d',{alpha:false});

async function frameToBlobAndMeta(){
  const vw=vid.videoWidth||1920, vh=vid.videoHeight||1080;
  const sc=(Math.max(vw,vh)>state.maxDim)? (state.maxDim/Math.max(vw,vh)) : 1;
  const w=Math.round(vw*sc), h=Math.round(vh*sc);

  if(capCanvas.width!==w) capCanvas.width=w;
  if(capCanvas.height!==h) capCanvas.height=h;

  // frame com zoom virtual (sai na foto)
  if(virtualZoom<=1.001){
    capCtx.drawImage(vid,0,0,w,h);
  }else{
    const z=Math.max(1, Math.min(virtualZoom,6));
    const srcW=Math.round(vw/z), srcH=Math.round(vh/z);
    const sx=Math.floor((vw - srcW)/2), sy=Math.floor((vh - srcH)/2);
    capCtx.drawImage(vid, sx, sy, srcW, srcH, 0, 0, w, h);
  }

  // textos
  const kmStr = (kmText.textContent && kmText.textContent!=='—') ? `KM ${kmText.textContent}` : 'KM —';
  const tsStr = new Date().toLocaleString();
  const gpsStr = lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';

  stampOverlay(capCtx, w, h, kmStr, tsStr, gpsStr);

  // Blob JPEG (original) + fallback se necessário
  const q=Math.max(0.7, Math.min(1, state.jpgQ/100));
  let blob=await new Promise(res=>capCanvas.toBlob(res,'image/jpeg',q));
  if(!blob){
    const dataURL=capCanvas.toDataURL('image/jpeg',q);
    const bin=atob(dataURL.split(',')[1]); const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
    blob=new Blob([u8], {type:'image/jpeg'});
  }
  return {blob, kmStr, tsStr};
}

/* ========= Escrita atômica anti‑0B: .part -> verifica -> final ========= */
async function writeAtomicJpeg(dirHandle, finalName, primaryBlob){
  // 1) Nome temporário .part
  const tempName = finalName.replace(/\.jpg$/i, `.${Date.now()}.part.jpg`);

  // 2) Grava .part
  const tempFH = await dirHandle.getFileHandle(tempName, {create:true});
  let w = await tempFH.createWritable({keepExistingData:false});
  await w.write(primaryBlob); await w.close();

  // 3) Verifica .part; se 0B, reescreve com fallback (dataURL->blob)
  let tempFile = await tempFH.getFile();
  if(tempFile.size===0){
    const q=Math.max(0.7, Math.min(1, state.jpgQ/100));
    const dataURL=capCanvas.toDataURL('image/jpeg',q);
    const bin=atob(dataURL.split(',')[1]); const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
    const fbBlob=new Blob([u8], {type:'image/jpeg'});
    const w2=await tempFH.createWritable({keepExistingData:false});
    await w2.write(fbBlob); await w2.close();
    tempFile = await tempFH.getFile();
    if(tempFile.size===0){ showToast('Falha ao salvar (0B)'); return null; }
  }

  // 4) Copia .part -> final
  const finalFH = await dirHandle.getFileHandle(finalName, {create:true});
  const wFinal = await finalFH.createWritable({keepExistingData:false});
  const buf = await tempFile.arrayBuffer();
  await wFinal.write(new Blob([buf], {type:'image/jpeg'}));
  await wFinal.close();

  // 5) Remove .part (best effort)
  try{ await dirHandle.removeEntry(tempName); }catch{}

  // 6) Verifica final (robustez)
  const f = await finalFH.getFile();
  if(f.size===0){ showToast('Falha ao salvar (final 0B)'); return null; }

  return finalFH;
}

/* ========================= CAPTURAR & SALVAR ========================= */
async function capturePhoto(){
  if(writing) return;
  if(!(rootDirHandle && camReady && gpsReady && csvReady)) return;

  writing=true;
  try{
    if(!await verifyPermission(rootDirHandle,true)){ showToast('Permissão na pasta'); writing=false; return; }

    const {blob, kmStr, tsStr}=await frameToBlobAndMeta();

    // FOTO_{KM_K_mmm}_YYYY-MM-DD_HH-mm-ss.jpg
    const kPart = (kmStr||'KM —').replace('KM ','').replace('+','_').replace(',','_');
    const name  = `FOTO_${kPart}_${stampFile()}.jpg`;

    const fh = await writeAtomicJpeg(rootDirHandle, name, blob);
    if(!fh) return; // já mostrou toast

    sessionCount++; countTxt.textContent=String(sessionCount);
  }catch(e){
    console.error('Salvar foto erro:', e);
    showToast('Falha ao salvar foto');
  }finally{
    writing=false;
  }
}

/* ========================= AUTO ========================= */
function startAuto(){
  if(isAuto) return;
  if(!(rootDirHandle && camReady && gpsReady && csvReady)){ showToast('Aguarde Pasta/Câmera/GPS/CSV'); return; }
  isAuto=true;
  requestWakeLock();
  btnAuto.classList.add('on'); btnAuto.textContent='⏹'; btnAuto.setAttribute('aria-label','Parar captura automática');

  capturePhoto().catch(()=>{});
  autoTimer=setInterval(()=>{ if(!writing) capturePhoto().catch(()=>{}); }, state.autoMs);
  showToast('Auto ON');
}
function stopAuto(){
  if(!isAuto) return;
  isAuto=false;
  clearInterval(autoTimer); autoTimer=null;
  releaseWakeLock();
  btnAuto.classList.remove('on'); btnAuto.textContent='⏺'; btnAuto.setAttribute('aria-label','Iniciar captura automática');
  showToast('Auto OFF');
}
btnAuto.addEventListener('click', ()=>{ if(isAuto) stopAuto(); else startAuto(); });

/* ========================= Opções ========================= */
btnGear.addEventListener('click', ()=>{ opts.style.display = (opts.style.display==='block'?'none':'block'); });
rngInterval.value=String(state.autoMs); lblInterval.textContent=String(state.autoMs);
rngJpgQ.value=String(state.jpgQ); lblQ.textContent=String(state.jpgQ);
selMaxDim.value=String(state.maxDim); lblDim.textContent=String(state.maxDim);
rngInterval.addEventListener('input', ()=>{ state.autoMs=Number(rngInterval.value); lblInterval.textContent=rngInterval.value; localStorage.setItem('auto_ms',String(state.autoMs)); });
rngJpgQ.addEventListener('input',   ()=>{ state.jpgQ  =Number(rngJpgQ.value); lblQ.textContent=rngJpgQ.value; localStorage.setItem('jpg_q',  String(state.jpgQ)); });
selMaxDim.addEventListener('change',()=>{ state.maxDim=Number(selMaxDim.value); lblDim.textContent=selMaxDim.value; localStorage.setItem('max_dim',String(state.maxDim)); });

/* ========================= Boot ========================= */
async function boot(){
  // aplica defaults salvos
  rngInterval.value=String(state.autoMs); lblInterval.textContent=String(state.autoMs);
  rngJpgQ.value=String(state.jpgQ); lblQ.textContent=String(state.jpgQ);
  selMaxDim.value=String(state.maxDim); lblDim.textContent=String(state.maxDim);

  await loadKM();
  await startCamera();
  startGPS();

  // HUD (segurança extra)
  setInterval(()=>{
    if(!lastPos){ kmText.textContent='—'; return; }
    const n=nearestKM(lastPos.lat,lastPos.lon); kmText.textContent = n ? fmtKmKmmm(n.km) : '—';
  }, 600);
}
boot();
</script>
