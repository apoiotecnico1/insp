<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Pro - Detecção Automática</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: linear-gradient(180deg, #007934 0%, #005a27 100%); 
            --danger: #ff4444; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* HUD - PLACA DE TRÂNSITO 3D */
        #km-hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: var(--placa-verde); 
            padding: 12px 25px; 
            border: 4px solid #ffffff; 
            border-radius: 15px; 
            z-index: 100; 
            min-width: 180px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.4);
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }
        #br-txt { 
            font-size: 1rem; 
            font-weight: 800; 
            color: #fff; 
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            margin-bottom: 2px;
        }
        #km-txt { 
            font-size: 2.8rem; 
            font-weight: 900; 
            line-height: 1; 
            text-shadow: 2px 3px 4px rgba(0,0,0,0.4);
        }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 500; }
        .btn-main { border: none; padding: 15px 35px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="safety-gate" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
    <h2 style="color:var(--accent)">SISTEMA DE CAPTURA</h2>
    <input type="file" id="csv-file" accept=".csv" style="color:#fff">
    <button onclick="startApp()" style="background:var(--accent); padding:20px 40px; border:none; font-weight:900; border-radius:10px;">ATIVAR CÂMERA E GPS</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="takeManualPhoto()"></video>
    <div id="km-hud">
        <div id="br-txt">RODOVIA</div>
        <div id="km-txt">Km ---</div>
    </div>
    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="startCapture()">Iniciar Relatório</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false, hDir = null, brNomeAutomatico = "RODOVIA";
let currentKm = "---", curLat = "0.0000", curLon = "0.0000", buffer = [];

async function startApp() {
    const fileInput = document.getElementById('csv-file');
    if (!fileInput.files[0]) { alert("Por favor, selecione o arquivo CSV da rodovia primeiro."); return; }
    
    // Pega o nome do arquivo (ex: BR116.csv -> BR116)
    brNomeAutomatico = fileInput.files[0].name.replace('.csv', '').replace('.CSV', '').toUpperCase();

    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        await loadCSV(fileInput.files[0]);
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        initGPS();
        setupCamera();
    } catch(e) { alert("Permissão de pasta necessária."); }
}

async function loadCSV(file) {
    const text = await file.text();
    const rows = text.split('\n').filter(l => l.includes(';'));
    const header = rows.shift().toLowerCase().split(';');
    
    const iKm = header.indexOf('km');
    const iLat = header.findIndex(x => x.includes('lat'));
    const iLon = header.findIndex(x => x.includes('lon'));
    const iBr = header.indexOf('br'); // Procura se existe coluna BR

    kmDB = rows.map(r => {
        const c = r.split(';');
        return {
            // Se existir coluna BR no CSV, usa ela. Se não, usa o nome do arquivo.
            br: iBr !== -1 ? c[iBr].trim() : brNomeAutomatico,
            km: c[iKm],
            lt: parseFloat(c[iLat].replace(',','.')),
            ln: parseFloat(c[iLon].replace(',','.'))
        };
    }).filter(d => !isNaN(d.lt));
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6);
        curLon = p.coords.longitude.toFixed(6);
        if (kmDB.length === 0) return;

        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            document.getElementById('br-txt').innerText = best.br;
            document.getElementById('km-txt').innerText = "Km " + best.km;
            currentKm = best.km;
            brNomeAutomatico = best.br;
        }
    }, null, { enableHighAccuracy: true });
}

async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
    document.getElementById('vid').srcObject = stream;
}

// FUNÇÃO PARA DESENHAR A LEGENDA 3D NA FOTO
function drawLegend(ctx, width, height, br, km, gps) {
    const bh = height * 0.12;
    // Fundo Verde Gradiente
    const g = ctx.createLinearGradient(0, height - bh, 0, height);
    g.addColorStop(0, "#007934");
    g.addColorStop(1, "#004d22");
    ctx.fillStyle = g;
    ctx.fillRect(0, height - bh, width, bh);

    // Borda Branca Superior
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, height - bh, width, 4);

    // Textos
    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur = 5;
    
    ctx.font = `bold ${bh * 0.25}px Arial`;
    ctx.fillText(br, 20, height - (bh * 0.6));
    
    ctx.font = `900 ${bh * 0.45}px Arial`;
    ctx.fillText("Km " + km, 20, height - (bh * 0.2));

    ctx.font = `bold ${bh * 0.15}px monospace`;
    ctx.fillText(`${new Date().toLocaleString()} | GPS: ${gps}`, width - (width * 0.4), height - (bh * 0.2));
    ctx.shadowBlur = 0;
}

async function takeManualPhoto() {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    drawLegend(ctx, can.width, can.height, brNomeAutomatico, currentKm, `${curLat}, ${curLon}`);
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fh = await hDir.getFileHandle(`FOTO_${brNomeAutomatico}_KM${currentKm}_${Date.now()}.jpg`, {create:true});
    const w = await fh.createWritable();
    await w.write(blob); await w.close();
}

function startCapture() { capturing = true; document.getElementById('btn-start').style.display='none'; document.getElementById('btn-stop').style.display='block'; captureLoop(); }
function stopCapture() { capturing = false; document.getElementById('btn-start').style.display='block'; document.getElementById('btn-stop').style.display='none'; generatePDF(); }

function captureLoop() {
    if(!capturing) return;
    const can = document.getElementById('c');
    const vid = document.getElementById('vid');
    const ctx = can.getContext('2d');
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    drawLegend(ctx, can.width, can.height, brNomeAutomatico, currentKm, `${curLat}, ${curLon}`);
    
    buffer.push({ img: can.toDataURL('image/jpeg', 0.7) });
    setTimeout(captureLoop, 1000);
}

async function generatePDF() {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<buffer.length; i++) {
        if(i > 0) doc.addPage();
        doc.addImage(buffer[i].img, 'JPEG', 0, 0, 297, 210);
    }
    const fh = await hDir.getFileHandle(`RELATORIO_${brNomeAutomatico}_${Date.now()}.pdf`, {create:true});
    const w = await fh.createWritable();
    await w.write(doc.output('blob')); await w.close();
    buffer = [];
}
</script>
</body>
</html>
