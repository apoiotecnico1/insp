<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inspeção Rodoviária – Seguro</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:system-ui}
video{width:100vw;height:55vh;object-fit:cover}
button{
  font-size:1.2rem;
  font-weight:900;
  padding:14px;
  border-radius:14px;
  border:none;
}
#panel{display:flex;gap:8px;padding:10px}
#km{
  position:absolute;
  bottom:10px;left:10px;
  background:rgba(0,0,0,.7);
  padding:10px 14px;
  border-radius:10px;
  font-size:1.4rem;
  font-weight:900;
}
.thumb img{width:100%}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>
<canvas id="can" style="display:none"></canvas>
<div id="km">KM —</div>

<div id="panel">
<button id="btn">📷 FOTO</button>
<button id="btnAuto">AUTO</button>
</div>

<script>
/* ================= CONFIG VEICULAR ================= */
const AUTO_BATCH = 50;
let captureLock = false;
let lastCaptureTs = 0;
let batch = [];
let reportIndex = 1;

/* ================= CAMERA ================= */
const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');
navigator.mediaDevices.getUserMedia({
  video:{facingMode:'environment'},
  audio:false
}).then(s=>vid.srcObject=s);

/* ================= GPS + KM ================= */
let lastPos=null;
navigator.geolocation.watchPosition(p=>{
  lastPos = {
    lat:p.coords.latitude,
    lon:p.coords.longitude,
    acc:p.coords.accuracy
  };
  const km = Math.floor(Math.random()*300); // substitua pelo CSV real
  document.getElementById('km').textContent =
    `KM ${km}+${String(Math.floor(Math.random()*1000)).padStart(3,'0')}`;
},{},{enableHighAccuracy:true});

/* ================= CAPTURA SEGURA ================= */
async function capture(){
  const now = Date.now();

  if(captureLock) return;
  if(now - lastCaptureTs < 700) return; // debounce real

  captureLock = true;
  lastCaptureTs = now;

  can.width = vid.videoWidth;
  can.height = vid.videoHeight;

  ctx.drawImage(vid,0,0);

  /* Overlay KM */
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.fillRect(0,can.height-80,can.width,80);
  ctx.fillStyle='#b7ffcf';
  ctx.font='bold 48px system-ui';
  ctx.fillText(
    document.getElementById('km').textContent,
    20,can.height-25
  );

  const data = can.toDataURL('image/jpeg',0.85);
  batch.push(data);

  if(batch.length>=AUTO_BATCH){
    generateReport();
  }

  setTimeout(()=>captureLock=false,300);
}

/* ================= RELATÓRIO ================= */
function generateReport(){
  const blob = new Blob(batch,{type:'application/pdf'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`INSPECAO_${reportIndex}.pdf`;
  a.click();
  URL.revokeObjectURL(a.href);

  batch.length=0;
  reportIndex++;
}

/* ================= AUTO ================= */
let auto=null;
btn.onclick=capture;
btnAuto.onclick=()=>{
  if(auto){
    clearInterval(auto);
    auto=null;
    btnAuto.textContent='AUTO';
  }else{
    auto=setInterval(capture,1200);
    btnAuto.textContent='STOP';
  }
};
</script>

</body>
</html>
