<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>BACKUP REDUNDANTE - AUTO IP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        #app { display: grid; grid-template-rows: 1fr auto; height: 100vh; }
        #view { position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        #stream-img { max-width: 100%; max-height: 100%; border: 2px solid #333; }
        
        .hud { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .tag { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border-left: 4px solid #00e5ff; font-size: 12px; }
        .detect { border-left-color: #ff3b30; animation: blink 0.5s infinite; }

        #panel { background: #1a1a1a; padding: 25px; display: flex; gap: 20px; align-items: flex-end; border-top: 1px solid #333; }
        .field { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; }
        
        button { background: #00e5ff; color: #000; border: none; padding: 12px 30px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #btn-stop { background: #ff3b30; color: #fff; display: none; }

        @keyframes blink { 50% { opacity: 0.5; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="view">
        <div class="hud">
            <div id="st-ip" class="tag">AGUARDANDO IP...</div>
            <div id="st-motion" class="tag">SENSOR: STANDBY</div>
            <div id="st-count" class="tag">RELATÓRIO: 0 FOTOS</div>
        </div>
        <img id="stream-img" crossorigin="anonymous">
    </div>

    <div id="panel">
        <div class="field">
            <label>IP da Câmera (Ex: 192.168.1.50)</label>
            <input type="text" id="ip-addr" placeholder="Digite apenas o IP">
        </div>
        <button id="btn-start" onclick="startScanner()">CONECTAR E MONITORAR</button>
        <button id="btn-stop" onclick="stopSystem()">PARAR E GERAR PDF</button>
    </div>
</div>

<canvas id="c-proc"></canvas>

<script>
let lastData = null;
let photos = [];
let isRunning = false;
let foundUrl = "";
let hDir = null;

// Lista de sufixos comuns de fabricantes (Snapshot)
const paths = [
    "/onvif/snapshot",        // ONVIF Padrão
    "/cgi-bin/snapshot.cgi",  // Intelbras / Dahua
    "/Streaming/channels/1/picture", // Hikvision
    "/image.jpg",             // Genéricas
    "/snap.jpg",              // Mibo Smart / IP Cameras
    "/tmpfs/auto.jpg"         // Foscam
];

async function startScanner() {
    const ip = document.getElementById('ip-addr').value;
    if(!ip) return alert("Digite o IP!");

    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('st-ip').innerText = `PROCURANDO CAMERA EM ${ip}...`;
        
        // Tenta encontrar qual o caminho da imagem funciona
        for(let p of paths) {
            let testUrl = `http://${ip}${p}`;
            let ok = await testImage(testUrl);
            if(ok) {
                foundUrl = testUrl;
                break;
            }
        }

        if(foundUrl) {
            isRunning = true;
            document.getElementById('st-ip').innerText = `CONECTADO: ${foundUrl}`;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            monitor();
        } else {
            alert("Não foi possível capturar imagem desse IP. Verifique se a câmera tem snapshot HTTP habilitado.");
        }
    } catch(e) { console.error(e); }
}

function testImage(url) {
    return new Promise(resolve => {
        const t = new Image();
        t.crossOrigin = "anonymous";
        t.onload = () => resolve(true);
        t.onerror = () => resolve(false);
        t.src = url + "?t=" + Date.now();
        setTimeout(() => resolve(false), 2000);
    });
}

async function monitor() {
    if(!isRunning) return;

    const img = document.getElementById('stream-img');
    const temp = new Image();
    temp.crossOrigin = "anonymous";
    temp.src = foundUrl + "?t=" + Date.now();

    temp.onload = () => {
        img.src = temp.src;
        const can = document.getElementById('c-proc');
        const ctx = can.getContext('2d');
        can.width = temp.width;
        can.height = temp.height;
        ctx.drawImage(temp, 0, 0);
        
        const current = ctx.getImageData(0,0, can.width, can.height);
        
        if(lastData) {
            if(checkMotion(lastData, current)) {
                saveToReport(temp);
            }
        }
        lastData = current;
        setTimeout(monitor, 400); // 2.5 FPS de monitoramento
    };
}

function checkMotion(d1, d2) {
    let diff = 0;
    const data1 = d1.data;
    const data2 = d2.data;
    for(let i=0; i<data1.length; i+=50) {
        if(Math.abs(data1[i] - data2[i]) > 40) diff++;
    }
    return diff > (data1.length / 1000);
}

function saveToReport(imgObj) {
    const st = document.getElementById('st-motion');
    st.innerText = "MOVIMENTO DETECTADO!";
    st.classList.add('detect');

    const can = document.getElementById('c-proc');
    const ctx = can.getContext('2d');
    ctx.drawImage(imgObj, 0, 0);
    
    // Carimbo
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, can.height - 40, can.width, 40);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText(new Date().toLocaleString() + " - BACKUP", 20, can.height - 15);

    photos.push(can.toDataURL('image/jpeg', 0.5));
    document.getElementById('st-count').innerText = `RELATÓRIO: ${photos.length} FOTOS`;

    setTimeout(() => {
        st.innerText = "SENSOR: STANDBY";
        st.classList.remove('detect');
    }, 1500);
}

async function stopSystem() {
    isRunning = false;
    if(photos.length > 0) {
        const doc = new jspdf.jsPDF('l', 'mm', 'a4');
        for(let i=0; i<photos.length; i++) {
            if(i>0) doc.addPage('l');
            doc.addImage(photos[i], 'JPEG', 0, 0, 297, 210);
        }
        const file = await hDir.getFileHandle(`BACKUP_${Date.now()}.pdf`, {create:true});
        const stream = await file.createWritable();
        await stream.write(doc.output('blob'));
        await stream.close();
        alert("Relatório salvo com sucesso!");
    }
    location.reload();
}
</script>
</body>
</html>
