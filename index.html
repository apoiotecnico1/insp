<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fibra RA - Operacional</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>

    <style>
        :root { --primary: #00ff00; --bg: rgba(0, 0, 0, 0.85); }
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }

        /* Overlay de Permissão (Crítico) */
        #start-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .btn-start { 
            padding: 20px 40px; background: var(--primary); color: black; 
            border: none; border-radius: 30px; font-weight: bold; font-size: 18px;
        }

        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .top-bar { top: 20px; }
        .bottom-bar { bottom: 30px; }

        #arrow-gui {
            background: var(--bg); width: 80px; height: 80px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary); margin-bottom: 10px;
        }
        #arrow { font-size: 40px; color: var(--primary); transition: transform 0.1s linear; }

        .glass-card {
            background: var(--bg); color: white; padding: 15px;
            border-radius: 15px; width: 85%; max-width: 350px; pointer-events: all; text-align: center;
        }
        .dist-info { font-size: 28px; font-weight: bold; color: var(--primary); }
    </style>
</head>

<body>

    <div id="start-screen">
        <h2>Localizador de Fibra RA</h2>
        <p>Necessário ativar GPS e Bússola</p>
        <button class="btn-start" onclick="initSensors()">INICIAR SISTEMA</button>
    </div>

    <div class="overlay top-bar">
        <div id="arrow-gui"><div id="arrow">▲</div></div>
        <div class="glass-card">
            <div id="status">Aguardando KMZ...</div>
            <div class="dist-info" id="dist-val">-- m</div>
            <small id="nome-caixa">Carregue o traçado</small>
        </div>
    </div>

    <div class="overlay bottom-bar">
        <div class="glass-card">
            <input type="file" id="fileInput" accept=".kmz">
        </div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
        <a-camera gps-camera="minDistance: 1; maxDistance: 1000" rotation-reader></a-camera>
    </a-scene>

    <script>
        const arrow = document.getElementById('arrow');
        const distVal = document.getElementById('dist-val');
        const statusTxt = document.getElementById('status');
        let pointsDB = [];
        let userPos = null;

        // Função para autorizar sensores (Obrigatório em iOS e Android moderno)
        async function initSensors() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return alert("Permissão de bússola negada.");
            }
            document.getElementById('start-screen').style.display = 'none';
            startTracking();
        }

        function startTracking() {
            // Monitora GPS com alta precisão
            navigator.geolocation.watchPosition(
                (pos) => {
                    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    updateLogic();
                },
                (err) => console.error("Erro GPS:", err),
                { enableHighAccuracy: true, maximumAge: 0 }
            );

            // Monitora Bússola
            window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            window.addEventListener('deviceorientation', handleOrientation, true);
        }

        function handleOrientation(e) {
            const heading = e.webkitCompassHeading || (360 - e.alpha);
            if (!userPos || pointsDB.length === 0 || isNaN(heading)) return;

            const nearest = findNearest();
            const bearing = calculateBearing(userPos.lat, userPos.lng, nearest.lat, nearest.lng);
            const rotation = (bearing - heading + 360) % 360;
            
            arrow.style.transform = `rotate(${rotation}deg)`;
        }

        // Carregamento do KMZ
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files;
            statusTxt.innerText = "Processando...";
            
            const zip = await JSZip.loadAsync(file);
            const kmlName = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.kml'));
            const kmlText = await zip.file(kmlName).async("string");
            
            const geojson = toGeoJSON.kml(new DOMParser().parseFromString(kmlText, "text/xml"));
            
            pointsDB = [];
            geojson.features.forEach(f => {
                const name = f.properties.name || "Fibra";
                const coords = f.geometry.coordinates;
                if (f.geometry.type === "LineString") {
                    for (let i = 0; i < coords.length; i += 20) {
                        pointsDB.push({ lat: coords[i], lng: coords[i], name: name });
                    }
                }
            });
            statusTxt.innerText = "ONLINE";
        });

        function findNearest() {
            return pointsDB.reduce((prev, curr) => {
                const dPrev = getDist(userPos.lat, userPos.lng, prev.lat, prev.lng);
                const dCurr = getDist(userPos.lat, userPos.lng, curr.lat, curr.lng);
                return dCurr < dPrev ? curr : prev;
            });
        }

        function updateLogic() {
            if (!userPos || pointsDB.length === 0) return;
            const nearest = findNearest();
            const d = getDist(userPos.lat, userPos.lng, nearest.lat, nearest.lng);
            distVal.innerText = Math.round(d) + " m";
            document.getElementById('nome-caixa').innerText = nearest.name;
        }

        // Fórmulas
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
            return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
