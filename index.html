<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Inspeção de Iluminação Rodoviária</title>

<style>
:root{
  --bg:#05080f;
  --panel:#0b1224;
  --line:#1e40af;
  --ok:#22c55e;
  --warn:#eab308;
  --bad:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:#e8eeff;
  font-family:system-ui,Segoe UI,Roboto;
}
#camBox{
  position:fixed;
  top:0;left:0;right:0;
  height:42vh;
  background:#000;
  border-bottom:3px solid var(--line);
}
video{
  width:100%;
  height:100%;
  object-fit:contain;
}
#panel{
  position:fixed;
  bottom:0;left:0;right:0;
  height:58vh;
  background:var(--panel);
  border-top:3px solid var(--line);
  padding:10px;
  overflow:auto;
}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.badge{
  background:#0f1733;
  border:1px solid #263a8b;
  padding:6px 12px;
  border-radius:999px;
  font-weight:900;
  font-size:.8rem;
}
.ok{color:#b7ffd6}
.warn{color:#fff1aa}
.big{font-size:1.05rem}
button{
  flex:1;
  padding:14px;
  font-size:1rem;
  font-weight:900;
  border:none;
  border-radius:14px;
}
#btnFolder{background:#22c55e;color:#022}
#btnAuto{background:#ff7b45}
#btnStop{background:#ef4444;color:#fff}
#btnPdf{background:#eab308;color:#231c00}
input[type=range]{width:100%}
</style>
</head>

<body>

<div id="camBox">
  <video id="vid" autoplay playsinline muted></video>
</div>

<div id="panel">

  <div class="row">
    <span id="stCsv" class="badge warn">CSV</span>
    <span id="stCam" class="badge warn">CÂMERA</span>
    <span id="stGps" class="badge warn">GPS</span>
    <span id="stKm" class="badge big">KM —</span>
    <span id="stFotos" class="badge">📸 0</span>
  </div>

  <div class="row">
    <span id="stIds" class="badge big">IDs: —</span>
  </div>

  <div class="row">
    <label class="badge">⏱ Intervalo (ms):
      <input id="interval" type="range" min="800" max="3000" step="100" value="1200">
      <span id="ival">1200</span>
    </label>
  </div>

  <div class="row">
    <button id="btnFolder">📁 Selecionar Pasta</button>
  </div>

  <div class="row">
    <button id="btnAuto">🎬 Iniciar Captura</button>
    <button id="btnStop" disabled>⏹ Parar</button>
  </div>

  <div class="row">
    <button id="btnPdf" disabled>📄 Finalizar PDF</button>
  </div>

</div>

<canvas id="can" hidden></canvas>

<script>
/* ================= UTIL ================= */
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const rad=d=>d*Math.PI/180;
function hav(a,b,c,d){
 const R=6371000;
 const x=rad(c-a),y=rad(d-b);
 const u=Math.sin(x/2)**2+
   Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(y/2)**2;
 return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function fmtKm(v){
 let k=Math.floor(v),m=Math.round((v-k)*1000);
 if(m>=1000){k++;m=0}
 return `KM ${k}+${String(m).padStart(3,'0')}`;
}
function parsePt(v){return Number(String(v).replace(',','.'))}

/* ================= GRID ================= */
const CELL=0.005;
const idGrid=new Map(),kmGrid=new Map();
function key(lat,lon){return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`}
function insert(grid,p){
 const k=key(p.lat,p.lon);
 const a=grid.get(k);a?a.push(p):grid.set(k,[p])
}
function cands(grid,lat,lon,min=80,r=5){
 const ky=Math.floor(lat/CELL),kx=Math.floor(lon/CELL),o=[];
 for(let d=0;d<=r && o.length<min;d++)
  for(let y=-d;y<=d;y++)
   for(let x=-d;x<=d;x++){
    const a=grid.get(`${ky+y},${kx+x}`);
    if(a)o.push(...a)
   }
 return o;
}

/* ================= ESTADO ================= */
let lastPos=null;
let rootDir=null;
let csvReady=false,camReady=false,gpsReady=false;
let dataset=[],kmPoints=[];
let running=false;
let fotos=0;
let intervalMs=1200;
let pdfImages=[];

/* ================= CAMERA ================= */
const vid=document.getElementById('vid');
navigator.mediaDevices.getUserMedia({
 video:{facingMode:'environment'},audio:false
}).then(s=>{
 vid.srcObject=s;
 camReady=true;
 stCam.textContent='CÂMERA OK';
 stCam.className='badge ok';
});

/* ================= GPS ================= */
navigator.geolocation.watchPosition(p=>{
 lastPos={lat:p.coords.latitude,lon:p.coords.longitude};
 gpsReady=true;
 stGps.textContent='GPS OK';
 stGps.className='badge ok';
},{},{enableHighAccuracy:true});

/* ================= CSV ================= */
fetch('./Dados_Completos_Grupo_2_all.csv').then(r=>r.text()).then(t=>{
 const l=t.split(/\r?\n/);
 const h=l[0].toLowerCase().split(';');
 const iId=h.findIndex(x=>x.includes('id'));
 const iLat=h.findIndex(x=>x.includes('lat'));
 const iLon=h.findIndex(x=>x.includes('lon'));
 for(let i=1;i<l.length;i++){
  const c=l[i].split(';');
  if(!c[iId])continue;
  const p={id:c[iId],lat:parsePt(c[iLat]),lon:parsePt(c[iLon])};
  if(isFinite(p.lat)) dataset.push(p), insert(idGrid,p);
 }
});
fetch('./SNVBR116SPRJ.csv').then(r=>r.text()).then(t=>{
 t.split(/\r?\n/).forEach(l=>{
  const c=l.split(';');
  const p={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(isFinite(p.km)&&isFinite(p.lat)) kmPoints.push(p), insert(kmGrid,p);
 });
 csvReady=true;
 stCsv.textContent='CSV OK';
 stCsv.className='badge ok';
});

/* ================= BUSCAS ================= */
function nearestKM(){
 let b=null,d=1e12;
 cands(kmGrid,lastPos.lat,lastPos.lon)
 .forEach(p=>{
  const h=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
  if(h<d){d=h;b=p}
 });
 return b;
}
function nearestIds(){
 return cands(idGrid,lastPos.lat,lastPos.lon)
  .map(p=>({...p,d:hav(lastPos.lat,lastPos.lon,p.lat,p.lon)}))
  .sort((a,b)=>a.d-b.d).slice(0,5);
}

/* ================= OKM / IDS AO VIVO ================= */
setInterval(()=>{
 if(!(csvReady&&gpsReady))return;
 const k=nearestKM();
 stKm.textContent=k?fmtKm(k.km):'KM —';
 stIds.textContent='IDs: '+nearestIds().map(i=>i.id).join(' • ');
},400);

/* ================= FILE SYSTEM ================= */
btnFolder.onclick=async()=>{
 rootDir=await window.showDirectoryPicker({mode:'readwrite'});
 alert('Pasta selecionada');
 btnPdf.disabled=false;
};

/* ================= CAPTURA ================= */
const can=document.getElementById('can');
const ctx=can.getContext('2d');

async function captureOnce(){
 if(!(csvReady&&gpsReady&&camReady&&rootDir))return;

 const w=vid.videoWidth,h=vid.videoHeight;
 can.width=w;can.height=h;
 ctx.drawImage(vid,0,0,w,h);

 const k=nearestKM();
 const km=k?fmtKm(k.km):'KM —';
 const ids=nearestIds().map(i=>i.id).join(' • ');

 ctx.fillStyle='rgba(0,0,0,.7)';
 ctx.fillRect(0,h-140,w,140);
 ctx.fillStyle='#b7ffcf';
 ctx.font='42px system-ui';
 ctx.fillText(km,20,h-80);
 ctx.font='24px system-ui';
 ctx.fillText(ids,20,h-40);

 const blob=await new Promise(r=>can.toBlob(r,'image/jpeg',0.85));
 const f=await rootDir.getFileHandle(`FOTO_${Date.now()}.jpg`,{create:true});
 const wr=await f.createWritable();
 await wr.write(blob);await wr.close();

 pdfImages.push(blob);
 fotos++;
 stFotos.textContent=`📸 ${fotos}`;
}

/* ================= LOOP ================= */
async function captureLoop(){
 running=true;
 while(running){
  const t=performance.now();
  await captureOnce();
  await sleep(Math.max(0,intervalMs-(performance.now()-t)));
 }
}

/* ================= PDF LEVE ================= */
btnPdf.onclick=()=>{
 const doc=document.createElement('iframe');
 let html='<html><body style="margin:0">';
 pdfImages.forEach(img=>{
  const u=URL.createObjectURL(img);
  html+=`<img src="${u}" style="width:100%;page-break-after:always">`;
 });
 html+='</body></html>';
 const w=window.open();
 w.document.write(html);
 w.print();
};

/* ================= CONTROLES ================= */
interval.oninput=()=>{intervalMs=+interval.value;ival.textContent=interval.value}
btnAuto.onclick=()=>{
 if(!rootDir){alert('Selecione a pasta');return}
 btnAuto.disabled=true;btnStop.disabled=false;
 captureLoop();
};
btnStop.onclick=()=>{
 running=false;
 btnAuto.disabled=false;btnStop.disabled=true;
};
</script>

</body>
</html>
