<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA ELITE PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* TELA DE BLOQUEIO */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 2px solid var(--danger); padding: 40px; border-radius: 20px; max-width: 400px; background: #0a0a0a; text-align: center; }
        .btn-setup { width: 100%; background: var(--accent); color: #000; border: none; padding: 25px; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 24px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 12px 25px; border: 2px solid #fff; border-radius: 10px; z-index: 10; }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; }

        #rec-status { position: absolute; top: 20px; right: 20px; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 30px; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .dot { width: 12px; height: 12px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #rec-status span { font-weight: 900; font-size: 14px; color: #fff; }

        /* AJUSTES (LIMPO) */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 4000; padding: 40px 20px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 25px; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-size: 16px; text-align: center; }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 50px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100; }
        .btn-main { border: none; border-radius: 20px; font-weight: 900; cursor: pointer; padding: 20px 50px; font-size: 24px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; min-width: 140px; }
        #gear-btn { width: 65px; height: 65px; border-radius: 20px; background: rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; backdrop-filter: blur(5px); }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="alert-box">
        <button class="btn-setup" onclick="requestAccess()">📂</button>
    </div>
</div>

<div id="settings-panel">
    <div class="field"><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><input type="number" id="cfg-lote" value="200"></div>
    <div class="field"><input type="number" id="cfg-int" value="200"></div>
    <button class="btn-main" style="width:100%; background: #333; color: #fff;" onclick="toggleSet()">✖️</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">---</h1></div>
    
    <div id="rec-status"><div class="dot"></div><span>ON</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet(); event.stopPropagation();">⚙️</div>
        <button id="btn-start" class="btn-main" onclick="initCapture(); event.stopPropagation();">▶️</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture(); event.stopPropagation();">⏹️</button>
    </div>
</div>

<canvas id="can_cap"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null;
let kmInicialLote = "";
const vid=document.getElementById('vid');
const canCap=document.getElementById('can_cap'), ctxCap=canCap.getContext('2d');
const canOff = document.createElement('canvas');
const ctxOff = canOff.getContext('2d');

function forceFull() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
    }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (await dirHandle.queryPermission({mode:'readwrite'}) !== 'granted') await dirHandle.requestPermission({mode:'readwrite'});
        if(dirHandle) unlockSystem();
    } catch (e) { alert("!"); }
}

async function unlockSystem() {
    document.getElementById('safety-gate').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    forceFull();
    await listCams();
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    loadCSV(); initGPS();
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">📸 ${i+1}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = currentStream;
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) saveAuto([...buffer], kmInicialLote, document.getElementById('km-txt').innerText);
    rec = false; buffer = [];
    document.getElementById('btn-start').style.display = 'flex';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        canCap.width = vid.videoWidth; canCap.height = vid.videoHeight;
        ctxCap.drawImage(vid, 0, 0);
        const curKm = document.getElementById('km-txt').innerText;
        buffer.push({ raw: canCap.toDataURL('image/jpeg', 0.4), km: curKm, ts: new Date().toLocaleTimeString('pt-BR') });
        let limite = parseInt(document.getElementById('cfg-lote').value) || 200;
        if(buffer.length >= limite) {
            saveAuto([...buffer], kmInicialLote, curKm);
            buffer = []; kmInicialLote = curKm;
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function saveAuto(data, ini, fim) {
    const pdfW = canCap.width, pdfH = canCap.height;
    canOff.width = pdfW; canOff.height = pdfH;
    const doc = new jspdf.jsPDF(pdfW > pdfH ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        await new Promise(r => {
            const img = new Image();
            img.onload = () => {
                ctxOff.drawImage(img, 0, 0);
                const bh = pdfH * 0.12;
                ctxOff.fillStyle = "rgba(0,0,0,0.8)"; ctxOff.fillRect(0, pdfH-bh, pdfW, bh);
                ctxOff.fillStyle = "#fff"; ctxOff.font = `bold ${bh*0.4}px Arial`;
                ctxOff.fillText(`Km ${data[i].km}`, 40, pdfH-(bh*0.45));
                ctxOff.font = `${bh*0.2}px Arial`;
                ctxOff.fillText(`${new Date().toLocaleDateString('pt-BR')} | ${data[i].ts}`, 40, pdfH-(bh*0.15));
                doc.addImage(canOff.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph); r();
            };
            img.src = data[i].raw;
        });
    }
    const d = new Date();
    const p = (n) => n.toString().padStart(2, '0');
    const nome = `K_${ini}_${fim}_${p(d.getDate())}${p(d.getMonth()+1)}_${p(d.getHours())}${p(d.getMinutes())}.pdf`;
    try {
        const fh = await dirHandle.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch (e) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
