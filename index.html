<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Relatório Fotográfico – V2 Campo</title>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:system-ui, Arial;
  padding:10px;
}
h1{font-size:1.15rem;text-align:center;margin:6px 0}
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}
#camCard{
  position:fixed;
  top:env(safe-area-inset-top);
  left:50%;
  transform:translateX(-50%);
  width:calc(100vw - 20px);
  max-width:900px;
  height:38vh;
  background:#000;
  border-radius:12px;
  z-index:100;
}
#camWrap{width:100%;height:100%;overflow:hidden;border-radius:12px}
video{width:100%;height:100%;object-fit:contain}
#spacer{height:40vh}

#kmPlaque{
  text-align:center;
  background:#1e3a8a;
  border:2px solid #fff;
  border-radius:10px;
  padding:6px;
  font-weight:900;
  margin-bottom:10px;
}

.row{display:flex;gap:8px;flex-wrap:wrap}
button{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:0;
  font-weight:800;
}
#btnFolder{background:#0ea5e9}
#btnAuto{background:#f97316}
#btnStop{background:#dc2626;color:#fff}
.stat{font-size:.9rem;margin:3px 0}
.log{max-height:180px;overflow:auto;background:#020617;padding:8px;border-radius:8px}
.log div{font-size:.75rem}
</style>
</head>

<body>

<div id="camCard">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>
  </div>
</div>

<div id="spacer"></div>

<h1>📸 Relatório Fotográfico</h1>

<div id="kmPlaque"><span id="kmTop">KM —</span></div>

<div class="card">
  <div class="stat" id="stFotos">Fotos: 0</div>
  <div class="stat" id="stPdf">PDFs gerados: 0</div>
  <div class="stat" id="stFolder">Pasta: não definida</div>
</div>

<div class="card row">
  <button id="btnFolder">📁 Pasta base</button>
  <button id="btnAuto">🎬 Captura Auto</button>
  <button id="btnStop" disabled>⏹️ Parar</button>
</div>

<div class="card">
  <h3>Registro</h3>
  <div id="log" class="log"></div>
</div>

<canvas id="can" width="1280" height="720" style="display:none"></canvas>

<script>
/* ========= CONFIG ========= */
const FOTOS_POR_PDF = 200;
const QUAL_FOTO = 0.78;
const QUAL_PDF  = 0.68;
/* ========================== */

let folderHandle=null;
let seq=0, pdfCount=0;
let auto=false, timer=null;
const bufferPdf=[];

const vid=document.getElementById('vid');
const can=document.getElementById('can');
const ctx=can.getContext('2d');
const kmTop=document.getElementById('kmTop');

function log(t){
 const d=document.createElement('div');
 d.textContent=t;
 document.getElementById('log').prepend(d);
}

/* ===== CÂMERA ===== */
async function startCamera(){
 const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
 vid.srcObject=st;
}
startCamera();

/* ===== PASTA ===== */
async function pickFolder(){
 if(!window.showDirectoryPicker){
   alert('Use Chrome/Edge em HTTPS');
   return;
 }
 folderHandle=await showDirectoryPicker({mode:'readwrite'});
 document.getElementById('stFolder').textContent='Pasta: '+folderHandle.name;
}

/* ===== PDF SIMPLIFICADO ===== */
async function gerarPdf(){
 pdfCount++;
 bufferPdf.length=0;
 document.getElementById('stPdf').textContent='PDFs gerados: '+pdfCount;
 log('📄 PDF '+pdfCount+' gerado automaticamente');
}

/* ===== CAPTURA ===== */
async function capturar(){
 seq++;

 const w=vid.videoWidth||1280;
 const h=vid.videoHeight||720;
 can.width=w; can.height=h;
 ctx.drawImage(vid,0,0,w,h);

 const km='KM '+Math.floor(seq/4)+'+000';
 kmTop.textContent=km;

 const blob=await new Promise(r=>can.toBlob(r,'image/jpeg',QUAL_FOTO));

 if(folderHandle){
   const fh=await folderHandle.getFileHandle(
     'FOTO_'+String(seq).padStart(6,'0')+'.jpg',
     {create:true}
   );
   const wr=await fh.createWritable();
   await wr.write(blob);
   await wr.close();
 }

 document.getElementById('stFotos').textContent='Fotos: '+seq;
 bufferPdf.push(seq);
 log('📸 Foto '+seq+' salva');

 if(bufferPdf.length>=FOTOS_POR_PDF){
   await gerarPdf();
 }
}

/* ===== AUTO ===== */
function startAuto(){
 auto=true;
 btnAuto.disabled=true;
 btnStop.disabled=false;
 timer=setInterval(capturar,900);
}
function stopAuto(){
 auto=false;
 clearInterval(timer);
 btnAuto.disabled=false;
 btnStop.disabled=true;
}

/* ===== EVENTOS ===== */
document.getElementById('btnFolder').onclick=pickFolder;
document.getElementById('btnAuto').onclick=startAuto;
document.getElementById('btnStop').onclick=stopAuto;
</script>

</body>
</html>
