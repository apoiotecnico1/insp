<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - HIGHWAY EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00ff66; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; width: 100vw; height: 45vh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 15px;
            font-size: 3.2rem; font-weight: bold; border: 4px solid #fff;
            margin: 10px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.9);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #settings-trigger {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(0,0,0,0.7); border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 2px solid var(--accent);
        }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: rgba(5, 10, 20, 0.98); z-index: 2000; transition: 0.3s;
            padding: 25px; border-left: 5px solid var(--highway-green);
        }
        #settings-panel.active { right: 0; }
        
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding-bottom: 10px; border-bottom: 1px solid #222; }
        select, input[type="number"] { background: #111; color: #fff; border: 1px solid var(--accent); padding: 10px; border-radius: 5px; width: 60%; }
        
        .toggle-switch { width: 50px; height: 25px; appearance: none; background: #444; border-radius: 15px; position: relative; cursor: pointer; outline: none; transition: 0.3s; }
        .toggle-switch:checked { background: var(--accent); }
        .toggle-switch::before { content: ''; position: absolute; width: 21px; height: 21px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-switch:checked::before { left: 27px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #111; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .val { display: block; font-size: 1.4rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button.action { padding: 20px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        #btnStart { background: var(--accent); color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #dirSelector { background: #ffd700; color: #000; grid-column: span 2; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h2 style="color:var(--accent)">CONFIGURAÇÕES</h2>
    
    <div class="setting-item">
        <span>Câmera:</span>
        <select id="camSelect" onchange="changeCamera(this.value)"></select>
    </div>

    <div class="setting-item">
        <span>Modo Noturno (Anti-Reflexo):</span>
        <input type="checkbox" id="cfgNight" class="toggle-switch" onchange="saveCfg()">
    </div>

    <div class="setting-item">Intervalo (ms): <input type="number" id="cfgDelay" value="500" onchange="saveCfg()"></div>
    <div class="setting-item">Fotos/Lote: <input type="number" id="cfgBatch" value="100" onchange="saveCfg()"></div>
    
    <button onclick="resetConfigs()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:8px; margin-top:30px">LIMPAR TUDO</button>
    <button onclick="toggleSettings()" style="width:100%; padding:18px; background:var(--highway-green); color:#fff; border:none; border-radius:8px; font-weight:bold; margin-top:15px">VOLTAR</button>
</div>

<div id="main-container">
    <div id="viewport"><video id="vid" autoplay playsinline muted></video></div>
    <div id="kmPlaque">KM --+---</div>
    
    <div class="dashboard">
        <div class="card">TOTAL<span id="txtTotal" class="val">0</span></div>
        <div class="card">LOTE<span id="txtBuffer" class="val">0</span></div>
        <div id="btnSaveManual" class="card" style="background:#0044cc;">SALVAR<span id="txtPdfs" class="val">0</span></div>
    </div>

    <div class="btn-row">
        <button id="dirSelector" class="action">DEFINIR PASTA DE DESTINO</button>
        <button id="btnStart" class="action" disabled>INICIAR</button>
        <button id="btnStop" class="action" disabled>PARAR</button>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null, currentStream = null;
let startKm = "000", endKm = "000";

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

function saveCfg() {
    localStorage.setItem('highway_cfg', JSON.stringify({
        night: document.getElementById('cfgNight').checked,
        delay: document.getElementById('cfgDelay').value,
        batch: document.getElementById('cfgBatch').value,
        camId: document.getElementById('camSelect').value
    }));
}

function loadCfg() {
    const s = localStorage.getItem('highway_cfg');
    if(s) {
        const c = JSON.parse(s);
        document.getElementById('cfgNight').checked = c.night;
        document.getElementById('cfgDelay').value = c.delay;
        document.getElementById('cfgBatch').value = c.batch;
        return c.camId;
    }
    return null;
}

function resetConfigs() { localStorage.clear(); location.reload(); }

async function listCameras() {
    try { await navigator.mediaDevices.getUserMedia({video: true}); } catch(e){}
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('camSelect');
    select.innerHTML = cams.map((c, i) => `<option value="${c.deviceId}">Device ${i+1} - ${c.label.slice(0,15)}</option>`).join('');
    const last = loadCfg();
    if(last) select.value = last;
    initCamera(select.value);
}

async function initCamera(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id ? {exact: id} : undefined, width: 1920, height: 1080 } });
        vid.srcObject = currentStream;
    } catch(e) { console.error(e); }
}

function changeCamera(id) { initCamera(id); saveCfg(); }

function drawPlaque(data) {
    const w = can.width, h = can.height;
    const b = h / 1080;
    
    ctx.save();
    const pW = 460 * b, pH = 170 * b;
    const pX = 40 * b, pY = h - pH - 40 * b;

    // Chapa da Placa
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur = 20 * b;
    ctx.beginPath();
    ctx.roundRect(pX, pY, pW, pH, 15 * b);
    ctx.fillStyle = "#056b3c";
    ctx.fill();

    // Friso Branco
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 5 * b;
    ctx.strokeRect(pX + 12 * b, pY + 12 * b, pW - 24 * b, pH - 24 * b);

    // Texto KM (Estilo Rodoviário)
    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${85 * b}px Arial Narrow`;
    ctx.textAlign = "center";
    ctx.fillText("KM " + data.km, pX + (pW/2), pY + 85 * b);

    // Legendas
    ctx.font = `bold ${24 * b}px Courier New`;
    ctx.fillText(`LAT: ${data.lat} | LON: ${data.lon}`, pX + (pW/2), pY + 125 * b);
    ctx.font = `${22 * b}px Courier New`;
    ctx.fillText(data.ts, pX + (pW/2), pY + 150 * b);
    ctx.restore();
}

async function captureLoop() {
    if(!isRecording) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    
    if(document.getElementById('cfgNight').checked) {
        ctx.filter = "brightness(1.1) contrast(1.2) saturate(1.1)"; // Ajuste noturno
    }
    
    ctx.drawImage(vid, 0, 0);
    ctx.filter = "none";

    const km = document.getElementById('kmPlaque').textContent.replace('KM ', '');
    if(activeBuffer.length === 0) startKm = km;
    endKm = km;

    const data = {
        km: km,
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        ts: new Date().toLocaleString('pt-BR')
    };
    
    drawPlaque(data);
    activeBuffer.push({ img: can.toDataURL('image/jpeg', 0.8) });
    
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;

    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

async function savePDF() {
    if(!activeBuffer.length || !directoryHandle) return;
    const batch = [...activeBuffer];
    const sK = startKm, eK = endKm;
    activeBuffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR').replace(/\//g, '-');
    const timeStr = now.toLocaleTimeString('pt-BR', {hour:'2d', minute:'2d'}).replace(/:/g, 'h');

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        doc.addImage(batch[i].img, 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
    }

    try {
        const name = `km${sK}-km${eK}_${dateStr}_${timeStr}.pdf`;
        const fileHandle = await directoryHandle.getFileHandle(name, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch(e) { doc.save(`km${sK}-km${eK}.pdf`); }
}

document.getElementById('dirSelector').onclick = async () => {
    directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('dirSelector').textContent = "PASTA OK ✓";
    document.getElementById('btnStart').disabled = false;
};

document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const lines = t.split('\n').slice(1);
        kmDataset = lines.map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(d => !isNaN(d.lat));
    } catch(e) {}
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    if(kmDataset.length) {
        let best = null, minDist = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < minDist) { minDist = d; best = pt; }
        });
        if(best) document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

listCameras(); loadCSV();
</script>
</body>
</html>
