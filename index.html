<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE INSPEÇÃO COM DESENHO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* ADVERTÊNCIA */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .safety-box { max-width: 500px; text-align: center; border: 1px solid #333; padding: 40px; border-radius: 12px; }
        .btn-proceed { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; }

        /* APP E VÍDEO */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }
        
        /* CAMADA DE DESENHO */
        #draw-canvas { position: absolute; inset: 0; z-index: 5; cursor: crosshair; }

        /* HUD E STATUS */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 20px; border: 3px solid #fff; border-radius: 8px; z-index: 10; pointer-events: none; }
        #rec-status { position: absolute; top: 25px; right: 25px; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 6px 15px; border-radius: 20px; z-index: 10; font-weight: 900; }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* FERRAMENTAS DE DESENHO FLUTUANTES */
        #draw-tools { position: absolute; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .tool-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; background: rgba(0,0,0,0.6); color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tool-btn.active { background: var(--accent); color: #000; border-color: #000; }

        /* CONTROLES PRINCIPAIS */
        #ui-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 100; }
        .btn-rect { border: none; font-weight: 900; padding: 20px 40px; font-size: 14px; text-transform: uppercase; border-radius: 6px; cursor: pointer; min-width: 180px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; border: 2px solid #fff; display: none; }
        #gear-btn { width: 55px; height: 55px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* PAINEL CONFIG */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #111; z-index: 4000; padding: 30px; transition: 0.3s; border-left: 2px solid var(--accent); }
        #settings-panel.open { right: 0; }
        select { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        
        canvas#hidden_merger { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="safety-box">
        <h2 style="color:var(--danger); margin-bottom:20px;">MODO DE INSPEÇÃO ATIVO</h2>
        <p style="margin-bottom:30px; font-weight:bold;">VOCÊ PODE DESENHAR NA TELA PARA DESTACAR FALHAS.</p>
        <button class="btn-proceed" onclick="requestAccess()">INICIAR SISTEMA</button>
    </div>
</div>

<div id="draw-tools" style="display: none;">
    <div class="tool-btn active" id="pen-tool" title="Lápis">✏️</div>
    <div class="tool-btn" onclick="clearDraw()" title="Limpar Tudo">🗑️</div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:20px;">CONFIGURAÇÕES</h3>
    <label style="font-size:10px; color:#aaa;">CÂMERA</label>
    <select id="cam-select" onchange="initC(this.value)"></select>
    
    <label style="font-size:10px; color:#aaa;">FOTOS POR LOTE</label>
    <select id="cfg-lote">
        <option value="50">50 Fotos</option>
        <option value="100">100 Fotos</option>
        <option value="200" selected>200 Fotos</option>
    </select>

    <label style="font-size:10px; color:#aaa;">VELOCIDADE</label>
    <select id="cfg-int">
        <option value="200" selected>200 ms</option>
        <option value="500">500 ms</option>
        <option value="1000">1 seg</option>
    </select>
    <button onclick="toggleSet()" class="btn-rect" style="width:100%; background:#fff; color:#000;">FECHAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="draw-canvas"></canvas>
    
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    <div id="rec-status"><div class="dot"></div><span>ON</span></div>

    <div id="ui-controls">
        <button id="gear-btn" onclick="toggleSet(); event.stopPropagation();">⚙️</button>
        <button id="btn-start" class="btn-rect" onclick="initCapture(); event.stopPropagation();">INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-rect" onclick="stopCapture(); event.stopPropagation();">PARAR CAPTURA</button>
    </div>
</div>

<canvas id="hidden_merger"></canvas>

<script>
let rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null, kmDB=[];
let kmInicialLote = "";
const vid=document.getElementById('vid');
const drawCanvas=document.getElementById('draw-canvas'), dctx=drawCanvas.getContext('2d');
const merger=document.getElementById('hidden_merger'), mctx=merger.getContext('2d');

// --- LÓGICA DE DESENHO (TOUCH) ---
let drawing = false;
function setupDrawing() {
    drawCanvas.width = window.innerWidth;
    drawCanvas.height = window.innerHeight;
    dctx.strokeStyle = '#ffcc00'; // Cor amarela Bad Gold para destaque
    dctx.lineWidth = 5;
    dctx.lineCap = 'round';

    drawCanvas.addEventListener('touchstart', (e) => {
        drawing = true;
        const t = e.touches;
        dctx.beginPath();
        dctx.moveTo(t.clientX, t.clientY);
    });

    drawCanvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const t = e.touches;
        dctx.lineTo(t.clientX, t.clientY);
        dctx.stroke();
    });

    drawCanvas.addEventListener('touchend', () => { drawing = false; });
}

function clearDraw() { dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

// --- CORE DO SISTEMA ---
async function keepScreenAlive() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

function forceFull() { 
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
}

async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        document.getElementById('draw-tools').style.display = 'flex';
        setupDrawing();
        await keepScreenAlive();
        forceFull();
        await listCams();
        initGPS();
    } catch (e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">CÂMERA ${i+1}</option>`).join('');
    if(vids.length > 0) { sel.value = vids[vids.length-1].deviceId; initC(sel.value); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: {ideal: 1280}, height: {ideal: 720} } });
    vid.srcObject = currentStream;
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("KM ","");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("KM ",""));
    rec = false; buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        // Redimensiona o merger para o tamanho real do vídeo
        merger.width = vid.videoWidth; merger.height = vid.videoHeight;
        
        // 1. Desenha o Vídeo
        mctx.drawImage(vid, 0, 0, merger.width, merger.height);
        
        // 2. Desenha o que está no Canvas de Pintura por cima (ajustando escala)
        mctx.drawImage(drawCanvas, 0, 0, merger.width, merger.height);
        
        const curKm = document.getElementById('km-txt').innerText.replace("KM ","");
        buffer.push({ 
            raw: merger.toDataURL('image/jpeg', 0.5), 
            km: curKm, 
            ts: new Date().toLocaleTimeString('pt-BR') 
        });

        let limite = parseInt(document.getElementById('cfg-lote').value);
        if(buffer.length >= limite) {
            savePDF([...buffer], kmInicialLote, curKm);
            buffer = []; kmInicialLote = curKm;
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF(data, ini, fim) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        doc.addImage(data[i].raw, 'JPEG', 0, 0, pw, ph);
        // Barra de Informação no PDF
        doc.setFillColor(0,0,0,0.7); doc.rect(0, ph-15, pw, 15, 'F');
        doc.setTextColor(255,255,255); doc.setFontSize(10);
        doc.text(`Km ${data[i].km} | ${data[i].ts} | ${new Date().toLocaleDateString('pt-BR')}`, 10, ph-6);
    }

    const d = new Date();
    const p = (n) => n.toString().padStart(2, '0');
    const nome = `Relat_Km_${ini}_a_Km_${fim}_${p(d.getDate())}${p(d.getMonth()+1)}.pdf`;
    
    try {
        const fh = await dirHandle.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch (e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        // (Aqui entra a lógica de carga do CSV que já tínhamos)
        // Para teste, simulando KM pelo GPS direto se não houver CSV
        document.getElementById('km-txt').innerText = "KM " + (p.coords.speed || 0).toFixed(0);
    }, null, {enableHighAccuracy:true});
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
