<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Sistema de Apoio - Captura Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
    --accent:#ffcc00;
    --placa-verde:rgba(0,121,52,.6);
    --danger:#ff4444;
    --glass:rgba(10,10,10,.9);
}
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden}

#safety-gate{
    position:fixed;inset:0;background:#000;
    display:flex;align-items:center;justify-content:center;z-index:9999
}
.alert-box{
    background:#0a0a0a;padding:40px;border-radius:15px;
    border:1px solid #333;text-align:center
}
.btn-aware{
    background:var(--accent);border:none;padding:20px 50px;
    font-weight:900;border-radius:8px;cursor:pointer
}

#app-shell{width:100vw;height:100vh;visibility:hidden;position:relative}
#vid{width:100%;height:100%;object-fit:cover}

#km-hud{
    position:absolute;top:20px;left:20px;
    background:var(--placa-verde);
    padding:10px 20px;border-radius:8px;
    border:3px solid rgba(255,255,255,.7);
    text-align:center;z-index:100
}
#km-txt{font-size:2.4rem;font-weight:900}

#rec-tag{
    position:absolute;top:40px;right:15px;
    display:flex;align-items:center;gap:6px;
    background:rgba(0,0,0,.5);
    padding:5px 12px;border-radius:15px;
    opacity:0;z-index:100
}
.dot{width:8px;height:8px;background:red;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}

#ui-controls{
    position:absolute;bottom:40px;left:50%;
    transform:translateX(-50%);
    display:flex;gap:20px;z-index:500
}
.ui-hidden{opacity:0;visibility:hidden}

.btn-main{
    border:none;padding:18px 40px;
    border-radius:12px;font-weight:900;cursor:pointer
}
#btn-start{background:var(--accent)}
#btn-stop{background:var(--danger);display:none}

#gear-btn{
    width:60px;height:60px;
    background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;
    border-radius:12px;font-size:24px
}

canvas{display:none}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none}
</style>
</head>

<body>

<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent)">SISTEMA DE APOIO</h2>
        <p>Captura automática + foto manual</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>

    <div id="km-hud">
        <div id="km-txt">Km ---</div>
    </div>

    <div id="rec-tag">
        <div class="dot"></div>
        <span>Registrando PDF</span>
    </div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let capturing=false, buffer=[], currentStream=null, hDir=null
let curLat="0.000000", curLon="0.000000"
let kmDB=[], kmInicialLote=""

const vid=document.getElementById('vid')
const can=document.getElementById('c')
const ctx=can.getContext('2d')

async function startApp(){
    hDir=await window.showDirectoryPicker({mode:'readwrite'})
    document.getElementById('safety-gate').remove()
    document.getElementById('app-shell').style.visibility='visible'
    listCams();loadCSV();initGPS()
}

async function listCams(){
    const d=await navigator.mediaDevices.enumerateDevices()
    const cam=d.find(x=>x.kind==="videoinput")
    if(cam) switchCam(cam.deviceId)
}

async function switchCam(id){
    if(currentStream)currentStream.getTracks().forEach(t=>t.stop())
    currentStream=await navigator.mediaDevices.getUserMedia({video:{deviceId:id}})
    vid.srcObject=currentStream
    vid.onloadedmetadata=()=>{
        can.width=vid.videoWidth
        can.height=vid.videoHeight
    }
}

function handleTouch(){takeManualPhoto()}

async function takeManualPhoto(){
    ctx.drawImage(vid,0,0,can.width,can.height)
    const km=document.getElementById('km-txt').innerText.replace("Km ","")
    const bh=can.height*0.1
    ctx.fillStyle="rgba(0,0,0,.6)"
    ctx.fillRect(0,can.height-bh,can.width,bh)
    ctx.fillStyle="#fff"
    ctx.font=`bold ${bh*0.35}px Arial`
    ctx.fillText(`Km ${km}`,20,can.height-bh*0.55)
    ctx.font=`${bh*0.22}px Arial`
    ctx.fillText(`${new Date().toLocaleString()} | GPS ${curLat}, ${curLon}`,20,can.height-bh*0.25)
    const blob=await new Promise(r=>can.toBlob(r,"image/jpeg",.95))
    const file=await hDir.getFileHandle(`MANUAL_Km_${km}_${Date.now()}.jpg`,{create:true})
    const w=await file.createWritable()
    await w.write(blob);await w.close()
}

function startCapture(){
    capturing=true;buffer=[]
    kmInicialLote=document.getElementById('km-txt').innerText.replace("Km ","")
    document.getElementById('btn-start').style.display='none'
    document.getElementById('btn-stop').style.display='block'
    document.getElementById('rec-tag').style.opacity=1
    loop()
}

function stopCapture(){
    capturing=false
    if(buffer.length){
        const kmFim=document.getElementById('km-txt').innerText.replace("Km ","")
        savePDF(buffer,kmInicialLote,kmFim)
    }
    buffer=[]
    document.getElementById('btn-start').style.display='block'
    document.getElementById('btn-stop').style.display='none'
    document.getElementById('rec-tag').style.opacity=0
}

function loop(){
    if(!capturing)return
    const km=document.getElementById('km-txt').innerText.replace("Km ","")
    ctx.drawImage(vid,0,0,can.width,can.height)
    buffer.push({img:can.toDataURL("image/jpeg",.5),km,ts:new Date().toLocaleString(),gps:`${curLat},${curLon}`})
    setTimeout(loop,200)
}

async function savePDF(list,ini,fim){
    const doc=new jspdf.jsPDF('l','mm','a4')
    for(let i=0;i<list.length;i++){
        if(i)doc.addPage()
        const img=new Image()
        await new Promise(r=>{
            img.onload=()=>{
                ctx.drawImage(img,0,0)
                doc.addImage(can.toDataURL("image/jpeg",.7),'JPEG',0,0,297,210)
                r()
            }
            img.src=list[i].img
        })
    }
    const file=await hDir.getFileHandle(`RELATORIO_Km_${ini}_ao_${fim}_${Date.now()}.pdf`,{create:true})
    const w=await file.createWritable()
    await w.write(doc.output("blob"));await w.close()
}

function initGPS(){
    navigator.geolocation.watchPosition(p=>{
        curLat=p.coords.latitude.toFixed(6)
        curLon=p.coords.longitude.toFixed(6)
        if(!kmDB.length)return
        let b=null,d=999
        kmDB.forEach(x=>{
            const dx=Math.hypot(x.lt-p.coords.latitude,x.ln-p.coords.longitude)
            if(dx<d){d=dx;b=x}
        })
        if(b)document.getElementById('km-txt').innerText="Km "+b.km
    })
}

async function loadCSV(){
    const t=await (await fetch("SNVBR116SPRJ.csv")).text()
    kmDB=t.split("\n").slice(1).map(l=>{
        const c=l.split(";")
        return{km:c[0],lt:parseFloat(c[1]),ln:parseFloat(c[2])}
    })
}

function toggleSet(){}
</script>

</body>
</html>
