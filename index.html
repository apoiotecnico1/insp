<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5.9 - KM VIA CSV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 65vw !important; height: 100vh !important; border-right: 2px solid #222; }
            #controls { width: 35vw; height: 100vh; overflow-y: auto; background: #050a16; }
        }

        #viewport { position: relative; width: 100vw; height: 42vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 12px;
            font-size: 2.8rem; font-weight: 900; border: 4px solid #fff;
            margin: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        #settings-trigger {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(0,0,0,0.7); border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 2px solid var(--accent); font-size: 26px;
        }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: rgba(10, 15, 28, 0.98); z-index: 2000; transition: 0.4s;
            overflow-y: auto; padding: 25px; border-left: 3px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .cam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .cam-btn-ui { padding: 15px; background: #1a2235; border: 1px solid #444; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cam-btn-ui.active { background: var(--accent); color: #000; border-color: white; }

        .setting-item { margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        select, input { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; }

        .status-bar { display: flex; justify-content: space-around; padding: 8px; background: #050a16; font-size: 0.7rem; }
        .st { padding: 3px 10px; border-radius: 20px; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px; }
        .card { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button.action { padding: 18px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #dirSelector { background: var(--gold); color: #000; grid-column: span 2; }
        #dirSelector.ready { background: #00ff66; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h2 style="color:var(--accent); margin-top:0">CONFIGURAÇÕES</h2>
    
    <label>SELECIONAR CÂMERA (1-4):</label>
    <div class="cam-grid" id="camListUI"></div>

    <div class="setting-item">
        <label>Qualidade do Sensor:</label>
        <select id="cfgRes" onchange="initDefaultCam()">
            <option value="1080">Full HD (1080p)</option>
            <option value="720">HD (720p)</option>
        </select>
    </div>

    <div class="setting-item">
        <label>Brilho Imagem:</label>
        <input type="range" id="cfgBright" min="50" max="150" value="100">
    </div>

    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; font-weight:bold">FECHAR E VOLTAR</button>
</div>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: OFF</div>
            <div id="stGps" class="st">GPS: BUSCANDO</div>
            <div id="stCam" class="st">CAM: OFF</div>
        </div>

        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/50</span></div>
            <div class="card">PDFs<span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="dirSelector" class="action">1. PASTA DE DESTINO</button>
            <button id="btnStart" class="action" disabled>2. INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null, videoDevices = [];

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// --- CÂMERAS ---
async function setupCameras() {
    try {
        await navigator.mediaDevices.getUserMedia({video: true});
        const devices = await navigator.mediaDevices.enumerateDevices();
        videoDevices = devices.filter(d => d.kind === 'videoinput');
        
        const uiList = document.getElementById('camListUI');
        uiList.innerHTML = '';
        
        videoDevices.slice(0, 4).forEach((d, i) => {
            const btn = document.createElement('button');
            btn.className = 'cam-btn-ui';
            btn.innerText = `CÂMERA ${i + 1}`;
            btn.onclick = () => {
                switchCamera(d.deviceId);
                document.querySelectorAll('.cam-btn-ui').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            uiList.appendChild(btn);
            if(i === 0) { btn.classList.add('active'); switchCamera(d.deviceId); }
        });
        document.getElementById('stCam').textContent = "CAM: OK";
        document.getElementById('stCam').classList.add('ok');
    } catch (e) { console.error(e); }
}

async function switchCamera(id) {
    if (vid.srcObject) { vid.srcObject.getTracks().forEach(t => t.stop()); vid.srcObject = null; }
    const res = document.getElementById('cfgRes').value === "1080";
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: id }, width: { ideal: res?1920:1280 }, height: { ideal: res?1080:720 } }
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    } catch(e) {
        const fallback = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: id } } });
        vid.srcObject = fallback;
    }
}

function initDefaultCam() {
    const active = document.querySelector('.cam-btn-ui.active');
    if(active) active.click();
}

// --- LÓGICA CSV E POSIÇÃO ---
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

async function loadKMCSV(){
    try {
        const resp = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const text = await resp.text();
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        lines.shift(); // Remove cabeçalho
        kmDataset = lines.map(l => {
            const r = l.split(';');
            return { km: r, lat: parseFloat(r.replace(',','.')), lon: parseFloat(r.replace(',','.')) };
        }).filter(p => !isNaN(p.lat));
        document.getElementById('stCsv').textContent = "CSV: OK";
        document.getElementById('stCsv').classList.add('ok');
    } catch(e) { document.getElementById('stCsv').textContent = "CSV: ERR"; }
}

function updateKM() {
    if(!lastPos || !kmDataset.length) return;
    let best = null, bd = Infinity;
    for(const p of kmDataset){
        const d = hav(lastPos.lat, lastPos.lon, p.lat, p.lon);
        if(d < bd){ bd = d; best = p; }
    }
    if(best) document.getElementById('kmPlaque').textContent = "KM " + best.km;
}

// --- ESTAMPA (DESIGN VERDE) ---
function drawHighwayStamp(item) {
    const w = can.width, h = can.height;
    const scale = h / 1080;
    const margin = 35 * scale;
    const plateW = 520 * scale;
    const plateH = 210 * scale;
    const radius = 22 * scale;

    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.6)"; ctx.shadowBlur = 15 * scale; ctx.shadowOffsetY = 8 * scale;
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.roundRect(margin, h - plateH - margin, plateW, plateH, radius); ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = "#056b3c";
    const pad = 8 * scale;
    ctx.beginPath(); ctx.roundRect(margin + pad, h - plateH - margin + pad, plateW - (pad*2), plateH - (pad*2), radius - (5*scale)); ctx.fill();
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = `900 ${85 * scale}px Arial Black, sans-serif`;
    ctx.fillText("KM " + item.km, margin + (plateW/2), h - margin - (plateH/2));

    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    const infoS = 25 * scale; ctx.font = `bold ${infoS}px monospace`;
    const infoX = margin + plateW + (30 * scale);
    const spacing = 35 * scale;
    const drawT = (t, x, y) => {
        ctx.strokeStyle = "black"; ctx.lineWidth = 5 * scale; ctx.strokeText(t, x, y);
        ctx.fillStyle = "white"; ctx.fillText(t, x, y);
    };
    drawT(`LAT: ${item.lat}`, infoX, h - margin - (spacing * 2));
    drawT(`LON: ${item.lon}`, infoX, h - margin - spacing);
    drawT(`DATA: ${item.ts}`, infoX, h - margin);
    ctx.restore();
}

// --- PDF ---
async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = []; pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        await new Promise(res => {
            const img = new Image();
            img.onload = () => {
                ctx.filter = `brightness(${document.getElementById('cfgBright').value}%)`;
                ctx.drawImage(img, 0, 0, can.width, can.height);
                ctx.filter = "none";
                drawHighwayStamp(batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].raw;
        });
    }
    const name = `INSPECAO_LOTE_${pdfCount}.pdf`;
    if (directoryHandle) {
        const file = await directoryHandle.getFileHandle(name, { create: true });
        const stream = await file.createWritable();
        await stream.write(doc.output('blob')); await stream.close();
    } else { doc.save(name); }
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        raw: can.toDataURL('image/jpeg', 0.6),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        ts: new Date().toLocaleString('pt-BR')
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/50`;
    if(activeBuffer.length >= 50) savePDF();
    setTimeout(captureLoop, 1000);
}

document.getElementById('dirSelector').onclick = async () => {
    directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('dirSelector').textContent = "✓ CONECTADO";
    document.getElementById('dirSelector').classList.add('ready');
    document.getElementById('btnStart').disabled = false;
};

document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').classList.add('ok');
    updateKM();
}, null, {enableHighAccuracy:true});

setupCameras();
loadKMCSV();
</script>
</body>
</html>
