<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b7a39" />
<title>KM – Placa</title>
<style>
  :root{
    --green:#0b7a39; --green2:#085e2c; --fg:#eaf2ff; --border:#e6f0ea;
  }
  html,body{
    margin:0; height:100%; background:#000; color:#fff;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  /* Contêiner central */
  .wrap{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* Placa de trânsito verde (estilo original) */
  #kmBox{
    background:linear-gradient(180deg,var(--green),var(--green2));
    color:#fff;
    padding:14px 26px;
    border-radius:20px;
    border:6px solid var(--border);
    font-size: clamp(28px, 8vw, 120px);
    font-weight:1000;
    text-shadow:0 1px 0 rgba(0,0,0,.45);
    box-shadow:
      0 14px 28px rgba(0,0,0,.5),
      inset 0 0 0 3px rgba(255,255,255,.5);
    letter-spacing:.5px;
    user-select:none;
  }

  /* Toast simples para mensagens */
  #toast{
    position:fixed; left:50%; bottom:calc(16px + env(safe-area-inset-bottom));
    transform:translateX(-50%); display:none;
    background:rgba(0,0,0,.75); color:#fff; border:1px solid rgba(255,255,255,.18);
    padding:8px 12px; border-radius:10px; font-size:.95rem; z-index:5
  }

  /* Dica inicial (só aparece até começar a receber GPS) */
  #hint{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    color:#cfe7ff; font-weight:700; font-size:.95rem; opacity:.9;
    text-align:center; padding:4px 10px; border-radius:10px; background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.12);
  }
</style>
</head>
<body>

<div id="hint">Permita a Localização para ver o KM</div>

<div class="wrap">
  <div id="kmBox" aria-live="polite">KM —</div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ======= Config ======= */
const CSV_PATH = './SNVBR116SPRJ.csv'; // km;lat;lon (separador ;)
const UPDATE_MS = 800;                 // atualização periódica (reforço do watch)
const toastEl = document.getElementById('toast');
const kmBox   = document.getElementById('kmBox');
const hint    = document.getElementById('hint');

let kmPoints = [];   // {km,lat,lon}
let lastPos  = null; // {lat,lon,acc}

/* ======= Utils ======= */
function showToast(msg, ms=1300){
  toastEl.textContent=msg; toastEl.style.display='block';
  clearTimeout(showToast._t); showToast._t=setTimeout(()=>toastEl.style.display='none',ms);
}
function parsePt(v){
  if(v==null) return NaN;
  const s=String(v).trim();
  // Aceita "10,123" como decimal
  return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s);
}
function hav(a,b,c,d){ // haversine em metros
  const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function fmtKm(v){
  if(!Number.isFinite(v)) return 'KM —';
  let K=Math.floor(v), m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K+=1}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}

/* ======= Dados (CSV) ======= */
async function loadKM(){
  try{
    const txt = await fetch(CSV_PATH, {cache:'no-store'}).then(r=>r.text());
    kmPoints.length=0;
    txt.split(/\r?\n/).forEach(l=>{
      if(!l.trim()) return;
      const c=l.split(';');
      const km=parsePt(c[0]), lat=parsePt(c[1]), lon=parsePt(c[2]);
      if(Number.isFinite(km) && Number.isFinite(lat) && Number.isFinite(lon)){
        kmPoints.push({km,lat,lon});
      }
    });
    if(!kmPoints.length) showToast('CSV sem pontos de KM', 1800);
  }catch(e){
    console.error(e);
    showToast('Não foi possível carregar o CSV de KM', 1800);
  }
}

/* ======= GPS + Atualização do KM ======= */
function updateKM(){
  if(!lastPos || !kmPoints.length){
    kmBox.textContent = 'KM —';
    return;
  }
  let best=null, bestD=Infinity;
  const {lat,lon} = lastPos;
  // Seleciona o ponto de referência de KM mais próximo
  for(const p of kmPoints){
    const d = hav(lat,lon,p.lat,p.lon);
    if(d < bestD){ bestD = d; best = p; }
  }
  kmBox.textContent = best ? fmtKm(best.km) : 'KM —';
  if(best) hint.style.display = 'none';
}

function startGPS(){
  if(!('geolocation' in navigator)){
    showToast('Sem suporte a GPS no navegador', 1800);
    return;
  }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos = {lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    updateKM();
    hint.style.display = 'none';
    // Watch contínuo
    navigator.geolocation.watchPosition(pp=>{
      lastPos = {lat:pp.coords.latitude, lon:pp.coords.longitude, acc:pp.coords.accuracy};
      updateKM();
    }, err=>{
      console.warn('watchPosition error', err);
    }, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
  }, err=>{
    console.warn('getCurrentPosition error', err);
    showToast('Autorize a Localização para atualizar o KM', 2200);
  }, {enableHighAccuracy:true, timeout:10000});
}

/* ======= Init ======= */
(async function init(){
  await loadKM();
  startGPS();
  // Reforço periódico (caso o watch seja “preguiçoso”)
  setInterval(updateKM, UPDATE_MS);
})();
</script>
</body>
</html>
