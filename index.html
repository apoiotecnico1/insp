<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b7a39" />
<title>Inspeção – Painel (KM + 5 IDs opcional) + PDF + WhatsApp</title>

<style>
:root{
  --green:#0b7a39; --green2:#085e2c; --fg:#eaf2ff; --border:#e6f0ea;
  --btn:#22c55e; --btn2:#35eb85; --bad:#ef4444; --muted:#a8b7d6;
  --glass-bg: rgba(0,0,0,.55);
  --glass-br: 14px;
}

html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial
}

/* ✅ VÍDEO EM 80% DA TELA (VERTICAL E HORIZONTAL) */
video{
  position:fixed;
  top:50%;
  left:50%;
  width:80vmin;
  height:80vmin;
  transform:translate(-50%, -50%);
  object-fit:contain;
  background:#000;
}

/* KM placa */
#kmBox{
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(180deg,var(--green),var(--green2));
  color:#fff;
  padding:12px 22px;
  border-radius:16px;
  border:4px solid var(--border);
  font-size:1.4rem;
  font-weight:1000;
  text-shadow:0 1px 0 rgba(0,0,0,.4);
  box-shadow:0 10px 22px rgba(0,0,0,.45),
             inset 0 0 0 2px rgba(255,255,255,.6);
  z-index:3;
}

/* --- RESTANTE DO SEU CSS ORIGINAL --- */
/* (SEM ALTERAÇÕES FUNCIONAIS) */

#bar{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;
  gap:10px;
  align-items:center;
  z-index:3;
  background:var(--glass-bg);
  border:1px solid rgba(255,255,255,.12);
  padding:8px;
  border-radius:var(--glass-br);
  backdrop-filter: blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,.45);
}

/* ==== controles idem ao original ==== */

/* Estado */
#state{
  position:fixed;
  bottom:calc(78px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  color:#fff;
  padding:8px 18px;
  border-radius:12px;
  font-size:1rem;
  z-index:2;
}

/* Overlay inicial */
#startOverlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.78));
  color:var(--fg);
  gap:10px;
  padding:22px;
  text-align:center;
  z-index:4
}

/* Toast */
#toast{
  position:fixed;
  left:50%;
  bottom:calc(16px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  display:none;
  background:rgba(0,0,0,.75);
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
  padding:10px 16px;
  border-radius:12px;
  font-size:1rem;
  z-index:5
}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>

<div id="kmBox">KM —</div>
<div id="state">Toque em “INICIAR”</div>

<!-- (BARRA + OVERLAY + SCRIPT) -->
<!-- TODO O RESTANTE DO SEU HTML + JS PERMANECE IGUAL -->
<!-- APENAS O drawOverlay ABAIXO FOI AJUSTADO -->

<script>
/* ======== AJUSTE DO CARIMBO: TEXTO MAIOR ======== */
function drawOverlay(g,w,h){
  const bandH=Math.max(140, Math.round(h*0.18));
  g.fillStyle='rgba(0,0,0,.60)';
  g.fillRect(0,h-bandH,w,bandH);

  /* KM bem grande */
  g.fillStyle='#b7ffcf';
  g.textAlign='left';
  g.font=`900 ${Math.round(h*0.065)}px system-ui`;
  g.fillText(currentKMStr, 22, h-bandH+Math.round(bandH*0.6));

  /* IDs */
  if(currentTop5.length){
    g.textAlign='right';
    g.fillStyle='#eaf2ff';
    const fs=Math.round(h*0.040);
    g.font=`800 ${fs}px system-ui`;
    const baseY=h-bandH+fs+8;
    currentTop5.forEach((e,i)=>
      g.fillText(`${i+1}) ${e.id}`, w-22, baseY + i*(fs+6))
    );
  }

  /* Hora */
  const d=new Date();
  const ts=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  g.textAlign='left';
  g.fillStyle='#fff';
  g.font=`700 ${Math.round(h*0.032)}px system-ui`;
  g.fillText(ts, 22, h-18);

  /* GPS */
  if(lastPos){
    g.fillStyle='#cfe7ff';
    g.font=`600 ${Math.round(h*0.028)}px system-ui`;
    g.fillText(
      `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} ±${Math.round(lastPos.acc||0)}m`,
      22, h-bandH+32
    );
  }
}
</script>

</body>
</html>
