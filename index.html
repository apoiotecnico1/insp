<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>SISTEMA DE ALERTA - ANEL FIBRA</title>
    <style>
        :root { --danger: #ff3030; --safe: #2ecc71; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #status-shield { padding: 10px 25px; border-radius: 4px; font-weight: bold; border: 1px solid #333; }
        .status-ok { background: rgba(46, 204, 113, 0.2); color: var(--safe); border-color: var(--safe) !important; }
        .status-alarm { background: rgba(255, 48, 48, 0.4); color: var(--danger); border-color: var(--danger) !important; animation: pulse 0.5s infinite; }

        #main { flex: 1; display: grid; grid-template-columns: 1fr 300px; gap: 10px; padding: 10px; overflow: hidden; }
        #preview-container { background: #000; border: 1px solid #222; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { max-width: 100%; max-height: 100%; }
        
        #log { background: #111; padding: 15px; font-size: 11px; overflow-y: auto; border: 1px solid #222; color: #0f0; }
        
        #controls { background: #1a1a1a; padding: 20px; display: flex; gap: 20px; border-top: 1px solid #333; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-start { background: var(--safe); color: #000; }
        #btn-mute { background: var(--danger); color: #fff; display: none; }

        @keyframes pulse { 50% { background: var(--danger); color: #fff; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-size: 18px; font-weight: bold; letter-spacing: 2px;">HUAWEI RING MONITOR <span style="font-size: 10px; color: #666;">v1.0</span></div>
    <div id="status-shield" class="status-ok">SISTEMA OFFLINE</div>
</div>

<div id="main">
    <div id="preview-container">
        <video id="v" autoplay></video>
        <div id="scanner-overlay" style="position:absolute; inset:0; border: 2px dashed rgba(0,242,255,0.3); pointer-events:none;"></div>
    </div>
    <div id="log">SISTEMA PRONTO. AGUARDANDO SCREEN SHARE...</div>
</div>

<div id="controls">
    <button id="btn-start" class="btn" onclick="startMonitor()">Monitorar Tela Huawei</button>
    <button id="btn-mute" class="btn" onclick="silenceAlarm()">SILENCIAR ALARME</button>
</div>

<canvas id="c"></canvas>

<script>
let stream = null;
let isAlarming = false;
const v = document.getElementById('v');
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const log = document.getElementById('log');
const shield = document.getElementById('status-shield');

// Configuração do Alarme Sonoro
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let alarmInterval = null;

function playAlarmSound() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
}

async function startMonitor() {
    try {
        // Pede para o usuário selecionar a janela do sistema Huawei
        stream = await navigator.mediaDevices.getDisplayMedia({ 
            video: { cursor: "never" },
            audio: false 
        });
        v.srcObject = stream;
        
        shield.innerText = "MONITORANDO ANEL";
        addLog("Captura de tela iniciada.");
        document.getElementById('btn-start').style.display = 'none';
        
        analyzeFrame();
    } catch (err) {
        addLog("Erro ao acessar tela: " + err);
    }
}

function analyzeFrame() {
    if(!stream) return;
    
    c.width = v.videoWidth;
    c.height = v.videoHeight;
    ctx.drawImage(v, 0, 0, c.width, c.height);
    
    // Analisamos a imagem em busca de pixels vermelhos críticos
    const imgData = ctx.getImageData(0, 0, c.width, c.height).data;
    let redPixels = 0;

    // Varre a imagem procurando tons de vermelho (típico de alarme Huawei)
    for (let i = 0; i < imgData.length; i += 20) { // Pula pixels para performance
        const r = imgData[i];
        const g = imgData[i+1];
        const b = imgData[i+2];

        // Lógica: Vermelho bem vivo e pouco verde/azul
        if (r > 180 && g < 60 && b < 60) {
            redPixels++;
        }
    }

    // Se encontrar uma massa de pixels vermelhos (ajuste o '50' conforme o tamanho do ícone no mapa)
    if (redPixels > 50 && !isAlarming) {
        triggerAlarm();
    }

    requestAnimationFrame(analyzeFrame);
}

function triggerAlarm() {
    isAlarming = true;
    shield.innerText = "ALERTA: ROMPIMENTO DETECTADO!";
    shield.className = "status-alarm";
    document.getElementById('btn-mute').style.display = 'block';
    addLog("!!! ALARME VISUAL DETECTADO NA TOPOLOGIA !!!");
    
    alarmInterval = setInterval(playAlarmSound, 1000);
}

function silenceAlarm() {
    isAlarming = false;
    clearInterval(alarmInterval);
    shield.innerText = "MONITORANDO ANEL";
    shield.className = "status-ok";
    document.getElementById('btn-mute').style.display = 'none';
    addLog("Alarme silenciado pelo técnico.");
}

function addLog(msg) {
    const t = new Date().toLocaleTimeString();
    log.innerHTML = `[${t}] ${msg}<br>` + log.innerHTML;
}
</script>
</body>
</html>
