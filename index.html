<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b7a39" />
<title>Inspeção Contínua – TURBO (KM + Fotos + PDF)</title>
<style>
  :root{
    --green:#0b7a39; --green2:#085e2c; --fg:#eaf2ff; --border:#e6f0ea;
    --glass: rgba(0,0,0,.55);
    --btn:#22c55e; --btn2:#35eb85; --bad:#ef4444; --muted:#a8b7d6;
  }
  html,body{
    margin:0;height:100%;background:#000;overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial
  }
  video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000}

  /* Placa KM (estilo trânsito) */
  #kmBox{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,var(--green),var(--green2)); color:#fff;
    padding:14px 24px; border-radius:18px; border:6px solid var(--border);
    font-size:clamp(28px,8vw,120px); font-weight:1000; text-shadow:0 1px 0 rgba(0,0,0,.45);
    box-shadow:0 14px 28px rgba(0,0,0,.5), inset 0 0 0 3px rgba(255,255,255,.5);
    z-index:3; user-select:none; letter-spacing:.5px
  }

  /* Barra inferior */
  #bar{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom)); z-index:4;
    display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;
    background:var(--glass); border:1px solid rgba(255,255,255,.12);
    padding:8px; border-radius:14px; backdrop-filter: blur(8px);
    box-shadow:0 8px 24px rgba(0,0,0,.45); max-width:min(100vw - 16px, 1200px);
  }
  .control{
    height:52px; min-width:160px;
    padding:0 16px; border-radius:12px; border:1px solid rgba(255,255,255,.18);
    font-weight:1000; font-size:1rem; cursor:pointer; line-height:1;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    user-select:none; outline:none;
    transition:transform .06s ease, filter .12s ease, opacity .12s ease;
    color:#062a1a; background:linear-gradient(180deg,#35eb85,#22c55e);
  }
  .control:active{ transform:translateY(1px) }
  .control.stop{ background:linear-gradient(180deg,#f2544b,#cc3e36); color:#fff; }
  .chip{
    height:52px; padding:0 12px; border-radius:12px;
    border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.45); color:#eaf2ff;
    display:inline-flex; align-items:center; gap:10px; font-weight:900
  }
  .chip select{
    height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:#0d1731; color:#eaf2ff; padding:0 8px; font-weight:900; outline:none;
  }
  .muted{color:#cbd5e1; font-size:.9rem}

  /* Estado/Stats */
  #state{
    position:fixed; bottom:calc(78px + env(safe-area-inset-bottom));
    left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.6); color:#fff; padding:6px 14px; border-radius:10px;
    font-size:.92rem; z-index:3
  }

  /* Overlay inicial */
  #startOverlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.78)); color:var(--fg); gap:10px; padding:22px; text-align:center; z-index:5
  }
  #startOverlay h2{margin:0 0 6px; font-size:1.14rem}
  #btnStart{
    margin-top:10px; min-width:240px; height:56px; padding:0 18px; border-radius:14px; border:2px solid #0caa52;
    background:linear-gradient(180deg,#35eb85,#22c55e); color:#062a1a; font-weight:1000; font-size:1.02rem; cursor:pointer
  }
  #btnStart:active{ transform:translateY(1px) }

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:calc(16px + env(safe-area-inset-bottom)); transform:translateX(-50%); display:none;
    background:rgba(0,0,0,.78); color:#fff; border:1px solid rgba(255,255,255,.18);
    padding:8px 12px; border-radius:10px; font-size:.95rem; z-index:6
  }

  @media (max-width:760px){
    .control{min-width:140px; font-size:.95rem}
    .chip{font-size:.95rem}
  }
</style>
</head>
<body>

<video id="vid" autoplay playsinline muted></video>

<div id="kmBox">KM —</div>
<div id="state">Toque em “INICIAR (TURBO)”</div>

<!-- Barra -->
<div id="bar" role="toolbar" aria-label="Controles">
  <button id="btnStartStop" class="control" aria-pressed="false">▶ INICIAR (TURBO)</button>

  <div class="chip" title="Amostragem para o PDF">
    📄 PDF a cada
    <select id="pdfStep" aria-label="Usar 1 página a cada N fotos">
      <option value="5">5 fotos</option>
      <option value="10" selected>10 fotos</option>
      <option value="20">20 fotos</option>
      <option value="30">30 fotos</option>
    </select>
  </div>

  <button id="btnPDF" class="control" title="Gerar relatório PDF" disabled>📄 PDF</button>
</div>

<!-- Overlay inicial -->
<div id="startOverlay">
  <h2>Inspeção – Modo TURBO contínuo</h2>
  <p class="muted">Em 1 clique: escolhe/recupera pasta, liga Câmera + GPS e inicia captura no limite do aparelho.</p>
  <button id="btnStart">▶ INICIAR (TURBO)</button>
  <p class="muted">Requisitos: <b>HTTPS</b>, permitir <b>Câmera</b> e <b>Localização</b>, e escolher a <b>Pasta</b>.</p>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ================= CONFIG ================= */
const CSV_PATH = './SNVBR116SPRJ.csv'; // km;lat;lon
const TARGET_MIN_MS = 100;            // alvo mínimo (100 ms ~ 10 fps)
const START_MAX_DIM = 1600;           // dimensão máx. inicial (reduz se ficar pesado)
const START_JPEG_Q = 0.88;            // qualidade inicial (reduz se ficar pesado)
const MIN_DIM = 960;                  // não reduz abaixo disso automaticamente
const MIN_JPEG_Q = 0.78;              // qualidade mínima em modo auto
const REPORT_MAX_PAGES = 600;         // divide em volumes
/* ========================================== */

/* ================= REFS/STATE ============== */
const vid = document.getElementById('vid');
const kmBox = document.getElementById('kmBox');
const stateEl = document.getElementById('state');
const startOverlay = document.getElementById('startOverlay');
const btnStartOverlay = document.getElementById('btnStart');
const btnStartStop = document.getElementById('btnStartStop');
const btnPDF = document.getElementById('btnPDF');
const pdfStepSel = document.getElementById('pdfStep');
const toast = document.getElementById('toast');

let dirHandle = null;
let running = false;
let busy = false;
let lastPos = null;

let kmPoints = [];     // {km,lat,lon}
let currentKMStr = 'KM —';

let sessionStart = null;
let sessionEnd = null;
let sessionPhotos = [];   // nomes dos arquivos salvos
let reportFiles = [];     // PDFs gerados

// Dinâmica de performance
let maxDim = START_MAX_DIM;
let jpegQ = START_JPEG_Q;
let encAvgMs = null;      // média móvel do tempo de encode+gravação
const ENC_ALPHA = 0.25;

/* Canvas de trabalho */
const can = document.createElement('canvas');
const ctx = can.getContext('2d', {alpha:false});

/* ================== UI ================== */
function showToast(msg, ms=1200){
  toast.textContent=msg; toast.style.display='block';
  clearTimeout(showToast.t); showToast.t=setTimeout(()=>toast.style.display='none',ms);
}
const z2 = v => String(v).padStart(2,'0');
function stampNow(){ const d=new Date(); return `${d.getFullYear()}-${z2(d.getMonth()+1)}-${z2(d.getDate())}_${z2(d.getHours())}-${z2(d.getMinutes())}-${z2(d.getSeconds())}`; }
function fmtKm(v){ if(!Number.isFinite(v)) return 'KM —'; let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }

/* ===== KM tempo real ===== */
async function loadKM(){
  try{
    const txt=await fetch(CSV_PATH,{cache:'no-store'}).then(r=>r.text());
    kmPoints.length=0;
    txt.split(/\r?\n/).forEach(l=>{
      const c=l.split(';'); const km=parsePt(c[0]), lat=parsePt(c[1]), lon=parsePt(c[2]);
      if(Number.isFinite(km)&&Number.isFinite(lat)&&Number.isFinite(lon)) kmPoints.push({km,lat,lon});
    });
  }catch(e){ console.warn('KM CSV',e); }
}
function updateKM(){
  if(lastPos && kmPoints.length){
    let b=null, bd=Infinity;
    for(const p of kmPoints){ const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon); if(d<bd){bd=d;b=p;} }
    currentKMStr = b? fmtKm(b.km):'KM —';
  }else currentKMStr='KM —';
  kmBox.textContent=currentKMStr;
}
setInterval(updateKM, 700);

/* ===== Câmera & GPS ===== */
async function startCamera(){
  const s=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:30,max:30}},
    audio:false
  });
  vid.srcObject=s;
  await new Promise(r=>{ if(vid.readyState>=1&&vid.videoWidth) r(); else vid.onloadedmetadata=r; });
}
function startGPS(){
  return new Promise((resolve)=>{
    if(!('geolocation' in navigator)){ resolve(); return; }
    navigator.geolocation.getCurrentPosition(p=>{
      lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
      resolve();
      navigator.geolocation.watchPosition(pp=>{
        lastPos={lat:pp.coords.latitude, lon:pp.coords.longitude, acc:pp.coords.accuracy};
      },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
    },()=>resolve(), {enableHighAccuracy:true, timeout:10000});
  });
}

/* ===== Placa no frame ===== */
function drawOverlay(g,w,h){
  const bandH=Math.max(110, Math.round(h*0.15));
  // faixa inferior
  g.fillStyle='rgba(0,0,0,.60)'; g.fillRect(0,h-bandH,w,bandH);

  // KM placa no topo do frame
  const plateH = Math.max(90, Math.round(h*0.10));
  const plateW = Math.min(w*0.78, w*0.9);
  const px = Math.round((w - plateW)/2), py = Math.round(16);
  // moldura
  g.fillStyle = '#e6f0ea'; g.fillRect(px-6, py-6, plateW+12, plateH+12);
  const gr = g.createLinearGradient(0,py,0,py+plateH);
  gr.addColorStop(0,'#0b7a39'); gr.addColorStop(1,'#085e2c');
  g.fillStyle = gr; g.fillRect(px, py, plateW, plateH);
  g.strokeStyle='rgba(255,255,255,.6)'; g.lineWidth=3; g.strokeRect(px+3,py+3,plateW-6,plateH-6);
  const fs = Math.round(plateH*0.55);
  g.fillStyle='#fff'; g.font=`900 ${fs}px system-ui`; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(currentKMStr, Math.round(w/2), Math.round(py + plateH/2));

  // Hora + GPS no rodapé
  const d=new Date();
  const ts=`${z2(d.getDate())}/${z2(d.getMonth()+1)}/${d.getFullYear()} ${z2(d.getHours())}:${z2(d.getMinutes())}:${z2(d.getSeconds())}`;
  g.textAlign='left'; g.fillStyle='#fff'; g.font=`700 ${Math.round(h*0.028)}px system-ui`;
  g.fillText(ts, 16, h-14);
  if(lastPos){
    g.fillStyle='#cfe7ff'; g.font=`600 ${Math.round(h*0.026)}px system-ui`;
    g.fillText(`${lastPos.lat?.toFixed(6)}, ${lastPos.lon?.toFixed(6)}  ±${Math.round(lastPos.acc||0)}m`, 16, h-bandH+28);
  }
}

/* ===== Escrita segura ===== */
async function safeWriteFile(fh, payload){
  const w=await fh.createWritable();
  if(payload instanceof Blob){ await w.write(await payload.arrayBuffer()); }
  else if(payload instanceof Uint8Array){ await w.write(payload); }
  else { await w.write(payload); }
  await w.close();
  const f=await fh.getFile(); if(!f || f.size===0) throw new Error('zero-bytes');
}

/* ===== Adaptação TURBO ===== */
function adaptIfNeeded(lastEncMs){
  encAvgMs = encAvgMs==null ? lastEncMs : (ENC_ALPHA*lastEncMs + (1-ENC_ALPHA)*encAvgMs);
  const target = TARGET_MIN_MS;

  // Se estamos consistentemente acima do alvo, alivie encoder
  if(encAvgMs > target*0.9){
    // 1) tente reduzir qualidade
    if(jpegQ > MIN_JPEG_Q){ jpegQ = Math.max(MIN_JPEG_Q, jpegQ - 0.02); return; }
    // 2) se já no mínimo de Q, reduza dimensão
    if(maxDim > MIN_DIM){ maxDim = Math.max(MIN_DIM, Math.round(maxDim*0.9)); return; }
  }
  // Se ficou fácil demais, gradualmente recupere qualidade/dim (até os iniciais)
  if(encAvgMs < target*0.55){
    if(maxDim < START_MAX_DIM){ maxDim = Math.min(START_MAX_DIM, Math.round(maxDim*1.05)); return; }
    if(jpegQ < START_JPEG_Q){ jpegQ = Math.min(START_JPEG_Q, jpegQ + 0.01); }
  }
}

/* ===== Captura ===== */
async function captureOnce(){
  if(busy || !running || !dirHandle) return;
  busy=true;
  const t0 = performance.now();
  try{
    const vw=vid.videoWidth, vh=vid.videoHeight;
    if(!vw||!vh) return;
    const sc=Math.min(1, maxDim/Math.max(vw,vh));
    const w=Math.round(vw*sc), h=Math.round(vh*sc);
    can.width=w; can.height=h;
    ctx.clearRect(0,0,w,h);
    ctx.drawImage(vid,0,0,w,h);
    drawOverlay(ctx,w,h);

    // JPEG
    let blob = await new Promise(res=> can.toBlob(res,'image/jpeg',jpegQ));
    if(!blob || !blob.size){
      const dataURL = can.toDataURL('image/jpeg', Math.max(0.75, jpegQ-0.05));
      const b64=dataURL.split(',')[1]; const bin=atob(b64);
      const u8=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
      blob=new Blob([u8], {type:'image/jpeg'});
    }
    if(!blob || !blob.size) return;

    // Nome
    const kmPart = (currentKMStr||'KM').replace('KM ','').replace('+','_').replace(/[^\w\-+.]/g,'_');
    const name = `FOTO_KM_${kmPart}_${stampNow()}.jpg`;

    // Grava
    const fh=await dirHandle.getFileHandle(name,{create:true});
    await safeWriteFile(fh, blob);

    sessionPhotos.push(name);
    btnPDF.disabled = false;
  }catch(e){ console.error('captureOnce', e); }
  finally{
    const encMs = performance.now() - t0;
    adaptIfNeeded(encMs);
    // Atualiza estado
    stateEl.textContent = `TURBO • fotos: ${sessionPhotos.length} • ~${Math.round(1000/Math.max(encAvgMs||TARGET_MIN_MS,1))} fps • ${Math.round(encAvgMs||0)} ms/foto • ${maxDim}px • Q=${jpegQ.toFixed(2)}`;
    busy=false;
  }
}
async function loop(){
  while(running){
    await captureOnce();
    // intervalo alvo (ajustado pelo próprio tempo de encode)
    const delay = Math.max(0, TARGET_MIN_MS - (encAvgMs||TARGET_MIN_MS));
    await new Promise(r=>setTimeout(r, delay));
  }
}

/* ======== PDF min (imagem por página) ======== */
function makeByteWriter(stream){ const enc=new TextEncoder(); let pos=0; return {
  async writeStr(s){const b=enc.encode(s); await stream.write(b); pos+=b.length;},
  async writeBin(b){await stream.write(b); pos+=b.length;}, get pos(){return pos;}
};}
function createPdfStreamWriter(stream){
  const writer=makeByteWriter(stream); const offsets=[]; const pagesKids=[];
  const PW=595,PH=842,M=24; let nextNum=3,closed=false;

  async function writeObjWithNum(num,body){ offsets[num]=writer.pos; await writer.writeStr(`${num} 0 obj\n${body}\nendobj\n`); }
  async function addObj(body){ const num=nextNum++; await writeObjWithNum(num,body); return num; }
  async function addStream(dict,data){ const num=nextNum++; offsets[num]=writer.pos;
    const header=`${num} 0 obj\n${dict.replace('>>','')} /Length ${data.length} >>\nstream\n`;
    await writer.writeStr(header); await writer.writeBin(data); await writer.writeStr(`\nendstream\nendobj\n`); return num; }
  function fitToCell(imgW,imgH){ let cellW=PW-2*M, cellH=PH-2*M; let dw=cellW, dh=Math.round(imgH*(cellW/imgW));
    if(dh>cellH){ dh=cellH; dw=Math.round(imgW*(cellH/imgH)); } const tx=M+Math.round((cellW-dw)/2); const ty=M+Math.round((cellH-dh)/2); return {dw,dh,tx,ty}; }

  return {
    async init(){ await writer.writeStr('%PDF-1.4\n'); },
    async addImagePage(imgBytes,W,H){
      const imNum=await addStream(`<< /Type /XObject /Subtype /Image /Width ${W} /Height ${H} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode >>`, imgBytes);
      const {dw,dh,tx,ty}=fitToCell(W,H);
      const content=`q\n${dw} 0 0 ${dh} ${tx} ${PH-(ty+dh)} cm\n/Im0 Do\nQ\n`;
      const contNum=await addStream('<< >>', new TextEncoder().encode(content));
      const pageNum=await addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << /Im0 ${imNum} 0 R >> >> /Contents ${contNum} 0 R >>`);
      pagesKids.push(pageNum);
    },
    async finalize(){
      if(closed) return; closed=true;
      await writeObjWithNum(2,`<< /Type /Pages /Kids [ ${pagesKids.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pagesKids.length} >>`);
      await writeObjWithNum(1,'<< /Type /Catalog /Pages 2 0 R >>');
      const xrefStart=writer.pos; const count=Math.max(1,offsets.length-1)+1;
      let xr=`xref\n0 ${count}\n0000000000 65535 f \n`;
      for(let i=1;i<count;i++){ const off=offsets[i]??0; const inUse=(offsets[i]!=null); xr+=`${String(off).padStart(10,'0')} 00000 ${inUse?'n':'f'} \n`; }
      await writer.writeStr(xr);
      await writer.writeStr(`trailer\n<< /Size ${count} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`);
      await stream.close();
    }
  };
}
async function composeCoverImage(bytesW=1240, bytesH=1754){
  const W=bytesW, H=bytesH; const c=document.createElement('canvas'); c.width=W; c.height=H;
  const g=c.getContext('2d',{alpha:false});
  const grd=g.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#0b122b'); grd.addColorStop(1,'#0a1024'); g.fillStyle=grd; g.fillRect(0,0,W,H);
  g.fillStyle='#eaf2ff'; g.font='900 48px system-ui'; g.textAlign='center';
  g.fillText('RELATÓRIO DE INSPEÇÃO – CONTÍNUO', W/2, 120);
  g.font='700 28px system-ui'; g.textAlign='left';
  const y0=200, lh=40;
  g.fillText(`Início: ${sessionStart? new Date(sessionStart).toLocaleString():'—'}`, 80, y0+lh*0);
  g.fillText(`Término: ${sessionEnd? new Date(sessionEnd).toLocaleString():'—'}`, 80, y0+lh*1);
  g.fillText(`Fotos: ${sessionPhotos.length}`, 80, y0+lh*2);
  g.fillText(`Taxa alvo: ${TARGET_MIN_MS} ms/foto`, 80, y0+lh*3);
  g.fillText(`KM atual (último): ${currentKMStr}`, 80, y0+lh*4);
  g.font='600 22px system-ui'; g.fillStyle='#cfe7ff';
  g.fillText('Observação: imagens carimbadas com KM, data/hora e GPS.', 80, y0+lh*6);
  const b=await new Promise(r=>c.toBlob(r,'image/jpeg',0.82));
  const u8=new Uint8Array(await b.arrayBuffer());
  return {bytes:u8,w:W,h:H};
}
async function downscaleForPDF(file, maxPx=1280, quality=0.72){
  const img = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=URL.createObjectURL(file); });
  const W=img.naturalWidth, H=img.naturalHeight;
  const sc=Math.min(1, maxPx/Math.max(W,H)); const w=Math.round(W*sc), h=Math.round(H*sc);
  const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h; const g=tmp.getContext('2d',{alpha:false}); g.drawImage(img,0,0,w,h);
  const b=await new Promise(r=>tmp.toBlob(r,'image/jpeg',quality)); const u8=new Uint8Array(await b.arrayBuffer()); URL.revokeObjectURL(img.src);
  return {bytes:u8,w,h};
}
async function generatePDF(){
  if(!dirHandle){ showToast('Selecione a pasta'); return; }
  if(!sessionPhotos.length){ showToast('Sem fotos nesta sessão'); return; }
  if(running){ showToast('Pare a captura antes de gerar o PDF'); return; }

  btnPDF.disabled=true; btnPDF.textContent='Gerando…';
  try{
    sessionEnd = new Date();
    const base = `RELATORIO_${(sessionStart||new Date()).toISOString().replace(/[:.]/g,'-')}`;
    let vol=1, pages=0, pdf=null, pdfHandle=null, stream=null;
    const step = Math.max(1, Number(pdfStepSel.value)||10);

    async function openVol(){
      const name = `${base}_v${String(vol).padStart(2,'0')}.pdf`;
      reportFiles.push(name);
      pdfHandle = await dirHandle.getFileHandle(name,{create:true});
      stream = await pdfHandle.createWritable();
      pdf = createPdfStreamWriter(stream); await pdf.init(); pages=0;
      const cover = await composeCoverImage();
      await pdf.addImagePage(cover.bytes, cover.w, cover.h); pages++;
    }
    async function closeVol(){ if(pdf){ await pdf.finalize(); pdf=null; } }

    await openVol();
    for(let i=0;i<sessionPhotos.length;i+=step){
      const fname = sessionPhotos[i];
      const fh = await dirHandle.getFileHandle(fname,{create:false});
      const file = await fh.getFile();
      const {bytes,w,h} = await downscaleForPDF(file,1280,0.72);
      await pdf.addImagePage(bytes,w,h);
      pages++;
      if(pages>=REPORT_MAX_PAGES){ await closeVol(); vol++; await openVol(); }
    }
    await closeVol();
    showToast('Relatório PDF gerado');
    btnPDF.textContent='📄 PDF';
  }catch(e){
    console.error(e); showToast('Falha ao gerar PDF');
    btnPDF.textContent='📄 PDF';
  }finally{
    btnPDF.disabled=false;
  }
}

/* ======== Persistência do Handle (IndexedDB) ======== */
const DB_NAME='insp_persist'; const DB_STORE='fs_handles'; const DB_KEY='dirHandle';
function idbOpen(){
  return new Promise((res,rej)=>{
    const rq=indexedDB.open(DB_NAME,1);
    rq.onupgradeneeded=()=>{ rq.result.createObjectStore(DB_STORE); };
    rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);
  });
}
function idbSet(key, val){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).put(val,key);
    tx.oncomplete=()=>{db.close(); res(true)}; tx.onerror=()=>{db.close(); rej(tx.error)}
  }));
}
function idbGet(key){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readonly'); const rq=tx.objectStore(DB_STORE).get(key);
    rq.onsuccess=()=>{ const v=rq.result; db.close(); res(v); }; rq.onerror=()=>{ db.close(); rej(rq.error) }
  }));
}
async function ensureDirPermission(handle){
  if(!handle) return false;
  if (await handle.queryPermission({mode:'readwrite'}) === 'granted') return true;
  if (await handle.requestPermission({mode:'readwrite'}) === 'granted') return true;
  return false;
}
async function restoreFolderIfPossible(){
  try{
    const saved = await idbGet(DB_KEY);
    if(saved){
      const ok = await ensureDirPermission(saved);
      if(ok){ dirHandle = saved; showToast('Pasta OK • restaurada', 1200); return true; }
    }
  }catch(e){}
  return false;
}
async function pickFolder(){
  try{
    if('storage' in navigator && navigator.storage && navigator.storage.persist) {
      try{ await navigator.storage.persist(); }catch{}
    }
    dirHandle = await window.showDirectoryPicker({mode:'readwrite'});
    try{ await idbSet(DB_KEY, dirHandle); }catch{}
    showToast('Pasta OK',900);
  }catch{ showToast('É necessário escolher a pasta'); throw new Error('no-folder'); }
}

/* ======== Controles ======== */
btnStartOverlay.addEventListener('click', async ()=>{
  try{
    // 1 clique: restaurar (ou pedir) pasta, ligar câmera+GPS e já iniciar a captura
    let restored = await restoreFolderIfPossible();
    if(!restored) await pickFolder();
    await startCamera();
    await startGPS();
    await loadKM();

    startOverlay.style.display='none';
    sessionStart = new Date();
    running = true;
    btnStartStop.setAttribute('aria-pressed','true');
    btnStartStop.classList.add('stop');
    btnStartStop.textContent = '⏹ PARAR';
    stateEl.textContent = 'Iniciando TURBO…';
    // Wake Lock
    if('wakeLock' in navigator){ try{ await navigator.wakeLock.request('screen'); }catch{} }
    loop();
  }catch(e){
    console.error(e); showToast('Falha ao iniciar');
  }
});

btnStartStop.addEventListener('click', async ()=>{
  if(!dirHandle){
    try{ await pickFolder(); }catch{ return; }
  }
  if(!vid.videoWidth){ showToast('Aguardando câmera…'); return; }

  running = !running;
  btnStartStop.setAttribute('aria-pressed', String(running));
  if(running){
    btnStartStop.textContent = '⏹ PARAR';
    btnStartStop.classList.add('stop');
    stateEl.textContent = 'TURBO ativo…';
    btnPDF.disabled = true;
    encAvgMs = null; maxDim = START_MAX_DIM; jpegQ = START_JPEG_Q;
    loop();
  }else{
    btnStartStop.textContent = '▶ INICIAR (TURBO)';
    btnStartStop.classList.remove('stop');
    stateEl.textContent = 'PARADO';
    btnPDF.disabled = sessionPhotos.length === 0;
  }
});

btnPDF.addEventListener('click', generatePDF);

/* Toque longo (2s) pausa/retoma */
let tStart=0;
document.addEventListener('touchstart', () => tStart=Date.now(), {passive:true});
document.addEventListener('touchend', ()=>{
  if(Date.now()-tStart>2000){
    if(!dirHandle) return;
    running = !running;
    btnStartStop.setAttribute('aria-pressed', String(running));
    if(running){
      btnStartStop.textContent = '⏹ PARAR';
      btnStartStop.classList.add('stop');
      stateEl.textContent = 'TURBO ativo…';
      btnPDF.disabled = true;
      encAvgMs = null; maxDim = START_MAX_DIM; jpegQ = START_JPEG_Q;
      loop();
    }else{
      btnStartStop.textContent = '▶ INICIAR (TURBO)';
      btnStartStop.classList.remove('stop');
      stateEl.textContent = 'PAUSADO (toque longo para retomar)';
      btnPDF.disabled = sessionPhotos.length === 0;
    }
    showToast(running?'Captura retomada':'Captura pausada',900);
  }
},{passive:true});
