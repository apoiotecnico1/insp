<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Inspeção Pro BR-116</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: #007934; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* Gate de Entrada */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .btn-start { background: var(--accent); color: #000; border: none; padding: 25px 60px; font-weight: 900; border-radius: 50px; cursor: pointer; font-size: 1.4rem; box-shadow: 0 0 20px rgba(255,204,0,0.4); }

        #app { position: relative; width: 100vw; height: 100vh; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD Principal */
        #hud { position: absolute; top: 30px; left: 20px; background: var(--placa); padding: 15px 25px; border: 4px solid #fff; border-radius: 12px; z-index: 100; }
        #hud h1 { font-size: 3rem; font-weight: 900; margin: 0; line-height: 1; }
        #gps-meta { font-size: 10px; font-family: monospace; margin-top: 5px; display: block; }

        /* BOTÃO DE ENVIO IMEDIATO */
        #btn-send-wa { 
            position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
            background: var(--whatsapp); width: 90px; height: 90px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #fff; z-index: 500; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #btn-send-wa span { font-size: 10px; font-weight: bold; color: #fff; margin-top: 4px; }

        /* Controles Inferiores */
        #bottom-bar { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; align-items: center; }
        .tool-btn { background: rgba(0,0,0,0.6); border: 1px solid #fff; color: #fff; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #rec-indicator { position: absolute; top: 110px; right: 20px; background: rgba(255,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 10px; font-weight: bold; display: none; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <button class="btn-start" onclick="iniciarApp()">ENTRAR NO SISTEMA</button>
    <p style="color: #666; margin-top: 15px;">Acesso à câmera e localização necessário</p>
</div>

<div id="app">
    <video id="v" autoplay playsinline muted></video>
    
    <div id="hud">
        <h1 id="km-val">Km ---+---</h1>
        <span id="gps-meta">LAT: -- | LON: --</span>
    </div>

    <div id="rec-indicator">GRAVANDO LOTE PDF...</div>

    <!-- BOTÃO ENVIO IMEDIATO -->
    <div id="btn-send-wa" onclick="enviarImediato()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="40">
        <span>ENVIAR</span>
    </div>

    <div id="bottom-bar">
        <button class="tool-btn" onclick="toggleRelatorio()" id="btn-pdf">INICIAR PDF</button>
        <button class="tool-btn" onclick="toggleConfig()">⚙️</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let stream, db = [], capturing = false, buffer = [], lat = "0", lon = "0";
const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');

async function iniciarApp() {
    try {
        // Full Screen Ativado imediatamente
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
            await document.documentElement.webkitRequestFullscreen();
        }

        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        // Inicia Câmera
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 1920, height: 1080 } 
        });
        v.srcObject = stream;
        v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };

        loadGPS();
        loadCSV();
    } catch (e) {
        alert("Erro ao iniciar. Verifique permissões de câmera.");
    }
}

// --- FUNÇÃO DE ENVIO IMEDIATO (PRINT + CARIMBO + CLIPBOARD) ---
async function enviarImediato() {
    const km = document.getElementById('km-val').innerText;
    const tempo = new Date().toLocaleString('pt-BR');
    const local = `LAT: ${lat} LON: ${lon}`;

    // Captura o frame atual
    ctx.drawImage(v, 0, 0, c.width, c.height);
    
    // Desenha tarja de inspeção (Queimada na foto)
    const th = c.height * 0.18;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, c.height - th, c.width, th);
    
    ctx.fillStyle = "#ffcc00"; 
    ctx.font = `bold ${th * 0.35}px Arial`;
    ctx.fillText(`REGISTRO: ${km}`, 40, c.height - (th * 0.55));
    
    ctx.fillStyle = "#ffffff";
    ctx.font = `${th * 0.18}px Arial`;
    ctx.fillText(`${tempo} | ${local}`, 40, c.height - (th * 0.20));

    // Converte e envia
    c.toBlob(async (blob) => {
        try {
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            // Abre o WhatsApp (se houver número configurado, use wa.me/numero)
            window.location.href = "whatsapp://send"; 
        } catch (err) {
            alert("Erro ao copiar imagem.");
        }
    }, 'image/png');
}

// --- LÓGICA DE RELATÓRIO PDF (OPCIONAL) ---
function toggleRelatorio() {
    capturing = !capturing;
    const btn = document.getElementById('btn-pdf');
    const ind = document.getElementById('rec-indicator');
    if(capturing) {
        buffer = [];
        btn.innerText = "PARAR PDF";
        ind.style.display = "block";
        loopRelatorio();
    } else {
        btn.innerText = "INICIAR PDF";
        ind.style.display = "none";
        gerarPDF();
    }
}

function loopRelatorio() {
    if(!capturing) return;
    ctx.drawImage(v, 0, 0, c.width, c.height);
    buffer.push({
        img: c.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-val').innerText
    });
    setTimeout(loopRelatorio, 1000);
}

async function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    for(let i=0; i<buffer.length; i++) {
        if(i > 0) doc.addPage();
        doc.addImage(buffer[i].img, 'JPEG', 0, 0, 297, 210);
        doc.text(buffer[i].km, 10, 200);
    }
    doc.save(`Inspecao_${Date.now()}.pdf`);
}

// --- GPS E DADOS ---
function loadGPS() {
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude.toFixed(6);
        lon = p.coords.longitude.toFixed(6);
        document.getElementById('gps-meta').innerText = `LAT: ${lat} | LON: ${lon}`;
        updateKM();
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').slice(1);
        db = rows.map(r => {
            const c = r.split(';');
            return { km: c[0], lat: parseFloat(c[1]), lon: parseFloat(c[2]) };
        }).filter(d => !isNaN(d.lat));
    } catch(e) {}
}

function updateKM() {
    if(!db.length) return;
    let closest = db[0], min = Infinity;
    db.forEach(p => {
        const d = Math.hypot(p.lat - lat, p.lon - lon);
        if(d < min) { min = d; closest = p; }
    });
    document.getElementById('km-val').innerText = "Km " + closest.km;
}
</script>
</body>
</html>
