<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro de Atividades - Apoio Técnico</title>
    <style>
        body { font-family: sans-serif; background-color: #e9ecef; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .status { font-size: 11px; text-align: center; margin-bottom: 15px; padding: 5px; border-radius: 4px; }
        .off { background: #f8d7da; color: #721c24; cursor: pointer; }
        .on { background: #d4edda; color: #155724; }

        .field-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 80px; resize: vertical; }
        
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        button { width: 100%; padding: 15px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-folder { background: #6c757d; color: white; margin-bottom: 20px; font-size: 14px; }
        .btn-save { background: #27ae60; color: white; margin-top: 10px; }
        button:hover { filter: brightness(90%); }
        
        #log { margin-top: 15px; font-size: 12px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Atividade</h2>
    
    <button id="btnDir" class="btn-folder" onclick="selectFolder()">📁 1. Definir Pasta de Arquivos</button>
    <div id="statusBox" class="status off">Pasta não selecionada</div>

    <div class="field-group">
        <label>Número da Ordem:</label>
        <input type="text" id="numOrdem" placeholder="Ex: 123456">
    </div>

    <div class="field-group">
        <label>Data:</label>
        <input type="date" id="dataAtividade">
    </div>

    <div class="row">
        <div class="field-group">
            <label>Hora Inicial:</label>
            <input type="time" id="horaIni">
        </div>
        <div class="field-group">
            <label>Hora Final:</label>
            <input type="time" id="horaFim">
        </div>
    </div>

    <div class="field-group">
        <label>Descrição da Atividade:</label>
        <textarea id="desc"></textarea>
    </div>

    <button class="btn-save" onclick="salvarArquivo()">SALVAR REGISTRO</button>
    <div id="log"></div>
</div>

<script>
    let pastaHandle;

    // Define a data de hoje automaticamente ao abrir
    document.getElementById('dataAtividade').valueAsDate = new Date();

    async function selectFolder() {
        try {
            pastaHandle = await window.showDirectoryPicker();
            document.getElementById('statusBox').innerText = "✔ Pasta: " + pastaHandle.name;
            document.getElementById('statusBox').className = "status on";
            document.getElementById('btnDir').style.display = 'none';
        } catch (err) {
            console.error(err);
        }
    }

    async function salvarArquivo() {
        if (!pastaHandle) {
            alert("Clique no botão cinza para selecionar a pasta primeiro!");
            return;
        }

        const ordem = document.getElementById('numOrdem').value;
        const data = document.getElementById('dataAtividade').value;
        const hIni = document.getElementById('horaIni').value;
        const hFim = document.getElementById('horaFim').value;
        const desc = document.getElementById('desc').value;

        if(!ordem || !hIni || !hFim) {
            alert("Preencha a Ordem e os Horários!");
            return;
        }

        // Formata o conteúdo exatamente para o seu script capturar
        const conteudo = `ORDEM: ${ordem}\nDATA: ${data}\nINICIO: ${hIni}\nFIM: ${hFim}\nDESCRICAO: ${desc}`;

        try {
            // Nome do arquivo com timestamp para não sobrescrever
            const agora = new Date();
            const nomeArquivo = `OS_${ordem}_${agora.getHours()}${agora.getMinutes()}${agora.getSeconds()}.txt`;
            
            const fileHandle = await pastaHandle.getFileHandle(nomeArquivo, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(conteudo);
            await writable.close();

            document.getElementById('log').innerText = "Arquivo " + nomeArquivo + " salvo!";
            
            // Limpa apenas a ordem e descrição para o próximo lançamento
            document.getElementById('numOrdem').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('numOrdem').focus();
            
        } catch (err) {
            alert("Erro ao salvar: " + err.message);
        }
    }
</script>

</body>
</html>
