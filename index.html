<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibra RA - Campo</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>
    <style>
        .ui { position: absolute; z-index: 100; bottom: 20px; left: 20px; background: white; padding: 10px; border-radius: 10px; }
        #status { font-size: 12px; display: block; margin-top: 5px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="ui">
        <strong>Fibra Ótica RA</strong><br>
        <input type="file" id="fileInput" accept=".kmz">
        <span id="status">Selecione o KMZ</span>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const scene = document.querySelector('a-scene');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            status.innerText = "Processando...";

            const reader = new FileReader();
            reader.onload = function(event) {
                JSZip.loadAsync(event.target.result).then(zip => {
                    const kmlFile = Object.keys(zip.files).find(f => f.endsWith('.kml'));
                    return zip.file(kmlFile).async("string");
                }).then(kmlText => {
                    const parser = new DOMParser();
                    const kmlDom = parser.parseFromString(kmlText, "text/xml");
                    const geojson = toGeoJSON.kml(kmlDom);
                    
                    renderRA(geojson);
                    status.innerText = "Mágica Ativa!";
                    status.style.color = "green";
                }).catch(err => {
                    status.innerText = "Erro ao ler KMZ";
                    console.error(err);
                });
            };
            reader.readAsArrayBuffer(file);
        });

        function renderRA(data) {
            // Limpa pontos antigos
            document.querySelectorAll('.ponto-fibra').forEach(el => el.remove());

            // Pega as coordenadas do traçado
            data.features.forEach(feature => {
                if (feature.geometry.type === "LineString") {
                    feature.geometry.coordinates.forEach(coord => {
                        const entity = document.createElement('a-entity');
                        entity.setAttribute('class', 'ponto-fibra');
                        // Longitude vem primeiro no GeoJSON
                        entity.setAttribute('gps-entity-place', `latitude: ${coord}; longitude: ${coord};`);
                        entity.setAttribute('geometry', 'primitive: cylinder; radius: 0.5; height: 100');
                        entity.setAttribute('material', 'color: #00FF00; opacity: 0.5; emissive: #00FF00');
                        scene.appendChild(entity);
                    });
                }
            });
        }
    </script>
</body>
</html>
