<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SUPORTE DE CAMPO ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* SEGURANÇA E FULLSCREEN GATILHO */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #333; padding: 30px; border-radius: 15px; max-width: 450px; background: #0a0a0a; text-align: center; }
        .btn-aware { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        /* APP SHELL */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* HUD ESQUERDA: KM E NOX */
        #km-hud { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            background: var(--placa-verde); padding: 12px 20px; 
            border: 2px solid #fff; border-radius: 8px; z-index: 10;
        }
        #km-hud h1 { font-size: 1.8rem; font-weight: 900; }
        #nox-display { 
            display: block; font-size: 12px; font-weight: 800; background: rgba(0,0,0,0.3); 
            margin-top: 5px; padding: 4px 8px; border-radius: 4px; text-transform: uppercase;
        }

        /* HUD DIREITA: CONTADOR */
        #counter-hud {
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px;
            background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 8px;
            border: 1px solid #444; text-align: right; z-index: 10;
        }
        #counter-hud small { font-size: 10px; color: #aaa; display: block; }
        #count-txt { font-size: 22px; font-weight: 900; color: var(--accent); font-family: monospace; }

        /* PAINEL DE CONFIGURAÇÕES */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(20px); z-index: 4000; 
            padding: 30px 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #333;
        }
        #settings-panel.open { right: 0; }
        .close-btn { color: var(--accent); cursor: pointer; font-weight: 800; margin-bottom: 30px; display: block; }

        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select, input { width: 100%; background: #151515; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; }
        
        /* SWITCH ESTILIZADO */
        .switch-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .toggle { cursor: pointer; width: 50px; height: 26px; background: #333; border-radius: 13px; position: relative; transition: 0.3s; }
        .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .toggle { background: var(--placa-verde); }
        input:checked + .toggle::after { left: 27px; }

        /* CONTROLES INFERIORES */
        #ui-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 20px; z-index: 100;
        }
        .btn-main { border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 20px 45px; font-size: 14px; background: var(--accent); color: #000; }
        #gear-btn { width: 60px; height: 60px; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

        #rec-tag { position: absolute; top: 90px; right: 20px; display: none; align-items: center; gap: 8px; color: #f00; font-size: 11px; font-weight: 900; }
        .dot { width: 10px; height: 10px; background: #f00; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent)">Sistema de Captura Pro</h2>
        <p style="font-size: 13px; color:#888; margin: 15px 0;">O app manterá a tela <b>ativa</b> e em <b>tela cheia</b>. Conecte ao carregador.</p>
        <button class="btn-aware" onclick="startApp()">Iniciar Operação</button>
    </div>
</div>

<div id="settings-panel">
    <span class="close-btn" onclick="toggleSet()">✕ FECHAR</span>
    
    <div class="field">
        <label>Câmera Ativa</label>
        <select id="cam-select" onchange="initC(this.value)"></select>
    </div>

    <div class="field">
        <label>Fotos por Lote (PDF)</label>
        <input type="number" id="cfg-lote" value="200">
    </div>

    <div class="switch-row">
        <label style="font-size:12px">Mostrar ID NOX na tela</label>
        <input type="checkbox" id="show-nox-toggle" checked style="display:none" onchange="updateNoxVisibility()">
        <label for="show-nox-toggle" class="toggle"></label>
    </div>

    <div class="field" style="margin-top:30px">
        <label>Notas de Campo</label>
        <textarea id="field-notes" rows="4" style="width:100%; background:#111; border:1px solid #333; color:#fff; border-radius:6px; padding:10px; font-size:12px;"></textarea>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <h1 id="km-txt">Km ---</h1>
        <span id="nox-display">ID NOX: <span id="nox-val">---</span></span>
    </div>

    <div id="counter-hud">
        <small>CAPTURA ATUAL</small>
        <span id="count-txt">000</span><span style="color:#555; font-size:14px"> / <span id="max-txt">200</span></span>
    </div>

    <div id="rec-tag"><div class="dot"></div> GRAVANDO</div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>
        <button id="btn-start" class="btn-main" onclick="initCapture()">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar Lote</button>
    </div>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let kmDB=[], dataNox=[], rec=false, buffer=[], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// PREVENIR QUE A TELA APAGUE
async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        
        // Ativa Tela Cheia
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        await listCams();
        await loadAllCSVs();
        initGPS();
        requestWakeLock();
    } catch(e) { alert("Acesso à pasta é obrigatório."); }
}

async function loadAllCSVs() {
    // CSV 1: Geometria (KM e GPS)
    try {
        const r1 = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t1 = await r1.text();
        const rows1 = t1.split('\n').filter(l => l.includes(';'));
        const h1 = rows1.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h1.indexOf('km'), ilt = h1.findIndex(x=>x.includes('lat')), iln = h1.findIndex(x=>x.includes('lon'));
        
        kmDB = rows1.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.warn("Erro no CSV Geometria"); }

    // CSV 2: Dados Completos (ID NOX)
    try {
        const r2 = await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now());
        const t2 = await r2.text();
        const rows2 = t2.split('\n').filter(l => l.includes(';'));
        const h2 = rows2.shift().split(';').map(v => v.trim().toLowerCase());
        
        // Busca coluna 'nox' ou 'id' ou 'objectid'
        const inox = h2.findIndex(x => x.includes('nox') || x.includes('id'));
        const ikm2 = h2.findIndex(x => x.includes('km'));

        dataNox = rows2.map(r => {
            const c = r.split(';');
            return { km: c[ikm2], id: c[inox] || "---" };
        });
    } catch(e) { console.warn("Erro no CSV de Dados"); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) {
            document.getElementById('km-txt').innerText = "Km " + b.km;
            // Busca o Nox correspondente no segundo CSV pelo KM
            const findNox = dataNox.find(n => n.km == b.km);
            document.getElementById('nox-val').innerText = findNox ? findNox.id : "---";
        }
    }, null, {enableHighAccuracy:true});
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } });
    vid.srcObject = currentStream;
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function updateNoxVisibility() {
    document.getElementById('nox-display').style.display = document.getElementById('show-nox-toggle').checked ? 'block' : 'none';
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.display = 'flex';
    document.getElementById('max-txt').innerText = document.getElementById('cfg-lote').value;
    loop();
}

function stopCapture() {
    rec = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        can.width = vid.videoWidth; can.height = vid.videoHeight;
        ctx.drawImage(vid, 0, 0);
        
        const curKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        const curNox = document.getElementById('nox-val').innerText;

        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.5), 
            km: curKm, 
            nox: curNox, 
            ts: new Date().toLocaleTimeString() 
        });

        document.getElementById('count-txt').innerText = buffer.length.toString().padStart(3, '0');

        const limit = parseInt(document.getElementById('cfg-lote').value) || 200;
        if(buffer.length >= limit) {
            const temp = [...buffer];
            savePDF(temp, kmInicialLote, curKm);
            buffer = [];
            kmInicialLote = curKm;
        }
    }
    setTimeout(loop, 200);
}

async function savePDF(data, ini, fim) {
    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, can.height-bh, can.width, bh);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${bh*0.35}px Arial`;
                ctx.fillText(`KM: ${data[i].km} | ID: ${data[i].nox}`, 40, can.height-(bh*0.5));
                ctx.font = `${bh*0.18}px Arial`;
                ctx.fillText(`DATA: ${new Date().toLocaleDateString()} | HORA: ${data[i].ts}`, 40, can.height-(bh*0.2));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = data[i].raw;
        });
    }
    const nome = `Relatorio_KM_${ini}_a_${fim}_${Date.now()}.pdf`;
    const f = await hDir.getFileHandle(nome, {create:true});
    const w = await f.createWritable();
    await w.write(doc.output('blob'));
    await w.close();
}

// Reiniciar WakeLock se o usuário voltar para a aba
document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') requestWakeLock(); });
</script>
</body>
</html>
