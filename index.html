<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Apoio - Pixel Lock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; background: #0a0a0a; max-width: 90%; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: 20px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA HUD */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 121, 52, 0.5); padding: 10px 20px; 
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 12px; 
            z-index: 1000; pointer-events: none; min-width: 130px;
            backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; 
        }
        #br-txt { font-size: 1rem; font-weight: 800; color: #eee; text-shadow: 1px 1px 2px #000; }
        #km-txt { font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 0px #004d21; line-height: 1; }

        /* STATUS REDUZIDO */
        #rec-tag { 
            position: absolute; top: 25px; right: 15px; 
            display: flex; align-items: center; gap: 5px; 
            background: rgba(0,0,0,0.6); padding: 4px 10px; 
            border-radius: 20px; opacity: 0; z-index: 1000;
        }
        #rec-tag span { font-size: 0.75rem; font-weight: bold; }
        .dot { width: 6px; height: 6px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* BOTOES */
        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 2000; }
        .ui-hidden { opacity: 0 !important; visibility: hidden !important; }
        .btn-main { border: none; padding: 18px 35px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 150px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); z-index: 4000; padding: 50px 20px; transition: 0.4s; }
        #settings-panel.open { right: 0; }
        canvas { display: none; }

        /* O SEGREDO: VÍDEO DE 1 PIXEL INVISÍVEL */
        #no-sleep-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

<!-- Vídeo de 1 pixel que engana o celular -->
<video id="no-sleep-video" playsinline loop muted>
    <source src="https://raw.githubusercontent.com/anars/blank-video/master/250ms.mp4" type="video/mp4">
</video>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent);">SISTEMA PRONTO</h2>
        <p>A tela ficará acesa via Pixel-Lock.</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR AGORA</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:20px;">← FECHAR</div>
    <label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200">
    <label>Fotos/Lote</label><input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>
    <div id="km-hud"><span id="br-txt">BR ---</span><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>Gerando PDF</span></div>
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, brAtual="", buffer=[];
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');
const pixelVideo = document.getElementById('no-sleep-video');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        
        // Ativa o Pixel de Vídeo para a tela não apagar
        pixelVideo.play().catch(e => console.log("Pixel Lock Ativado"));
        
        // Fallback WakeLock (duas camadas de proteção)
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(e=>{});

        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams(); loadCSV(); initGPS();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Selecione a pasta para salvar os arquivos."); }
}

// Garante que o pixel de vídeo volte a rodar se você trocar de aba
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') pixelVideo.play();
});

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function handleTouch() {
    if(!capturing) document.getElementById('ui-controls').classList.toggle('ui-hidden');
    else takeManualPhoto();
}

async function drawWatermark(km, br) {
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff"; ctx.shadowColor = "black"; ctx.shadowBlur = 4;
    ctx.font = `bold ${bh * 0.4}px Arial`;
    ctx.fillText(`BR ${br}  Km ${km}`, 30, can.height - (bh * 0.5));
    ctx.shadowBlur = 0; ctx.font = `${bh * 0.18}px Arial`;
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`, 30, can.height - (bh * 0.2));
}

function startCapture() {
    capturing = true; buffer = [];
    document.getElementById('gear-btn').classList.add('ui-hidden');
    document.getElementById('btn-start').style.display='none';
    document.getElementById('btn-stop').style.display='block';
    document.getElementById('rec-tag').style.opacity='1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    document.getElementById('gear-btn').classList.remove('ui-hidden');
    document.getElementById('btn-start').style.display='block';
    document.getElementById('btn-stop').style.display='none';
    document.getElementById('rec-tag').style.opacity='0';
}

function captureLoop() {
    if(!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ img: can.toDataURL('image/jpeg', 0.5), km: currentKm, br: brAtual });
    
    if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
        savePDF([...buffer]); buffer = [];
    }
    setTimeout(captureLoop, document.getElementById('cfg-int').value);
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
// (Funções de GPS e CSV idênticas às anteriores para manter o funcionamento)
</script>
</body>
</html>
