<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Técnico de Inspeção</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1c1c1c; --green: #00c853; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        .tech-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .btn-camera { background: #333; color: #00e676; border: 2px dashed #00e676; width: 100%; padding: 20px; font-weight: bold; border-radius: 10px; margin-top: 10px; }
        .btn-final { background: var(--green); color: #000; width: 100%; padding: 20px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,200,83,0.3); }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .gallery img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }
        .form-control { background: #222; border: 1px solid #444; color: #fff; padding: 12px; font-size: 1.1rem; }
        #pdf-content { color: #000; background: #fff; padding: 30px; width: 800px; position: absolute; left: -9999px; }
        .pdf-photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .pdf-photo-grid img { width: 100%; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div style="max-width: 500px; margin: auto;">
    <h3 class="fw-bold mb-4">INSPEÇÃO TÉCNICA</h3>

    <div class="tech-card">
        <label class="small opacity-50 fw-bold">LOCALIZAÇÃO</label>
        <div class="row g-2 mt-1">
            <div class="col-8"><input type="text" id="km" class="form-control" placeholder="KM Ex: 142+300"></div>
            <div class="col-4">
                <select id="sentido" class="form-select form-control">
                    <option value="Norte">Norte</option>
                    <option value="Sul">Sul</option>
                </select>
            </div>
        </div>
    </div>

    <div class="tech-card">
        <label class="fw-bold text-success text-uppercase">1. Fiber Tech (CCR)</label>
        <input type="text" id="tecCCR" class="form-control mt-2 mb-2" placeholder="Técnico Responsável">
        <label class="btn-camera">
            + ADICIONAR FOTO SONDAGEM
            <input type="file" accept="image/*" capture="camera" hidden onchange="addPhoto(this, 'galeriaCCR')">
        </label>
        <div id="galeriaCCR" class="gallery"></div>
    </div>

    <div class="tech-card">
        <label class="fw-bold text-danger text-uppercase">2. Equipe Claro</label>
        <input type="text" id="tecClaro" class="form-control mt-2 mb-2" placeholder="Técnico Responsável">
        <label class="btn-camera" style="border-color: #ff1744; color: #ff1744;">
            + ADICIONAR FOTO SONDAGEM
            <input type="file" accept="image/*" capture="camera" hidden onchange="addPhoto(this, 'galeriaClaro')">
        </label>
        <div id="galeriaClaro" class="gallery"></div>
    </div>

    <button class="btn-final" onclick="gerarRelatorioPDF()">
        FINALIZAR E SALVAR PDF
    </button>
</div>

<div id="pdf-content">
    <div style="border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
        <h1 style="margin:0;">RELATÓRIO DE INSPEÇÃO DE CAMPO</h1>
        <p style="margin:5px 0;" id="pdf-header-info"></p>
    </div>

    <div style="background: #f4f4f4; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <h3 style="margin-top:0;">Dados do Local</h3>
        <p><strong>KM:</strong> <span id="p-km"></span> | <strong>Sentido:</strong> <span id="p-sentido"></span></p>
    </div>

    <div style="margin-bottom: 30px;">
        <h3 style="color: #004a99; border-bottom: 1px solid #ccc;">Sondagem Fiber Tech (CCR)</h3>
        <p><strong>Técnico:</strong> <span id="p-tecCCR"></span></p>
        <div id="pdf-galeriaCCR" class="pdf-photo-grid"></div>
    </div>

    <div style="margin-bottom: 30px;">
        <h3 style="color: #ee1d23; border-bottom: 1px solid #ccc;">Sondagem Equipe Claro</h3>
        <p><strong>Técnico:</strong> <span id="p-tecClaro"></span></p>
        <div id="pdf-galeriaClaro" class="pdf-photo-grid"></div>
    </div>
</div>

<script>
    // Armazenamento das fotos em Base64 para garantir que entrem no PDF
    const fotos = { CCR: [], Claro: [] };

    function addPhoto(input, galeriaId) {
        const file = input.files;
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            const tipo = galeriaId.includes('CCR') ? 'CCR' : 'Claro';
            
            // Adiciona ao array
            fotos[tipo].push(base64Data);

            // Cria miniatura na tela
            const img = document.createElement('img');
            img.src = base64Data;
            document.getElementById(galeriaId).appendChild(img);
        };
        reader.readAsDataURL(file);
    }

    async function gerarRelatorioPDF() {
        const km = document.getElementById('km').value;
        if (!km) return alert("Digite o KM para finalizar.");

        const { jsPDF } = window.jspdf;
        const btn = document.querySelector('.btn-final');
        btn.innerText = "PROCESSANDO IMAGENS...";
        btn.disabled = true;

        // Preenche o template invisível
        const agora = new Date();
        document.getElementById('pdf-header-info').innerText = `Data: ${agora.toLocaleDateString()} | Hora: ${agora.toLocaleTimeString()}`;
        document.getElementById('p-km').innerText = km;
        document.getElementById('p-sentido').innerText = document.getElementById('sentido').value;
        document.getElementById('p-tecCCR').innerText = document.getElementById('tecCCR').value || "Não informado";
        document.getElementById('p-tecClaro').innerText = document.getElementById('tecClaro').value || "Não informado";

        // Limpa e preenche galerias do PDF
        const pdfGalCCR = document.getElementById('pdf-galeriaCCR');
        const pdfGalClaro = document.getElementById('pdf-galeriaClaro');
        pdfGalCCR.innerHTML = '';
        pdfGalClaro.innerHTML = '';

        fotos.CCR.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            pdfGalCCR.appendChild(img);
        });

        fotos.Claro.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            pdfGalClaro.appendChild(img);
        });

        // Gera o PDF a partir da Div
        const element = document.getElementById('pdf-content');
        
        try {
            const canvas = await html2canvas(element, {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                logging: false
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.9);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = (canvas.height * pageWidth) / canvas.width;

            pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
            
            const nomeArquivo = `Relatorio_KM_${km.replace('+', '-')}_${agora.getTime()}.pdf`;
            pdf.save(nomeArquivo);

            alert("Relatório Gerado com Sucesso!");
        } catch (err) {
            console.error(err);
            alert("Erro ao gerar PDF. Verifique as fotos.");
        } finally {
            btn.innerText = "FINALIZAR E SALVAR PDF";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
