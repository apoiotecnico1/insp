<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angstrom - Gestão de Ativos & Performance</title>
    <style>
        :root {
            --angstrom-gold: #c5a059;
            --dark-deep: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #10b981;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--dark-deep); color: #e2e8f0; margin: 0; padding: 10px; }
        .app { max-width: 1000px; margin: auto; }
        
        /* Header CEO Style */
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 25px; border-radius: 20px; border: 1px solid var(--angstrom-gold); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-badge { background: var(--angstrom-gold); color: black; padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 0.7em; letter-spacing: 1px; }
        
        /* Voice & Input Area */
        .input-panel { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; }
        .voice-btn { background: #ef4444; width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; transition: 0.3s; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .voice-btn.recording { animation: pulse 1.5s infinite; background: #22c55e; }
        
        textarea { width: 100%; background: transparent; border: 1px solid #475569; color: white; border-radius: 10px; padding: 15px; font-size: 1.1em; resize: none; box-sizing: border-box; }
        
        /* Massive Button Grid */
        .grid-container { height: 280px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid #334155; }
        .btn-task { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.8em; text-align: left; transition: 0.2s; }
        .btn-task:hover { border-color: var(--angstrom-gold); background: #334155; transform: scale(1.02); }

        /* Timeline & Progress */
        .timeline { margin-top: 25px; border-left: 2px solid var(--angstrom-gold); padding-left: 20px; }
        .card { background: var(--glass); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--angstrom-gold); }
        
        .main-action { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px; transition: 0.3s; }
        .btn-on { background: var(--angstrom-gold); color: black; }
        .btn-off { background: #334155; color: white; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h1 style="margin:0; color:var(--angstrom-gold); letter-spacing: -1px;">ANGSTROM GESTÃO</h1>
                <p id="data-display" style="margin: 5px 0; font-size: 0.9em; opacity: 0.7;"></p>
            </div>
            <div style="text-align: right;">
                <span class="status-badge" id="rank">NÍVEL: OPERACIONAL</span>
                <div id="stats" style="margin-top:10px; font-size: 0.8em; color: var(--angstrom-gold);">0 HORAS REGISTRADAS</div>
            </div>
        </div>
    </div>

    <div class="input-panel">
        <button class="voice-btn" id="voiceBtn" onclick="startSpeech()">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div style="text-align: center; margin-bottom: 15px; font-size: 0.8em; color: var(--angstrom-gold);" id="voiceStatus">Toque para falar a descrição</div>
        
        <textarea id="descInput" rows="3" placeholder="Ação técnica ou estratégica realizada..."></textarea>
        
        <div id="timer" style="text-align: center; font-size: 1.8em; margin: 10px 0; font-family: monospace;">00:00:00</div>
        
        <button id="mainBtn" class="main-action btn-on" onclick="handleTask()">Iniciar Operação</button>
    </div>

    <h3 style="color:var(--angstrom-gold)">DIRETÓRIO DE ATIVOS ANGSTROM</h3>
    <div class="grid-container" id="taskGrid"></div>

    <div class="timeline" id="timeline"></div>

    <div style="display: flex; gap: 10px; margin: 25px 0;">
        <button class="main-action btn-off" style="margin:0; flex:1;" onclick="clearAll()">Zerar Turno</button>
        <button class="main-action btn-on" style="margin:0; flex:1; background:#25D366; color:white;" onclick="sendWhatsApp()">Enviar WhatsApp Executivo</button>
    </div>
</div>

<script>
    const angstromTasks = [
        {cat: "Logística", txt: "Gestão de Suprimentos Críticos Angstrom", imp: "Otimização de estoque e disponibilidade"},
        {cat: "Infra", txt: "Manutenção Preventiva de Ativos Fiber Tech", imp: "Garantia de uptime e integridade da rede"},
        {cat: "Infra", txt: "Intervenção em Redes de Fibra Óptica", imp: "Expansão da capacidade de transporte de dados"},
        {cat: "Gestão", txt: "Alinhamento Estratégico com Equipes Terceiras", imp: "Compliance técnico e qualidade de entrega"},
        {cat: "Segurança", txt: "Inspeção Técnica de Passarelas e Estruturas", imp: "Mitigação de riscos e segurança patrimonial"},
        {cat: "Suporte", txt: "Atendimento Nível 2 - Consultoria Técnica Local", imp: "Resolução de alta complexidade para o cliente"},
        {cat: "Documentação", txt: "Auditoria de Procedimentos e AS-BUILT", imp: "Governança e padronização operacional"},
        {cat: "Noturno", txt: "Inspeção de Visibilidade e Sistemas (Ciclo Noturno)", imp: "Sinalização crítica e segurança viária"},
        {cat: "Estratégia", txt: "Levantamento de Necessidades de Expansão", imp: "Capex e planejamento de melhorias futuras"},
        {cat: "Sistemas", txt: "Auditoria de Integridade de Sistemas de Controle", imp: "Cybersecurity e estabilidade de software"},
        {cat: "Equipamento", txt: "Manutenção de Frota e Ativos de Mobilidade", imp: "Redução de custos com manutenção corretiva"},
        {cat: "Mentoria", txt: "Feedback e Desenvolvimento de Técnicos Externos", imp: "Aprimoramento do capital humano Angstrom"}
    ];

    let activities = JSON.parse(localStorage.getItem('ang_acts')) || [];
    let startTime = localStorage.getItem('ang_start') ? new Date(localStorage.getItem('ang_start')) : null;
    let timerInterval;

    window.onload = () => {
        document.getElementById('data-display').innerText = new Date().toLocaleDateString('pt-br', {weekday: 'long', day: '2-digit', month: 'long'});
        renderGrid();
        renderTimeline();
        if(startTime) startTimerUI();
    };

    function renderGrid() {
        const grid = document.getElementById('taskGrid');
        angstromTasks.forEach(item => {
            let b = document.createElement('button');
            b.className = 'btn-task';
            b.innerHTML = `<strong>${item.cat}</strong><br>${item.txt}`;
            b.onclick = () => {
                document.getElementById('descInput').value = item.txt;
                document.getElementById('descInput').dataset.impacto = item.imp;
            };
            grid.appendChild(b);
        });
    }

    function startSpeech() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        const btn = document.getElementById('voiceBtn');
        const status = document.getElementById('voiceStatus');

        recognition.onstart = () => { btn.classList.add('recording'); status.innerText = "Ouvindo..."; };
        recognition.onresult = (event) => {
            document.getElementById('descInput').value = event.results.transcript;
            btn.classList.remove('recording');
            status.innerText = "Toque para falar a descrição";
        };
        recognition.start();
    }

    function handleTask() {
        const btn = document.getElementById('mainBtn');
        if (!startTime) {
            startTime = new Date();
            localStorage.setItem('ang_start', startTime.toISOString());
            startTimerUI();
        } else {
            const duration = document.getElementById('timer').innerText;
            activities.push({
                inicio: startTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fim: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                txt: document.getElementById('descInput').value || "Intervenção Técnica Angstrom",
                imp: document.getElementById('descInput').dataset.impacto || "Manutenção da eficiência operacional",
                total: duration
            });
            localStorage.setItem('ang_acts', JSON.stringify(activities));
            startTime = null;
            localStorage.removeItem('ang_start');
            clearInterval(timerInterval);
            location.reload();
        }
    }

    function startTimerUI() {
        document.getElementById('mainBtn').innerText = "Encerrar Operação";
        document.getElementById('mainBtn').className = "main-action btn-off";
        timerInterval = setInterval(() => {
            const diff = new Date(new Date() - startTime);
            document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    function renderTimeline() {
        const container = document.getElementById('timeline');
        container.innerHTML = activities.map(a => `
            <div class="card">
                <div style="font-size: 0.8em; color: var(--angstrom-gold)">${a.inicio} - ${a.fim} (${a.total})</div>
                <div style="font-weight: bold; margin: 5px 0;">${a.txt}</div>
                <div style="font-size: 0.85em; opacity: 0.8;">🚀 Impacto: ${a.imp}</div>
            </div>
        `).reverse().join('');
        
        updateRank();
    }

    function updateRank() {
        const n = activities.length;
        const rank = document.getElementById('rank');
        if(n > 10) rank.innerText = "NÍVEL: DIRETOR DE OPERAÇÕES";
        else if(n > 5) rank.innerText = "NÍVEL: GESTOR DE MANUTENÇÃO";
        else rank.innerText = "NÍVEL: ANALISTA TÉCNICO";
    }

    function sendWhatsApp() {
        let text = `*ANGSTROM - RELATÓRIO EXECUTIVO DE ATIVOS*\n`;
        text += `_Data: ${new Date().toLocaleDateString()}_\n`;
        text += `_Responsável: Gestão de Manutenção_\n\n`;
        
        activities.forEach(a => {
            text += `✅ *${a.txt}*\n`;
            text += `🕒 Horário: ${a.inicio} - ${a.fim}\n`;
            text += `📈 Impacto: ${a.imp}\n\n`;
        });
        
        text += `*RESUMO:* ${activities.length} Ativos gerenciados hoje.\n*STATUS:* Fluxo operacional em conformidade.`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function clearAll() { if(confirm("Deseja fechar o relatório do dia?")) { localStorage.clear(); location.reload(); } }
</script>

</body>
</html>
