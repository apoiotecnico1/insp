<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA ELITE PRO - RELATÓRIOS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: #007934; 
            --danger: #ff4444; 
            --dark: #111;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            position: fixed; 
        }

        /* TELA DE BLOQUEIO INICIAL */
        #safety-gate { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 5000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .alert-box { 
            border: 2px solid var(--danger); 
            padding: 30px; 
            border-radius: 15px; 
            max-width: 500px; 
            background: var(--dark); 
            text-align: center; 
            box-shadow: 0 0 50px rgba(255,0,0,0.2); 
        }
        .alert-box h2 { color: var(--danger); margin-bottom: 20px; font-size: 1.4rem; text-transform: uppercase; }
        .warn-text { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: left; border-left: 5px solid var(--accent); }
        .warn-text p { font-size: 14px; line-height: 1.6; color: #eee; margin-bottom: 12px; }
        .btn-setup { 
            width: 100%; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 22px; 
            font-weight: 900; 
            border-radius: 8px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 16px; 
            transition: transform 0.2s;
        }
        .btn-setup:active { transform: scale(0.98); }

        /* INTERFACE DO APP */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        /* HUD DE VELOCIDADE/KM */
        #km-hud { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            background: var(--placa-verde); 
            padding: 12px 25px; 
            border: 3px solid #fff; 
            border-radius: 12px; 
            z-index: 10; 
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #km-hud h1 { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; }

        /* INDICADOR REC */
        #rec-indicator { 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            display: none; 
            align-items: center; 
            gap: 10px; 
            background: rgba(0,0,0,0.75); 
            padding: 10px 20px; 
            border-radius: 30px; 
            z-index: 10; 
            border: 1px solid rgba(255,255,255,0.3); 
        }
        .dot { width: 14px; height: 14px; background: #f00; border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 10px #f00; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* CONTROLES INFERIORES */
        #ui-controls { 
            position: absolute; 
            bottom: 60px; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 25px; 
            z-index: 100; 
        }
        .btn-main { 
            border: none; 
            border-radius: 50px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            padding: 22px 50px; 
            font-size: 16px; 
            background: var(--accent); 
            color: #000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>⚠️ CONFIGURAÇÃO OBRIGATÓRIA</h2>
        <div class="warn-text">
            <p><strong>1. SEGURANÇA:</strong> O uso pelo motorista em movimento é proibido por lei.</p>
            <p><strong>2. ARMAZENAMENTO:</strong> Selecione a pasta onde os relatórios PDF serão salvos automaticamente.</p>
            <p><strong>3. PERMISSÃO:</strong> Ao selecionar a pasta, clique em "Permitir Edição" no topo do navegador.</p>
        </div>
        <button class="btn-setup" onclick="requestFolder()">Escolher Pasta e Iniciar</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud"><h1 id="km-txt">Km ---</h1></div>
    
    <div id="rec-indicator">
        <div class="dot"></div>
        <span style="font-weight:900; letter-spacing:1px; font-size:14px;">GRAVANDO LOTE</span>
    </div>

    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="initCapture(); event.stopPropagation();">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture(); event.stopPropagation();">Finalizar Lote</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
/**
 * SISTEMA DE RELATÓRIO VIÁRIO - CÓDIGO UNIFICADO
 */
let kmDB = [], rec = false, buffer = [], currentStream = null, wakeLock = null, dirHandle = null;
let kmInicialLote = "";
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

// 1. TELA CHEIA
function forceFull() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
}

// 2. ACESSO AO SISTEMA DE ARQUIVOS
async function requestFolder() {
    try {
        if (!window.showDirectoryPicker) {
            alert("Atenção: Este navegador não suporta salvamento direto. Use Chrome ou Edge (Android/PC).");
            return;
        }
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        startApp();
    } catch (e) {
        alert("Você precisa autorizar o acesso à pasta para continuar.");
    }
}

// 3. INICIALIZAÇÃO
async function startApp() {
    forceFull();
    document.getElementById('safety-gate').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    
    // Mantém a tela ligada
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
    }
    
    // Configura Câmera Traseira
    const devices = await navigator.mediaDevices.enumerateDevices();
    const backCam = devices.find(d => d.label.toLowerCase().includes('back')) || 
                    devices.filter(d => d.kind==='videoinput').pop();
    
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: backCam ? backCam.deviceId : undefined, width: 1280, height: 720, facingMode: "environment" } 
    });
    vid.srcObject = currentStream;
    
    loadCSV();
    initGPS();
}

// 4. LÓGICA DE CAPTURA
function initCapture() {
    rec = true; 
    buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-indicator').style.display = 'flex';
    
    loop();
}

function stopCapture() {
    if(!rec) return;
    const kmFim = document.getElementById('km-txt').innerText.replace("Km ", "");
    
    if(buffer.length > 0) {
        saveDirectly([...buffer], kmInicialLote, kmFim);
    }
    
    rec = false; 
    buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
}

function loop() {
    if(!rec) return;
    
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        can.width = vid.videoWidth; 
        can.height = vid.videoHeight;
        ctx.drawImage(vid, 0, 0);
        
        const curKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        
        // Adiciona ao buffer temporário
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.4), 
            km: curKm, 
            ts: new Date().toLocaleTimeString('pt-BR') 
        });
        
        // Autosave a cada 200 fotos para evitar crash de memória
        if(buffer.length >= 200) {
            saveDirectly([...buffer], kmInicialLote, curKm);
            buffer = []; 
            kmInicialLote = curKm;
        }
    }
    setTimeout(loop, 200); // 5 capturas por segundo
}

// 5. PROCESSAMENTO E SALVAMENTO DO PDF
async function saveDirectly(data, ini, fim) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i < data.length; i++){
        if(i > 0) doc.addPage();
        
        await new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                // Reaproveita o canvas para carimbar informações na foto
                const bh = can.height * 0.12;
                ctx.drawImage(img, 0, 0);
                
                // Overlay de dados
                ctx.fillStyle = "rgba(0,0,0,0.7)"; 
                ctx.fillRect(0, can.height - bh, can.width, bh);
                
                ctx.fillStyle = "#ffcc00"; 
                ctx.font = `bold ${bh * 0.4}px Arial`;
                ctx.fillText(`KM: ${data[i].km}`, 40, can.height - (bh * 0.45));
                
                ctx.fillStyle = "#ffffff"; 
                ctx.font = `${bh * 0.2}px Arial`;
                ctx.fillText(`${new Date().toLocaleDateString('pt-BR')} | ${data[i].ts}`, 40, can.height - (bh * 0.15));
                
                doc.addImage(can.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph); 
                resolve();
            };
            img.src = data[i].raw;
        });
        
        // Evita travamento em dispositivos móveis
        if(i % 15 === 0) await new Promise(r => setTimeout(r, 10));
    }

    // Nome do Arquivo formatado
    const d = new Date();
    const ts = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
    const nome = `Relatorio_KM_${ini}_a_${fim}_${ts}.pdf`;

    try {
        const fileHandle = await dirHandle.getFileHandle(nome, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (e) {
        console.error("Erro ao salvar PDF:", e);
    }
}

// 6. GPS E BASE DE DADOS CSV
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        
        const ik = h.findIndex(x => x.toLowerCase().includes('km'));
        const ilt = h.findIndex(x => x.toLowerCase().includes('lat'));
        const iln = h.findIndex(x => x.toLowerCase().includes('lon'));
        
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { 
                km: c[ik], 
                lt: parseFloat(c[ilt]?.replace(',', '.')), 
                ln: parseFloat(c[iln]?.replace(',', '.')) 
            };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {
        console.warn("CSV não encontrado. O KM não será atualizado automaticamente.");
    }
}

function initGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let closest = null;
        let minD = Infinity;
        
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < minD) { minD = d; closest = pt; }
        }
        if(closest) document.getElementById('km-txt').innerText = "Km " + closest.km;
    }, null, { enableHighAccuracy: true });
}

// Previne fechamento acidental
window.onbeforeunload = () => rec ? "Captura em andamento!" : null;
</script>
</body>
</html>
