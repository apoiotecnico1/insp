<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RODOVIÁRIA V6.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00d9ff; --dark-bg: #0a0a0a; --card-bg: #161618; }
        body { margin: 0; background: var(--dark-bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; width: 100vw; height: 60vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* PLACA KM CORRIGIDA - LINHA ÚNICA SEMPRE VISÍVEL */
        #kmPlaque { 
            position: absolute; bottom: 20px; z-index: 10;
            background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; 
            padding: 10px 20px; font-size: 1.5rem; font-weight: 900; border: 3px solid #fff;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            white-space: nowrap; display: flex; align-items: center; justify-content: center;
            min-width: fit-content; transition: 0.3s;
        }
        .pos-center { left: 50%; transform: translateX(-50%); }
        .pos-left { left: 20px; transform: none; }
        .pos-right { right: 20px; transform: none; }

        /* MENU DE CONFIGURAÇÕES REFINADO */
        #settings-panel { 
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%; 
            background: rgba(10, 10, 12, 0.98); z-index: 5000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 20px; overflow-y: auto; backdrop-filter: blur(20px);
        }
        #settings-panel.active { right: 0; }
        
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { background: #222; border: none; color: #888; padding: 10px 15px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: #000; }

        .config-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .config-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; font-weight: 500; }
        .val-tag { color: var(--accent); font-weight: bold; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); height: 5px; }
        input[type="text"], select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 5px; }

        #controls { flex-grow: 1; background: #000; display: flex; flex-direction: column; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #222; }
        .card { background: #000; padding: 10px 2px; text-align: center; }
        .card label { font-size: 0.5rem; color: #555; text-transform: uppercase; }
        .val { font-size: 1.1rem; font-weight: bold; color: var(--accent); display: block; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; }
        button.main-action { border: none; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        #btnStart { background: #00d96d; color: #000; }
        #btnStop { background: #ff3b3b; color: #fff; }

        .icon-cfg { position: absolute; top: 15px; right: 15px; z-index: 2000; background: rgba(0,0,0,0.5); border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); font-size: 20px; }
        #save-status { position: fixed; top: 20px; left: 20px; background: var(--highway-green); padding: 8px 15px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; display: none; z-index: 6000; border: 1px solid #fff; }
    </style>
</head>
<body>

<div id="save-status">💾 GERANDO PDF...</div>
<div class="icon-cfg" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('t-capt')">CAPTURA</button>
        <button class="tab-btn" onclick="showTab('t-cam')">CÂMERA</button>
        <button class="tab-btn" onclick="showTab('t-pdf')">PDF/PAGINA</button>
    </div>

    <div id="t-capt" class="tab-pane">
        <div class="config-card">
            <div class="config-label">Velocidade: <span id="v-delay" class="val-tag">0.2s</span></div>
            <input type="range" id="c-delay" min="100" max="5000" step="100" value="200" oninput="uDisp()">
        </div>
        <div class="config-card">
            <div class="config-label">Fotos por PDF: <span id="v-batch" class="val-tag">200</span></div>
            <input type="range" id="c-batch" min="10" max="500" step="10" value="200" oninput="uDisp()">
        </div>
        <div class="config-card">
            <label style="font-size:0.8rem">Posição da Placa KM</label>
            <select id="c-pos" onchange="uPos()">
                <option value="pos-center">Centro (Padrão)</option>
                <option value="pos-left">Esquerda</option>
                <option value="pos-right">Direita</option>
            </select>
        </div>
    </div>

    <div id="t-cam" class="tab-pane" style="display:none">
        <div class="config-card">
            <label style="font-size:0.8rem">Escolher Lente</label>
            <div id="cam-list"></div>
        </div>
        <div class="config-card">
            <div class="config-label">Brilho (Imagem): <span id="v-br" class="val-tag">100%</span></div>
            <input type="range" id="c-br" min="50" max="250" value="100" oninput="uDisp()">
        </div>
    </div>

    <div id="t-pdf" class="tab-pane" style="display:none">
        <div class="config-card">
            <label style="font-size:0.8rem">Prefixo do Arquivo</label>
            <input type="text" id="pdf-prefix" value="INSP_RODOVIA">
        </div>
        <div class="config-card">
            <div class="config-label">Qualidade Imagem: <span id="v-qual" class="val-tag">70%</span></div>
            <input type="range" id="pdf-qual" min="10" max="100" value="70" oninput="uDisp()">
        </div>
    </div>

    <button onclick="toggleSettings()" style="width:100%; padding:20px; background:var(--accent); border:none; color:#000; font-weight:900; border-radius:12px; margin-top:20px">FECHAR E SALVAR</button>
</div>

<div id="main-container" style="flex-grow:1; display:flex; flex-direction:column">
    <div id="viewport">
        <div id="kmPlaque" class="pos-center">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div style="display:flex; justify-content:space-between; background:#111; padding:5px 15px; font-size:0.6rem; color:#666">
            <span id="stGps">GPS: BUSCANDO...</span> 
            <span id="txtTimer" style="color:var(--accent)">00:00</span>
        </div>
        
        <div class="dashboard">
            <div class="card"><label>TOTAL</label><span id="txtTotal" class="val">0</span></div>
            <div class="card"><label>LOTE</label><span id="txtBuffer" class="val">0</span></div>
            <div class="card"><label>PDFS</label><span id="txtPdfs" class="val">0</span></div>
            <div class="card" onclick="takeSinglePhoto()" style="cursor:pointer; background:#1a1a1a;">📸<label style="color:var(--accent); display:block">FOTO</label></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="main-action">INICIAR</button>
            <button id="btnStop" class="main-action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [], startTime = 0, timerInterval;
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

function showTab(id) {
    document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    event.currentTarget.classList.add('active');
}

function uDisp() {
    document.getElementById('v-delay').textContent = (document.getElementById('c-delay').value/1000).toFixed(1) + 's';
    document.getElementById('v-batch').textContent = document.getElementById('c-batch').value;
    document.getElementById('v-br').textContent = document.getElementById('c-br').value + '%';
    document.getElementById('v-qual').textContent = document.getElementById('pdf-qual').value + '%';
    vid.style.filter = `brightness(${document.getElementById('c-br').value}%)`;
}

function uPos() {
    const p = document.getElementById('kmPlaque');
    p.className = ''; 
    p.id = 'kmPlaque'; // Garante o ID
    p.classList.add(document.getElementById('c-pos').value);
}

async function scanCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const container = document.getElementById('cam-list');
    container.innerHTML = '';
    videoDevices.forEach((device, index) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.style.width = '100%'; btn.style.marginBottom = '5px';
        btn.innerHTML = `📷 ${device.label || 'Lente ' + (index+1)}`;
        btn.onclick = () => switchCamera(device.deviceId);
        container.appendChild(btn);
    });
    if (videoDevices.length > 0) switchCamera(videoDevices.deviceId);
}

async function switchCamera(id) {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: { exact: id }, width: 1920, height: 1080 } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

async function checkFolder() {
    if (directoryHandle) return true;
    try { directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); return true; } 
    catch (e) { return false; }
}

async function savePDF(manualBuffer = null) {
    const buffer = manualBuffer || activeBuffer;
    if(!buffer.length) return;
    if(!manualBuffer) activeBuffer = []; 

    document.getElementById('save-status').style.display = 'block';
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    const qual = parseInt(document.getElementById('pdf-qual').value) / 100;

    for(let i=0; i<buffer.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.filter = vid.style.filter;
                ctx.drawImage(img, 0, 0);
                drawStamp(buffer[i]);
                doc.addImage(can.toDataURL('image/jpeg', qual), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = buffer[i].img;
        });
        URL.revokeObjectURL(buffer[i].img);
    }

    const name = `${document.getElementById('pdf-prefix').value}_${Date.now()}.pdf`;
    const file = await directoryHandle.getFileHandle(name, { create: true });
    const writable = await file.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
    
    if(!manualBuffer) { pdfCount++; document.getElementById('txtPdfs').textContent = pdfCount; }
    document.getElementById('save-status').style.display = 'none';
}

function drawStamp(item) {
    ctx.font = `bold 75px Arial Black`;
    ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 5;
    ctx.strokeText("KM " + item.km, 50, can.height - 150);
    ctx.fillText("KM " + item.km, 50, can.height - 150);
    ctx.font = "35px Arial";
    ctx.fillText(`${item.ts} | Coord: ${item.coords}`, 50, can.height - 60);
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        coords: lastPos ? `${lastPos.lat.toFixed(5)}, ${lastPos.lon.toFixed(5)}` : "Sem GPS",
        ts: new Date().toLocaleString()
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;
    if(activeBuffer.length >= parseInt(document.getElementById('c-batch').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('c-delay').value));
}

async function takeSinglePhoto() {
    if(await checkFolder()) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        const snap = [{
            img: can.toDataURL('image/jpeg', 0.8),
            km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
            coords: lastPos ? `${lastPos.lat.toFixed(5)}, ${lastPos.lon.toFixed(5)}` : "Sem GPS",
            ts: new Date().toLocaleString()
        }];
        savePDF(snap);
    }
}

document.getElementById('btnStart').onclick = async () => {
    if(await checkFolder()) {
        isRecording = true; startTime = Date.now();
        timerInterval = setInterval(() => {
            const d = new Date(Date.now() - startTime);
            document.getElementById('txtTimer').textContent = d.toISOString().substr(14, 5);
        }, 1000);
        captureLoop();
        document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
    }
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false; clearInterval(timerInterval);
    savePDF();
    document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true;
};

async function loadCSV(){
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const l = t.split('\n').filter(x => x.trim() !== '');
        l.shift();
        kmDataset = l.map(row => {
            const c = row.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        });
    } catch(e) {}
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    if(kmDataset.length) {
        let best = kmDataset, bd = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < bd) { bd = d; best = pt; }
        });
        document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

scanCameras(); loadCSV(); uDisp();
</script>
</body>
</html>
