<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SUPORTE DE CAMPO PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.95); --border: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE SEGURANÇA INICIAL */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .alert-box { border: 1px solid var(--border); padding: 30px; border-radius: 12px; max-width: 500px; background: #080808; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .alert-box h2 { color: var(--accent); margin-bottom: 20px; font-size: 20px; text-transform: uppercase; text-align: center; }
        .safety-guide { text-align: left; margin-bottom: 25px; }
        .safety-item { display: flex; gap: 12px; margin-bottom: 15px; align-items: flex-start; }
        .safety-icon { color: var(--accent); font-size: 18px; }
        .safety-text { font-size: 13px; color: #ccc; line-height: 1.4; }
        .btn-aware { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 13px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD ATUALIZADO */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); padding: 12px 20px; 
            border: 2px solid #fff; border-radius: 6px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 10;
            min-width: 180px;
        }
        #km-hud h1 { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .hud-info { font-size: 11px; color: rgba(255,255,255,0.9); font-weight: bold; text-transform: uppercase; display: block; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 4px; }

        #counter-hud {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 10px 15px;
            border-radius: 6px; border: 1px solid #444; text-align: right;
        }
        #counter-hud div { font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 2px; }
        #counter-hud span { font-size: 18px; font-weight: 800; color: var(--accent); font-family: monospace; }

        #rec-tag { position: absolute; top: 85px; right: 20px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; font-size: 10px; color: #fff; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* PAINEL LATERAL */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 340px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(25px); z-index: 3000; 
            padding: 20px; transition: 0.5s; border-left: 1px solid var(--border);
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .close-settings { cursor: pointer; color: var(--accent); font-weight: bold; font-size: 12px; }

        .tool-section { margin-bottom: 25px; }
        .tool-section h3 { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; }
        .field { margin-bottom: 15px; }
        .field label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
        select, input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; font-size: 13px; }
        .btn-tool { background: #222; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #eee; font-size: 11px; cursor: pointer; width: 100%; margin-top: 10px; }

        #ui-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 15px; z-index: 100;
        }
        .btn-round { border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 18px 35px; font-size: 12px; background: var(--accent); color: #000; }
        #gear-btn { width: 55px; height: 55px; border-radius: 8px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; border: 1px solid rgba(255,255,255,0.2); }

        canvas { display: none; }
    </style>
</head>
<body onclick="requestWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>Guia de Operação Segura</h2>
        <div class="safety-guide">
            <div class="safety-item"><span class="safety-icon">⚠️</span><span class="safety-text"><b>Foco na Via:</b> Use suportes fixos.</span></div>
            <div class="safety-item"><span class="safety-icon">🔋</span><span class="safety-text"><b>Energia:</b> Mantenha no carregador.</span></div>
            <div class="safety-item"><span class="safety-icon">📁</span><span class="safety-text"><b>Lote:</b> Gravação automática a cada 200 fotos.</span></div>
        </div>
        <button class="btn-aware" onclick="acceptSafety()">Entendi e Aceito</button>
    </div>
</div>

<div id="settings-panel">
    <div class="panel-header"><span>CONFIGURAÇÕES</span><div class="close-settings" onclick="toggleSet()">Fechar ✕</div></div>
    <div class="tool-section">
        <h3>Captura</h3>
        <div class="field"><label>Câmera</label><select id="cam-select" onchange="initC(this.value)"></select></div>
        <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200"></div>
        <div class="field"><label>Fotos por Lote</label><input type="number" id="cfg-lote" value="200"></div>
    </div>
    <div class="tool-section">
        <h3>Hardware & Notas</h3>
        <button class="btn-tool" onclick="toggleTorch()">🔦 Alternar Lanterna</button>
        <textarea id="field-notes" placeholder="Observações..." rows="5" style="margin-top:10px"></textarea>
        <button class="btn-tool" onclick="exportNotes()">💾 Salvar Notas (.txt)</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted loop></video>
    
    <div id="km-hud">
        <h1 id="km-txt">Km ---</h1>
        <span class="hud-info" id="nox-txt">ID NOX: ---</span>
    </div>

    <div id="counter-hud">
        <div>Lote Atual</div>
        <span id="count-txt">000</span><small style="color:#666; font-weight:bold;"> / <span id="limit-display">200</span></small>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>CAPTURA ATIVA</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>
        <button id="btn-start" class="btn-round" onclick="initCapture()">Iniciar Captura</button>
        <button id="btn-stop" class="btn-round" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function requestWakeLock() {
    if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        requestWakeLock();
    } catch(e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function toggleSet() { 
    document.getElementById('settings-panel').classList.toggle('open');
    document.getElementById('limit-display').innerText = document.getElementById('cfg-lote').value;
}

function toggleTorch() {
    const track = currentStream.getVideoTracks();
    try {
        const isTorchOn = track.getSettings().torch;
        track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
    } catch(e) { alert("Lanterna não suportada."); }
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    updateCounter();
    loop();
}

function stopCapture() {
    rec = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    updateCounter();
}

function updateCounter() {
    const count = buffer.length;
    document.getElementById('count-txt').innerText = count.toString().padStart(3, '0');
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        const currentNox = document.getElementById('nox-txt').innerText.replace("ID NOX: ", "");
        
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.45), 
            km: currentKm, 
            nox: currentNox,
            ts: new Date().toLocaleString('pt-BR').toUpperCase() 
        });

        updateCounter();

        const limit = parseInt(document.getElementById('cfg-lote').value) || 200;
        if(buffer.length >= limit) {
            const temp = [...buffer]; const kI = kmInicialLote; const kF = currentKm;
            buffer = []; kmInicialLote = currentKm;
            savePDF(temp, kI, kF);
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(data, ini, fim) {
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height-bh, can.width, bh);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${bh*0.35}px Arial`;
                ctx.fillText(`Km ${data[i].km} | NOX: ${data[i].nox}`, 40, can.height-(bh*0.45));
                ctx.font = `${bh*0.2}px Arial`;
                ctx.fillText(data[i].ts, 40, can.height-(bh*0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = data[i].raw;
        });
    }
    const nome = `Relatorio_Km_${ini}_a_${fim}_${new Date().getTime()}.pdf`;
    try {
        const f = await hDir.getFileHandle(nome, {create:true});
        const w = await f.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch(e) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        
        // Identifica as colunas de KM, Lat, Lon e o ID (Nox)
        const ik = h.indexOf('km');
        const ilt = h.findIndex(x=>x.includes('lat'));
        const iln = h.findIndex(x=>x.includes('lon'));
        // Procura por colunas chamadas 'id', 'nox', 'objectid' ou usa a primeira coluna como ID
        let inox = h.indexOf('nox');
        if(inox === -1) inox = h.indexOf('id');
        if(inox === -1) inox = 0; 

        kmDB = rows.map(r => {
            const c = r.split(';');
            return { 
                nox: c[inox] || "---",
                km: c[ik], 
                lt: parseFloat(c[ilt].replace(',','.')), 
                ln: parseFloat(c[iln].replace(',','.')) 
            };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Erro ao carregar CSV"); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) {
            document.getElementById('km-txt').innerText = "Km " + b.km;
            document.getElementById('nox-txt').innerText = "ID NOX: " + b.nox;
        }
    }, null, {enableHighAccuracy:true});
}

window.onload = () => { loadCSV(); initGPS(); };
</script>
</body>
</html>
