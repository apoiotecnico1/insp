<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V20 - OMNI MASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00d9ff; 
            --highway-green: #007934; 
            --danger: #ff3b30; 
            --glass: rgba(10, 15, 25, 0.92); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        
        body { 
            background: #000; 
            color: #fff; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* VIEWPORT PRINCIPAL */
        #viewport { 
            position: absolute; 
            inset: 0; 
            z-index: 1; 
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - PLACA DE KM (ESTILO RODOVIA) */
        #km-hud {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 100;
            background: linear-gradient(180deg, var(--highway-green) 0%, #004d21 100%);
            padding: 10px 25px;
            border: 3px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        #km-txt { 
            font-size: 2.5rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            text-shadow: 3px 3px 4px rgba(0,0,0,0.6); 
        }

        /* INDICADOR DE GRAVAÇÃO */
        #rec-indicator {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: 0.5s;
        }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* CONTROLES INFERIORES ADAPTATIVOS */
        #ui-wrap {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 30px);
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 500;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ui-hidden { opacity: 0; transform: translateY(100px); pointer-events: none; }

        .btn-row { 
            display: flex; 
            gap: 15px; 
            width: 100%; 
            max-width: 500px;
        }
        .btn-main { 
            flex: 1; 
            padding: 20px; 
            border: none; 
            border-radius: 15px; 
            font-weight: 900; 
            text-transform: uppercase;
            font-size: 13px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            cursor: pointer;
        }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; }
        #btn-gear { 
            width: 60px; 
            background: var(--glass); 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); 
            font-size: 22px;
            display: flex; align-items: center; justify-content: center;
        }

        /* PAINEL LATERAL DE CONFIGURAÇÕES (MASTER) */
        #settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 320px;
            height: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: 0.4s;
            padding: 40px 20px;
            border-left: 2px solid var(--accent);
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }
        .setting-section { margin-bottom: 25px; }
        .setting-section h4 { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .field { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        select, input { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 140px; }
        input[type="checkbox"] { width: 20px; }

        /* STATUS DE LOTE (MÍNIMO) */
        #batch-status { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: bold; letter-spacing: 1px; }

        canvas { display: none; }

        /* AJUSTE PARA MODO PAISAGEM (RODOVIA) */
        @media (orientation: landscape) {
            #km-hud { left: env(safe-area-inset-left, 20px); top: 50%; transform: translateY(-50%); }
            #ui-wrap { right: env(safe-area-inset-right, 20px); left: auto; width: 150px; bottom: 50%; transform: translateY(50%); }
            .btn-row { flex-direction: column; }
            #btn-gear { width: 100%; }
        }
    </style>
</head>
<body onclick="wakeUI()">

    <div id="viewport"><video id="vid" autoplay playsinline muted></video></div>

    <div id="km-hud"><div id="km-txt">KM ---+---</div></div>

    <div id="rec-indicator">
        <span id="batch-status">LOTE: 0/0</span>
        <div class="dot"></div>
    </div>

    <div id="ui-wrap">
        <div class="btn-row">
            <button id="btn-gear" onclick="toggleSet(); event.stopPropagation();">⚙️</button>
            <button id="btn-start" class="btn-main" onclick="startApp(); event.stopPropagation();">Iniciar Inspeção</button>
            <button id="btn-stop" class="btn-main" style="display:none" onclick="stopApp(); event.stopPropagation();">Finalizar PDF</button>
        </div>
    </div>

    <div id="settings-panel">
        <h2 style="margin-bottom: 20px; color: var(--accent);">CONFIGURAÇÕES</h2>
        
        <div class="setting-section">
            <h4>Câmera e Captura</h4>
            <div class="field">Lente: <select id="cfg-cam" onchange="initCam(this.value)"></select></div>
            <div class="field">Intervalo (ms): <input type="number" id="cfg-int" value="800"></div>
            <div class="field">Lote (Fotos): <input type="number" id="cfg-lote" value="100"></div>
            <div class="field">Qualidade: <input type="range" id="cfg-qual" min="10" max="100" value="70"></div>
        </div>

        <div class="setting-section">
            <h4>Design do PDF</h4>
            <div class="field">Fonte: <select id="cfg-font"><option value="Arial">Arial</option><option value="Courier">Typewriter</option><option value="Helvetica">Modern</option></select></div>
            <div class="field">Cor Texto: <input type="color" id="cfg-color" value="#ffffff"></div>
            <div class="field">Cor Tarja: <input type="color" id="cfg-stripe" value="#000000"></div>
            <div class="field">Opacidade: <input type="range" id="cfg-alpha" min="0" max="100" value="80"></div>
            <div class="field">Sombras: <input type="checkbox" id="cfg-shadow" checked></div>
        </div>

        <button class="btn-main" style="width:100%; background:var(--accent); color:#000;" onclick="toggleSet()">SALVAR E FECHAR</button>
    </div>

    <canvas id="proc"></canvas>

<script>
let kmDB=[], active=false, buffer=[], total=0, hDir=null, uiTimer;
const vid=document.getElementById('vid'), proc=document.getElementById('proc'), ctx=proc.getContext('2d');

// INICIALIZAÇÃO
window.onload = async () => {
    await loadCams();
    loadCSV();
    initGPS();
    // Solicita pasta de salvamento
    setTimeout(async () => {
        try { hDir = await window.showDirectoryPicker({mode:'readwrite'}); } catch(e){}
    }, 1500);
};

// CONTROLES DE UI
function wakeUI() {
    document.getElementById('ui-wrap').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(active) uiTimer = setTimeout(() => document.getElementById('ui-wrap').classList.add('ui-hidden'), 4000);
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

// MOTOR DE CÂMERA
async function loadCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cfg-cam');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Lente ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initCam(video[video.length-1].deviceId);
}

async function initCam(id) {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({video:{deviceId:id, width:1920, height:1080}});
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

// LÓGICA DE CAPTURA
function startApp() {
    if(!hDir) { alert("Selecione uma pasta primeiro!"); return; }
    active = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-indicator').style.opacity = '1';
    loop();
}

function stopApp() {
    active = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.opacity = '0';
    if(buffer.length) savePDF();
}

function loop() {
    if(!active) return;
    
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    buffer.push({
        img: proc.toDataURL('image/jpeg', document.getElementById('cfg-qual').value/100),
        km: document.getElementById('km-txt').innerText.replace("KM ",""),
        ts: new Date().toLocaleString()
    });

    total++;
    const limit = document.getElementById('cfg-lote').value;
    document.getElementById('batch-status').innerText = `LOTE: ${buffer.length}/${limit}`;

    if(buffer.length >= limit) savePDF();
    setTimeout(loop, document.getElementById('cfg-int').value);
}

// GERADOR DE PDF (ARQUITETURA DE DESIGN)
async function savePDF() {
    if(!buffer.length) return;
    const items = [...buffer]; buffer = [];
    
    const kmI = items.km.replace('+','_');
    const kmF = items[items.length-1].km.replace('+','_');
    const nome = `RELATORIO_KM_${kmI}_AO_${kmF}.pdf`;

    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    
    // Configurações de Design vindas do Painel
    const font = document.getElementById('cfg-font').value;
    const color = document.getElementById('cfg-color').value;
    const stripe = document.getElementById('cfg-stripe').value;
    const alpha = document.getElementById('cfg-alpha').value / 100;

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                
                // Estampa de Engenharia
                const hBar = proc.height * 0.15;
                ctx.fillStyle = hexToRgba(stripe, alpha);
                ctx.fillRect(0, proc.height - hBar, proc.width, hBar);
                
                if(document.getElementById('cfg-shadow').checked){
                    ctx.shadowColor = "black"; ctx.shadowBlur = 15;
                }
                
                ctx.fillStyle = color;
                ctx.font = `bold ${hBar * 0.45}px ${font}`;
                ctx.fillText("KM " + items[i].km, 50, proc.height - (hBar * 0.4));
                
                ctx.font = `${hBar * 0.15}px ${font}`;
                ctx.fillText(items[i].ts, 50, proc.height - (hBar * 0.15));
                
                doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                r();
            };
            img.src = items[i].img;
        });
    }

    const fh = await hDir.getFileHandle(nome, {create:true});
    const wr = await fh.createWritable();
    await wr.write(doc.output('blob')); await wr.close();
}

function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${a})`;
}

// GPS & CSV
function loadCSV() {
    fetch('SNVBR116SPRJ.csv?v='+Date.now()).then(r=>r.text()).then(t=>{
        const lines = t.split('\n').filter(l=>l.includes(';'));
        const head = lines.shift().split(';');
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = lines.map(l=>{
            const c=l.split(';');
            return {km:c[ik], lt:parseFloat(c[ilt].replace(',','.')), ln:parseFloat(c[iln].replace(',','.'))};
        }).filter(d=>!isNaN(d.lt));
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p=>{
        if(!kmDB.length) return;
        let best=null, dist=Infinity;
        for(const pt of kmDB){
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dist){ dist=d; best=pt; }
        }
        if(best) document.getElementById('km-txt').innerText = "KM " + best.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
