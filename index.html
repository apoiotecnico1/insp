<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - MULTI-BUFFER SNV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #1e3a8a; --neon: #00ff66; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* Câmera Fixa no Topo */
        #camContainer { position: sticky; top: 0; width: 100%; height: 45vh; background: #000; z-index: 100; border-bottom: 3px solid var(--blue); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Painel de KM (Estilo Placa de Rodovia) */
        #kmPlaque { 
            background: linear-gradient(180deg, #059669, #047857);
            color: white; text-align: center; padding: 10px;
            font-size: 3rem; font-weight: 900; border: 4px solid #fff;
            margin: 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .status-bar { display: flex; justify-content: space-around; padding: 10px; background: #1e293b; font-size: 0.8rem; }
        .badge { padding: 4px 8px; border-radius: 4px; background: #334155; }
        .active { color: var(--neon); font-weight: bold; }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        #btnFolder { background: #3b82f6; color: white; grid-column: span 2; }
        #btnStart { background: var(--neon); color: #000; }
        #btnStop { background: #ef4444; color: white; }

        .stats { display: flex; gap: 10px; padding: 0 15px; }
        .stat-card { flex: 1; background: #1e293b; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--neon); }

        #log { font-size: 0.7rem; color: #94a3b8; padding: 10px; text-align: center; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="camContainer">
    <video id="vid" autoplay playsinline muted></video>
</div>

<div id="kmPlaque">KM --+---</div>

<div class="status-bar">
    <span id="stCsv" class="badge">CSV: AGUARDANDO</span>
    <span id="stGps" class="badge">GPS: BUSCANDO</span>
    <span id="stProc" class="badge">PDF: OCIOSO</span>
</div>

<div class="stats">
    <div class="stat-card">FOTOS<span id="txtTotal">0</span></div>
    <div class="stat-card">BUFFER<span id="txtBuffer">0/200</span></div>
    <div class="stat-card">PDFs<span id="txtPdfs">0</span></div>
</div>

<div class="controls">
    <button id="btnFolder">📁 1. SELECIONAR PASTA COM CSVs</button>
    <button id="btnStart">▶ 2. INICIAR CAPTURA</button>
    <button id="btnStop" disabled>⏹ PARAR</button>
</div>

<div id="log">Aguardando permissão de pasta e câmera...</div>

<canvas id="can"></canvas>

<script>
const { jsPDF } = window.jspdf;
const LIMITE_BUFFER = 200;

// Estado Global
let isRecording = false;
let photoCount = 0;
let pdfCount = 0;
let activeBuffer = [];
let processingCount = 0;
let lastPos = { lat: 0, lon: 0 };
let currentKM = "0+000";
let kmPoints = []; // Base SNV
let folderHandle = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { alpha: false });

/* ===== LÓGICA SNV (Cálculo Real Riverside) ===== */
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function loadSNV() {
    if (!folderHandle) return;
    try {
        const fileHandle = await folderHandle.getFileHandle('SNVBR116SPRJ.csv');
        const file = await fileHandle.getFile();
        const text = await file.text();
        const lines = text.split('\n');
        
        kmPoints = [];
        lines.forEach(line => {
            const c = line.split(';');
            if (c.length >= 3) {
                const km = c.trim();
                const lat = parseFloat(c.replace(',', '.'));
                const lon = parseFloat(c.replace(',', '.'));
                if (!isNaN(lat)) kmPoints.push({ km, lat, lon });
            }
        });
        document.getElementById('stCsv').textContent = "CSV: OK";
        document.getElementById('stCsv').classList.add('active');
    } catch (e) {
        alert("Erro: Certifique-se que o arquivo SNVBR116SPRJ.csv está na pasta.");
    }
}

function updateKM(lat, lon) {
    if (kmPoints.length === 0) return;
    let closest = kmPoints;
    let minDist = Infinity;

    for (const p of kmPoints) {
        const d = haversine(lat, lon, p.lat, p.lon);
        if (d < minDist) {
            minDist = d;
            closest = p;
        }
    }
    currentKM = closest.km;
    document.getElementById('kmPlaque').textContent = `KM ${currentKM}`;
}

/* ===== ENGINE DE CAPTURA E MULTI-BUFFER ===== */
async function generatePDFInBackground(photos, id) {
    processingCount++;
    document.getElementById('stProc').textContent = `PDF: PROCESSANDO (${processingCount})`;
    document.getElementById('stProc').classList.add('active');

    const doc = new jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < photos.length; i++) {
        if (i > 0) doc.addPage();
        
        // Carimbo Técnico
        doc.setFillColor(0, 46, 110);
        doc.rect(0, 0, 297, 15, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(10);
        doc.text(`KM: ${photos[i].km} | GPS: ${photos[i].lat}, ${photos[i].lon} | DATA: ${photos[i].ts}`, 10, 10);
        
        doc.addImage(photos[i].img, 'JPEG', 10, 20, 277, 175);
    }

    const name = `INSPECAO_LOTE_${id}_KM_${currentKM.replace('+','-')}.pdf`;
    
    try {
        const f = await folderHandle.getFileHandle(name, { create: true });
        const w = await f.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch (e) {
        doc.save(name);
    }

    pdfCount++;
    processingCount--;
    document.getElementById('txtPdfs').textContent = pdfCount;
    if (processingCount === 0) {
        document.getElementById('stProc').textContent = "PDF: OCIOSO";
        document.getElementById('stProc').classList.remove('active');
    }
}

async function captureLoop() {
    if (!isRecording) return;

    // Desenha frame no canvas
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const dataUrl = can.toDataURL('image/jpeg', 0.6);

    // Adiciona ao buffer ativo
    activeBuffer.push({
        img: dataUrl,
        km: currentKM,
        lat: lastPos.lat.toFixed(6),
        lon: lastPos.lon.toFixed(6),
        ts: new Date().toLocaleString()
    });

    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${LIMITE_BUFFER}`;

    // LÓGICA DE INSTÂNCIA: Buffer cheio? Dispara PDF e abre novo buffer na hora.
    if (activeBuffer.length >= LIMITE_BUFFER) {
        const snapshot = [...activeBuffer];
        activeBuffer = []; // Esvazia para continuar capturando
        generatePDFInBackground(snapshot, pdfCount + 1);
    }

    setTimeout(captureLoop, 150); // ~6 fotos por segundo
}

/* ===== INICIALIZAÇÃO E GPS ===== */
document.getElementById('btnFolder').onclick = async () => {
    folderHandle = await window.showDirectoryPicker();
    await loadSNV();
};

document.getElementById('btnStart').onclick = () => {
    if (!folderHandle) return alert("Selecione a pasta primeiro!");
    isRecording = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    captureLoop();
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false;
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    if (activeBuffer.length > 0) generatePDFInBackground([...activeBuffer], pdfCount + 1);
};

async function init() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: 1280, height: 720 },
        audio: false
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
        can.width = vid.videoWidth;
        can.height = vid.videoHeight;
    };

    navigator.geolocation.watchPosition(p => {
        lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
        document.getElementById('stGps').textContent = "GPS: OK";
        document.getElementById('stGps').classList.add('active');
        updateKM(lastPos.lat, lastPos.lon);
    }, null, { enableHighAccuracy: true });
}

init();
</script>
</body>
</html>
