<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Relatório Fotográfico V2 – PDF Automático</title>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:system-ui, Arial;
  padding:12px;
}
h1{font-size:1.2rem;text-align:center}
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.row{display:flex;gap:8px;flex-wrap:wrap}
button{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:0;
  font-weight:800;
}
#btnAuto{background:#f97316;color:#111}
#btnStop{background:#dc2626;color:#fff}
#btnFolder{background:#0ea5e9;color:#052}
#btnShare{background:#22c55e;color:#052}
.stat{font-size:.9rem;margin:4px 0}
.log{max-height:200px;overflow:auto;background:#020617;padding:8px;border-radius:8px}
.log div{font-size:.8rem}
</style>
</head>

<body>

<h1>📸 Relatório Fotográfico – V2</h1>

<div class="card">
  <div class="stat" id="stFotos">Fotos: 0</div>
  <div class="stat" id="stPdf">PDFs gerados: 0</div>
  <div class="stat" id="stKm">KM: —</div>
  <div class="stat" id="stFolder">Pasta: não definida</div>
</div>

<div class="card row">
  <button id="btnFolder">📁 Pasta base</button>
  <button id="btnAuto">🎬 Captura Auto</button>
  <button id="btnStop" disabled>⏹️ Parar</button>
  <button id="btnShare">📤 Enviar PDFs</button>
</div>

<div class="card">
  <h3>Registro</h3>
  <div id="log" class="log"></div>
</div>

<script>
// ================= CONFIG =================
const FOTO_POR_PDF = 200;
const JPEG_FOTO = 0.78;
const JPEG_PDF  = 0.68;
// =========================================

// Estado
let db, folderHandle=null;
let seq=0, pdfCount=0, bufferPdf=[];
let auto=false, timer=null;

// ---------- IndexedDB ----------
const DB='inspecao_v2', VER=1;
function openDB(){
 return new Promise(res=>{
  const r=indexedDB.open(DB,VER);
  r.onupgradeneeded=e=>{
    const d=e.target.result;
    d.createObjectStore('fotos',{keyPath:'seq'});
    d.createObjectStore('meta',{keyPath:'id'});
  };
  r.onsuccess=()=>res(r.result);
 });
}

// ---------- Pasta ----------
async function pickFolder(){
 if(!window.showDirectoryPicker){alert('Use Chrome/Edge em HTTPS');return;}
 folderHandle=await showDirectoryPicker({mode:'readwrite'});
 document.getElementById('stFolder').textContent='Pasta: '+folderHandle.name;
}

// ---------- Util ----------
function log(txt){
 const d=document.createElement('div');
 d.textContent=txt;
 const l=document.getElementById('log');
 l.prepend(d);
}

// ---------- PDF ----------
async function gerarPdf(){
 const enc=new TextEncoder();
 const parts=[enc.encode('%PDF-1.4\n')];
 // IMPLEMENTAÇÃO SIMPLIFICADA POR BREVIDADE
 // (base é igual à versão anterior)
 pdfCount++;
 bufferPdf=[];
 document.getElementById('stPdf').textContent='PDFs gerados: '+pdfCount;
 log('📄 PDF '+pdfCount+' fechado automaticamente');
}

// ---------- CAPTURA SIMULADA (local final usa camera real) ----------
async function capturar(){
 seq++;
 document.getElementById('stFotos').textContent='Fotos: '+seq;
 document.getElementById('stKm').textContent='KM: '+Math.floor(seq/3);

 bufferPdf.push(seq);
 log('📸 Foto '+seq+' salva');

 if(bufferPdf.length>=FOTO_POR_PDF){
   await gerarPdf();
 }
}

// ---------- AUTO ----------
function startAuto(){
 auto=true;
 timer=setInterval(capturar,800);
 btnAuto.disabled=true;
 btnStop.disabled=false;
}
function stopAuto(){
 auto=false;
 clearInterval(timer);
 btnAuto.disabled=false;
 btnStop.disabled=true;
}

// ---------- BOOT ----------
(async()=>{
 db=await openDB();
 document.getElementById('btnFolder').onclick=pickFolder;
 document.getElementById('btnAuto').onclick=startAuto;
 document.getElementById('btnStop').onclick=stopAuto;
})();
</script>

</body>
</html>
