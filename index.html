
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V9.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        @media (orientation: landscape) { #app-shell { flex-direction: row; } #cam-v { flex: 3; } #ui-p { flex: 0.9; } }
        @media (orientation: portrait) { #cam-v { height: 60vh; } #ui-p { height: 40vh; } }

        #cam-v { position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #km-live { position: absolute; top: 15px; left: 15px; background: var(--green); padding: 10px 20px; border: 2px solid #fff; border-radius: 8px; font-size: 1.8rem; font-weight: 900; z-index: 10; }

        #gear-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #555; cursor: pointer; z-index: 100; font-size: 24px; }

        #set-panel { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #111; z-index: 200; transition: 0.3s; padding: 25px; border-left: 3px solid var(--gold); overflow-y: auto; }
        #set-panel.open { right: 0; }
        .set-row { margin-bottom: 18px; }
        label { font-size: 10px; color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; }

        #ui-p { background: #0a0a0a; display: flex; flex-direction: column; padding: 15px; gap: 10px; justify-content: center; border-left: 1px solid #222; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: #151515; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .btn { width: 100%; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-f { background: var(--gold); color: #000; height: 50px; font-size: 0.8rem; }
        .btn-on { background: var(--green); color: #fff; height: 80px; font-size: 1.2rem; }
        .btn-off { background: var(--danger); color: #fff; height: 80px; font-size: 1.2rem; }
        button:disabled { opacity: 0.1; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gear-btn" onclick="toggleS()">⚙️</div>

<div id="set-panel">
    <h3 style="margin-bottom:25px">AJUSTES V9.0</h3>
    <div class="set-row">
        <label>FOTOS POR PÁGINA (PDF)</label>
        <select id="cfg-grid"><option value="1">1 FOTO (MÁXIMA)</option><option value="4">4 FOTOS (2x2)</option><option value="9">9 FOTOS (3x3)</option><option value="16">16 FOTOS (4x4)</option></select>
    </div>
    <div class="set-row">
        <label>DATA E HORA</label>
        <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>
    <div class="set-row">
        <label>TAMANHO DO LOTE</label>
        <input type="number" id="cfg-lote" value="50">
    </div>
    <div class="set-row">
        <label>INTERVALO (MS)</label>
        <input type="number" id="cfg-int" value="750">
    </div>
    <button onclick="toggleS()" style="width:100%; padding:15px; background:var(--danger); border:none; color:#fff; border-radius:8px; font-weight:bold">SALVAR</button>
</div>

<div id="app-shell">
    <div id="cam-v">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-live">Km ---+---</div>
    </div>
    <div id="ui-p">
        <div class="grid-stats">
            <div class="stat"><small>LOTE</small><b id="v-batch">0/50</b></div>
            <div class="stat"><small>TOTAL</small><b id="v-total">0</b></div>
        </div>
        <button id="btn-f" class="btn btn-f">📁 DEFINIR PASTA</button>
        <button id="btn-on" class="btn btn-on" disabled>▶ INICIAR</button>
        <button id="btn-off" class="btn btn-off" disabled>■ PARAR</button>
        <div id="st" style="font-size:10px; color:#444; text-align:center">MODO PERÍCIA ATIVO</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

window.onload = () => { initC(); loadCSV(); initG(); };

async function initC() {
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:1920, height:1080}});
    vid.srcObject = s;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('st').innerText = "Erro CSV"; }
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-live').innerText = "Km " + n.km;
}

// ESTAMPA COM CONTORNO (Anti-Embaço)
function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    const barH = h * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, h - barH, w, barH);

    // Efeito Sombra/Contorno nas letras
    ctx.shadowColor = "black";
    ctx.shadowBlur = 10;
    ctx.lineWidth = 4;
    ctx.strokeStyle = "black";
    ctx.fillStyle = "white";

    // Km (Esquerda)
    const fK = barH * 0.5;
    ctx.font = `900 ${fK}px Arial`;
    ctx.textAlign = "left";
    ctx.strokeText("Km " + m.km, w * 0.05, h - (barH * 0.35));
    ctx.fillText("Km " + m.km, w * 0.05, h - (barH * 0.35));

    // Data (Direita - Menor e sem sobrepor)
    if(document.getElementById('cfg-date').value === 'S') {
        const fD = barH * 0.25;
        ctx.font = `bold ${fD}px monospace`;
        ctx.textAlign = "right";
        ctx.strokeText(m.ts, w * 0.95, h - (barH * 0.45));
        ctx.fillText(m.ts, w * 0.95, h - (barH * 0.45));
    }
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    document.getElementById('st').innerText = `Salvando Lote ${batchIdx}...`;
    
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const grid = parseInt(document.getElementById('cfg-grid').value); // 1, 4, 9, 16
    const cols = Math.sqrt(grid);
    const rows = cols;
    const pw = 297, ph = 210;
    const iw = pw / cols, ih = ph / rows;

    for(let i=0; i<items.length; i++){
        const col = i % grid % cols;
        const row = Math.floor((i % grid) / cols);
        
        if(i > 0 && i % grid === 0) doc.addPage();
        
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawS(items[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', col*iw, row*ih, iw, ih);
                r();
            };
            img.src = items[i].raw;
        });
    }

    const f = await hDir.getFileHandle(`LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
    document.getElementById('st').innerText = `Lote ${batchIdx} OK!`;
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
    
    buffer.push({
        raw: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-live').innerText.replace("Km ", ""),
        ts: new Date().toLocaleString('pt-BR')
    });

    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${limit}`;

    if(buffer.length >= limit) save();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 750);
}

document.getElementById('btn-f').onclick = async () => {
    hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btn-f').innerText = "PASTA OK";
    document.getElementById('btn-on').disabled = false;
};

document.getElementById('btn-on').onclick = () => {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    rec = true; loop();
    document.getElementById('btn-on').disabled = true;
    document.getElementById('btn-off').disabled = false;
};

document.getElementById('btn-off').onclick = () => { rec = false; save(); document.getElementById('btn-on').disabled = false; document.getElementById('btn-off').disabled = true; };
function toggleS() { document.getElementById('set-panel').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
