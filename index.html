<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V8.0 - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }

        @media (orientation: landscape) {
            #app-shell { flex-direction: row; }
            #cam-view { flex: 3; }
            #ui-panel { flex: 0.9; border-left: 2px solid #222; }
        }

        @media (orientation: portrait) {
            #cam-view { height: 60vh; }
            #ui-panel { height: 40vh; border-top: 2px solid #222; }
        }

        /* Área da Câmera */
        #cam-view { position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #km-live { position: absolute; top: 15px; left: 15px; background: var(--green); padding: 10px 20px; border: 2px solid #fff; border-radius: 8px; font-size: 1.8rem; font-weight: 900; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* Botão Engrenagem */
        #gear-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #555; cursor: pointer; z-index: 100; font-size: 20px; }

        /* Menu de Ajustes */
        #settings-flyout { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #111; z-index: 200; transition: 0.3s; padding: 25px; border-left: 3px solid var(--gold); overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        #settings-flyout.open { right: 0; }
        .set-row { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #222; }
        .set-row label { font-size: 10px; color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 13px; }

        /* Interface de Comandos */
        #ui-panel { background: var(--bg); display: flex; flex-direction: column; padding: 15px; gap: 10px; justify-content: center; z-index: 10; }
        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px; }
        .counter-item { background: #111; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .counter-item small { font-size: 9px; letter-spacing: 1px; font-weight: bold; }
        .counter-item b { font-size: 1.4rem; display: block; color: var(--gold); }

        .btn { width: 100%; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-f { background: #333; color: #fff; height: 45px; font-size: 0.75rem; border: 1px solid #444; }
        .btn-on { background: var(--green); color: #fff; height: 80px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(5, 107, 60, 0.3); }
        .btn-off { background: var(--danger); color: #fff; height: 80px; font-size: 1.1rem; }
        button:disabled { opacity: 0.15; cursor: not-allowed; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gear-btn" onclick="toggleSet()">⚙️</div>

<div id="settings-flyout">
    <h4 style="margin-bottom:20px; font-size:14px; border-bottom: 1px solid var(--gold); padding-bottom: 10px;">AJUSTES TÉCNICOS</h4>
    
    <div class="set-row">
        <label>Data/Hora no PDF</label>
        <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>

    <div class="set-row">
        <label>Coordenadas GPS</label>
        <select id="cfg-gps"><option value="N">NÃO</option><option value="S">SIM</option></select>
    </div>

    <div class="set-row">
        <label>Fotos por Lote</label>
        <input type="number" id="cfg-batch-size" value="50">
    </div>

    <div class="set-row">
        <label>Intervalo Captura (ms)</label>
        <input type="number" id="cfg-interval" value="750">
    </div>

    <button onclick="toggleSet()" style="width:100%; padding:15px; background:var(--green); color:#fff; border:none; border-radius:5px; font-weight:bold; cursor:pointer">SALVAR CONFIGURAÇÕES</button>
</div>

<div id="app-shell">
    <div id="cam-view">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-live">Km ---+---</div>
    </div>

    <div id="ui-panel">
        <div class="counter-grid">
            <div class="counter-item"><small style="color:#666">LOTE ATUAL</small><b id="v-batch">0/50</b></div>
            <div class="counter-item"><small style="color:#666">TOTAL GERAL</small><b id="v-total">0</b></div>
        </div>

        <button id="btn-dir" class="btn btn-f" onclick="pickFolder()">📁 1º DEFINIR PASTA DESTINO</button>
        <button id="btn-start" class="btn btn-on" disabled onclick="startApp()">▶ INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn btn-off" style="display:none;" onclick="stopApp()">■ FINALIZAR LOTE</button>
        
        <div id="status" style="font-size:10px; color:#444; text-align:center; margin-top:5px;">SISTEMA V8.0 | GPS AGUARDANDO</div>
    </div>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB = [], gps = null, active = false, buffer = [], total = 0, batchCount = 0, hFolder = null;
const vid = document.getElementById('vid'), proc = document.getElementById('proc'), ctx = proc.getContext('2d');

window.onload = () => { initCam(); loadCSV(); initGPS(); };

async function initCam() {
    try {
        const s = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} }
        });
        vid.srcObject = s;
        vid.onloadedmetadata = () => { 
            proc.width = vid.videoWidth; 
            proc.height = vid.videoHeight; 
            vid.play(); 
        };
    } catch(e) { document.getElementById('status').innerText = "Erro ao acessar câmera."; }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = head.indexOf('km'), ilt = head.findIndex(x => x.includes('lat')), iln = head.findIndex(x => x.includes('lon'));
        
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
        document.getElementById('status').innerText = "CSV CARREGADO ✓";
    } catch(e) { document.getElementById('status').innerText = "ERRO: CSV NÃO ENCONTRADO"; }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        if(kmDB.length) {
            let near = null, dMin = Infinity;
            for(const pt of kmDB) {
                const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
                if(d < dMin) { dMin = d; near = pt; }
            }
            if(near) document.getElementById('km-live').innerText = "Km " + near.km;
        }
    }, null, {enableHighAccuracy: true});
}

async function pickFolder() {
    try {
        hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-dir').innerText = "PASTA SELECIONADA ✓";
        document.getElementById('btn-dir').style.color = "var(--green)";
        document.getElementById('btn-start').disabled = false;
    } catch(e) { console.log("Pasta não selecionada."); }
}

function startApp() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    active = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('btn-stop').disabled = false;
    document.getElementById('status').innerText = "INSPEÇÃO EM CURSO...";
    loop();
}

function stopApp() {
    active = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    saveBatch();
}

function drawStamp(meta) {
    const w = proc.width, h = proc.height;
    const barH = h * 0.14;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, h - barH, w, barH);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.font = `bold ${barH * 0.45}px Arial`;
    ctx.fillText("Km " + meta.km, w * 0.05, h - (barH * 0.45));

    ctx.font = `${barH * 0.18}px monospace`;
    ctx.textAlign = "right";
    let info = "";
    if(document.getElementById('cfg-date').value === 'S') info += meta.ts + " ";
    if(document.getElementById('cfg-gps').value === 'S') info += `[${meta.lat}, ${meta.lon}]`;
    ctx.fillText(info, w * 0.95, h - (barH * 0.45));
}

function loop() {
    if(!active) return;
    const bLimit = parseInt(document.getElementById('cfg-batch-size').value) || 50;
    
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    
    buffer.push({
        raw: proc.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-live').innerText.replace("Km ", ""),
        ts: new Date().toLocaleString('pt-BR').toUpperCase(),
        lat: gps ? gps.lat.toFixed(6) : "0",
        lon: gps ? gps.lon.toFixed(6) : "0"
    });

    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${bLimit}`;

    if(buffer.length >= bLimit) saveBatch();
    
    setTimeout(loop, parseInt(document.getElementById('cfg-interval').value) || 750);
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; 
    buffer = []; 
    batchCount++;
    
    document.getElementById('status').innerText = `GERANDO PDF LOTE ${batchCount}...`;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawStamp(items[i]);
                doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }

    const fName = `RELATORIO_LOTE_${batchCount}_KM_${items.km.replace('+','-')}.pdf`;
    const handle = await hFolder.getFileHandle(fName, {create:true});
    const writable = await handle.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
    
    document.getElementById('status').innerText = `LOTE ${batchCount} SALVO COM SUCESSO!`;
}

function toggleSet() { document.getElementById('settings-flyout').classList.toggle('open'); }
</script>
</body>
</html>
