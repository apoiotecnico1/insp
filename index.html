<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fibra RA - Direcionador</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Seta Indicadora */
        #arrow-container {
            position: absolute; top: 20px; right: 20px; z-index: 2000;
            text-align: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%;
        }
        #arrow { font-size: 50px; color: #00FF00; display: inline-block; transition: transform 0.2s; }

        .ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 15px; width: 85%; text-align: center;
        }

        #distancia { font-size: 18px; font-weight: bold; color: #2ecc71; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="arrow-container">
        <div id="arrow">➔</div>
        <div style="color: white; font-size: 10px;">FIBRA</div>
    </div>

    <div class="ui-panel">
        <input type="file" id="fileInput" accept=".kmz">
        <div id="status">Selecione o KMZ</div>
        <div id="distancia">-- m</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const fileInput = document.getElementById('fileInput');
        const arrow = document.getElementById('arrow');
        const distText = document.getElementById('distancia');
        const scene = document.querySelector('a-scene');
        
        let fibraCoords = [];
        let userPos = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            const reader = new FileReader();
            reader.onload = function(event) {
                JSZip.loadAsync(event.target.result).then(zip => {
                    const kmlFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.kml'));
                    return zip.file(kmlFile).async("string");
                }).then(kmlText => {
                    const kmlDom = new DOMParser().parseFromString(kmlText, "text/xml");
                    const geojson = toGeoJSON.kml(kmlDom);
                    processarKMZ(geojson);
                });
            };
            reader.readAsArrayBuffer(file);
        });

        function processarKMZ(data) {
            fibraCoords = [];
            document.querySelectorAll('.fibra-item').forEach(el => el.remove());

            data.features.forEach(feature => {
                const nome = feature.properties.name || "Fibra";
                if (feature.geometry.type === "LineString") {
                    const coords = feature.geometry.coordinates;
                    // Pega pontos estratégicos (Início, meio, fim e caixas)
                    for (let i = 0; i < coords.length; i += 30) { 
                        const p = coords[i];
                        fibraCoords.push({lat: p, lng: p, name: nome});
                        criarEntidadeRA(p, p, nome);
                    }
                }
            });
            document.getElementById('status').innerText = "Sistema Ativo!";
        }

        function criarEntidadeRA(lat, lng, nome) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('class', 'fibra-item');
            entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
            
            // Baliza Visual
            entity.setAttribute('geometry', 'primitive: cylinder; radius: 0.5; height: 60');
            entity.setAttribute('material', 'color: #00FF00; opacity: 0.4');

            // Texto Flutuante (Nome da Caixa/Fibra)
            const text = document.createElement('a-text');
            text.setAttribute('value', nome);
            text.setAttribute('scale', '20 20 20');
            text.setAttribute('look-at', '[gps-camera]');
            text.setAttribute('align', 'center');
            text.setAttribute('position', '0 10 0');
            
            entity.appendChild(text);
            scene.appendChild(entity);
        }

        // Lógica da Seta e Distância
        window.addEventListener('gps-camera-update-position', (e) => {
            userPos = e.detail.position;
            atualizarGuia();
        });

        function atualizarGuia() {
            if (!userPos || fibraCoords.length === 0) return;

            // Acha o ponto mais próximo
            let maisProximo = fibraCoords;
            let menorDist = calcularDistancia(userPos.latitude, userPos.longitude, maisProximo.lat, maisProximo.lng);

            fibraCoords.forEach(p => {
                let d = calcularDistancia(userPos.latitude, userPos.longitude, p.lat, p.lng);
                if (d < menorDist) { menorDist = d; maisProximo = p; }
            });

            distText.innerText = Math.round(menorDist) + " m";

            // Calcula o ângulo para a seta (Bearing)
            const angle = calcularBearing(userPos.latitude, userPos.longitude, maisProximo.lat, maisProximo.lng);
            
            // Ajusta a seta conforme a bússola do celular
            window.addEventListener('deviceorientation', (event) => {
                const heading = event.webkitCompassHeading || event.alpha;
                const arrowRotation = angle - heading;
                arrow.style.transform = `rotate(${arrowRotation}deg)`;
            }, {once: true});
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calcularBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
                      Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
            return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
