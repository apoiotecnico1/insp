<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Relatório Fotográfico Profissional - Rodovias</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#0b1224; --surface:#0f1731cc; --surface-strong:#1b368f;
    --fg:#e8eeff; --muted:#a9b7df; --border:#1e284d; --glow:#43ff9b; --radius: 14px;
    --camH: 45vh; --btnGradA:#0d1430; --btnGradB:#0a0f26;
  }
  body{ margin:0; color:var(--fg); background: var(--bg); font-family: system-ui, sans-serif; padding:10px; line-height:1.4; }
  .card{ background: linear-gradient(180deg, var(--surface), rgba(15,23,49,0.8)); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding:12px; margin-bottom:12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
  
  #kmPlaque{ text-align:center; padding:10px; background: linear-gradient(180deg, #0d3b8e, #0a2e6d); border:2px solid #fff; border-radius:12px; margin:0 auto 12px; font-weight:900; font-size:1.6rem; color:#fff; box-shadow:0 6px 16px rgba(0,0,0,0.3); }

  #camCard{ position: relative; width: 100%; height: var(--camH); border-radius: var(--radius); overflow: hidden; background: #000; border: 1px solid var(--border); }
  #vid{ width:100%; height:100%; object-fit: cover; }
  
  .st{ display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:99px; font-size:.75rem; font-weight:800; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); margin:2px; }
  .ok{ color: #43ff9b; border-color: #43ff9b33; }
  .warn{ color: #eab308; }

  .row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  button{ flex:1; min-width:140px; padding:14px; border-radius:12px; border:1px solid var(--border); background: linear-gradient(180deg, var(--btnGradA), var(--btnGradB)); color:#fff; font-weight:900; cursor:pointer; transition: transform 0.1s; }
  button:active{ transform: scale(0.96); }
  #btnAuto{ background: linear-gradient(180deg, #ff7b45, #e5612e); color:#000; }
  #btnPdf{ background: linear-gradient(180deg, #857b5d, #eab308); color:#000; }
  
  .gallery{ display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:8px; }
  .thumb{ border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#000; position: relative; }
  .thumb img{ width:100%; display:block; }
  .thumb .meta{ position:absolute; bottom:0; background:rgba(0,0,0,0.7); font-size:9px; width:100%; padding:2px; }

  #splash{ position:fixed; inset:0; z-index:9999; background:#060a12; display:flex; align-items:center; justify-content:center; flex-direction:column; transition: opacity 0.6s ease; }
  .matrix-text{ color:#43ff9b; font-family:monospace; font-weight:bold; font-size:1.2rem; text-shadow:0 0 8px #43ff9b; }
</style>
</head>
<body>

<div id="splash">
    <div class="matrix-text">INICIALIZANDO SISTEMA...</div>
    <button id="btnStart" style="margin-top:20px; min-width:200px">INICIAR INSPEÇÃO</button>
</div>

<div id="kmPlaque"><span id="kmTop">KM --+---</span></div>

<div id="statusBar">
    <span id="stGps" class="st">GPS: OFF</span>
    <span id="stCsv" class="st">CSV: OFF</span>
    <span id="stCam" class="st">CAM: OFF</span>
    <span id="stFotos" class="st">FOTOS: 0</span>
</div>

<div id="camCard" onclick="capture()">
    <video id="vid" autoplay playsinline muted></video>
</div>

<div class="card">
    <div class="row">
        <button id="btnAuto">MODO AUTO (2s)</button>
        <button id="btnPdf">GERAR RELATÓRIO PDF</button>
    </div>
    <div class="row">
        <button id="btnClear" style="background:#ef4444">LIMPAR SESSÃO</button>
    </div>
</div>

<div class="card">
    <h3 style="margin:0 0 10px; font-size:1rem">Galeria de Lote (Máx 200+)</h3>
    <div id="gal" class="gallery"></div>
</div>

<canvas id="mainCanvas" style="display:none"></canvas>

<script>
let kmBase = [], noxBase = [], photos = [], gps = null;
let isAuto = false, autoTimer = null;
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// Lógica Haversine para precisão máxima (Evita erro do KM 231)
function getDist(la1, lo1, la2, lo2) {
    const R = 6371000;
    const dLat = (la2 - la1) * Math.PI / 180;
    const dLon = (lo2 - lo1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function parseFloatBR(v) {
    if(!v) return NaN;
    let s = String(v).replace(/[^\d.,-]/g, '');
    if(s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
    else if(s.includes(',')) s = s.replace(',', '.');
    return parseFloat(s);
}

// Carregamento de CSVs (SNV e Dados Nox)
async function loadFiles() {
    try {
        const [rKm, rNox] = await Promise.all([
            fetch('SNVBR116SPRJ.csv').then(r => r.text()),
            fetch('Dados_Completos_Grupo_2_all.csv').then(r => r.text())
        ]);
        
        kmBase = rKm.split('\n').slice(1).filter(l => l.trim()).map(line => {
            const c = line.split(';');
            return { km: c, lat: parseFloatBR(c || c), lon: parseFloatBR(c || c) };
        }).filter(p => !isNaN(p.lat));

        noxBase = rNox.split('\n').slice(1).filter(l => l.trim()).map(line => {
            const c = line.split(';');
            return { id: c, lat: parseFloatBR(c), lon: parseFloatBR(c) };
        }).filter(p => !isNaN(p.lat));

        document.getElementById('stCsv').textContent = "CSV: OK";
        document.getElementById('stCsv').classList.add('ok');
    } catch (e) { console.error("Erro nos arquivos:", e); }
}

// GPS e Câmera
async function init() {
    await loadFiles();
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1920 }, audio: false });
    document.getElementById('vid').srcObject = stream;
    document.getElementById('stCam').textContent = "CAM: OK";
    document.getElementById('stCam').classList.add('ok');

    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy };
        document.getElementById('stGps').textContent = `GPS: ±${Math.round(gps.acc)}m`;
        document.getElementById('stGps').classList.add('ok');
        updateKMLive();
    }, null, { enableHighAccuracy: true });
}

function updateKMLive() {
    if(!gps || !kmBase.length) return;
    let closest = null, dMin = Infinity;
    kmBase.forEach(p => {
        const d = getDist(gps.lat, gps.lon, p.lat, p.lon);
        if(d < dMin) { dMin = d; closest = p; }
    });
    if(closest) document.getElementById('kmTop').textContent = "KM " + closest.km;
}

// Captura e Marca d'água Profissional
async function capture() {
    if(!gps) return;
    const vid = document.getElementById('vid');
    canvas.width = vid.videoWidth;
    canvas.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);

    // Tarja de Auditoria
    const h = canvas.height;
    const w = canvas.width;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h - 140, w, 140);
    
    // Dados do KM e ID
    let closestNox = null, dNoxMin = Infinity;
    noxBase.forEach(p => {
        const d = getDist(gps.lat, gps.lon, p.lat, p.lon);
        if(d < dNoxMin) { dNoxMin = d; closestNox = p; }
    });

    ctx.fillStyle = "#fff";
    ctx.font = "bold 45px sans-serif";
    const kmText = document.getElementById('kmTop').textContent;
    ctx.fillText(kmText, 30, h - 85);
    
    ctx.font = "30px sans-serif";
    ctx.fillText(`ID: ${closestNox ? closestNox.id : 'N/A'}`, 30, h - 35);
    ctx.fillText(`${gps.lat.toFixed(6)}, ${gps.lon.toFixed(6)}`, w - 400, h - 35);
    ctx.fillText(new Date().toLocaleString(), w - 400, h - 85);

    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
    const photoRec = { url: dataUrl, km: kmText, id: closestNox?closestNox.id:'N/A', ts: new Date().toLocaleString() };
    photos.push(photoRec);

    // Galeria rápida
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="${dataUrl}"><div class="meta">${kmText}</div>`;
    document.getElementById('gal').prepend(div);
    document.getElementById('stFotos').textContent = "FOTOS: " + photos.length;
}

// Botões
document.getElementById('btnAuto').onclick = function() {
    isAuto = !isAuto;
    this.textContent = isAuto ? "PARAR AUTO" : "MODO AUTO (2s)";
    this.style.background = isAuto ? "#ef4444" : "";
    if(isAuto) autoTimer = setInterval(capture, 2000);
    else clearInterval(autoTimer);
};

document.getElementById('btnClear').onclick = () => {
    if(confirm("Limpar sessão?")) {
        photos = [];
        document.getElementById('gal').innerHTML = "";
        document.getElementById('stFotos').textContent = "FOTOS: 0";
    }
};

// Gerador de PDF Robusto (Processa lotes de 200+)
document.getElementById('btnPdf').onclick = async function() {
    if(!photos.length) return alert("Tire fotos primeiro");
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(18);
    doc.text("Relatório Técnico de Inspeção Rodoviária", 15, 20);
    doc.setFontSize(10);
    doc.text(`Total de registros: ${photos.length} | Gerado em: ${new Date().toLocaleString()}`, 15, 28);

    let y = 35;
    for(let i=0; i < photos.length; i++) {
        if(y > 240) { doc.addPage(); y = 20; }
        
        const p = photos[i];
        // Adiciona imagem comprimida para não estourar o PDF
        doc.addImage(p.url, 'JPEG', 15, y, 60, 35);
        doc.setFontSize(9);
        doc.text(`Foto #${i+1}`, 80, y + 5);
        doc.text(`Referência: ${p.km}`, 80, y + 12);
        doc.text(`Equipamento ID: ${p.id}`, 80, y + 19);
        doc.text(`Data/Hora: ${p.ts}`, 80, y + 26);
        y += 45;
    }
    
    doc.save(`INSPECAO_${Date.now()}.pdf`);
};

// Início
document.getElementById('btnStart').onclick = () => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('splash').remove();
        init();
    }, 600);
};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
