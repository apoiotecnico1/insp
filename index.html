<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Sistema de Apoio - Captura Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --accent:#ffcc00;
    --placa-verde:rgba(0,121,52,.6);
    --danger:#ff4444;
    --glass:rgba(10,10,10,.9);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh}

#km-hud{
    position:absolute;
    top:20px;left:20px;
    background:var(--placa-verde);
    padding:10px 20px;
    border-radius:8px;
    border:3px solid rgba(255,255,255,.7);
    text-align:center;
}
#br-txt{
    font-size:.85rem;
    font-weight:800;
    display:block;
    width:100%;
    padding-bottom:2px;
    margin-bottom:2px;
    border-bottom:1px solid rgba(255,255,255,.3);
}
#km-txt{font-size:2.2rem;font-weight:900}
canvas{display:none}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>

<div id="km-hud">
    <span id="br-txt"> </span>
    <h1 id="km-txt">Km ---</h1>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null;
let kmInicialLote = "", brAtual = " ", buffer = [];
let curLat="0.0000", curLon="0.0000";

const vid=document.getElementById('vid');
const can=document.getElementById('c');
const ctx=can.getContext('2d');

navigator.mediaDevices.getUserMedia({video:{width:1920,height:1080}})
.then(s=>vid.srcObject=s);

function takePhoto(){
    const km=document.getElementById('km-txt').innerText.replace("Km ","");
    ctx.drawImage(vid,0,0,can.width,can.height);
    const bh=can.height*.1;
    ctx.fillStyle="rgba(0,0,0,.6)";
    ctx.fillRect(0,can.height-bh,can.width,bh);
    ctx.fillStyle="#fff";
    ctx.font=`bold ${bh*.35}px Arial`;
    ctx.fillText(`Km ${km}`,20,can.height-bh*.55);
    ctx.font=`${bh*.22}px Arial`;
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`,20,can.height-bh*.25);
}

function initGPS(){
navigator.geolocation.watchPosition(p=>{
    curLat=p.coords.latitude.toFixed(6);
    curLon=p.coords.longitude.toFixed(6);
    if(!kmDB.length)return;
    let best=null,min=Infinity;
    for(const pt of kmDB){
        const d=Math.hypot(pt.lt-p.coords.latitude,pt.ln-p.coords.longitude);
        if(d<min){min=d;best=pt;}
    }
    if(best){
        brAtual=" "; // ✅ FORÇADO EM BRANCO
        document.getElementById('br-txt').innerText=" ";
        document.getElementById('km-txt').innerText="Km "+best.km;
    }
});
}

async function loadCSV(){
    const r=await fetch('SNVBR116SPRJ.csv');
    const t=await r.text();
    const rows=t.split('\n').filter(l=>l.includes(';'));
    const h=rows.shift().split(';');
    kmDB=rows.map(r=>{
        const c=r.split(';');
        return{km:c[0],lt:parseFloat(c[1]),ln:parseFloat(c[2])};
    }).filter(d=>!isNaN(d.lt));
}

loadCSV();
initGPS();
</script>

</body>
</html>
