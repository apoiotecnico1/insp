<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>INSPEÇÃO OMNI V6.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --danger: #ff003c; 
            --bg: #000;
            --glass: rgba(0, 0, 0, 0.75);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: #fff; }

        /* SPLASH & SAFETY */
        .overlay-full { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .vortex { width: 60px; height: 60px; border: 4px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #safety-gate { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; flex-direction: column; padding: 30px; text-align: center; }
        .card { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; opacity: 0; transition: 1s; }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* HUD SUPERIOR */
        .hud-top { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; display: flex; justify-content: space-between; pointer-events: none; }
        .badge { background: var(--glass); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .km-badge { background: #0a8a4d; border: 3px solid #fff; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .km-badge h1 { font-family: monospace; font-size: 2rem; margin: 0; line-height: 1; }
        
        .status-badge { text-align: right; color: var(--accent); font-weight: bold; font-size: 0.9rem; }

        /* GRAVANDO */
        #rec-indicator { position: absolute; top: 110px; right: 20px; display: none; align-items: center; gap: 8px; color: #ff3333; font-weight: 800; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; z-index: 10; }
        .dot { width: 10px; height: 10px; background: #ff3333; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* CONTROLES */
        .controls { position: absolute; bottom: 40px; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; gap: 20px; align-items: center; transition: 0.4s; }
        .ui-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
        
        .btn { border: none; border-radius: 50%; width: 70px; height: 70px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #btn-main { width: 90px; height: 90px; background: var(--accent); color: #000; font-weight: bold; border-radius: 25px; }
        #btn-main.stop { background: var(--danger); color: #fff; }
        .btn-side { background: var(--glass); color: #fff; border: 1px solid #444; }

        /* PAINEL LATERAL */
        #settings { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: #000; z-index: 1000; padding: 40px 20px; transition: 0.3s; border-left: 1px solid #333; }
        #settings.open { right: 0; }
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; margin: 10px 0 20px; border-radius: 8px; }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="showUI()">

<div id="splash" class="overlay-full"><div class="vortex"></div></div>

<div id="safety-gate" class="overlay-full">
    <div class="card">
        <h2 style="color:var(--accent); margin-bottom:15px">SEGURANÇA</h2>
        <ul style="text-align:left; margin-bottom:25px; font-size:0.9rem; line-height:1.6">
            <li>• Dispositivo fixo no suporte</li>
            <li>• Veículo em operação segura</li>
            <li>• Não manuseie ao dirigir</li>
        </ul>
        <button onclick="initApp()" style="width:100%; padding:15px; border-radius:12px; background:var(--accent); border:none; font-weight:bold; cursor:pointer">ACEITAR E CONFIGURAR PASTA</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div class="hud-top">
        <div class="badge km-badge"><h1 id="km-txt">KM ---</h1></div>
        <div class="badge status-badge">
            <div id="id-txt">BUSCANDO GPS...</div>
            <div id="counter" style="font-size: 0.7rem; color: #888; margin-top: 5px">LOTE: 0 / 0</div>
        </div>
    </div>

    <div id="rec-indicator"><div class="dot"></div> GRAVANDO</div>

    <div class="controls" id="ui-box">
        <button class="btn btn-side" onclick="toggleSettings()">⚙</button>
        <button id="btn-main" class="btn" onclick="toggleInspeção()">INICIAR</button>
        <button class="btn btn-side" onclick="location.reload()">🔄</button>
    </div>
</div>

<div id="settings">
    <h3 style="margin-bottom:20px">CONFIGURAÇÕES</h3>
    <label>Câmera</label>
    <select id="cam-select" onchange="startCamera(this.value)"></select>
    <label>Intervalo de Captura (ms)</label>
    <input type="number" id="cfg-int" value="500">
    <label>Fotos por PDF</label>
    <input type="number" id="cfg-lote" value="50">
    <button onclick="toggleSettings()" style="width:100%; padding:10px; background:#222; color:#fff; border:none; border-radius:5px; cursor:pointer">FECHAR</button>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], idDB=[], buffer=[], hDir=null, stream=null, isRec=false, uiTimer, lastPos=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => { document.getElementById('splash').remove(); document.getElementById('safety-gate').style.display = 'flex'; }, 500);
    }, 1500);
    loadCSV();
};

async function initApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.opacity = '1';
        setupGPS();
        listCams();
    } catch(e) { alert("Acesso à pasta local é necessário para salvar os arquivos."); }
}

async function loadCSV() {
    const fetchCSV = async (url) => {
        try {
            const r = await fetch(url + '?v=' + Date.now());
            const t = await r.text();
            return t.split('\n').filter(l => l.includes(';')).map(row => {
                const c = row.split(';');
                return { val: c, lt: parseFloat(c?.replace(',','.')), ln: parseFloat(c?.replace(',','.')) };
            }).filter(d => !isNaN(d.lt));
        } catch { return []; }
    };
    kmDB = await fetchCSV('SNVBR116SPRJ.csv');
    idDB = await fetchCSV('dados.csv');
}

function setupGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude };
        const findClosest = (db) => {
            let closest = null, minDist = Infinity;
            db.forEach(pt => {
                const d = Math.hypot(pt.lt - lastPos.lt, pt.ln - lastPos.ln);
                if(d < minDist) { minDist = d; closest = pt; }
            });
            return closest;
        };
        const k = findClosest(kmDB);
        const i = findClosest(idDB);
        if(k) document.getElementById('km-txt').innerText = "KM " + k.val;
        if(i) document.getElementById('id-txt').innerText = i.val;
    }, null, { enableHighAccuracy: true });
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoInputs = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    videoInputs.forEach(d => sel.add(new Option(d.label || 'Câmera', d.deviceId)));
    startCamera(videoInputs[videoInputs.length-1]?.deviceId);
}

async function startCamera(id) {
    if(stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleInspeção() {
    isRec = !isRec;
    const btn = document.getElementById('btn-main');
    document.getElementById('rec-indicator').style.display = isRec ? 'flex' : 'none';
    
    if(isRec) {
        btn.innerText = "PARAR";
        btn.classList.add('stop');
        loop();
    } else {
        btn.innerText = "INICIAR";
        btn.classList.remove('stop');
        savePDF();
    }
}

async function loop() {
    if(!isRec) return;
    
    // Captura rápida
    ctx.drawImage(vid, 0, 0);
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.6),
        km: document.getElementById('km-txt').innerText,
        id: document.getElementById('id-txt').innerText,
        ts: new Date().toLocaleTimeString(),
        pos: lastPos ? `${lastPos.lt.toFixed(6)}, ${lastPos.ln.toFixed(6)}` : 'S/ GPS'
    });

    const max = parseInt(document.getElementById('cfg-lote').value);
    document.getElementById('counter').innerText = `LOTE: ${buffer.length} / ${max}`;

    if(buffer.length >= max) await savePDF();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF() {
    if(!buffer.length) return;
    const data = [...buffer];
    buffer = [];
    
    const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
    const w = pdf.internal.pageSize.getWidth();
    const h = pdf.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++) {
        if(i > 0) pdf.addPage();
        
        // Estampar dados na imagem antes de colocar no PDF
        const img = new Image();
        img.src = data[i].img;
        await new Promise(r => img.onload = r);
        
        ctx.drawImage(img, 0, 0);
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, can.height - 80, can.width, 80);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 30px Arial";
        ctx.fillText(`${data[i].km} | ${data[i].id} | ${data[i].ts}`, 30, can.height - 45);
        ctx.font = "18px Arial";
        ctx.fillText(data[i].pos, 30, can.height - 20);

        pdf.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, w, h);
    }

    const name = `INSP_${Date.now()}.pdf`;
    try {
        const file = await hDir.getFileHandle(name, { create: true });
        const stream = await file.createWritable();
        await stream.write(pdf.output('blob'));
        await stream.close();
    } catch { pdf.save(name); }
}

function showUI() {
    document.getElementById('ui-box').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { if(isRec) document.getElementById('ui-box').classList.add('ui-hidden'); }, 3000);
}

function toggleSettings() { document.getElementById('settings').classList.toggle('open'); }
</script>
</body>
</html>
