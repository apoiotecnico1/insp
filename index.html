<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - HYPNOS EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; --glass: rgba(10, 10, 10, 0.96); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* SAFETY GATE */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 6000; display: flex; align-items: center; justify-content: center; padding: 20px; transition: 1s; }
        .alert-box { border: 1px solid #333; padding: 30px; border-radius: 12px; max-width: 500px; background: #080808; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 6px; cursor: pointer; width: 100%; text-transform: uppercase; }

        /* SPLASH HYPNOS - ILUSÃO E FOCO */
        #splash-hypnos { 
            position: fixed; inset: 0; background: #000; z-index: 5500; 
            display: none; align-items: center; justify-content: center; overflow: hidden;
        }
        .hypno-circle {
            position: absolute; border: 2px solid var(--accent); border-radius: 50%;
            animation: expand 3s infinite ease-in-out; opacity: 0;
        }
        .vortex {
            width: 200px; height: 200px; border: 4px solid #fff; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: rotate-vortex 4s linear infinite, morph 6s ease-in-out infinite alternate;
            box-shadow: 0 0 50px var(--accent);
        }
        @keyframes expand { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 150vw; height: 150vw; opacity: 0; } }
        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }
        @keyframes morph { 0% { border-radius: 40% 60% 70% 30%; } 100% { border-radius: 70% 30% 30% 70%; } }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #km-hud { position: absolute; top: 25px; left: 25px; background: var(--placa-verde); padding: 8px 18px; border: 2px solid #fff; border-radius: 5px; z-index: 10; }
        #km-hud h1 { font-size: 1.7rem; font-weight: 800; color: #fff; }
        #rec-tag { position: absolute; top: 25px; right: 25px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; transition: 0.6s; }
        .ui-hidden { opacity: 0; bottom: 15px; pointer-events: none; }
        .btn-ui { border: none; padding: 18px 40px; font-weight: 800; border-radius: 4px; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; }
        
        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 2000; padding: 60px 25px; transition: 0.5s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:20px; text-align:center;">PROTOCOLO DE SEGURANÇA</h2>
        <p style="font-size:14px; margin-bottom:20px; line-height:1.6; color:#bbb;">Atenção: A inspeção automatizada exige foco total na via. Configure o trajeto estacionado. Não manuseie o dispositivo em movimento.</p>
        <button class="btn-aware" onclick="startHypnosis()">Estou Ciente e de Acordo</button>
    </div>
</div>

<div id="splash-hypnos">
    <div class="hypno-circle" style="animation-delay: 0s"></div>
    <div class="hypno-circle" style="animation-delay: 1s"></div>
    <div class="hypno-circle" style="animation-delay: 2s"></div>
    <div class="vortex"></div>
    <h1 style="position:absolute; bottom:20%; letter-spacing:10px; font-weight:200; opacity:0.6;">FOCO TOTAL</h1>
</div>

<div id="settings-panel">
    <div style="text-align:right; margin-bottom:20px; cursor:pointer;" onclick="toggleSet()">FECHAR ×</div>
    <div style="margin-bottom:20px;"><label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div style="margin-bottom:20px;"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200" style="width:100%; background:#1a1a1a; color:#fff; border:1px solid #333; padding:10px;"></div>
    <div><label>Lote (Fotos)</label><input type="number" id="cfg-lote" value="50" style="width:100%; background:#1a1a1a; color:#fff; border:1px solid #333; padding:10px;"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><span>CAPTURA ATIVA</span><div class="dot"></div></div>
    <div id="ui-controls">
        <button class="btn-ui" style="background:#333; color:#fff;" onclick="toggleSet()">⚙</button>
        <button id="btn-start" class="btn-ui" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar Relatório</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function startHypnosis() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        const splash = document.getElementById('splash-hypnos');
        splash.style.display = 'flex';
        
        // Efeito Sonoro/Visual de Foco (3 segundos)
        setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.remove();
                document.getElementById('app-shell').style.visibility = 'visible';
                document.getElementById('app-shell').style.opacity = '1';
                listCams();
            }, 1000);
        }, 3500);
    } catch(e) { alert("Pasta de destino necessária."); }
}

function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = `Lente ${i + 1}`;
        sel.appendChild(opt);
    });
    initC(videoDevices.deviceId);
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

async function initCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    loop();
}

function stopCapture() {
    rec = false;
    savePDF();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.4), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            ts: new Date().toLocaleTimeString() 
        });
        if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) savePDF();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF() {
    if(!buffer.length) return;
    const items = [...buffer];
    buffer = [];

    // LÓGICA DE NOMENCLATURA INTELIGENTE
    const kmInicio = items.km.replace('+', '_');
    const kmFim = items[items.length - 1].km.replace('+', '_');
    const timestamp = new Date().getTime().toString().slice(-4);
    const fileName = `LOTE_Km_${kmInicio}_ate_${kmFim}_ID${timestamp}.pdf`;

    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++) {
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                // Overlay de dados na imagem do PDF
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, can.height - 120, can.width, 120);
                ctx.fillStyle = "#ffcc00";
                ctx.font = "bold 60px Arial";
                ctx.fillText("KM " + items[i].km, 50, can.height - 45);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = items[i].raw;
        });
    }

    try {
        const f = await hDir.getFileHandle(fileName, {create:true});
        const s = await f.createWritable();
        await s.write(doc.output('blob'));
        await s.close();
        console.log("Salvo: " + fileName);
    } catch(e) { console.error("Erro ao salvar"); }
}

// SIMULAÇÃO DE GPS (SUBSTITUIR PELA SUA LÓGICA DE CARREGAMENTO CSV)
function initG() {
    navigator.geolocation.watchPosition(p => {
        // Aqui entraria sua busca no kmDB. Exemplo visual:
        // document.getElementById('km-txt').innerText = "116+200";
    }, null, {enableHighAccuracy:true});
}
window.onload = initG;
</script>
</body>
</html>
