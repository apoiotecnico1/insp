<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>Relatório Fotográfico – Iluminação</title>
<style>
  /* ======= Tema Neutro Fixo ======= */
  :root{
    --bg:#0d1117; --bg2:#0f141c;
    --surface:#0f1726ee; --surface-strong:#192238;
    --fg:#e6edf3; --muted:#a9b1bb; --border:#1f2a3b;
    --shadow: 0 10px 28px rgba(0,0,0,.38);
    --radius: 14px;
    --camH: 42vh; /* altura da câmera (ajustada via JS) */
    --btnGradA:#1f2a3b; --btnGradB:#162131; --btnBorder:#2a384d;
    --camGradA:#0c1322; --camGradB:#0a111d; --camBorder:#1a2638;
    --pdfA:#f1d16a; --pdfB:#caa21d; --pdfText:#1d1600;

    --ctrlH: 64px; /* altura da barra de controles fixa */
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--fg); background:
      radial-gradient(1200px 600px at 10% -10%, #0c2a3f33, transparent 70%),
      radial-gradient(1000px 600px at 120% 10%, #0b553333, transparent 70%),
      var(--bg);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    padding:12px; line-height:1.35; overflow-x:hidden;
    overscroll-behavior-y: contain;
    -webkit-overflow-scrolling: touch;
  }
  h1{margin:0 0 10px;text-align:center;font-size:1.18rem; letter-spacing:.02em}

  .card{
    background: linear-gradient(180deg, var(--surface), rgba(15,23,38,.7));
    backdrop-filter: saturate(140%) blur(6px);
    -webkit-backdrop-filter: saturate(140%) blur(6px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding:12px; margin:0 auto 12px;
    max-width:980px; box-shadow: var(--shadow);
  }

  /* ===== Status ===== */
  #statusBar{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    max-width:980px; margin:0 auto 10px;
  }
  .st{
    display:inline-flex; align-items:center; gap:6px;
    background: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.28));
    border:1px solid rgba(255,255,255,.14);
    padding:6px 10px; border-radius:999px; font-size:.78rem; font-weight:800; color:#dfe7ff;
    box-shadow: 0 4px 12px rgba(0,0,0,.28);
  }
  .ok{ color:#b1ffd1 }
  .warn{ color:#ffdfa8 }

  /* ===== Câmera fixa ===== */
  #camCard{
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top, 0px) + 0px); transform: translateX(-50%);
    width: calc(100vw - 24px); max-width:980px; height: var(--camH);
    z-index: 100; padding: 0; margin: 12px auto; border-radius: var(--radius);
    background: linear-gradient(180deg, var(--camGradA), var(--camGradB));
    border:1px solid var(--camBorder); box-shadow: 0 14px 36px rgba(0,0,0,.45), inset 0 0 0 1px #0c1a29;
  }
  #wrap{ position: relative; height: 100%; border-radius: var(--radius); overflow: hidden }
  #vid{
    width: 100%; height: 100%; display: block; background:#000; border-radius: var(--radius);
    object-fit: contain; object-position: center;
    touch-action: pan-y;               /* rolagem vertical permitida */
    transform-origin: center center;   /* zoom digital */
  }
  #can{display:none}

  /* ===== Barra de Controles Compacta (fixa) ===== */
  #controlBar{
    position: fixed; left: 50%; transform: translateX(-50%);
    top: calc( env(safe-area-inset-top, 0px) + var(--camH) + 24px );
    width: calc(100vw - 24px); max-width:980px; height: var(--ctrlH);
    z-index: 110; padding:8px; margin:0 auto; border-radius: 12px;
    background: linear-gradient(180deg, rgba(17,25,40,.85), rgba(12,18,30,.85));
    border:1px solid var(--border); box-shadow: 0 10px 28px rgba(0,0,0,.38);
    display:flex; align-items:center; gap:8px; flex-wrap:nowrap; overflow-x:auto;
  }
  #controlBar button, #controlBar .selectWrap, #controlBar .switchWrap{
    flex: 0 0 auto;
  }
  #camSpacer{
    /* Espaço total para evitar sobreposição do conteúdo: câmera + barra controls + margem */
    height: calc(var(--camH) + var(--ctrlH) + 36px + env(safe-area-inset-top, 0px));
    max-width:980px; margin: 0 auto 8px;
  }

  /* Botões “compactos” */
  .btn{
    padding:10px 12px; font-size:.92rem; border:0; border-radius:10px; cursor:pointer;
    background: linear-gradient(180deg, var(--btnGradA), var(--btnGradB)); color:var(--fg); font-weight:900;
    border:1px solid var(--btnBorder); box-shadow: 0 6px 18px rgba(0,0,0,.25);
    transition: transform .06s ease, box-shadow .12s ease, filter .12s ease;
  }
  .btn:hover{ filter:brightness(1.06) }
  .btn:active{ transform: translateY(1px); box-shadow: 0 3px 12px rgba(0,0,0,.25) }
  .btn:disabled{opacity:.5;cursor:not-allowed; filter:grayscale(.2)}
  .btn-red{ background: linear-gradient(180deg, #f2544b, #cc3e36); color:#fff }
  .btn-orange{ background: linear-gradient(180deg, #ff7b45, #e5612e); color:#1b0b02 }
  .btn-green{ background: linear-gradient(180deg, #35eb85, #22c55e); color:#072414 }
  .btn-gold{ background: linear-gradient(180deg, var(--pdfA), var(--pdfB)); color:var(--pdfText) }

  /* STOP sobreposto na câmera */
  #btnOverlayStop{
    position:absolute; right:10px; bottom:10px; z-index:120;
    display:none; align-items:center; justify-content:center;
    width:46px; height:46px; border-radius:999px; border:1px solid #a11b1b;
    background: linear-gradient(180deg, #cc3e36, #a72b25); color:#fff; font-weight:900; box-shadow:0 6px 18px rgba(0,0,0,.35);
  }

  /* Voltar ao topo */
  #btnTop{
    position: fixed; right: 12px; bottom: 12px; z-index: 1200;
    width: 42px; height: 42px; border-radius: 999px;
    background: linear-gradient(180deg, #1e293b, #0f172a); color:#e6edf3; border:1px solid #2a384d;
    display:flex; align-items:center; justify-content:center; font-weight:900; box-shadow: 0 8px 20px rgba(0,0,0,.35);
    opacity:.82;
  }
  #btnTop:hover{ opacity:1 }

  /* Chip indicador */
  .chip{
    position: absolute; right: 10px; top: 10px;
    background: linear-gradient(180deg, rgba(0,0,0,.65), rgba(0,0,0,.55));
    border: 1px solid rgba(255,255,255,.25);
    color: #e6ebff; padding: 5px 9px; border-radius: 999px;
    font-size: .75rem; font-weight: 900; letter-spacing: .02em;
    display: none; user-select: none; box-shadow: var(--shadow);
  }
  .chip.on{ display: inline-flex; align-items: center; gap: 6px }
  .chip.rec{ background: linear-gradient(180deg, rgba(127,29,29,.82), rgba(90,14,14,.72)); border-color:#dc2626; color:#ffe2e2; }
  .chip.auto{ background: linear-gradient(180deg, rgba(90,50,17,.78), rgba(77,38,7,.72)); border-color:#f59e0b; color:#fde68a; }

  /* Lista/Galeria */
  #foto{width:100%;display:block;border:1px solid #2a335a;border-radius:12px;margin-top:8px; box-shadow: var(--shadow)}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .thumb{border:1px solid #243053;border-radius:10px;overflow:hidden;background:#0a122a}
  .thumb img{width:100%;display:block}
  .meta{padding:6px 8px;font-size:.78rem;color:#c7d2fe}

  /* Placa KM */
  #kmPlaque{
    text-align:center; padding:6px 10px;
    background: linear-gradient(180deg, #0d3b8e, #0a2e6d);
    border:2px solid #e6ecff; border-radius:12px; margin:0 auto 8px; max-width:980px;
    font-weight:900; font-size:.96rem; color:#ffffff; box-shadow:0 6px 16px rgba(0,0,0,.28); text-shadow: 0 1px 0 rgba(0,0,0,.35);
  }

  /* Splash */
  #splash{ position: fixed; inset: 0; z-index: 2000; background: radial-gradient(1200px 600px at 50% -10%, #0c2a3f, transparent 65%), #060a12; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #rainCanvas{ position:absolute; inset:0; width:100%; height:100% }
  .splash-inner{ position: relative; z-index: 2; text-align: center; padding: 24px 18px; }
  .title{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
    font-weight: 900; font-size: clamp(1.1rem, 4vw, 2.3rem);
    letter-spacing: .06em; color: #b7ffcf;
    text-shadow: 0 0 10px #22c55e55, 0 0 22px #22c55e77, 0 0 40px #22c55e55, 0 1px 0 #0b1d14;
    white-space: nowrap; overflow: hidden; border-right: 2px solid #43ff9b;
    margin: 0 auto 10px; width: 0;
  }
  .subtitle{ font-weight:700; color:#9fe9ff; letter-spacing:.04em; opacity:.9 }
  .splash-actions{ margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap }
  .splash-btn{
    padding:10px 14px; border-radius:12px; border:1px solid #1b3b32;
    background: linear-gradient(180deg, #1b4c3b, #123c2e); color:#c8ffdf; font-weight:900; cursor:pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,.35);
  }
  .splash-fade{ animation: splashout .6s ease forwards }
  @keyframes splashout{ to{ opacity:0; transform: scale(1.01) } }
  @keyframes typing { from { width: 0 } to { width: 24ch } }
  @keyframes caret { 0%, 100% { border-right-color: transparent } 50% { border-right-color: #43ff9b } }
</style>
</head>
<body>

<!-- ===== SPLASH ===== -->
<div id="splash" aria-label="Tela de abertura do relatório fotográfico">
  <canvas id="rainCanvas"></canvas>
  <div class="splash-inner">
    <h2 class="title" id="splashTitle">RELATÓRIO DE INSPEÇÃO</h2>
    <div class="subtitle">FOTOS COM DATA E KM</div>
    <div class="splash-actions">
      <button class="splash-btn" id="btnStart">SEJA BEM VINDO</button>
    </div>
  </div>
</div>

<h1>📸 Relatório Fotográfico</h1>

<!-- ===== Status ===== -->
<div id="statusBar" aria-live="polite">
  <span id="stCsv"  class="st">CSV: —</span>
  <span id="stCam"  class="st">Câmera: —</span>
  <span id="stGps"  class="st">GPS: —</span>
  <span id="stFotos" class="st">Fotos: 0</span>
  <span id="stPersist" class="st">Persistência: —</span>
</div>

<!-- Espaçador p/ câmera + barra de controles -->

<!-- KM ao vivo -->
<div id="kmPlaque"><span id="kmTop">KM —</span></div>

<!-- ===== CÂMERA ===== -->
<div class="card" id="camCard">
  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="can" width="1280" height="720"></canvas>
    <button id="btnOverlayStop" title="Parar">⏹️</button>
    <div id="chip" class="chip" aria-live="polite" aria-atomic="true"></div>
  </div>
</div>

<!-- ===== BARRA DE CONTROLES COMPACTA (sempre visível) ===== -->
<div id="controlBar" class="card" style="padding:8px">
  <!-- Câmera -->
  <button id="btnCycle" class="btn" title="Trocar câmera">🔄 Câmera</button>

  <!-- Zoom por pinça: só exibe label -->
  <span id="zoomLabel" style="font-size:.86rem;color:#9fe9ff;min-width:82px;text-align:center">Zoom: 1.0×</span>

  <!-- Economia -->
  <label class="switchWrap" style="display:inline-flex;align-items:center;gap:6px;font-size:.9rem">

  <button id="btnEnableCam" class="btn" style="display:none" title="Ativar Câmera">📷 Ativar</button>

  <button id="btnAutoCapture" class="btn btn-orange" title="Captura contínua">🎬 Auto</button>

  <button id="btnSharePdf" class="btn" disabled title="Enviar PDF">🟢 PDF</button>

  <!-- Limpar -->
  <button id="btnClear" class="btn" disabled title="Limpar lista">🧹</button>
</div>

<!-- ===== Foto + Galeria ===== -->
<div class="card">
  <h2 style="margin:0 0 6px;font-size:1rem">Foto mais recente</h2>
  <img id="foto" alt="Prévia da foto capturada">
</div>

<div class="card">
  <h2 style="margin:0 0 6px;font-size:1rem">Lista de fotos (sessão atual)</h2>
  <div id="gal" class="gallery"></div>
</div>

<!-- Voltar ao topo -->
<button id="btnTop" title="Topo">↑</button>

<script>
/* ===== Splash (Matrix) ===== */
(function(){
  const splash = document.getElementById('splash');
  const title  = document.getElementById('splashTitle');
  const btnStart = document.getElementById('btnStart');
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');

  let W, H, columns, fontSize = 16, drops = [], raf = null, started = false;

  function resize(){
    canvas.width = W = window.innerWidth;
    canvas.height = H = window.innerHeight;
    fontSize = Math.max(14, Math.min(24, Math.floor(W / 64)));
    columns = Math.floor(W / fontSize);
    drops = new Array(columns).fill(1);
  }
  window.addEventListener('resize', resize);

  function draw(){
    ctx.fillStyle = 'rgba(6,10,18,0.08)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#39ff88';
    ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
    for(let i=0;i<drops.length;i++){
      const char = String.fromCharCode(0x30A0 + Math.floor(Math.random()*96));
      ctx.fillText(char, i*fontSize, drops[i]*fontSize);
      if(drops[i]*fontSize > H && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    raf = requestAnimationFrame(draw);
  }
  function typeIn(){
    title.style.animation = `typing 1200ms steps(24, end) forwards, caret 650ms step-end 6`;
  }
  function start(){
    if(started) return; started = true;
    splash.classList.add('splash-fade');
    setTimeout(()=>{ splash.style.display='none'; boot(); }, 580);
  }
  resize(); draw(); typeIn();
  const auto = setTimeout(start, 2200);
  btnStart.addEventListener('click', ()=>{ clearTimeout(auto); start(); });
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden && raf){ cancelAnimationFrame(raf); raf = null; }
    else if(!raf){ raf = requestAnimationFrame(draw); }
  }, {passive:true});
})();
</script>

<script>
/* ===== Utils ===== */
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function fmtKm(v){ let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function dataURLtoUint8Array(dataURL){ const base64=dataURL.split(',')[1]; const raw=atob(base64); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i)&0xFF; return arr; }
function dataURLtoBlob(dataURL){ const mime=(dataURL.split(';')[0].split(':')[1])||'image/jpeg'; return new Blob([dataURLtoUint8Array(dataURL)],{type:mime}); }
function dataURLtoFile(dataURL, filename='INSPECAO_FOTO.jpg'){ return new File([dataURLtoUint8Array(dataURL)], filename, {type:'image/jpeg'}); }

/* ===== Permissões + utilitários ===== */
async function queryPermission(name){
  try{
    if(!('permissions' in navigator)) return null;
    const p = await navigator.permissions.query({name});
    return p; // p.state: 'granted' | 'prompt' | 'denied'
  }catch{ return null; }
}
function showEnableButtons({camNeeded=false,gpsNeeded=false}={}){
  const bCam = document.getElementById('btnEnableCam');
  const bGps = document.getElementById('btnEnableGps');
  if(bCam) bCam.style.display = camNeeded ? '' : 'none';
  if(bGps) bGps.style.display = gpsNeeded ? '' : 'none';
}
function isSecureContextOk(){
  return (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1');
}
</script>

<script>
/* ===== Estado ===== */
let dataset=[], kmPoints=[]; let csvReady=false, camReady=false, gpsReady=false;
let lastPos=null; let isAutoCapturing=false; let autoCaptureInterval=null;
let isRecordingVideo=false; let mediaRecorder=null; let recordedChunks=[];
let kmUpdateInterval=null;

/* ===== Opções ===== */
const overlayOpts = { showKM:true, showTs:true, showIds:true, showGps:false };

/* ===== DOM ===== */
const vid=document.getElementById('vid'); const can=document.getElementById('can'); const ctx=can.getContext('2d',{alpha:false});
const foto=document.getElementById('foto'); const wrap=document.getElementById('wrap'); const chip=document.getElementById('chip');
const btnAutoCapture=document.getElementById('btnAutoCapture'); const btnVideoRecord=document.getElementById('btnVideoRecord');
const kmTop=document.getElementById('kmTop'); const gal=document.getElementById('gal');
const btnCycle=document.getElementById('btnCycle'); const pppSel=document.getElementById('pppSel');
const stCsv=document.getElementById('stCsv'); const stCam=document.getElementById('stCam'); const stGps=document.getElementById('stGps'); const stFotos=document.getElementById('stFotos'); const stPersist=document.getElementById('stPersist');
const optKm=document.getElementById('optKm'); const optTs=document.getElementById('optTs'); const optIds=document.getElementById('optIds'); const optGps=document.getElementById('optGps');
const econToggle=document.getElementById('econToggle'); const zoomLabel=document.getElementById('zoomLabel');
const btnOverlayStop=document.getElementById('btnOverlayStop'); const btnTop=document.getElementById('btnTop');
const btnPdf=document.getElementById('btnPdf'); const btnSharePdf=document.getElementById('btnSharePdf'); const btnSharePhotos=document.getElementById('btnSharePhotos'); const btnClear=document.getElementById('btnClear');
const btnEnableCam=document.getElementById('btnEnableCam'); const btnEnableGps=document.getElementById('btnEnableGps');
const photos=[];

/* ===== IndexedDB ===== */
const DB_NAME='inspecaoDB', DB_VER=3; const STORES=['photos','edits','reports','wal','snapshots','photos_mirror']; let db=null;
function openDBv3(){ return new Promise((resolve,reject)=>{ const req=indexedDB.open(DB_NAME, DB_VER);
  req.onupgradeneeded=(e)=>{ const db=e.target.result; STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)){ const st=db.createObjectStore(s,{keyPath:'id'}); if (s==='photos'||s==='edits') st.createIndex('ts','ts',{unique:false}); if (s==='wal') st.createIndex('ts','ts',{unique:false}); }}); };
  req.onsuccess=()=>resolve(req.result); req.onerror=()=>reject(req.error);
});}
async function ensurePersistence(){ try{ if(navigator.storage?.persist){ const already=await navigator.storage.persisted(); if(!already) await navigator.storage.persist(); const ok=await navigator.storage.persisted(); stPersist.textContent='Persistência: '+(ok?'OK':'Normal'); stPersist.className='st '+(ok?'ok':'warn'); } }catch{} }
async function dbPutPhoto(rec){ if(!db) db=await openDBv3();
  return new Promise((res,rej)=>{ const tx=db.transaction(['photos','photos_mirror','wal'],'readwrite');
    tx.objectStore('wal').put({id:'wal_'+rec.id, ts:Date.now(), action:'PUT_PHOTO', payload:{id:rec.id}, committed:false});
    tx.objectStore('photos').put(rec); tx.objectStore('photos_mirror').put({id:rec.id, blob:rec.blob});
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }).then(async()=>{ const d=db; await new Promise((res,rej)=>{ const tx=d.transaction('wal','readwrite'); const st=tx.objectStore('wal'); const rq=st.get('wal_'+rec.id); rq.onsuccess=()=>{ const row=rq.result; if(row){ row.committed=true; st.put(row); } res(); }; rq.onerror=()=>rej(rq.error); }); });
}
async function dbGetAllPhotos(){ if(!db) db=await openDBv3(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readonly'); const rq=tx.objectStore('photos').index('ts').getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }
async function dbClearAll(){ if(!db) db=await openDBv3(); return new Promise((res,rej)=>{ const tx=db.transaction(['photos','wal','photos_mirror'],'readwrite'); tx.objectStore('photos').clear(); tx.objectStore('wal').clear(); tx.objectStore('photos_mirror').clear(); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function snapshotNow(){ try{ if(!db) db=await openDBv3(); const state={ ts:Date.now(), count:photos.length, last:photos[photos.length-1]?.id||null }; await new Promise((res,rej)=>{ const tx=db.transaction('snapshots','readwrite'); tx.objectStore('snapshots').put({id:'last', ...state}); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }catch{} }
function fastCheckpoint(){ snapshotNow(); }
window.addEventListener('pagehide', fastCheckpoint); document.addEventListener('visibilitychange', ()=>{ if(document.hidden) fastCheckpoint(); }); window.addEventListener('beforeunload', fastCheckpoint);
</script>

<script>
/* ===== CSVs (IDs + KM) ===== */
const CELL=0.005; const idGrid=new Map(), kmGrid=new Map();
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=60,maxR=5){ const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[]; for(let r=0;r<=maxR && out.length<minCount;r++){ for(let dy=-r;dy<=r;dy++){ const y=ky+dy; for(let dx=-r;dx<=r;dx++){ if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue; const a=grid.get(`${y},${kx+dx}`); if(a) out.push(...a); } } } return out.length?out:[]; }
async function loadIDs(){
  try{
    const txt=await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text());
    const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
    const head=lines[0].split(';').map(h=>h.toLowerCase());
    const iId=head.findIndex(h=>h.includes('id')&&!h.includes('lat')&&!h.includes('long'));
    const iLat=head.findIndex(h=>h.includes('lat')); const iLon=head.findIndex(h=>h.includes('lon'));
    dataset=[];
    for(let i=1;i<lines.length;i++){
      const c=lines[i].split(';');
      const id=String(c[iId]||'').trim(), lat=parsePt(c[iLat]), lon=parsePt(c[iLon]);
      if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
      if(lat===0 && lon===0) continue; if(Math.abs(lat)>90 || Math.abs(lon)>180) continue;
      dataset.push({id,lat,lon});
    }
    idGrid.clear(); for(const p of dataset) gridInsert(idGrid,p);
  }catch(e){ dataset=[]; }
}
function pickTrio(c){
  const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon)) return t1;
  const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
  if(Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon)) return t2;
  return null;
}
async function loadKM(){
  try{
    const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
    kmPoints=[]; let lastKeep=null; const MIN_STEP=5;
    for(let i=0;i<lines.length;i++){
      const c=lines[i].split(';'); if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue;
      const t=pickTrio(c); if(!t) continue;
      if(!Number.isFinite(t.km)||!Number.isFinite(t.lat)||!Number.isFinite(t.lon)) continue;
      if(!lastKeep){ kmPoints.push(t); lastKeep=t; } else {
        const d=hav(lastKeep.lat,lastKeep.lon,t.lat,t.lon);
        if(d>=MIN_STEP){ kmPoints.push(t); lastKeep=t; }
      }
    }
    kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
  }catch(e){ kmPoints=[]; }
}
async function loadCSVs(){ await Promise.all([loadIDs(),loadKM()]); csvReady=dataset.length>0 && kmPoints.length>0; }
</script>

<script>
/* ===== KM em tempo real ===== */
function nearestN(lat,lon,n=5){ if(!dataset.length) return []; const cand=gridCands(idGrid,lat,lon,Math.max(60,n*20)); const arr=cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0,n); }
function nearestKM(lat,lon){ if(!kmPoints.length) return null; const cand=gridCands(kmGrid,lat,lon,120); if(!cand.length) return null; let best=null,bd=Infinity; for(const p of cand){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best; }
function updateKmDisplay(){ if(!lastPos){ kmTop.textContent='KM —'; return; } const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —'; kmTop.textContent=kmStr; }
function startKmUpdate(){ updateKmDisplay(); kmUpdateInterval=setInterval(()=>{ updateKmDisplay(); updateStatusBar(); }, 300); }
function stopKmUpdate(){ if(kmUpdateInterval){ clearInterval(kmUpdateInterval); kmUpdateInterval=null; } }
</script>

<script>
/* ===== Câmera / Zoom ===== */
let currentStream=null, currentTrack=null, currentCap=null; let deviceList=[], deviceIndex=0;
let videoAR=16/9; let hasTrackZoom=false; let digitalZoom=1; const DIGITAL_ZOOM_MAX=8;

function computeAvailableW(){ const pad=24; return Math.min(window.innerWidth - pad, 980); }
function computeMaxH(){
  const ctrlH = (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ctrlH'))||64);
  const reserve = ctrlH + 120;
  const vv=window.visualViewport; const safeTop=vv?vv.offsetTop:0;
  return Math.max(220, (vv?vv.height:window.innerHeight) - reserve - safeTop);
}
function applyFit(){
  const w=computeAvailableW();
  const idealH=Math.round(w/(videoAR||(16/9)));
  const maxH=computeMaxH();
  const objectFit = (idealH<=maxH)?'contain':'cover';
  const targetH=(idealH<=maxH)?idealH:maxH;
  document.documentElement.style.setProperty('--camH', targetH+'px');
  vid.style.objectFit=objectFit;
  updateControlBarTop();
}
window.addEventListener('resize', applyFit);
if(window.visualViewport){
  visualViewport.addEventListener('resize', applyFit);
  visualViewport.addEventListener('scroll', applyFit);
}

/* Ajusta posição da barra de controles e o espaçador */
function updateControlBarTop(){
  const root = getComputedStyle(document.documentElement);
  const camH = parseInt(root.getPropertyValue('--camH'))||300;
  const ctrlH= parseInt(root.getPropertyValue('--ctrlH'))||64;
  const cb = document.getElementById('controlBar');
  const camSpacer = document.getElementById('camSpacer');
  if(cb){ cb.style.top = `calc(env(safe-area-inset-top, 0px) + ${camH}px + 24px)`; }
  if(camSpacer){ camSpacer.style.height = `calc(${camH}px + ${ctrlH}px + 36px + env(safe-area-inset-top, 0px))`; }
}

/* Eco (resolução/bitrate) */
let econMode = (localStorage.getItem('econMode')==='1') || false;
econToggle.checked = econMode;
econToggle.addEventListener('change', async ()=>{ econMode = econToggle.checked; localStorage.setItem('econMode', econMode?'1':'0'); await startCamera(deviceIndex); });

function saveCamPrefs(){ const dev=deviceList[deviceIndex]; if(dev){ localStorage.setItem('camDeviceId',dev.deviceId); } }
function updateZoomLabel(val){ if(hasTrackZoom){ const s=currentTrack?.getSettings?.()||{}; const z=(val!=null)?val:(s.zoom??1); zoomLabel.textContent=`Zoom: ${Number(z||1).toFixed(1)}×`; } else { zoomLabel.textContent=`Zoom: ${Number(digitalZoom||1).toFixed(1)}× (dig)`; } }

async function enumerateCameras(){ try{ await navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(s=>s.getTracks().forEach(t=>t.stop())); }catch{} const devices=await navigator.mediaDevices.enumerateDevices(); deviceList=devices.filter(d=>d.kind==='videoinput'); deviceList.sort((a,b)=>{ const A=/back|rear|environment/i.test(a.label), B=/back|rear|environment/i.test(b.label); if(A && !B) return -1; if(!A && B) return 1; return a.label.localeCompare(b.label); }); const savedId=localStorage.getItem('camDeviceId'); const idx=Math.max(0, deviceList.findIndex(d=>d.deviceId===savedId)); deviceIndex=idx>=0?idx:0; }

document.getElementById('btnCycle').addEventListener('click', async ()=>{ deviceIndex=(deviceIndex+1)%Math.max(1,deviceList.length); await startCamera(deviceIndex); });

/* ===== Zoom por pinça ===== */
const pointers=new Map(); let pinchBaseDist=0; let startZoomVal=1;
function dist(p1,p2){ const dx=p1.clientX-p2.clientX, dy=p1.clientY-p2.clientY; return Math.sqrt(dx*dx+dy*dy); }
wrap.addEventListener('pointerdown', e=>{ if(e.pointerType!=='touch') return; pointers.set(e.pointerId,e); if(pointers.size===2){ const [a,b]=[...pointers.values()]; pinchBaseDist=dist(a,b); startZoomVal = hasTrackZoom ? (currentTrack?.getSettings?.().zoom ?? 1) : digitalZoom; } }, {passive:true});
wrap.addEventListener('pointermove', e=>{ if(e.pointerType!=='touch'||!pointers.has(e.pointerId)) return; pointers.set(e.pointerId,e); if(pointers.size===2 && pinchBaseDist>0){ const [a,b]=[...pointers.values()]; const ratio=dist(a,b)/pinchBaseDist; if(hasTrackZoom){ const cap=currentCap.zoom; let z=startZoomVal*ratio; z=Math.max(cap.min??1, Math.min(cap.max??5, z)); applyTrackZoom(z); }else{ let z=startZoomVal*ratio; z=Math.max(1, Math.min(DIGITAL_ZOOM_MAX, z)); setDigitalZoom(z);} } }, {passive:true});
['pointerup','pointercancel','pointerout','pointerleave'].forEach(ev=>wrap.addEventListener(ev, e=>{ if(e.pointerType!=='touch') return; pointers.delete(e.pointerId); if(pointers.size<2){ pinchBaseDist=0; } }, {passive:true}));
async function applyTrackZoom(z){ try{ await currentTrack.applyConstraints({advanced:[{zoom:z}]}); }catch{ try{ await currentTrack.applyConstraints({zoom:z}); }catch{} } updateZoomLabel(z); }
function setDigitalZoom(z){ digitalZoom=z; vid.style.transform=`scale(${digitalZoom})`; updateZoomLabel(digitalZoom); }
</script>

<script>
/* ===== GPS ===== */
let gpsWatchId = null;

async function startGPS(){
  if(!('geolocation' in navigator)){
    gpsReady=false; console.warn('Geolocation não disponível.'); showEnableButtons({gpsNeeded:true}); return;
  }
  if(!isSecureContextOk()){
    gpsReady=false; console.warn('Use HTTPS ou localhost para GPS.'); showEnableButtons({gpsNeeded:true}); return;
  }
  try{
    const perm = await queryPermission('geolocation');
    if(perm && 'onchange' in perm){
      perm.onchange = ()=>{
        console.log('Permissão de GPS mudou para:', perm.state);
        if(perm.state === 'granted'){
          showEnableButtons({gpsNeeded:false});
          startGPS();
        }else if(perm.state === 'denied'){
          gpsReady=false; showEnableButtons({gpsNeeded:true});
        }
      };
    }

    // Primeira leitura (acorda sensor)
    await new Promise((resolve,reject)=>{
      const t = setTimeout(()=>reject(new Error('gps-timeout')), 8000);
      navigator.geolocation.getCurrentPosition(pos=>{
        clearTimeout(t);
        lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
        gpsReady=true; resolve();
      }, err=>{ clearTimeout(t); reject(err); }, {enableHighAccuracy:true, maximumAge:2000, timeout:7000});
    }).catch(err=>{ console.warn('getCurrentPosition falhou:', err); });

    if(gpsWatchId!=null) navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
      gpsReady=true; showEnableButtons({gpsNeeded:false});
    }, err=>{
      console.warn('watchPosition erro:', err);
      if(err && err.code===err.PERMISSION_DENIED){ gpsReady=false; showEnableButtons({gpsNeeded:true}); }
    }, {enableHighAccuracy:true, maximumAge:1500, timeout:12000});
  }catch(e){
    console.warn('startGPS erro:', e);
    gpsReady=false; showEnableButtons({gpsNeeded:true});
  }
}

btnEnableGps?.addEventListener('click', async ()=>{
  try{
    await new Promise((resolve,reject)=>{
      const t=setTimeout(()=>reject(new Error('gps-timeout')), 7000);
      navigator.geolocation.getCurrentPosition(()=>{ clearTimeout(t); resolve(); }, err=>{ clearTimeout(t); reject(err); }, {enableHighAccuracy:true, maximumAge:1000, timeout:6000});
    });
  }catch(e){}
  await startGPS();
});
</script>

<script>
/* ===== Captura (respeita zoom digital) ===== */
function updateActions(){ const n=photos.length, enabled=n>0; btnPdf.disabled=!enabled; btnClear.disabled=!enabled; btnSharePdf.disabled=!enabled; btnSharePhotos.disabled=!enabled; }
function renderGallery(){ gal.innerHTML=''; photos.forEach((p,idx)=>{ const d=document.createElement('div'); d.className='thumb'; const im=document.createElement('img'); im.src=p.url; const meta=document.createElement('div'); meta.className='meta'; meta.textContent=`${idx+1}. ${p.kmStr} • ${p.ts}`; d.appendChild(im); d.appendChild(meta); gal.appendChild(d); }); updateActions(); updateStatusBar(); }
function stampOverlay(ctx, w, h, kmStr, ids, ts, gpsLine){
  const bandH=Math.max(144,Math.round(h*0.16));
  ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,h-bandH,w,bandH);
  let leftY=h-bandH+Math.round(bandH*0.52);
  if(overlayOpts.showKM && kmStr){ ctx.fillStyle='#b7ffcf'; ctx.textAlign='left'; ctx.font=`900 ${Math.round(h*0.055)}px system-ui`; ctx.shadowColor='rgba(34,197,94,.45)'; ctx.shadowBlur=16; ctx.fillText(kmStr,20,leftY); ctx.shadowBlur=0; }
  if(overlayOpts.showTs){ ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.font=`700 ${Math.round(h*0.032)}px system-ui`; ctx.fillText(ts,20,h-Math.round(bandH*0.22)); }
  if(overlayOpts.showGps && gpsLine){ ctx.fillStyle='#d7e5ff'; ctx.textAlign='left'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`; ctx.fillText(gpsLine,20,h-Math.round(bandH*0.5)); }
  if(overlayOpts.showIds && Array.isArray(ids)){ ctx.textAlign='right'; ctx.fillStyle='#d7e5ff'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`; ids.forEach((e,i)=>ctx.fillText(e.id,w-20,h-bandH+28+i*26)); }
}
function drawVideoToCanvas(targetCtx, outW, outH){
  const srcW=vid.videoWidth||1280; const srcH=vid.videoHeight||720;
  if(hasTrackZoom || digitalZoom<=1){ targetCtx.drawImage(vid,0,0,outW,outH); }
  else { const dz=digitalZoom; const cropW=Math.round(srcW/dz), cropH=Math.round(srcH/dz); const sx=Math.max(0,Math.floor((srcW-cropW)/2)); const sy=Math.max(0,Math.floor((srcH-cropH)/2)); targetCtx.drawImage(vid,sx,sy,cropW,cropH,0,0,outW,outH); }
}
async function capture(){
  if(!(csvReady && camReady && gpsReady && lastPos)) return;
  const w=vid.videoWidth||1280, h=vid.videoHeight||720; can.width=w; can.height=h;
  drawVideoToCanvas(ctx,w,h);
  const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj?fmtKm(kmObj.km):'KM —'; const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=new Date().toLocaleString();
  const gpsLine= lastPos? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
  stampOverlay(ctx,w,h,kmStr,ids,ts,gpsLine);
  const url=can.toDataURL('image/jpeg',0.92); const blob=dataURLtoBlob(url);
  foto.src=url; const safeKm=kmStr.replace('KM ','').replace('+','_'); const fname=`KM_${safeKm}.jpg`;
  const rec={ id: Date.now()+'_'+Math.random().toString(36).slice(2), url, blob, w,h, ts, kmStr, idsTxt: ids.map(e=>e.id).join(', '), filename: fname, lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc };
  await dbPutPhoto({...rec, url: undefined}); photos.push(rec); renderGallery();
}
</script>

  if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; }
  isAutoCapturing=true; btnAutoCapture.textContent='⏹️ Auto'; btnAutoCapture.classList.add('btn-red'); updateChip();
  autoCaptureInterval=setInterval(()=>{ if(csvReady && camReady && gpsReady && lastPos){
    const w=vid.videoWidth||1280, h=vid.videoHeight||720; can.width=w; can.height=h;

    const gpsLine= lastPos? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
    stampOverlay(ctx,w,h,kmStr,ids,ts,gpsLine);
    const url=can.toDataURL('image/jpeg',0.92); const blob=dataURLtoBlob(url); foto.src=url;
    const safeKm=kmStr.replace('KM ','').replace('+','_'); const fname=`KM_${safeKm}.jpg`;
    const rec={ id: Date.now()+'_'+Math.random().toString(36).slice(2), url, blob, w,h, ts, kmStr, idsTxt: ids.map(e=>e.id).join(', '), filename: fname, lat:lastPos.lat, lon:lastPos.lon, acc:lastPos.acc };
    dbPutPhoto({...rec, url: undefined}); photos.push(rec); renderGallery();

<script>
/* ===== PDF / Compartilhar ===== */
function downscaleDataURL(srcUrl, maxDim=800, quality=0.85){
  return new Promise((resolve)=>{ const img=new Image();
    img.onload=()=>{ const W=img.width,H=img.height; let w=W,h=H;
      if(Math.max(W,H)>maxDim){ if(W>=H){ w=maxDim; h=Math.round(H*(maxDim/W)); } else { h=maxDim; w=Math.round(W*(maxDim/H)); } }
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      resolve({dataUrl:c.toDataURL('image/jpeg',quality), w,h});
    }; img.onerror=()=>resolve({dataUrl:srcUrl,w:0,h:0}); img.src=srcUrl;
  });
}
async function makePdfGrid(arr, perPage=1){
  const PW=595, PH=842, M=24; const L={1:[1,1],2:[2,1],4:[2,2],8:[4,2]}; const [ROWS,COLS]=L[perPage]||[1,1];
  const CELL_W=Math.floor((PW-2*M)/COLS), CELL_H=Math.floor((PH-2*M)/ROWS);
  const enc=new TextEncoder(); const parts=[enc.encode('%PDF-1.4\n')]; const xref=[0]; let objNo=0;
  const off=()=>parts.reduce((a,b)=>a+b.length,0);
  const addObj=b=>{ objNo++; xref.push(off()); parts.push(enc.encode(`${objNo} 0 obj\n${b}\nendobj\n`)); return objNo; };
  const addStream=(dict,bin)=>{ objNo++; xref.push(off()); const head=`${objNo} 0 obj\n${dict.replace('>>','')} /Length ${bin.length} >>\nstream\n`; parts.push(enc.encode(head)); parts.push(bin); parts.push(enc.encode(`\nendstream\nendobj\n`)); return objNo; };
  const pages=[]; let i=0;
  while(i<arr.length){
    const names=[]; const contents=[];
    for(let r=0;r<ROWS && i<arr.length;r++){
      for(let c=0;c<COLS && i<arr.length;c++,i++){
        const p=arr[i]; const bin=dataURLtoUint8Array(p.url); const imgW=p.w||800, imgH=p.h||450;
        let dw=CELL_W, dh=Math.round(imgH*(CELL_W/imgW)); if(dh>CELL_H){ dh=CELL_H; dw=Math.round(imgW*(CELL_H/imgH)); }
        const tx=M + c*CELL_W + Math.round((CELL_W-dw)/2); const ty=PH - (M + (r+1)*CELL_H) + Math.round((CELL_H-dh)/2);
        const imgNum=addStream(`<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode >>`, bin);
        const name=`/Im${r}_${c}`; names.push(`${name} ${imgNum} 0 R`); contents.push(`q\n${dw} 0 0 ${dh} ${tx} ${ty} cm\n${name} Do\nQ\n`);
      }
    }
    const contNum=addStream(`<< >>`, enc.encode(contents.join(''))); const pageNum=addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << ${names.join(' ')} >> >> /Contents ${contNum} 0 R >>`); pages.push(pageNum);
  }
  const pagesNum=addObj(`<< /Type /Pages /Kids [ ${pages.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pages.length} >>`);
  const catalogNum=addObj(`<< /Type /Catalog /Pages ${pagesNum} 0 R >>`);
  const sx=off(); let xr=`xref\n0 ${xref.length}\n0000000000 65535 f \n`; for(let i=1;i<xref.length;i++){ xr+=String(xref[i]).padStart(10,'0')+' 00000 n \n'; }
  parts.push(enc.encode(xr)); parts.push(enc.encode(`trailer\n<< /Size ${xref.length} /Root ${catalogNum} 0 R >>\nstartxref\n${sx}\n%%EOF`));
  return new Blob(parts,{type:'application/pdf'});
}
btnPdf.onclick=async ()=>{ if(!photos.length) return; stopAutoCapture();
  const perPage=Number((pppSel||{value:1}).value)||1;
  const scaled=[]; for(const p of photos){ const s=await downscaleDataURL(p.url,800,0.85); scaled.push({url:s.dataUrl,w:s.w,h:s.h}); }
  const blob=await makePdfGrid(scaled,perPage); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`RELATORIO_INSPECAO_${perPage}ppg.pdf`; document.body.appendChild(a); a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); a.remove();
};
function buildWhatsAppMessage(isPdf){ const lines=[]; lines.push('*RELATÓRIO DE INSPEÇÃO*'); lines.push(`Total de fotos: ${photos.length}`); lines.push(`Gerado em: ${new Date().toLocaleString()}`); lines.push(''); photos.forEach((p,i)=>{ let L=`${i+1}) ${p.kmStr} • ${p.ts}`; if(overlayOpts.showGps && Number.isFinite(p.lat) && Number.isFinite(p.lon)){ L+=` • GPS: ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)} • https://maps.google.com/?q=${p.lat.toFixed(6)},${p.lon.toFixed(6)}`; } lines.push(L); }); if(isPdf) lines.push('Anexo: RELATORIO_INSPECAO.pdf'); return lines.join('\n'); }
btnSharePdf.onclick=async ()=>{ if(!photos.length) return; stopAutoCapture(); const perPage=Number((pppSel||{value:1}).value)||1;
  const scaled=[]; for(const p of photos){ const s=await downscaleDataURL(p.url,800,0.85); scaled.push({url:s.dataUrl,w:s.w,h:s.h}); }
  const pdfBlob=await makePdfGrid(scaled, perPage); const pdfFile=new File([pdfBlob],`RELATORIO_INSPECAO_${perPage}ppg.pdf`,{type:'application/pdf'}); const text=buildWhatsAppMessage(true);
  try{ if(navigator.canShare && navigator.canShare({files:[pdfFile]})){ await navigator.share({files:[pdfFile],text,title:'Relatório de Inspeção'}); }
    else { const a=document.createElement('a'); a.href=URL.createObjectURL(pdfBlob); a.download=`RELATORIO_INSPECAO_${perPage}ppg.pdf`; a.click(); window.open('https://wa.me/?text='+encodeURIComponent(text+'\n(Anexe o PDF baixado agora.)'),'_blank'); alert('Seu navegador não permite enviar arquivos diretamente. Baixei o PDF e abri o WhatsApp; anexe o arquivo.'); }
  }catch(e){ alert('Compartilhamento cancelado/indisponível.'); }
};
btnSharePhotos.onclick=async ()=>{ if(!photos.length) return; stopAutoCapture(); const files=photos.map(p=>dataURLtoFile(p.url,p.filename||'INSPECAO_FOTO.jpg')); const text=buildWhatsAppMessage(false); const MAX=10;
  if(!(navigator.canShare && navigator.canShare({files:files.slice(0,Math.min(files.length,MAX))}))){ window.open('https://wa.me/?text='+encodeURIComponent(text+'\n(Anexe as fotos manualmente.)'),'_blank'); alert('Navegador não permite envio direto.'); return; }
  try{ for(let i=0;i<files.length;i+=MAX){ const lote=files.slice(i,i+MAX); const loteText=i===0? text : `Continuação (${Math.floor(i/MAX)+1})`; await navigator.share({files:lote,text:loteText,title:'Relatório de Inspeção'}); } }catch(e){ alert('Compartilhamento cancelado/indisponível.'); }
};
</script>

<script>
/* ===== Vídeo Infinito (arquivo único quando suportado) + Eco ===== */
let segIndex=0, segStartTs=0, chunkBuffer=[], fileHandle=null, fileWritable=null;
let writeAsSingleFile=true; const segmentMsFallback=3600000; // 60 min

function getVideoBitrate(){ return econMode ? 1200000 : 2500000; }
function getOverlaySize(){ const vw=vid.videoWidth||1280, vh=vid.videoHeight||720; if(econMode){ const targetW=Math.min(960,vw); const targetH=Math.round(vh*(targetW/vw)); return {w:targetW,h:targetH}; } return {w:vw,h:vh}; }

async function startVideoRecording(){
  if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; }
  try{
    const videoStream=vid.srcObject; if(!videoStream){ alert('Câmera não disponível'); return; }
    const {w:ow,h:oh}=getOverlaySize(); const overlayCanvas=document.createElement('canvas'); overlayCanvas.width=ow; overlayCanvas.height=oh; const overlayCtx=overlayCanvas.getContext('2d');
    const canvasStream=overlayCanvas.captureStream(30); const audioTracks=videoStream.getAudioTracks(); if(audioTracks.length>0){ canvasStream.addTrack(audioTracks[0]); }
    const options={ mimeType:'video/webm;codecs=vp8,opus', videoBitsPerSecond:getVideoBitrate() }; if(!MediaRecorder.isTypeSupported(options.mimeType)){ options.mimeType='video/webm'; }
    mediaRecorder=new MediaRecorder(canvasStream, options);
    recordedChunks=[]; chunkBuffer=[]; segIndex=0; segStartTs=Date.now(); fileHandle=null; fileWritable=null;

    writeAsSingleFile=true;
    if('showSaveFilePicker' in window){
      try{ fileHandle=await window.showSaveFilePicker({ suggestedName:`VIDEO_INSPECAO_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.webm`, types:[{description:'Vídeo WebM', accept:{'video/webm':['.webm']}}] }); fileWritable=await fileHandle.createWritable(); }
      catch(e){ writeAsSingleFile=false; }
    } else { writeAsSingleFile=false; }

    mediaRecorder.ondataavailable=async (e)=>{ if(e.data && e.data.size>0){ if(writeAsSingleFile && fileWritable){ try{ await fileWritable.write(e.data); }catch(err){ console.error('write chunk fail',err); } } else { chunkBuffer.push(e.data); const elapsed=Date.now()-segStartTs; if(elapsed>=segmentMsFallback){ await finalizeCurrentSegment(); } } } };
    mediaRecorder.onstop=async ()=>{ if(writeAsSingleFile && fileWritable){ try{ await fileWritable.close(); }catch{} } else { if(chunkBuffer.length>0) await finalizeCurrentSegment(); } isRecordingVideo=false; btnVideoRecord.textContent='⏺️ Vídeo'; btnVideoRecord.classList.add('btn-red'); updateChip(); };

    mediaRecorder.start(1000);
    isRecordingVideo=true; btnVideoRecord.textContent='⏹️ Vídeo'; btnVideoRecord.classList.remove('btn-red'); updateChip();

    const drawLoop=()=>{ if(!isRecordingVideo) return;
      drawVideoToCanvas(overlayCtx,ow,oh);
      const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj?fmtKm(kmObj.km):'KM —'; const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=new Date().toLocaleString();
      const gpsLine = overlayOpts.showGps && lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
      stampOverlay(overlayCtx,ow,oh,overlayOpts.showKM?kmStr:'', overlayOpts.showIds?ids:[], overlayOpts.showTs?ts:'', gpsLine);
      requestAnimationFrame(drawLoop);
    };
    drawLoop(); startKmUpdate();
  }catch(e){ console.error('Erro ao iniciar gravação:', e); alert('Erro ao iniciar gravação: '+e.message); isRecordingVideo=false; updateChip(); }
}
async function finalizeCurrentSegment(){ try{ const blob=new Blob(chunkBuffer,{type:'video/webm'}); chunkBuffer.length=0; const url=URL.createObjectURL(blob); const now=new Date(); const dateStr=now.toISOString().slice(0,10); const timeStr=now.toTimeString().slice(0,8).replace(/:/g,'-'); const label=String(segIndex+1).padStart(3,'0'); const a=document.createElement('a'); a.href=url; a.download=`VIDEO_INSPECAO_${dateStr}_${timeStr}_seg${label}.webm`; document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 2000); segIndex++; segStartTs=Date.now(); }catch(err){ console.error('Erro ao finalizar segmento:', err); } }
function stopVideoRecording(){ if(!isRecordingVideo || !mediaRecorder) return; isRecordingVideo=false; stopKmUpdate(); try{ mediaRecorder.stop(); }catch{} updateChip(); }
btnVideoRecord.addEventListener('click', async ()=>{ if(isRecordingVideo){ btnVideoRecord.disabled=true; stopVideoRecording(); setTimeout(()=>{ btnVideoRecord.disabled=false; }, 500); } else { btnVideoRecord.disabled=true; try{ await startVideoRecording(); }catch(e){ console.error('Erro na gravação:', e); } btnVideoRecord.disabled=false; } });
</script>

<script>
/* ===== Restauração + Boot ===== */
async function restoreSavedPhotos(){ const rows=await dbGetAllPhotos(); if(!rows.length) return; for(const r of rows){ const url=await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(r.blob); }); photos.push({ id:r.id, url, blob:r.blob, w:r.w, h:r.h, ts:r.ts, kmStr:r.kmStr, idsTxt:r.idsTxt, filename:r.filename, lat:r.lat, lon:r.lon, acc:r.acc }); } if(photos.length){ foto.src=photos[photos.length-1].url; foto.dataset.filename=photos[photos.length-1].filename; } renderGallery(); }
function ready(){ return csvReady && camReady && gpsReady; }
function bindOverlayOpts(){ /* mantido simples: valores padrão já atendem */ }

async function boot(){
  await ensurePersistence();
  db = await openDBv3();
  bindOverlayOpts();
  await Promise.all([loadCSVs(), enumerateCameras()]);
  await startCamera(deviceIndex);
  await startGPS();
  await restoreSavedPhotos();
  startKmUpdate();
  setInterval(()=>{ updateStatusBar(); updateKmDisplay(); }, 600);
  setInterval(async ()=>{ if(!camReady) await startCamera(deviceIndex); if(!gpsReady) await startGPS(); }, 8000);
  applyFit(); updateControlBarTop();
}
</script>
