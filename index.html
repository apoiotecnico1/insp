<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V8.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }

        @media (orientation: landscape) {
            #app-shell { flex-direction: row; }
            #cam-view { flex: 3; }
            #ui-panel { flex: 0.9; border-left: 2px solid #222; min-width: 280px; }
        }

        @media (orientation: portrait) {
            #cam-view { height: 60vh; }
            #ui-panel { height: 40vh; border-top: 2px solid #222; }
        }

        /* Área da Câmera */
        #cam-view { position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #km-live { position: absolute; top: 15px; left: 15px; background: var(--green); padding: 10px 20px; border: 2px solid #fff; border-radius: 8px; font-size: 1.8rem; font-weight: 900; z-index: 10; }

        /* Botão Engrenagem (Referência Atualizada) */
        #gear-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #555; cursor: pointer; z-index: 100; font-size: 24px; }

        /* Menu de Ajustes Flyout */
        #settings-flyout { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #111; z-index: 200; transition: 0.3s; padding: 25px; border-left: 3px solid var(--gold); overflow-y: auto; }
        #settings-flyout.open { right: 0; }
        .set-row { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .set-row label { font-size: 11px; color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 14px; }

        /* Interface de Comandos */
        #ui-panel { background: var(--bg); display: flex; flex-direction: column; padding: 15px; gap: 10px; justify-content: center; }
        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .counter-item { background: #111; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .counter-item b { font-size: 1.4rem; display: block; color: var(--gold); }

        .btn { width: 100%; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-f { background: #333; color: #fff; height: 50px; font-size: 0.8rem; border: 1px solid #555; }
        .btn-on { background: var(--green); color: #fff; height: 80px; font-size: 1.2rem; }
        .btn-off { background: var(--danger); color: #fff; height: 80px; font-size: 1.2rem; }
        button:disabled { opacity: 0.2; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gear-btn" onclick="toggleSet()">⚙️</div>

<div id="settings-flyout">
    <h4 style="margin-bottom:20px; font-size:16px; border-bottom:1px solid #333; padding-bottom:10px;">AJUSTES TÉCNICOS</h4>
    <div class="set-row">
        <label>Data/Hora no Relatório</label>
        <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>
    <div class="set-row">
        <label>Coordenadas GPS</label>
        <select id="cfg-gps"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>
    <div class="set-row">
        <label>Fotos por Lote</label>
        <input type="number" id="cfg-batch-size" value="50">
    </div>
    <div class="set-row">
        <label>Intervalo (ms)</label>
        <input type="number" id="cfg-interval" value="750">
    </div>
    <button onclick="toggleSet()" style="width:100%; padding:15px; background:var(--danger); color:#fff; border:none; border-radius:8px; font-weight:bold;">SALVAR E VOLTAR</button>
</div>

<div id="app-shell">
    <div id="cam-view">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-live">Km ---+---</div>
    </div>
    <div id="ui-panel">
        <div class="counter-grid">
            <div class="counter-item"><small style="color:#666">LOTE</small><b id="v-batch">0/50</b></div>
            <div class="counter-item"><small style="color:#666">TOTAL</small><b id="v-total">0</b></div>
        </div>
        <button id="btn-dir" class="btn btn-f" onclick="setupFolder()">📁 DEFINIR PASTA DESTINO</button>
        <button id="btn-start" class="btn btn-on" disabled onclick="startCapture()">▶ INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn btn-off" style="display:none;" onclick="stopCapture()">■ FINALIZAR LOTE</button>
        <div id="status" style="font-size:11px; color:#444; text-align:center; margin-top:10px">MODO FULL IMMERSIVE V8.5</div>
    </div>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB = [], gps = null, active = false, buffer = [], totalCount = 0, hFolder = null, batchNum = 0;
const vid = document.getElementById('vid'), proc = document.getElementById('proc'), ctx = proc.getContext('2d');

window.onload = () => { initCam(); loadCSV(); initGPS(); };
function toggleSet() { document.getElementById('settings-flyout').classList.toggle('open'); }

async function initCam() {
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:1920, height:1080}});
    vid.srcObject = s;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

async function setupFolder() {
    hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btn-dir').innerText = "PASTA OK ✓";
    document.getElementById('btn-start').disabled = false;
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt]?.replace(',','.')), ln: parseFloat(c[iln]?.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let near = null, dMin = Infinity;
    for(const pt of kmDB) {
        const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
        if(d < dMin) { dMin = d; near = pt; }
    }
    if(near) document.getElementById('km-live').innerText = "Km " + near.km;
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; buffer = []; batchNum++;
    const doc = new jspdf.jsPDF(proc.width > proc.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        await new Promise(r => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = proc.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, proc.height-bh, proc.width, bh);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${bh*0.4}px Arial`;
                ctx.fillText("Km " + items[i].km, proc.width*0.05, proc.height-(bh*0.35));
                let info = "";
                if(document.getElementById('cfg-date').value==='S') info += items[i].ts + " ";
                if(document.getElementById('cfg-gps').value==='S') info += `[${items[i].lat}, ${items[i].lon}]`;
                ctx.font = `${bh*0.18}px monospace`; ctx.textAlign="right";
                ctx.fillText(info, proc.width*0.95, proc.height-(bh*0.42));
                doc.addImage(proc.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph); r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hFolder.getFileHandle(`INSPECAO_LOTE_${batchNum}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function startCapture() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    active = true; document.getElementById('btn-start').style.display='none'; document.getElementById('btn-stop').style.display='block';
    loop();
}

function stopCapture() { active = false; saveBatch(); document.getElementById('btn-start').style.display='block'; document.getElementById('btn-stop').style.display='none'; }

function loop() {
    if(!active) return;
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    buffer.push({
        raw: proc.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-live').innerText.replace("Km ", ""),
        ts: new Date().toLocaleString('pt-BR'),
        lat: gps ? gps.lat.toFixed(6) : "0", lon: gps ? gps.lon.toFixed(6) : "0"
    });
    totalCount++;
    const bLimit = parseInt(document.getElementById('cfg-batch-size').value) || 50;
    document.getElementById('v-total').innerText = totalCount;
    document.getElementById('v-batch').innerText = `${buffer.length}/${bLimit}`;
    if(buffer.length >= bLimit) saveBatch();
    setTimeout(loop, parseInt(document.getElementById('cfg-interval').value) || 750);
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        updateKM();
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
