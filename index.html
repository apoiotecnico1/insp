<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Liberação - Defensas Metálicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-badge { font-size: 0.85rem; }
        .liberado { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .bloqueado { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .card-header { background-color: #343a40; color: white; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom">
        <h1 class="display-6 fw-bold text-dark">Liberação de Implantação de Defensas</h1>
        <p class="text-muted">Controle de sondagem e acompanhamento de fibras ópticas</p>
    </header>

    <div class="card mb-4 shadow-sm">
        <div class="card-header">Cadastrar Novo Trecho (Empresa Terceira)</div>
        <div class="card-body">
            <form id="formCadastro" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">KM</label>
                    <input type="text" id="km" class="form-control" placeholder="Ex: 125+500" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Sentido</label>
                    <select id="sentido" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="Norte">Norte (Rio de Janeiro)</option>
                        <option value="Sul">Sul (São Paulo)</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Adicionar à Lista</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>KM / Sentido</th>
                            <th class="text-center">Setor CLARO (Lado A)</th>
                            <th class="text-center">Setor CCR (Lado B)</th>
                            <th class="text-center">Status Final</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('formCadastro');
    const tabela = document.getElementById('tabelaCorpo');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const km = document.getElementById('km').value;
        const sentido = document.getElementById('sentido').value;
        const id = Date.now();

        const row = document.createElement('tr');
        row.id = `row-${id}`;
        row.innerHTML = `
            <td>
                <strong>${km}</strong><br>
                <small class="text-muted">${sentido}</small>
            </td>
            <td>
                <div class="p-2 border rounded">
                    <div class="form-check">
                        <input class="form-check-input check-claro" type="checkbox" onchange="validar(${id})">
                        <label class="form-label small mb-1">Fibra Detectada?</label>
                    </div>
                    <textarea class="form-control form-control-sm mb-1 obs-claro" placeholder="Obs/Sondagem" oninput="validar(${id})"></textarea>
                    <select class="form-select form-select-sm lib-claro" onchange="validar(${id})">
                        <option value="0">Aguardando</option>
                        <option value="1">LIBERADO</option>
                    </select>
                </div>
            </td>
            <td>
                <div class="p-2 border rounded">
                    <div class="form-check">
                        <input class="form-check-input check-ccr" type="checkbox" onchange="validar(${id})">
                        <label class="form-label small mb-1">Fibra Detectada?</label>
                    </div>
                    <textarea class="form-control form-control-sm mb-1 obs-ccr" placeholder="Obs/Acompanhamento" oninput="validar(${id})"></textarea>
                    <select class="form-select form-select-sm lib-ccr" onchange="validar(${id})">
                        <option value="0">Aguardando</option>
                        <option value="1">LIBERADO</option>
                    </select>
                </div>
            </td>
            <td class="text-center status-col">
                <span class="badge rounded-pill bg-danger">BLOQUEADO</span>
                <br><small class="text-muted">Pendente aval de ambos</small>
            </td>
        `;

        tabela.appendChild(row);
        form.reset();
    });

    function validar(id) {
        const row = document.getElementById(`row-${id}`);
        const libClaro = row.querySelector('.lib-claro').value;
        const libCCR = row.querySelector('.lib-ccr').value;
        const statusCol = row.querySelector('.status-col');
        
        const fibraClaro = row.querySelector('.check-claro').checked ? "COM FIBRA" : "SEM FIBRA";
        const fibraCCR = row.querySelector('.check-ccr').checked ? "COM FIBRA" : "SEM FIBRA";

        if (libClaro === "1" && libCCR === "1") {
            row.classList.add('liberado');
            row.classList.remove('bloqueado');
            statusCol.innerHTML = `
                <span class="badge rounded-pill bg-success">AUTORIZADO</span><br>
                <small class="fw-bold text-success">Pronto para Implantação</small>
            `;
        } else {
            row.classList.remove('liberado');
            row.classList.add('bloqueado');
            statusCol.innerHTML = `
                <span class="badge rounded-pill bg-danger">BLOQUEADO</span><br>
                <small class="text-muted">Aguardando liberações</small>
            `;
        }
    }
</script>

</body>
</html>
