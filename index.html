<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5 - MODO ENGENHARIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 65vw !important; height: 100vh !important; }
            #controls { width: 35vw; height: 100vh; overflow-y: auto; background: #050a16; }
        }

        #viewport { position: relative; width: 100vw; height: 42vh; background: #000; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 12px;
            font-size: 2.8rem; font-weight: 900; border: 4px solid #fff;
            margin: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        #settings-trigger {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid var(--accent); font-size: 20px;
        }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%;
            background: rgba(10, 18, 36, 0.98); z-index: 2000; transition: 0.4s;
            overflow-y: auto; padding: 20px; border-left: 4px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding-bottom: 10px; border-bottom: 1px solid #222; }
        select, input { background: #000; color: #fff; border: 1px solid var(--accent); padding: 8px; border-radius: 5px; font-size: 0.9rem; width: 60%;}
        
        .status-bar { display: flex; justify-content: space-around; padding: 10px; background: #050a16; }
        .st { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #111; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .val { display: block; font-size: 1.3rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.action { padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #dirSelector { background: var(--gold); color: #000; grid-column: span 2; }
        #dirSelector.ready { background: #00ff66; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h2 style="color:var(--accent); margin-top:0">ENGENHARIA SETUP</h2>
    
    <div class="setting-item">
        <span>Dispositivo de Vídeo:</span>
        <select id="camSelect" onchange="changeCamera(this.value)"></select>
    </div>

    <div class="setting-item">Brilho: <input type="range" id="cfgBright" min="50" max="150" value="100" oninput="saveCfg()"></div>
    <div class="setting-item">Contraste: <input type="range" id="cfgContrast" min="50" max="150" value="100" oninput="saveCfg()"></div>
    <div class="setting-item">Intervalo (ms): <input type="number" id="cfgDelay" value="500" style="width:70px" onchange="saveCfg()"></div>
    <div class="setting-item">Lote (Fotos): <input type="number" id="cfgBatch" value="100" style="width:70px" onchange="saveCfg()"></div>
    
    <hr style="border:0; border-top:1px solid #333; margin:20px 0">
    
    <button onclick="resetConfigs()" style="width:100%; padding:12px; background:#444; color:white; border:none; border-radius:8px; margin-bottom:10px">REDEFINIR PADRÕES</button>
    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:bold">FECHAR E APLICAR</button>
</div>

<div id="main-container">
    <div id="viewport"><video id="vid" autoplay playsinline muted></video></div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: AGUARDANDO</div>
            <div id="stGps" class="st">GPS: BUSCANDO</div>
        </div>

        <div class="dashboard">
            <div class="card">TOTAL<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/0</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer">GERAR LOTE<span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="dirSelector" class="action">1. ESCOLHER PASTA DE SALVAMENTO</button>
            <button id="btnStart" class="action" disabled>2. INICIAR CAPTURA</button>
            <button id="btnStop" class="action" disabled>FINALIZAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null;
let currentStream = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// PERSISTÊNCIA E CONFIGURAÇÕES
function saveCfg() {
    const cfg = {
        bright: document.getElementById('cfgBright').value,
        contrast: document.getElementById('cfgContrast').value,
        delay: document.getElementById('cfgDelay').value,
        batch: document.getElementById('cfgBatch').value,
        camId: document.getElementById('camSelect').value
    };
    localStorage.setItem('inspec_cfg', JSON.stringify(cfg));
}

function loadCfg() {
    const saved = localStorage.getItem('inspec_cfg');
    if(saved) {
        const cfg = JSON.parse(saved);
        document.getElementById('cfgBright').value = cfg.bright;
        document.getElementById('cfgContrast').value = cfg.contrast;
        document.getElementById('cfgDelay').value = cfg.delay;
        document.getElementById('cfgBatch').value = cfg.batch;
        return cfg.camId;
    }
    return null;
}

function resetConfigs() {
    localStorage.removeItem('inspec_cfg');
    location.reload();
}

// GESTÃO DE CÂMERAS (DEVICE 1, 2, 3...)
async function listCameras() {
    // Solicita permissão primeiro para obter os labels reais
    try { await navigator.mediaDevices.getUserMedia({video: true}); } catch(e) {}
    
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('camSelect');
    select.innerHTML = '';
    
    cams.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = c.deviceId;
        // Tenta usar o nome real, se não, numera como Device X
        opt.text = c.label || `Device ${i + 1}`;
        select.appendChild(opt);
    });
    
    const lastCam = loadCfg();
    if(lastCam && cams.some(c => c.deviceId === lastCam)) {
        select.value = lastCam;
    }
    initCamera(select.value);
}

async function initCamera(deviceId) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    const constraints = {
        video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" },
        audio: false
    };
    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        vid.srcObject = currentStream;
        saveCfg();
    } catch(e) { console.error("Erro câmera:", e); }
}

function changeCamera(id) { initCamera(id); }

// MOTOR DE ESTAMPA (PLACA RODOVIÁRIA REAL)
function drawStamp(data) {
    const w = can.width, h = can.height;
    const base = h / 1080; // Escala baseada em Full HD
    
    ctx.save();
    
    // Dimensões da Placa
    const pW = 420 * base;
    const pH = 140 * base;
    const margin = 30 * base;
    const pX = margin;
    const pY = h - pH - margin;
    const corner = 15 * base;

    // 1. SOMBRA DA PLACA (Efeito 3D)
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur = 15 * base;
    ctx.shadowOffsetY = 8 * base;

    // 2. FUNDO VERDE OFICIAL (Arredondado)
    ctx.beginPath();
    ctx.roundRect(pX, pY, pW, pH, corner);
    ctx.fillStyle = "#056b3c"; // Verde Rodoviário DNIT/DER
    ctx.fill();
    
    ctx.shadowBlur = 0; // Remove sombra para o friso e texto

    // 3. FRISO BRANCO INTERNO (Moldura)
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 4 * base;
    ctx.strokeRect(pX + (12 * base), pY + (12 * base), pW - (24 * base), pH - (24 * base));

    // 4. TEXTO KM (Fonte de Elite, Clara)
    ctx.fillStyle = "white";
    ctx.font = `bold ${62 * base}px Arial, sans-serif`;
    ctx.fillText("KM " + data.km, pX + 40 * base, pY + 80 * base);

    // 5. LEGENDA TÉCNICA (Compacta)
    ctx.font = `bold ${20 * base}px 'Courier New', monospace`;
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fillText(`LAT: ${data.lat}`, pX + 40 * base, pY + 115 * base);
    ctx.fillText(`LON: ${data.lon}`, pX + 220 * base, pY + 115 * base);
    ctx.fillText(`${data.ts}`, pX + 40 * base, pY + 138 * base);

    ctx.restore();
}

async function captureLoop() {
    if(!isRecording) return;
    can.width = vid.videoWidth; 
    can.height = vid.videoHeight;

    ctx.filter = `brightness(${document.getElementById('cfgBright').value}%) contrast(${document.getElementById('cfgContrast').value}%)`;
    ctx.drawImage(vid, 0, 0);
    ctx.filter = 'none';

    const data = {
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        ts: new Date().toLocaleString()
    };
    drawStamp(data);

    activeBuffer.push({ img: can.toDataURL('image/jpeg', 0.8) });
    photoCount++;
    
    const limit = parseInt(document.getElementById('cfgBatch').value);
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${limit}`;

    if(activeBuffer.length >= limit) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

async function savePDF() {
    if(!activeBuffer.length || !directoryHandle) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4', compress: true });

    for(let i=0; i < batch.length; i++) {
        if(i > 0) doc.addPage();
        // Preenche o A4 totalmente (0,0 a 297,210)
        doc.addImage(batch[i].img, 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
    }

    try {
        const fileHandle = await directoryHandle.getFileHandle(`LOTE_${pdfCount}_${Date.now()}.pdf`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (e) { doc.save(`EMERGENCIA_${pdfCount}.pdf`); }
}

// EVENTOS
document.getElementById('dirSelector').onclick = async () => {
    try {
        directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('dirSelector').textContent = "DIRETÓRIO ATIVO ✓";
        document.getElementById('dirSelector').classList.add('ready');
        document.getElementById('btnStart').disabled = false;
    } catch(e) {}
};

document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
document.getElementById('btnSaveManual').onclick = savePDF;

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

// GPS E CSV
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const lines = t.split('\n').slice(1);
        kmDataset = lines.map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(d => !isNaN(d.lat));
        document.getElementById('stCsv').textContent = "CSV: CONECTADO";
        document.getElementById('stCsv').classList.add('ok');
    } catch(e) {}
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: SINAL OK";
    document.getElementById('stGps').classList.add('ok');
    if(kmDataset.length) {
        let best = null, minDist = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < minDist) { minDist = d; best = pt; }
        });
        if(best) document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

listCameras(); loadCSV();
</script>
</body>
</html>
