<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V16 - OMNI EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.4); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* VÍDEO IMERSIVO */
        #cam-layer { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM - SEMPRE VISÍVEL E DESTACADO */
        #hud-top { 
            position: absolute; top: 30px; left: 30px; z-index: 100;
            pointer-events: none;
        }
        .placa-km { 
            background: linear-gradient(180deg, rgba(5, 107, 60, 0.9) 0%, rgba(1, 49, 27, 0.9) 100%); 
            padding: 10px 30px; border-radius: 15px; border-left: 6px solid #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        #km-txt { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; color: #fff; }

        /* BOTÕES DE ATALHO (MINIMALISTAS) */
        #quick-btns {
            position: absolute; top: 30px; right: 30px; 
            display: flex; flex-direction: column; gap: 20px; z-index: 1000;
            transition: 0.4s;
        }
        .icon-btn { 
            width: 50px; height: 50px; background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); font-size: 22px; cursor: pointer;
        }
        .hide-controls { opacity: 0; pointer-events: none; transform: translateX(20px); }

        /* DOCK CENTRAL DE COMANDOS (TELA CHEIA / TOQUE) */
        #ui-overlay {
            position: absolute; inset: 0; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; pointer-events: none;
        }
        #ui-overlay.active { opacity: 1; pointer-events: auto; }

        .dock-central {
            width: 85%; max-width: 450px; text-align: center;
            display: flex; flex-direction: column; gap: 15px; padding: 30px;
            background: rgba(20,20,20,0.8); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-main { 
            width: 100%; padding: 22px; border: none; border-radius: 18px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            font-size: 15px; transition: 0.3s;
        }
        .btn-start { background: linear-gradient(90deg, #00ff88, #009e54); color: #000; }
        .btn-stop { background: linear-gradient(90deg, #ff4444, #b30000); color: #fff; }
        .btn-folder { background: #fff; color: #000; }
        .btn-main:active { transform: scale(0.96); }

        /* STATUS DE GRAVAÇÃO */
        #save-label {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: var(--gold); font-weight: 900; letter-spacing: 2px;
            background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 20px; 
            z-index: 1000; display: none; border: 1px solid var(--gold);
        }

        canvas { display: none; }
    </style>
</head>
<body onclick="toggleUI()">

<div id="cam-layer"><video id="vid" autoplay playsinline muted></video></div>

<div id="hud-top">
    <div class="placa-km"><div id="km-txt">KM ---+---</div></div>
</div>

<div id="quick-btns">
    <div class="icon-btn" onclick="switchCam(); event.stopPropagation();">🔄</div>
    <div class="icon-btn" onclick="toggleSettings(); event.stopPropagation();">⚙️</div>
</div>

<div id="ui-overlay">
    <div class="dock-central">
        <h2 style="margin-bottom: 10px; font-weight: 900; letter-spacing: -1px;">INSPEÇÃO PRO V16</h2>
        <button id="btn-dir" class="btn-main btn-folder" onclick="pickFolder(); event.stopPropagation();">📁 CONECTAR PASTA</button>
        <button id="btn-start" class="btn-main btn-start" disabled onclick="startApp(); event.stopPropagation();">▶ INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-main btn-stop" style="display:none" onclick="stopApp(); event.stopPropagation();">■ PARAR E SALVAR</button>
        <div style="font-size: 12px; margin-top: 10px; color: #888;">
            LOTE ATUAL: <span id="v-batch" style="color:var(--gold)">0</span> / 50<br>
            TOTAL GERAL: <span id="v-total" style="color:var(--gold)">0</span>
        </div>
    </div>
</div>

<div id="save-label">GERANDO PDF...</div>

<canvas id="proc"></canvas>

<script>
let kmDB=[], gps=null, active=false, buffer=[], total=0, batchCount=0, hFolder=null, cams=[], uiTimer;
const vid=document.getElementById('vid'), proc=document.getElementById('proc'), ctx=proc.getContext('2d');

window.onload = async () => { await loadCams(); loadCSV(); initGPS(); };

async function loadCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    cams = devices.filter(d => d.kind === 'videoinput');
    if(cams.length) initCam(cams[cams.length-1].deviceId);
}

async function initCam(id) {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

function switchCam() {
    let current = cams.findIndex(c => c.deviceId === vid.srcObject.getTracks().getSettings().deviceId);
    let next = (current + 1) % cams.length;
    initCam(cams[next].deviceId);
    vibrate(40);
}

function toggleUI() {
    const overlay = document.getElementById('ui-overlay');
    const qBtns = document.getElementById('quick-btns');
    
    overlay.classList.toggle('active');
    qBtns.classList.toggle('hide-controls');

    clearTimeout(uiTimer);
    if(active && !overlay.classList.contains('active')) {
        uiTimer = setTimeout(() => {
            qBtns.classList.add('hide-controls');
        }, 4000);
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        if(kmDB.length) {
            let near = null, dMin = Infinity;
            for(const pt of kmDB) {
                const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
                if(d < dMin) { dMin = d; near = pt; }
            }
            if(near) document.getElementById('km-txt').innerText = "KM " + near.km;
        }
    }, null, {enableHighAccuracy: true});
}

async function pickFolder() {
    try {
        hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-dir').innerText = "✓ PASTA PRONTA";
        document.getElementById('btn-start').disabled = false;
        vibrate(60);
    } catch(e) { alert("Pasta obrigatória para salvar."); }
}

function startApp() {
    active = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    toggleUI(); // Fecha o menu ao iniciar
    vibrate();
    loop();
}

async function stopApp() {
    active = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    if(buffer.length > 0) await saveBatch();
    vibrate(200);
}

function loop() {
    if(!active) return;
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    buffer.push({
        raw: proc.toDataURL('image/jpeg', 0.7),
        km: document.getElementById('km-txt').innerText.replace("KM ", ""),
        ts: new Date().toLocaleString('pt-BR').toUpperCase()
    });
    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = buffer.length;
    if(buffer.length >= 50) saveBatch();
    setTimeout(loop, 800);
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; buffer = []; batchCount++;
    document.getElementById('save-label').style.display = 'block';
    try {
        const doc = new jspdf.jsPDF('l', 'mm', 'a4');
        for(let i=0; i<items.length; i++){
            if(i > 0) doc.addPage();
            const img = new Image();
            await new Promise(r => {
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                    const bh = proc.height * 0.16;
                    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, proc.height-bh, proc.width, bh);
                    ctx.fillStyle = "#ffcc00"; ctx.font = `bold ${bh*0.48}px Arial`;
                    ctx.fillText("KM " + items[i].km, 60, proc.height-(bh*0.42));
                    ctx.fillStyle = "#fff"; ctx.font = `${bh*0.16}px monospace`;
                    ctx.fillText(items[i].ts, 60, proc.height-(bh*0.18));
                    doc.addImage(proc.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                    r();
                };
                img.src = items[i].raw;
            });
        }
        const fileHandle = await hFolder.getFileHandle(`LOTE_${batchCount}_KM_${items.km}.pdf`, {create:true});
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob')); await writable.close();
        vibrate();
    } catch(e) { alert("Erro de gravação. Reconecte a pasta."); }
    document.getElementById('save-label').style.display = 'none';
}

function toggleSettings() { alert("Config: 50 fotos/PDF | Intervalo 800ms."); }
function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
</script>
</body>
</html>
