<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom Ultra V6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --blue: #007bff; --red: #ff1744; --orange: #ff9100; --glass: rgba(10, 10, 10, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM E CONTADOR */
        #hud-top { 
            position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; z-index: 500;
        }
        .hud-box { 
            background: var(--glass); padding: 8px 15px; border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; backdrop-filter: blur(10px); text-align: center;
        }
        #km-txt { font-size: 1.8rem; font-weight: 900; color: var(--accent); display: block; }
        .hud-label { font-size: 0.6rem; font-weight: bold; text-transform: uppercase; opacity: 0.7; }

        /* GRADE DE COMANDO REDUZIDA */
        #action-grid {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: grid; grid-template-columns: repeat(2, 75px); gap: 6px; z-index: 500;
        }
        .act-btn {
            height: 60px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--glass); color: #fff; font-size: 0.5rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center; text-align: center;
            text-transform: uppercase; backdrop-filter: blur(5px); padding: 4px;
        }
        .act-btn:active { background: #fff; color: #000; }
        .c-ilum { border-left: 4px solid var(--accent); }
        .c-def { border-left: 4px solid var(--red); }
        .c-fib { border-left: 4px solid var(--blue); }
        .c-aten { border-left: 4px solid var(--orange); }

        /* CONTROLES */
        #footer {
            position: absolute; bottom: 25px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 500;
        }
        .btn-rec { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; }
        .recording { background: var(--red) !important; color: #fff; animation: pulse 1s infinite; }
        .gear-btn { background: var(--glass); border: 1px solid #fff; color: #fff; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* CONFIGS */
        #config-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .cfg-row { width: 100%; max-width: 280px; margin-bottom: 15px; }
        select, input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid var(--accent); border-radius: 5px; }

        @keyframes pulse { 50% { opacity: 0.5; } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate">
    <h2 style="color:var(--accent); font-weight:900;">ANGSTROM V6</h2>
    <button class="btn-rec" style="margin-top:20px" onclick="startApp()">ATIVAR SISTEMA</button>
</div>

<div id="config-panel">
    <h3 style="color:var(--accent); margin-bottom:20px;">CONFIGURAÇÕES</h3>
    <div class="cfg-row">
        <label class="hud-label">Câmera Ativa:</label>
        <select id="cam-select" onchange="changeCam()"></select>
    </div>
    <div class="cfg-row">
        <label class="hud-label">Intervalo Lote (ms):</label>
        <input type="number" id="ms-input" value="450" onchange="msInterval = this.value">
    </div>
    <button class="btn-rec" onclick="document.getElementById('config-panel').style.display='none'">FECHAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="hud-top">
        <div class="hud-box">
            <span class="hud-label">KM ATUAL</span>
            <span id="km-txt">---</span>
        </div>
        <div class="hud-box">
            <span class="hud-label">LOTE (FOTOS)</span>
            <span id="lote-count" style="font-size: 1.8rem; font-weight: 900;">000</span>
        </div>
    </div>

    <div id="action-grid">
        <button class="act-btn c-ilum" onclick="quickAction('ILUMINAÇÃO APAGADA')">ILUM. APAGADA</button>
        <button class="act-btn c-ilum" onclick="quickAction('ABRIR O.S.')">ABRIR O.S.</button>
        <button class="act-btn c-def" onclick="quickAction('POSTE APAGADO')">POSTE APAGADO</button>
        <button class="act-btn c-def" onclick="quickAction('LUMINÁRIA APAGADA')">LUM. APAGADA</button>
        <button class="act-btn c-fib" onclick="quickAction('FIBRA ROMPIDA')">FIBRA ROMPIDA</button>
        <button class="act-btn c-fib" onclick="quickAction('BACKBONE ABERTA')">BACKBONE ABERTA</button>
        <button class="act-btn c-fib" onclick="quickAction('ALARME DE FIBRA')">ALARME FIBRA</button>
        <button class="act-btn c-fib" onclick="quickAction('INOPERANTE')">INOPERANTE</button>
        <button class="act-btn c-aten" onclick="quickAction('VANDALISMO')">VANDALISMO</button>
        <button class="act-btn c-aten" onclick="quickAction('DANIFICADO')">DANIFICADO</button>
        <button class="act-btn c-aten" onclick="quickAction('ATENÇÃO')">ATENÇÃO</button>
        <button class="act-btn" style="border-left:4px solid #fff" onclick="quickAction('NORMALIZADO')">NORMALIZADO</button>
    </div>

    <div id="footer">
        <button class="gear-btn" onclick="document.getElementById('config-panel').style.display='flex'">⚙️</button>
        <button id="btn-rec" class="btn-rec" onclick="toggleRec()">GRAVAR LOTE</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false, hDir = null, buffer = [], currentLabel = "INSPEÇÃO NORMAL";
let curLat = 0, curLon = 0, msInterval = 450, currentStream = null;

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
        
        await listCameras();
        await setupCamera();
        loadCSV(); initGPS();
    } catch(e) { }
}

async function listCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('cam-select');
    select.innerHTML = videoDevices.map((d, i) => `<option value="${d.deviceId}">${d.label || 'Câmera ' + i}</option>`).join('');
}

async function setupCamera(id) {
    // Para as câmeras atuais antes de trocar
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    const constraints = { 
        video: { 
            deviceId: id ? { exact: id } : undefined, 
            width: { ideal: 1920 }, height: { ideal: 1080 },
            facingMode: id ? undefined : "environment"
        } 
    };
    
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    const vid = document.getElementById('vid');
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { 
        const can = document.getElementById('c');
        can.width = vid.videoWidth; can.height = vid.videoHeight;
    };
}

async function changeCam() {
    const id = document.getElementById('cam-select').value;
    await setupCamera(id);
}

async function quickAction(label) {
    currentLabel = label;
    const f = document.getElementById('flash');
    f.style.opacity = "0.4"; setTimeout(() => f.style.opacity = "0", 60);
    await renderFrame(true);
    currentLabel = "INSPEÇÃO NORMAL";
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude; curLon = p.coords.longitude;
        if (kmDB.length) {
            let closest = null, minD = Infinity;
            for (let pt of kmDB) {
                const d = Math.hypot(pt.lt - curLat, pt.ln - curLon);
                if (d < minD) { minD = d; closest = pt; }
            }
            if (closest) document.getElementById('km-txt').innerText = `${closest.km}`;
        }
    }, null, { enableHighAccuracy: true });
}

function toggleRec() {
    capturing = !capturing;
    const btn = document.getElementById('btn-rec');
    if (capturing) {
        btn.innerText = "FINALIZAR";
        btn.classList.add('recording');
        buffer = [];
        updateCounter();
        recordLoop();
    } else {
        btn.innerText = "SALVANDO...";
        btn.classList.remove('recording');
        generatePDF();
    }
}

function recordLoop() {
    if (!capturing) return;
    renderFrame(false);
    setTimeout(recordLoop, msInterval);
}

function updateCounter() {
    document.getElementById('lote-count').innerText = buffer.length.toString().padStart(3, '0');
}

async function renderFrame(isManual) {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    const km = document.getElementById('km-txt').innerText;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    ctx.fillStyle = currentLabel.includes('NORMALIZADO') ? '#fff' : (currentLabel.includes('FIBRA') ? '#007bff' : '#ff1744');
    ctx.fillRect(0, can.height - bh, 15, bh);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 42px Arial";
    ctx.fillText(`${currentLabel} | Km ${km}`, 40, can.height - (bh * 0.55));
    ctx.font = "22px Arial";
    ctx.fillText(`${new Date().toLocaleString()} | GPS: ${curLat.toFixed(6)}, ${curLon.toFixed(6)}`, 40, can.height - (bh * 0.22));

    const data = can.toDataURL('image/jpeg', 0.8);
    buffer.push(data);
    updateCounter();

    if (isManual) {
        try {
            const blob = await (await fetch(data)).blob();
            const safeLabel = currentLabel.replace(/[\/\\?%*:|"<>]/g, '-');
            const handle = await hDir.getFileHandle(`${safeLabel}_Km${km}_${Date.now()}.jpg`, {create:true});
            const w = await handle.createWritable();
            await w.write(blob); await w.close();
        } catch(e) { }
    }
}

async function generatePDF() {
    if (!buffer.length) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < buffer.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const blob = doc.output('blob');
    const handle = await hDir.getFileHandle(`RELATORIO_${Date.now()}.pdf`, {create:true});
    const w = await handle.createWritable();
    await w.write(blob); await w.close();
    document.getElementById('btn-rec').innerText = "GRAVAR LOTE";
    document.getElementById('lote-count').innerText = "000";
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const text = await r.text();
        const rows = text.split('\n').filter(row => row.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iKm = h.indexOf('km'), iLat = h.findIndex(v => v.includes('lat')), iLon = h.findIndex(v => v.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[iKm], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { }
}
</script>
</body>
</html>
