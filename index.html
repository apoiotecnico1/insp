<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Captura Técnica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: rgba(0, 121, 52, 0.85); --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM - ESTILO PLACA DE TRÂNSITO */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa); 
            padding: 12px 25px; 
            border: 4px solid #fff; 
            border-radius: 12px; z-index: 100;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            text-align: center;
        }
        #br-txt { font-size: 0.9rem; font-weight: 800; display: block; border-bottom: 2px solid #fff; margin-bottom: 4px; text-transform: uppercase; }
        #km-txt { font-size: 2.6rem; font-weight: 900; margin: 0; line-height: 1.1; }

        /* BOTÃO JPG DISCRETO */
        #shutter-zone {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 60; cursor: pointer;
        }
        #btn-jpg { 
            width: 75px; height: 75px; border: 3px solid rgba(255,255,255,0.4); border-radius: 50%;
            background: rgba(255,255,255,0.1); margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
        }
        #btn-jpg::after { content: ''; width: 30px; height: 30px; background: #fff; border-radius: 50%; opacity: 0.8; }
        .label-jpg { font-size: 10px; font-weight: 800; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 4px; letter-spacing: 1px; }

        /* CONTROLES INFERIORES */
        #ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; align-items: center; }
        .btn { border: none; padding: 20px 40px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #start { background: var(--accent); color: #000; }
        #stop { background: var(--danger); color: #fff; display: none; }
        #gear { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #fff; }

        #rec-tag { position: absolute; top: 25px; right: 25px; background: rgba(255,0,0,0.7); padding: 8px 15px; border-radius: 20px; display: none; font-weight: bold; z-index: 100; }
        canvas { display: none; }
    </style>
</head>
<body onclick="enableWakeLock()">

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <span id="br-txt">RODOVIA</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="shutter-zone" onclick="takeInstantJPG()">
        <div id="btn-jpg"></div>
        <div class="label-jpg">[ CAPTURA FOTO ATUAL .JPG ]</div>
    </div>

    <div id="rec-tag">● GRAVANDO PDF</div>

    <div id="ui">
        <div id="gear" onclick="alert('Configurações: Use o código para ajustar tempo/lote')">⚙</div>
        <button id="start" class="btn" onclick="startSystem()">INICIAR PDF</button>
        <button id="stop" class="btn" onclick="stopSystem()">PARAR E SALVAR PDF</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer=[], hDir=null, brAtual="BR-116", wakeLock=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// MANTER TELA ACESA
async function enableWakeLock() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
}

// ESTAMPA TÉCNICA (JPG E PDF)
function drawStamp(km, br, data) {
    const h = can.height;
    const w = can.width;
    const barH = h * 0.15;

    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, h - barH, w, barH);

    // SOMBRA ESTILOSA
    ctx.shadowColor = "black";
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 4;
    ctx.shadowOffsetY = 4;

    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${barH * 0.38}px Arial`;
    ctx.fillText(`${br} - Km ${km}`, 40, h - (barH * 0.48));

    ctx.font = `${barH * 0.22}px Arial`;
    ctx.fillText(data, 40, h - (barH * 0.18));

    ctx.shadowColor = "transparent";
}

async function startSystem() {
    try {
        if(!hDir) hDir = await window.showDirectoryPicker();
        document.documentElement.requestFullscreen();
        enableWakeLock();
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };

        loadCSV();
        initGPS();

        capturing = true;
        buffer = [];
        document.getElementById('start').style.display = 'none';
        document.getElementById('stop').style.display = 'block';
        document.getElementById('rec-tag').style.display = 'block';
        loop();
    } catch(e) { alert("Selecione a pasta de destino."); }
}

function takeInstantJPG() {
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const data = new Date().toLocaleString('pt-BR');
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, brAtual, data);

    can.toBlob(async (blob) => {
        const file = await hDir.getFileHandle(`FOTO_${brAtual}_KM_${km}_${Date.now()}.jpg`, { create: true });
        const stream = await file.createWritable();
        await stream.write(blob);
        await stream.close();
    }, 'image/jpeg', 0.95);
}

function loop() {
    if(!capturing) return;
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const data = new Date().toLocaleString('pt-BR');
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, brAtual, data);
    
    buffer.push({ img: can.toDataURL('image/jpeg', 0.6), km: km });

    if(buffer.length >= 50) {
        const temp = [...buffer];
        buffer = [];
        savePDF(temp);
    }
    setTimeout(loop, 1000); // 1 foto por segundo no PDF
}

async function stopSystem() {
    capturing = false;
    document.getElementById('rec-tag').style.display = 'none';
    if(buffer.length > 0) await savePDF(buffer);
    if(wakeLock) wakeLock.release();
    alert("Processo Finalizado!");
    location.reload();
}

async function savePDF(lista) {
    const { jsPDF } = window.jspdf;
    const orient = can.width > can.height ? 'l' : 'p';
    const doc = new jsPDF(orient, 'px', [can.width, can.height]);

    for(let i=0; i<lista.length; i++) {
        if(i > 0) doc.addPage([can.width, can.height], orient);
        doc.addImage(lista[i].img, 'JPEG', 0, 0, can.width, can.height);
    }

    const pdfBlob = doc.output('blob');
    const file = await hDir.getFileHandle(`RELATORIO_${brAtual}_${Date.now()}.pdf`, { create: true });
    const stream = await file.createWritable();
    await stream.write(pdfBlob);
    await stream.close();
}

function loadCSV() {
    fetch('SNVBR116SPRJ.csv').then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[0], lt: parseFloat(c[1].replace(',','.')), ln: parseFloat(c[2].replace(',','.')), br: c[3] || "BR-116" };
        });
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let best = null, minD = Infinity;
        kmDB.forEach(pt => {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < minD) { minD = d; best = pt; }
        });
        if(best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            document.getElementById('br-txt').innerText = best.br;
            brAtual = best.br;
        }
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
