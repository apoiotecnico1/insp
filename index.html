<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA DE INSPEÇÃO - PADRÃO MOTIVA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --motiva-blue: #003366; 
            --motiva-orange: #f26522;
            --asfalto: #1a1a1a;
            --glass: rgba(0, 51, 102, 0.85);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; overflow: hidden; height: 100vh; }

        /* Splash Institucional */
        #splash { position: fixed; inset: 0; background: var(--motiva-blue); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-bottom: 8px solid var(--motiva-orange); }
        .logo-box { text-align: center; border: 2px solid rgba(255,255,255,0.2); padding: 30px; border-radius: 2px; }
        .title-main { font-size: 24px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; color: #fff; }
        .title-main b { color: var(--motiva-orange); font-weight: 800; }
        .start-hint { margin-top: 40px; font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.5); text-transform: uppercase; }

        /* Layout Principal */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 0.8s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM - Estilo Placa de Rodovia */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: var(--motiva-blue); padding: 12px 30px; 
            border-radius: 6px; border: 2px solid #fff;
            z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #km-hud small { font-size: 10px; color: var(--motiva-orange); text-transform: uppercase; font-weight: 800; letter-spacing: 2px; display: block; margin-bottom: 2px; }
        #km-hud h1 { font-size: 2.8rem; font-weight: 900; color: #fff; line-height: 1; }
        
        #gear-btn { position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; background: var(--glass); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); z-index: 20; opacity: 0.6; }

        /* Barra de Controle Slim */
        #action-bar { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 30px; width: 90%; max-width: 550px; 
            background: var(--glass); padding: 12px 35px; border-radius: 4px; 
            backdrop-filter: blur(15px); border-bottom: 4px solid var(--motiva-orange); z-index: 100; justify-content: space-between;
        }
        .stat-group { border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px; }
        .stat-group b { font-size: 1.2rem; color: #fff; display: block; }
        .stat-group small { font-size: 8px; color: var(--motiva-orange); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

        .btn-motiva { 
            border: none; border-radius: 2px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; padding: 15px 40px; font-size: 11px; 
            background: var(--motiva-orange); color: #fff; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-motiva:active { transform: translateY(2px); filter: brightness(1.2); }

        /* Ajustes Estilo SAP/Corporate */
        #settings { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: #f4f4f4; z-index: 500; transition: 0.4s; padding: 50px 25px; 
            color: #333; border-left: 5px solid var(--motiva-blue);
        }
        #settings.open { right: 0; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: 200; }
        .close-x:hover { color: var(--motiva-orange); }
        
        .field { margin-bottom: 25px; }
        .field label { font-size: 9px; color: var(--motiva-blue); margin-bottom: 6px; font-weight: 800; display: block; text-transform: uppercase; }
        select, input { width: 100%; background: #fff; border: 1px solid #ddd; color: #333; padding: 12px; border-radius: 2px; font-size: 13px; outline: none; }
        select:focus, input:focus { border-color: var(--motiva-orange); }

        canvas { display: none; }
    </style>
</head>
<body onclick="launch()">

<div id="splash">
    <div class="logo-box">
        <div class="title-main">INSPEÇÃO <b>FOTOGRÁFICA</b></div>
        <p style="color: rgba(255,255,255,0.4); font-size: 9px; margin-top: 5px; letter-spacing: 2px;">PADRÃO MOTIVA RODOVIAS</p>
    </div>
    <div class="start-hint">Toque para iniciar operação</div>
</div>

<div id="settings">
    <div class="close-x" onclick="toggleSet()">×</div>
    <h3 style="margin-bottom:30px; font-size:14px; color:var(--motiva-blue); letter-spacing:1px;">CONFIGURAÇÕES TÉCNICAS</h3>
    <div class="field"><label>Seletor de Lente</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo (Milissegundos)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Quantidade / Lote</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <small>Identificação KM</small>
        <h1 id="km-txt">Km ---+---</h1>
    </div>

    <div id="gear-btn" onclick="toggleSet()">⚙</div>

    <div id="action-bar">
        <div class="stat-group"><small>Fotos/Lote</small><b id="stat-batch">00</b></div>
        <button id="btn-action" class="btn-motiva" onclick="startRec()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-motiva" style="display:none; background:#b00;" onclick="stopRec()">Concluir Lote</button>
        <div class="stat-group"><small>Total Geral</small><b id="stat-total">0000</b></div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], gps=null, rec=false, buffer=[], total=0, batchIdx=0, hDir=null, currentStream=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function launch() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    const s = document.getElementById('splash'); 
    if(s) { 
        s.style.opacity='0'; 
        setTimeout(()=>{
            s.remove(); 
            document.getElementById('app-shell').style.visibility='visible'; 
            document.getElementById('app-shell').style.opacity='1';
        }, 600); 
    }
}

window.onload = () => { loadCSV(); initG(); listCams(); };

async function listCams() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        stream.getTracks().forEach(t => t.stop());
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId; opt.text = `Lente ${i + 1}`;
            sel.appendChild(opt);
        });
        const backCam = videoDevices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('traseira')) || videoDevices;
        if(backCam) { sel.value = backCam.deviceId; initC(backCam.deviceId); }
    } catch(e) {}
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id ? { exact: id } : undefined, width: { ideal: 1920 }, height: { ideal: 1080 } } });
        currentStream = stream; vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
    } catch (err) {
        const fallback = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        currentStream = fallback; vid.srcObject = fallback;
    }
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
}

function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    const barH = h * 0.16;
    const grd = ctx.createLinearGradient(0, h-barH, 0, h);
    grd.addColorStop(0, "transparent"); grd.addColorStop(1, "rgba(0,51,102,0.95)");
    ctx.fillStyle = grd; ctx.fillRect(0, h-barH, w, barH);
    
    // Borda laranja inferior do relatório
    ctx.fillStyle = "#f26522"; ctx.fillRect(0, h-5, w, 5);

    ctx.textAlign = "left";
    const fK = barH * 0.45;
    ctx.font = `bold ${fK}px Arial`;
    ctx.lineWidth = 10; ctx.strokeStyle = "#000";
    ctx.strokeText("Km " + m.km, 60, h-(barH*0.52));
    ctx.fillStyle = "#fff"; ctx.fillText("Km " + m.km, 60, h-(barH*0.52));
    
    const fD = barH * 0.18;
    ctx.font = `normal ${fD}px Arial`;
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillText(m.ts + " | MOTIVA RODOVIAS", 60, h-(barH*0.22));
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`INSPECAO_MOTIVA_LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ raw: can.toDataURL('image/jpeg', 0.45), km: document.getElementById('km-txt').innerText.replace("Km ", ""), ts: new Date().toLocaleString('pt-BR').toUpperCase() });
        total++;
        document.getElementById('stat-total').innerText = total.toString().padStart(4, '0');
        document.getElementById('stat-batch').innerText = buffer.length.toString().padStart(2, '0');
        if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) save();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function startRec() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        rec = true; loop();
        document.getElementById('btn-action').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'inline-block';
    } catch(e) {}
}

function stopRec() {
    rec = false; save();
    document.getElementById('btn-action').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
}

function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
