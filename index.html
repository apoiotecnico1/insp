<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V18 - MASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* VÍDEO FULL SCREEN */
        #cam-layer { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM - DESIGNER DE RODOVIA (SOMBRAS FORTES PARA SOL) */
        #km-hud { 
            position: absolute; top: 30px; left: 20px; z-index: 100;
            background: linear-gradient(180deg, var(--placa-verde) 0%, #004d21 100%); 
            padding: 12px 30px; border-radius: 10px; border: 3px solid #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.3);
        }
        #km-txt { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; text-shadow: 3px 3px 5px #000; }

        /* TAG DE GRAVAÇÃO */
        #rec-indicator {
            position: absolute; top: 35px; right: 25px; z-index: 100;
            display: flex; align-items: center; gap: 10px; opacity: 0; transition: 0.5s;
        }
        .dot { width: 15px; height: 15px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* CONTROLES FLUTUANTES (MINIMALISTAS) */
        #ui-wrap {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            z-index: 500; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ui-hidden { opacity: 0; transform: translateY(100px); pointer-events: none; }

        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 500px; }
        .btn-main { 
            flex: 1; padding: 22px; border: none; border-radius: 15px; font-weight: 900;
            text-transform: uppercase; font-size: 14px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .btn-start { background: var(--accent); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn-gear { width: 65px; background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }

        /* PAINEL DE AJUSTES */
        #settings {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
        }
        .settings-card { width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 8px; font-weight: bold; }
        select, input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; }

        /* FLASH DE FOTO */
        #flash { position: fixed; inset: 0; border: 15px solid var(--accent); pointer-events: none; z-index: 1000; opacity: 0; transition: 0.1s; }

        canvas { display: none; }
    </style>
</head>
<body onclick="toggleUI()">

<div id="flash"></div>
<div id="cam-layer"><video id="vid" autoplay playsinline muted></video></div>

<div id="km-hud" onclick="initGPS(); event.stopPropagation();">
    <div id="km-txt">KM ---+---</div>
</div>

<div id="rec-indicator">
    <span style="font-weight: 900; font-size: 12px; text-shadow: 2px 2px 4px #000;">GRAVANDO</span>
    <div class="dot"></div>
</div>

<div id="ui-wrap">
    <div id="status-info" style="font-size: 11px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; color: #aaa;">
        LOTE: <span id="v-batch" style="color:#fff">0</span> | TOTAL: <span id="v-total" style="color:#fff">0</span>
    </div>
    <div class="btn-group">
        <button class="btn-main btn-gear" onclick="openSet(); event.stopPropagation();">⚙️</button>
        <button id="btn-start" class="btn-main btn-start" onclick="startApp(); event.stopPropagation();">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-main btn-stop" style="display:none" onclick="stopApp(); event.stopPropagation();">Finalizar Trecho</button>
    </div>
</div>

<div id="settings" onclick="closeSet()">
    <div class="settings-card" onclick="event.stopPropagation()">
        <h3 style="margin-bottom: 20px; text-align: center;">AJUSTES TÉCNICOS</h3>
        <div class="field"><label>CÂMERA</label><select id="cam-sel" onchange="switchCam(this.value)"></select></div>
        <div class="field"><label>INTERVALO (MS)</label><input type="number" id="cfg-int" value="800"></div>
        <div class="field"><label>FOTOS POR LOTE</label><input type="number" id="cfg-lote" value="50"></div>
        <button class="btn-main btn-start" style="width: 100%;" onclick="closeSet()">SALVAR E VOLTAR</button>
    </div>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB=[], gps=null, active=false, buffer=[], total=0, hFolder=null, uiTimer;
const vid=document.getElementById('vid'), proc=document.getElementById('proc'), ctx=proc.getContext('2d');

window.onload = async () => { 
    await loadCams(); 
    loadCSV(); 
    initGPS(); 
    // Garante que o usuário escolha a pasta logo no início
    setTimeout(pickFolder, 1000);
};

async function pickFolder() {
    try {
        hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
        if(navigator.vibrate) navigator.vibrate(100);
    } catch(e) { alert("Escolha uma pasta para salvar os relatórios."); }
}

async function loadCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-sel');
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Lente ${i + 1}`;
        sel.appendChild(opt);
    });
    // Pega a última câmera (geralmente a ultra-wide ou a principal traseira)
    const best = videoDevices[videoDevices.length - 1];
    if(best) initCam(best.deviceId);
}

async function initCam(id) {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

function switchCam(id) { initCam(id); }
function toggleUI() { 
    document.getElementById('ui-wrap').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(active) uiTimer = setTimeout(() => document.getElementById('ui-wrap').classList.add('ui-hidden'), 4000);
}
function openSet() { document.getElementById('settings').style.display = 'flex'; }
function closeSet() { document.getElementById('settings').style.display = 'none'; }

function startApp() {
    if(!hFolder) { pickFolder(); return; }
    active = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-indicator').style.opacity = '1';
    toggleUI();
    loop();
}

function stopApp() {
    active = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.opacity = '0';
    if(buffer.length > 0) savePDF();
}

function loop() {
    if(!active) return;
    
    // Efeito Visual de Flash
    const f = document.getElementById('flash');
    f.style.opacity = '1'; setTimeout(() => f.style.opacity = '0', 80);

    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    buffer.push({
        raw: proc.toDataURL('image/jpeg', 0.7),
        km: document.getElementById('km-txt').innerText.replace("KM ", ""),
        ts: new Date().toLocaleString('pt-BR')
    });

    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = buffer.length;

    const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
    if(buffer.length >= limit) savePDF();
    
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 800);
}

async function savePDF() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; buffer = [];
    
    // Nomenclatura do arquivo baseada no KM do lote
    const kmStart = items.km.replace('+', '_');
    const kmEnd = items[items.length - 1].km.replace('+', '_');
    const data = new Date().toLocaleDateString('pt-BR').replaceAll('/', '_');
    const fileName = `RELATORIO_KM_${kmStart}_AO_${kmEnd}_${data}.pdf`;

    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = proc.height * 0.16;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, proc.height-bh, proc.width, bh);
                ctx.fillStyle = "#ffcc00"; ctx.font = `bold ${bh*0.4}px Arial`;
                ctx.fillText("KM " + items[i].km, 60, proc.height-(bh*0.45));
                ctx.fillStyle = "#fff"; ctx.font = `${bh*0.16}px Arial`;
                ctx.fillText(items[i].ts, 60, proc.height-(bh*0.18));
                doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    
    try {
        const handle = await hFolder.getFileHandle(fileName, {create:true});
        const writable = await handle.createWritable();
        await writable.write(doc.output('blob')); await writable.close();
        if(navigator.vibrate) navigator.vibrate();
    } catch(e) {}
}

function loadCSV() {
    fetch('SNVBR116SPRJ.csv?v='+Date.now()).then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "KM " + n.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
