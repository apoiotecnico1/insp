<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RODOVIÁRIA V6.7 - GPS FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00d9ff; --dark-bg: #000; }
        body { margin: 0; background: var(--dark-bg); color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; width: 100vw; height: 60vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* PLACA KM - LÓGICA ORIGINAL RECUPERADA */
        #kmPlaque { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; 
            padding: 12px 25px; font-size: 1.8rem; font-weight: bold; border: 3px solid #fff;
            border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            white-space: nowrap; width: auto; min-width: 180px; display: block;
        }

        #settings-panel { 
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%; 
            background: rgba(5, 10, 15, 0.98); z-index: 5000; transition: 0.4s; 
            padding: 20px; overflow-y: auto; border-left: 2px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .tab-btn { background: #222; color: #888; border: 1px solid #333; padding: 10px; border-radius: 6px; font-size: 0.7rem; margin-right: 5px; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .group { margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        label { display: block; font-size: 0.75rem; margin: 10px 0 5px; color: var(--accent); }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; }

        #controls { flex-grow: 1; background: #000; display: flex; flex-direction: column; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #333; }
        .card { background: #000; padding: 12px 2px; text-align: center; }
        .card label { font-size: 0.5rem; color: #777; display: block; }
        .val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; }
        button.main-action { border: none; font-weight: bold; font-size: 1.3rem; }
        #btnStart { background: #00c853; color: #000; }
        #btnStop { background: #d50000; color: #fff; }

        .icon-cfg { position: absolute; top: 15px; right: 15px; z-index: 2000; background: rgba(0,0,0,0.6); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
    </style>
</head>
<body>

<div class="icon-cfg" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h2 style="color:var(--accent); margin-top:0;">Configurações</h2>
    
    <div style="display:flex; overflow-x:auto; padding-bottom:10px;">
        <button class="tab-btn active">CAPTURA</button>
        <button class="tab-btn">IMAGEM</button>
        <button class="tab-btn">DADOS</button>
    </div>

    <div class="group">
        <label>Intervalo de Fotos (ms)</label>
        <input type="number" id="cfgDelay" value="200">
        
        <label>Fotos por Lote PDF</label>
        <input type="number" id="cfgBatch" value="200">
        
        <label>Prefixo do Relatório</label>
        <input type="text" id="pdfPrefix" value="INSP_KM">

        <label>Qualidade PDF (0-100)</label>
        <input type="number" id="pdfQual" value="70">

        <label>Lente da Câmera</label>
        <select id="camSelect" onchange="switchCamera()"></select>
    </div>
    
    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; font-weight:bold; border-radius:8px;">CONCLUÍDO</button>
</div>

<div id="main-container" style="flex-grow:1; display:flex; flex-direction:column">
    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div style="display:flex; justify-content:space-between; background:#111; padding:8px 15px; font-size:0.7rem; color:#888;">
            <span id="stCsv">CSV: ...</span> 
            <span id="stGps">GPS: BUSCANDO...</span> 
            <span id="txtTimer" style="color:var(--accent)">00:00</span>
        </div>
        
        <div class="dashboard">
            <div class="card"><label>FOTOS</label><span id="txtTotal" class="val">0</span></div>
            <div class="card"><label>LOTE</label><span id="txtBuffer" class="val">0</span></div>
            <div class="card"><label>PDFS</label><span id="txtPdfs" class="val">0</span></div>
            <div class="card" onclick="takeSinglePhoto()" style="background:#222; cursor:pointer">📸</div>
        </div>

        <div class="btn-row">
            <button id="btnStart">INICIAR</button>
            <button id="btnStop" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [], startTime = 0, timerInterval;
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

// --- LÓGICA DE CÂMERA ---
async function scanCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('camSelect');
    videoDevices.forEach((device, index) => {
        const opt = document.createElement('option');
        opt.value = device.deviceId;
        opt.text = device.label || `Câmera ${index + 1}`;
        select.appendChild(opt);
    });
    if (videoDevices.length > 0) switchCamera();
}

async function switchCamera() {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: { exact: document.getElementById('camSelect').value }, width: 1920, height: 1080 } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// --- LÓGICA DO KM E CSV (O CORAÇÃO DO SISTEMA) ---
async function loadCSV(){
    try {
        // Força recarga do CSV ignorando o cache do navegador
        const response = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const data = await response.text();
        const lines = data.split(/\r?\n/).filter(line => line.trim() !== '');
        
        // Remove o cabeçalho
        lines.shift();
        
        kmDataset = lines.map(line => {
            const parts = line.split(';');
            if(parts.length < 3) return null;
            return {
                km: parts.trim(),
                lat: parseFloat(parts.replace(',', '.')),
                lon: parseFloat(parts.replace(',', '.'))
            };
        }).filter(item => item !== null && !isNaN(item.lat));
        
        document.getElementById('stCsv').textContent = `CSV: OK (${kmDataset.length} pontos)`;
    } catch(e) {
        document.getElementById('stCsv').textContent = "CSV: NÃO CARREGADO";
    }
}

// WatchPosition roda em background atualizando o KM
navigator.geolocation.watchPosition(position => {
    lastPos = { lat: position.coords.latitude, lon: position.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    
    if (kmDataset.length > 0) {
        let nearestKM = kmDataset;
        let minDistance = Infinity;

        for (const point of kmDataset) {
            const dist = Math.hypot(point.lat - lastPos.lat, point.lon - lastPos.lon);
            if (dist < minDistance) {
                minDistance = dist;
                nearestKM = point;
            }
        }
        // Injeta o KM na placa verde
        document.getElementById('kmPlaque').textContent = "KM " + nearestKM.km;
    }
}, (err) => {
    document.getElementById('stGps').textContent = "ERRO GPS";
}, { enableHighAccuracy: true });

// --- GRAVAÇÃO E PDF ---
async function savePDF(manualBuffer = null) {
    const buffer = manualBuffer || activeBuffer;
    if(!buffer.length) return;
    if(!manualBuffer) activeBuffer = [];

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    const quality = parseInt(document.getElementById('pdfQual').value) / 100;

    for(let i=0; i < buffer.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(resolve => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                // Carimbo na foto
                ctx.font = "bold 70px Arial Black";
                ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 5;
                ctx.strokeText("KM " + buffer[i].km, 50, can.height - 150);
                ctx.fillText("KM " + buffer[i].km, 50, can.height - 150);
                
                doc.addImage(can.toDataURL('image/jpeg', quality), 'JPEG', 0, 0, 297, 210);
                resolve();
            };
            img.src = buffer[i].img;
        });
        URL.revokeObjectURL(buffer[i].img);
    }

    const prefix = document.getElementById('pdfPrefix').value || "INSP";
    const fileName = `${prefix}_${Date.now()}.pdf`;
    
    if(!directoryHandle) directoryHandle = await window.showDirectoryPicker();
    const fileHandle = await directoryHandle.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
    
    if(!manualBuffer) {
        pdfCount++;
        document.getElementById('txtPdfs').textContent = pdfCount;
    }
}

function captureLoop() {
    if(!isRecording) return;
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const currentKM = document.getElementById('kmPlaque').textContent.replace('KM ', '');
    
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: currentKM
    });
    
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;
    
    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) {
        savePDF();
    }
    
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

document.getElementById('btnStart').onclick = async () => {
    try {
        directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        isRecording = true;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const diff = new Date(Date.now() - startTime);
            document.getElementById('txtTimer').textContent = diff.toISOString().substr(14, 5);
        }, 1000);
        captureLoop();
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
    } catch(e) {}
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false;
    clearInterval(timerInterval);
    savePDF();
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
};

async function takeSinglePhoto() {
    if(!directoryHandle) directoryHandle = await window.showDirectoryPicker();
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const snap = [{
        img: can.toDataURL('image/jpeg', 0.8),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', '')
    }];
    savePDF(snap);
}

function toggleSettings() {
    document.getElementById('settings-panel').classList.toggle('active');
}

// Inicialização
scanCameras();
loadCSV();
</script>
</body>
</html>
