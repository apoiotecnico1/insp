<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SUPORTE DE CAMPO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE ALERTA COM SEUS TEXTOS ORIGINAIS */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 4000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .alert-box { border: 1px solid #333; padding: 35px; border-radius: 12px; max-width: 450px; text-align: center; background: #080808; }
        .alert-box h2 { color: var(--accent); margin-bottom: 15px; font-size: 18px; letter-spacing: 1px; }
        .alert-box p { font-size: 13px; line-height: 1.6; color: #999; margin-bottom: 25px; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 16px 45px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); padding: 10px 20px; 
            border: 2px solid #fff; border-radius: 6px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); z-index: 10;
        }
        #km-hud h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }

        #rec-tag { position: absolute; top: 85px; right: 20px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; font-size: 10px; color: #fff; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(25px); z-index: 3000; 
            padding: 60px 25px; transition: 0.5s; border-left: 1px solid #444;
        }
        #settings-panel.open { right: 0; }
        .close-settings { position: absolute; top: 20px; left: 20px; font-size: 14px; cursor: pointer; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: #aaa; display: block; margin-bottom: 8px; }
        select, input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; }

        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 20px; z-index: 100; transition: 0.5s;
        }
        .btn-round { border: none; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 20px 40px; font-size: 12px; background: var(--accent); color: #000; }
        #gear-btn { width: 55px; height: 55px; border-radius: 6px; background: rgba(255,255,255,0.15); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="requestWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>Monitoramento de Campo</h2>
        <p>A tela permanecerá **ativa**. Verifique se o aparelho está conectado ao carregador, pois a captura de 200ms consome mais bateria.</p>
        <button class="btn-aware" onclick="acceptSafety()">Estou Ciente</button>
    </div>
</div>

<div id="settings-panel">
    <div class="close-settings" onclick="toggleSet()">← Voltar</div>
    <div class="field"><label>Câmera (Lente)</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Tempo da foto (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Salvar relatório a cada X fotos</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted loop></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>CAPTURA ATIVA</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-round" onclick="initCapture()">Iniciar captura</button>
        <button id="btn-stop" class="btn-round" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// --- CAIXA-PRETA: SALVAMENTO DE EMERGÊNCIA AO FECHAR ---
window.addEventListener('pagehide', () => {
    if (rec && buffer.length > 0) {
        const kmFim = document.getElementById('km-txt').innerText.replace("Km ", "");
        savePDF([...buffer], kmInicialLote, kmFim, true);
    }
});

async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
}

document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') requestWakeLock(); });

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        requestWakeLock();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Selecione uma pasta."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function initCapture() {
    rec = true;
    buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    requestWakeLock();
    loop();
}

function stopCapture() {
    rec = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        buffer.push({
            raw: can.toDataURL('image/jpeg', 0.45),
            km: currentKm,
            ts: new Date().toLocaleString('pt-BR').toUpperCase()
        });

        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if(buffer.length >= limit) {
            const tempBuffer = [...buffer];
            const kmIni = kmInicialLote;
            const kmFim = currentKm;
            buffer = [];
            kmInicialLote = currentKm;
            savePDF(tempBuffer, kmIni, kmFim);
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(data, ini, fim, emergency = false) {
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height-bh, can.width, bh);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${bh*0.4}px Arial`;
                ctx.fillText("Km " + data[i].km, 40, can.height-(bh*0.45));
                ctx.font = `${bh*0.2}px Arial`;
                ctx.fillText(data[i].ts, 40, can.height-(bh*0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = data[i].raw;
        });
    }

    const agora = new Date();
    const d = agora.toLocaleDateString('pt-BR').replace(/\//g, '-');
    const h = agora.toLocaleTimeString('pt-BR').replace(/:/g, '-');
    const sufixo = emergency ? "_EMERGENCIA" : "";
    const nome = `Relatorio_Km_${ini}_a_${fim}_${d}_${h}${sufixo}.pdf`;

    try {
        const f = await hDir.getFileHandle(nome, {create:true});
        const w = await f.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch(e) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "Km " + b.km;
    }, null, {enableHighAccuracy:true});
}

window.onload = () => { loadCSV(); initGPS(); };
</script>
</body>
</html>
