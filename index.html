<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - KM SINCRONIZADO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #viewport { position: relative; width: 100vw; height: 40vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Placa de KM idêntica à sinalização de rodovia */
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 12px;
            font-size: 3.5rem; font-weight: 900; border: 5px solid #fff;
            margin: 10px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .status-bar { display: flex; justify-content: space-around; padding: 8px; background: var(--panel-bg); font-size: 0.75rem; border-top: 1px solid #222; }
        .st { padding: 4px 10px; border-radius: 20px; background: #1a2235; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        .err { color: #ff4444; border-color: #ff4444; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #111; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.4rem; font-weight: bold; color: #00d9ff; }

        .btn-row { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        
        #log { font-size: 0.7rem; color: #666; text-align: center; padding: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="viewport">
    <video id="vid" autoplay playsinline muted></video>
</div>

<div id="kmPlaque">KM --+---</div>

<div class="status-bar">
    <div id="stCsv" class="st">CSV: CARREGANDO...</div>
    <div id="stGps" class="st">GPS: BUSCANDO...</div>
</div>

<div class="dashboard">
    <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
    <div class="card">LOTE<span id="txtBuffer" class="val">0/200</span></div>
    <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer">GERAR PDF<span id="txtPdfs" class="val">0</span></div>
</div>

<div class="btn-row">
    <button id="btnStart">Iniciar Inspeção</button>
    <button id="btnStop" disabled>Parar e Salvar</button>
</div>

<div id="log">Sistema Riverside Pro v3.0 - SNV BR-116 Ativo</div>

<canvas id="can"></canvas>

<script>
/* ======= MOTOR DE BUSCA DO SEU INDEX ORIGINAL ======= */
let kmDataset = [];
let lastPos = null;
let isRecording = false;
let photoCount = 0;
let pdfCount = 0;
let activeBuffer = [];

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { alpha: false });

// Funções de utilidade do seu código original
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){ 
    const map=headers.map(h=>normalizeStr(h)); 
    for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; } 
    return -1; 
}
function parsePt(v){ 
    if(v==null) return NaN; 
    const s=String(v).trim(); 
    return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); 
}
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

/* ======= CARREGAMENTO DO CSV (LOGICA DO SEU INDEX) ======= */
async function loadKMCSV(){
    try {
        const resp = await fetch('SNVBR116SPRJ.csv?v=' + Date.now(), {cache:'no-store'});
        if(!resp.ok) throw new Error("CSV não encontrado");

        let text = await resp.text();
        if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        const head = lines.shift().split(';');
        
        const iKm  = findColumnIndex(head, ['km']);
        const iLat = findColumnIndex(head, ['lat','latitude']);
        const iLon = findColumnIndex(head, ['lon','long','longitude']);

        if(iKm < 0 || iLat < 0 || iLon < 0){
            document.getElementById('stCsv').textContent = "CSV: ERRO CABEÇALHO";
            document.getElementById('stCsv').classList.add('err');
            return;
        }

        kmDataset = lines.map(l=>{
            const r = l.split(';');
            return { km: r[iKm], lat: parsePt(r[iLat]), lon: parsePt(r[iLon]) };
        }).filter(p => p.km && Number.isFinite(p.lat) && Number.isFinite(p.lon));

        document.getElementById('stCsv').textContent = "CSV: OK (" + kmDataset.length + ")";
        document.getElementById('stCsv').classList.add('ok');
    } catch(e) {
        document.getElementById('stCsv').textContent = "CSV: ERRO CARGA";
        document.getElementById('stCsv').classList.add('err');
    }
}

/* ======= ATUALIZAÇÃO DO KM (LÓGICA DO SEU INDEX) ======= */
function updateKMDisplay() {
    if(!lastPos || !kmDataset.length) return;

    let best = null, bd = Infinity;
    const lat = lastPos.lat;
    const lon = lastPos.lon;

    for(const p of kmDataset){
        const d = hav(lat, lon, p.lat, p.lon);
        if(d < bd){ bd = d; best = p; }
    }

    if(best) {
        // Formata o KM para o estilo 000+000 ou o valor bruto do seu CSV
        document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}

/* ======= CAPTURA E PDF (MELHORADO VISUALMENTE) ======= */
// Função auxiliar para desenhar o texto com sombra diretamente no canvas da foto
function drawStampedText(context, text, x, y, fontSize) {
    context.save();
    context.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
    context.textAlign = 'left';
    context.textBaseline = 'bottom';
    
    // Configuração da sombra para dar contraste em fundos claros
    context.shadowColor = 'rgba(0, 0, 0, 1)';
    context.shadowBlur = 10;
    context.shadowOffsetX = 4;
    context.shadowOffsetY = 4;
    
    // Cor do texto (Branco para destacar)
    context.fillStyle = '#ffffff';
    context.fillText(text, x, y);
    context.restore();
}

async function savePDF() {
    if (activeBuffer.length === 0) return;
    const batch = [...activeBuffer];
    activeBuffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;
    document.getElementById('txtBuffer').textContent = "0/200";

    const { jsPDF } = window.jspdf;
    // Cria PDF em modo Paisagem (Landscape), A4
    const doc = new jsPDF('l', 'mm', 'a4');
    
    // Dimensões da página A4 em mm (Paisagem)
    const pageWidth = 297;
    const pageHeight = 210;

    for(let i = 0; i < batch.length; i++) {
        const item = batch[i];
        if (i > 0) doc.addPage();

        // Para desenhar o texto sobre a foto, precisamos trabalhar no canvas
        const tempImg = new Image();
        await new Promise(resolve => {
            tempImg.onload = () => {
                // Define o tamanho do canvas igual ao da foto original (capturada do vídeo)
                can.width = tempImg.width;
                can.height = tempImg.height;
                
                // Desenha a foto original no canvas
                ctx.drawImage(tempImg, 0, 0);
                
                // Configurações do texto em relação à altura da foto
                const relFontSize = Math.round(can.height * 0.1); // Letras grandes (10% da altura da foto)
                const padding = Math.round(can.width * 0.03);    // Margem de 3%
                const textX = padding;
                const textY = can.height - padding; // Canto inferior
                
                // Desenha o KM grande no canto inferior esquerdo
                drawStampedText(ctx, `KM ${item.km}`, textX, textY, relFontSize);
                
                // Converte o canvas "carimbado" em imagem JPEG
                const stampedImgData = can.toDataURL('image/jpeg', 0.85); // Alta qualidade
                
                // Adiciona a imagem cobrindo a página inteira (Full Page)
                doc.addImage(stampedImgData, 'JPEG', 0, 0, pageWidth, pageHeight);
                resolve();
            };
            tempImg.src = item.img;
        });
    }

    doc.save(`INSPECAO_LOTE_${pdfCount}.pdf`);
    
    // Reseta o tamanho do canvas para o tamanho do vídeo para o loop de captura continuar
    can.width = vid.videoWidth;
    can.height = vid.videoHeight;
}

function captureLoop() {
    if (!isRecording) return;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    // Captura a imagem crua do vídeo
    const imgData = can.toDataURL('image/jpeg', 0.5);
    const currentKm = document.getElementById('kmPlaque').textContent.replace('KM ', '');

    activeBuffer.push({
        img: imgData, // Imagem sem texto ainda
        km: currentKm,
        ts: new Date().toLocaleString('pt-BR')
    });

    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/200`;

    if (activeBuffer.length >= 200) savePDF();
    setTimeout(captureLoop, 200); // 5 fotos por segundo
}

/* ======= INICIALIZAÇÃO ======= */
document.getElementById('btnStart').onclick = () => {
    isRecording = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    captureLoop();
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false;
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    savePDF();
};

document.getElementById('btnSaveManual').onclick = () => savePDF();

async function init() {
    // 1. Carrega o CSV usando a sua lógica exata
    await loadKMCSV();

    // 2. Inicia Câmera
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 1280, height: 720 },
            audio: false
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
        };
    } catch (e) { alert("Erro ao acessar câmera!"); }

    // 3. Inicia GPS e Loop de KM
    navigator.geolocation.watchPosition(pos => {
        lastPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        document.getElementById('stGps').textContent = "GPS: OK";
        document.getElementById('stGps').classList.add('ok');
        updateKMDisplay();
    }, err => {
        document.getElementById('stGps').textContent = "GPS: ERRO";
        document.getElementById('stGps').classList.add('err');
    }, { enableHighAccuracy: true, maximumAge: 0 });
}

init();
</script>
</body>
</html>
