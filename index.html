<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>BR-Monitor Pro Original</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --danger: #ff4444;
            --verde-placa: linear-gradient(180deg, #008a3d 0%, #005a28 100%);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* HUD PLACA 3D (Mantida Linda) */
        #km-hud { 
            position: absolute; 
            top: env(safe-area-inset-top, 25px); 
            left: 25px; 
            z-index: 100;
        }

        .placa-road {
            background: var(--verde-placa);
            padding: 12px 28px;
            border: 3px solid #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 190px;
        }

        .br-label { 
            font-size: 1.5rem; font-weight: 800; color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: -5px; letter-spacing: 2px;
        }

        .km-label { 
            font-size: 3.2rem; font-weight: 900; color: #fff;
            text-shadow: 2px 2px 0px #002d14, 4px 4px 0px #001a0b, 6px 6px 12px rgba(0,0,0,0.9);
        }

        /* BOTÕES ORIGINAIS RECURSIVOS */
        #ui { 
            position: absolute; bottom: env(safe-area-inset-bottom, 35px); 
            width: 100%; display: flex; justify-content: center; 
            gap: 20px; z-index: 500; align-items: center;
        }

        .btn-main { 
            border: none; padding: 18px 40px; border-radius: 50px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-size: 1rem;
        }

        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        
        .rec-dot { width: 15px; height: 15px; background: red; border-radius: 50%; display: none; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <h2 style="color:var(--accent)">SISTEMA DE MONITORAMENTO</h2>
    <button class="btn-main" id="btn-start" onclick="ativar()">ATIVAR E ESCOLHER PASTA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="takeSnap()"></video>
    
    <div id="km-hud">
        <div class="placa-road">
            <span class="br-label" id="br-txt">BR ---</span>
            <span class="km-label" id="km-txt">Km ---</span>
        </div>
    </div>

    <div id="ui">
        <button id="btn-run" class="btn-main" style="background:var(--accent)" onclick="startLote()">INICIAR LOTE</button>
        <button id="btn-halt" class="btn-main" style="background:var(--danger); color:white; display:none" onclick="stopLote()">GERAR PDF</button>
        <div id="rec-status" class="rec-dot"></div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, stream=null;
let buffer = [], brGlobal = "---", lat="0", lon="0";

async function ativar() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

        const devices = await navigator.mediaDevices.enumerateDevices();
        const back = devices.filter(d => d.kind === 'videoinput').pop();
        
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: back.deviceId, width: 1920, height: 1080 } 
        });
        
        const vid = document.getElementById('vid');
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            document.getElementById('c').width = vid.videoWidth;
            document.getElementById('c').height = vid.videoHeight;
        };
        
        loadCSV(); startGPS();
    } catch(e) { alert("Permissões necessárias."); }
}

function drawPlacaEBarra(ctx, can, km, br) {
    const s = can.height / 1080;
    ctx.save();

    // 1. DESENHO DA PLACA (Topo Esquerdo)
    const w = 360 * s, h = 180 * s;
    const x = 50 * s, y = 50 * s;
    
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 25 * s;
    ctx.shadowOffsetX = 10 * s;
    ctx.shadowOffsetY = 10 * s;

    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, "#007934"); g.addColorStop(1, "#004d21");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 15 * s);
    ctx.fill();
    
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 5 * s;
    ctx.stroke();

    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${52 * s}px Arial`;
    ctx.fillText("BR " + br, x + w/2, y + 65 * s);
    
    ctx.font = `900 ${100 * s}px Arial`;
    ctx.shadowColor = "#00240f";
    ctx.shadowOffsetX = 4 * s; ctx.shadowOffsetY = 4 * s;
    ctx.fillText("Km " + km, x + w/2, y + 145 * s);
    ctx.restore();

    // 2. BARRA INFERIOR ORIGINAL (Preta)
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    const hBar = 50 * s;
    ctx.fillRect(0, can.height - hBar, can.width, hBar);
    
    ctx.fillStyle = "#ffffff";
    ctx.font = `${24 * s}px Arial`;
    ctx.textAlign = "left";
    const info = `${new Date().toLocaleString()} | RODOVIA: BR ${br} | KM: ${km} | GPS: ${lat}, ${lon}`;
    ctx.fillText(info, 25 * s, can.height - (18 * s));
}

async function takeSnap() {
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    document.getElementById('flash').style.opacity = "1";
    setTimeout(()=> document.getElementById('flash').style.opacity = "0", 100);

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawPlacaEBarra(ctx, can, km, brGlobal);
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fh = await hDir.getFileHandle(`BR${brGlobal}_KM${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function startLote() {
    capturing = true; buffer = [];
    document.getElementById('btn-run').style.display = 'none';
    document.getElementById('btn-halt').style.display = 'block';
    document.getElementById('rec-status').style.display = 'block';
    loop();
}

function stopLote() {
    capturing = false;
    document.getElementById('btn-run').style.display = 'block';
    document.getElementById('btn-halt').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
    if(buffer.length > 0) savePDF([...buffer]);
}

async function loop() {
    if(!capturing) return;
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawPlacaEBarra(ctx, can, km, brGlobal);
    
    buffer.push(can.toDataURL('image/jpeg', 0.65));
    if(buffer.length >= 60) { savePDF([...buffer]); buffer = []; }
    setTimeout(loop, 500);
}

async function savePDF(imgs) {
    const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<imgs.length; i++) {
        if(i > 0) pdf.addPage();
        pdf.addImage(imgs[i], 'JPEG', 0, 0, 297, 210);
    }
    const fh = await hDir.getFileHandle(`RELATORIO_BR${brGlobal}_${Date.now()}.pdf`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(pdf.output('blob')); await sw.close();
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude.toFixed(6); 
        lon = p.coords.longitude.toFixed(6);
        if(!kmDB.length) return;
        let b = null, m = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < m) { m = d; b = pt; }
        }
        if(b) {
            brGlobal = b.br;
            document.getElementById('br-txt').innerText = "BR " + brGlobal;
            document.getElementById('km-txt').innerText = "Km " + b.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iBR = h.indexOf('br'), iKM = h.indexOf('km'), iLat = h.findIndex(x=>x.includes('lat')), iLon = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[iBR], km: c[iKM], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}
</script>
</body>
</html>
