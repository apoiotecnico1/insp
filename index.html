<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Captura Ultra Rápida – Segura</title>

<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui}
video{width:100%;height:100%;object-fit:contain}
#hud{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.6);padding:10px;border-radius:10px}
#btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:260px;height:60px;font-size:20px;font-weight:900;border-radius:14px;border:none}
.start{background:#22c55e}
.stop{background:#ef4444;color:#fff}
input{width:90px;font-size:16px;font-weight:800}
</style>
</head>
<body>

<video id="vid" autoplay playsinline muted></video>

<div id="hud">
Intervalo (ms):
<input id="interval" type="number" value="100" min="100">
<br><br>
Fotos: <b id="cnt">0</b>
<br>
<span id="warn"></span>
</div>

<button id="btn" class="start">▶ INICIAR</button>

<script>
const MIN_INTERVAL = 100;
const MAX_PIX = 1280;

const vid = document.getElementById('vid');
const btn = document.getElementById('btn');
const cnt = document.getElementById('cnt');
const intervalInput = document.getElementById('interval');
const warn = document.getElementById('warn');

let dir = null;
let running=false;
let busy=false;
let saved=0;

const can=document.createElement('canvas');
const ctx=can.getContext('2d',{alpha:false});

async function cam(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
 vid.srcObject=s;
 await new Promise(r=>vid.onloadedmetadata=r);
}
cam();

function clampInterval(){
 let v=Number(intervalInput.value||MIN_INTERVAL);
 if(v<MIN_INTERVAL){
   intervalInput.value=MIN_INTERVAL;
   warn.textContent="⚠️ Abaixo de 100 ms é fisicamente impossível";
 }else warn.textContent="";
 return v;
}

async function snap(){
 if(busy) return;
 busy=true;
 let w,h,wr=null;
 try{
  const vw=vid.videoWidth,vh=vid.videoHeight;
  const sc=Math.min(1,MAX_PIX/Math.max(vw,vh));
  w=Math.round(vw*sc);h=Math.round(vh*sc);
  can.width=w;can.height=h;
  ctx.drawImage(vid,0,0,w,h);
  const blob=await new Promise(r=>can.toBlob(r,"image/jpeg",0.85));
  if(!blob||blob.size<800) return;
  const name=`FOTO_${Date.now()}.jpg`;
  const fh=await dir.getFileHandle(name,{create:true});
  wr=await fh.createWritable();
  await wr.write(blob);
  await wr.close();wr=null;
  cnt.textContent=++saved;
 }finally{ try{await wr?.close()}catch{} busy=false }
}

async function loop(){
 while(running){
  await snap();
  await new Promise(r=>setTimeout(r, clampInterval()));
 }
}

btn.onclick=async()=>{
 if(!dir){
  dir=await showDirectoryPicker({mode:"readwrite"});
  return;
 }
 running=!running;
 if(running){
  btn.textContent="⏹ FINALIZAR";
  btn.className="stop";
  loop();
 }else{
  btn.textContent="▶ INICIAR";
  btn.className="start";
 }
};
</script>

</body>
</html>
