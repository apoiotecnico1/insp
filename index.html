<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA INSPEÇÃO PRO - ALTA PERFORMANCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00ff41; /* Verde Matrix para Alta Tecnologia */
            --danger: #ff0000; 
            --placa-br: #1a1a1a;
            --glass: rgba(0, 0, 0, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }

        /* Gate de Segurança Profissional */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 2px solid var(--accent); padding: 40px; border-radius: 5px; text-align: center; max-width: 90%; background: #050505; }
        .msg-seguranca { color: var(--danger); font-weight: 900; margin-bottom: 20px; font-size: 1.4rem; border: 1px solid var(--danger); padding: 10px; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        
        /* Filtro de Visão Noturna Técnica */
        .video-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: contrast(1.5) brightness(0.8) grayscale(0.5); /* Filtro para evitar estouro de luz */
        }
        
        /* Overlay de contraste para análise de falhas */
        .technical-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            border: 1px solid rgba(0, 255, 65, 0.2);
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4) 100%);
        }

        /* HUD de Engenharia */
        #km-hud { 
            position: absolute; top: 30px; left: 30px; 
            background: #fff; color: #000; 
            padding: 10px 30px; border: 5px solid #000; 
            z-index: 100; box-shadow: 10px 10px 0 var(--accent);
        }
        #km-hud h1 { font-size: 3rem; font-weight: 900; font-family: 'Courier New', monospace; }

        #rec-tag { 
            position: absolute; top: 30px; right: 30px; 
            background: var(--danger); color: #fff; 
            padding: 10px 20px; font-weight: bold; font-size: 1.2rem;
            display: flex; align-items: center; gap: 10px; border-radius: 4px; opacity: 0;
        }
        .dot { width: 15px; height: 15px; background: #fff; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Painel de Controle Lateral */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); z-index: 4000; padding: 40px 25px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 2px solid var(--accent); 
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: var(--accent); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 0; }

        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .btn-main { border: none; padding: 25px 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 70px; background: #333; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        canvas { display: none; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <div class="msg-seguranca">OPERAÇÃO TÉCNICA EM RODOVIA</div>
        <h2 style="margin-bottom: 10px;">INSPEÇÃO DE ILUMINAÇÃO PÚBLICA</h2>
        <p style="margin-bottom: 30px; color: #888;">Sistema configurado para BR-116 Dutra.<br>Filtros de supressão de brilho ativos.</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom: 20px;">CONFIGURAÇÕES</h3>
    <div class="field"><label>Seletor de Lente (Wide/Macro)</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Velocidade de Obturação (Frequência)</label><input type="number" id="cfg-int" value="150"></div>
    <div class="field"><label>Imagens por Lote (PDF)</label><input type="number" id="cfg-lote" value="30"></div>
    <div class="field"><label>Filtro de Contraste</label>
        <select id="cfg-filter" onchange="applyLiveFilter(this.value)">
            <option value="grayscale(0.5) contrast(1.5)">Análise Noturna (Padrão)</option>
            <option value="sepia(1) contrast(1.2)">Redução de Ofuscamento (Âmbar)</option>
            <option value="invert(1) grayscale(1)">Raio-X (Identificar Estruturas)</option>
        </select>
    </div>
    <button class="btn-aware" onclick="toggleSet()" style="width: 100%; padding: 10px;">FECHAR</button>
</div>

<div id="app-shell">
    <div class="video-container">
        <video id="vid" autoplay playsinline muted></video>
        <div class="technical-overlay"></div>
    </div>
    
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>GRAVANDO DADOS</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR ROTEIRO</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR LOTE</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer = [], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function refreshWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("ERRO: Selecione a pasta de destino."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Sensor ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    // Configurações de alta resolução para capturar detalhes técnicos
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080}, frameRate: {ideal: 60} } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function applyLiveFilter(val) { vid.style.filter = val; }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true;
    buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        
        // Captura o frame original
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        // Aplica o filtro técnico no Canvas antes de salvar (Engenharia de Qualidade)
        const frameData = can.toDataURL('image/jpeg', 0.5);

        buffer.push({ img: frameData, km: currentKm, ts: new Date().toLocaleString('pt-BR') });

        const limit = parseInt(document.getElementById('cfg-lote').value) || 30;
        if (buffer.length >= limit) {
            const batch = [...buffer];
            const kmF = currentKm;
            const kmI = kmInicialLote;
            buffer = []; 
            kmInicialLote = currentKm; 
            savePDF(batch, kmI, kmF);
        }
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 150);
}

async function savePDF(dataList, kmIni, kmFim) {
    const tempCan = document.createElement('canvas');
    tempCan.width = can.width; tempCan.height = can.height;
    const tCtx = tempCan.getContext('2d');
    
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                tCtx.drawImage(img, 0, 0);
                // TARJA DE DADOS TÉCNICOS (RODAPÉ)
                const bh = tempCan.height * 0.12;
                tCtx.fillStyle = "rgba(0,0,0,0.9)";
                tCtx.fillRect(0, tempCan.height - bh, tempCan.width, bh);
                
                // Km em destaque amarelo (visibilidade total)
                tCtx.fillStyle = "#ffcc00";
                tCtx.font = `bold ${bh * 0.5}px monospace`;
                tCtx.fillText("LOCALIZAÇÃO: " + dataList[i].km, 30, tempCan.height - (bh * 0.4));
                
                tCtx.fillStyle = "#fff";
                tCtx.font = `${bh * 0.25}px Arial`;
                tCtx.fillText("DATA/HORA: " + dataList[i].ts, 30, tempCan.height - (bh * 0.15));
                
                doc.addImage(tempCan.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = dataList[i].img;
        });
    }

    const agora = new Date();
    const nome = `INSPECAO_Dutra_Km_${kmIni}_ao_${kmFim}.pdf`;
    try {
        const fileHandle = await hDir.getFileHandle(nome, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (err) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km'));
        const ilt = h.findIndex(x=>x.toLowerCase().includes('lat'));
        const iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) document.getElementById('km-txt').innerText = "Km " + best.km;
    }, null, { enableHighAccuracy: true });
}

window.onload = () => { loadCSV(); initGPS(); };
</script>
</body>
</html>
