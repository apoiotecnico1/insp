<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Pro - Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: rgba(0, 77, 33, 0.8); 
            --danger: #ff4444; 
            --glass: rgba(15, 15, 15, 0.95); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* Interface de Segurança */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; background: #0a0a0a; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 800; border-radius: 12px; cursor: pointer; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM - DISCRETO E PROFISSIONAL */
        #km-hud { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            background: var(--placa-verde); 
            padding: 10px 20px; 
            border-radius: 10px; 
            z-index: 100; 
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }
        #br-txt { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.8); display: block; margin-bottom: 2px; }
        #km-txt { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; }

        /* STATUS PDF */
        #rec-tag { 
            position: absolute; top: 35px; right: 30px; display: flex; align-items: center; gap: 8px; 
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 30px; opacity: 0; z-index: 100;
        }
        #rec-tag span { font-size: 0.65rem; font-weight: 800; color: #fff; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; transition: 0.4s; }
        .ui-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .btn-main { border: none; padding: 18px 45px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 150px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.15); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; backdrop-filter: blur(5px); }

        /* PAINEL CONFIG */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(25px); z-index: 4000; padding: 60px 25px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #settings-panel.open { right: 0; }
        #settings-panel label { display: block; margin-top: 20px; font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        #settings-panel input, #settings-panel select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-top: 8px; }

        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:15px; letter-spacing: 1px;">SISTEMA DE APOIO</h2>
        <button class="btn-aware" onclick="startApp()">INICIAR MONITORAMENTO</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:#fff; cursor:pointer; margin-bottom:30px; font-weight: bold; opacity: 0.6;">✕ FECHAR</div>
    <label>CÂMERA</label>
    <select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>INTERVALO (ms)</label>
    <input type="number" id="cfg-int" value="250">
    <label>FOTOS POR PDF</label>
    <input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>
    
    <div id="km-hud">
        <span id="br-txt">BR ---</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>Processando Lote...</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">Iniciar</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let kmInicialLote = "", buffer = [], brGlobal = "---";
let curLat = "0.0000", curLon = "0.0000";
let wakeLock = null;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');
const flashDiv = document.getElementById('flash');
const uiControls = document.getElementById('ui-controls');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        listCams(); loadCSV(); initGPS();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Selecione uma pasta para salvar as fotos."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function handleTouch() {
    takeManualPhoto();
    uiControls.classList.remove('ui-hidden');
}

// DESENHA A PLACA E A LEGENDA DE FORMA UNIFORME E DISCRETA
function stampPhoto(br, km) {
    const s = can.height / 1080; // Fator de escala baseado na altura

    // 1. Placa de Km (Topo Esquerdo)
    const pw = 200 * s, ph = 100 * s;
    const px = 40 * s, py = 40 * s;

    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 15 * s;
    
    // Fundo Verde Profissional
    ctx.fillStyle = "rgba(0, 77, 33, 0.9)";
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 12 * s);
    ctx.fill();
    
    // Borda fina
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 2 * s;
    ctx.stroke();

    // Texto Km
    ctx.shadowBlur = 0;
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${22 * s}px Arial`;
    ctx.fillText("BR " + br, px + pw/2, py + 35 * s);
    ctx.font = `900 ${55 * s}px Arial`;
    ctx.fillText("Km " + km, px + pw/2, py + ph - 20 * s);

    // 2. Barra de Legenda Inferior (Discreta)
    const bh = 50 * s;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    ctx.textAlign = "left";
    ctx.font = `${18 * s}px Monospace`;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    const infoTxt = `${new Date().toLocaleString('pt-BR')} | LAT: ${curLat} LON: ${curLon}`;
    ctx.fillText(infoTxt, 25 * s, can.height - (bh/2) + (7 * s));
    
    ctx.restore();
}

async function takeManualPhoto() {
    if(!hDir) return;
    flashDiv.style.opacity = "0.3"; setTimeout(() => flashDiv.style.opacity = "0", 100);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    stampPhoto(brGlobal, km);

    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.9));
    const fh = await hDir.getFileHandle(`MANUAL_BR${brGlobal}_Km${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    uiControls.classList.add('ui-hidden'); 
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

async function captureLoop() {
    if (!capturing) return;
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    stampPhoto(brGlobal, km);

    buffer.push(can.toDataURL('image/jpeg', 0.7));
    
    if (buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) {
        savePDF([...buffer], kmInicialLote, km);
        buffer = []; kmInicialLote = km;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 250);
}

async function savePDF(imgs, k1, k2) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < imgs.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(imgs[i], 'JPEG', 0, 0, 297, 210);
    }
    const filename = `RELATORIO_BR${brGlobal}_KM_${k1}_${k2}_${Date.now()}.pdf`;
    const fh = await hDir.getFileHandle(filename, { create: true });
    const sw = await fh.createWritable();
    await sw.write(doc.output('blob')); await sw.close();
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brGlobal = best.br;
            document.getElementById('br-txt').innerText = "BR " + brGlobal;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iB = h.indexOf('br'), iK=h.indexOf('km'), iLt=h.findIndex(x=>x.includes('lat')), iLn=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[iB], km: c[iK], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Erro CSV"); }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
