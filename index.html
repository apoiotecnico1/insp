<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Pro BR - Híbrido</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --danger: #ff4444; --highway-green: rgba(0, 121, 52, 0.7); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 8px; cursor: pointer; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA KM TRANSPARENTE */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background-color: var(--highway-green);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 10px 20px; border: 3px solid #fff; 
            border-radius: 12px; z-index: 100; pointer-events: none; 
            display: flex; flex-direction: column; align-items: center;
        }
        #km-txt { font-size: 2.2rem; font-weight: 900; text-shadow: 2px 2px 2px #000; }

        /* CONTROLES AUTO-HIDE */
        #ui-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 15px; z-index: 500; 
            transition: opacity 0.5s; 
        }
        .btn-main { 
            border: 3px solid #fff; padding: 15px 30px; border-radius: 12px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 160px;
        }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }

        #rec-tag { 
            position: absolute; bottom: 120px; right: 20px; 
            background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 8px; opacity: 0; font-size: 0.8rem;
        }
        .dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .ui-hidden { opacity: 0 !important; visibility: hidden !important; }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body onclick="resetTimer()">

<div id="flash"></div>

<div id="safety-gate">
    <button class="btn-aware" onclick="startApp()">INICIAR SISTEMA</button>
</div>

<div id="app-shell">
    <!-- O clique no vídeo agora funciona mesmo durante a gravação -->
    <video id="vid" autoplay playsinline muted onclick="captureSnapshot()"></video>
    
    <div id="km-hud">
        <span id="br-txt">BR----</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>GRAVANDO PDF...</span></div>

    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="event.stopPropagation(); startCapture()">INICIAR PDF</button>
        <button id="btn-stop" class="btn-main" onclick="event.stopPropagation(); stopCapture()">FINALIZAR PDF</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let kmInicialLote = "", brAtual = "000", buffer = [];
let curLat = "0.0000", curLon = "0.0000", uiTimer;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

function resetTimer() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { document.getElementById('ui-controls').classList.add('ui-hidden'); }, 3000);
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        resetTimer();
        initCamera(); loadCSV(); initGPS();
    } catch(e) { alert("Pasta necessária."); }
}

async function initCamera() {
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// FUNÇÃO ÚNICA DE LEGENDA (IGUAL PARA JPG E PDF)
async function drawWatermark(km, br) {
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${bh * 0.4}px Arial`;
    ctx.fillText(`BR-${br}  Km ${km}`, 30, can.height - (bh * 0.5));
    ctx.font = `${bh * 0.18}px Arial`;
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`, 30, can.height - (bh * 0.2));
}

// CLIQUE NA TELA: GERA JPG INSTANTÂNEO
async function captureSnapshot() {
    if(!hDir) return;
    
    // Efeito de Flash
    const flash = document.getElementById('flash');
    flash.style.opacity = "0.4"; setTimeout(() => flash.style.opacity = "0", 100);

    // Desenha frame atual
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const cleanKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    await drawWatermark(cleanKm, brAtual);

    // Salva JPG
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const name = `FOTO_BR${brAtual}_Km${cleanKm}_${Date.now()}.jpg`;
    const fileHandle = await hDir.getFileHandle(name, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
}

// LOGICA DO PDF (LOOP)
function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    document.getElementById('ui-controls').classList.add('ui-hidden');
    captureLoop();
}

function stopCapture() {
    capturing = false;
    const cleanKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, cleanKm);
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    resetTimer();
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    
    // Captura apenas os dados para o PDF (para não interferir no canvas principal do JPG)
    const tempCan = document.createElement('canvas');
    tempCan.width = can.width; tempCan.height = can.height;
    const tCtx = tempCan.getContext('2d');
    tCtx.drawImage(vid, 0, 0, can.width, can.height);
    
    buffer.push({ img: tempCan.toDataURL('image/jpeg', 0.5), km: currentKm, br: brAtual });
    
    // Auto-save lote
    if (buffer.length >= 50) {
        savePDF([...buffer], kmInicialLote, currentKm);
        buffer = []; kmInicialLote = currentKm;
    }
    setTimeout(captureLoop, 300); 
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        img.src = dataList[i].img;
        await new Promise(res => { img.onload = async () => {
            ctx.drawImage(img, 0, 0, can.width, can.height);
            await drawWatermark(dataList[i].km, dataList[i].br);
            doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
            res();
        };});
    }
    const fileHandle = await hDir.getFileHandle(`LOTE_BR${brAtual}_Km${kmIni}_${Date.now()}.pdf`, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
}

// GPS E CSV
function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brAtual = best.br;
            document.getElementById('br-txt').innerText = "BR-" + best.br;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr = h.indexOf('br'), ikm = h.indexOf('km'), ilat = h.findIndex(x=>x.includes('lat')), ilon = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat].replace(',','.')), ln: parseFloat(c[ilon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}
</script>
</body>
</html>
