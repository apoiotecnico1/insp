<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V8.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }

        @media (orientation: landscape) {
            #app-shell { flex-direction: row; }
            #cam-view { flex: 3; }
            #ui-panel { flex: 0.9; border-left: 2px solid #222; }
            #gear-btn { top: 10px; right: 10px; } /* Ajuste fino na horizontal */
        }

        @media (orientation: portrait) {
            #cam-view { height: 60vh; }
            #ui-panel { height: 40vh; border-top: 2px solid #222; }
            #gear-btn { top: 10px; right: 10px; }
        }

        /* Área da Câmera */
        #cam-view { position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #km-live { position: absolute; top: 15px; left: 15px; background: var(--green); padding: 10px 20px; border: 2px solid #fff; border-radius: 8px; font-size: 1.8rem; font-weight: 900; z-index: 10; }

        /* Botão Engrenagem */
        #gear-btn { position: absolute; background: rgba(0,0,0,0.6); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #555; cursor: pointer; z-index: 100; }

        /* Menu de Ajustes */
        #settings-flyout { position: fixed; top: 0; right: -100%; width: 260px; height: 100%; background: #111; z-index: 200; transition: 0.3s; padding: 20px; border-left: 3px solid var(--gold); overflow-y: auto; }
        #settings-flyout.open { right: 0; }
        .set-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .set-row label { font-size: 10px; color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; font-size: 13px; }

        /* Interface de Comandos */
        #ui-panel { background: var(--bg); display: flex; flex-direction: column; padding: 12px; gap: 8px; justify-content: center; }
        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .counter-item { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .counter-item b { font-size: 1.3rem; display: block; }

        .btn { width: 100%; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-f { background: var(--gold); color: #000; height: 45px; font-size: 0.75rem; }
        .btn-on { background: var(--green); color: #fff; height: 75px; font-size: 1.1rem; }
        .btn-off { background: var(--danger); color: #fff; height: 75px; font-size: 1.1rem; }
        button:disabled { opacity: 0.1; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gear-btn" onclick="toggleSet()">⚙️</div>

<div id="settings-flyout">
    <h4 style="margin-bottom:20px; font-size:14px">AJUSTES TÉCNICOS</h4>
    
    <div class="set-row">
        <label>Data/Hora no Relatório</label>
        <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>

    <div class="set-row">
        <label>Coordenadas GPS</label>
        <select id="cfg-gps"><option value="N">NÃO</option><option value="S">SIM</option></select>
    </div>

    <div class="set-row">
        <label>Fotos por Lote (Qtd)</label>
        <input type="number" id="cfg-batch-size" value="50">
    </div>

    <div class="set-row">
        <label>Intervalo (Milissegundos)</label>
        <input type="number" id="cfg-interval" value="750">
        <small style="font-size:8px; color:#666">1000ms = 1 segundo</small>
    </div>

    <button onclick="toggleSet()" style="width:100%; padding:12px; background:var(--danger); color:#fff; border:none; border-radius:5px; font-weight:bold; cursor:pointer">SALVAR E VOLTAR</button>
</div>

<div id="app-shell">
    <div id="cam-view">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-live">Km ---+---</div>
    </div>

    <div id="ui-panel">
        <div class="counter-grid">
            <div class="counter-item"><small style="color:#666">LOTE</small><b id="v-batch">0/50</b></div>
            <div class="counter-item"><small style="color:#666">TOTAL</small><b id="v-total">0</b></div>
        </div>

        <button id="btn-dir" class="btn btn-f">📁 DEFINIR PASTA DESTINO</button>
        <button id="btn-start" class="btn btn-on" disabled>▶ INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn btn-off" disabled>■ FINALIZAR LOTE</button>
        
        <div id="status" style="font-size:10px; color:#444; text-align:center">MODO FULL IMMERSIVE V8.0</div>
    </div>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB = [], gps = null, active = false, buffer = [], total = 0, batchNum = 0, hFolder = null;

const vid = document.getElementById('vid'), proc = document.getElementById('proc'), ctx = proc.getContext('2d');

window.onload = () => { initCam(); loadCSV(); initGPS(); };

async function initCam() {
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:1920, height:1080}});
    vid.srcObject = s;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('status').innerText = "Erro CSV"; }
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let near = null, dMin = Infinity;
    for(const pt of kmDB) {
        const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
        if(d < dMin) { dMin = d; near = pt; }
    }
    if(near) document.getElementById('km-live').innerText = "Km " + near.km;
}

function drawStamp(meta) {
    const w = proc.width, h = proc.height;
    ctx.save();
    const barH = h * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h - barH, w, barH);

    // GRAFIA: Km
    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.font = `900 ${barH * 0.5}px Arial`;
    ctx.fillText("Km " + meta.km, w * 0.05, h - (barH * 0.35));

    // Opcionais (Data e GPS)
    ctx.font = `bold ${barH * 0.2}px monospace`;
    ctx.textAlign = "right";
    let info = "";
    if(document.getElementById('cfg-date').value === 'S') info += meta.ts + " ";
    if(document.getElementById('cfg-gps').value === 'S') info += `[${meta.lat}, ${meta.lon}]`;
    ctx.fillText(info, w * 0.95, h - (barH * 0.4));
    
    ctx.restore();
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; buffer = []; batchNum++;
    document.getElementById('status').innerText = `Salvando Lote ${batchNum}...`;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawStamp(items[i]);
                const ratio = proc.width / proc.height;
                let dw = 297, dh = 297/ratio;
                if(dh > 210) { dh = 210; dw = 210*ratio; }
                doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', (297-dw)/2, (210-dh)/2, dw, dh);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hFolder.getFileHandle(`INSPECAO_LOTE_${batchNum}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
    document.getElementById('status').innerText = `Lote ${batchNum} OK!`;
}

function loop() {
    if(!active) return;
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    const bLimit = parseInt(document.getElementById('cfg-batch-size').value) || 50;
    
    buffer.push({
        raw: proc.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-live').innerText.replace("Km ", ""),
        ts: new Date().toLocaleString('pt-BR'),
        lat: gps ? gps.lat.toFixed(6) : "0",
        lon: gps ? gps.lon.toFixed(6) : "0"
    });

    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${bLimit}`;

    if(buffer.length >= bLimit) saveBatch();
    
    const interval = parseInt(document.getElementById('cfg-interval').value) || 750;
    setTimeout(loop, interval);
}

document.getElementById('btn-dir').onclick = async () => {
    hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btn-dir').innerText = "PASTA OK ✓";
    document.getElementById('btn-start').disabled = false;
};

document.getElementById('btn-start').onclick = () => {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    active = true; loop();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
};

document.getElementById('btn-stop').onclick = () => { active = false; saveBatch(); document.getElementById('btn-start').disabled = false; document.getElementById('btn-stop').disabled = true; };

function toggleSet() { document.getElementById('settings-flyout').classList.toggle('open'); }

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        updateKM();
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
