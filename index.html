<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a5ccf" />
<title>Inspeção – Captura Direta (Foto)</title>
<style>
  :root{
    --bg:#081227; --fg:#eaf2ff;
    --panelA:rgba(8,14,30,.82); --panelB:rgba(6,10,24,.78);
    --blue:#0a77d5; --blueDark:#095fb0; --white:#ffffff; --border:#e9f2ff;
    --shadow:0 14px 36px rgba(0,0,0,.45);
    --btnH:68px; --accent:#25D366; --warn:#eab308; --danger:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0; background:linear-gradient(180deg,#0b122b,#0a1024); color:var(--fg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,"Noto Sans",sans-serif;
    overflow:hidden; -webkit-user-select:none; user-select:none;
  }
  /* Tela cheia */
  #app{ position:fixed; inset:0; display:grid; grid-template-rows:1fr; }
  #camWrap{ position:relative; width:100%; height:100%; overflow:hidden; background:#000; isolation:isolate; }
  #vid{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000 }

  /* HUD topo: PLACA AZUL “km” */
  #hudTop{
    position:absolute; top:10px; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; z-index:3;
    padding:0 10px; pointer-events:none;
  }
  .road-sign{
    display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:116px; padding:10px 14px 12px;
    background:linear-gradient(180deg, var(--blue), var(--blueDark));
    color:var(--white); border-radius:14px;
    border:6px solid var(--border);
    box-shadow: 0 8px 24px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.75);
    text-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  .road-sign .km-label{
    font-weight:900; font-size:1.15rem; letter-spacing:.02em; line-height:1;
  }
  .road-sign .km-num{
    font-weight:900; font-size:1.9rem; letter-spacing:.02em; line-height:1.05; margin-top:6px;
  }

  /* Engrenagem (opções) */
  #gear{ pointer-events:auto;
    display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:12px;
    background:linear-gradient(180deg,var(--panelA),var(--panelB));
    border:1px solid rgba(255,255,255,.16); box-shadow:var(--shadow); cursor:pointer; user-select:none;
  }

  /* HUD base: ÚNICO botão */
  #hudBottom{
    position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; z-index:3;
  }
  .btn{
    pointer-events:auto;
    height:var(--btnH); min-width:240px; padding:0 22px;
    border-radius:14px; border:2px solid #1f2b56;
    background:linear-gradient(180deg,#0f1a45,#0c1436);
    color:#eaf2ff; font-weight:900; font-size:1.12rem; letter-spacing:.02em;
    display:flex; align-items:center; justify-content:center; gap:12px; cursor:pointer;
    box-shadow:var(--shadow);
  }
  .btn:active{ transform:translateY(1px) }
  .btn.auto-on{ background:linear-gradient(180deg,#ff8f49,#e06a2d); color:#1b0b02; border-color:#c45722 }
  .btn.primary{ background:linear-gradient(180deg,#31e27b,#22c55e); color:#062a1a; border-color:#1fb85b }

  /* Modal pasta */
  #folderGate{
    position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%, #0c2a3f, transparent 65%), #060a12;
  }
  .gateCard{
    background:linear-gradient(180deg, rgba(16,26,64,.9), rgba(14,22,52,.9));
    border:1px solid rgba(255,255,255,.16); border-radius:16px; padding:20px; width:min(92vw, 460px);
    color:#cfe1ff; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .gateCard h2{ margin:0 0 10px } .gateCard p{ margin:0 0 14px; opacity:.9 }
  .gateCard .btn{ width:100%; height:56px }

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%); display:none; z-index:20;
    background:linear-gradient(180deg, rgba(0,0,0,.78), rgba(0,0,0,.64));
    border:1px solid rgba(255,255,255,.16); color:#eaf2ff; padding:10px 14px; border-radius:12px;
  }

  /* Painel opções (popover) */
  #opts{
    position:absolute; right:10px; top:58px; z-index:4; display:none;
    background:linear-gradient(180deg,var(--panelA),var(--panelB));
    border:1px solid rgba(255,255,255,.16); border-radius:12px; box-shadow:var(--shadow);
    padding:12px; min-width:240px; pointer-events:auto;
  }
  #opts h4{ margin:0 0 8px; font-size:1rem }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0 }
  .row button{ padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.16); background:#0c1436; color:#eaf2ff; font-weight:800; cursor:pointer }
  .row input[type="range"]{ width:140px }
  .dim{ font-size:.86rem; opacity:.85 }
</style>
</head>
<body>
<div id="app">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>

    <!-- HUD topo: placa + engrenagem -->
    <div id="hudTop">
      <div class="road-sign" id="sign">
        <div class="km-label">km</div>
        <div class="km-num" id="kmNum">—</div>
      </div>
      <div id="gear">⚙️ Opções</div>
    </div>

    <!-- HUD base: único botão -->
    <div id="hudBottom">
      <button id="btnAuto" class="btn primary">🎬 INICIAR AUTO</button>
    </div>
  </div>
</div>

<!-- Painel de Opções -->
<div id="opts">
  <h4>Opções</h4>
  <div class="row">
    <span>Alternar câmera</span>
    <button id="btnSwap">🔄 Trocar</button>
  </div>
  <div class="row">
    <span>Intervalo (ms)</span>
    <input id="rngInterval" type="range" min="300" max="2000" step="50">
  </div>
  <div class="row">
    <span class="dim">Atual: <b id="lblInterval">—</b> ms</span>
    <button id="btnCloseOpts">Fechar</button>
  </div>
</div>

<!-- Modal: selecionar pasta -->
<div id="folderGate" aria-modal="true" role="dialog">
  <div class="gateCard">
    <h2>Selecionar Pasta de Saída</h2>
    <p>As <b>fotos (JPG)</b> serão gravadas automaticamente na pasta escolhida.</p>
    <button id="btnPickFolder" class="btn primary">📁 Escolher pasta</button>
    <p style="margin-top:10px;opacity:.85">Requisitos: Chrome/Edge em <b>HTTPS</b>. Mantenha <code>SNVBR116SPRJ.csv</code> (KM) na mesma pasta do HTML.</p>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================= Estado/Refs ================= */
let rootDirHandle=null;
let csvKMReady=false, camReady=false, gpsReady=false;
let lastPos=null;
let isAuto=false, autoTimer=null;
let photoBusy=false;
let photoQueue=Promise.resolve();

const vid=document.getElementById('vid');
const kmNum=document.getElementById('kmNum');
const btnAuto=document.getElementById('btnAuto');
const folderGate=document.getElementById('folderGate'); const btnPickFolder=document.getElementById('btnPickFolder');

const gear=document.getElementById('gear'), opts=document.getElementById('opts');
const btnSwap=document.getElementById('btnSwap'), rngInterval=document.getElementById('rngInterval'), lblInterval=document.getElementById('lblInterval');

/* Persistência do intervalo */
const DEF_INTERVAL = Number(localStorage.getItem('auto_ms')||'800');
rngInterval.value = String(DEF_INTERVAL); lblInterval.textContent = rngInterval.value;

/* ================= Utils ================= */
function showToast(msg,ms=1500){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(showToast.t); showToast.t=setTimeout(()=>t.style.display='none',ms); }
function fmtKmRaw(v){ let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return {K, m}; }
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function stampStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}-${String(d.getMinutes()).padStart(2,'0')}-${String(d.getSeconds()).padStart(2,'0')}`; }

/* ================= Pasta (perm) ================= */
async function verifyPermission(handle, readWrite){
  const opts = { mode: readWrite ? 'readwrite' : 'read' };
  if (await handle.queryPermission?.(opts) === 'granted') return true;
  if (await handle.requestPermission?.(opts) === 'granted') return true;
  return false;
}
async function pickFolder(){
  try{
    rootDirHandle = await window.showDirectoryPicker({mode:'readwrite'});
    const ok = await verifyPermission(rootDirHandle, true);
    if(!ok){ showToast('Permissão negada'); return; }
    folderGate.style.display='none';
    showToast('Pasta OK');
  }catch(e){ showToast('Seleção cancelada'); }
}
btnPickFolder.addEventListener('click', pickFolder);

/* ================= KM (CSV) ================= */
let kmPoints=[], kmGrid=new Map();
const CELL=0.005;
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=120,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${ky+dy},${kx+dx}`); if(a) out.push(...a);
      }
    }
  } return out;
}
async function loadKM(){
  try{
    const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
    kmPoints=[];
    for(const ln of lines){
      const c=ln.split(';');
      const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
      const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
      const t=(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon))?t1:
               (Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon))?t2:null;
      if(t) kmPoints.push(t);
    }
    kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
    csvKMReady = kmPoints.length>0;
  }catch{ csvKMReady=false; }
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const c=gridCands(kmGrid,lat,lon,140); if(!c.length) return null;
  let best=null,bd=Infinity; for(const p of c){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best;
}

/* ================= Câmera / Troca ================= */
let deviceList=[], deviceIndex=0, currentStream=null;
async function enumerateCameras(){
  try{
    const tmp=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    tmp.getTracks().forEach(t=>t.stop());
  }catch{}
  const devs=await navigator.mediaDevices.enumerateDevices();
  deviceList = devs.filter(d=>d.kind==='videoinput');
  const saved=localStorage.getItem('camId'); const idx=deviceList.findIndex(d=>d.deviceId===saved);
  deviceIndex = idx>=0?idx:0;
}
async function startCamera(idx=deviceIndex){
  try{
    currentStream?.getTracks().forEach(t=>t.stop());
    const dev=deviceList[idx];
    const cons = dev
      ? { video:{ deviceId:{exact:dev.deviceId}, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30,max:30} }, audio:false }
      : { video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30,max:30} }, audio:false };
    const st=await navigator.mediaDevices.getUserMedia(cons);
    vid.srcObject=st;
    await new Promise(res=>{ if(vid.readyState>=1&&vid.videoWidth) res(); else vid.onloadedmetadata=()=>res(); });
    camReady=true; currentStream=st;
    if(dev) localStorage.setItem('camId',dev.deviceId);
  }catch(e){ camReady=false; showToast('Falha na câmera'); }
}
btnSwap.addEventListener('click', async ()=>{
  if(!deviceList.length) await enumerateCameras();
  if(!deviceList.length) return;
  deviceIndex=(deviceIndex+1)%deviceList.length;
  await startCamera(deviceIndex);
});

/* ================= GPS ================= */
function startGPS(){
  if(!('geolocation' in navigator)){ gpsReady=false; return; }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true;
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
    },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
  },()=>{ gpsReady=false; }, {enableHighAccuracy:true, timeout:12000});
}

/* ================= Placa KM ao vivo ================= */
function updateSign(){
  if(lastPos && csvKMReady){
    const n=nearestKM(lastPos.lat,lastPos.lon);
    if(n){ const {K} = fmtKmRaw(n.km); kmNum.textContent = String(K); }
    else kmNum.textContent='—';
  }
}
setInterval(updateSign, 600);

/* ================= Carimbo na foto ================= */
function stampOverlay(ctx,w,h,kmStr,tsStr,gpsStr){
  const bandH=Math.max(100,Math.round(h*0.14));
  ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,h-bandH,w,bandH);
  if(kmStr){
    ctx.fillStyle='#b7ffcf'; ctx.textAlign='left'; ctx.font=`900 ${Math.round(h*0.05)}px system-ui`;
    ctx.shadowColor='rgba(34,197,94,.45)'; ctx.shadowBlur=16;
    ctx.fillText(`km ${kmStr}`,20,h-bandH+Math.round(bandH*0.5)); ctx.shadowBlur=0;
  }
  if(tsStr){
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.font=`700 ${Math.round(h*0.03)}px system-ui`;
    ctx.fillText(tsStr,20,h-18);
  }
  if(gpsStr){
    ctx.fillStyle='#cfe7ff'; ctx.textAlign='left'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
    ctx.fillText(gpsStr,20,h-bandH+28);
  }
}

/* ================= Captura/Gravação ROBUSTA (sem 0 KB) ================= */
const MAX_DIM=1920;

/* Preferência por OffscreenCanvas (convertToBlob) */
async function renderToJpegBlob(video, maxDim=MAX_DIM, quality=0.92){
  const vw=video.videoWidth||1920, vh=video.videoHeight||1080;
  const sc=(Math.max(vw,vh)>maxDim)? (maxDim/Math.max(vw,vh)) : 1;
  const w=Math.round(vw*sc), h=Math.round(vh*sc);

  // 1) OffscreenCanvas (robusto e rápido)
  if('OffscreenCanvas' in window){
    const off=new OffscreenCanvas(w,h); const octx=off.getContext('2d',{alpha:false});
    octx.drawImage(video,0,0,w,h);

    // carimbo
    const kmText = kmNum.textContent && kmNum.textContent!=='—' ? kmNum.textContent : null;
    const ts=new Date().toLocaleString();
    let gpsStr = '';
    if(lastPos) gpsStr = `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)`;
    stampOverlay(octx,w,h,kmText,ts,gpsStr);

    try{
      const blob=await off.convertToBlob({type:'image/jpeg', quality});
      if(blob && blob.size>0) return blob;
    }catch(e){ /* cai para os próximos métodos */ }
  }

  // 2) Canvas normal + toBlob
  const can=document.createElement('canvas'); const ctx=can.getContext('2d',{alpha:false});
  can.width=w; can.height=h; ctx.drawImage(video,0,0,w,h);

  const kmText2 = kmNum.textContent && kmNum.textContent!=='—' ? kmNum.textContent : null;
  const ts2=new Date().toLocaleString();
  let gpsStr2 = '';
  if(lastPos) gpsStr2 = `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)`;
  stampOverlay(ctx,w,h,kmText2,ts2,gpsStr2);

  const blob = await new Promise(res=>can.toBlob(res,'image/jpeg',quality));
  if(blob && blob.size>0) return blob;

  // 3) Fallback final: dataURL → Uint8Array → Blob
  const dataURL = can.toDataURL('image/jpeg', quality);
  const u8 = dataURLtoU8(dataURL);
  return new Blob([u8], {type:'image/jpeg'});
}

function dataURLtoU8(dataURL){
  const b64=dataURL.split(',')[1]; const bin=atob(b64); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
  return u8;
}

async function writeFileBytes(fileHandle, bytesOrBlob){
  const ok = await verifyPermission(rootDirHandle, true);
  if(!ok) throw new Error('No permission');

  const w=await fileHandle.createWritable();
  try{
    await w.truncate(0);
    let u8;
    if(bytesOrBlob instanceof Blob) u8=new Uint8Array(await bytesOrBlob.arrayBuffer());
    else if(bytesOrBlob instanceof Uint8Array) u8=bytesOrBlob;
    else u8=new Uint8Array(bytesOrBlob);
    await w.write(u8);
  }finally{
    await w.close();
  }

  // verifica tamanho
  const f=await fileHandle.getFile();
  if(f.size===0) throw new Error('zero-bytes');
  return f.size;
}

async function savePhotoNow(){
  // fila serial + semáforo — garante “uma por vez”
  if(photoBusy) return;
  if(!(rootDirHandle && camReady && gpsReady && csvKMReady && lastPos && vid.videoWidth)) return;

  photoBusy = true;
  try{
    const blob = await renderToJpegBlob(vid, MAX_DIM, 0.92);
    const kmText = kmNum.textContent && kmNum.textContent!=='—' ? kmNum.textContent : '—';
    const safeKm = kmText.replace(/\s+/g,'_');
    const name = `FOTO_km_${safeKm}_${stampStr()}.jpg`;
    const fh = await rootDirHandle.getFileHandle(name,{create:true});

    try{
      await writeFileBytes(fh, blob);
    }catch(e1){
      // reescreve com dataURL caso algum encoder tenha falhado silenciosamente
      const can = document.createElement('canvas');
      const vw=vid.videoWidth||1920, vh=vid.videoHeight||1080;
      const sc=(Math.max(vw,vh)>MAX_DIM)? (MAX_DIM/Math.max(vw,vh)) : 1;
      const w=Math.round(vw*sc), h=Math.round(vh*sc);
      can.width=w; can.height=h;
      const ctx=can.getContext('2d',{alpha:false});
      ctx.drawImage(vid,0,0,w,h);
      const dataURL=can.toDataURL('image/jpeg',0.9);
      const u8=dataURLtoU8(dataURL);
      try{
        await writeFileBytes(fh, u8);
      }catch(e2){
        console.error('Falha ao salvar foto:', e1, e2);
        showToast('Falha ao salvar foto');
      }
    }
  }catch(err){
    console.error('Erro na captura:', err);
    showToast('Falha na captura');
  }finally{
    photoBusy=false;
  }
}

/* ================= AUTO ================= */
function startAuto(){
  if(isAuto) return;
  const interval = Math.max(300, Math.min(2000, Number(rngInterval.value)||800));
  rngInterval.value = String(interval); lblInterval.textContent = String(interval);
  localStorage.setItem('auto_ms', String(interval));

  if(!(rootDirHandle && camReady && gpsReady && csvKMReady)){ showToast('Aguarde Pasta/Câmera/GPS/CSV'); return; }
  isAuto=true;
  btnAuto.textContent='⏹ PARAR AUTO'; btnAuto.classList.add('auto-on'); btnAuto.classList.remove('primary');
  autoTimer=setInterval(()=>{ photoQueue = photoQueue.then(()=>savePhotoNow()).catch(()=>{}); }, interval);
  showToast('Auto ON');
}
function stopAuto(){
  if(!isAuto) return;
  isAuto=false;
  btnAuto.textContent='🎬 INICIAR AUTO'; btnAuto.classList.remove('auto-on'); btnAuto.classList.add('primary');
  clearInterval(autoTimer); autoTimer=null;
  showToast('Auto OFF');
}
btnAuto.addEventListener('click', ()=>{ if(isAuto) stopAuto(); else startAuto(); });

/* ================= Opções (engrenagem) ================= */
gear.addEventListener('click', ()=>{
  opts.style.display = (opts.style.display==='block'?'none':'block');
});
document.getElementById('btnCloseOpts').addEventListener('click', ()=>{ opts.style.display='none'; });
rngInterval.addEventListener('input', ()=>{ lblInterval.textContent=rngInterval.value; });

/* ================= KM refresh ================= */
setInterval(()=>{
  if(lastPos && csvKMReady){
    const n=nearestKM(lastPos.lat,lastPos.lon);
    if(n){ const {K} = fmtKmRaw(n.km); kmNum.textContent=String(K); }
    else kmNum.textContent='—';
  }
}, 600);

/* ================= Boot ================= */
async function boot(){
  await enumerateCameras();
  await startCamera(deviceIndex);
  startGPS();
  await loadKM();
}
boot();
</script>
</body>
</html>
