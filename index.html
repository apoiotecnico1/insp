<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5.7 - PRECISION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00d9ff; --bg: #0a0a0a; --panel: #151515; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: #fff; font-family: 'Roboto', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw; 
        }

        /* Estrutura Principal */
        #app-wrapper { 
            display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 10px;
        }

        @media (orientation: landscape) {
            #app-wrapper { flex-direction: row; }
            #cam-section { flex: 2; position: relative; }
            #ui-section { flex: 0.8; display: flex; flex-direction: column; justify-content: space-between; }
        }

        /* Moldura da Câmera (Estilo Monitor) */
        #cam-section { 
            background: #000; border: 2px solid #333; border-radius: 15px; 
            overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* KM Discreto no Ao Vivo */
        #live-km-display {
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;
            font-size: 1.2rem; font-weight: bold; color: var(--accent);
            border: 1px solid rgba(0,217,255,0.3); backdrop-filter: blur(5px);
        }

        /* Seção de Controles */
        #ui-section { gap: 10px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { 
            background: var(--panel); padding: 12px; border-radius: 10px; text-align: center;
            border: 1px solid #222; 
        }
        .stat-card small { font-size: 0.6rem; color: #888; text-transform: uppercase; display: block; }
        .stat-card b { font-size: 1.2rem; color: #fff; }

        /* Botões Adaptativos */
        .btn-list { display: flex; flex-direction: column; gap: 8px; }
        button { 
            width: 100%; border: none; border-radius: 12px; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-dir { background: #f0ad4e; color: #000; height: 50px; font-size: 0.8rem; }
        .btn-start { background: #28a745; color: #fff; height: 65px; font-size: 1.1rem; }
        .btn-stop { background: #dc3545; color: #fff; height: 65px; font-size: 1.1rem; }
        
        button:disabled { opacity: 0.15; filter: grayscale(1); }
        button:active { transform: scale(0.96); }

        #log-status { font-size: 0.65rem; color: #666; text-align: center; overflow: hidden; height: 40px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="cam-section">
        <video id="v" autoplay playsinline muted></video>
        <div id="live-km-display">000+000</div>
    </div>

    <div id="ui-section">
        <div class="stats-row">
            <div class="stat-card"><small>Fotos/Lote</small><b id="txt-buffer">0/50</b></div>
            <div class="stat-card"><small>Total</small><b id="txt-total">0</b></div>
        </div>

        <div id="log-status">Aguardando definição de pasta...</div>

        <div class="btn-list">
            <button id="btn-dir" class="btn-dir">📂 Selecionar Pasta Destino</button>
            <button id="btn-start" class="btn-start" disabled>▶ Iniciar Captura</button>
            <button id="btn-stop" class="btn-stop" disabled>■ Parar e Salvar</button>
        </div>
        
        <div style="font-size: 10px; color: #444; text-align: center;">V5.7 PRECISION | GPS HIGHWAY</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmList = [], pos = null, active = false;
let total = 0, buffer = [], batchNum = 0, folder = null;

const v = document.getElementById('v');
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Início Imediato
window.onload = () => {
    initCam();
    loadCSV();
    initGPS();
};

async function initCam() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} }
        });
        v.srcObject = stream;
        // CORREÇÃO: Garante que o vídeo não trave ao voltar de popups
        v.onloadedmetadata = () => { 
            v.play(); 
            c.width = v.videoWidth; 
            c.height = v.videoHeight;
        };
    } catch(e) { console.error("Erro Cam:", e); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iK = h.indexOf('km'), iLt = h.findIndex(x => x.includes('lat')), iLn = h.findIndex(x => x.includes('lon'));
        
        kmList = rows.map(r => {
            const cols = r.split(';');
            return { k: cols[iK], lt: parseFloat(cols[iLt].replace(',','.')), ln: parseFloat(cols[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('log-status').innerText = "Erro ao carregar CSV!"; }
}

function updateKM() {
    if(!pos || !kmList.length) return;
    let best = null, dMin = Infinity;
    for(const p of kmList) {
        const d = Math.hypot(p.lt - pos.lat, p.ln - pos.lon);
        if(d < dMin) { dMin = d; best = p; }
    }
    if(best) document.getElementById('live-km-display').innerText = best.k;
}

/* ======= ESTAMPA ESTILO PERÍCIA (TIMESTAMP) ======= */
function drawTimestamp(data) {
    const w = c.width, h = c.height;
    ctx.save();
    
    // Barra de Fundo inferior (Preto transparente)
    const barH = h * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h - barH, w, barH);

    // Texto KM (Esquerda)
    ctx.fillStyle = "#00d9ff";
    ctx.textAlign = "left";
    const fontSizeKM = barH * 0.6;
    ctx.font = `bold ${fontSizeKM}px sans-serif`;
    ctx.fillText(data.km, w * 0.05, h - (barH * 0.3));

    // Data e Hora (Direita)
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "right";
    const fontSizeDate = barH * 0.3;
    ctx.font = `${fontSizeDate}px monospace`;
    ctx.fillText(data.ts, w * 0.95, h - (barH * 0.4));

    ctx.restore();
}

async function createPDF() {
    if(!buffer.length || !folder) return;
    const items = [...buffer]; buffer = [];
    batchNum++;
    
    document.getElementById('log-status').innerText = `Salvando Lote ${batchNum}...`;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawTimestamp(items[i]);
                
                // Redimensionamento proporcional sem esticar
                const ratio = c.width / c.height;
                let dw = 297, dh = 297/ratio;
                if(dh > 210) { dh = 210; dw = 210*ratio; }
                
                doc.addImage(c.toDataURL('image/jpeg', 0.8), 'JPEG', (297-dw)/2, (210-dh)/2, dw, dh);
                res();
            };
            img.src = items[i].src;
        });
    }

    const file = await folder.getFileHandle(`INSPECAO_LOTE_${batchNum}.pdf`, {create:true});
    const stream = await file.createWritable();
    await stream.write(doc.output('blob'));
    await stream.close();
    document.getElementById('log-status').innerText = `Lote ${batchNum} salvo com sucesso!`;
}

function captureLoop() {
    if(!active) return;
    
    ctx.drawImage(v, 0, 0, c.width, c.height);
    buffer.push({
        src: c.toDataURL('image/jpeg', 0.6),
        km: document.getElementById('live-km-display').innerText,
        ts: new Date().toLocaleString('pt-BR')
    });

    total++;
    document.getElementById('txt-total').innerText = total;
    document.getElementById('txt-buffer').innerText = `${buffer.length}/50`;

    if(buffer.length >= 50) createPDF();
    setTimeout(captureLoop, 650);
}

// Eventos
document.getElementById('btn-dir').onclick = async () => {
    folder = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btn-dir').innerText = "PASTA SELECIONADA ✓";
    document.getElementById('btn-start').disabled = false;
    v.play(); // Garante que a câmera não trave ao voltar
};

document.getElementById('btn-start').onclick = () => {
    active = true; captureLoop();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
};

document.getElementById('btn-stop').onclick = () => {
    active = false; createPDF();
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
};

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        pos = { lat: p.coords.latitude, lon: p.coords.longitude };
        updateKM();
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
