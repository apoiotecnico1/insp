<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>BR-Monitor Pro Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --verde-placa: linear-gradient(180deg, #008a3d 0%, #005a28 100%);
            --accent: #ffcc00;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Segoe UI', Bold, sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        #app-shell { position: relative; width: 100vw; height: 100vh; }
        #vid { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* HUD PLACA REALISTA */
        #km-hud { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: 20px; 
            z-index: 100;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6));
        }

        .placa-box {
            background: var(--verde-placa);
            padding: 10px 30px;
            border: 4px solid #ffffff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 200px;
        }

        /* Brilho de metal na placa */
        .placa-box::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, transparent 100%);
            border-radius: 8px 8px 0 0;
        }

        .br-txt { 
            font-size: 1.6rem; font-weight: 800; color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: -5px; letter-spacing: 2px;
        }

        .km-txt { 
            font-size: 3.5rem; font-weight: 900; color: #fff;
            text-shadow: 3px 3px 0px #003d1a, 6px 6px 12px rgba(0,0,0,0.8);
        }

        /* CONTROLES FULL SCREEN */
        #ui { 
            position: absolute; bottom: env(safe-area-inset-bottom, 30px); 
            width: 100%; display: flex; justify-content: center; 
            gap: 20px; z-index: 500; align-items: center;
        }

        .btn-main { 
            border: none; padding: 22px 50px; border-radius: 50px; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }
        
        .rec-dot { 
            width: 18px; height: 18px; background: red; border-radius: 50%; 
            display: none; animation: blink 0.8s infinite; 
            box-shadow: 0 0 15px red;
        }
        @keyframes blink { 50% { opacity: 0; } }

        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<!-- Tela Inicial de Permissão -->
<div id="gate" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:25px;">
    <h1 style="color:var(--accent); letter-spacing:2px;">BR MONITOR ULTRA</h1>
    <button class="btn-main" style="background:var(--accent); color:#000;" onclick="ativar()">INICIAR MODO FULL SCREEN</button>
</div>

<div id="app-shell" style="visibility:hidden">
    <video id="vid" autoplay playsinline muted onclick="takeSnap()"></video>
    
    <div id="km-hud">
        <div class="placa-box">
            <span class="br-txt" id="display-br">BR ---</span>
            <span class="km-txt" id="display-km">Km ---</span>
        </div>
    </div>

    <div id="ui">
        <div class="rec-dot" id="rec-icon"></div>
        <button id="btn-rec" class="btn-main" style="background:var(--accent)" onclick="toggleCapture()">INICIAR LOTE</button>
        <button id="btn-save" class="btn-main" style="background:#ff3333; color:#fff; display:none" onclick="toggleCapture()">GERAR RELATÓRIO</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, stream=null;
let buffer = [], brAtual = "---", lat="0", lon="0";

async function ativar() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        // Ativa Full Screen
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        const devices = await navigator.mediaDevices.enumerateDevices();
        const backCam = devices.filter(d => d.kind === 'videoinput').pop();
        
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: backCam.deviceId, width: {ideal: 1920}, height: {ideal: 1080} } 
        });
        
        const vid = document.getElementById('vid');
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            document.getElementById('c').width = vid.videoWidth;
            document.getElementById('c').height = vid.videoHeight;
        };
        
        loadCSV(); startGPS();
    } catch(e) { alert("Acesso à pasta e câmera são necessários."); }
}

function drawOverlays(ctx, can, km, br) {
    const s = can.height / 1080;
    ctx.save();

    // --- DESENHO DA PLACA NO JPG/PDF ---
    const w = 380 * s, h = 180 * s;
    const x = 40 * s, y = 40 * s;

    // Sombra da Placa
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur = 20 * s;
    ctx.shadowOffsetX = 10 * s;
    ctx.shadowOffsetY = 10 * s;

    // Gradiente da Placa
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, "#008a3d");
    g.addColorStop(1, "#005a28");
    ctx.fillStyle = g;
    
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 15 * s);
    ctx.fill();
    
    // Borda Branca
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 6 * s;
    ctx.stroke();

    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    
    // Texto BR
    ctx.font = `bold ${55 * s}px Arial`;
    ctx.fillText("BR " + br, x + w/2, y + 65 * s);
    
    // Texto KM com Sombra 3D
    ctx.font = `900 ${110 * s}px Arial`;
    ctx.shadowColor = "#002b13";
    ctx.shadowOffsetX = 5 * s;
    ctx.shadowOffsetY = 5 * s;
    ctx.fillText("Km " + km, x + w/2, y + 150 * s);

    ctx.restore();

    // --- LEGENDA DO RODAPÉ (Bonita e Profissional) ---
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    const footerH = 60 * s;
    ctx.fillRect(0, can.height - footerH, can.width, footerH);
    
    ctx.fillStyle = "#ffcc00";
    ctx.font = `bold ${26 * s}px monospace`;
    ctx.textAlign = "left";
    const info = `DATA: ${new Date().toLocaleString()}  |  RODOVIA: BR ${br}  |  KM: ${km}  |  COORD: ${lat}, ${lon}`;
    ctx.fillText(info, 30 * s, can.height - (22 * s));
}

async function takeSnap() {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    
    // Flash visual
    document.getElementById('flash').style.opacity = "1";
    setTimeout(()=> document.getElementById('flash').style.opacity = "0", 100);

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('display-km').innerText.replace("Km ", "");
    drawOverlays(ctx, can, km, brAtual);
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.92));
    const fh = await hDir.getFileHandle(`CAPTURA_BR${brAtual}_KM${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function toggleCapture() {
    capturing = !capturing;
    const btnRec = document.getElementById('btn-rec');
    const btnSave = document.getElementById('btn-save');
    const dot = document.getElementById('rec-icon');

    if(capturing) {
        buffer = [];
        btnRec.style.display = 'none';
        btnSave.style.display = 'block';
        dot.style.display = 'block';
        captureLoop();
    } else {
        btnRec.style.display = 'block';
        btnSave.style.display = 'none';
        dot.style.display = 'none';
        if(buffer.length > 0) savePDF();
    }
}

async function captureLoop() {
    if(!capturing) return;
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('display-km').innerText.replace("Km ", "");
    drawOverlays(ctx, can, km, brAtual);
    
    buffer.push(can.toDataURL('image/jpeg', 0.6));
    if(buffer.length >= 60) { savePDF(); buffer = []; }
    setTimeout(captureLoop, 500);
}

async function savePDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l', 'mm', 'a4');
    for(let i=0; i<buffer.length; i++) {
        if(i > 0) pdf.addPage();
        pdf.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const fh = await hDir.getFileHandle(`RELATORIO_BR${brAtual}_${Date.now()}.pdf`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(pdf.output('blob')); await sw.close();
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude.toFixed(6); 
        lon = p.coords.longitude.toFixed(6);
        if(!kmDB.length) return;
        
        let close = null, minDist = Infinity;
        kmDB.forEach(pt => {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < minDist) { minDist = d; close = pt; }
        });
        
        if(close) {
            brAtual = close.br;
            document.getElementById('display-br').innerText = "BR " + brAtual;
            document.getElementById('display-km').innerText = "Km " + close.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iBR = h.indexOf('br'), iKM = h.indexOf('km'), iLat = h.findIndex(x=>x.includes('lat')), iLon = h.findIndex(x=>x.includes('lon'));
        
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[iBR], km: c[iKM], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.log("CSV não encontrado, aguardando GPS..."); }
}
</script>
</body>
</html>
