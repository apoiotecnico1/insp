<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - DUAL CSV & PERSISTENCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; --glass: rgba(10, 10, 10, 0.96); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* SPLASH HYPNOS */
        #splash-hypnos { position: fixed; inset: 0; background: #000; z-index: 7000; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s; }
        .vortex { width: 150px; height: 150px; border: 4px solid var(--accent); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; animation: rotate 4s linear infinite; box-shadow: 0 0 50px var(--accent); }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* CHECKLIST & SAFETY */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #333; padding: 30px; border-radius: 12px; max-width: 500px; background: #080808; text-align: center; }
        .item { margin-bottom: 15px; display: flex; text-align: left; gap: 12px; font-size: 14px; color: #ddd; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 6px; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 20px; }

        /* UI */
        #app-shell { visibility: hidden; opacity: 0; transition: 0.8s; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { position: absolute; top: 25px; left: 25px; background: var(--placa-verde); padding: 8px 18px; border: 2px solid #fff; border-radius: 5px; z-index: 10; }
        #nox-hud { position: absolute; top: 90px; left: 25px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 4px; font-size: 12px; color: var(--accent); border-left: 3px solid var(--accent); }
        
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; z-index: 100; transition: 0.5s; }
        .ui-hidden { opacity: 0; pointer-events: none; }
        .btn-ui { border: none; border-radius: 4px; font-weight: 800; cursor: pointer; padding: 18px 45px; background: var(--accent); color: #000; }
        #gear-btn { width: 48px; height: 48px; border-radius: 6px; background: rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); z-index: 2000; padding: 60px 25px; transition: 0.5s; }
        #settings-panel.open { right: 0; }
        input, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-hypnos"><div class="vortex"></div></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 id="gate-title" style="color:var(--accent); margin-bottom:20px">PROTOCOLO DE ACESSO</h2>
        <div class="checklist">
            <div class="item"><b>✓</b> Verifique se o GPS está ativo.</div>
            <div class="item"><b>✓</b> Celular deve estar no suporte do veículo.</div>
            <div id="folder-status" class="item" style="color:var(--accent)"><b>!</b> Aguardando permissão da pasta de destino...</div>
        </div>
        <button id="gate-btn" class="btn-aware" onclick="initFolderFlow()">Vincular Pasta de Trabalho</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="nox-hud">ID: <span id="nox-txt">Buscando...</span></div>
    
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-ui" onclick="startCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="cursor:pointer; color:#777; margin-bottom:20px">FECHAR ×</div>
    <label style="font-size:10px">CÂMERA</label><select id="cam-select" onchange="initC(this.value)"></select>
    <label style="font-size:10px">WHATSAPP (OPCIONAL)</label><input type="text" id="cfg-zap" value="">
    <label style="font-size:10px">LOTE DE FOTOS</label><input type="number" id="cfg-lote" value="50">
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let kmDB=[], idDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = async () => {
    // Tenta recuperar pasta do IndexedDB
    const saved = await getSavedFolder();
    if(saved) {
        hDir = saved;
        document.getElementById('gate-title').innerText = "REATIVAR PASTA";
        document.getElementById('gate-btn').innerText = "Confirmar Acesso";
        document.getElementById('folder-status').innerHTML = "<b>✓</b> Pasta anterior detectada.";
    }

    setTimeout(() => {
        document.getElementById('splash-hypnos').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('splash-hypnos').remove(); 
            document.getElementById('safety-gate').style.display = 'flex'; 
        }, 800);
    }, 2000);

    loadAllCSVs();
    initGPS();
};

async function getSavedFolder() {
    return new Promise(r => {
        const req = indexedDB.open("InspecaoDB", 1);
        req.onupgradeneeded = () => req.result.createObjectStore("settings");
        req.onsuccess = () => {
            const store = req.result.transaction("settings", "readonly").objectStore("settings");
            const get = store.get("folderHandle");
            get.onsuccess = () => r(get.result);
        };
    });
}

async function initFolderFlow() {
    try {
        if (hDir) {
            const permission = await hDir.requestPermission({ mode: 'readwrite' });
            if (permission !== 'granted') throw new Error();
        } else {
            hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
            const req = indexedDB.open("InspecaoDB", 1);
            req.onsuccess = () => req.result.transaction("settings", "readwrite").objectStore("settings").put(hDir, "folderHandle");
        }
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
    } catch(e) { alert("Acesso à pasta é obrigatório."); }
}

async function loadAllCSVs() {
    // Carrega KM Rodovia
    try {
        const rK = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const tK = await rK.text();
        const rowsK = tK.split('\n').filter(l => l.includes(';'));
        const hK = rowsK.shift().split(';').map(v => v.trim().toLowerCase());
        const iK = hK.indexOf('km'), iLt = hK.findIndex(v => v.includes('lat')), iLn = hK.findIndex(v => v.includes('lon'));
        kmDB = rowsK.map(r => {
            const c = r.split(';');
            return { km: c[iK], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.log("Erro KM CSV"); }

    // Carrega IDs Nox
    try {
        const rI = await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now());
        const tI = await rI.text();
        const rowsI = tI.split('\n').filter(l => l.includes(';'));
        idDB = rowsI.map(r => {
            const c = r.split(';');
            return { id: c.trim(), lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.log("Erro Nox CSV"); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        const lat = p.coords.latitude, lon = p.coords.longitude;
        
        // Atualiza KM
        let bKM = kmDB.map(pt => ({ ...pt, d: Math.hypot(pt.lt-lat, pt.ln-lon) })).sort((a,b)=>a.d-b.d);
        if(bKM) document.getElementById('km-txt').innerText = "Km " + bKM.km;

        // Atualiza Nox
        let bID = idDB.map(pt => ({ ...pt, d: Math.hypot(pt.lt-lat, pt.ln-lon) })).sort((a,b)=>a.d-b.d);
        if(bID) document.getElementById('nox-txt').innerText = bID.id;
    }, null, {enableHighAccuracy:true});
}

async function listCams() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vids = devs.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    vids.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i+1}`;
        sel.appendChild(opt);
    });
    if(vids.length) initC(vids[vids.length-1].deviceId);
}

async function initC(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startCapture() { rec = true; document.getElementById('btn-start').style.display = 'none'; document.getElementById('btn-stop').style.display = 'block'; wakeUI(); loop(); }
function stopCapture() { rec = false; document.getElementById('btn-start').style.display = 'block'; document.getElementById('btn-stop').style.display = 'none'; savePDF(); }

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        raw: can.toDataURL('image/jpeg', 0.45),
        km: document.getElementById('km-txt').innerText,
        nox: document.getElementById('nox-txt').innerText,
        ts: new Date().toLocaleString('pt-BR')
    });
    if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) savePDF();
    setTimeout(loop, 400);
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = [];
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-180, can.width, 180);
                ctx.fillStyle = "#fff"; ctx.font = "bold 50px Arial";
                ctx.fillText(items[i].km + " | ID: " + items[i].nox, 50, can.height-100);
                ctx.font = "30px Arial"; ctx.fillText(items[i].ts, 50, can.height-50);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                r();
            };
            img.src = items[i].raw;
        });
    }

    const nome = `Relatorio_${items.km.replace(/\+/g,'_')}_${Date.now()}.pdf`;
    const f = await hDir.getFileHandle(nome, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}
</script>
</body>
</html>
