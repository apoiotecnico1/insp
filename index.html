<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>Relatório Fotográfico – Iluminação (Leve)</title>
<style>
  :root{
    --bg:#203e92; --bg2:#0b1224;
    --surface:#0f1731cc; --surface-strong:#1b368f;
    --fg:#e8eeff; --muted:#a9b7df; --border:#1e284d;
    --glow:#43ff9b; --glow2:#29e3ff; --warn:#eab308; --danger:#ef4444; --ok:#22c55e;
    --shadow: 0 10px 28px rgba(0,0,0,.38);
    --radius: 14px;
    --camH: 42vh;
    --btnGradA:#0d1430; --btnGradB:#0a0f26; --btnBorder:#20305e;
    --camGradA:#0b1230; --camGradB:#07102a; --camBorder:#213066;
    --pdfA:#857b5d; --pdfB:#eab308; --pdfText:#231c00;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--fg);
    background:
      radial-gradient(1200px 600px at 10% -10%, #16306a33, transparent 70%),
      radial-gradient(1000px 600px at 120% 10%, #0b553355, transparent 70%),
      var(--bg);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    padding:12px; line-height:1.35; overflow-x:hidden;
  }
  h1{margin:0 0 10px;text-align:center;font-size:1.28rem; letter-spacing:.02em}

  .card{
    background: linear-gradient(180deg, var(--surface), rgba(15,23,49,.7));
    backdrop-filter: saturate(140%) blur(6px);
    -webkit-backdrop-filter: saturate(140%) blur(6px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding:12px; margin:0 auto 12px;
    max-width:980px; box-shadow: var(--shadow);
  }

  /* ===== Barra de status ===== */
  #statusBar{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    max-width:980px; margin:0 auto 10px;
  }
  .st{
    display:inline-flex; align-items:center; gap:6px;
    background: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.28));
    border:1px solid rgba(255,255,255,.14);
    padding:6px 10px; border-radius:999px; font-size:.82rem; font-weight:800; color:#dfe7ff;
    box-shadow: 0 4px 12px rgba(0,0,0,.28);
  }
  .ok{ color:#b1ffd1 }
  .warn{ color:#ffdfa8 }

  /* ===== Câmera fixa no topo ===== */
  #camCard{
    position: fixed; left: 50%; top: calc( env(safe-area-inset-top, 0px) + 0px ); transform: translateX(-50%);
    width: calc(100vw - 24px); max-width:980px; height: var(--camH);
    z-index: 100; padding: 0; margin: 12px auto; border-radius: var(--radius);
    background: linear-gradient(180deg, var(--camGradA), var(--camGradB));
    border:1px solid var(--camBorder); box-shadow: 0 14px 36px rgba(0,0,0,.45), inset 0 0 0 1px #0d1b4e;
  }
  #wrap{ position: relative; height: 100%; border-radius: var(--radius); overflow: hidden }
  #vid{
    width: 100%; height: 100%; display: block; background:#000; border-radius: var(--radius);
    object-fit: contain; object-position: center; touch-action: pan-y;
  }
  #can{display:none}
  #camSpacer{ height: calc(var(--camH) + 24px + env(safe-area-inset-top, 0px)); max-width:980px; margin: 0 auto 8px; }

  /* ===== HUD discreto ===== */
  #hud{
    position:absolute; left:10px; bottom:10px; right:10px; display:flex; gap:8px; align-items:center; justify-content:space-between; pointer-events:none;
  }
  .pill{
    pointer-events:auto;
    display:inline-flex; align-items:center; gap:8px;
    background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.45));
    border:1px solid rgba(255,255,255,.18); color:#e6ebff;
    padding:6px 10px; border-radius:12px; font-size:.84rem; font-weight:900;
    box-shadow: 0 6px 16px rgba(0,0,0,.28);
  }
  .mini{
    pointer-events:auto;
    border:1px solid rgba(255,255,255,.18);
    background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.45));
    color:#e6ebff; border-radius:10px; padding:6px 8px; font-weight:900; font-size:.9rem; cursor:pointer;
  }
  /* botões sobre o vídeo */
  #btnMiniCycle{position:absolute; left:10px; top:10px;}
  #btnMiniPower{position:absolute; right:10px; top:10px;}
  #zoomBox{ position:absolute; left:50%; bottom:10px; transform:translateX(-50%); display:flex; align-items:center; gap:8px; background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.45)); padding:6px 10px; border:1px solid rgba(255,255,255,.18); border-radius:12px; }
  #zoomMini{ width:160px }

  /* Chip REC/AUTO mínimo */
  .chip{
    position: absolute; right: 12px; bottom: 56px;
    background: linear-gradient(180deg, rgba(127,29,29,.8), rgba(90,14,14,.72));
    border: 1px solid #dc2626; color: #ffe2e2; padding: 6px 10px; border-radius: 999px;
    font-size: .8rem; font-weight: 900; display: none; user-select: none; box-shadow: var(--shadow);
  }
  .chip.on{ display:inline-flex; align-items:center; gap:8px }

  /* ===== Ações ===== */
  .row{display:flex;gap:8px;flex-wrap:wrap}
  button{
    flex:1 1 180px; padding:12px 14px; font-size:.98rem; border:0; border-radius:12px; cursor:pointer;
    background: linear-gradient(180deg, var(--btnGradA), var(--btnGradB)); color:var(--fg); font-weight:900;
    border:1px solid var(--btnBorder); box-shadow: 0 6px 18px rgba(0,0,0,.25);
    transition: transform .06s ease, box-shadow .12s ease, filter .12s ease;
  }
  button:hover{ filter:brightness(1.05) }
  button:active{ transform: translateY(1px); box-shadow: 0 3px 12px rgba(0,0,0,.25) }
  #btnAutoCapture{ background: linear-gradient(180deg, #ff7b45, #e5612e); color:#1b0b02 }
  #btnVideoRecord{ background: linear-gradient(180deg, #f2544b, #cc3e36); color:#fff }
  #btnFinalizePdf{ background: linear-gradient(180deg, var(--pdfA), var(--pdfB)); color:var(--pdfText) }
  #btnSelectFolder{ background: linear-gradient(180deg, #35eb85, #22c55e); color:#072414 }
  #btnClear{ background: linear-gradient(180deg, #ff6161, #ef4444); color:#fff }
  button:disabled{opacity:.5;cursor:not-allowed; filter:grayscale(.2)}
  @media (max-width:420px){ button{flex:1 1 140px;font-size:.95rem} }

  #foto{width:100%;display:block;border:1px solid #2a335a;border-radius:12px;margin-top:8px; box-shadow: var(--shadow)}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .thumb{border:1px solid #243053;border-radius:10px;overflow:hidden;background:#0a122a}
  .thumb img{width:100%;display:block}
  .meta{padding:6px 8px;font-size:.78rem;color:#c7d2fe}

  #kmPlaque{
    text-align:center; padding:8px 12px;
    background: linear-gradient(180deg, #0d3b8e, #0a2e6d);
    border:2px solid #e6ecff; border-radius:12px; margin:0 auto 8px; max-width:980px;
    font-weight:900; font-size:1rem; color:#ffffff; box-shadow:0 6px 16px rgba(0,0,0,.28); text-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  #kmPlaque span{ letter-spacing:.02em }

  /* ===== Splash ===== */
  #splash{
    position: fixed; inset: 0; z-index: 2000;
    background: radial-gradient(1200px 600px at 50% -10%, #0c2a3f, transparent 65%), #060a12;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  #rainCanvas{ position:absolute; inset:0; width:100%; height:100% }
  .splash-inner{ position: relative; z-index: 2; text-align: center; padding: 24px 18px; }
  .title{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-weight: 900; font-size: clamp(1.2rem, 4vw, 2.4rem);
    letter-spacing: .06em; color: #b7ffcf;
    text-shadow: 0 0 10px #22c55e55, 0 0 22px #22c55e77, 0 0 40px #22c55e55, 0 1px 0 #0b1d14;
    white-space: nowrap; overflow: hidden; border-right: 2px solid #43ff9b;
    margin: 0 auto 10px; width: 0;
  }
  .subtitle{ font-weight:700; color:#9fe9ff; letter-spacing:.04em; opacity:.9 }
  .splash-actions{ margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap }
  .splash-btn{
    padding:10px 14px; border-radius:12px; border:1px solid #1b3b32;
    background: linear-gradient(180deg, #1b4c3b, #123c2e); color:#c8ffdf; font-weight:900; cursor:pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,.35);
  }
  .splash-btn:hover{ filter: brightness(1.08) }
  .splash-fade{ animation: splashout .6s ease forwards }
  @keyframes splashout{ to{ opacity:0; transform: scale(1.01) } }
  @keyframes typing { from { width: 0 } to { width: 24ch } }
  @keyframes caret { 0%, 100% { border-right-color: transparent } 50% { border-right-color: #43ff9b } }
</style>

<!-- Splash animado -->
<script>
(function(){
  const splash = document.getElementById('splash');
  const title  = document.getElementById('splashTitle');
  const btnStart = document.getElementById('btnStart');
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');

  let W, H, columns, fontSize = 16, drops = [], raf = null, started = false;

  function resize(){
    canvas.width = W = window.innerWidth;
    canvas.height = H = window.innerHeight;
    fontSize = Math.max(14, Math.min(24, Math.floor(W / 64)));
    columns = Math.floor(W / fontSize);
    drops = new Array(columns).fill(1);
  }
  window.addEventListener('resize', resize);

  function draw(){
    ctx.fillStyle = 'rgba(6,10,18,0.08)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#39ff88';
    ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
    for(let i=0;i<drops.length;i++){
      const char = String.fromCharCode(0x30A0 + Math.floor(Math.random()*96));
      ctx.fillText(char, i*fontSize, drops[i]*fontSize);
      if(drops[i]*fontSize > H && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    raf = requestAnimationFrame(draw);
  }
  function typeIn(){ title.style.animation = `typing 1200ms steps(24, end) forwards, caret 650ms step-end 6`; }
  function start(){
    if(started) return; started = true;
    splash.classList.add('splash-fade');
    setTimeout(()=>{ splash.style.display='none'; boot(); }, 580);
  }
  resize(); draw(); typeIn();
  const auto = setTimeout(start, 2200);
  btnStart.addEventListener('click', ()=>{ clearTimeout(auto); start(); });
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden && raf){ cancelAnimationFrame(raf); raf = null; }
    else if(!raf){ raf = requestAnimationFrame(draw); }
  }, {passive:true});
})();
</script>

<script>
/* ===== Utilitários ===== */
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u), Math.sqrt(1-u)); }
function fmtKm(v){ let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
function cleanLine(l){ return l.replace(/^\uFEFF/,'').trim(); }
function bytesToMB(b){ return (b/1048576).toFixed(1); }

/* ===== Estado ===== */
let dataset=[], kmPoints=[]; let csvReady=false, camReady=false, gpsReady=false;
let lastPos=null; let isAutoCapturing=false; let autoCaptureInterval=null;
let isRecordingVideo=false; let mediaRecorder=null;
let kmUpdateInterval=null;

const overlayOpts = { showKM:true, showTs:true, showIds:true, showGps:false };

/* ===== Referências ===== */
const vid=document.getElementById('vid'); const can=document.getElementById('can'); const ctx=can.getContext('2d',{alpha:false});
const foto=document.getElementById('foto'); const wrap=document.getElementById('wrap'); const chip=document.getElementById('chip');
const kmTop=document.getElementById('kmTop'); const gal=document.getElementById('gal');

const stCsv=document.getElementById('stCsv'); const stCam=document.getElementById('stCam'); const stGps=document.getElementById('stGps'); const stFotos=document.getElementById('stFotos'); const stFolder=document.getElementById('stFolder'); const stPdf=document.getElementById('stPdf');

const btnSelectFolder = document.getElementById('btnSelectFolder'); const btnFinalizePdf = document.getElementById('btnFinalizePdf'); const btnClear = document.getElementById('btnClear');
const btnAutoCapture=document.getElementById('btnAutoCapture'); const btnVideoRecord=document.getElementById('btnVideoRecord');

const btnMiniCycle=document.getElementById('btnMiniCycle');
const btnMiniPower=document.getElementById('btnMiniPower');
const zoomBox=document.getElementById('zoomBox'); const zoomMini=document.getElementById('zoomMini'); const zoomVal=document.getElementById('zoomVal');

/* HUD */
const hudPhotos=document.getElementById('hudPhotos'); const hudRight=document.getElementById('hudRight'); const hudVideoSize=document.getElementById('hudVideoSize');

/* ===== File System Access + PDF incremental ===== */
let rootDirHandle = null;
let photoCount = 0;
let previewBuffer = []; // últimas 10
let pdfWriter = null;

function makeByteWriter(stream){
  const enc = new TextEncoder();
  let pos = 0;
  return {
    async writeStr(s){ const bin = enc.encode(s); await stream.write(bin); pos += bin.length; },
    async writeBin(bin){ await stream.write(bin); pos += bin.length; },
    get pos(){ return pos; }
  };
}
function createPdfStreamWriter(stream){
  const writer = makeByteWriter(stream);
  const offsets = []; // offsets[objectNumber] = byte offset
  const pagesKids = [];
  const PW = 595, PH = 842, M = 24;
  let nextNum = 3; // 1=/Catalog, 2=/Pages
  let closed = false;

  const xrefPad = n => String(n).padStart(10,'0');

  async function writeObjWithNum(num, body){
    offsets[num] = writer.pos;
    await writer.writeStr(`${num} 0 obj\n${body}\nendobj\n`);
  }
  async function addObj(body){
    const num = nextNum++;
    await writeObjWithNum(num, body);
    return num;
  }
  async function addStream(dict, data){
    const num = nextNum++;
    offsets[num] = writer.pos;
    const header = `${num} 0 obj\n${dict.replace('>>','')} /Length ${data.length} >>\nstream\n`;
    await writer.writeStr(header);
    await writer.writeBin(data);
    await writer.writeStr(`\nendstream\nendobj\n`);
    return num;
  }

  function fitToCell(imgW, imgH){
    let cellW = PW - 2*M, cellH = PH - 2*M;
    let dw = cellW, dh = Math.round(imgH*(cellW/imgW));
    if(dh > cellH){ dh=cellH; dw=Math.round(imgW*(cellH/imgH)); }
    const tx = M + Math.round((cellW - dw)/2);
    const ty = M + Math.round((cellH - dh)/2);
    return {dw, dh, tx, ty};
  }

  return {
    async init(){ await writer.writeStr('%PDF-1.4\n'); },
    async addImagePage(blob, knownW, knownH){
      if(closed) return;
      let w = knownW, h = knownH;
      if(!(w && h)){
        const url = URL.createObjectURL(blob);
        const im = await new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=url; });
        URL.revokeObjectURL(url);
        w = im.naturalWidth; h = im.naturalHeight;
      }
      const imgBuf = new Uint8Array(await blob.arrayBuffer());
      const imNum = await addStream(`<< /Type /XObject /Subtype /Image /Width ${w} /Height ${h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode >>`, imgBuf);

      const {dw, dh, tx, ty} = fitToCell(w, h);
      const content = `q
${dw} 0 0 ${dh} ${tx} ${PH - (ty + dh)} cm
/Im0 Do
Q
`;
      const contNum = await addStream(`<< >>`, new TextEncoder().encode(content));
      const pageNum = await addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << /Im0 ${imNum} 0 R >> >> /Contents ${contNum} 0 R >>`);
      pagesKids.push(pageNum);
    },
    async finalize(){
      if(closed) return; closed = true;
      await writeObjWithNum(2, `<< /Type /Pages /Kids [ ${pagesKids.map(n=>`${n} 0 R`).join(' ')} ] /Count ${pagesKids.length} >>`);
      await writeObjWithNum(1, `<< /Type /Catalog /Pages 2 0 R >>`);

      const xrefStart = writer.pos;
      const count = Math.max(1, offsets.length-1) + 1;
      let xr = `xref\n0 ${count}\n0000000000 65535 f \n`;
      for(let i=1;i<count;i++){
        const off = offsets[i] ?? 0;
        const inUse = (offsets[i] != null);
        xr += `${xrefPad(off)} 00000 ${inUse?'n':'f'} \n`;
      }
      await writer.writeStr(xr);
      await writer.writeStr(`trailer\n<< /Size ${count} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`);
      await stream.close();
    }
  };
}

async function selectOutputFolder(){
  if(!('showDirectoryPicker' in window)){
    alert('Seu navegador não suporta seleção de pasta (File System Access API). Use Chrome/Edge no Android ou Desktop.');
    return;
  }
  rootDirHandle = await window.showDirectoryPicker({ mode:'readwrite' });

  // Nome da pasta exibido
  try{
    const name = rootDirHandle.name || 'OK';
    stFolder.textContent = 'Pasta: ' + name;
    stFolder.className = 'st ok';
    btnSelectFolder.textContent = '📁 Pasta: ' + name;
  }catch{
    stFolder.textContent = 'Pasta: OK';
    stFolder.className = 'st ok';
  }

  // Abre PDF do relatório (novo arquivo)
  const pdfHandle = await rootDirHandle.getFileHandle(`RELATORIO_${new Date().toISOString().slice(0,10)}_${Date.now()}.pdf`, { create:true });
  const stream = await pdfHandle.createWritable();
  pdfWriter = createPdfStreamWriter(stream);
  await pdfWriter.init();

  btnFinalizePdf.disabled = false;
  stPdf.textContent = 'PDF: ABERTO';
  stPdf.className = 'st ok';
}

async function savePhotoDirect(blob, filename, w, h){
  if(!rootDirHandle){
    await selectOutputFolder();
    if(!rootDirHandle) throw new Error('Pasta não selecionada');
  }

  // JPEG
  const fileHandle = await rootDirHandle.getFileHandle(filename, { create:true });
  const writable = await fileHandle.createWritable();
  await writable.write(blob);
  await writable.close();

  // PDF incremental
  if(pdfWriter){
    await pdfWriter.addImagePage(blob, w, h);
  }

  photoCount++;
  hudPhotos.textContent = photoCount;
  stFotos.textContent = 'Fotos: ' + photoCount;
}
</script>

<script>
/* ===== CSVs (IDs + KM) ===== */
const CELL=0.005; const idGrid=new Map(), kmGrid=new Map();
function cellKey(lat,lon){ return `${Math.floor(lat/CELL)},${Math.floor(lon/CELL)}`; }
function gridInsert(grid,p){ const k=cellKey(p.lat,p.lon); const a=grid.get(k); a?a.push(p):grid.set(k,[p]); }
function gridCands(grid,lat,lon,minCount=60,maxR=5){
  const ky=Math.floor(lat/CELL), kx=Math.floor(lon/CELL); const out=[];
  for(let r=0;r<=maxR && out.length<minCount;r++){
    for(let dy=-r;dy<=r;dy++){ const y=ky+dy;
      for(let dx=-r;dx<=r;dx++){
        if(r>0 && Math.abs(dx)!==r && Math.abs(dy)!==r) continue;
        const a=grid.get(`${y},${kx+dx}`); if(a) out.push(...a);
      }
    }
  } return out.length?out:[];
}
async function loadIDs(){
  const txt=await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'}).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  const head=lines[0].split(';').map(h=>h.toLowerCase());
  const iId=head.findIndex(h=>h.includes('id') && !h.includes('lat') && !h.includes('long'));
  const iLat=head.findIndex(h=>h.includes('lat')); const iLon=head.findIndex(h=>h.includes('lon'));
  dataset=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(';');
    const id=String(c[iId]||'').trim(), lat=parsePt(c[iLat]), lon=parsePt(c[iLon]);
    if(!id || !Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    if(lat===0 && lon===0) continue; if(Math.abs(lat)>90 || Math.abs(lon)>180) continue;
    dataset.push({id,lat,lon});
  }
  idGrid.clear(); for(const p of dataset) gridInsert(idGrid,p);
}
function pickTrio(c){
  const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(Number.isFinite(t1.km)&&Number.isFinite(t1.lat)&&Number.isFinite(t1.lon)) return t1;
  const t2={km:parsePt(c[7]),lat:parsePt(c[8]),lon:parsePt(c[9])};
  if(Number.isFinite(t2.km)&&Number.isFinite(t2.lat)&&Number.isFinite(t2.lon)) return t2;
  return null;
}
async function loadKM(){
  const txt=await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
  const lines=txt.split(/\r?\n/).map(cleanLine).filter(Boolean);
  kmPoints=[]; let lastKeep=null; const MIN_STEP=5;
  for(let i=0;i<lines.length;i++){
    const c=lines[i].split(';'); if(isNaN(parsePt(c[0])) && isNaN(parsePt(c[7]||''))) continue;
    const t=pickTrio(c); if(!t) continue;
    if(!Number.isFinite(t.km)||!Number.isFinite(t.lat)||!Number.isFinite(t.lon)) continue;
    if(!lastKeep){ kmPoints.push(t); lastKeep=t; } else {
      const d=hav(lastKeep.lat,lastKeep.lon,t.lat,t.lon);
      if(d>=MIN_STEP){ kmPoints.push(t); lastKeep=t; }
    }
  }
  kmGrid.clear(); for(const p of kmPoints) gridInsert(kmGrid,p);
}
async function loadCSVs(){
  try{ await Promise.all([loadIDs(),loadKM()]); csvReady=dataset.length>0 && kmPoints.length>0; }
  catch{ csvReady=false; }
  updateStatusBar();
}

/* ===== Vizinho/KM ===== */
function nearestN(lat,lon,n=5){
  if(!dataset.length) return [];
  const cand=gridCands(idGrid,lat,lon,Math.max(60,n*20));
  const arr=cand.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d); return arr.slice(0,n);
}
function nearestKM(lat,lon){
  if(!kmPoints.length) return null;
  const cand=gridCands(kmGrid,lat,lon,120); if(!cand.length) return null;
  let best=null,bd=Infinity; for(const p of cand){ const d=hav(lat,lon,p.lat,p.lon); if(d<bd){bd=d;best=p;} } return best;
}
</script>

<script>
/* ===== Câmera / Zoom (sem fit inteligente) ===== */
let currentStream=null, currentTrack=null, currentCap=null; let deviceList=[], deviceIndex=0;
let videoAR = 16/9;

function computeAvailableW(){ const pad = 24; return Math.min(window.innerWidth - pad, 980); }
function applyCamHeight(){
  const w = computeAvailableW();
  const h = Math.round(w / (videoAR || (16/9)));
  document.documentElement.style.setProperty('--camH', Math.max(220, Math.min(h, (window.visualViewport?.height||window.innerHeight)-160)) + 'px');
}
window.addEventListener('resize', applyCamHeight);
if(window.visualViewport){ visualViewport.addEventListener('resize', applyCamHeight); visualViewport.addEventListener('scroll', applyCamHeight); }

function lensHint(label=''){ const s=String(label).toLowerCase();
  if(/tele|zoom\s?lens|50mm|70mm|3x|5x/.test(s)) return 'tele';
  if(/ultra|wide\s?angle|0\.5x|0,5x|ultra\-wide|superwide|grande|wide \(ultra\)/.test(s)) return 'ultra';
  if(/wide|1x|principal|main|back|rear/.test(s)) return 'wide'; return '';
}
function saveCamPrefs(){
  const dev=deviceList[deviceIndex]; if(dev){
    localStorage.setItem('camDeviceId',dev.deviceId);
    const z=Number(zoomMini.value||1);
    if(currentCap?.zoom) localStorage.setItem('camZoom_'+dev.deviceId,z);
  }
}
function loadCamPrefsFor(id){ const z=localStorage.getItem('camZoom_'+id); return z?Number(z):null; }

async function startCamera(deviceIdx=deviceIndex){
  try{
    if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
    currentStream=currentTrack=currentCap=null;
    const dev=deviceList[deviceIdx];
    const constraints=dev? {video:{deviceId:{exact:dev.deviceId}},audio:false} : {video:{facingMode:{ideal:'environment'}},audio:false};
    const st=await navigator.mediaDevices.getUserMedia(constraints);
    currentStream=st; vid.srcObject=st;

    await new Promise(res=>{ if(vid.readyState>=1 && vid.videoWidth) return res(); vid.onloadedmetadata=()=>res(); setTimeout(res,1200); });
    currentTrack=st.getVideoTracks()[0];
    currentCap=currentTrack.getCapabilities? currentTrack.getCapabilities(): null;

    if (vid.videoWidth && vid.videoHeight) { videoAR = vid.videoWidth / vid.videoHeight; }
    applyCamHeight();

    // Zoom discreto na tela
    if(currentCap && currentCap.zoom){
      zoomMini.min=currentCap.zoom.min??1; zoomMini.max=currentCap.zoom.max??1; zoomMini.step=currentCap.zoom.step??0.1;
      let z=loadCamPrefsFor(dev?.deviceId) ?? (currentCap.zoom.min ?? 1);
      z=Math.min(zoomMini.max, Math.max(zoomMini.min, z)); await applyZoom(z,true);
      zoomBox.style.display='';
    }else{ zoomBox.style.display='none'; }

    camReady=!!vid.videoWidth; deviceIndex=deviceIdx; saveCamPrefs();
    stCam.textContent = 'Câmera: OK';
    stCam.className = 'st ok';
  }catch(e){
    camReady=false; stCam.textContent='Câmera: —'; stCam.className='st warn';
  }
  updateStatusBar();
}
async function applyZoom(val, noSave=false){
  if(!(currentTrack && currentCap && currentCap.zoom)) return;
  const z=Number(val);
  try{ await currentTrack.applyConstraints({advanced:[{zoom:z}]}); }
  catch{ try{ await currentTrack.applyConstraints({zoom:z}); }catch(e){} }
  zoomMini.value=z; zoomVal.textContent=`${Number(z).toFixed(1)}×`; if(!noSave) saveCamPrefs();
}
async function enumerateCameras(){
  try{ await navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(s=>s.getTracks().forEach(t=>t.stop())); }catch{}
  const devices=await navigator.mediaDevices.enumerateDevices();
  deviceList=devices.filter(d=>d.kind==='videoinput');
  deviceList.sort((a,b)=>{ const A=/back|rear|environment/i.test(a.label), B=/back|rear|environment/i.test(b.label); if(A && !B) return -1; if(!A && B) return 1; return a.label.localeCompare(b.label); });
  const savedId=localStorage.getItem('camDeviceId'); const idx=Math.max(0, deviceList.findIndex(d=>d.deviceId===savedId));
  deviceIndex=idx>=0?idx:0;
}

/* Mini botões na tela */
btnMiniCycle.addEventListener('click', async ()=>{
  if(!deviceList.length){ await enumerateCameras(); }
  if(!deviceList.length) return;
  deviceIndex=(deviceIndex+1)%deviceList.length;
  await startCamera(deviceIndex);
});
zoomMini.addEventListener('input', ()=>applyZoom(zoomMini.value));

/* Parar/Ligar câmera (⏻) */
let cameraPaused=false;
btnMiniPower.addEventListener('click', async ()=>{
  if(isAutoCapturing || isRecordingVideo){ alert('Pare a captura/gravação antes de desligar a câmera.'); return; }
  if(!cameraPaused){
    if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); }
    vid.srcObject=null; cameraPaused=true; camReady=false;
    stCam.textContent='Câmera: Parada'; stCam.className='st warn';
    btnMiniPower.textContent='▶️';
  }else{
    await startCamera(deviceIndex);
    cameraPaused=false; btnMiniPower.textContent='⏻';
  }
});
</script>

<script>
/* ===== GPS ===== */
function startGPS(){
  if(!('geolocation' in navigator)){ gpsReady=false; updateStatusBar(); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
    gpsReady=true; updateStatusBar();
    navigator.geolocation.watchPosition(pos=>{
      lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy};
    }, ()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
  }, ()=>{
    gpsReady=false; updateStatusBar();
  }, {enableHighAccuracy:true, timeout:12000});
}
</script>

<script>
/* ===== Carimbo ===== */
function stampOverlay(ctx, w, h, kmStr, ids, ts, gpsLine){
  const bandH=Math.max(144,Math.round(h*0.16));
  ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(0,h-bandH,w,bandH);

  if(overlayOpts.showKM && kmStr){
    ctx.fillStyle='#b7ffcf'; ctx.textAlign='left'; ctx.font=`900 ${Math.round(h*0.055)}px system-ui`;
    ctx.shadowColor='rgba(34,197,94,.45)'; ctx.shadowBlur=16;
    ctx.fillText(kmStr,20,h-bandH+Math.round(bandH*0.52)); ctx.shadowBlur=0;
  }
  if(overlayOpts.showTs){
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.font=`700 ${Math.round(h*0.032)}px system-ui`;
    ctx.fillText(ts,20,h-Math.round(bandH*0.22));
  }
  if(overlayOpts.showGps && gpsLine){
    ctx.fillStyle='#d7e5ff'; ctx.textAlign='left'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
    ctx.fillText(gpsLine,20,h-Math.round(bandH*0.5));
  }
  if(overlayOpts.showIds && Array.isArray(ids)){
    ctx.textAlign='right'; ctx.fillStyle='#d7e5ff'; ctx.font=`600 ${Math.round(h*0.028)}px system-ui`;
    ids.forEach((e,i)=>ctx.fillText(e.id,w-20,h-bandH+28+i*26));
  }
}
</script>

<script>
/* ===== Captura (leve) ===== */
const CAP_MAX_DIM = 1600;

function addPreview(url, meta){
  previewBuffer.push({url, meta});
  if(previewBuffer.length > 10){
    const removed = previewBuffer.shift();
    try{ URL.revokeObjectURL(removed.url); }catch{}
  }
  renderGallery();
}
function renderGallery(){
  gal.innerHTML='';
  previewBuffer.forEach((p)=>{
    const d=document.createElement('div'); d.className='thumb';
    const im=document.createElement('img'); im.src=p.url;
    const meta=document.createElement('div'); meta.className='meta'; meta.textContent=p.meta;
    d.appendChild(im); d.appendChild(meta); gal.appendChild(d);
  });
  btnClear.disabled = previewBuffer.length===0;
  updateStatusBar();
}
function buildFilename(kmStr, ts){
  const safeKm = (kmStr||'KM_—').replace('KM ','').replace('+','_').replace(/\s/g,'');
  const t = new Date(ts);
  const stamp = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}_${String(t.getHours()).padStart(2,'0')}-${String(t.getMinutes()).padStart(2,'0')}-${String(t.getSeconds()).padStart(2,'0')}`;
  return `FOTO_${safeKm}_${stamp}.jpg`;
}

async function captureOnce(){
  if(!(csvReady && camReady && gpsReady && lastPos)) return;
  const vw = vid.videoWidth||1280, vh=vid.videoHeight||720;
  const scale = (Math.max(vw,vh)>CAP_MAX_DIM) ? (CAP_MAX_DIM/Math.max(vw,vh)) : 1;
  const w = Math.round(vw*scale), h = Math.round(vh*scale);
  can.width=w; can.height=h; ctx.drawImage(vid,0,0,w,h);

  const kmObj=nearestKM(lastPos.lat,lastPos.lon);
  const kmStr=kmObj? fmtKm(kmObj.km): 'KM —';
  const ids=nearestN(lastPos.lat,lastPos.lon,5);
  const ts=new Date().toLocaleString();
  const gpsLine = overlayOpts.showGps && lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';

  stampOverlay(ctx, w, h, overlayOpts.showKM?kmStr:'', overlayOpts.showIds?ids:[], overlayOpts.showTs?ts:'', gpsLine);

  const blob = await new Promise(res => can.toBlob(res,'image/jpeg',0.85));
  const fname = buildFilename(kmStr, new Date());
  await savePhotoDirect(blob, fname, w, h);

  const url = URL.createObjectURL(blob);
  foto.src=url;
  addPreview(url, `${kmStr} • ${ts}`);
}

/* Auto captura */
function startAutoCapture(){
  if(!rootDirHandle){ alert('Selecione a pasta primeiro.'); return; }
  if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; }
  isAutoCapturing=true; btnAutoCapture.textContent='⏹️ Parar'; btnAutoCapture.style.background='linear-gradient(180deg, #ff7b7b, #ef4444)';
  updateChip();
  autoCaptureInterval=setInterval(()=>{ captureOnce().catch(()=>{}); }, 600);
}
function stopAutoCapture(){
  if(!isAutoCapturing) return; isAutoCapturing=false;
  if(autoCaptureInterval){ clearInterval(autoCaptureInterval); autoCaptureInterval=null; }
  btnAutoCapture.textContent='🎬 Captura Auto'; btnAutoCapture.style.background='linear-gradient(180deg, #ff7b45, #e5612e)';
  updateChip();
}
btnAutoCapture.addEventListener('click', ()=>{ if(isAutoCapturing) stopAutoCapture(); else startAutoCapture(); });

btnClear.addEventListener('click', ()=>{
  previewBuffer.forEach(p=>{ try{ URL.revokeObjectURL(p.url);}catch{} });
  previewBuffer.length = 0; foto.removeAttribute('src'); renderGallery();
});
</script>

<script>

  if(isRecordingVideo){ labels.push('REC'); on=true; }

<script>
/* ===== Vídeo (stream direto) ===== */
let videoWritable = null;
let videoBytesWritten = 0;

async function openVideoWriter(){
  if(!rootDirHandle){
    await selectOutputFolder();
    if(!rootDirHandle) throw new Error('Pasta não selecionada');
  }
  const name = `VIDEO_${new Date().toISOString().replace(/[:.]/g,'-')}.webm`;
  const h = await rootDirHandle.getFileHandle(name, {create:true});
  videoWritable = await h.createWritable();
  videoBytesWritten = 0;
  hudRight.style.display='inline-flex';
  hudVideoSize.textContent = bytesToMB(0);
}
async function closeVideoWriter(){
  if(videoWritable){ await videoWritable.close(); videoWritable = null; }
  hudRight.style.display='none';
}

async function startVideoRecording(){
  if(!rootDirHandle){ await selectOutputFolder(); if(!rootDirHandle){ alert('Selecione a pasta'); return; } }
  if(!(csvReady && camReady && gpsReady && lastPos)){ alert('Aguarde CSV/Câmera/GPS'); return; }

  try{
    const videoStream=vid.srcObject; if(!videoStream){ alert('Câmera não disponível'); return; }

    const overlayCanvas=document.createElement('canvas'); overlayCanvas.width=vid.videoWidth||1280; overlayCanvas.height=vid.videoHeight||720; const overlayCtx=overlayCanvas.getContext('2d');
    const canvasStream=overlayCanvas.captureStream(30);
    const audioTracks=videoStream.getAudioTracks(); if(audioTracks.length>0){ canvasStream.addTrack(audioTracks[0]); }

    await openVideoWriter();

    const options={ mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 2500000 };
    const mimeOk = MediaRecorder.isTypeSupported(options.mimeType) ? options.mimeType : 'video/webm';
    mediaRecorder=new MediaRecorder(canvasStream, { ...options, mimeType:mimeOk });

    mediaRecorder.ondataavailable = async (e) => {
      if(e.data && e.data.size && videoWritable){
        await videoWritable.write(e.data);
        videoBytesWritten += e.data.size;
        hudVideoSize.textContent = bytesToMB(videoBytesWritten);
      }
    };
    mediaRecorder.onstop = async ()=>{
      isRecordingVideo=false;
      await closeVideoWriter();
      updateChip();
      stopKmUpdate();
    };

    mediaRecorder.start(1000);
    isRecordingVideo=true; updateChip();

    const drawLoop=()=>{
      if(!isRecordingVideo) return;
      overlayCtx.drawImage(vid, 0, 0, overlayCanvas.width, overlayCanvas.height);
      const kmObj=nearestKM(lastPos.lat,lastPos.lon); const kmStr=kmObj? fmtKm(kmObj.km): 'KM —';
      const ids=nearestN(lastPos.lat,lastPos.lon,5); const ts=new Date().toLocaleString();
      const gpsLine = overlayOpts.showGps && lastPos ? `${lastPos.lat.toFixed(6)}, ${lastPos.lon.toFixed(6)} (±${Math.round(lastPos.acc||0)} m)` : '';
      stampOverlay(overlayCtx, overlayCanvas.width, overlayCanvas.height,
        overlayOpts.showKM?kmStr:'', overlayOpts.showIds?ids:[], overlayOpts.showTs?ts:'', gpsLine);
      requestAnimationFrame(drawLoop);
    };
    drawLoop(); startKmUpdate();
  }catch(e){ console.error('Erro ao iniciar gravação:', e); alert('Erro ao iniciar gravação: '+e.message); isRecordingVideo=false; updateChip(); }
}
function stopVideoRecording(){
  if(!isRecordingVideo || !mediaRecorder) return;
  isRecordingVideo=false;
  try{ mediaRecorder.stop(); }catch{}
  updateChip();
}
btnVideoRecord.addEventListener('click', async ()=>{
  if(isRecordingVideo){
    btnVideoRecord.disabled=true; stopVideoRecording(); setTimeout(()=>{ btnVideoRecord.disabled=false; }, 500);
  } else {
    btnVideoRecord.disabled=true; try{ await startVideoRecording(); }catch(e){ console.error('Erro na gravação:', e); } btnVideoRecord.disabled=false;
  }
});
</script>
