<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Captura Automática BR-116</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: #007934; --whatsapp: #25D366; --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* Gate de Entrada */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .box { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 20px; max-width: 90%; }
        .btn-go { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.2rem; text-transform: uppercase; }

        #app { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM */
        #hud { position: absolute; top: 20px; left: 20px; background: var(--placa); padding: 15px 25px; border: 3px solid #fff; border-radius: 10px; z-index: 100; }
        #hud h1 { font-size: 2.5rem; font-weight: 900; }

        /* Status de Gravação */
        #status-rec { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: bold; opacity: 0; transition: 0.5s; }
        .dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Controles */
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; align-items: center; z-index: 1000; }
        .btn { padding: 20px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #start { background: var(--accent); }
        #stop { background: var(--danger); color: #fff; display: none; }
        #gear { background: rgba(255,255,255,0.2); font-size: 24px; padding: 15px; border-radius: 10px; border: none; cursor: pointer; }

        /* Painel de Config */
        #panel { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.95); padding: 50px 20px; transition: 0.3s; z-index: 2000; border-left: 1px solid #333; }
        #panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-top: 5px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <div class="box">
        <h2 style="color:var(--danger); margin-bottom:15px;">OPERAÇÃO AUTOMÁTICA</h2>
        <p style="margin-bottom:25px; color:#ccc;">O sistema enviará o link do WhatsApp automaticamente ao completar cada lote de fotos.</p>
        <button class="btn-go" onclick="initApp()">INICIAR SISTEMA</button>
    </div>
</div>

<div id="app">
    <video id="v" autoplay playsinline muted></video>
    
    <div id="hud"><h1 id="km-display">Km ---+---</h1></div>
    
    <div id="status-rec"><div class="dot"></div> AUTOMÁTICO: <span id="count">0</span></div>

    <div id="controls">
        <button id="gear" onclick="document.getElementById('panel').classList.toggle('open')">⚙️</button>
        <button id="start" class="btn" onclick="startAutoMode()">Iniciar Ciclo Automático</button>
        <button id="stop" class="btn" onclick="stopAutoMode()">Parar Sistema</button>
    </div>
</div>

<div id="panel">
    <button onclick="document.getElementById('panel').classList.remove('open')" style="color:var(--accent); background:none; border:none; margin-bottom:30px; cursor:pointer;">← VOLTAR</button>
    
    <div class="field">
        <label>WhatsApp do Fiscal (DDD+Nº):</label>
        <input type="text" id="wa-num" placeholder="5511999999999">
    </div>

    <div class="field">
        <label>Fotos por Relatório (Lote):</label>
        <input type="number" id="lote-size" value="50">
    </div>

    <div class="field">
        <label>Intervalo (Milissegundos):</label>
        <input type="number" id="intervalo" value="500">
    </div>

    <div class="field">
        <label>Selecionar Câmera:</label>
        <select id="cam-sel" onchange="changeCam(this.value)"></select>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let stream, db = [], capturing = false, buffer = [], folder;
let kmInicialLote = "";
const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');

async function initApp() {
    try {
        folder = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app').style.visibility = 'visible';
        
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-sel');
        sel.innerHTML = cams.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
        
        changeCam(cams[cams.length-1].deviceId);
        loadCSV();
        startGPS();
    } catch (e) { alert("Configuração de pasta e câmera necessária."); }
}

async function changeCam(id) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    v.srcObject = stream;
    v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
}

function startAutoMode() {
    capturing = true;
    buffer = [];
    kmInicialLote = document.getElementById('km-display').innerText.replace("Km ", "");
    document.getElementById('start').style.display = 'none';
    document.getElementById('stop').style.display = 'block';
    document.getElementById('status-rec').style.opacity = '1';
    autoLoop();
}

function stopAutoMode() {
    capturing = false;
    if (buffer.length > 0) finalizeLote();
    document.getElementById('start').style.display = 'block';
    document.getElementById('stop').style.display = 'none';
    document.getElementById('status-rec').style.opacity = '0';
}

function autoLoop() {
    if (!capturing) return;

    const currentKm = document.getElementById('km-display').innerText.replace("Km ", "");
    const limit = parseInt(document.getElementById('lote-size').value) || 50;

    ctx.drawImage(v, 0, 0, c.width, c.height);
    buffer.push({
        img: c.toDataURL('image/jpeg', 0.5),
        km: currentKm,
        ts: new Date().toLocaleString('pt-BR')
    });

    document.getElementById('count').innerText = buffer.length;

    // QUANDO ATINGE O LOTE, SALVA E CHAMA O WHATSAPP
    if (buffer.length >= limit) {
        finalizeLote(currentKm);
        buffer = [];
        kmInicialLote = currentKm;
    }

    setTimeout(autoLoop, parseInt(document.getElementById('intervalo').value) || 500);
}

async function finalizeLote(kmFinal) {
    const dataParaPdf = [...buffer];
    const kIni = kmInicialLote;
    const kFim = kmFinal || document.getElementById('km-display').innerText.replace("Km ", "");
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for (let i = 0; i < dataParaPdf.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(dataParaPdf[i].img, 'JPEG', 0, 0, 297, 210);
        
        // Carimbo no PDF
        doc.setFillColor(0,0,0,0.8);
        doc.rect(0, 185, 297, 25, 'F');
        doc.setTextColor(255,255,255);
        doc.setFontSize(16);
        doc.text(`Km ${dataParaPdf[i].km} - ${dataParaPdf[i].ts}`, 10, 200);
    }

    const nomeArquivo = `Relatorio_Km_${kIni}_ao_${kFim}.pdf`;
    const blob = doc.output('blob');
    
    // Salva na pasta automaticamente
    const handle = await folder.getFileHandle(nomeArquivo, {create:true});
    const writable = await handle.createWritable();
    await writable.write(blob);
    await writable.close();

    // DISPARO DO WHATSAPP (Abertura automática)
    const num = document.getElementById('wa-num').value;
    const msg = encodeURIComponent(`✅ Relatório Gerado Automático\nTrecho: Km ${kIni} ao ${kFim}\nO arquivo foi salvo na pasta do sistema.`);
    
    if (num) {
        window.open(`https://api.whatsapp.com/send?phone=${num}&text=${msg}`, '_blank');
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').slice(1);
        db = rows.map(row => {
            const cols = row.split(';');
            if (cols.length < 3) return null;
            return { km: cols, lat: parseFloat(cols.replace(',','.')), lon: parseFloat(cols.replace(',','.')) };
        }).filter(d => d && !isNaN(d.lat));
    } catch(e) { console.error("Erro CSV"); }
}

function startGPS() {
    navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        if (!db.length) return;
        let closest = db, minDist = Infinity;
        db.forEach(p => {
            const d = Math.hypot(p.lat - lat, p.lon - lon);
            if (d < minDist) { minDist = d; closest = p; }
        });
        if (closest) document.getElementById('km-display').innerText = "Km " + closest.km;
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
