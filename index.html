<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inspeção Rodoviária – KM Seguro</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui,Segoe UI,Arial;
}

video{
  width:100vw;
  height:55vh;
  object-fit:cover;
}

#kmBox{
  position:absolute;
  bottom:12px;
  left:12px;
  background:rgba(0,0,0,.7);
  border:2px solid #b7ffcf;
  color:#b7ffcf;
  padding:10px 16px;
  border-radius:10px;
  font-size:1.4rem;
  font-weight:900;
}

#controls{
  display:flex;
  gap:10px;
  padding:10px;
}

button{
  flex:1;
  padding:14px;
  font-size:1.1rem;
  font-weight:900;
  border-radius:14px;
  border:none;
}

#btnFoto{background:#22c55e;color:#042}
#btnRel{background:#facc15;color:#221}
#status{padding:10px;font-weight:700}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>
<canvas id="can" style="display:none"></canvas>

<div id="kmBox">KM —</div>

<div id="controls">
  <button id="btnFoto">📷 FOTO</button>
  <button id="btnRel">📄 GERAR RELATÓRIO</button>
</div>

<div id="status">Fotos na sessão: 0</div>

<script>
/* ========= CONFIGURAÇÃO ========= */
const MAX_FOTOS_LOTE = 50;

/* ========= ESTADO ========= */
let fotos = [];
let lock = false;
let ultimoClique = 0;
let kmAtual = 'KM —';

/* ========= CAMERA ========= */
const video = document.getElementById('vid');
const canvas = document.getElementById('can');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({
  video:{facingMode:'environment'},
  audio:false
}).then(stream => video.srcObject = stream);

/* ========= GPS + KM (SIMPLIFICADO) ========= */
/* Aqui já está pronto para ligar no seu CSV real */
navigator.geolocation.watchPosition(pos=>{
  // Simulação de KM (substituir pelo nearestKM depois)
  const km = 120;
  const m  = Math.floor(Math.random()*1000);
  kmAtual = `KM ${km}+${String(m).padStart(3,'0')}`;
  document.getElementById('kmBox').textContent = kmAtual;
},{
}, {enableHighAccuracy:true});

/* ========= CAPTURA SEGURA ========= */
function capturar(){
  const agora = Date.now();
  if(lock || agora - ultimoClique < 800) return;

  lock = true;
  ultimoClique = agora;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  // Overlay KM NA FOTO
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.fillRect(0, canvas.height-90, canvas.width, 90);

  ctx.fillStyle='#b7ffcf';
  ctx.font='bold 52px system-ui';
  ctx.fillText(kmAtual, 24, canvas.height-28);

  const img = canvas.toDataURL('image/jpeg',0.9);
  fotos.push(img);

  document.getElementById('status').textContent =
    `Fotos na sessão: ${fotos.length}`;

  // Geração automática a cada 50
  if(fotos.length >= MAX_FOTOS_LOTE){
    gerarRelatorio();
  }

  setTimeout(()=>lock=false,300);
}

/* ========= RELATÓRIO SIMPLES ========= */
function gerarRelatorio(){
  if(!fotos.length) return;

  const blob = new Blob(fotos,{type:'application/pdf'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `RELATORIO_INSPECAO_${Date.now()}.pdf`;
  a.click();
  URL.revokeObjectURL(a.href);

  fotos.length = 0;
  document.getElementById('status').textContent = 'Fotos na sessão: 0';
}

/* ========= BOTÕES ========= */
btnFoto.onclick = capturar;
btnRel.onclick = gerarRelatorio;
</script>

</body>
</html>
``
