<body>

<div id="painel">
  <div id="rodovia">BR-116</div>
  <div id="km">Km ---+---</div>
  <div id="municipio"></div>
</div>

<div id="clock"></div>

<script>
let kmDB = [];
let fullscreenAtivado = false;

function entrarFullscreenSeguro() {
  if (fullscreenAtivado) return;
  if (document.fullscreenElement == null) {
    document.documentElement.requestFullscreen()
      .then(() => fullscreenAtivado = true)
      .catch(() => {});
  }
}

/* relógio */
function clockLoop() {
  const d = new Date();
  document.getElementById("clock").innerText =
    d.toLocaleDateString("pt-BR") + " " +
    d.toLocaleTimeString("pt-BR");
}

/* start */
window.onload = () => {
  loadCSV().then(initGPS);
  setInterval(clockLoop, 1000);
  setTimeout(entrarFullscreenSeguro, 300);
};
</script>

</body>
