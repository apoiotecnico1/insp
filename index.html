<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE RELATÓRIO PROFISSIONAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: #007934; 
            --danger: #ff0000; 
            --gold-dark: #b8860b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; touch-action: none; }

        /* ADVERTÊNCIA */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .safety-box { max-width: 500px; text-align: center; border: 1px solid #333; padding: 40px; border-radius: 12px; }
        .safety-box h2 { color: var(--danger); margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; }
        .safety-box p { font-size: 18px; margin-bottom: 30px; font-weight: bold; }
        .btn-proceed { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; }

        /* APP */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }
        #draw-layer { position: absolute; inset: 0; z-index: 5; pointer-events: auto; }

        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 20px; border: 3px solid #fff; border-radius: 8px; z-index: 10; pointer-events: none; }
        #km-hud h1 { font-size: 2rem; font-weight: 900; }

        #rec-status { 
            position: absolute; top: 25px; right: 25px; display: none; align-items: center; gap: 8px; 
            background: rgba(0,0,0,0.7); padding: 6px 15px; border-radius: 20px; z-index: 10; 
            font-weight: 900; color: #fff; font-size: 16px; border: 1px solid rgba(255,255,255,0.2); 
        }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 10px var(--danger); }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* DESENHO TOOLS */
        #draw-tools { position: absolute; right: 20px; top: 100px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .mini-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        #btn-clear { display: none; background: var(--danger); }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 100; }
        .btn-rect { border: none; font-weight: 900; padding: 20px 40px; font-size: 14px; text-transform: uppercase; border-radius: 6px; cursor: pointer; min-width: 180px; text-align: center; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; border: 2px solid #fff; display: none; }
        #gear-btn { width: 55px; height: 55px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #444; cursor: pointer; font-size: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* PAINEL CONFIG */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #111; z-index: 4000; padding: 30px; transition: 0.3s; border-left: 2px solid var(--gold-dark); }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        select { 
            width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; background-size: 20px;
        }
        
        canvas#final-canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="safety-box">
        <h2>PROIBIDO A UTILIZAÇÃO ENQUANTO DIRIGE</h2>
        <p>SEJA CONSCIENTE</p>
        <button class="btn-proceed" onclick="requestAccess()">ESTOU CIENTE</button>
    </div>
</div>

<div id="settings-panel">
    <div style="margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px;">
        <span style="font-size: 14px; font-weight: bold; color: var(--accent);">AJUSTES TÉCNICOS</span>
    </div>
    <div class="field"><label>Câmera Disponível</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field">
        <label>Fotos por Lote (PDF)</label>
        <select id="cfg-lote">
            <option value="50">50 Fotos</option>
            <option value="100">100 Fotos</option>
            <option value="200" selected>200 Fotos</option>
            <option value="500">500 Fotos</option>
        </select>
    </div>
    <div class="field">
        <label>Intervalo de Captura</label>
        <select id="cfg-int">
            <option value="100">100 ms</option>
            <option value="200" selected>200 ms</option>
            <option value="500">500 ms</option>
            <option value="1000">1000 ms (1 seg)</option>
        </select>
    </div>
    <button onclick="toggleSet()" class="btn-rect" style="width:100%; background:var(--accent); color:#000;">SALVAR E FECHAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="draw-layer"></canvas>
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    <div id="rec-status"><div class="dot"></div><span>ON</span></div>
    <div id="draw-tools">
        <div class="mini-btn">✏️</div>
        <div class="mini-btn" id="btn-clear" onclick="clearBoard()">🗑️</div>
    </div>
    <div id="ui-controls">
        <button id="gear-btn" onclick="toggleSet(); event.stopPropagation();">⚙️</button>
        <button id="btn-start" class="btn-rect" onclick="initCapture(); event.stopPropagation();">INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-rect" onclick="stopCapture(); event.stopPropagation();">PARAR CAPTURA</button>
    </div>
</div>

<canvas id="final-canvas"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null;
let kmInicialLote = "";
const vid=document.getElementById('vid');
const drawCanvas=document.getElementById('draw-layer'), dctx=drawCanvas.getContext('2d');
const finalCanvas=document.getElementById('final-canvas'), fctx=finalCanvas.getContext('2d');

async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
}
setInterval(requestWakeLock, 20000);

function forceFull() { document.documentElement.requestFullscreen({ navigationUI: "hide" }).catch(() => {}); }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

// --- LÓGICA DE DESENHO ---
let drawing = false;
function setupDraw() {
    drawCanvas.width = window.innerWidth; drawCanvas.height = window.innerHeight;
    dctx.strokeStyle = '#ff0000'; dctx.lineWidth = 6; dctx.lineCap = 'round';
    const getXY = (e) => { const t = e.touches ? e.touches : e; return { x: t.clientX, y: t.clientY }; };
    drawCanvas.addEventListener('touchstart', (e) => {
        drawing = true; const p = getXY(e); dctx.beginPath(); dctx.moveTo(p.x, p.y);
        document.getElementById('btn-clear').style.display = 'flex';
    });
    drawCanvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getXY(e); dctx.lineTo(p.x, p.y); dctx.stroke(); });
    drawCanvas.addEventListener('touchend', () => drawing = false);
}
function clearBoard() { dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); document.getElementById('btn-clear').style.display = 'none'; }

// --- CORE ---
async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        setupDraw(); forceFull(); requestWakeLock();
        await listCams(); loadCSV(); initGPS();
    } catch (e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">CÂMERA ${i+1}</option>`).join('');
    if(vids.length > 0) { const lastId = vids[vids.length-1].deviceId; sel.value = lastId; initC(lastId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } });
    vid.srcObject = currentStream;
}

function initCapture() {
    buffer = []; // GARANTE SESSÃO LIMPA
    rec = true; 
    kmInicialLote = document.getElementById('km-txt').innerText.replace("KM ","");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) saveAuto([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("KM ",""));
    rec = false; buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        finalCanvas.width = vid.videoWidth; finalCanvas.height = vid.videoHeight;
        fctx.drawImage(vid, 0, 0);
        fctx.drawImage(drawCanvas, 0, 0, finalCanvas.width, finalCanvas.height);
        const curKm = document.getElementById('km-txt').innerText.replace("KM ","");
        buffer.push({ raw: finalCanvas.toDataURL('image/jpeg', 0.5), km: curKm, ts: new Date().toLocaleTimeString('pt-BR') });
        if(buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
            saveAuto([...buffer], kmInicialLote, curKm);
            buffer = []; kmInicialLote = curKm;
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

async function saveAuto(data, ini, fim) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        doc.addImage(data[i].raw, 'JPEG', 0, 0, pw, ph);
        doc.setFillColor(0, 0, 0, 0.6); doc.rect(0, ph - 18, 95, 18, 'F');
        doc.setTextColor(255); doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text(`KM ${data[i].km}`, 8, ph - 10);
        doc.setFontSize(9); doc.setFont("helvetica", "normal");
        doc.text(`${new Date().toLocaleDateString('pt-BR')} | ${data[i].ts}`, 8, ph - 5);
    }
    const d = new Date();
    const nome = `Relat_Km_${ini}_a_${fim}_Dia_${d.getDate()}_${d.getHours()}h${d.getMinutes()}m.pdf`;
    try {
        const fh = await dirHandle.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch (e) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "KM " + b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
