<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 70vw !important; height: 100vh !important; }
            #controls { width: 30vw; height: 100vh; background: #050a16; justify-content: center; }
        }

        /* ÁREA DA CÂMERA - AUMENTADA */
        #viewport { position: relative; width: 100vw; height: 55vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 5;
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 6px 14px;
            font-size: 2rem; font-weight: 900; border: 3px solid #fff;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; white-space: nowrap;
        }

        #controls { flex-grow: 1; display: flex; flex-direction: column; background: #000; padding: 5px; justify-content: space-between; }

        /* STATUS E DASHBOARD COMPACTOS */
        .status-bar { display: flex; justify-content: space-around; padding: 4px; font-size: 0.6rem; }
        .st { padding: 2px 6px; border-radius: 8px; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 5px; }
        .card { background: #111; padding: 6px; border-radius: 6px; text-align: center; border: 1px solid #222; }
        .card label { font-size: 0.55rem; color: #888; display: block; text-transform: uppercase; }
        .val { display: block; font-size: 0.9rem; font-weight: bold; color: var(--accent); }

        /* BOTÕES DESLOCADOS PARA BAIXO */
        .btn-row { padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 5px; }
        button.action { padding: 12px; border-radius: 8px; border: none; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }

        #settings-trigger { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.5); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
        #settings-panel { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: #0b1224; z-index: 2000; transition: 0.4s; padding: 15px; }
        #settings-panel.active { right: 0; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h3 style="color:var(--accent)">AJUSTES</h3>
    <div style="margin:10px 0">Câmera: <select id="cfgCam" onchange="initCamera()"><option value="environment">Traseira</option><option value="user">Frontal</option></select></div>
    <div style="margin:10px 0">Fotos Lote: <input type="number" id="cfgBatch" value="200" style="width:50px"></div>
    <div style="margin:10px 0">Brilho: <input type="range" id="cfgBright" min="50" max="150" value="100"></div>
    <button onclick="toggleSettings()" style="width:100%; padding:10px; margin-top:20px">VOLTAR</button>
</div>

<div id="main-container">
    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: ...</div>
            <div id="stGps" class="st">GPS: ...</div>
        </div>

        <div class="dashboard">
            <div class="card"><label>Fotos</label><span id="txtTotal" class="val">0</span></div>
            <div class="card"><label>Lote</label><span id="txtBuffer" class="val">0/200</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a; border-color:var(--accent)"><label style="color:#fff">PDF</label><span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="action">INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
        <div style="font-size:0.5rem; text-align:center; color:#333; margin-bottom: 2px;">V5.3 | RIVERSIDE</div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

// --- Câmera e GPS (Mantendo sua lógica funcional) ---
async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: document.getElementById('cfgCam').value, width: 1280, height: 720 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    document.getElementById('stGps').classList.add('ok');
    updateKM();
}, null, {enableHighAccuracy:true});

function updateKM() {
    if(!lastPos || !kmDataset.length) return;
    let best = kmDataset, bd = Infinity;
    for(const p of kmDataset){
        const d = Math.hypot(p.lat - lastPos.lat, p.lon - lastPos.lon);
        if(d < bd){ bd = d; best = p; }
    }
    document.getElementById('kmPlaque').textContent = "KM " + best.km;
}

// --- Funções de Desenho para o PDF (Corrigidas e Centralizadas) ---
function drawStamp(item) {
    const w = can.width, h = can.height;
    const textKM = "KM " + item.km;
    const placaH = h * 0.15;
    ctx.font = `900 ${placaH * 0.65}px Arial Black`;
    const textW = ctx.measureText(textKM).width;
    const paddingX = placaH * 0.4; 
    const placaW = textW + (paddingX * 2);
    const posX = 40, posY = h - placaH - 60;

    ctx.save();
    const grd = ctx.createLinearGradient(posX, posY, posX, posY + placaH);
    grd.addColorStop(0, "#0a8a4d"); grd.addColorStop(1, "#056b3c");
    ctx.fillStyle = grd; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 6;
    
    // Desenha placa arredondada
    ctx.beginPath();
    ctx.roundRect(posX, posY, placaW, placaH, 15);
    ctx.fill(); ctx.stroke();
    
    // Texto Centralizado
    ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
    ctx.fillText(textKM, posX + (placaW/2), posY + (placaH/2));
    
    // Legenda GPS
    ctx.restore(); ctx.fillStyle = "white"; ctx.font = "bold 22px Arial";
    ctx.shadowColor = "black"; ctx.shadowBlur = 5;
    ctx.fillText(`${item.ts} | LAT: ${item.lat} LON: ${item.lon}`, posX, h - 20);
}

async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++; document.getElementById('txtPdfs').textContent = pdfCount;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i>0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.filter = `brightness(${document.getElementById('cfgBright').value}%)`;
                ctx.drawImage(img, 0, 0);
                drawStamp(batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].img;
        });
    }
    doc.save(`INSPECAO_LOTE_${pdfCount}.pdf`);
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        lat: lastPos?.lat.toFixed(6) || "0",
        lon: lastPos?.lon.toFixed(6) || "0",
        ts: new Date().toLocaleString()
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${document.getElementById('cfgBatch').value}`;
    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
document.getElementById('btnSaveManual').onclick = savePDF;

// Início
initCamera();
</script>
</body>
</html>
