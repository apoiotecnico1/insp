<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Monitoramento Rodoviário Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: rgba(0, 121, 52, 0.9); --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Preenchimento total da tela */
        html, body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
        }

        #app-shell { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* HUD KM ESTILO PLACA REALISTA */
        #km-hud { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            background: var(--placa); 
            padding: 10px 25px; 
            border: 4px solid #fff; 
            border-radius: 12px; z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            text-align: center;
            min-width: 160px;
        }
        #br-txt { font-size: 0.9rem; font-weight: 900; display: block; border-bottom: 2px solid #fff; margin-bottom: 3px; text-transform: uppercase; }
        #km-txt { font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -1px; }

        /* BOTÃO DE CAPTURA JPG (FLUTUANTE E DISCRETO) */
        #shutter-zone {
            position: absolute; bottom: 120px; right: 20px;
            text-align: center; z-index: 100; cursor: pointer;
            background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px;
        }
        #btn-jpg { 
            width: 60px; height: 60px; border: 3px solid #fff; border-radius: 50%;
            background: rgba(255,255,255,0.2); margin: 0 auto 5px;
            display: flex; align-items: center; justify-content: center;
        }
        #btn-jpg::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; }
        .label-jpg { font-size: 9px; font-weight: 900; color: #fff; }

        /* CONTROLES PDF INFERIORES */
        #ui { 
            position: absolute; bottom: env(safe-area-inset-bottom, 30px); 
            left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; z-index: 100; width: 90%; justify-content: center;
        }
        .btn { 
            border: none; padding: 18px 30px; border-radius: 50px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #start { background: var(--accent); color: #000; width: 100%; max-width: 300px; }
        #stop { background: var(--danger); color: #fff; display: none; width: 100%; max-width: 300px; }
        
        #rec-status { 
            position: absolute; top: 25px; right: 20px; 
            background: rgba(255,0,0,0.8); padding: 8px 15px; 
            border-radius: 20px; display: none; font-size: 12px;
            font-weight: bold; z-index: 100; animation: pulse 1s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <span id="br-txt">GPS ATIVO</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="shutter-zone" onclick="takePhoto()">
        <div id="btn-jpg"></div>
        <div class="label-jpg">FOTO .JPG</div>
    </div>

    <div id="rec-status">● MONITORANDO</div>

    <div id="ui">
        <button id="start" class="btn" onclick="activateSystem()">INICIAR MONITORAMENTO</button>
        <button id="stop" class="btn" onclick="stopPDF()">FINALIZAR RELATÓRIO</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer=[], hDir=null, brAtual="RODOVIA", wakeLock=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// 1. FUNÇÃO PARA MANTER A TELA ACESA (WAKE LOCK)
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            console.log("Tela bloqueada: Não irá apagar.");
        }
    } catch (err) {
        console.error("Erro no Wake Lock:", err);
    }
}

// 2. FUNÇÃO FULLSCREEN
function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
    }
}

// ESTAMPA COM SOMBRA GRADIENTE ESTILOSA
function drawStamp(km, br, data) {
    const h = can.height;
    const w = can.width;
    const barH = h * 0.15;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, h - barH, w, barH);

    // Efeito de Sombra e Gradiente nas letras
    ctx.shadowColor = "rgba(0,0,0,1)";
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 4;
    ctx.shadowOffsetY = 4;

    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${barH * 0.4}px sans-serif`;
    ctx.fillText(`${br} - KM ${km}`, 40, h - (barH * 0.45));

    ctx.shadowBlur = 4;
    ctx.fillStyle = "#ffcc00"; // Cor de destaque para data/hora
    ctx.font = `bold ${barH * 0.2}px sans-serif`;
    ctx.fillText(data, 40, h - (barH * 0.15));

    ctx.shadowColor = "transparent";
}

async function activateSystem() {
    try {
        if(!hDir) hDir = await window.showDirectoryPicker();
        
        toggleFullScreen();
        await requestWakeLock();
        await startVideo();
        loadCSV();
        initGPS();
        
        capturing = true;
        buffer = [];
        document.getElementById('start').style.display = 'none';
        document.getElementById('stop').style.display = 'block';
        document.getElementById('rec-status').style.display = 'block';
        
        loop();
    } catch(e) { 
        alert("Permissão necessária para câmera e pasta de arquivos."); 
    }
}

async function startVideo() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { 
        can.width = vid.videoWidth; 
        can.height = vid.videoHeight; 
    };
}

// Captura manual rápida
function takePhoto() {
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const data = new Date().toLocaleString('pt-BR');
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, brAtual, data);

    can.toBlob(async (blob) => {
        const name = `MANUAL_${brAtual}_KM_${km}_${Date.now()}.jpg`;
        const file = await hDir.getFileHandle(name, { create: true });
        const stream = await file.createWritable();
        await stream.write(blob);
        await stream.close();
    }, 'image/jpeg', 0.95);
}

// Loop de captura automática para o PDF
function loop() {
    if(!capturing) return;
    
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const data = new Date().toLocaleString('pt-BR');
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, brAtual, data);
    
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.6),
        km: km
    });

    // Auto-salva a cada 50 fotos para não sobrecarregar a memória
    if(buffer.length >= 50) {
        const temp = [...buffer];
        buffer = [];
        savePDF(temp);
    }
    
    setTimeout(loop, 1000); // 1 foto por segundo no relatório
}

async function stopPDF() {
    capturing = false;
    document.getElementById('rec-status').style.display = 'none';
    if(buffer.length > 0) await savePDF(buffer);
    if(wakeLock) wakeLock.release();
    alert("Relatório PDF Salvo!");
    location.reload();
}

async function savePDF(lista) {
    const { jsPDF } = window.jspdf;
    const orient = can.width > can.height ? 'l' : 'p';
    const doc = new jsPDF(orient, 'px', [can.width, can.height]);

    for(let i=0; i<lista.length; i++) {
        if(i > 0) doc.addPage([can.width, can.height], orient);
        doc.addImage(lista[i].img, 'JPEG', 0, 0, can.width, can.height);
    }

    const pdfBlob = doc.output('blob');
    const name = `PDF_TRECHO_${brAtual}_${Date.now()}.pdf`;
    const file = await hDir.getFileHandle(name, { create: true });
    const stream = await file.createWritable();
    await stream.write(pdfBlob);
    await stream.close();
}

function loadCSV() {
    fetch('SNVBR116SPRJ.csv').then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[0], lt: parseFloat(c[1].replace(',','.')), ln: parseFloat(c[2].replace(',','.')), br: c[3] || "BR-116" };
        });
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let best = null, minD = Infinity;
        kmDB.forEach(pt => {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < minD) { minD = d; best = pt; }
        });
        if(best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            document.getElementById('br-txt').innerText = best.br;
            brAtual = best.br;
        }
    }, null, { enableHighAccuracy: true });
}

// Reativar Wake Lock se o usuário minimizar e voltar para o app
document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
    }
});
</script>
</body>
</html>
