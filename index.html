<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA DE INSPEÇÃO - MOTIVA RODOVIAS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --motiva-orange: #ff6a00; /* Laranja da sinalização e segurança */
            --motiva-blue: #002d5b;   /* Azul institucional profundo */
            --motiva-light: #f4f7f9;
            --motiva-dark: #1a1a1a;
            --success: #28a745;
        }
        
        body { 
            margin: 0; 
            background: var(--motiva-light); 
            color: var(--motiva-blue); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* Topbar Institucional */
        #header {
            background: var(--motiva-blue);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--motiva-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #header h1 { margin: 0; font-size: 1rem; letter-spacing: 1px; font-weight: 800; }

        /* Layout */
        #main-container { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }
        @media (orientation: landscape) { 
            #main-container { grid-template-columns: 1fr 350px; grid-template-rows: auto 1fr; }
            #header { grid-column: 1 / span 2; }
        }

        /* Viewport com Moldura de Segurança */
        #viewport { 
            position: relative; 
            background: #000; 
            border: 5px solid #ddd;
            margin: 10px;
            border-radius: 4px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Placa de KM Estilo Motiva */
        #kmPlaque { 
            position: absolute; bottom: 20px; left: 20px;
            background: #00703c; /* Verde padrão DNIT/Rodovias */
            color: white; padding: 5px 20px; border-radius: 4px;
            border: 3px solid white; font-size: 3rem; font-weight: 900;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10;
        }

        /* Painel Lateral */
        #controls { 
            background: white; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border-left: 2px solid #ddd;
        }

        .status-box {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border-left: 4px solid var(--motiva-blue);
        }

        /* Cards de Dados */
        .card { 
            background: var(--motiva-light); 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #ced4da;
            text-align: center;
        }
        .card span { display: block; font-size: 1.8rem; font-weight: 800; color: var(--motiva-orange); }
        .card label { font-size: 0.7rem; font-weight: bold; color: var(--motiva-blue); text-transform: uppercase; }

        /* Botões Padrão Motiva */
        .btn-action { 
            height: 60px; border-radius: 4px; border: none; 
            font-size: 1rem; font-weight: 800; cursor: pointer; 
            transition: all 0.2s; text-transform: uppercase;
        }
        #btnStart { background: var(--motiva-orange); color: white; box-shadow: 0 4px 0 #d35400; }
        #btnStart:active { transform: translateY(3px); box-shadow: none; }
        #btnStart.active { background: #c0392b; box-shadow: 0 4px 0 #922b21; animation: blink 1s infinite; }

        #btnPDF { background: var(--motiva-blue); color: white; }

        /* Settings Slide */
        #settings-trigger { cursor: pointer; font-size: 20px; transition: 0.3s; }
        #settings-trigger:hover { color: var(--motiva-orange); }

        #settings-panel { 
            position: fixed; right: -400px; top: 0; width: 320px; height: 100%; 
            background: white; z-index: 1000; transition: 0.4s; padding: 25px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2); border-left: 6px solid var(--motiva-orange);
        }
        #settings-panel.open { right: 0; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        
        #folder-hint { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,45,91,0.9); z-index: 9999; display: none; 
            align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

<div id="folder-hint">
    <div style="text-align:center">
        <div style="font-size:50px">📂</div>
        <h2>DIRETÓRIO DE DESTINO</h2>
        <p>Selecione a pasta para armazenamento dos relatórios Motiva.</p>
    </div>
</div>

<div id="main-container">
    <header id="header">
        <h1>MOTIVA RODOVIAS | INSPEÇÃO DE CAMPO</h1>
        <div id="settings-trigger" onclick="toggleSets()">⚙️ CONFIGURAÇÕES</div>
    </header>

    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <aside id="controls">
        <div class="status-box" id="stGps">SINAL GPS: BUSCANDO...</div>
        <div class="status-box" id="stCsv">BASE DE DADOS: CARREGANDO...</div>

        <div class="card">
            <label>Registros Capturados</label>
            <span id="txtTotal">0</span>
        </div>
        
        <div class="card">
            <label>Fotos no Lote Atual</label>
            <span id="txtBuffer">0/100</span>
        </div>

        <button id="btnStart" class="btn-action">INICIAR INSPEÇÃO</button>
        <button id="btnPDF" class="btn-action">FECHAR LOTE (PDF)</button>
        
        <div style="margin-top:auto; text-align:center">
            <img src="https://via.placeholder.com/120x40?text=MOTIVA+RODOVIAS" alt="Logo Motiva" style="opacity:0.5">
            <p style="font-size:0.6rem; color:#999">V4.0 PRO - CORPORATE LICENCE</p>
        </div>
    </aside>
</div>

<div id="settings-panel">
    <h3 style="color:var(--motiva-blue)">AJUSTES TÉCNICOS</h3>
    <hr border="0" height="1" bgcolor="#eee">
    <div style="margin:20px 0">
        <label style="display:block; font-size:0.7rem; margin-bottom:5px">CÂMERA ATIVA</label>
        <select id="cfgCam" onchange="initCamera()" style="width:100%; padding:8px">
            <option value="environment">Traseira (Principal)</option>
            <option value="user">Frontal</option>
        </select>
    </div>
    <div style="margin:20px 0">
        <label style="display:block; font-size:0.7rem; margin-bottom:5px">FOTOS POR PDF</label>
        <input type="number" id="cfgBatch" value="100" style="width:100%; padding:8px">
    </div>
    <div style="margin:20px 0">
        <label style="display:block; font-size:0.7rem; margin-bottom:5px">INTERVALO CAPTURA (MS)</label>
        <input type="number" id="cfgDelay" value="300" style="width:100%; padding:8px">
    </div>
    <button onclick="toggleSets()" style="width:100%; background:var(--motiva-blue); color:white; border:none; padding:12px; cursor:pointer">SALVAR E VOLTAR</button>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
/* MANTENDO TODA A FUNCIONALIDADE ORIGINAL */
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

const toggleSets = () => document.getElementById('settings-panel').classList.toggle('open');

async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: document.getElementById('cfgCam').value, width: 1280, height: 720 } 
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    } catch(e) { console.error("Erro ao acessar câmera."); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        kmDataset = t.split('\n').slice(1).map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(x => !isNaN(x.lat));
        document.getElementById('stCsv').innerHTML = "BASE DE DADOS: OK";
    } catch(e) { document.getElementById('stCsv').innerHTML = "BASE DE DADOS: ERRO"; }
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').innerHTML = "SINAL GPS: ATIVO (" + p.coords.accuracy.toFixed(0) + "m)";
    if(kmDataset.length) {
        let nearest = kmDataset.reduce((prev, curr) => {
            const d = Math.hypot(curr.lat - lastPos.lat, curr.lon - lastPos.lon);
            return d < prev.d ? { d, km: curr.km } : prev;
        }, { d: Infinity });
        document.getElementById('kmPlaque').innerText = "KM " + nearest.km;
    }
}, null, { enableHighAccuracy: true });

function drawStamp(km, coords) {
    const h = can.height, w = can.width;
    // Barra inferior sólida institucional
    ctx.fillStyle = "#002d5b";
    ctx.fillRect(0, h-120, w, 120);
    // Linha de detalhe laranja (Marca Motiva)
    ctx.fillStyle = "#ff6a00";
    ctx.fillRect(0, h-124, w, 4);
    
    ctx.fillStyle = "white";
    ctx.font = "bold 70px Arial";
    ctx.fillText("KM " + km, 40, h-50);
    
    ctx.font = "24px Arial";
    ctx.fillText(`MOTIVA RODOVIAS | ${new Date().toLocaleString()}`, 40, h-22);
    ctx.fillText(`COORD: ${coords.lat}, ${coords.lon}`, w - 400, h-22);
}

async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawStamp(batch[i].km, batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].data;
        });
    }

    const name = `INSPECAO_MOTIVA_LOTE_${pdfCount}.pdf`;
    if(directoryHandle) {
        try {
            const fh = await directoryHandle.getFileHandle(name, { create: true });
            const wr = await fh.createWritable();
            await wr.write(doc.output('blob'));
            await wr.close();
        } catch(e) { doc.save(name); }
    } else { doc.save(name); }
}

async function loop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0);
    activeBuffer.push({
        data: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').innerText.replace('KM ',''),
        lat: lastPos?.lat.toFixed(6) || "0",
        lon: lastPos?.lon.toFixed(6) || "0"
    });
    
    photoCount++;
    document.getElementById('txtTotal').innerText = photoCount;
    document.getElementById('txtBuffer').innerText = `${activeBuffer.length}/${document.getElementById('cfgBatch').value}`;
    
    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(loop, parseInt(document.getElementById('cfgDelay').value));
}

document.getElementById('btnStart').onclick = async function() {
    if(!isRecording) {
        if(!directoryHandle && 'showDirectoryPicker' in window) {
            document.getElementById('folder-hint').style.display = 'flex';
            directoryHandle = await window.showDirectoryPicker().catch(() => null);
            document.getElementById('folder-hint').style.display = 'none';
            if(!directoryHandle) return;
        }
        isRecording = true;
        this.innerText = "PARAR OPERAÇÃO";
        this.classList.add('active');
        loop();
    } else {
        isRecording = false;
        this.innerText = "INICIAR INSPEÇÃO";
        this.classList.remove('active');
        savePDF();
    }
};

document.getElementById('btnPDF').onclick = savePDF;

loadCSV(); initCamera();
</script>
</body>
</html>
