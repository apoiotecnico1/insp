<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema Integrado de Inspeção</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #22c55e; --bg: #0b1020; --glass: rgba(0,0,0,0.85); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        #vid { width: 100vw; height: 100vh; object-fit: cover; }
        .hud { position: absolute; top: 20px; left: 20px; background: var(--glass); padding: 15px; border-radius: 12px; pointer-events: none; }
        #id-panel { position: absolute; top: 20px; right: 20px; width: 280px; background: var(--glass); padding: 15px; border-radius: 12px; display: none; max-height: 70vh; overflow-y: auto; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px 20px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; background: #333; color: #fff; }
        #btn-start { background: var(--accent); }
    </style>
</head>
<body>

<video id="vid" autoplay playsinline muted></video>

<div class="hud">
    <div id="km-txt">KM: ---</div>
    <div id="voice-status" style="color:var(--accent)">🎙 Aguardando narração...</div>
</div>

<div id="id-panel">
    <label>Exibir: <select id="qty-sel"><option>5</option><option selected>10</option><option>20</option></select></label>
    <ul id="id-list"></ul>
</div>

<div class="controls">
    <button onclick="startVoice()">🎙 NARRAR</button>
    <button id="btn-start" onclick="startCapture()">INICIAR</button>
    <button onclick="document.getElementById('id-panel').style.display = 'block'">LOCALIZAR ID</button>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
    let capturing = false, buffer = [], currentText = "", recognition;
    const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

    // Inicializa Câmera
    navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}}).then(s => vid.srcObject = s);

    // Sistema de Voz
    function startVoice() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.onresult = (e) => {
            currentText = e.results[e.results.length - 1][0].transcript;
            document.getElementById('voice-status').innerText = "Narrando: " + currentText;
        };
        recognition.start();
    }

    // Sistema de Captura
    function startCapture() {
        capturing = true;
        buffer = [];
        loop();
    }

    function loop() {
        if (!capturing) return;
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ img: can.toDataURL('image/jpeg', 0.5), text: currentText, km: document.getElementById('km-txt').innerText });
        
        if (buffer.length >= 500) {
            capturing = false;
            generatePDF();
        } else {
            setTimeout(loop, 200);
        }
    }

    // Geração de PDF Sincronizado
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        buffer.forEach((item, i) => {
            if (i > 0) doc.addPage();
            doc.addImage(item.img, 'JPEG', 10, 10, 190, 140);
            doc.text(`KM: ${item.km}`, 10, 160);
            doc.text(`Narração: ${item.text}`, 10, 170, { maxWidth: 180 });
        });
        doc.save("Relatorio_Inspecao.pdf");
    }

    // Geolocalização
    navigator.geolocation.watchPosition(p => {
        document.getElementById('km-txt').innerText = "KM: " + (p.coords.latitude).toFixed(4); // Exemplo lógico
    }, null, {enableHighAccuracy: true});
</script>
</body>
</html>
