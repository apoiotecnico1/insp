<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA INSPEÇÃO v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #cc0000; --info: #0066ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* TELA DE SEGURANÇA - ESTILO PLACA DE ADVERTÊNCIA */
        #safety-gate { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .safety-card { width: 100%; max-width: 450px; background: var(--accent); border: 10px solid #000; padding: 40px 20px; border-radius: 15px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .safety-icon { font-size: 60px; color: #000; margin-bottom: 20px; display: block; }
        .safety-card h2 { color: #000; font-size: 24px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .safety-card p { color: #000; font-size: 20px; line-height: 1.4; font-weight: 700; margin-bottom: 35px; }
        .btn-confirm { width: 100%; background: #000; color: var(--accent); border: none; padding: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; border-radius: 8px; }

        /* INTERFACE DO APP */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        /* HUD KM */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 12px 25px; border: 3px solid #fff; border-radius: 12px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; }

        /* STATUS GPS E GRAVAÇÃO */
        #status-bar { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .status-pill { background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1); }
        #gps-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* CONTROLES LATERAIS */
        #cam-tools { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 10; display: flex; flex-direction: column; gap: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 30px; }
        input[type=range] { appearance: none; width: 120px; height: 4px; background: #555; transform: rotate(-90deg); margin: 50px -50px; }

        /* PAINEL CONFIG */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: rgba(10,10,10,0.98); z-index: 4000; padding: 30px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; font-size: 13px; }

        /* BOTÕES PRINCIPAIS */
        #ui-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 100; }
        .btn-main { border: none; font-weight: 900; cursor: pointer; padding: 20px 35px; font-size: 14px; background: var(--accent); color: #000; text-transform: uppercase; border-radius: 4px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        #btn-event { background: var(--info); color: #fff; }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="safety-card">
        <span class="safety-icon">⚠️</span>
        <h2>Atenção</h2>
        <p>Para sua segurança, não utilize este sistema enquanto estiver dirigindo.</p>
        <button class="btn-confirm" onclick="requestAccess()">Estou Ciente</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="font-size: 12px; color: var(--accent); margin-bottom: 20px;">CONFIGURAÇÕES</h3>
    <div class="field"><label>Qualidade PDF</label><select id="cfg-qual"><option value="0.3">Baixa</option><option value="0.6" selected>Média</option><option value="0.9">Alta</option></select></div>
    <div class="field"><label>Câmera</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Fotos por PDF</label><input type="number" id="cfg-lote" value="200"></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <button class="btn-main" style="width:100%; background: #fff;" onclick="toggleSet()">FECHAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    
    <div id="status-bar">
        <div class="status-pill"><div id="gps-dot"></div><span id="gps-txt">SINAL...</span></div>
        <div id="rec-status" class="status-pill" style="display:none;"><div class="rec-dot"></div><span>ON</span></div>
    </div>

    <div id="cam-tools">
        <span style="font-size:12px;">🔆</span>
        <input type="range" id="cfg-brilho" min="-2" max="2" step="0.1" value="0" oninput="updateCamProps()">
    </div>

    <div id="ui-controls">
        <button class="btn-circle" style="background:#222; color:#fff;" onclick="toggleSet()">⚙️</button>
        <button id="btn-start" class="btn-main" onclick="initCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">FINALIZAR</button>
        <button id="btn-event" class="btn-circle" onclick="markEvent()">⚠️</button>
    </div>
</div>

<canvas id="can_cap"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, dirHandle=null, lastPos={lat:0, lng:0, acc:0}, eventFlag=false;
const vid=document.getElementById('vid'), canCap=document.getElementById('can_cap'), ctxCap=canCap.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBip(f=880) {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination); o.frequency.value=f; g.gain.value=0.1; o.start(); o.stop(audioCtx.currentTime+0.1);
}

function forceFull() { document.documentElement.requestFullscreen().catch(()=>{}); }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function markEvent() { eventFlag = true; playBip(1200); }

async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        listCams(); loadCSV(); initGPS();
    } catch (e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">CÂMERA ${i+1}</option>`).join('');
    initC(vids[vids.length-1]?.deviceId);
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
}

async function updateCamProps() {
    const track = currentStream.getVideoTracks();
    const settings = { exposureCompensation: document.getElementById('cfg-brilho').value };
    try { await track.applyConstraints({ advanced: [settings] }); } catch(e){}
}

function initCapture() {
    rec = true; buffer = [];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) savePDF([...buffer]);
    rec = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

function loop() {
    if(!rec) return;
    canCap.width = vid.videoWidth; canCap.height = vid.videoHeight;
    ctxCap.drawImage(vid, 0, 0);
    buffer.push({ 
        raw: canCap.toDataURL('image/jpeg', 0.4), 
        km: document.getElementById('km-txt').innerText,
        isEvent: eventFlag,
        lat: lastPos.lat, lng: lastPos.lng
    });
    eventFlag = false;
    if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 200)) {
        savePDF([...buffer]); buffer = [];
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(data) {
    playBip();
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    const qual = parseFloat(document.getElementById('cfg-qual').value);

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        img.src = data[i].raw;
        await new Promise(r => img.onload = r);
        
        const tempCan = document.createElement('canvas');
        tempCan.width = 1920; tempCan.height = 1080;
        const tCtx = tempCan.getContext('2d');
        tCtx.drawImage(img, 0, 0);
        
        tCtx.fillStyle = data[i].isEvent ? "rgba(255,0,0,0.8)" : "rgba(0,0,0,0.7)";
        tCtx.fillRect(0, 930, 1920, 150);
        tCtx.fillStyle = "#fff";
        tCtx.font = "bold 50px Arial";
        tCtx.fillText(`${data[i].km} ${data[i].isEvent ? '[OCORRÊNCIA]' : ''}`, 50, 990);
        tCtx.font = "30px Arial";
        tCtx.fillText(`LAT: ${data[i].lat.toFixed(6)} | LON: ${data[i].lng.toFixed(6)} | HORA: ${new Date().toLocaleTimeString()}`, 50, 1040);
        
        doc.addImage(tempCan.toDataURL('image/jpeg', qual), 'JPEG', 0, 0, pw, ph);
    }
    const nome = `RELATORIO_${Date.now()}.pdf`;
    const fh = await dirHandle.getFileHandle(nome, { create: true });
    const wr = await fh.createWritable();
    await wr.write(doc.output('blob'));
    await wr.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        });
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = {lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy};
        document.getElementById('gps-dot').style.background = lastPos.acc < 20 ? "#0f0" : "#f00";
        document.getElementById('gps-txt').innerText = `${Math.round(lastPos.acc)}m`;
        
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - lastPos.lat, pt.ln - lastPos.lng);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "KM " + b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
