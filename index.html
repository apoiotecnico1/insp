<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angstrom - Zero Damage System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --danger-glow: #ff0000; --safety-green: #2ecc71; }
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', Roboto, sans-serif; }
        .safety-card { background: #2d2d2d; border: 1px solid #444; border-radius: 15px; }
        .hazard-zone { border-left: 10px solid var(--danger-glow); background: rgba(255, 0, 0, 0.05); }
        .btn-authorize { background: var(--safety-green); color: white; font-weight: 800; border: none; padding: 15px; }
        .btn-authorize:disabled { background: #444; opacity: 0.5; }
        .gps-badge { font-family: monospace; background: #000; color: #0f0; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; }
        .step-title { font-size: 0.8rem; font-weight: bold; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 500px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-0 text-white">ANGSTROM</h2>
        <span class="badge bg-danger">PROTOCOLO PREVENTIVO DE FIBRAS</span>
    </div>

    <div class="safety-card p-4 shadow-lg">
        <div class="mb-4">
            <label class="step-title">1. Localização da Obra</label>
            <div class="input-group mb-2">
                <span class="input-group-text bg-dark text-white border-secondary">KM</span>
                <input type="text" id="km" class="form-control bg-dark text-white border-secondary" placeholder="Ex: 154+800">
                <select id="sentido" class="form-select bg-dark text-white border-secondary w-25">
                    <option value="Norte">N</option>
                    <option value="Sul">S</option>
                </select>
            </div>
            <div id="gps-status" class="gps-badge"><i class="bi bi-geo-alt-fill"></i> Aguardando GPS...</div>
        </div>

        <hr class="border-secondary">

        <div class="hazard-zone p-3 mb-3 rounded">
            <label class="step-title text-danger">2. Inspeção Lado A (CLARO)</label>
            <div class="row g-2 align-items-center mb-2">
                <div class="col-6">
                    <select id="sondagemClaro" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="">Sondagem realizada?</option>
                        <option value="Sim">Sim, fibra exposta</option>
                        <option value="Marcada">Apenas marcada</option>
                        <option value="Nao">Não detectada</option>
                    </select>
                </div>
                <div class="col-6">
                    <input type="number" id="profClaro" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Profundidade (cm)">
                </div>
            </div>
            <select id="libClaro" class="form-select bg-dark text-white border-danger fw-bold" onchange="validarGeral()">
                <option value="0">❌ CLARO: NÃO LIBERADO</option>
                <option value="1">✅ CLARO: LIBERADO</option>
            </select>
        </div>

        <div class="hazard-zone p-3 mb-4 rounded" style="border-left-color: #004a99;">
            <label class="step-title text-primary">3. Inspeção Lado B (CCR)</label>
            <div class="row g-2 align-items-center mb-2">
                <div class="col-6">
                    <select id="sondagemCCR" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="">Sondagem realizada?</option>
                        <option value="Sim">Sim, fibra exposta</option>
                        <option value="Marcada">Apenas marcada</option>
                        <option value="Nao">Não detectada</option>
                    </select>
                </div>
                <div class="col-6">
                    <input type="number" id="profCCR" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Profundidade (cm)">
                </div>
            </div>
            <select id="libCCR" class="form-select bg-dark text-white border-primary fw-bold" onchange="validarGeral()">
                <option value="0">❌ CCR: NÃO LIBERADO</option>
                <option value="1">✅ CCR: LIBERADO</option>
            </select>
        </div>

        <button id="btnFinal" onclick="emitirAutorizacao()" class="btn btn-authorize w-100 shadow-sm" disabled>
            <i class="bi bi-shield-lock-fill me-2"></i>GERAR AUTORIZAÇÃO DE ESCAVAÇÃO
        </button>
        <p class="text-center small text-muted mt-3 mb-0" style="font-size: 0.65rem;">
            O serviço não deve ser iniciado sem o acompanhamento técnico presente.
        </p>
    </div>
</div>

<script>
    let lat = "", lon = "";

    // Pega GPS automaticamente ao abrir
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                lat = pos.coords.latitude.toFixed(6);
                lon = pos.coords.longitude.toFixed(6);
                document.getElementById('gps-status').innerHTML = `<i class="bi bi-geo-alt-fill text-success"></i> LOCALIZAÇÃO FIXADA: ${lat}, ${lon}`;
            });
        }
    };

    function validarGeral() {
        const c = document.getElementById('libClaro').value;
        const r = document.getElementById('libCCR').value;
        document.getElementById('btnFinal').disabled = !(c == "1" && r == "1");
    }

    function emitirAutorizacao() {
        const km = document.getElementById('km').value;
        const profC = document.getElementById('profClaro').value || "0";
        const profR = document.getElementById('profCCR').value || "0";
        const hash = "ANG-" + Math.random().toString(36).substring(2, 7).toUpperCase();
        const data = new Date().toLocaleString('pt-BR');

        if(!km) return alert("Erro: KM obrigatório.");

        const mensagem = encodeURIComponent(
            `⚠️ *AUTORIZAÇÃO CRÍTICA DE ESCAVAÇÃO*\n` +
            `🔢 *PROTOCOLO:* ${hash}\n` +
            `📅 *DATA:* ${data}\n` +
            `📍 *KM:* ${km} (${document.getElementById('sentido').value})\n` +
            `🌐 *GPS:* ${lat}, ${lon}\n` +
            `----------------------------------\n` +
            `🔴 *CLARO:* LIBERADO (Prof: ${profC}cm)\n` +
            `🔵 *CCR:* LIBERADO (Prof: ${profR}cm)\n` +
            `----------------------------------\n` +
            `🛡️ *AUDITORIA:* Assinatura digital gerada. Esta liberação comprova que as fibras foram localizadas e o risco de rompimento foi mitigado.`
        );

        window.open(`https://wa.me/?text=${mensagem}`);
    }
</script>

</body>
</html>
