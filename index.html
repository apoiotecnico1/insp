<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO + ID NOX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --brand: #5a64ff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #viewport { position: relative; width: 100vw; height: 35vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Placa de KM (Seu layout favorito) */
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 10px;
            font-size: 3rem; font-weight: 900; border: 4px solid #fff;
            margin: 5px 10px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.8);
        }

        /* Lista de IDs NOX em tempo real */
        #noxList {
            background: rgba(15, 22, 48, 0.9);
            margin: 0 10px; padding: 8px; border-radius: 8px;
            border: 1px solid #1e2647; min-height: 100px;
        }
        .nox-item {
            display: flex; justify-content: space-between;
            padding: 4px 10px; border-bottom: 1px solid #1e2647;
            font-family: monospace; font-size: 0.9rem;
        }
        .nox-item.nearest { color: #22c55e; font-weight: bold; background: rgba(34, 197, 94, 0.1); }

        .status-bar { display: flex; justify-content: space-around; padding: 6px; background: var(--panel-bg); font-size: 0.7rem; }
        .st { padding: 3px 10px; border-radius: 15px; background: #1a2235; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px; }
        .card { background: #111; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.1rem; font-weight: bold; color: #00d9ff; }

        .btn-row { padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 18px; border-radius: 10px; border: none; font-weight: 900; font-size: 1rem; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="viewport"><video id="vid" autoplay playsinline muted></video></div>

<div id="kmPlaque">KM --+---</div>

<div id="noxList">
    <div style="text-align:center; color:#5a64ff; font-size:0.7rem; margin-bottom:4px;">IDs NOX PRÓXIMOS</div>
    <div id="noxItems"></div>
</div>

<div class="status-bar">
    <div id="stKm" class="st">KM: ...</div>
    <div id="stNox" class="st">NOX: ...</div>
    <div id="stGps" class="st">GPS: ...</div>
</div>

<div class="dashboard">
    <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
    <div class="card">LOTE<span id="txtBuffer" class="val">0/200</span></div>
    <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer">PDF<span id="txtPdfs" class="val">0</span></div>
</div>

<div class="btn-row">
    <button id="btnStart">INICIAR</button>
    <button id="btnStop" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
/* ======= MOTOR ORIGINAL RECUPERADO ======= */
let kmDataset = [], noxDataset = [];
let lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// Lógica de normalização idêntica ao seu index.html
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){ 
    const map=headers.map(h=>normalizeStr(h)); 
    for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; } 
    return -1; 
}
function parsePt(v){ 
    if(v==null) return NaN; 
    const s=String(v).trim(); 
    return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); 
}
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

/* ======= CARREGAMENTO DOS CSVs ======= */
async function loadData() {
    // 1. Carrega KM
    try {
        let rKm = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        let tKm = await rKm.text();
        const lKm = tKm.split(/\r?\n/).filter(l => l.trim() !== '');
        const hKm = lKm.shift().split(';');
        const iK=findColumnIndex(hKm,['km']), iLa=findColumnIndex(hKm,['lat']), iLo=findColumnIndex(hKm,['lon']);
        kmDataset = lKm.map(l=>{
            const r=l.split(';');
            return { km: r[iK], lat: parsePt(r[iLa]), lon: parsePt(r[iLo]) };
        }).filter(p => p.km && !isNaN(p.lat));
        document.getElementById('stKm').textContent = "KM: OK";
        document.getElementById('stKm').classList.add('ok');
    } catch(e) {}

    // 2. Carrega NOX (IDs) - Tenta os dois nomes de arquivo que você usa
    try {
        let rNox = await fetch('dados.csv?v='+Date.now());
        if(!rNox.ok) rNox = await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now());
        let tNox = await rNox.text();
        const lNox = tNox.split(/\r?\n/).filter(l => l.trim() !== '');
        const hNox = lNox.shift().split(';');
        const iI=findColumnIndex(hNox,['id','idnox']), iLa=findColumnIndex(hNox,['lat']), iLo=findColumnIndex(hNox,['lon']);
        noxDataset = lNox.map(l=>{
            const r=l.split(';');
            return { id: r[iI], lat: parsePt(r[iLa]), lon: parsePt(r[iLo]) };
        }).filter(p => p.id && !isNaN(p.lat));
        document.getElementById('stNox').textContent = "NOX: OK";
        document.getElementById('stNox').classList.add('ok');
    } catch(e) {}
}

/* ======= CÁLCULO DE PROXIMIDADE EM TEMPO REAL ======= */
function updateRealtime() {
    if(!lastPos) return;
    const {lat, lon} = lastPos;

    // KM Próximo
    let bKm = null, dKm = Infinity;
    kmDataset.forEach(p => {
        const d = hav(lat, lon, p.lat, p.lon);
        if(d < dKm) { dKm = d; bKm = p; }
    });
    if(bKm) document.getElementById('kmPlaque').textContent = "KM " + bKm.km;

    // IDs NOX Próximos (Top 5)
    let noxSorted = noxDataset.map(p => ({ ...p, dist: hav(lat, lon, p.lat, p.lon) }))
                              .sort((a,b) => a.dist - b.dist)
                              .slice(0, 5);
    
    const container = document.getElementById('noxItems');
    container.innerHTML = "";
    noxSorted.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = `nox-item ${i === 0 ? 'nearest' : ''}`;
        div.innerHTML = `<span>${n.id}</span><span>${Math.round(n.dist)}m</span>`;
        container.appendChild(div);
    });
}

/* ======= PDF E CAPTURA ======= */
async function savePDF() {
    if (activeBuffer.length === 0) return;
    const batch = [...activeBuffer];
    activeBuffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    batch.forEach((item, i) => {
        if (i > 0) doc.addPage();
        doc.setFillColor(0,0,0); doc.rect(0,0,297,20,'F');
        doc.setTextColor(255); doc.setFontSize(8);
        doc.text(`KM: ${item.km} | ID: ${item.topId} | GPS: ${item.lat}, ${item.lon} | ${item.ts}`, 10, 12);
        doc.addImage(item.img, 'JPEG', 10, 25, 277, 170);
    });
    doc.save(`INSPECAO_${pdfCount}.pdf`);
}

function captureLoop() {
    if (!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const topId = document.querySelector('.nox-item.nearest span')?.textContent || "N/A";
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        topId: topId,
        lat: lastPos.lat.toFixed(6), lon: lastPos.lon.toFixed(6),
        ts: new Date().toLocaleString()
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/200`;
    if (activeBuffer.length >= 200) savePDF();
    setTimeout(captureLoop, 200);
}

document.getElementById('btnStart').onclick = () => { isRecording = true; document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; captureLoop(); };
document.getElementById('btnStop').onclick = () => { isRecording = false; document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; savePDF(); };
document.getElementById('btnSaveManual').onclick = () => savePDF();

async function init() {
    await loadData();
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 720 }, audio: false });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };

    navigator.geolocation.watchPosition(pos => {
        lastPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        document.getElementById('stGps').textContent = "GPS: OK";
        document.getElementById('stGps').classList.add('ok');
        updateRealtime();
    }, null, { enableHighAccuracy: true });
}
init();
</script>
</body>
</html>
