<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Portal Técnico Operacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.95); --blue: #0088ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* PAINEL PRINCIPAL */
        #portal { 
            position: fixed; inset: 0; z-index: 9000; background: #0a0a0a; 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .header-box { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; width: 90%; }
        
        .grid-tech { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 450px; 
        }

        .btn-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-card:active { transform: scale(0.95); background: #252525; }
        .btn-card span { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #bbb; text-align: center; }
        .icon { font-size: 1.8rem; }

        /* DESTAQUE PDF */
        .full-width { grid-column: span 2; background: linear-gradient(145deg, #222, #111); border-left: 5px solid var(--accent); }

        /* MODAIS E OVERLAYS */
        .overlay { 
            position: fixed; inset: 0; background: #000; z-index: 10000; display: none;
            flex-direction: column;
        }
        #video-preview { width: 100%; height: 70%; object-fit: cover; }
        .tool-bar { padding: 20px; display: flex; justify-content: space-around; background: #111; }

        /* HUD DE KM */
        #hud-global { 
            background: #004d21; padding: 8px 15px; border-radius: 8px; border: 1px solid #fff;
            margin-bottom: 20px; text-align: center;
        }
        #km-display { font-size: 1.5rem; font-weight: 900; display: block; }

        /* EDITOR DE ANOTAÇÃO */
        #note-pad { 
            width: 100%; height: 100%; padding: 20px; background: #111; color: #fff; border: none; font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div id="portal">
    <div class="header-box">
        <h2 style="color:var(--accent)">APOIO TÉCNICO</h2>
        <small id="gps-info">Localizando coordenadas...</small>
    </div>

    <div id="hud-global">
        <span style="font-size: 0.7rem;">POSIÇÃO ATUAL</span>
        <span id="km-display">BR --- Km ---</span>
    </div>

    <div class="grid-tech">
        <div class="btn-card full-width" onclick="abrirModulo('pdf')">
            <div class="icon">📑</div>
            <span>Relatório de Inspeção (PDF)</span>
        </div>

        <div class="btn-card" onclick="abrirModulo('anotacao')">
            <div class="icon">📝</div>
            <span>Anotação de Serviço</span>
        </div>

        <div class="btn-card" onclick="abrirModulo('audio')">
            <div class="icon">🎤</div>
            <span>Anexar Áudio Técnico</span>
        </div>

        <div class="btn-card" onclick="abrirModulo('video')">
            <div class="icon">🎥</div>
            <span>Vídeo de Evidência</span>
        </div>

        <div class="btn-card" onclick="abrirModulo('edicao')">
            <div class="icon">🎨</div>
            <span>Foto com Marcação</span>
        </div>
    </div>
</div>

<div id="modal-note" class="overlay">
    <textarea id="note-pad" placeholder="Descreva a ocorrência ou serviço executado..."></textarea>
    <div class="tool-bar">
        <button onclick="salvarNota()" style="background:var(--accent); padding:15px 40px; border-radius:8px; font-weight:bold;">SALVAR NOTA</button>
        <button onclick="fecharModais()" style="color:#fff; background:none; border:none;">CANCELAR</button>
    </div>
</div>

<div id="modal-audio" class="overlay" style="justify-content:center; align-items:center;">
    <div id="audio-status" style="font-size:1.5rem; margin-bottom:20px;">Pronto para gravar</div>
    <button id="rec-btn" onclick="toggleAudio()" style="width:100px; height:100px; border-radius:50%; background:var(--danger); border:none; font-size:2rem;">🎤</button>
    <p style="margin-top:20px; color:#888;">Relate o problema verbalmente</p>
    <button onclick="fecharModais()" style="margin-top:50px; color:#fff;">VOLTAR</button>
</div>

<video id="hidden-vid" autoplay playsinline muted style="display:none"></video>
<canvas id="main-canvas" style="display:none"></canvas>

<script>
let mediaRecorder, audioChunks = [];
let stream, kmAtual = "---", brAtual = "---";
let hDir;

async function init() {
    initGPS();
    stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" },
        audio: true 
    });
    document.getElementById('hidden-vid').srcObject = stream;
}

function abrirModulo(tipo) {
    if (tipo === 'pdf') {
        // Integração com seu sistema de captura em lote existente
        alert("Iniciando Módulo de Captura em Lote para PDF...");
    } else if (tipo === 'anotacao') {
        document.getElementById('modal-note').style.display = 'flex';
    } else if (tipo === 'audio') {
        document.getElementById('modal-audio').style.display = 'flex';
    } else if (tipo === 'video') {
        iniciarGravacaoVideo();
    }
}

function fecharModais() {
    document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
}

// LÓGICA DE ÁUDIO
async function toggleAudio() {
    const btn = document.getElementById('rec-btn');
    const status = document.getElementById('audio-status');
    
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = salvarAudio;
        mediaRecorder.start();
        btn.style.animation = "blink 1s infinite";
        status.innerText = "Gravando Áudio...";
    } else {
        mediaRecorder.stop();
        btn.style.animation = "none";
        status.innerText = "Gravação Salva!";
        setTimeout(fecharModais, 1000);
    }
}

async function salvarAudio() {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const file = new File([blob], `Audio_${brAtual}_Km${kmAtual}_${Date.now()}.webm`);
    // Aqui você pode usar o hDir para salvar na pasta ou enviar via share
    if (navigator.share) await navigator.share({ files: [file] });
}

// LÓGICA DE NOTA
function salvarNota() {
    const txt = document.getElementById('note-pad').value;
    const blob = new Blob([`Registro Km ${kmAtual}\n---\n${txt}`], { type: 'text/plain' });
    const file = new File([blob], `Nota_Km${kmAtual}.txt`, { type: 'text/plain' });
    navigator.share({ files: [file], title: 'Anotação de Serviço' });
    fecharModais();
}

// GPS E SINCRONIA
function initGPS() {
    navigator.geolocation.watchPosition(p => {
        // Simulação de busca no KMDB que você já tem
        // Aqui você integraria sua função loadCSV para atualizar o HUD
        document.getElementById('km-display').innerText = `BR ${brAtual} Km ${kmAtual}`;
        document.getElementById('gps-info').innerText = `${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
    }, null, { enableHighAccuracy: true });
}

window.onload = init;
</script>

<style>
@keyframes blink { 50% { opacity: 0.3; } }
</style>

</body>
</html>
