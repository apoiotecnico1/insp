<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log de Atividades - OS Administrativa</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .timer-box { background: #eef2f3; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: center; }
        #currentTime { font-size: 1.2em; font-weight: bold; color: var(--accent); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .shortcuts { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-sm { padding: 5px 10px; font-size: 0.8em; cursor: pointer; background: #ddd; border: none; border-radius: 3px; }
        .btn-sm:hover { background: #ccc; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: var(--accent); color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary); color: white; }
        
        .export-actions { margin-top: 20px; display: flex; gap: 10px; }
        .btn-export { background: #f39c12; color: white; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Atividades</h2>
    
    <div class="timer-box">
        <div id="status">Aguardando início...</div>
        <div id="currentTime">00:00:00</div>
    </div>

    <div class="input-group">
        <label>Descrição da Atividade</label>
        <div class="shortcuts">
            <button class="btn-sm" onclick="setDesc('Retirada de materiais p/ atendimento')">📦 Material</button>
            <button class="btn-sm" onclick="setDesc('Verificação de ordens e relatórios')">📊 Relatórios</button>
            <button class="btn-sm" onclick="setDesc('Acompanhamento de terceiro no descarte')">♻️ Descarte</button>
            <button class="btn-sm" onclick="setDesc('Verificação técnica na portaria/acesso')">🚧 Portaria</button>
            <button class="btn-sm" onclick="setDesc('Atendimento ao cliente/usuário')">👤 Atendimento</button>
        </div>
        <input type="text" id="desc" placeholder="Ex: Manutenção no equipamento X">
    </div>

    <div class="actions">
        <button class="btn-start" onclick="startTask()">▶ Iniciar Tarefa</button>
        <button class="btn-stop" onclick="stopTask()">✔ Finalizar e Salvar</button>
    </div>

    <table id="logTable">
        <thead>
            <tr>
                <th>Início</th>
                <th>Fim</th>
                <th>Duração</th>
                <th>Atividade</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="export-actions">
        <button class="btn-export" onclick="exportExcel()">Baixar Excel (CSV)</button>
        <button class="btn-export" style="background:#34495e" onclick="copyToClipboard()">Copiar p/ OS Adm</button>
    </div>
</div>

<script>
    let startTime;
    let activities = [];

    function setDesc(text) { document.getElementById('desc').value = text; }

    function startTask() {
        startTime = new Date();
        document.getElementById('status').innerText = "Tarefa em andamento...";
        document.getElementById('status').style.color = "#e67e22";
        updateTime();
    }

    function updateTime() {
        if (!startTime) return;
        const now = new Date();
        const diff = new Date(now - startTime);
        document.getElementById('currentTime').innerText = diff.toISOString().substr(11, 8);
        setTimeout(updateTime, 1000);
    }

    function stopTask() {
        if (!startTime) return alert("Inicie uma tarefa primeiro!");
        
        const endTime = new Date();
        const desc = document.getElementById('desc').value || "Atividade sem descrição";
        const duration = document.getElementById('currentTime').innerText;
        
        const entry = {
            start: startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            end: endTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            duration: duration,
            desc: desc
        };

        activities.push(entry);
        renderTable();
        
        // Reset
        startTime = null;
        document.getElementById('status').innerText = "Aguardando início...";
        document.getElementById('status').style.color = "inherit";
        document.getElementById('currentTime').innerText = "00:00:00";
        document.getElementById('desc').value = "";
    }

    function renderTable() {
        const tbody = document.querySelector("#logTable tbody");
        tbody.innerHTML = activities.map(a => `
            <tr>
                <td>${a.start}</td>
                <td>${a.end}</td>
                <td>${a.duration}</td>
                <td>${a.desc}</td>
            </tr>
        `).join('');
    }

    function exportExcel() {
        let csv = "Inicio;Fim;Duracao;Atividade\n";
        activities.forEach(a => {
            csv += `${a.start};${a.end};${a.duration};${a.desc}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "atividades_dia.csv");
        link.click();
    }

    function copyToClipboard() {
        let text = activities.map(a => `${a.start} às ${a.end} - ${a.desc} (Duração: ${a.duration})`).join('\n');
        navigator.clipboard.writeText(text);
        alert("Lista copiada! Agora é só colar na sua OS Administrativa.");
    }
</script>

</body>
</html>
