<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V13 - FINAL STEALTH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* VÍDEO FULLSCREEN */
        #cam-layer { position: absolute; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD SUPERIOR - KM SEMPRE FIXO */
        #hud-top { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 100;
        }
        .placa-km { 
            background: linear-gradient(180deg, #056b3c 0%, #01311b 100%); 
            padding: 12px 35px; border: 2.5px solid #fff; border-radius: 18px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.9); pointer-events: none;
        }
        #km-txt { font-size: 3rem; font-weight: 900; letter-spacing: -2px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* BOTÕES LATERAIS (OCULTÁVEIS) */
        #side-btns { display: flex; flex-direction: column; gap: 15px; transition: 0.5s ease; pointer-events: auto; }
        .circle-btn { 
            width: 55px; height: 55px; background: var(--glass); backdrop-filter: blur(12px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2); font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* DOCK DE COMANDOS (AUTO-HIDE) */
        #ui-dock {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 520px; background: var(--glass); backdrop-filter: blur(25px);
            padding: 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000; transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 25px 70px rgba(0,0,0,0.8);
        }
        
        /* ESTADOS DE HIDE (Botões somem, KM FICA) */
        .hide-ui { bottom: -200px !important; opacity: 0; pointer-events: none; }
        .hide-controls { opacity: 0; pointer-events: none; transform: translateX(30px); }

        /* BOTÕES PRINCIPAIS */
        .btn-main { width: 100%; border: none; border-radius: 22px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-start { background: linear-gradient(90deg, #00ff88, #009e54); color: #00331b; height: 90px; font-size: 1.3rem; box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3); }
        .btn-stop { background: linear-gradient(90deg, #ff4444, #b30000); color: #fff; height: 90px; font-size: 1.3rem; box-shadow: 0 10px 30px rgba(255, 68, 68, 0.3); }
        .btn-folder { background: #fff; color: #000; height: 50px; margin-bottom: 15px; font-size: 14px; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn-main:active { transform: scale(0.94); filter: brightness(1.2); }

        /* INDICADORES */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 18px; }
        .box-stat { background: rgba(255,255,255,0.08); padding: 14px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .box-stat b { font-size: 1.6rem; color: var(--gold); font-family: 'Courier New', monospace; }
        .box-stat small { color: #aaa; font-weight: 800; font-size: 11px; letter-spacing: 1px; }

        /* PAINEL DE AJUSTES */
        #side-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.97); backdrop-filter: blur(30px); z-index: 5000; display: none; padding: 50px 30px; overflow-y: auto; }
        .panel-row { margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        label { color: var(--gold); font-size: 12px; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 12px; }
        select, input { width: 100%; background: #151515; border: 1px solid #444; color: #fff; padding: 18px; border-radius: 15px; font-size: 16px; outline: none; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="cam-layer"><video id="vid" autoplay playsinline muted></video></div>

<div id="hud-top">
    <div class="placa-km"><div id="km-txt">KM ---+---</div></div>
    
    <div id="side-btns">
        <div class="circle-btn" title="Configurações" onclick="toggleSettings()">⚙️</div>
        <div class="circle-btn" title="Trocar Câmera" onclick="switchCam()">🔄</div>
    </div>
</div>

<div id="ui-dock">
    <div class="grid-stats">
        <div class="box-stat"><small>LOTE ATUAL</small><br><b id="v-batch">0/50</b></div>
        <div class="box-stat"><small>TOTAL PDFS</small><br><b id="v-total">0</b></div>
    </div>
    <button id="btn-dir" class="btn-main btn-folder" onclick="pickFolder()">📁 SELECIONAR DIRETÓRIO</button>
    <button id="btn-start" class="btn-main btn-start" disabled onclick="startApp()">▶ INICIAR CAPTURA</button>
    <button id="btn-stop" class="btn-main btn-stop" style="display:none" onclick="stopApp()">■ PARAR E SALVAR PDF</button>
    <div id="status" style="font-size:10px; color:#666; text-align:center; margin-top:10px; font-weight:bold;">V13 PRO | PROTEÇÃO DE DADOS ATIVA</div>
</div>

<div id="side-panel">
    <h2 style="margin-bottom:35px; font-weight:900; color:var(--gold); border-bottom:3px solid var(--gold); padding-bottom:15px;">CONFIGURAÇÕES AVANÇADAS</h2>
    <div class="panel-row">
        <label>Lente da Câmera</label>
        <select id="cam-list" onchange="initCam(this.value)"></select>
    </div>
    <div class="panel-row">
        <label>Fotos por Lote (PDF)</label>
        <input type="number" id="cfg-batch" value="50">
    </div>
    <div class="panel-row">
        <label>Velocidade de Captura (ms)</label>
        <input type="number" id="cfg-ms" value="800">
    </div>
    <div class="panel-row">
        <label>Qualidade do Arquivo</label>
        <select id="cfg-quality">
            <option value="0.5">Econômica (Relatórios Longos)</option>
            <option value="0.75" selected>Equilibrada (Padrão)</option>
            <option value="0.95">Alta Resolução (Detalhado)</option>
        </select>
    </div>
    <button class="btn-main btn-folder" style="background:var(--gold)" onclick="toggleSettings()">CONCLUIR AJUSTES</button>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB=[], gps=null, active=false, buffer=[], total=0, batchCount=0, hFolder=null, uiTimer, cams=[];
const vid=document.getElementById('vid'), proc=document.getElementById('proc'), ctx=proc.getContext('2d');

window.onload = async () => { await loadCams(); loadCSV(); initGPS(); wakeUI(); };

async function loadCams() {
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        cams = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-list');
        cams.forEach((c, i) => {
            const opt = document.createElement('option');
            opt.value = c.deviceId; opt.text = c.label || `Lente ${i+1}`;
            sel.appendChild(opt);
        });
        // Inicia com a última câmera traseira (geralmente a principal)
        if(cams.length) initCam(cams[cams.length-1].deviceId);
    } catch(e) { alert("Permita o acesso à câmera para continuar."); }
}

async function initCam(id) {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

function switchCam() {
    let current = document.getElementById('cam-list').selectedIndex;
    let next = (current + 1) % cams.length;
    document.getElementById('cam-list').selectedIndex = next;
    initCam(cams[next].deviceId);
    vibrate(40);
}

function wakeUI() {
    document.getElementById('ui-dock').classList.remove('hide-ui');
    document.getElementById('side-btns').classList.remove('hide-controls');
    clearTimeout(uiTimer);
    if(active) {
        uiTimer = setTimeout(() => {
            document.getElementById('ui-dock').classList.add('hide-ui');
            document.getElementById('side-btns').classList.add('hide-controls');
        }, 4500); // 4.5 segundos de visibilidade
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.log("CSV Base não encontrado."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        if(kmDB.length) {
            let near = null, dMin = Infinity;
            for(const pt of kmDB) {
                const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
                if(d < dMin) { dMin = d; near = pt; }
            }
            if(near) document.getElementById('km-txt').innerText = "KM " + near.km;
        }
    }, null, {enableHighAccuracy: true});
}

async function pickFolder() {
    try {
        hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-dir').innerText = "✓ DIRETÓRIO CONECTADO";
        document.getElementById('btn-start').disabled = false;
        vibrate(60);
    } catch(e) { alert("A pasta é necessária para salvar os relatórios."); }
}

function startApp() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    active = true;
    vibrate();
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';
    loop();
}

function stopApp() {
    active = false;
    vibrate(250);
    document.getElementById('btn-start').style.display = 'flex';
    document.getElementById('btn-stop').style.display = 'none';
    
    // FORÇA O SALVAMENTO IMEDIATO AO CLICAR EM PARAR
    if(buffer.length > 0) {
        saveBatch(); 
    } else {
        alert("Nenhuma foto capturada neste trecho.");
    }
}

function loop() {
    if(!active) return;
    
    // Captura o frame atual da câmera
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    const q = parseFloat(document.getElementById('cfg-quality').value);
    
    buffer.push({
        raw: proc.toDataURL('image/jpeg', q),
        km: document.getElementById('km-txt').innerText.replace("KM ", ""),
        ts: new Date().toLocaleString('pt-BR').toUpperCase()
    });

    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${document.getElementById('cfg-batch').value}`;

    // Salva automaticamente ao atingir o limite do lote
    if(buffer.length >= parseInt(document.getElementById('cfg-batch').value)) {
        saveBatch();
    }
    
    setTimeout(loop, parseInt(document.getElementById('cfg-ms').value));
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    
    const items = [...buffer]; // Copia o buffer para não perder dados
    buffer = []; // Limpa o buffer original para o próximo lote
    batchCount++;
    
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = proc.height * 0.16;
                // Tarja preta transparente para informações
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, proc.height-bh, proc.width, bh);
                // Estampa KM (Amarelo)
                ctx.fillStyle = "#ffcc00"; ctx.font = `bold ${bh*0.48}px Arial`;
                ctx.fillText("KM " + items[i].km, 60, proc.height-(bh*0.42));
                // Estampa Data/Hora (Branco)
                ctx.fillStyle = "#fff"; ctx.font = `${bh*0.16}px monospace`;
                ctx.fillText(items[i].ts, 60, proc.height-(bh*0.18));
                
                doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }

    const fName = `LOTE_${batchCount}_KM_${items.km.replace('+','-')}.pdf`;
    try {
        const handle = await hFolder.getFileHandle(fName, {create:true});
        const writable = await handle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
        vibrate(); // Vibração de "Salvo com sucesso"
    } catch(e) {
        alert("Erro ao gravar arquivo na pasta. Verifique as permissões.");
    }
}

function toggleSettings() { 
    const p = document.getElementById('side-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
    vibrate(15);
}

function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
</script>
</body>
</html>
