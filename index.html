<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KM AO VIVO</title>

<style>
:root {
  --placa-verde: #007934;
  --branco: #ffffff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--placa-verde);
  color: var(--branco);
  font-family: Arial, Helvetica, sans-serif;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* PLACA DE KM FULL SCREEN */
#km-placa {
  border: 12px solid #fff;
  border-radius: 16px;
  padding: 40px 80px;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
  text-align: center;
}

#km-placa h1 {
  font-size: 20vw;
  font-weight: 900;
  letter-spacing: 6px;
}

/* AJUSTE PARA TELAS MENORES */
@media (max-width: 600px) {
  #km-placa h1 {
    font-size: 28vw;
  }
}
</style>
</head>

<body onclick="requestFull()">

<div id="km-placa">
  <h1 id="km-txt">Km ---+---</h1>
</div>

<script>
let kmDB = [];

/* FULLSCREEN */
function requestFull() {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }
}

/* CARREGA BASE DE KM */
async function loadCSV() {
  try {
    const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
    const t = await r.text();

    const rows = t.split('\n').filter(l => l.includes(';'));
    const h = rows.shift().split(';').map(v => v.trim().toLowerCase());

    const ik = h.findIndex(x => x.includes('km'));
    const ilt = h.findIndex(x => x.includes('lat'));
    const iln = h.findIndex(x => x.includes('lon'));

    kmDB = rows.map(r => {
      const c = r.split(';');
      return {
        km: c[ik],
        lt: parseFloat(c[ilt].replace(',', '.')),
        ln: parseFloat(c[iln].replace(',', '.'))
      };
    }).filter(p => !isNaN(p.lt));

  } catch (e) {
    console.error('Erro ao carregar CSV');
  }
}

/* GPS AO VIVO */
function initGPS() {
  navigator.geolocation.watchPosition(pos => {
    if (!kmDB.length) return;

    let melhor = null;
    let menor = Infinity;

    for (const p of kmDB) {
      const d = Math.hypot(
        p.lt - pos.coords.latitude,
        p.ln - pos.coords.longitude
      );
      if (d < menor) {
        menor = d;
        melhor = p;
      }
    }

    if (melhor) {
      document.getElementById('km-txt').innerText = 'Km ' + melhor.km;
    }
  }, null, {
    enableHighAccuracy: true,
    maximumAge: 500,
    timeout: 5000
  });
}

/* INICIALIZA */
window.onload = () => {
  loadCSV();
  initGPS();
  requestFull();
};
</script>

</body>
</html>
