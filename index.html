<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Inspeção Rodoviária Pro - V6</title>
    <style>
        :root{
            --bg:#203e92; --bg2:#0b1224; --surface:#0f1731cc; --surface-strong:#1b368f;
            --fg:#e8eeff; --muted:#a9b7df; --border:#1e284d; --glow:#43ff9b; --ok:#22c55e;
            --radius: 14px; --camH: 45vh;
            --pdfA:#857b5d; --pdfB:#eab308; --pdfText:#231c00;
        }
        body{ margin:0; color:var(--fg); background: var(--bg); font-family: system-ui, sans-serif; padding:12px; overflow-x:hidden; }
        .card{ background: var(--surface); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: var(--radius); padding:12px; margin-bottom:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #kmPlaque{ text-align:center; padding:12px; background: linear-gradient(180deg, #0d3b8e, #0a2e6d); border:2px solid #fff; border-radius:12px; margin-bottom:10px; font-weight:900; font-size:1.8rem; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #camCard{ position: relative; width: 100%; height: var(--camH); border-radius: var(--radius); overflow: hidden; background: #000; border: 2px solid var(--border); }
        #vid{ width: 100%; height: 100%; object-fit: cover; }
        .st{ display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:99px; font-size:0.8rem; font-weight:bold; background: rgba(0,0,0,0.3); margin-right:5px; }
        .ok{ color: #43ff9b; }
        .row{ display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        button{ flex: 1; padding: 15px; border-radius: 12px; border: 0; font-weight: 900; cursor: pointer; background: #1b368f; color: #fff; transition: 0.2s; }
        button:active{ transform: scale(0.95); }
        #btnRec{ background: linear-gradient(180deg, #f2544b, #cc3e36); }
        #btnAuto{ background: linear-gradient(180deg, #ff7b45, #e5612e); }
        #btnPdf{ background: linear-gradient(180deg, var(--pdfA), var(--pdfB)); color: var(--pdfText); }
        .chip{ position: absolute; top: 10px; right: 10px; padding: 5px 10px; background: rgba(255,0,0,0.8); border-radius: 5px; font-weight: bold; display: none; }
        canvas#renderCanvas { display: none; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .thumb img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="kmPlaque"><span id="kmTop">KM --+---</span></div>

<div id="statusBar">
    <span id="stGps" class="st">GPS: BUSCANDO...</span>
    <span id="stCsv" class="st">CSV: CARREGANDO...</span>
    <span id="stFotos" class="st">FOTOS: 0</span>
</div>

<div id="camCard">
    <video id="vid" autoplay playsinline muted></video>
    <div id="recChip" class="chip">REC ⏺</div>
    <div id="autoChip" class="chip" style="background: orange;">AUTO 🎬</div>
</div>

<div class="card">
    <div class="row">
        <button id="btnAuto">Captura Auto</button>
        <button id="btnRec">Gravar Vídeo</button>
    </div>
    <div class="row">
        <button id="btnPdf">Gerar PDF</button>
        <button id="btnClear" style="background: #ef4444;">Limpar Tudo</button>
    </div>
</div>

<div class="card">
    <h3>Galeria da Sessão</h3>
    <div id="gal" class="gallery"></div>
</div>

<canvas id="renderCanvas"></canvas>

<script>
/* LÓGICA DE CÁLCULO GEOGRÁFICO (O CORAÇÃO DO SISTEMA) */
let kmBase = [], noxBase = [], photos = [], gps = null;
let isRec = false, isAuto = false, mRecorder = null, chunks = [];

function getDist(la1, lo1, la2, lo2) {
    const R = 6371000;
    const dLat = (la2 - la1) * Math.PI / 180;
    const dLon = (lo2 - lo1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function parsePt(v) { 
    if(!v) return NaN;
    let s = String(v).replace(/[^\d.,-]/g, '');
    if(s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
    else if(s.includes(',')) s = s.replace(',', '.');
    return parseFloat(s);
}

/* CARREGAMENTO DE ARQUIVOS */
async function loadData() {
    try {
        const [rKm, rNox] = await Promise.all([
            fetch('SNVBR116SPRJ.csv').then(r => r.text()),
            fetch('Dados_Completos_Grupo_2_all.csv').then(r => r.text())
        ]);
        
        // Processar KM (Rodovia)
        kmBase = rKm.split('\n').slice(1).map(line => {
            const c = line.split(';');
            return { km: c, lat: parsePt(c || c), lon: parsePt(c || c) };
        }).filter(p => !isNaN(p.lat));

        // Processar Nox (IDs)
        noxBase = rNox.split('\n').slice(1).map(line => {
            const c = line.split(';');
            return { id: c, lat: parsePt(c), lon: parsePt(c) };
        }).filter(p => !isNaN(p.lat));

        document.getElementById('stCsv').textContent = "CSV: OK";
        document.getElementById('stCsv').classList.add('ok');
    } catch (e) { console.error("Erro CSV:", e); }
}

/* ATUALIZAÇÃO DE LOCALIZAÇÃO */
function updateLocation() {
    if(!gps || !kmBase.length) return;

    // Achar o KM mais próximo (Resolve o erro do KM 231)
    let closestKm = null, dMin = Infinity;
    kmBase.forEach(p => {
        const d = getDist(gps.lat, gps.lon, p.lat, p.lon);
        if(d < dMin) { dMin = d; closestKm = p; }
    });

    if(closestKm) {
        document.getElementById('kmTop').textContent = "KM " + closestKm.km;
    }

    // Achar o ID Nox mais próximo
    let closestNox = null, dNoxMin = Infinity;
    noxBase.forEach(p => {
        const d = getDist(gps.lat, gps.lon, p.lat, p.lon);
        if(d < dNoxMin) { dNoxMin = d; closestNox = p; }
    });
    window.currentNox = closestNox ? closestNox.id : "S/ ID";
}

/* CÂMERA E GRAVAÇÃO */
const vid = document.getElementById('vid');
const canvas = document.getElementById('renderCanvas');
const ctx = canvas.getContext('2d');

async function initCam() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280 }, audio: false });
    vid.srcObject = stream;
    
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        document.getElementById('stGps').textContent = "GPS: OK";
        document.getElementById('stGps').classList.add('ok');
        updateLocation();
    }, null, { enableHighAccuracy: true });
}

/* RENDERIZAÇÃO DE OVERLAY (FOTOS E VÍDEOS) */
function drawOverlay() {
    canvas.width = vid.videoWidth;
    canvas.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);

    // Tarja de Auditoria
    ctx.fillStyle = "rgba(13, 59, 142, 0.85)"; // Azul escuro
    ctx.fillRect(0, canvas.height - 120, canvas.width, 120);
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 50px Arial";
    ctx.fillText(document.getElementById('kmTop').textContent, 30, canvas.height - 70);
    
    ctx.font = "30px Arial";
    ctx.fillText("ID: " + (window.currentNox || "Buscando..."), 30, canvas.height - 25);
    
    const ts = new Date().toLocaleString();
    ctx.textAlign = "right";
    ctx.fillText(ts, canvas.width - 30, canvas.height - 25);
    ctx.textAlign = "left";
}

/* CAPTURA DE FOTO */
function takePhoto() {
    drawOverlay();
    const url = canvas.toDataURL('image/jpeg', 0.8);
    photos.push({ url, km: document.getElementById('kmTop').textContent });
    
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    thumb.innerHTML = `<img src="${url}">`;
    document.getElementById('gal').prepend(thumb);
    document.getElementById('stFotos').textContent = "FOTOS: " + photos.length;
}

/* EVENTOS DE BOTÕES */
document.getElementById('btnAuto').onclick = () => {
    isAuto = !isAuto;
    document.getElementById('autoChip').style.display = isAuto ? 'block' : 'none';
    if(isAuto) {
        window.autoTimer = setInterval(takePhoto, 2000);
    } else {
        clearInterval(window.autoTimer);
    }
};

document.getElementById('btnRec').onclick = async () => {
    if(!isRec) {
        chunks = [];
        const stream = canvas.captureStream(30);
        mRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mRecorder.ondataavailable = e => chunks.push(e.data);
        mRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `INSPECAO_${Date.now()}.webm`; a.click();
        };
        mRecorder.start();
        isRec = true;
        document.getElementById('recChip').style.display = 'block';
        
        // Loop de desenho para o vídeo
        window.recLoop = setInterval(drawOverlay, 33);
    } else {
        mRecorder.stop();
        isRec = false;
        clearInterval(window.recLoop);
        document.getElementById('recChip').style.display = 'none';
    }
};

document.getElementById('btnClear').onclick = () => {
    if(confirm("Limpar todas as fotos?")) {
        photos = [];
        document.getElementById('gal').innerHTML = "";
        document.getElementById('stFotos').textContent = "FOTOS: 0";
    }
};

// Iniciar
loadData();
initCam();
</script>
</body>
</html>
