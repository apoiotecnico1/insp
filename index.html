<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INSPEÇÃO PRO – KM SINCRONIZADO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Segoe UI,sans-serif;overflow:hidden}
#viewport{position:relative;height:60vh}
video{width:100%;height:100%;object-fit:cover}

#kmPlaque{
position:absolute;bottom:18px;left:18px;
background:linear-gradient(#0a8a4d,#056b3c);
color:#fff;font-size:2.4rem;font-weight:900;
padding:10px 20px;border:4px solid #fff;
border-radius:12px;box-shadow:0 6px 20px #000;
}

.controls,.dashboard{
display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px
}
.dashboard{grid-template-columns:repeat(4,1fr)}
.card{background:#111;border:1px solid #222;border-radius:10px;text-align:center;padding:6px;font-size:.75rem}
.val{font-size:1.3rem;color:#00d9ff;font-weight:900;display:block}

select,button{
padding:8px;border-radius:10px;border:none;font-weight:800
}
#btnStart{background:#00ff66;color:#000}
#btnStop{background:#ff3333;color:#fff}
canvas{display:none}
</style>
</head>

<body>

<div id="viewport">
<video id="vid" autoplay muted playsinline></video>
<div id="kmPlaque">KM --+---</div>
</div>

<div class="controls">
<select id="fps">
<option value="1000">1 foto/seg</option>
<option value="500">2 fotos/seg</option>
<option value="200" selected>5 fotos/seg</option>
<option value="100">10 fotos/seg</option>
</select>

<select id="batch">
<option>10</option><option>50</option><option>100</option>
<option selected>200</option><option>300</option><option>400</option><option>500</option>
</select>
</div>

<div class="dashboard">
<div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
<div class="card">LOTE<span id="txtBuffer" class="val">0</span></div>
<div class="card">PDF<span id="txtPdfs" class="val">0</span></div>
<div class="card" id="btnPdf" style="background:#1e3a8a;cursor:pointer">GERAR</div>
</div>

<div class="controls">
<button id="btnStart">INICIAR</button>
<button id="btnStop" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset=[], lastPos=null;
let recording=false, photos=0, pdfs=0;
let buffer=[];

const vid=document.getElementById("vid");
const can=document.getElementById("can");
const ctx=can.getContext("2d");

function hav(a,b,c,d){
const R=6371000;
const x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
const u=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

async function loadCSV(){
const r=await fetch("SNVBR116SPRJ.csv",{cache:"no-store"});
if(!r.ok){ alert("CSV não encontrado"); return; }
const t=(await r.text()).trim();
const lines=t.split(/\r?\n/);
const h=lines.shift().split(";");
const iKm=h.indexOf("km");
const iLat=h.indexOf("lat");
const iLon=h.indexOf("lon");

kmDataset=lines.map(l=>{
const r=l.split(";");
return{km:r[iKm],lat:+r[iLat],lon:+r[iLon]};
}).filter(p=>p.km && !isNaN(p.lat) && !isNaN(p.lon));
}

function updateKM(){
if(!lastPos || !kmDataset.length) return;
let best=null,bd=Infinity;
for(const p of kmDataset){
const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
if(d<bd){bd=d;best=p;}
}
if(best) kmPlaque.textContent="KM "+best.km;
}

function drawOverlay(km){
ctx.fillStyle="#056b3c";
ctx.strokeStyle="#fff";
ctx.lineWidth=4;
ctx.fillRect(20,can.height-120,360,90);
ctx.strokeRect(20,can.height-120,360,90);
ctx.fillStyle="#fff";
ctx.font="bold 42px Segoe UI";
ctx.fillText("KM "+km,40,can.height-60);
}

function capture(){
if(!recording) return;
ctx.drawImage(vid,0,0,can.width,can.height);
const km=kmPlaque.textContent.replace("KM ","");
drawOverlay(km);

buffer.push({img:can.toDataURL("image/jpeg",0.7)});
photos++; txtTotal.textContent=photos;
txtBuffer.textContent=buffer.length;

if(buffer.length>=batch.value) savePDF();
setTimeout(capture,fps.value);
}

function savePDF(){
if(!buffer.length) return;
const {jsPDF}=window.jspdf;
const doc=new jsPDF("l","mm","a4");
buffer.forEach((p,i)=>{
if(i)doc.addPage();
doc.addImage(p.img,"JPEG",10,10,277,190);
});
doc.save("INSPECAO_"+(++pdfs)+".pdf");
txtPdfs.textContent=pdfs;
buffer=[];
}

btnStart.onclick=()=>{recording=true;btnStart.disabled=true;btnStop.disabled=false;capture();}
btnStop.onclick=()=>{recording=false;btnStart.disabled=false;btnStop.disabled=true;savePDF();}
btnPdf.onclick=savePDF;

(async()=>{
await loadCSV();

const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
vid.srcObject=s;
vid.onloadedmetadata=()=>{can.width=vid.videoWidth;can.height=vid.videoHeight};

navigator.geolocation.watchPosition(p=>{
lastPos={lat:p.coords.latitude,lon:p.coords.longitude};
updateKM();
},{},{enableHighAccuracy:true});
})();
</script>
</body>
</html>
