<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>SISTEMA INSPEÇÃO PRO - ALTA PERFORMANCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00ff41; 
            --danger: #ff0000; 
            --glass: rgba(0, 0, 0, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* Gate de Segurança Profissional */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 2px solid var(--accent); padding: 40px; border-radius: 5px; text-align: center; max-width: 90%; background: #050505; }
        .msg-seguranca { color: var(--danger); font-weight: 900; margin-bottom: 20px; font-size: 1.4rem; border: 1px solid var(--danger); padding: 10px; text-transform: uppercase; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* Interface Principal */
        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: contrast(1.5) brightness(0.8) grayscale(0.4); 
        }
        
        .technical-overlay {
            position: absolute; inset: 0; pointer-events: none;
            border: 1px solid rgba(0, 255, 65, 0.1);
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4) 100%);
        }

        /* HUD de Engenharia - Foco na BR e Km */
        #km-hud { 
            position: absolute; top: 30px; left: 30px; 
            background: #fff; color: #000; 
            padding: 12px 30px; border: 5px solid #000; 
            z-index: 100; box-shadow: 10px 10px 0 var(--accent);
            text-align: center; min-width: 200px;
        }
        #br-txt { font-size: 1.2rem; font-weight: 900; display: block; border-bottom: 3px solid #000; margin-bottom: 5px; text-transform: uppercase; color: #000; }
        #km-txt { font-size: 3.2rem; font-weight: 900; font-family: 'Courier New', monospace; line-height: 1; }

        #rec-tag { 
            position: absolute; top: 30px; right: 30px; 
            background: var(--danger); color: #fff; 
            padding: 10px 20px; font-weight: bold; font-size: 1.1rem;
            display: flex; align-items: center; gap: 10px; border-radius: 4px; opacity: 0; z-index: 100;
        }
        .dot { width: 14px; height: 14px; background: #fff; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Controles Inferiores */
        .auto-hide { transition: opacity 0.5s ease; opacity: 1; }
        .hidden { opacity: 0; pointer-events: none; }

        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 500; }
        .btn-main { border: none; padding: 25px 45px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; border-radius: 4px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 70px; background: #333; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border-radius: 4px; }

        /* Painel Lateral */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); z-index: 4000; padding: 40px 25px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 2px solid var(--accent); 
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: var(--accent); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 0; }

        #no-sleep-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<video id="no-sleep-video" playsinline muted loop></video>
<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <div class="msg-seguranca">OPERAÇÃO TÉCNICA EM RODOVIA</div>
        <h2 style="margin-bottom: 10px;">INSPEÇÃO DE ILUMINAÇÃO PÚBLICA</h2>
        <p style="margin-bottom: 30px; color: #888;">Filtros de supressão de brilho ativos.<br>Monitoramento GPS em tempo real.</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom: 20px;">CONFIGURAÇÕES</h3>
    <div class="field"><label>Câmera / Sensor</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Velocidade de Obturação (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Imagens por PDF (Lote)</label><input type="number" id="cfg-lote" value="50"></div>
    <button class="btn-aware" onclick="toggleSet()" style="width: 100%; padding: 12px; font-size: 10px;">FECHAR</button>
</div>

<div id="app-shell">
    <div class="video-container">
        <video id="vid" autoplay playsinline muted onclick="handleScreenClick(event)"></video>
        <div class="technical-overlay"></div>
    </div>
    
    <div id="km-hud">
        <span id="br-txt">BUSCANDO...</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>GRAVANDO</span></div>

    <div id="ui-controls" class="auto-hide">
        <div id="gear-btn" onclick="event.stopPropagation(); toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="event.stopPropagation(); startCapture()">Iniciar Roteiro</button>
        <button id="btn-stop" class="btn-main" onclick="event.stopPropagation(); stopCapture()">Finalizar Lote</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null, wakeLock=null, hideTimeout;
let kmInicialLote = "", brAtual = "RODOVIA", buffer = [];
let curLat = "0.0000", curLon = "0.0000";

const vid = document.getElementById('vid');
const noSleepVid = document.getElementById('no-sleep-video');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function refreshWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function keepScreenAlive() {
    refreshWakeLock();
    if (noSleepVid.paused) {
        noSleepVid.src = "https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3";
        noSleepVid.play().catch(()=>{});
    }
}
setInterval(keepScreenAlive, 15000);

function handleScreenClick(e) {
    const controls = document.querySelector('.auto-hide');
    controls.classList.remove('hidden');
    captureJPG(); 
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => { if(capturing) controls.classList.add('hidden'); }, 3000);
}

function doFlash() {
    const f = document.getElementById('flash');
    f.style.opacity = '0.5';
    setTimeout(() => f.style.opacity = '0', 150);
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        keepScreenAlive();
        listCams(); 
        await loadCSV(); 
        initGPS();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Selecione a pasta de destino."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Sensor ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    document.querySelector('.auto-hide').classList.remove('hidden');
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ 
        img: can.toDataURL('image/jpeg', 0.4), 
        km: currentKm, br: brAtual, 
        ts: new Date().toLocaleString('pt-BR'),
        gps: `${curLat}, ${curLon}`
    });

    const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
    if (buffer.length >= limit) {
        savePDF([...buffer], kmInicialLote, currentKm);
        buffer = []; kmInicialLote = currentKm;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function captureJPG() {
    doFlash();
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const agora = new Date();
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.15; 
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#00ff41";
    ctx.font = `bold ${bh * 0.35}px Arial`;
    ctx.fillText(`${brAtual} - Km ${km}`, 40, can.height - (bh * 0.55));
    ctx.fillStyle = "#fff";
    ctx.font = `${bh * 0.20}px Arial`;
    ctx.fillText(`${agora.toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`, 40, can.height - (bh * 0.25));
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.9));
    const nome = `FOTO_${brAtual}_Km_${km.replace('+','_')}_${agora.getTime()}.jpg`;
    try {
        const fh = await hDir.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(blob);
        await wr.close();
    } catch (e) {}
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        await new Promise(res => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.9)";
                ctx.fillRect(0, can.height - bh, can.width, bh);
                ctx.fillStyle = "#00ff41";
                ctx.font = `bold ${bh * 0.45}px monospace`;
                ctx.fillText(`${dataList[i].br} - Km ${dataList[i].km}`, 25, can.height - (bh * 0.45));
                ctx.fillStyle = "#fff";
                ctx.font = `${bh * 0.25}px Arial`;
                ctx.fillText(`${dataList[i].ts} | GPS: ${dataList[i].gps}`, 25, can.height - (bh * 0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                res();
            };
            img.src = dataList[i].img;
        });
    }
    const nome = `INSPECAO_${brAtual}_Km_${kmIni}_ao_${kmFim}.pdf`;
    const fh = await hDir.getFileHandle(nome, { create: true });
    const wr = await fh.createWritable();
    await wr.write(doc.output('blob'));
    await wr.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const header = rows.shift().split(';').map(v => v.trim().toLowerCase());
        
        // Mapeamento Inteligente de Colunas
        const ik = header.indexOf('km');
        const ilt = header.findIndex(x => x.includes('lat'));
        const iln = header.findIndex(x => x.includes('lon'));
        
        // Procura a coluna da Rodovia/BR
        let ibr = header.indexOf('br');
        if (ibr === -1) ibr = header.indexOf('rodovia');
        if (ibr === -1) ibr = header.indexOf('via');

        kmDB = rows.map(r => {
            const c = r.split(';');
            if (c.length < 3) return null;
            return { 
                km: c[ik] ? c[ik].trim() : "---", 
                lt: parseFloat(c[ilt].replace(',', '.')), 
                ln: parseFloat(c[iln].replace(',', '.')), 
                br: ibr !== -1 ? c[ibr].trim() : "BR-???" 
            };
        }).filter(d => d && !isNaN(d.lt));
    } catch(e) { console.error("Erro CSV:", e); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;

        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            // Busca o ponto mais próximo geograficamente
            const d = Math.sqrt(Math.pow(pt.lt - p.coords.latitude, 2) + Math.pow(pt.ln - p.coords.longitude, 2));
            if (d < minD) { minD = d; best = pt; }
        }

        if (best) {
            brAtual = best.br; // Define a BR atual baseada no CSV
            document.getElementById('br-txt').innerText = brAtual;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 });
}

document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepScreenAlive(); });
</script>
</body>
</html>
