<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SISTEMA DE RELATÓRIO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
    --danger:#ff0000;
    --accent:#ffcc00;
    --green:#007934;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
html,body{
    width:100vw;height:100vh;
    background:#000;color:#fff;
    overflow:hidden;
    position:fixed;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

/* ===== TELA DE ABERTURA ===== */
#safety-gate{
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.safety-box{
    max-width:420px;
    text-align:center;
    border:2px solid #333;
    border-radius:14px;
    padding:30px;
}
.safety-box img{
    max-width:220px;
    margin-bottom:20px;
}
.safety-box h2{
    color:var(--danger);
    font-size:1.2rem;
    margin-bottom:15px;
    text-transform:uppercase;
}
.safety-box p{
    font-size:16px;
    font-weight:bold;
    margin-bottom:25px;
}
.btn-proceed{
    width:100%;
    padding:18px;
    font-weight:900;
    background:var(--accent);
    color:#000;
    border:none;
    border-radius:8px;
    cursor:pointer;
    text-transform:uppercase;
}

/* ===== APP ===== */
#app-shell{display:none;width:100%;height:100%;position:relative;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}

#km-hud{
    position:absolute;
    top:20px;left:20px;
    background:var(--green);
    padding:10px 20px;
    border:3px solid #fff;
    border-radius:8px;
    z-index:10;
}
#km-hud h1{font-size:2rem;font-weight:900}

/* STATUS REC */
#rec-status{
    position:absolute;
    top:25px;right:25px;
    display:none;align-items:center;
    gap:6px;
    background:rgba(0,0,0,0.6);
    padding:5px 12px;
    border-radius:20px;
    z-index:10;
    font-weight:900;
}
.dot{
    width:10px;height:10px;
    background:var(--danger);
    border-radius:50%;
    animation:blink 1s infinite;
    box-shadow:0 0 10px var(--danger);
}
@keyframes blink{50%{opacity:.3;}}

/* CONTROLES */
#ui-controls{
    position:absolute;
    bottom:40px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    z-index:100;
}
.btn-round{
    width:80px;height:80px;
    border-radius:50%;
    border:4px solid #fff;
    font-weight:900;
    cursor:pointer;
}
#btn-start{background:var(--accent);color:#000;}
#btn-stop{background:#ff0000;color:#fff;display:none;}
#gear-btn{
    width:50px;height:50px;
    border-radius:50%;
    background:rgba(0,0,0,.5);
    border:1px solid #444;
    color:#fff;
    font-size:20px;
}

/* CONFIG */
#settings-panel{
    position:fixed;
    right:-350px;top:0;
    height:100%;width:320px;
    background:#111;
    border-left:1px solid #333;
    z-index:4000;
    padding:30px;
    transition:.3s;
}
#settings-panel.open{right:0;}
.field{margin-bottom:15px;}
.field label{
    font-size:10px;color:#777;
    text-transform:uppercase;display:block;
    margin-bottom:5px;
}
select,input{
    width:100%;
    background:#000;
    border:1px solid #333;
    color:#fff;
    padding:12px;
    border-radius:4px;
}
canvas{display:none;}
</style>
</head>

<body onclick="forceFull()">

<!-- ABERTURA -->
<div id="safety-gate">
    <div class="safety-box">
        <img src="proibido.png" alt="Proibido uso de celular ao dirigir">
        <h2>Não utilize o celular enquanto dirige</h2>
        <p>O uso deste sistema durante a condução do veículo é proibido.</p>
        <button class="btn-proceed" onclick="requestAccess()">Estou ciente</button>
    </div>
</div>

<!-- CONFIG -->
<div id="settings-panel">
    <div style="margin-bottom:25px;color:#555;font-weight:bold;font-size:12px;">CONFIGURAÇÕES</div>
    <div class="field">
        <label>Dispositivo</label>
        <select id="cam-select" onchange="initC(this.value)"></select>
    </div>
    <div class="field">
        <label>Fotos por Lote</label>
        <input type="number" id="cfg-lote" value="200">
    </div>
    <div class="field">
        <label>Velocidade (ms)</label>
        <input type="number" id="cfg-int" value="200">
    </div>
    <button onclick="toggleSet()" style="width:100%;padding:15px;background:#fff;border:none;font-weight:bold;border-radius:4px;">FECHAR</button>
</div>

<!-- APP -->
<div id="app-shell">
    <video id="vid" autoplay muted playsinline></video>
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    <div id="rec-status"><div class="dot"></div><span>ON</span></div>

    <div id="ui-controls">
        <button id="gear-btn" onclick="toggleSet();event.stopPropagation()">⚙️</button>
        <button id="btn-start" class="btn-round" onclick="initCapture();event.stopPropagation()">INICIAR</button>
        <button id="btn-stop" class="btn-round" onclick="stopCapture();event.stopPropagation()">PARAR</button>
    </div>
</div>

<canvas id="can_cap"></canvas>

<script>
/* === JS ORIGINAL DO SISTEMA (inalterado) === */
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null;
let kmInicialLote="";
const vid=document.getElementById('vid');
const canCap=document.getElementById('can_cap'), ctxCap=canCap.getContext('2d');
const canOff=document.createElement('canvas'), ctxOff=canOff.getContext('2d');

function forceFull(){
    document.documentElement.requestFullscreen?.({navigationUI:"hide"}).catch(()=>{});
}
function toggleSet(){document.getElementById('settings-panel').classList.toggle('open');}

/* === ACESSO === */
async function requestAccess(){
    try{
        dirHandle=await window.showDirectoryPicker({mode:'readwrite'});
        if(await dirHandle.queryPermission({mode:'readwrite'})!=='granted')
            await dirHandle.requestPermission({mode:'readwrite'});

        document.getElementById('safety-gate').style.display='none';
        document.getElementById('app-shell').style.display='block';
        forceFull();
        await listCams();
        if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen');
        loadCSV();initGPS();
    }catch(e){alert("Acesso necessário.");}
}

/* === CÂMERAS === */
async function listCams(){
F
    const d=await navigator.mediaDevices.enumerateDevices();
    const v=d.filter(x=>x.kind==='videoinput');
    cam-select.innerHTML=v.map((c,i)=>`<option value="${c.deviceId}">CÂMERA ${i+1}</option>`).join('');
    if(v.length)initC(v[v.length-1].deviceId);
}
async function initC(id){
    currentStream?.getTracks().forEach(t=>t.stop());
    currentStream=await navigator.mediaDevices.getUserMedia({video:{deviceId:id,width:1280,height:720}});
    vid.srcObject=currentStream;
}

/* === CAPTURA / PDF / GPS === */
/* (mantido conforme código original) */
</script>
</body>
</html>
