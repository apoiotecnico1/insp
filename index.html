<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SUPORTE DE CAMPO ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* TELA DE SEGURANÇA INICIAL */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #333; padding: 35px; border-radius: 15px; max-width: 450px; background: #0a0a0a; text-align: center; }
        .btn-aware { width: 100%; background: var(--accent); color: #000; border: none; padding: 22px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; font-size: 14px; }

        /* APP PRINCIPAL */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM (ESQUERDA) */
        #km-hud { 
            position: absolute; top: env(safe-area-inset-top, 25px); left: 25px; 
            background: var(--placa-verde); padding: 15px 25px; 
            border: 2px solid #fff; border-radius: 8px; z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; }

        /* HUD CONTADOR (DIREITA) */
        #counter-hud {
            position: absolute; top: env(safe-area-inset-top, 25px); right: 25px;
            background: rgba(0,0,0,0.85); padding: 12px 18px; border-radius: 8px;
            border: 1px solid #444; text-align: right; z-index: 10;
        }
        #count-txt { font-size: 24px; font-weight: 900; color: var(--accent); font-family: monospace; }

        /* TAG DE GRAVAÇÃO ATIVA */
        #rec-tag { position: absolute; top: 110px; right: 25px; display: none; align-items: center; gap: 8px; color: #fff; font-size: 11px; font-weight: 900; background: rgba(255,0,0,0.8); padding: 6px 14px; border-radius: 20px; }
        .dot { width: 10px; height: 10px; background: #fff; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* BOTÕES DE CONTROLE */
        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 25px; z-index: 100;
        }
        .btn-main { border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 22px 50px; font-size: 15px; background: var(--accent); color: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }
        #gear-btn { width: 65px; height: 65px; border-radius: 12px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        /* PAINEL LATERAL (CONFIGS) */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(25px); z-index: 4000; 
            padding: 40px 25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #333;
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; font-weight: 700; }
        select, input { width: 100%; background: #151515; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 8px; font-size: 14px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent)">SISTEMA DE CAPTURA</h2>
        <p style="color: #888; margin: 20px 0; font-size: 13px; line-height: 1.6;">
            1. Selecione a pasta para salvar os PDFs.<br>
            2. Mantenha o carregador conectado.<br>
            3. <b>A página não fechará durante a gravação.</b>
        </p>
        <button class="btn-aware" onclick="startApp()">Aceitar e Iniciar</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:30px; font-size:14px; letter-spacing:1px;">AJUSTES</h3>
    <div class="field">
        <label>Lente Ativa</label>
        <select id="cam-select" onchange="initC(this.value)"></select>
    </div>
    <div class="field">
        <label>Fotos por PDF</label>
        <input type="number" id="cfg-lote" value="200">
    </div>
    <div class="field">
        <label>Intervalo (ms)</label>
        <input type="number" id="cfg-int" value="200">
    </div>
    <button class="btn-aware" onclick="toggleSet()">Voltar para Câmera</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="counter-hud">
        <div style="font-size:10px; color:#aaa; font-weight:800; margin-bottom:2px;">LOTE</div>
        <span id="count-txt">000</span><span style="color:#555; font-size:14px"> / <span id="max-txt">200</span></span>
    </div>

    <div id="rec-tag"><div class="dot"></div> CAPTURA ATIVA</div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>
        <button id="btn-start" class="btn-main" onclick="initCapture()">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Parar e Gerar PDF</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// BLOQUEAR FECHAMENTO DURANTE OPERAÇÃO
window.addEventListener('beforeunload', (e) => {
    if (rec) {
        e.preventDefault();
        e.returnValue = 'AVISO: Captura ativa. O lote atual será perdido!';
    }
});

async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        
        await listCams();
        loadCSV();
        initGPS();
        requestWakeLock();
    } catch(e) { alert("Permissão de pasta necessária para salvar os relatórios."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } 
    });
    vid.srcObject = currentStream;
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.display = 'flex';
    document.getElementById('max-txt').innerText = document.getElementById('cfg-lote').value;
    loop();
}

function stopCapture() {
    rec = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        can.width = vid.videoWidth; can.height = vid.videoHeight;
        ctx.drawImage(vid, 0, 0);
        const curKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.5), 
            km: curKm, 
            ts: new Date().toLocaleTimeString('pt-BR') 
        });

        document.getElementById('count-txt').innerText = buffer.length.toString().padStart(3, '0');

        const limit = parseInt(document.getElementById('cfg-lote').value) || 200;
        if(buffer.length >= limit) {
            const temp = [...buffer];
            savePDF(temp, kmInicialLote, curKm);
            buffer = [];
            kmInicialLote = curKm;
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(data, ini, fim) {
    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height-bh, can.width, bh);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${bh*0.4}px Arial`;
                ctx.fillText(`Km ${data[i].km}`, 40, can.height-(bh*0.45));
                ctx.font = `${bh*0.2}px Arial`;
                ctx.fillText(`DATA: ${new Date().toLocaleDateString('pt-BR')} | HORA: ${data[i].ts}`, 40, can.height-(bh*0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = data[i].raw;
        });
    }

    const agora = new Date();
    const dataF = agora.toLocaleDateString('pt-BR').replace(/\//g, '');
    const horaF = agora.toLocaleTimeString('pt-BR').replace(/:/g, '');
    const nome = `Relatorio_KM_${ini}_a_${fim}_${dataF}_${horaF}.pdf`;

    try {
        const f = await hDir.getFileHandle(nome, {create:true});
        const w = await f.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch(e) { console.error("Erro ao salvar PDF."); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.warn("Erro ao carregar CSV."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "Km " + b.km;
    }, null, {enableHighAccuracy:true});
}

document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') requestWakeLock(); });
</script>
</body>
</html>
