<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RODOVIÁRIA - ESTÁVEL V7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00d9ff; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* VIEWPORT E KM - LÓGICA DE CAMPO */
        #viewport { position: relative; width: 100vw; height: 50vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; 
            padding: 15px 30px; font-size: 3rem; font-weight: 900; border: 4px solid #fff;
            border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); white-space: nowrap;
        }

        /* ENGRENAGEM E MENU LATERAL */
        #settings-trigger { position: absolute; top: 15px; right: 15px; z-index: 2000; font-size: 30px; background: rgba(0,0,0,0.5); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
        
        #settings-panel { 
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%; 
            background: rgba(10,15,25,0.98); z-index: 5000; transition: 0.3s; 
            padding: 20px; overflow-y: auto; border-left: 2px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .group { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; font-size: 0.8rem; color: var(--accent); margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; margin-bottom: 10px; }

        /* CONTROLES INFERIORES */
        #controls { flex-grow: 1; background: #000; display: flex; flex-direction: column; }
        .status { display: flex; justify-content: space-around; font-size: 0.7rem; padding: 5px; background: #111; color: #888; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #222; }
        .card { background: #000; padding: 15px 5px; text-align: center; }
        .val { font-size: 1.5rem; font-weight: bold; color: var(--accent); display: block; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; }
        button.main { border: none; font-weight: 900; font-size: 1.5rem; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h2 style="color:var(--accent)">CONFIGURAÇÕES</h2>
    <div class="group">
        <label>Intervalo (ms)</label><input type="number" id="cDelay" value="200">
        <label>Fotos por PDF</label><input type="number" id="cBatch" value="200">
        <label>Lente</label><select id="cfgCam" onchange="initCam()"></select>
        <label>Prefixo</label><input type="text" id="pdfPrefix" value="INSPECAO">
        <button onclick="loadCSV()" style="width:100%; padding:10px; background:var(--accent); border:none; font-weight:bold;">RECARREGAR CSV</button>
    </div>
    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:#444; color:#fff; border:none; border-radius:10px;">VOLTAR</button>
</div>

<div id="viewport">
    <div id="kmPlaque">KM --+---</div>
    <video id="vid" autoplay playsinline muted></video>
</div>

<div id="controls">
    <div class="status">
        <span id="stCsv">CSV: ...</span> <span id="stGps">GPS: BUSCANDO...</span> <span id="txtTimer">00:00</span>
    </div>
    <div class="dashboard">
        <div class="card"><label>FOTOS</label><span id="txtTotal" class="val">0</span></div>
        <div class="card"><label>LOTE</label><span id="txtBuffer" class="val">0</span></div>
        <div class="card"><label>PDFS</label><span id="txtPdfs" class="val">0</span></div>
    </div>
    <div class="btn-row">
        <button id="btnStart" class="main">INICIAR</button>
        <button id="btnStop" class="main" disabled>PARAR</button>
    </div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false, activeBuffer = [];
let photoCount = 0, pdfCount = 0, startTime = 0, timerInterval;
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

// --- CÂMERA (FIX LENTE) ---
async function initCam() {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('cfgCam');
    if(select.innerHTML == "") {
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId; opt.text = d.label || `Câmera ${i+1}`;
            select.appendChild(opt);
        });
    }
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: { exact: select.value }, width: 1920, height: 1080 } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// --- CSV (GITHUB PAGES FIX) ---
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split(/\r?\n/).filter(x => x.trim() !== '');
        rows.shift();
        kmDataset = rows.map(row => {
            const parts = row.includes(';') ? row.split(';') : row.split(',');
            return { km: parts, lat: parseFloat(parts.replace(',','.')), lon: parseFloat(parts.replace(',','.')) };
        }).filter(p => !isNaN(p.lat));
        document.getElementById('stCsv').textContent = "CSV: " + kmDataset.length + " PTS";
    } catch(e) { document.getElementById('stCsv').textContent = "ERRO CSV"; }
}

// --- GPS (KM ULTRA ESTÁVEL) ---
navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    if(kmDataset.length) {
        let best = kmDataset, minDist = Infinity;
        for(let pt of kmDataset) {
            const d = Math.hypot(lastPos.lat - pt.lat, lastPos.lon - pt.lon);
            if(d < minDist) { minDist = d; best = pt; }
        }
        document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

// --- MOTOR DE PDF ---
async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++; document.getElementById('txtPdfs').textContent = pdfCount;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                ctx.font = "bold 80px Arial Black"; ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 5;
                ctx.strokeText("KM " + batch[i].km, 50, can.height - 100);
                ctx.fillText("KM " + batch[i].km, 50, can.height - 100);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].img;
        });
        URL.revokeObjectURL(batch[i].img);
    }
    doc.save(`${document.getElementById('pdfPrefix').value}_${Date.now()}.pdf`);
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', '')
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;
    if(activeBuffer.length >= parseInt(document.getElementById('cBatch').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cDelay').value));
}

// --- BOTÕES ---
document.getElementById('btnStart').onclick = () => {
    isRecording = true; startTime = Date.now();
    timerInterval = setInterval(() => {
        const d = new Date(Date.now() - startTime);
        document.getElementById('txtTimer').textContent = d.toISOString().substr(14, 5);
    }, 1000);
    captureLoop();
    document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false; clearInterval(timerInterval); savePDF();
    document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true;
};

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

initCam(); loadCSV();
</script>
</body>
</html>
