<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Técnica Pro V6 - Hands Free</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: rgba(0, 121, 52, 0.9); --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA DE KM */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa); 
            padding: 15px 30px; 
            border: 5px solid #fff; 
            border-radius: 15px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        #br-txt { font-size: 1rem; font-weight: 900; display: block; border-bottom: 3px solid #fff; margin-bottom: 5px; }
        #km-txt { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -2px; }

        /* BOTÃO CENTRAL DISCRETO */
        #shutter-zone {
            position: absolute; bottom: 120px; right: 30px;
            text-align: center; z-index: 60; cursor: pointer; opacity: 0.7;
        }
        #btn-jpg { 
            width: 60px; height: 60px; border: 3px solid #fff; border-radius: 50%;
            background: rgba(255,255,255,0.2); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        #btn-jpg::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; }
        .label-jpg { font-size: 8px; font-weight: 900; background: #000; padding: 3px 8px; border-radius: 5px; }

        /* CONTROLES */
        #ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn { border: none; padding: 20px 40px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #start { background: var(--accent); color: #000; }
        #stop { background: var(--danger); color: #fff; display: none; }
        
        #rec-status { position: absolute; top: 25px; right: 25px; background: rgba(255,0,0,0.8); padding: 10px 20px; border-radius: 20px; display: none; font-weight: bold; animation: pulse 1s infinite; z-index: 101; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <span id="br-txt">AGUARDANDO GPS</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="shutter-zone" onclick="takePhoto()">
        <div id="btn-jpg"></div>
        <div class="label-jpg">FOTO MANUAL</div>
    </div>

    <div id="rec-status">● MONITORANDO</div>

    <div id="ui">
        <button id="start" class="btn" onclick="initSystem()">ATIVAR TELA / INICIAR</button>
        <button id="stop" class="btn" onclick="stopPDF()">SALVAR E SAIR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer=[], hDir=null, brAtual="BR-116", wakeLock=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// --- FUNÇÃO PARA NÃO APAGAR A TELA ---
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            console.log('Wake Lock ativo: a tela não vai apagar.');
        }
    } catch (err) {
        console.error(`${err.name}, ${err.message}`);
    }
}

// --- FUNÇÃO FULLSCREEN ---
function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.log(`Erro ao tentar modo tela cheia: ${err.message}`);
        });
    }
}

function drawStamp(km, br, data) {
    const h = can.height;
    const w = can.width;
    const barH = h * 0.16;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, h - barH, w, barH);
    ctx.shadowColor = "rgba(0,0,0,1)";
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = 5;
    ctx.shadowOffsetY = 5;
    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${barH * 0.4}px Arial`;
    ctx.fillText(`${br} - Km ${km}`, 50, h - (barH * 0.45));
    ctx.shadowBlur = 5;
    ctx.font = `bold ${barH * 0.2}px Arial`;
    ctx.fillStyle = "#cccccc";
    ctx.fillText(data, 50, h - (barH * 0.15));
    ctx.shadowColor = "transparent";
}

async function initSystem() {
    try {
        if(!hDir) hDir = await window.showDirectoryPicker();
        
        // Ativa Tela Cheia e Wake Lock no primeiro clique (requisito de segurança do navegador)
        toggleFullScreen();
        await requestWakeLock();
        
        await startVideo();
        loadCSV();
        initGPS();
        startPDF();
    } catch(e) { 
        alert("Necessário selecionar pasta e autorizar permissões."); 
    }
}

async function startVideo() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function takePhoto() {
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const data = new Date().toLocaleString('pt-BR');
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, brAtual, data);

    can.toBlob(async (blob) => {
        const name = `FOTO_${brAtual}_KM_${km}_${Date.now()}.jpg`.replace(/\//g, '-');
        const file = await hDir.getFileHandle(name, { create: true });
        const stream = await file.createWritable();
        await stream.write(blob);
        await stream.close();
    }, 'image/jpeg', 0.9);
}

function startPDF() {
    capturing = true;
    buffer = [];
    document.getElementById('start').style.display = 'none';
    document.getElementById('stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'block';
    loop();
}

function loop() {
    if(!capturing) return;
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const data = new Date().toLocaleString('pt-BR');
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, brAtual, data);
    buffer.push({ img: can.toDataURL('image/jpeg', 0.6), km: km });

    if(buffer.length >= 50) {
        const temp = [...buffer];
        buffer = [];
        savePDF(temp);
    }
    setTimeout(loop, 1000); // 1 segundo entre fotos para segurança e autonomia
}

async function stopPDF() {
    capturing = false;
    document.getElementById('rec-status').style.display = 'none';
    if(buffer.length > 0) await savePDF(buffer);
    
    if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
    }

    alert("Relatório salvo!");
    location.reload(); 
}

async function savePDF(lista) {
    const { jsPDF } = window.jspdf;
    const orient = can.width > can.height ? 'l' : 'p';
    const doc = new jsPDF(orient, 'px', [can.width, can.height]);

    for(let i=0; i<lista.length; i++) {
        if(i > 0) doc.addPage([can.width, can.height], orient);
        doc.addImage(lista[i].img, 'JPEG', 0, 0, can.width, can.height);
    }

    const pdfBlob = doc.output('blob');
    const name = `RELATORIO_${brAtual}_${Date.now()}.pdf`;
    const file = await hDir.getFileHandle(name, { create: true });
    const stream = await file.createWritable();
    await stream.write(pdfBlob);
    await stream.close();
}

function loadCSV() {
    fetch('SNVBR116SPRJ.csv').then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[0], lt: parseFloat(c[1].replace(',','.')), ln: parseFloat(c[2].replace(',','.')), br: c[3] || "BR-116" };
        });
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let best = null, minD = Infinity;
        kmDB.forEach(pt => {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < minD) { minD = d; best = pt; }
        });
        if(best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            document.getElementById('br-txt').innerText = best.br;
            brAtual = best.br;
        }
    }, null, { enableHighAccuracy: true });
}

// Reativa o Wake Lock se o usuário sair e voltar para a aba
document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
    }
});
</script>
</body>
</html>
