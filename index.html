<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel de Inspeção Rodoviária</title>

<style>
body{margin:0;background:#05080f;color:#e8eeff;font-family:system-ui}
#top{
  position:fixed;top:0;left:0;right:0;height:45vh;
  border-bottom:3px solid #1e40af;background:#000
}
video{width:100%;height:100%;object-fit:contain}
#panel{
  position:fixed;bottom:0;left:0;right:0;height:55vh;
  background:#0b1224;border-top:3px solid #1e40af;
  overflow:auto;padding:8px
}
.row{display:flex;gap:6px;flex-wrap:wrap}
.badge{
  background:#0f1733;border:1px solid #223;
  padding:6px 10px;border-radius:999px;
  font-weight:900;font-size:.85rem
}
button{
  padding:14px;font-size:1rem;font-weight:900;
  border-radius:12px;border:none;
}
#btnStart{background:#22c55e;color:#022}
#btnStop{background:#ef4444;color:#fff}
</style>
</head>

<body>

<div id="top">
  <video id="vid" autoplay playsinline muted></video>
</div>

<div id="panel">
  <div class="row">
    <span class="badge" id="bCam">📷 CÂMERA</span>
    <span class="badge" id="bGps">📡 GPS</span>
    <span class="badge" id="bKm">📍 KM —</span>
    <span class="badge" id="bFotos">📸 0</span>
  </div>

  <div class="row">
    <button id="btnStart">▶ INICIAR CAPTURA</button>
    <button id="btnStop" disabled>⏹ PARAR</button>
  </div>

  <div class="row">
    <span class="badge" id="bIds">IDs: —</span>
  </div>
</div>

<canvas id="can" hidden></canvas>

<script>
/* ========= UTIL ========= */
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const rad=d=>d*Math.PI/180;
function hav(a,b,c,d){
 const R=6371000;
 const dLat=rad(c-a), dLon=rad(d-b);
 const x=Math.sin(dLat/2)**2+
  Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dLon/2)**2;
 return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function fmtKm(v){
 let k=Math.floor(v),m=Math.round((v-k)*1000);
 return `KM ${k}+${String(m).padStart(3,'0')}`;
}

/* ========= CÂMERA ========= */
const vid=document.getElementById('vid');
navigator.mediaDevices.getUserMedia({
 video:{facingMode:{ideal:'environment'}},audio:false
}).then(s=>{
 vid.srcObject=s;
 document.getElementById('bCam').textContent='📷 OK';
});

/* ========= GPS ========= */
let lastPos=null;
navigator.geolocation.watchPosition(p=>{
 lastPos={lat:p.coords.latitude,lon:p.coords.longitude};
 document.getElementById('bGps').textContent='📡 OK';
},{},{enableHighAccuracy:true});

/* ========= CSV ========= */
let kms=[],ids=[];
fetch('./csv/SNVBR116.csv').then(r=>r.text()).then(t=>{
 t.split(/\r?\n/).slice(1).forEach(l=>{
  const[c,la,lo]=l.split(';');
  if(c)kms.push({km:+c,lat:+la,lon:+lo});
 });
});
fetch('./csv/IDS.csv').then(r=>r.text()).then(t=>{
 t.split(/\r?\n/).slice(1).forEach(l=>{
  const[i,la,lo]=l.split(';');
  if(i)ids.push({id:i,lat:+la,lon:+lo});
 });
});

/* ========= BUSCAS ========= */
function nearestKm(){
 let b=null,d=1e12;
 kms.forEach(p=>{
  const h=hav(p.lat,p.lon,lastPos.lat,lastPos.lon);
  if(h<d){d=h;b=p}
 });
 return b?fmtKm(b.km):'KM —';
}
function nearestIds(){
 return ids
  .map(p=>({...p,d:hav(p.lat,p.lon,lastPos.lat,lastPos.lon)}))
  .sort((a,b)=>a.d-b.d).slice(0,5)
  .map(p=>p.id).join(', ');
}

/* ========= CAPTURA ========= */
const can=document.getElementById('can');
const ctx=can.getContext('2d');
let run=false,fotos=0;

async function capture(){
 const w=vid.videoWidth,h=vid.videoHeight;
 can.width=w;can.height=h;
 ctx.drawImage(vid,0,0,w,h);

 const km=nearestKm();
 ctx.fillStyle='rgba(0,0,0,.7)';
 ctx.fillRect(0,h-120,w,120);
 ctx.fillStyle='#b7ffcf';
 ctx.font='40px system-ui';
 ctx.fillText(km,20,h-60);

 fotos++;
 document.getElementById('bFotos').textContent=`📸 ${fotos}`;
 document.getElementById('bKm').textContent=`📍 ${km}`;
 document.getElementById('bIds').textContent=
  `IDs: ${nearestIds()}`;
}

async function loop(){
 while(run){
  const t=performance.now();
  if(lastPos && kms.length) await capture();
  await sleep(Math.max(0,1000-(performance.now()-t)));
 }
}

/* ========= BOTÕES ========= */
btnStart.onclick=()=>{
 run=true;
 btnStart.disabled=true;
 btnStop.disabled=false;
 loop();
};
btnStop.onclick=()=>{
 run=false;
 btnStart.disabled=false;
 btnStop.disabled=true;
};
</script>

</body>
</html>
