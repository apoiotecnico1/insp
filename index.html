<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V20 - GUARDIAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --danger: #d00; --glass: rgba(10, 10, 10, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE SEGURANÇA E QUIZ */
        #gate-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; transition: 0.6s; overflow-y: auto; }
        .gate-box { background: #111; border: 1px solid #333; padding: 25px; border-radius: 12px; width: 100%; max-width: 480px; }
        .gate-box h2 { color: var(--accent); font-size: 16px; margin-bottom: 20px; text-transform: uppercase; text-align: center; }
        
        .quiz-item { margin-bottom: 20px; background: #1a1a1a; padding: 15px; border-radius: 8px; border-left: 4px solid #333; }
        .quiz-item.correct { border-left-color: var(--safety); }
        .quiz-item p { font-size: 13px; margin-bottom: 10px; color: #bbb; }
        .opt { display: block; margin: 8px 0; font-size: 12px; cursor: pointer; color: #888; }
        .opt input { margin-right: 10px; accent-color: var(--accent); }

        #btn-gate { width: 100%; padding: 20px; border: none; border-radius: 8px; background: #222; color: #444; font-weight: 800; text-transform: uppercase; cursor: not-allowed; transition: 0.4s; }
        #btn-gate.ready { background: var(--accent); color: #000; cursor: pointer; }

        /* HUD E CAPTURA */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { position: absolute; top: 30px; left: 30px; background: var(--safety); padding: 12px 30px; border-radius: 4px; border-left: 10px solid #fff; z-index: 10; pointer-events: none; }
        #km-hud h1 { font-size: 3rem; font-weight: 900; }

        #rec-indicator { position: absolute; top: 35px; right: 35px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; }
        .dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
        #rec-indicator span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; color: rgba(255,255,255,0.7); }
        @keyframes blink { 50% { opacity: 0; } }

        /* BOTÕES QUE SE AJUSTAM AO CENTRO */
        #action-bar { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 30px; width: 90%; max-width: 450px; 
            background: var(--glass); padding: 20px 40px; border-radius: 100px; 
            backdrop-filter: blur(10px); z-index: 100; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 1; 
        }
        #action-bar.hidden { opacity: 0; bottom: 20px; pointer-events: none; transform: translateX(-50%) scale(0.9); }
        
        .btn-main { flex: 1; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 18px; font-size: 12px; background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; }

        #settings-btn { position: absolute; bottom: 120px; right: 50px; font-size: 24px; color: #444; cursor: pointer; transition: 0.5s; }
        #settings-btn.hidden { opacity: 0; }

        canvas { display: none; }
    </style>
</head>
<body onclick="showControls()">

<div id="gate-screen">
    <div class="gate-box" id="quiz-container">
        <h2>Consciência de Segurança</h2>
        <div id="questions-area"></div>
        <button id="btn-gate" disabled onclick="handleGateClick()">Validar Respostas</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <h1 id="km-txt">Km ---+---</h1>
    </div>

    <div id="rec-indicator">
        <span>Capturando</span>
        <div class="dot"></div>
    </div>

    <div id="settings-btn" onclick="toggleSet()">⚙</div>

    <div id="action-bar">
        <button id="btn-action" class="btn-main" onclick="startRec()">Iniciar</button>
        <button id="btn-stop" class="btn-main" style="display:none;" onclick="stopRec()">Concluir</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], gps=null, rec=false, buffer=[], total=0, hDir=null, currentStream=null, hideTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

const pool = [
    { q: "Uso de celular ao volante é permitido?", a: "Nunca, apenas no suporte e sem toque manual.", o: ["Apenas em retas", "Nunca, apenas no suporte e sem toque manual.", "Sim, com uma mão"] },
    { q: "Qual a distância segura do veículo à frente?", a: "No mínimo 2 segundos de tempo.", o: ["Colado para ver melhor", "No mínimo 2 segundos de tempo.", "10 metros fixos"] },
    { q: "Ao caminhar na rodovia, qual EPI é vital?", a: "Colete Refletivo.", o: ["Apenas boné", "Colete Refletivo.", "Luvas de couro"] },
    { q: "Sua atenção principal deve estar em:", a: "Na via e no tráfego ao redor.", o: ["No Km da tela", "Na via e no tráfego ao redor.", "No rádio"] },
    { q: "Ao notar neblina forte, você deve:", a: "Reduzir e buscar local seguro.", o: ["Aumentar a luz alta", "Reduzir e buscar local seguro.", "Parar no acostamento"] }
];

function initQuiz() {
    const area = document.getElementById('questions-area');
    const shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 4);
    area.innerHTML = shuffled.map((item, i) => `
        <div class="quiz-item" id="q${i}">
            <p>${item.q}</p>
            ${item.o.map(opt => `<label class="opt"><input type="radio" name="r${i}" value="${opt}" onchange="checkQuiz()"> ${opt}</label>`).join('')}
        </div>
    `).join('');
    window.currentQuestions = shuffled;
}

function checkQuiz() {
    const btn = document.getElementById('btn-gate');
    let corrects = 0;
    window.currentQuestions.forEach((item, i) => {
        const sel = document.querySelector(`input[name="r${i}"]:checked`);
        if(sel && sel.value === item.a) {
            corrects++;
            document.getElementById(`q${i}`).classList.add('correct');
        }
    });
    if(corrects === window.currentQuestions.length) {
        btn.disabled = false;
        btn.classList.add('ready');
    }
}

async function handleGateClick() {
    const btn = document.getElementById('btn-gate');
    if(btn.innerText === "VALIDAR RESPOSTAS") {
        btn.innerText = "DEFINIR PASTA DE DESTINO";
        return;
    }
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('gate-screen').remove();
            document.getElementById('app-shell').style.visibility = 'visible';
            document.getElementById('app-shell').style.opacity = '1';
            listCams();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }, 600);
    } catch(e) {}
}

function showControls() {
    document.getElementById('action-bar').classList.remove('hidden');
    document.getElementById('settings-btn').classList.remove('hidden');
    clearTimeout(hideTimer);
    if(rec) {
        hideTimer = setTimeout(() => {
            document.getElementById('action-bar').classList.add('hidden');
            document.getElementById('settings-btn').classList.add('hidden');
        }, 5000);
    }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const backCam = videoDevices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('traseira')) || videoDevices;
    initC(backCam.deviceId);
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

async function startRec() {
    rec = true;
    document.getElementById('btn-action').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-indicator').style.opacity = '1';
    showControls();
    loop();
}

function stopRec() {
    rec = false;
    save();
    document.getElementById('btn-action').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.45), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            ts: new Date().toLocaleString('pt-BR').toUpperCase() 
        });
        if(buffer.length >= 50) save();
    }
    setTimeout(loop, 200);
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = [];
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`LOTE_${Date.now()}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function drawS(m) {
    const w = can.width, h = can.height, barH = h * 0.16;
    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, h-barH, w, barH);
    ctx.fillStyle = "#fff"; ctx.font = `900 ${barH * 0.4}px Inter`;
    ctx.fillText("Km " + m.km, 60, h-(barH*0.5));
    ctx.font = `300 ${barH * 0.18}px Inter`;
    ctx.fillText(m.ts, 60, h-(barH*0.25));
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
}

function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
window.onload = () => { initQuiz(); loadCSV(); initG(); };
</script>
</body>
</html>
