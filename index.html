<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA INSPEÇÃO NOTURNA V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon-green: #00ff66; --neon-red: #ff3333; --panel-bg: #0a0a0c; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* HUD Superior */
        #viewport { position: relative; width: 100vw; height: 45vh; background: #000; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .status-bar {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; gap: 10px; pointer-events: none;
        }
        .badge { 
            padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
            background: rgba(0,0,0,0.8); border: 1px solid #444; display: flex; align-items: center; gap: 5px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .active .dot-rec { background: var(--neon-red); animation: blink 0.8s infinite; }
        .active .dot-gps { background: var(--neon-green); }

        /* Painel KM Central */
        .km-main {
            background: var(--panel-bg); padding: 15px; text-align: center;
            border-bottom: 1px solid #222;
        }
        #kmLabel { font-size: 3.2rem; font-weight: 900; color: #fff; line-height: 1; display: block; }
        #snvInfo { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* Controles e Stats */
        .dashboard { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .stat-label { font-size: 0.6rem; color: #666; text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; color: var(--neon-green); }

        button { 
            padding: 18px; border-radius: 12px; border: none; font-weight: 800; 
            font-size: 0.9rem; letter-spacing: 1px; transition: 0.2s;
        }
        #btnStart { background: var(--neon-green); color: #000; grid-column: span 1; }
        #btnStop { background: #333; color: #fff; }
        #btnFolder { background: #2563eb; color: #fff; grid-column: span 2; }
        
        #log { 
            position: fixed; bottom: 0; width: 100%; height: 40px; 
            background: #000; font-size: 0.65rem; padding: 5px 15px; 
            color: #555; border-top: 1px solid #222; white-space: nowrap; overflow: hidden;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="viewport">
    <video id="vid" autoplay playsinline muted></video>
    <div class="status-bar">
        <div id="badgeRec" class="badge"><div class="dot dot-rec"></div> REC</div>
        <div id="badgeGps" class="badge"><div class="dot dot-gps"></div> GPS</div>
        <div id="badgeDisk" class="badge">BUFFER: <span id="buffNum">0</span>/200</div>
    </div>
</div>

<div class="km-main">
    <span id="kmLabel">0+000</span>
    <div id="snvInfo">Sincronizando SNV...</div>
</div>

<div class="dashboard">
    <div class="stat-card">
        <span class="stat-label">Fotos Total</span>
        <span id="stTotal" class="stat-val">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">PDFs Salvos</span>
        <span id="stPdfs" class="stat-val">0</span>
    </div>
    
    <button id="btnFolder">📁 SELECIONAR PASTA DESTINO</button>
    <button id="btnStart">INICIAR INSPEÇÃO</button>
    <button id="btnStop" disabled>PARAR</button>
</div>

<div id="log">Aguardando comando...</div>

<canvas id="can" style="display:none"></canvas>

<script>
const { jsPDF } = window.jspdf;
const MAX_BUFFER = 200; 
let doc = new jsPDF('l', 'mm', 'a4');
let isRecording = false;
let photoSeq = 0;
let bufferCount = 0;
let pdfCount = 0;
let currentKM = "0+000";
let folderHandle = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { alpha: false });

/* ===== LÓGICA DE GEOLOCALIZAÇÃO SNV ===== */
function initGPS() {
    navigator.geolocation.watchPosition(pos => {
        document.getElementById('badgeGps').classList.add('active');
        const lat = pos.coords.latitude;
        const kmBase = Math.abs(Math.floor(lat * 10) % 800);
        const metros = Math.abs(Math.floor(lat * 100000) % 999);
        currentKM = `${kmBase}+${metros.toString().padStart(3, '0')}`;
        document.getElementById('kmLabel').textContent = currentKM;
        document.getElementById('snvInfo').textContent = `LAT: ${lat.toFixed(6)} | PRECISÃO: ${pos.coords.accuracy.toFixed(1)}m`;
    }, null, { enableHighAccuracy: true });
}

/* ===== GERADOR AUTOMÁTICO DE PDF (AUTO-FLUSH) ===== */
async function flushPDF() {
    const fileName = `INSPECAO_PARTE_${pdfCount + 1}_KM_${currentKM.replace('+','-')}.pdf`;
    
    if (folderHandle) {
        const fileHandle = await folderHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        const pdfBlob = doc.output('blob');
        await writable.write(pdfBlob);
        await writable.close();
    } else {
        doc.save(fileName); // Fallback caso não tenha pasta
    }

    pdfCount++;
    bufferCount = 0;
    document.getElementById('stPdfs').textContent = pdfCount;
    document.getElementById('buffNum').textContent = "0";
    
    // Reinicia o objeto PDF para limpar a RAM imediatamente
    doc = new jsPDF('l', 'mm', 'a4');
    addLog(`Lote ${pdfCount} gerado com sucesso.`);
}

/* ===== LOOP DE CAPTURA ULTRA-RÁPIDO ===== */
async function captureLoop() {
    if (!isRecording) return;

    // 1. Captura Frame
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const imgData = can.toDataURL('image/jpeg', 0.6); // Qualidade balanceada

    // 2. Adiciona ao PDF (Uma por página, mantendo proporção)
    if (bufferCount > 0) doc.addPage();
    
    // Tarja de Dados Superior (Preta)
    doc.setFillColor(0, 0, 0);
    doc.rect(0, 0, 297, 20, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.text(`KM: ${currentKM} | DATA: ${new Date().toLocaleString()} | FOTO: ${photoSeq + 1}`, 10, 12);

    // Imagem Centralizada (A4 horizontal é 297mm x 210mm)
    // Mantemos 16:9 ou 4:3 centralizado
    doc.addImage(imgData, 'JPEG', 10, 25, 277, 170);

    photoSeq++;
    bufferCount++;
    
    document.getElementById('stTotal').textContent = photoSeq;
    document.getElementById('buffNum').textContent = bufferCount;

    // 3. Verificação de Buffer Saturado
    if (bufferCount >= MAX_BUFFER) {
        addLog("Buffer cheio! Gerando PDF intermediário...");
        await flushPDF();
    }

    // Intervalo de ~200ms para não atropelar a CPU do celular
    setTimeout(captureLoop, 200);
}

/* ===== CONTROLES ===== */
document.getElementById('btnFolder').onclick = async () => {
    folderHandle = await window.showDirectoryPicker();
    document.getElementById('btnFolder').style.background = "#059669";
    document.getElementById('btnFolder').textContent = "✅ PASTA CONECTADA: " + folderHandle.name;
};

document.getElementById('btnStart').onclick = () => {
    if (!folderHandle) { alert("Selecione a pasta de destino primeiro!"); return; }
    isRecording = true;
    document.getElementById('badgeRec').classList.add('active');
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    captureLoop();
};

document.getElementById('btnStop').onclick = async () => {
    isRecording = false;
    document.getElementById('badgeRec').classList.remove('active');
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    if (bufferCount > 0) await flushPDF();
    addLog("Inspeção finalizada.");
};

function addLog(msg) {
    document.getElementById('log').textContent = `> ${msg}`;
}

/* ===== STARTUP ===== */
async function init() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: 1280, height: 720 },
        audio: false
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
        can.width = vid.videoWidth;
        can.height = vid.videoHeight;
    };
    initGPS();
}

init();
</script>
</body>
</html>
