<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INSPEÇÃO PRO V5 - MODO ENGENHARIA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --accent:#00d9ff; --gold:#ffd700; }
body{margin:0;background:#000;color:#fff;font-family:Segoe UI,Roboto,sans-serif;height:100vh;overflow:hidden}
#viewport{height:42vh;background:#000}
video{width:100%;height:100%;object-fit:cover}
#controls{background:#050a16;overflow:auto;height:58vh}
#kmPlaque{margin:10px;padding:10px;background:#056b3c;font-size:2.5rem;text-align:center;border-radius:10px}
.status-bar{display:flex;justify-content:space-around;font-size:.7rem}
.st{border:1px solid #444;padding:4px 8px;border-radius:10px}
.ok{color:#00ff66;border-color:#00ff66}
.dashboard{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px}
.card{background:#111;border-radius:8px;padding:10px;text-align:center}
.val{color:var(--accent);font-size:1.2rem;font-weight:bold}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
button{padding:15px;border:none;border-radius:10px;font-weight:800}
#dirSelector{grid-column:span 2;background:var(--gold);color:#000}
#dirSelector.ready{background:#00ff66}
#btnStart{background:#00ff66}
#btnStop{background:#ff3333;color:#fff}
canvas{display:none}
</style>
</head>

<body>

<div id="viewport">
    <video id="vid" autoplay playsinline muted></video>
</div>

<div id="controls">
    <div id="kmPlaque">KM --+---</div>

    <div class="status-bar">
        <div id="stCsv" class="st">CSV: ...</div>
        <div id="stGps" class="st">GPS: ...</div>
    </div>

    <div class="dashboard">
        <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
        <div class="card">LOTE<span id="txtBuffer" class="val">0/200</span></div>
        <div class="card">PDF<span id="txtPdfs" class="val">0</span></div>
    </div>

    <!-- SELETOR DE CAMERA REAL -->
    <div style="padding:10px">
        <select id="cfgCam" onchange="initCamera()" style="width:100%"></select>
    </div>

    <div class="btn-row">
        <button id="dirSelector">1. DEFINIR PASTA</button>
        <button id="btnStart" disabled>2. INICIAR</button>
        <button id="btnStop" disabled>PARAR</button>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let directoryHandle=null,isRecording=false;
let photoCount=0,pdfCount=0,buffer=[];
const vid=document.getElementById("vid");
const can=document.getElementById("can");
const ctx=can.getContext("2d");

/* ===== CAMERAS DISPONÍVEIS ===== */
async function loadCameras(){
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d=>d.kind==="videoinput");
    const sel=document.getElementById("cfgCam");
    sel.innerHTML="";
    cams.forEach((c,i)=>{
        const o=document.createElement("option");
        o.value=c.deviceId;
        o.textContent=c.label||`Câmera ${i+1}`;
        sel.appendChild(o);
    });
}

/* ===== INIT CAMERA ===== */
async function initCamera(){
    const id=document.getElementById("cfgCam").value;
    if(vid.srcObject)
        vid.srcObject.getTracks().forEach(t=>t.stop());

    const s=await navigator.mediaDevices.getUserMedia({
        video:{deviceId:{exact:id},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    vid.srcObject=s;
    vid.onloadedmetadata=_=>{can.width=vid.videoWidth;can.height=vid.videoHeight}
}

/* ===== SELECIONAR PASTA ===== */
document.getElementById("dirSelector").onclick=async()=>{
    try{
        directoryHandle=await window.showDirectoryPicker({mode:"readwrite"});
        document.getElementById("dirSelector").classList.add("ready");
        document.getElementById("dirSelector").textContent="PASTA OK ✓";
        document.getElementById("btnStart").disabled=false;
    }catch{}
};

/* ===== CAPTURA ===== */
function loop(){
    if(!isRecording)return;
    ctx.drawImage(vid,0,0,can.width,can.height);
    buffer.push(can.toDataURL("image/jpeg",0.6));
    photoCount++;
    document.getElementById("txtTotal").textContent=photoCount;
    document.getElementById("txtBuffer").textContent=`${buffer.length}/200`;
    if(buffer.length>=200) savePDF();
    setTimeout(loop,200);
}

/* ===== PDF SEM ESTICAR ===== */
async function savePDF(){
    if(!buffer.length)return;
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF("l","mm","a4");
    buffer.forEach((img,i)=>{
        if(i)doc.addPage();

        const pageW=297,pageH=210;
        const imgRatio=can.width/can.height;
        const pageRatio=pageW/pageH;
        let w,h,x,y;

        if(imgRatio>pageRatio){
            w=pageW;h=pageW/imgRatio;x=0;y=(pageH-h)/2;
        }else{
            h=pageH;w=pageH*imgRatio;y=0;x=(pageW-w)/2;
        }
        doc.addImage(img,"JPEG",x,y,w,h);
    });

    pdfCount++;buffer=[];
    document.getElementById("txtPdfs").textContent=pdfCount;

    const fh=await directoryHandle.getFileHandle(`LOTE_${pdfCount}.pdf`,{create:true});
    const w=await fh.createWritable();
    await w.write(doc.output("blob"));
    await w.close();
}

/* ===== START / STOP ===== */
document.getElementById("btnStart").onclick=()=>{
    if(!directoryHandle){alert("Defina a pasta");return}
    isRecording=true;
    loop();
    document.getElementById("btnStart").disabled=true;
    document.getElementById("btnStop").disabled=false;
};
document.getElementById("btnStop").onclick=()=>{
    isRecording=false;
    savePDF();
    document.getElementById("btnStart").disabled=false;
    document.getElementById("btnStop").disabled=true;
};

/* ===== INIT ===== */
navigator.mediaDevices.getUserMedia({video:true}).then(()=>{
    loadCameras().then(initCamera);
});
</script>

</body>
</html>
