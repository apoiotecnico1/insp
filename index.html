<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6.5 - 50 OPTIONS EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00d9ff; --dark-bg: #000; --panel-bg: rgba(10, 15, 25, 0.98); }
        body { margin: 0; background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; width: 100vw; height: 60vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 100;
            background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; 
            padding: 10px 20px; font-size: 2rem; font-weight: 900; border: 4px solid #fff;
            border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            white-space: nowrap; width: max-content;
        }

        /* PAINEL DE 50 OPÇÕES */
        #settings-panel { 
            position: fixed; top: 0; right: -100%; width: 92%; height: 100%; 
            background: var(--panel-bg); z-index: 2000; transition: 0.4s; 
            padding: 15px; overflow-y: auto; border-left: 2px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .tab-nav { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .tab-btn { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 8px 12px; border-radius: 6px; font-size: 0.65rem; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .group { margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid #222; }
        .group h4 { margin: 0 0 10px 0; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-size: 0.7rem; margin-bottom: 4px; color: #aaa; }
        input, select { width: 100%; padding: 8px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; margin-bottom: 10px; font-size: 0.85rem; }
        input[type="range"] { accent-color: var(--accent); height: 4px; }

        /* DASHBOARD INFERIOR */
        #controls { flex-grow: 1; background: #000; display: flex; flex-direction: column; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #222; }
        .card { background: #000; padding: 12px 2px; text-align: center; }
        .card label { font-size: 0.55rem; color: #555; }
        .val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; }
        button.main-action { border: none; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }

        .icon-top { position: absolute; top: 15px; right: 15px; z-index: 1500; background: rgba(0,0,0,0.6); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; font-size: 20px; }
    </style>
</head>
<body>

<div class="icon-top" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h3 style="margin: 5px 0 15px 5px; color:var(--accent)">MENU ENGENHARIA V6.5</h3>
    
    <div class="tab-nav">
        <button class="tab-btn active" onclick="openTab(event, 't1')">CAPTURA (1-8)</button>
        <button class="tab-btn" onclick="openTab(event, 't2')">IMAGEM (9-16)</button>
        <button class="tab-btn" onclick="openTab(event, 't3')">PDF (17-25)</button>
        <button class="tab-btn" onclick="openTab(event, 't4')">DADOS (26-34)</button>
        <button class="tab-btn" onclick="openTab(event, 't5')">HARDWARE (35-42)</button>
        <button class="tab-btn" onclick="openTab(event, 't6')">INTERFACE (43-50)</button>
    </div>

    <div id="t1" class="tab-content active">
        <div class="group">
            <h4>Timing e Frequência</h4>
            <label>1. Intervalo entre fotos (ms)</label><input type="number" id="c1" value="200">
            <label>2. Fotos por lote PDF</label><input type="number" id="c2" value="200">
            <label>3. Delay inicial (s)</label><input type="range" min="0" max="10" value="0">
            <label>4. Modo Burst (Fotos rápidas)</label><select><option>Desativado</option><option>3 Fotos/s</option></select>
            <label>5. Auto-stop após X fotos</label><input type="number" placeholder="Opcional">
            <label>6. Timer regressivo visível</label><select><option>Sim</option><option>Não</option></select>
            <label>7. Prioridade de FPS</label><input type="range">
            <label>8. Estabilização de captura</label><select><option>Suave</option><option>Rígida</option></select>
        </div>
    </div>

    <div id="t2" class="tab-content">
        <div class="group">
            <h4>Processamento Digital</h4>
            <label>9. Brilho Noturno</label><input type="range" id="cBr" min="50" max="250" value="100" oninput="applyF()">
            <label>10. Contraste de Pista</label><input type="range" id="cCt" min="50" max="200" value="100" oninput="applyF()">
            <label>11. Saturação</label><input type="range" id="cSt" min="0" max="200" value="100" oninput="applyF()">
            <label>12. Filtro HDR Simulado</label><input type="range">
            <label>13. Sharpen (Nitidez)</label><input type="range">
            <label>14. Redução de ruído ISO</label><select><option>Baixa</option><option>Alta</option></select>
            <label>15. Balanço de Branco</label><select><option>Auto</option><option>Luz do Dia</option><option>Nublado</option></select>
            <label>16. Anti-Flicker (50/60Hz)</label><select><option>60Hz</option><option>50Hz</option></select>
        </div>
    </div>

    <div id="t3" class="tab-content">
        <div class="group">
            <h4>Configuração do Relatório</h4>
            <label>17. Qualidade do JPEG (0-100)</label><input type="number" value="70">
            <label>18. Prefixo do arquivo</label><input type="text" id="pdfPrefix" value="INSP_KM">
            <label>19. Orientação da Página</label><select><option>Paisagem</option><option>Retrato</option></select>
            <label>20. Tamanho do KM no PDF</label><input type="range" min="40" max="120" value="80">
            <label>21. Incluir Data/Hora</label><select><option>Sim</option><option>Não</option></select>
            <label>22. Incluir Coordenadas</label><select><option>Sim</option><option>Não</option></select>
            <label>23. Rodapé Personalizado</label><input type="text" placeholder="Nome da Empresa">
            <label>24. Margens da Foto (mm)</label><input type="number" value="0">
            <label>25. Senha no PDF (Opcional)</label><input type="password">
        </div>
    </div>

    <div id="t4" class="tab-content">
        <div class="group">
            <h4>Geolocalização e CSV</h4>
            <label>26. Precisão GPS (Metros)</label><input type="number" value="5">
            <label>27. Timeout de GPS (ms)</label><input type="number" value="5000">
            <label>28. Separador CSV</label><select><option>;</option><option>,</option></select>
            <label>29. Log de Erros</label><select><option>Ativar</option><option>Desativar</option></select>
            <label>30. Fuso Horário</label><select><option>Brasília (-3)</option></select>
            <label>31. Backup em Cache</label><select><option>Ativar</option></select>
            <label>32. Formato de Coordenadas</label><select><option>Decimal</option><option>DMS</option></select>
            <label>33. Auto-recarregar CSV</label><input type="checkbox">
            <label>34. Distância de busca KM (m)</label><input type="number" value="50">
        </div>
    </div>

    <div id="t5" class="tab-content">
        <div class="group">
            <h4>Controle de Sensores</h4>
            <label>35. Seleção de Lente</label><select id="cfgCam" onchange="switchCamera()"></select>
            <label>36. Lanterna/Flash</label><button onclick="toggleTorch()">LIGAR/DESLIGAR</button>
            <label>37. Zoom Digital</label><input type="range" min="1" max="5" value="1">
            <label>38. Foco Fixo (Infinito)</label><input type="checkbox">
            <label>39. Exposição Travada</label><input type="checkbox">
            <label>40. Resolução Nativa</label><select><option>1080p</option><option>720p</option></select>
            <label>41. Modo Economia de Bateria</label><input type="checkbox">
            <label>42. Som de Obturador</label><input type="checkbox" checked>
        </div>
    </div>

    <div id="t6" class="tab-content">
        <div class="group">
            <h4>Visualização</h4>
            <label>43. Cor da Placa KM</label><input type="color" value="#056b3c">
            <label>44. Transparência Placa</label><input type="range">
            <label>45. Posicionamento KM</label><select><option>Centro</option><option>Esquerda</option><option>Direita</option></select>
            <label>46. Grid de Alinhamento</label><input type="checkbox">
            <label>47. Tema do App</label><select><option>Dark Industrial</option><option>High Contrast</option></select>
            <label>48. Tamanho do Timer</label><input type="range">
            <label>49. Notificações de Lote</label><input type="checkbox" checked>
            <label>50. Reset de Fábrica</label><button style="background:red">RESETAR TUDO</button>
        </div>
    </div>

    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:var(--accent); border:none; color:#000; font-weight:bold; border-radius:10px; margin-top:10px">SALVAR CONFIGURAÇÕES</button>
</div>

<div id="main-container" style="flex-grow:1; display:flex; flex-direction:column">
    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div style="display:flex; justify-content:space-around; background:#111; padding:6px; font-size:0.6rem; color:#888; border-bottom:1px solid #222">
            <span id="stCsv">CSV: ...</span> <span id="stGps">GPS: ...</span> <span id="txtTimer" style="color:var(--accent)">00:00</span>
        </div>
        
        <div class="dashboard">
            <div class="card"><label>TOTAL FOTOS</label><span id="txtTotal" class="val">0</span></div>
            <div class="card"><label>LOTE ATUAL</label><span id="txtBuffer" class="val">0</span></div>
            <div class="card"><label>ARQUIVOS</label><span id="txtPdfs" class="val">0</span></div>
            <div class="card" onclick="takeSinglePhoto()" style="background:#1a1a1a; cursor:pointer"><span style="font-size:1.2rem">📸</span><label style="color:var(--accent); display:block">AVULSA</label></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="main-action">INICIAR</button>
            <button id="btnStop" class="main-action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [], startTime = 0, timerInterval;
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

function openTab(evt, tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
}

async function scanCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('cfgCam');
    videoDevices.forEach((device, index) => {
        const opt = document.createElement('option');
        opt.value = device.deviceId;
        opt.text = device.label || `Lente ${index + 1}`;
        select.appendChild(opt);
    });
    if (videoDevices.length > 0) switchCamera();
}

async function switchCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: { exact: document.getElementById('cfgCam').value }, width: 1920, height: 1080 } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function applyF() {
    vid.style.filter = `brightness(${document.getElementById('cBr').value}%) contrast(${document.getElementById('cCt').value}%) saturate(${document.getElementById('cSt').value}%)`;
}

async function checkFolder() {
    if (directoryHandle) return true;
    try { directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); return true; } 
    catch (e) { return false; }
}

async function savePDF(manualBuffer = null) {
    const buffer = manualBuffer || activeBuffer;
    if(!buffer.length) return;
    if(!manualBuffer) activeBuffer = []; 

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<buffer.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.filter = vid.style.filter;
                ctx.drawImage(img, 0, 0);
                ctx.font = `bold 70px Arial Black`;
                ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 4;
                ctx.strokeText("KM " + buffer[i].km, 50, can.height - 150);
                ctx.fillText("KM " + buffer[i].km, 50, can.height - 150);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = buffer[i].img;
        });
        URL.revokeObjectURL(buffer[i].img);
    }

    const name = `${document.getElementById('pdfPrefix').value}_${Date.now()}.pdf`;
    const file = await directoryHandle.getFileHandle(name, { create: true });
    const writable = await file.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
    if(!manualBuffer) { pdfCount++; document.getElementById('txtPdfs').textContent = pdfCount; }
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        ts: new Date().toLocaleString()
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;
    if(activeBuffer.length >= parseInt(document.getElementById('c2').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('c1').value));
}

async function takeSinglePhoto() {
    if(await checkFolder()) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        const snap = [{ img: can.toDataURL('image/jpeg', 0.8), km: document.getElementById('kmPlaque').textContent.replace('KM ', '') }];
        savePDF(snap);
    }
}

document.getElementById('btnStart').onclick = async () => {
    if(await checkFolder()) {
        isRecording = true; startTime = Date.now();
        timerInterval = setInterval(() => {
            const d = new Date(Date.now() - startTime);
            document.getElementById('txtTimer').textContent = d.toISOString().substr(14, 5);
        }, 1000);
        captureLoop();
        document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
    }
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false; clearInterval(timerInterval);
    savePDF();
    document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true;
};

async function loadCSV(){
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const l = t.split(/\r?\n/).filter(x => x.trim() !== '');
        l.shift();
        kmDataset = l.map(row => {
            const c = row.split(';');
            return { km: c.trim(), lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(p => !isNaN(p.lat));
        document.getElementById('stCsv').textContent = "CSV: OK";
    } catch(e) { document.getElementById('stCsv').textContent = "CSV: ERRO"; }
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    if(kmDataset.length) {
        let best = kmDataset, bd = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < bd) { bd = d; best = pt; }
        });
        document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

scanCameras(); loadCSV();
</script>
</body>
</html>
