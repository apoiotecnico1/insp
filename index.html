<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Relatório SNV – GPS Precision</title>
<style>
:root { --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --bg: #030712; }
body { margin: 0; background: var(--bg); color: #f3f4f6; font-family: 'Segoe UI', Roboto, sans-serif; padding: 10px; }

/* Dashboard UI */
#camCard { 
    position: sticky; top: 0; width: 100%; height: 32vh; 
    background: #000; border-radius: 16px; overflow: hidden; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10;
}
video { width: 100%; height: 100%; object-fit: cover; }

.km-display {
    background: linear-gradient(145deg, #1e3a8a, #1e40af);
    border: 3px solid #fff; border-radius: 12px;
    padding: 12px; margin: 15px 0; text-align: center;
}
#kmLabel { font-size: 2rem; font-weight: 900; display: block; letter-spacing: -1px; }
#coords { font-size: 0.75rem; color: #93c5fd; font-family: monospace; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px; }

button {
    width: 100%; padding: 16px; border-radius: 10px; border: 0;
    font-weight: 800; text-transform: uppercase; cursor: pointer;
    transition: transform 0.1s;
}
button:active { transform: scale(0.96); }
#btnFolder { background: var(--primary); color: #fff; grid-column: span 2; }
#btnStart { background: var(--success); color: #fff; }
#btnStop { background: var(--danger); color: #fff; }
#btnReport { background: #6366f1; color: #fff; grid-column: span 2; }

.log-area { 
    background: #000; height: 120px; overflow-y: auto; 
    font-size: 0.7rem; padding: 8px; border-radius: 8px; color: #10b981;
}
.stat-val { color: var(--primary); font-weight: bold; }
</style>
</head>
<body>

<div id="camCard">
    <video id="vid" autoplay playsinline muted></video>
</div>

<div class="km-display">
    <span id="kmLabel">AGUARDANDO GPS...</span>
    <div id="coords">Lat: 0.000000 | Lon: 0.000000</div>
</div>

<div class="grid">
    <button id="btnFolder">📁 Definir Pasta de Campo</button>
    <button id="btnStart">▶️ Iniciar</button>
    <button id="btnStop" disabled>⏹️ Parar</button>
    <button id="btnReport">📄 Gerar Log de Fotos</button>
</div>

<div class="card">
    <div style="display:flex; justify-content: space-between; margin-bottom: 5px;">
        <span>Fotos: <span id="count" class="stat-val">0</span></span>
        <span>Precisão: <span id="acc" class="stat-val">---</span></span>
    </div>
    <div id="log" class="log-area"></div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let folder = null;
let active = false;
let photoCount = 0;
let lastKM = "0+000";
let currentCoords = { lat: 0, lon: 0 };
let reportData = "RELATÓRIO DE CAMPO - SNV\nSeq;Hora;KM;Lat;Lon\n";

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { desynchronized: true, alpha: false });

/* ===== GPS & LÓGICA SNV ===== */
function updateGPS() {
    navigator.geolocation.watchPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const accuracy = pos.coords.accuracy;
        
        currentCoords = { lat, lon };
        document.getElementById('coords').textContent = `Lat: ${lat.toFixed(6)} | Lon: ${lon.toFixed(6)}`;
        document.getElementById('acc').textContent = accuracy.toFixed(1) + 'm';

        // Lógica SNV Simplificada (Pode ser ajustada para sua rodovia específica)
        // Aqui simulamos o KM baseada na oscilação da Latitude para fins de teste
        // Em uso real, você integraria sua API de KM/Estaqueamento aqui.
        const kmBase = Math.abs(Math.floor(lat * 10) % 999);
        const metros = Math.abs(Math.floor(lat * 10000) % 999);
        lastKM = `${kmBase}+${metros.toString().padStart(3, '0')}`;
        document.getElementById('kmLabel').textContent = `KM ${lastKM}`;
        
    }, (err) => { console.error(err); }, { enableHighAccuracy: true });
}

/* ===== CAPTURA GARANTIDA (PRO) ===== */
async function capture() {
    if (!active || !folder) return;

    try {
        photoCount++;
        const now = new Date().toLocaleTimeString();
        
        // Renderização ultra-rápida
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        const blob = await new Promise(r => can.toBlob(r, 'image/jpeg', 0.8));
        const fileName = `IMG_${photoCount.toString().padStart(5,'0')}_KM_${lastKM.replace('+','-')}.jpg`;
        
        const fileHandle = await folder.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();

        // Alimenta o Relatório
        reportData += `${photoCount};${now};${lastKM};${currentCoords.lat};${currentCoords.lon}\n`;
        
        document.getElementById('count').textContent = photoCount;
        const l = document.createElement('div');
        l.textContent = `[${now}] ${fileName} salvo.`;
        const log = document.getElementById('log');
        log.prepend(l);
        if(log.children.length > 30) log.lastChild.remove();

    } catch (e) {
        console.error("Frame drop protection triggered", e);
    }

    if(active) setTimeout(capture, 1500); // Intervalo de 1.5s para garantir escrita em disco
}

/* ===== HANDLERS ===== */
document.getElementById('btnFolder').onclick = async () => {
    folder = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btnFolder').textContent = "📁 Pasta: " + folder.name;
    document.getElementById('btnFolder').style.background = "#16a34a";
};

document.getElementById('btnStart').onclick = () => {
    if(!folder) return alert("Selecione a pasta primeiro!");
    active = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    capture();
};

document.getElementById('btnStop').onclick = () => {
    active = false;
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
};

document.getElementById('btnReport').onclick = async () => {
    if(!folder) return;
    const reportHandle = await folder.getFileHandle('RELATORIO_CAMPO.csv', { create: true });
    const writable = await reportHandle.createWritable();
    await writable.write(reportData);
    await writable.close();
    alert("Relatório CSV gerado dentro da pasta de fotos!");
};

/* ===== INIT ===== */
async function init() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment', width: 1280, height: 720 }, 
        audio: false 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
        can.width = vid.videoWidth;
        can.height = vid.videoHeight;
    };
    updateGPS();
}

init();
</script>
</body>
</html>
