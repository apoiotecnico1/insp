<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angstrom - High Performance Technical Support</title>
    <style>
        :root {
            --angstrom-gold: #d4af37;
            --deep-space: #0b0e14;
            --tech-card: #161b22;
            --success-glow: #00ff88;
            --text-main: #e6edf3;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--deep-space); color: var(--text-main); margin: 0; padding: 10px; }
        .app-wrapper { max-width: 1100px; margin: auto; }
        
        /* Header Executivo */
        .header-ceo { 
            background: linear-gradient(145deg, #1c2128, #0d1117); 
            border: 1px solid var(--angstrom-gold); 
            padding: 25px; border-radius: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; justify-content: space-between; align-items: center;
        }
        .rank-indicator { text-align: right; border-left: 2px solid var(--angstrom-gold); padding-left: 15px; }
        .rank-text { color: var(--angstrom-gold); font-weight: 800; font-size: 0.75em; letter-spacing: 2px; text-transform: uppercase; }

        /* Dashboard de Entrada */
        .input-panel { background: var(--tech-card); padding: 25px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        .km-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        input, select, textarea { 
            width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; 
            padding: 14px; border-radius: 10px; font-size: 1em; transition: 0.3s;
        }
        input:focus { border-color: var(--angstrom-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        /* Voz e Comando */
        .voice-section { text-align: center; margin: 15px 0; }
        .voice-trigger { 
            background: #f85149; border: none; width: 65px; height: 65px; border-radius: 50%; 
            cursor: pointer; box-shadow: 0 0 20px rgba(248, 81, 73, 0.3); transition: 0.3s;
        }
        .voice-trigger.active { background: var(--success-glow); transform: scale(1.1); box-shadow: 0 0 30px var(--success-glow); }

        /* Categorias Massivas (Botões de Alta Performance) */
        .category-scroll { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 12px; height: 350px; overflow-y: auto; padding: 15px;
            background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid #30363d;
        }
        .btn-elite { 
            background: #21262d; border: 1px solid #363f4a; color: #8b949e; 
            padding: 15px; border-radius: 8px; cursor: pointer; text-align: left;
            transition: 0.2s; font-size: 0.85em; display: flex; flex-direction: column;
        }
        .btn-elite:hover { border-color: var(--angstrom-gold); color: white; background: #30363d; }
        .btn-elite b { color: var(--angstrom-gold); margin-bottom: 4px; }

        /* Tabela de Inteligência */
        .log-table { width: 100%; border-collapse: collapse; margin-top: 25px; border-radius: 10px; overflow: hidden; }
        .log-table th { background: #161b22; color: var(--angstrom-gold); padding: 15px; text-align: left; font-size: 0.8em; text-transform: uppercase; }
        .log-table td { background: #0d1117; padding: 15px; border-bottom: 1px solid #21262d; font-size: 0.9em; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; background: rgba(0,255,136,0.1); color: var(--success-glow); }

        /* Botões de Ação Final */
        .footer-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-final { padding: 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-save { background: var(--angstrom-gold); color: black; }
        .btn-wa { background: #238636; color: white; }
        .btn-csv { background: #30363d; color: white; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header-ceo">
        <div>
            <h1 style="margin:0; letter-spacing: -1px; color: var(--angstrom-gold);">ANGSTROM PRECISION</h1>
            <p id="date-info" style="margin:5px 0; opacity: 0.6; font-size: 0.8em;"></p>
        </div>
        <div class="rank-indicator">
            <div class="rank-text" id="userRank">Especialista de Apoio Técnico</div>
            <div style="font-size: 1.2em; font-weight: bold; color: var(--success-glow);" id="dailyScore">0 Ativos Cobertos</div>
        </div>
    </div>

    <div class="input-panel">
        <div class="km-row">
            <div>
                <label><small>LOCALIZAÇÃO (KM)</small></label>
                <input type="text" id="kmInput" placeholder="Ex: 142+500">
            </div>
            <div>
                <label><small>SENTIDO</small></label>
                <select id="sentidoInput">
                    <option value="Norte">Norte (SP)</option>
                    <option value="Sul">Sul (RJ)</option>
                    <option value="Interno/ADM">Interno / Administrativo</option>
                    <option value="Canteiro Central">Canteiro Central</option>
                    <option value="Pátio/Base">Pátio de Operações</option>
                </select>
            </div>
            <div>
                <label><small>STATUS DE SEGURANÇA</small></label>
                <select id="segurancaInput">
                    <option value="Conforme Normas">Conforme Normas Técnicas</option>
                    <option value="Sinalização Ativa">Sinalização Ativa Local</option>
                    <option value="Área Segura">Área de Trabalho Segura</option>
                </select>
            </div>
        </div>

        <div class="voice-section">
            <button class="voice-trigger" id="voiceBtn" onclick="toggleVoice()">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <div id="timerDisplay" style="font-size: 2em; font-family: monospace; margin: 10px 0; color: var(--angstrom-gold);">00:00:00</div>
            <textarea id="descInput" rows="3" placeholder="Relatório técnico detalhado..."></textarea>
        </div>

        <button class="btn-final btn-save" id="mainBtn" onclick="handleMainAction()" style="width:100%">Iniciar Operação Técnica</button>
    </div>

    <h3 style="color:var(--angstrom-gold); margin-bottom: 10px;">MATRIZ DE APOIO TÉCNICO & GESTÃO</h3>
    <div class="category-scroll" id="catGrid"></div>

    <table class="log-table">
        <thead>
            <tr>
                <th>KM/LOCAL</th>
                <th>OPERAÇÃO TÉCNICA</th>
                <th>ENGENHARIA DE VALOR / IMPACTO</th>
                <th>TIME</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <div class="footer-actions">
        <button class="btn-final btn-csv" onclick="exportCSV()">Exportar Dados (Excel)</button>
        <button class="btn-final btn-wa" onclick="sendWA()">Relatório Executivo WhatsApp</button>
        <button class="btn-final" style="background:#f85149; color:white;" onclick="clearDay()">Encerrar Turno</button>
    </div>
</div>

<script>
    // Dicionário de Engenharia de Qualidade - Transforma o comum no excepcional
    const techDictionary = [
        {cat: "Apoio Técnico", title: "Suporte Técnico de Nível 2", desc: "Apoio consultivo especializado para resolução de falhas complexas em campo.", imp: "Minimização do MTTR (Tempo Médio de Reparo)"},
        {cat: "Fibra/Redes", title: "Otimização de Backbone Óptico", desc: "Intervenção técnica para garantir a integridade física e lógica dos ativos de rede.", imp: "Continuidade da transmissão de dados críticos"},
        {cat: "Eletrotécnica", title: "Auditoria de Conformidade Elétrica", desc: "Inspeção e ajuste em quadros e sistemas de alimentação para evitar sobrecarga.", imp: "Eficiência energética e prevenção de sinistros"},
        {cat: "Logística", title: "Gestão Estratégica de Insumos", desc: "Controle e distribuição de materiais para manutenção preventiva e corretiva.", imp: "Prontidão operacional da equipe de campo"},
        {cat: "Sistemas", title: "Análise de Telemetria e Alarmes", desc: "Monitoramento de sistemas de controle para detecção precoce de anomalias.", imp: "Ações preditivas e redução de paradas não programadas"},
        {cat: "Segurança", title: "Inspeção de Segurança em Passarelas", desc: "Avaliação técnica estrutural e de iluminação para segurança do pedestre.", imp: "Mitigação de riscos de acidentes e responsabilidade civil"},
        {cat: "Qualidade", title: "Ajuste e Padronização de Procedimentos", desc: "Refinamento de processos operacionais para elevar o padrão de entrega técnica.", imp: "Engenharia de qualidade e sucesso operacional"},
        {cat: "Frota", title: "Gestão de Disponibilidade de Ativos", desc: "Checklist e controle de equipamentos e veículos de apoio técnico.", imp: "Garantia de mobilidade e resposta rápida"},
        {cat: "Terceiras", title: "Fiscalização e Garantia de Qualidade", desc: "Acompanhamento de equipes terceiras para assegurar o cumprimento de normas.", imp: "Conformidade técnica e rigor operacional"},
        {cat: "Documentação", title: "Atualização de AS-BUILT e Prontuários", desc: "Registro detalhado de alterações na rede para futuras consultas de engenharia.", imp: "Rastreabilidade e inteligência de ativos"}
    ];

    let acts = JSON.parse(localStorage.getItem('ang_acts_v3')) || [];
    let start = localStorage.getItem('ang_start_v3') ? new Date(localStorage.getItem('ang_start_v3')) : null;
    let timer;

    window.onload = () => {
        document.getElementById('date-info').innerText = new Date().toLocaleDateString('pt-br', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
        renderGrid();
        renderTable();
        if(start) startUI();
    };

    function renderGrid() {
        const grid = document.getElementById('catGrid');
        techDictionary.forEach(item => {
            let b = document.createElement('button');
            b.className = 'btn-elite';
            b.innerHTML = `<b>${item.title}</b><small>${item.cat}</small>`;
            b.onclick = () => {
                document.getElementById('descInput').value = item.desc;
                document.getElementById('descInput').dataset.impacto = item.imp;
            };
            grid.appendChild(b);
        });
    }

    function toggleVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'pt-BR';
        const btn = document.getElementById('voiceBtn');
        rec.onstart = () => btn.classList.add('active');
        rec.onresult = (e) => {
            document.getElementById('descInput').value = e.results.transcript;
            btn.classList.remove('active');
        };
        rec.start();
    }

    function handleMainAction() {
        const btn = document.getElementById('mainBtn');
        if(!start) {
            start = new Date();
            localStorage.setItem('ang_start_v3', start.toISOString());
            startUI();
        } else {
            const entry = {
                km: document.getElementById('kmInput').value || "ADM",
                sentido: document.getElementById('sentidoInput').value,
                seg: document.getElementById('segurancaInput').value,
                inicio: start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fim: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                txt: document.getElementById('descInput').value,
                impacto: document.getElementById('descInput').dataset.impacto || "Otimização Técnica",
                total: document.getElementById('timerDisplay').innerText
            };
            acts.push(entry);
            localStorage.setItem('ang_acts_v3', JSON.stringify(acts));
            start = null;
            localStorage.removeItem('ang_start_v3');
            location.reload();
        }
    }

    function startUI() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "Finalizar e Registrar Valor";
        btn.style.background = "#f85149";
        timer = setInterval(() => {
            const d = new Date(new Date() - start);
            document.getElementById('timerDisplay').innerText = d.toISOString().substr(11, 8);
        }, 1000);
    }

    function renderTable() {
        const b = document.getElementById('logBody');
        b.innerHTML = acts.map(a => `
            <tr>
                <td><b>KM ${a.km}</b><br><small>${a.sentido}</small></td>
                <td>${a.txt}<br><span class="status-pill">${a.seg}</span></td>
                <td style="color:var(--angstrom-gold)">🚀 ${a.impacto}</td>
                <td>${a.inicio} - ${a.fim}<br><small>${a.total}</small></td>
            </tr>
        `).reverse().join('');
        document.getElementById('dailyScore').innerText = acts.length + " Ativos Cobertos";
    }

    function sendWA() {
        let t = `*ANGSTROM - RELATÓRIO EXECUTIVO DE ALTO DESEMPENHO*\n`;
        t += `_Foco: Apoio Técnico Estratégico e Engenharia de Qualidade_\n\n`;
        acts.forEach(a => {
            t += `📍 *LOCAL: KM ${a.km} (${a.sentido})*\n🛠 *AÇÃO:* ${a.txt}\n🛡 *SEGURANÇA:* ${a.seg}\n🚀 *IMPACTO:* ${a.impacto}\n⏱ *PERÍODO:* ${a.inicio} às ${a.fim}\n\n`;
        });
        t += `*EFICIÊNCIA DO TURNO:* ${acts.length} operações realizadas com sucesso.`;
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    function exportCSV() {
        let c = "KM;Sentido;Seguranca;Inicio;Fim;Descricao;Impacto\n";
        acts.forEach(a => c += `${a.km};${a.sentido};${a.seg};${a.inicio};${a.fim};${a.txt};${a.impacto}\n`);
        const blob = new Blob([c], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const l = document.createElement('a');
        l.href = url; l.download = 'relatorio_angstrom_elite.csv'; l.click();
    }

    function clearDay() { if(confirm("Encerrar turno e gerar indicadores?")) { localStorage.clear(); location.reload(); } }
</script>

</body>
</html>
