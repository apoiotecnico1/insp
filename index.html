<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Pro - Foco e Legibilidade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-bg: rgba(0, 60, 25, 0.7); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 12px; cursor: pointer; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: contain; }

        /* Placa de Km no App */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: var(--placa-bg); padding: 12px; 
            border-radius: 10px; z-index: 100; border: 1.5px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(10px); min-width: 140px; text-align: center;
        }
        #br-txt { font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.9); text-transform: uppercase; }
        #km-txt { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1.1; }

        #ui-controls { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; }
        .btn-main { border: none; padding: 18px 45px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: #ff4444; color: #fff; display: none; }
        
        #rec-tag { position: absolute; top: 30px; right: 30px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; opacity: 0; display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="safety-gate">
    <button class="btn-aware" onclick="startApp()">INICIAR CÂMERA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="takeManualPhoto()"></video>
    <div id="km-hud"><span id="br-txt">BR ---</span><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span style="font-size:12px; font-weight:bold;">GERANDO PDF</span></div>
    
    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="startCapture()">Iniciar Lote</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, brGlobal="---";
let curLat="0.000000", curLon="0.000000", buffer=[], kmInicialLote="";

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
        initGPS(); loadCSV();
    } catch(e) { alert("Permissão de pasta e câmera necessária."); }
}

function drawStamps(br, km) {
    const s = can.height / 1080;
    
    // --- 1. PLACA DE KM (AJUSTADA E DENTRO DAS DIMENSÕES) ---
    const pw = 200 * s; 
    const ph = 100 * s;
    const px = 40 * s; 
    const py = 40 * s;

    ctx.save();
    // Fundo da placa
    ctx.fillStyle = "rgba(0, 60, 25, 0.75)";
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 12 * s);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 2 * s;
    ctx.stroke();

    // Texto da Placa
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${24 * s}px Arial`;
    ctx.fillText("BR " + br, px + pw/2, py + 35 * s);

    // Ajuste dinâmico do tamanho do Km para não vazar
    let fontSizeKm = 55 * s;
    if (km.length > 4) fontSizeKm = 42 * s;
    ctx.font = `900 ${fontSizeKm}px Arial`;
    ctx.fillText("Km " + km, px + pw/2, py + ph - 20 * s);

    // --- 2. RODAPÉ (CENTRALIZADO E VISÍVEL) ---
    const bh = 100 * s; // Altura do rodapé
    const grad = ctx.createLinearGradient(0, can.height - bh, 0, can.height);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,0.85)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, can.height - bh, can.width, bh);

    ctx.textAlign = "center";
    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 6 * s;
    
    // Linha 1: Data e Hora
    ctx.font = `bold ${28 * s}px Arial`;
    const dataTxt = new Date().toLocaleString('pt-BR');
    ctx.fillText(dataTxt, can.width / 2, can.height - 55 * s);

    // Linha 2: GPS
    ctx.font = `bold ${22 * s}px monospace`;
    ctx.fillText(`COORDENADAS GPS: ${curLat} , ${curLon}`, can.width / 2, can.height - 25 * s);
    
    ctx.restore();
}

async function takeManualPhoto() {
    if(!hDir) return;
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamps(brGlobal, km);
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fh = await hDir.getFileHandle(`FOTO_BR${brGlobal}_KM${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

async function captureLoop() {
    if (!capturing) return;
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamps(brGlobal, km);
    buffer.push(can.toDataURL('image/jpeg', 0.8));
    
    if (buffer.length >= 50) {
        savePDF([...buffer], kmInicialLote, km);
        buffer = []; kmInicialLote = km;
    }
    setTimeout(captureLoop, 300);
}

async function savePDF(imgs, k1, k2) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < imgs.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(imgs[i], 'JPEG', 0, 0, pw, ph);
    }
    const fh = await hDir.getFileHandle(`LOTE_BR${brGlobal}_KM${k1}_${k2}.pdf`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(doc.output('blob')); await sw.close();
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); 
        curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = kmDB[0], minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        brGlobal = best.br;
        document.getElementById('br-txt').innerText = "BR " + brGlobal;
        document.getElementById('km-txt').innerText = "Km " + best.km;
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iB = h.indexOf('br'), iK=h.indexOf('km'), iLt=h.findIndex(x=>x.includes('lat')), iLn=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[iB], km: c[iK], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}
</script>
</body>
</html>
