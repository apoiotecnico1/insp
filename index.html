<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>INSPEÇÃO PRO - LIVE GITHUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --placa-verde: linear-gradient(180deg, #007934 0%, #005a27 100%); 
            --accent: #ffcc00; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: #fff; }

        /* HUD PLACA REALISTA */
        #hud-placa { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); 
            padding: 12px 25px; 
            border: 4px solid #fff; 
            border-radius: 15px; 
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            text-align: center;
            min-width: 180px;
        }
        #br-val { font-size: 1.1rem; font-weight: 800; border-bottom: 2px solid rgba(255,255,255,0.3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        #km-val { font-size: 3.2rem; font-weight: 900; line-height: 1; }

        #vid { width: 100vw; height: 100vh; object-fit: cover; }
        
        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 200; }
        .btn { border: none; padding: 20px 45px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: #ff4444; color: #fff; display: none; }

        #init-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    </style>
</head>
<body onload="checkAutoStart()">

<div id="init-screen">
    <h2 style="color:var(--accent)">SISTEMA DE INSPEÇÃO</h2>
    <p>Clique abaixo para liberar a pasta de salvamento</p>
    <button class="btn" id="btn-start" onclick="runSystem()">ATIVAR CÂMERA E GPS</button>
</div>

<video id="vid" autoplay playsinline muted onclick="takePhoto()"></video>

<div id="hud-placa" style="display:none;">
    <div id="br-val">CARREGANDO...</div>
    <div id="km-val">---</div>
</div>

<div id="controls" style="display:none;">
    <button id="btn-run" class="btn" style="background:var(--accent)" onclick="startReport()">Gerar PDF</button>
    <button id="btn-stop" class="btn" onclick="stopReport()">Salvar PDF</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let kmData = [], saveDir = null, reporting = false, pdfBuffer = [];
let nowBR = "BR", nowKM = "0", nowLat = "0", nowLon = "0";

// 1. INICIALIZAÇÃO
async function runSystem() {
    try {
        saveDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        await loadRemoteCSV();
        await startCam();
        startTracking();
        
        document.getElementById('init-screen').style.display = 'none';
        document.getElementById('hud-placa').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
    } catch(e) { alert("Acesso à pasta local negado."); }
}

// 2. BUSCA O CSV NO SEU GITHUB PAGES
async function loadRemoteCSV() {
    try {
        // O navegador buscará o arquivo que está na mesma pasta do HTML no GitHub
        const res = await fetch('SNVBR116SPRJ.csv');
        const txt = await res.text();
        const lines = txt.split('\n').filter(l => l.length > 10);
        const header = lines.shift().toLowerCase();
        const sep = header.includes(';') ? ';' : ',';

        kmData = lines.map(line => {
            const cols = line.split(sep);
            return {
                br: cols[0].trim(),
                km: cols[1].trim(),
                lat: parseFloat(cols[2].replace(',', '.')),
                lon: parseFloat(cols[3].replace(',', '.'))
            };
        }).filter(d => !isNaN(d.lat));
    } catch(e) { console.error("Falha ao ler CSV remoto", e); }
}

// 3. GPS E IDENTIFICAÇÃO DE BR
function startTracking() {
    navigator.geolocation.watchPosition(pos => {
        nowLat = pos.coords.latitude.toFixed(6);
        nowLon = pos.coords.longitude.toFixed(6);
        
        if(kmData.length > 0) {
            let minD = Infinity, best = null;
            kmData.forEach(p => {
                const d = Math.hypot(p.lat - pos.coords.latitude, p.lon - pos.coords.longitude);
                if(d < minD) { minD = d; best = p; }
            });

            if(best) {
                nowBR = "BR-" + best.br;
                nowKM = best.km;
                document.getElementById('br-val').innerText = nowBR;
                document.getElementById('km-val').innerText = "Km " + nowKM;
            }
        }
    }, null, { enableHighAccuracy: true });
}

// 4. CÂMERA
async function startCam() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 } } 
    });
    document.getElementById('vid').srcObject = stream;
}

// 5. CARIMBO DA PLACA NA FOTO
function applyStamp(ctx, w, h) {
    const sH = h * 0.15;
    const g = ctx.createLinearGradient(0, h-sH, 0, h);
    g.addColorStop(0, "#007934"); g.addColorStop(1, "#004d22");
    
    ctx.fillStyle = g;
    ctx.fillRect(0, h-sH, w, sH);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, h-sH, w, 5); // Borda branca da placa

    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 4;
    ctx.font = `bold ${sH * 0.22}px Arial`;
    ctx.fillText(nowBR, 30, h - (sH * 0.65));
    
    ctx.font = `900 ${sH * 0.48}px Arial`;
    ctx.fillText("Km " + nowKM, 30, h - (sH * 0.18));
    
    ctx.font = `bold ${sH * 0.15}px monospace`;
    ctx.textAlign = "right";
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${nowLat}, ${nowLon}`, w - 30, h - (sH * 0.2));
    ctx.textAlign = "left";
}

// 6. FOTO MANUAL (AO CLICAR NO VÍDEO)
async function takePhoto() {
    const v = document.getElementById('vid');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0);
    applyStamp(ctx, c.width, c.height);
    
    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.92));
    const name = `FOTO_${nowBR}_KM${nowKM.replace(',','-')}_${Date.now()}.jpg`;
    const handle = await saveDir.getFileHandle(name, {create:true});
    const write = await handle.createWritable();
    await write.write(blob); await write.close();
    
    v.style.opacity = "0.4"; setTimeout(() => v.style.opacity = "1", 100);
}

// 7. RELATÓRIO PDF AUTOMÁTICO
function startReport() {
    reporting = true; pdfBuffer = [];
    document.getElementById('btn-run').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    loopReport();
}

async function loopReport() {
    if(!reporting) return;
    const v = document.getElementById('vid');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0);
    applyStamp(ctx, c.width, c.height);
    pdfBuffer.push(c.toDataURL('image/jpeg', 0.7));
    setTimeout(loopReport, 2000);
}

async function stopReport() {
    reporting = false;
    if(pdfBuffer.length === 0) return;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    pdfBuffer.forEach((img, i) => {
        if(i > 0) doc.addPage();
        doc.addImage(img, 'JPEG', 0, 0, 297, 210);
    });
    const handle = await saveDir.getFileHandle(`PDF_${nowBR}_${Date.now()}.pdf`, {create:true});
    const write = await handle.createWritable();
    await write.write(doc.output('blob')); await write.close();
    location.reload();
}
</script>
</body>
</html>
