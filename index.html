<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - NEXUS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00d9ff; --danger: #ff3333; --go: #00ff66; --bg: #050a16; --glass: rgba(11, 18, 36, 0.85); }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', system-ui; overflow: hidden; height: 100vh; }
        
        /* HUD Layout */
        #main-container { display: grid; grid-template-rows: 1fr auto; height: 100vh; }
        @media (orientation: landscape) { #main-container { grid-template-columns: 1fr 320px; grid-template-rows: 1fr; } }

        #viewport { position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; border-right: 1px solid #222; }
        
        /* Floating Plaque */
        #kmPlaque { 
            position: absolute; top: 20px; left: 20px;
            background: linear-gradient(135deg, #0a8a4d, #056b3c);
            padding: 10px 25px; border-radius: 8px; border: 3px solid #fff;
            font-size: 2.5rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            letter-spacing: -1px; pointer-events: none; z-index: 10;
        }

        #controls { background: var(--bg); padding: 15px; display: flex; flex-direction: column; gap: 12px; border-left: 1px solid #1a2235; }

        /* Dashboard Otimizado */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid #1a2235; text-align: center; }
        .card span { display: block; font-size: 1.2rem; font-weight: bold; color: var(--neon); }
        .card label { font-size: 0.6rem; text-transform: uppercase; color: #556; }

        /* Ações */
        .btn-main { height: 70px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        #btnStart { background: var(--go); color: #000; box-shadow: 0 0 20px rgba(0,255,102,0.2); }
        #btnStart.active { background: var(--danger); color: #fff; animation: pulse 1.5s infinite; }
        #btnPDF { background: #1e3a8a; color: #fff; }

        /* Configurações (Slide-in) */
        #settings-trigger { position: absolute; top: 20px; right: 20px; z-index: 100; font-size: 24px; cursor: pointer; background: var(--glass); padding: 8px; border-radius: 50%; border: 1px solid #333; }
        #settings-panel { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: var(--glass); backdrop-filter: blur(10px); z-index: 1000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); padding: 20px; border-left: 1px solid var(--neon); }
        #settings-panel.open { right: 0; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.8rem; color: #ccc; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 5px; border-radius: 5px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #folder-hint { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="folder-hint"><h2>📂 SELECIONE A PASTA DE DESTINO<br><small style="color:var(--neon)">Para salvar relatórios e fotos automaticamente</small></h2></div>
<div id="settings-trigger" onclick="toggleSets()">⚙️</div>

<div id="settings-panel">
    <h2 style="color:var(--neon); margin-top:0">Ajustes de Missão</h2>
    <div class="setting-row">Câmera: <select id="cfgCam" onchange="initCamera()"><option value="environment">Traseira</option><option value="user">Frontal</option></select></div>
    <div class="setting-row">Lote de Fotos: <input type="number" id="cfgBatch" value="100" style="width:50px"></div>
    <div class="setting-row">Intervalo (ms): <input type="number" id="cfgDelay" value="300" style="width:50px"></div>
    <div class="setting-row">Cor da Estampa: <input type="color" id="cfgColor" value="#ffffff"></div>
    <div class="setting-row">Qualidade PDF: <input type="range" id="cfgQual" min="0.1" max="1" step="0.1" value="0.7"></div>
    <button onclick="toggleSets()" style="width:100%; padding:10px; background:var(--danger); border:none; color:#fff; border-radius:5px; margin-top:20px">FECHAR</button>
</div>

<div id="main-container">
    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div class="status-bar" style="display:flex; justify-content: space-between; font-size:0.7rem; color:#556">
            <span id="stGps">GPS: BUSCANDO...</span>
            <span id="stCsv">CSV: AGUARDANDO...</span>
        </div>

        <div class="dashboard">
            <div class="card"><label>Fotos Capturadas</label><span id="txtTotal">0</span></div>
            <div class="card"><label>Buffer do Lote</label><span id="txtBuffer">0/100</span></div>
        </div>

        <button id="btnStart" class="btn-main">INICIAR INSPEÇÃO</button>
        <button id="btnPDF" class="btn-main">GERAR PDF AGORA</button>
        
        <div style="text-align:center; font-size:0.5rem; color:#334; margin-top:auto">NEXUS ENGINEERING OS v6.0</div>
    </div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

// --- ENGINE CORE ---
const toggleSets = () => document.getElementById('settings-panel').classList.toggle('open');

async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: document.getElementById('cfgCam').value, width: 1280, height: 720 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// --- GPS & CSV (Compacto) ---
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        kmDataset = t.split('\n').slice(1).map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(x => !isNaN(x.lat));
        document.getElementById('stCsv').innerHTML = "CSV: PRONTO";
    } catch(e) { document.getElementById('stCsv').innerHTML = "CSV: ERRO"; }
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').innerHTML = "GPS: OK";
    if(kmDataset.length) {
        let nearest = kmDataset.reduce((prev, curr) => {
            const d = Math.hypot(curr.lat - lastPos.lat, curr.lon - lastPos.lon);
            return d < prev.d ? { d, km: curr.km } : prev;
        }, { d: Infinity });
        document.getElementById('kmPlaque').innerText = "KM " + nearest.km;
    }
}, null, { enableHighAccuracy: true });

// --- RENDER ENGINE ---
function drawStamp(km, coords) {
    const h = can.height, w = can.width;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h-120, w, 120);
    ctx.fillStyle = document.getElementById('cfgColor').value;
    ctx.font = "bold 60px Arial";
    ctx.fillText("KM " + km, 40, h-50);
    ctx.font = "20px Monospace";
    ctx.fillText(`${new Date().toLocaleString()} | LAT: ${coords.lat} LON: ${coords.lon}`, 40, h-20);
}

async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawStamp(batch[i].km, batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].data;
        });
    }

    const name = `RELATORIO_LOTE_${pdfCount}.pdf`;
    if(directoryHandle) {
        const fh = await directoryHandle.getFileHandle(name, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } else { doc.save(name); }
}

async function loop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0);
    activeBuffer.push({
        data: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').innerText.replace('KM ',''),
        lat: lastPos?.lat.toFixed(6) || "0",
        lon: lastPos?.lon.toFixed(6) || "0"
    });
    
    photoCount++;
    document.getElementById('txtTotal').innerText = photoCount;
    document.getElementById('txtBuffer').innerText = `${activeBuffer.length}/${document.getElementById('cfgBatch').value}`;
    
    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(loop, parseInt(document.getElementById('cfgDelay').value));
}

// --- EVENTS ---
document.getElementById('btnStart').onclick = async function() {
    if(!isRecording) {
        if(!directoryHandle && 'showDirectoryPicker' in window) {
            document.getElementById('folder-hint').style.display = 'flex';
            directoryHandle = await window.showDirectoryPicker().catch(() => null);
            document.getElementById('folder-hint').style.display = 'none';
            if(!directoryHandle) return;
        }
        isRecording = true;
        this.innerText = "PARAR INSPEÇÃO";
        this.classList.add('active');
        loop();
    } else {
        isRecording = false;
        this.innerText = "INICIAR INSPEÇÃO";
        this.classList.remove('active');
        savePDF();
    }
};

document.getElementById('btnPDF').onclick = savePDF;

loadCSV(); initCamera();
</script>
</body>
</html>
