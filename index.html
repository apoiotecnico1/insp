<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Captura Operacional Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; }
        #app-shell { width: 100vw; height: 100vh; position: relative; }
        #vid { width: 100%; height: 100%; object-fit: cover; }
        #hud-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 10px; z-index: 100; pointer-events: none; }
        .data-card { background: rgba(0,0,0,0.7); padding: 15px; border-left: 5px solid #ffcc00; border-radius: 4px; font-weight: bold; font-size: 1.2rem; }
        #btn-ctrl { position: absolute; bottom: 30px; right: 30px; padding: 40px 70px; font-size: 1.8rem; font-weight: 900; background: #ffcc00; border: none; border-radius: 20px; cursor: pointer; z-index: 200; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="hud-top">
        <div class="data-card" id="txt-snv">SNV: BR-116</div>
        <div class="data-card" id="txt-km">Km: 000.0</div>
        <div class="data-card" id="txt-gps">GPS: 0.0, 0.0</div>
    </div>

    <button id="btn-ctrl" onclick="toggleCapture()">INICIAR OPERAÇÃO</button>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let stream, rec, hDir, capturing = false, buffer = [], notaAtual = "", falando = false;
let status = { km: "000.0", snv: "BR-116", gps: "0.0, 0.0" };
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

async function init() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        vid.srcObject = stream;
        
        // Reconhecimento de Voz (Mantido ativo sem pedir permissão)
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        rec = new SR();
        rec.lang = 'pt-BR'; rec.continuous = true; rec.interimResults = true;
        rec.onresult = (e) => { 
            let t = ""; for(let i=e.resultIndex; i<e.results.length; i++) t += e.results[i][0].transcript;
            if(t.length > 1) { notaAtual = t; falando = true; }
        };
        rec.onspeechend = () => setTimeout(() => { falando = false; }, 4000);
        rec.onend = () => { try { rec.start(); } catch(e){} };
        rec.start();
        
        // Atualiza HUD de dados
        setInterval(() => {
            document.getElementById('txt-snv').innerText = `SNV: ${status.snv}`;
            document.getElementById('txt-km').innerText = `Km: ${status.km}`;
            document.getElementById('txt-gps').innerText = `GPS: ${status.gps}`;
        }, 500);
    } catch(e) { alert("Erro de Permissão: " + e.message); }
}

function toggleCapture() {
    capturing = !capturing;
    document.getElementById('btn-ctrl').innerText = capturing ? "FINALIZAR" : "INICIAR OPERAÇÃO";
    document.getElementById('btn-ctrl').style.background = capturing ? "#ff4444" : "#ffcc00";
    if(capturing) loop(); else savePDF();
}

function loop() {
    if(!capturing) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    // Estampa de Dados
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, can.width, 100);
    ctx.fillStyle = "#ffcc00"; ctx.font = "bold 50px Courier New";
    ctx.fillText(`${status.snv} | Km ${status.km} | ${status.gps}`, 40, 70);
    
    // Estampa de Voz
    if(falando) {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-150, can.width, 150);
        ctx.fillStyle = "#fff"; ctx.font = "bold 40px Courier New";
        ctx.fillText(notaAtual.substring(0, 70), 40, can.height-60);
    }
    
    buffer.push(can.toDataURL('image/jpeg', 0.8));
    if(buffer.length >= 25) savePDF();
    setTimeout(loop, 1000);
}

async function savePDF() {
    if(buffer.length === 0) return;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<buffer.length; i++) {
        if(i > 0) doc.addPage();
        doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    try {
        const fh = await hDir.getFileHandle(`OPERACAO_${Date.now()}.pdf`, { create: true });
        const w = await fh.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch(e) { console.error(e); }
    buffer = [];
}

window.onload = init;
</script>
</body>
</html>
