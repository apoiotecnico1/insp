<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Liberação - Angstrom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f4f9; font-family: sans-serif; color: #333; }
        .main-card { max-width: 600px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px; }
        .step-box { border: 1px solid #dee2e6; border-radius: 10px; padding: 15px; margin-bottom: 20px; background: #fff; }
        .step-label { font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; display: block; color: #555; }
        .divider { border-top: 2px dashed #dee2e6; margin: 20px 0; position: relative; }
        .divider::after { content: '➔'; position: absolute; right: -10px; top: -14px; color: #dee2e6; font-size: 1.2rem; }
        .btn-authorize { background: #1a1a1b; color: white; width: 100%; padding: 15px; font-weight: bold; border: none; border-radius: 8px; transition: 0.3s; }
        .btn-authorize:disabled { background: #ccc; cursor: not-allowed; }
        .camera-btn { background: #f8f9fa; border: 1px solid #ddd; color: #555; width: 100%; margin-top: 5px; }
        .preview-img { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="text-center mb-4">
            <h4 class="fw-bold mb-1">LIBERAÇÃO DE TRECHO</h4>
            <p class="text-muted small">Intermediação: Cláudio Santos - Angstrom</p>
        </div>

        <div class="mb-4">
            <label class="step-label">📍 IDENTIFICAÇÃO DO TRECHO</label>
            <div class="input-group">
                <span class="input-group-text bg-white">KM</span>
                <input type="text" id="km" class="form-control" placeholder="Ex: 145+500" oninput="validar()">
                <select id="sentido" class="form-select" onchange="validar()">
                    <option value="Norte">Norte</option>
                    <option value="Sul">Sul</option>
                </select>
            </div>
        </div>

        <div class="step-box" style="border-left: 5px solid #004a99;">
            <label class="step-label">1. SONDAGEM FIBRA DUTRA (Fiber Tech)</label>
            <input type="text" id="respCCR" class="form-control form-control-sm mb-2" placeholder="Nome do Técnico Fiber Tech">
            <label class="btn btn-sm camera-btn">
                <i class="bi bi-camera me-2"></i>Foto da Fibra/Sondagem
                <input type="file" capture="camera" accept="image/*" hidden id="fotoCCR" onchange="preview('CCR')">
            </label>
            <img id="imgCCR" class="preview-img">
        </div>

        <div class="divider"></div>

        <div class="step-box" style="border-left: 5px solid #ee1d23;">
            <label class="step-label">2. SONDAGEM FIBRA CLARO (Equipe Claro)</label>
            <input type="text" id="respClaro" class="form-control form-control-sm mb-2" placeholder="Nome do Técnico Claro">
            <label class="btn btn-sm camera-btn">
                <i class="bi bi-camera me-2"></i>Foto da Fibra/Sondagem
                <input type="file" capture="camera" accept="image/*" hidden id="fotoClaro" onchange="preview('Claro')">
            </label>
            <img id="imgClaro" class="preview-img">
        </div>

        <div class="mt-4">
            <p class="text-center small text-muted mb-3">
                <i class="bi bi-info-circle me-1"></i>
                A liberação confirma a presença das equipes de sondagem no local.
            </p>
            <button id="btnFinal" class="btn btn-authorize" disabled onclick="enviarRelatorio()">
                AUTORIZAR IMPLANTAÇÃO NESTE TRECHO
            </button>
        </div>
    </div>
</div>

<script>
    function preview(setor) {
        const file = document.getElementById('foto' + setor).files;
        const img = document.getElementById('img' + setor);
        const reader = new FileReader();
        reader.onloadend = function () {
            img.src = reader.result;
            img.style.display = "block";
            validar();
        }
        if (file) reader.readAsDataURL(file);
    }

    function validar() {
        const km = document.getElementById('km').value;
        const fClaro = document.getElementById('fotoClaro').files.length > 0;
        const fCCR = document.getElementById('fotoCCR').files.length > 0;
        const rClaro = document.getElementById('respClaro').value;
        const rCCR = document.getElementById('respCCR').value;

        // Só libera se houver KM, Nomes dos Técnicos e as Fotos
        document.getElementById('btnFinal').disabled = !(km && fClaro && fCCR && rClaro && rCCR);
    }

    function enviarRelatorio() {
        const km = document.getElementById('km').value;
        const sentido = document.getElementById('sentido').value;
        const rClaro = document.getElementById('respClaro').value;
        const rCCR = document.getElementById('respCCR').value;
        const protocolo = "ANS-" + Math.floor(Math.random() * 10000);

        const msg = encodeURIComponent(
            `*AUTORIZAÇÃO DE IMPLANTAÇÃO - ANGSTROM*\n\n` +
            `📍 *TRECHO:* KM ${km} (${sentido})\n` +
            `----------------------------------\n` +
            `🔍 *SONDAGEM CCR:* Realizada\n` +
            `👤 Técnico: ${rCCR}\n\n` +
            `🔍 *SONDAGEM CLARO:* Realizada\n` +
            `👤 Técnico: ${rClaro}\n` +
            `----------------------------------\n` +
            `✅ *STATUS:* LIBERADO PARA SERVIÇO\n` +
            `🔐 *PROTOCOLO:* ${protocolo}\n` +
            `⚠️ *OBS:* O acompanhamento deve ser mantido durante a cravação.`
        );

        window.open(`https://wa.me/?text=${msg}`);
    }
</script>

</body>
</html>
