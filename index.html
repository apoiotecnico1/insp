<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b7a39">
<title>Painel de KM – Modo Veicular</title>

<style>
:root{
  --green:#0b7a39;
  --green2:#064e24;
  --border:#e6f0ea;
  --text:#ffffff;
  --warn:#ffdd88;
}

html,body{
  margin:0;
  height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  overflow:hidden;
}

/* Vídeo opcional */
video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  z-index:1;
}

/* Painel principal */
#panel{
  position:fixed;
  inset:0;
  z-index:3;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

#card{
  width:94vw;
  height:80vh;
  max-width:1600px;
  background:linear-gradient(180deg,var(--green),var(--green2));
  border:12px solid var(--border);
  border-radius:32px;
  box-shadow:
    0 40px 70px rgba(0,0,0,.6),
    inset 0 0 0 4px rgba(255,255,255,.55);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#km{
  font-weight:1000;
  color:var(--text);
  line-height:1;
  font-size:clamp(90px, 18vw, 280px);
  text-shadow:
    0 4px 0 rgba(0,0,0,.45),
    0 15px 45px rgba(0,0,0,.6);
}

#gps{
  margin-top:10px;
  font-size:clamp(12px, 2.6vw, 22px);
  font-weight:700;
  opacity:.9;
}

#warn{
  margin-top:6px;
  font-size:clamp(11px, 2.4vw, 20px);
  font-weight:900;
  color:var(--warn);
  display:none;
}

/* Controles mínimos */
#controls{
  position:fixed;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  z-index:5;
  display:flex;
  gap:10px;
}

button{
  pointer-events:auto;
  background:#111;
  color:#fff;
  border:1px solid #444;
  border-radius:10px;
  padding:8px 14px;
  font-weight:800;
  cursor:pointer;
}

/* Modo noturno automático */
@media (prefers-color-scheme: dark){
  body{background:#000}
}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>

<div id="panel">
  <div id="card">
    <div id="km">KM —</div>
    <div id="gps">GPS: aguardando…</div>
    <div id="warn">Precisão baixa • KM pode variar</div>
  </div>
</div>

<div id="controls">
  <button id="btnStart">▶ Iniciar</button>
  <button id="btnToggleVideo">📷 Vídeo</button>
</div>

<script>
const vid = document.getElementById('vid');
const kmEl = document.getElementById('km');
const gpsEl = document.getElementById('gps');
const warnEl = document.getElementById('warn');
const btnStart = document.getElementById('btnStart');
const btnToggleVideo = document.getElementById('btnToggleVideo');

let lastPos = null;
let kmPoints = [];
let videoVisible = true;

/* Utilidades */
function hav(a,b,c,d){
  const R=6371000;
  const x=(c-a)*Math.PI/180;
  const y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function fmtKm(v){
  if(!Number.isFinite(v)) return 'KM —';
  let K=Math.floor(v);
  let m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K++}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}
function parsePt(v){
  if(!v) return NaN;
  return /,\d+$/.test(v) ? Number(v.replace(/\./g,'').replace(',','.')) : Number(v);
}

/* GPS */
function startGPS(){
  navigator.geolocation.watchPosition(p=>{
    lastPos={
      lat:p.coords.latitude,
      lon:p.coords.longitude,
      acc:p.coords.accuracy
    };
  },()=>{},{
    enableHighAccuracy:true,
    maximumAge:800,
    timeout:15000
  });
}

/* Kamera */
async function startCamera(){
  const s = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'}},
    audio:false
  });
  vid.srcObject=s;
}

/* KM CSV */
async function loadKM(){
  try{
    const txt = await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    txt.split(/\r?\n/).forEach(l=>{
      const c=l.split(';');
      const km=parsePt(c[0]), lat=parsePt(c[1]), lon=parsePt(c[2]);
      if(Number.isFinite(km)&&Number.isFinite(lat)&&Number.isFinite(lon))
        kmPoints.push({km,lat,lon});
    });
  }catch{}
}

/* Atualização visual */
function updatePanel(){
  if(lastPos && kmPoints.length){
    let best=null, bd=Infinity;
    for(const p of kmPoints){
      const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
      if(d<bd){bd=d;best=p;}
    }
    kmEl.textContent = best?fmtKm(best.km):'KM —';
  }

  if(lastPos){
    gpsEl.textContent=`GPS ±${Math.round(lastPos.acc)} m`;
    warnEl.style.display = lastPos.acc>15?'block':'none';
  }else{
    gpsEl.textContent='GPS: aguardando…';
    warnEl.style.display='block';
  }
}
setInterval(updatePanel,500);

/* Controles */
btnStart.onclick=async()=>{
  await startCamera();
  startGPS();
  await loadKM();
  if('wakeLock' in navigator){
    try{await navigator.wakeLock.request('screen');}catch{}
  }
};

btnToggleVideo.onclick=()=>{
  videoVisible=!videoVisible;
  vid.style.display = videoVisible?'block':'none';
};
</script>

</body>
</html>
