<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5.7 - DADOS CENTRALIZADOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00d9ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 70vw !important; height: 100vh !important; border-right: 2px solid #222; }
            #controls { width: 30vw; height: 100vh; overflow-y: auto; background: #050a16; }
        }

        #viewport { position: relative; width: 100vw; height: 45vh; background: #000; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .cam-selector-fast {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
        }
        .cam-btn {
            width: 50px; height: 50px; border-radius: 12px; border: 2px solid #fff;
            background: rgba(0,0,0,0.8); color: white; font-weight: 900;
            cursor: pointer; font-size: 1.3rem; transition: 0.2s;
        }
        .cam-btn.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }

        #displayData {
            background: rgba(0,0,0,0.5); padding: 15px; margin: 10px;
            border-radius: 8px; text-align: center; border: 1px solid #333;
        }
        .km-main { font-size: 3rem; font-weight: 900; color: var(--gold); display: block; }
        .gps-sub { font-size: 0.9rem; font-family: monospace; color: #ccc; }

        .status-bar { display: flex; justify-content: space-around; padding: 10px; background: #000; font-size: 0.7rem; }
        .st { padding: 4px 12px; border-radius: 4px; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #111; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 15px; display: grid; grid-template-columns: 1fr; gap: 12px; }
        button.action { padding: 20px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 1rem; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #dirSelector { background: #fff; color: #000; }
        #dirSelector.ready { background: var(--accent); }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
        <div class="cam-selector-fast" id="camQuickMenu"></div>
    </div>

    <div id="controls">
        <div id="displayData">
            <span id="kmText" class="km-main">KM --+---</span>
            <span id="gpsText" class="gps-sub">AGUARDANDO GPS...</span>
        </div>
        
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: OFF</div>
            <div id="stGps" class="st">GPS: BUSCANDO</div>
            <div id="stCam" class="st">CAM: AGUARDANDO</div>
        </div>

        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/50</span></div>
        </div>

        <div class="btn-row">
            <button id="dirSelector" class="action">1. SELECIONAR PASTA</button>
            <button id="btnStart" class="action" disabled>2. INICIAR INSPEÇÃO</button>
            <button id="btnStop" class="action" disabled>PARAR E GERAR PDF</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null;
let videoDevices = [];

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// --- MOTOR DE CÂMERAS 1-4 ---
async function setupCameras() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        stream.getTracks().forEach(t => t.stop()); // Libera para varredura
        
        const devices = await navigator.mediaDevices.enumerateDevices();
        videoDevices = devices.filter(d => d.kind === 'videoinput');
        
        const menu = document.getElementById('camQuickMenu');
        menu.innerHTML = '';
        
        videoDevices.slice(0, 4).forEach((d, i) => {
            const btn = document.createElement('button');
            btn.className = 'cam-btn';
            btn.innerText = i + 1;
            btn.id = `btn-cam-${i}`;
            btn.onclick = () => switchCamera(d.deviceId, btn);
            menu.appendChild(btn);
            if(i === 0) switchCamera(d.deviceId, btn);
        });
        
        document.getElementById('stCam').textContent = "CAM: OK";
        document.getElementById('stCam').classList.add('ok');
    } catch (e) { alert("Erro ao acessar câmeras. Verifique o HTTPS."); }
}

async function switchCamera(deviceId, btn) {
    if (vid.srcObject) {
        vid.srcObject.getTracks().forEach(t => t.stop());
        vid.srcObject = null;
    }
    
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
        };
    } catch(e) {
        // Fallback para qualquer resolução
        const fallback = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } } });
        vid.srcObject = fallback;
    }
}

// Atalhos de teclado (1, 2, 3, 4)
window.addEventListener('keydown', (e) => {
    const num = parseInt(e.key);
    if(num >= 1 && num <= 4 && videoDevices[num-1]) {
        const btn = document.getElementById(`btn-cam-${num-1}`);
        switchCamera(videoDevices[num-1].deviceId, btn);
    }
});

// --- LÓGICA DE LOCALIZAÇÃO E KM ---
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

async function loadKMCSV(){
    try {
        const resp = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const text = await resp.text();
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        const head = lines.shift().split(';');
        kmDataset = lines.map(l => {
            const r = l.split(';');
            return { km: r, lat: parseFloat(r.replace(',','.')), lon: parseFloat(r.replace(',','.')) };
        }).filter(p => !isNaN(p.lat));
        document.getElementById('stCsv').textContent = "CSV: OK";
        document.getElementById('stCsv').classList.add('ok');
    } catch(e) { console.log("CSV não encontrado."); }
}

function updateUI() {
    if(!lastPos) return;
    let best = null, bd = Infinity;
    for(const p of kmDataset){
        const d = hav(lastPos.lat, lastPos.lon, p.lat, p.lon);
        if(d < bd){ bd = d; best = p; }
    }
    const kmStr = best ? "KM " + best.km : "KM --+---";
    const gpsStr = `LAT: ${lastPos.lat.toFixed(6)} | LON: ${lastPos.lon.toFixed(6)} | ${new Date().toLocaleTimeString()}`;
    
    document.getElementById('kmText').textContent = kmStr;
    document.getElementById('gpsText').textContent = gpsStr;
}

// --- ESTAMPA CENTRALIZADA (SEM PLACA) ---
function drawStamp(item) {
    const w = can.width, h = can.height;
    const scale = h / 1080;
    
    ctx.save();
    ctx.textAlign = "center";
    
    // Sombra/Contorno para legibilidade
    ctx.shadowColor = "black";
    ctx.shadowBlur = 10 * scale;
    ctx.lineWidth = 6 * scale;
    ctx.strokeStyle = "black";
    
    // Desenha KM (Destaque Central)
    const fontSizeKM = 110 * scale;
    ctx.font = `900 ${fontSizeKM}px Arial Black`;
    ctx.strokeText(item.km, w / 2, h - (120 * scale));
    ctx.fillStyle = "#ffd700"; // Amarelo/Ouro para o KM
    ctx.fillText(item.km, w / 2, h - (120 * scale));

    // Desenha GPS e DATA (Abaixo do KM)
    const fontSizeGPS = 30 * scale;
    ctx.font = `bold ${fontSizeGPS}px monospace`;
    const infoText = `${item.lat} ${item.lon} | ${item.ts}`;
    ctx.strokeText(infoText, w / 2, h - (60 * scale));
    ctx.fillStyle = "white";
    ctx.fillText(infoText, w / 2, h - (60 * scale));
    
    ctx.restore();
}

// --- PDF E CAPTURA ---
async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = []; pdfCount++;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        await new Promise(res => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, can.width, can.height);
                drawStamp(batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].raw;
        });
    }
    
    const name = `INSPECAO_${Date.now()}.pdf`;
    if (directoryHandle) {
        const file = await directoryHandle.getFileHandle(name, { create: true });
        const stream = await file.createWritable();
        await stream.write(doc.output('blob'));
        await stream.close();
    } else { doc.save(name); }
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        raw: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('kmText').textContent,
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        ts: new Date().toLocaleString('pt-BR')
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/50`;
    if(activeBuffer.length >= 50) savePDF();
    setTimeout(captureLoop, 1000);
}

// --- EVENTOS ---
document.getElementById('dirSelector').onclick = async () => {
    directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('dirSelector').textContent = "✓ PASTA CONECTADA";
    document.getElementById('dirSelector').classList.add('ready');
    document.getElementById('btnStart').disabled = false;
};

document.getElementById('btnStart').onclick = () => { 
    isRecording = true; captureLoop(); 
    document.getElementById('btnStart').disabled = true; 
    document.getElementById('btnStop').disabled = false; 
};

document.getElementById('btnStop').onclick = () => { 
    isRecording = false; savePDF(); 
    document.getElementById('btnStart').disabled = false; 
    document.getElementById('btnStop').disabled = true; 
};

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').classList.add('ok');
    updateUI();
}, null, {enableHighAccuracy:true});

setupCameras();
loadKMCSV();
</script>
</body>
</html>
