<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - ESTÁVEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; --glass: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* MODAIS INICIAIS */
        .modal-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { border: 1px solid #333; padding: 30px; border-radius: 12px; max-width: 480px; background: #080808; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .modal-box h2 { color: var(--accent); font-size: 18px; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 6px; cursor: pointer; text-transform: uppercase; width: 100%; }

        /* INTERFACE */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 0.8s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA DE KM (Restauração da Lógica Anterior) */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: var(--placa-verde); padding: 12px 25px; 
            border: 3px solid #fff; border-radius: 8px; z-index: 10; 
        }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -1px; margin: 0; }

        /* INDICADOR DE STATUS (+50% MAIOR) */
        #rec-tag { 
            position: absolute; top: 25px; right: 25px; 
            display: flex; align-items: center; gap: 15px; 
            z-index: 10; opacity: 0; transition: 0.5s;
        }
        #rec-tag span { 
            font-size: 22px; /* Aumentado em 50% */
            font-weight: 800; color: #fff; 
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .dot { 
            width: 20px; height: 20px; /* Aumentado em 50% */
            background: var(--danger); border-radius: 50%; border: 2px solid #fff;
            animation: pulse-simple 1.5s infinite; 
        }
        @keyframes pulse-simple { 
            0% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.3); opacity: 0.5; } 
            100% { transform: scale(1); opacity: 1; } 
        }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; z-index: 100; }
        .btn-ui { border: none; border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 20px 50px; font-size: 13px; background: var(--accent); color: #000; }
        #gear-btn { width: 55px; height: 55px; border-radius: 8px; background: rgba(0,0,0,0.6); border: 1px solid #fff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 2000; padding: 60px 25px; transition: 0.5s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="guide-modal" class="modal-overlay">
    <div class="modal-box">
        <h2>Sistema de Inspeção</h2>
        <p style="margin-bottom:20px; color:#ccc; line-height:1.5;">Selecione a pasta de destino para salvar os relatórios. O sistema calculará o KM automaticamente via GPS.</p>
        <button class="btn-main" onclick="acceptSystem()">Iniciar e Escolher Pasta</button>
    </div>
</div>

<div id="settings-panel">
    <div style="text-align:right; margin-bottom:20px; cursor:pointer;" onclick="toggleSet()">FECHAR ×</div>
    <p>Lente da Câmera:</p>
    <select id="cam-select" onchange="switchCam(this.value)" style="width:100%; padding:10px; margin-top:10px;"></select>
    <p style="margin-top:20px;">Fotos por Lote:</p>
    <input type="number" id="cfg-lote" value="50" style="width:100%; padding:10px;">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">AGUARDANDO GPS...</h1></div>
    <div id="rec-tag"><span>CAPTURANDO</span><div class="dot"></div></div>
    
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-ui" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Gerar Relatório</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function acceptSystem() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('guide-modal').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        initGPS();
        loadCSV();
    } catch(e) { alert("Permissão de pasta é necessária."); }
}

async function listCams() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const vDevs = devs.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = "";
    vDevs.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i + 1}`;
        sel.appendChild(opt);
    });
    initC(vDevs[vDevs.length-1].deviceId); // Tenta a última (geralmente a traseira)
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    currentStream = stream; vid.srcObject = stream;
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function switchCam(id) { initC(id); }

function initCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    loop();
}

function stopCapture() {
    rec = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    savePDF();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ 
        raw: can.toDataURL('image/jpeg', 0.5), 
        km: document.getElementById('km-txt').innerText, 
        ts: new Date().toLocaleString() 
    });
    if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) savePDF();
    setTimeout(loop, 250);
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = [];
    
    // Nome do Arquivo Seguro
    const limpar = (t) => t.replace(/[^0-9]/g, '_');
    const kmI = limpar(items.km);
    const kmF = limpar(items[items.length-1].km);
    const d = new Date();
    const dataStr = `${d.getDate()}_${d.getMonth()+1}`;
    const nome = `Relatorio_KM_${kmI}_ao_${kmF}_Data_${dataStr}.pdf`;

    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, can.height-180, can.width, 180);
                ctx.fillStyle = "#fff"; ctx.font = "bold 60px Arial";
                ctx.fillText(items[i].km, 50, can.height-100);
                ctx.font = "30px Arial"; ctx.fillText(items[i].ts, 50, can.height-50);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(nome, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        });
    } catch(e) { console.log("Erro ao carregar CSV"); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.pow(pt.lt - p.coords.latitude, 2) + Math.pow(pt.ln - p.coords.longitude, 2);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "KM " + n.km;
    }, e => { console.log("Erro GPS"); }, {enableHighAccuracy:true});
}

function wakeUI() {}
</script>
</body>
</html>
