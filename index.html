<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5.5 - ULTRA HORIZONTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #0a8a4d; --accent: #00d9ff; --bg: #05070a; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* MODO HORIZONTAL PRIORITÁRIO */
        @media (orientation: landscape) {
            #app-shell { flex-direction: row; }
            #viewport-container { flex: 1.8; position: relative; border-right: 2px solid #1a1a1a; }
            #sidebar { flex: 0.7; height: 100vh; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; }
        }

        @media (orientation: portrait) {
            #viewport-container { height: 45vh; width: 100%; }
            #sidebar { flex: 1; padding: 10px; }
        }

        #viewport-container { background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; } /* Mantém proporção sem esticar */

        /* Placa flutuante na tela (Visualização) */
        #live-km {
            position: absolute; bottom: 25px; left: 25px;
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            border: 3px solid #fff; border-radius: 10px; padding: 8px 20px;
            font-size: 2.2rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 50; text-shadow: 2px 2px 4px #000;
        }

        /* Sidebar / Painel de Controle */
        #sidebar { padding: 20px; gap: 15px; border-left: 1px solid #222; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.65rem; }
        .st-box { padding: 6px; background: #111; border: 1px solid #333; border-radius: 6px; text-align: center; }
        .st-box.on { border-color: var(--accent); color: var(--accent); }

        .counter-card { background: #1a1f2c; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); }
        .counter-card small { font-size: 0.7rem; color: #888; display: block; margin-bottom: 5px; }
        .counter-card b { font-size: 2rem; color: #fff; }

        .btn { padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-folder { background: var(--gold); color: #000; margin-top: auto; }
        .btn-start { background: #00ff66; color: #000; margin-top: 10px; }
        .btn-stop { background: #ff3333; color: #fff; margin-top: 10px; }
        .btn:disabled { opacity: 0.2; transform: scale(0.95); }

        /* Histórico de Lotes */
        #batch-log { font-size: 0.7rem; background: #000; padding: 10px; border-radius: 8px; max-height: 100px; overflow-y: auto; color: #555; margin-top: 10px; border: 1px solid #111; }

        #settings-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; border: 1px solid #444; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleConfig()">⚙️</div>

<div id="app-shell">
    <div id="viewport-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="live-km">KM --+---</div>
    </div>

    <div id="sidebar">
        <div class="status-grid">
            <div id="st-csv" class="st-box">SNV (OFF)</div>
            <div id="st-gps" class="st-box">GPS (OFF)</div>
        </div>

        <div class="counter-card">
            <small>FOTOS NO LOTE</small>
            <b id="count-buffer">0 / 50</b>
        </div>

        <div class="counter-card" style="border-bottom-color: var(--gold); margin-top: 10px;">
            <small>TOTAL DE FOTOS</small>
            <b id="count-total">0</b>
        </div>

        <div id="batch-log">Aguardando início...</div>

        <div class="btn-stack" style="margin-top: auto; display: flex; flex-direction: column;">
            <button id="btn-dir" class="btn btn-folder">📁 1. DEFINIR PASTA</button>
            <button id="btn-start" class="btn btn-start" disabled>▶ 2. INICIAR</button>
            <button id="btn-stop" class="btn btn-stop" disabled>■ PARAR</button>
        </div>
    </div>
</div>

<canvas id="offscreen-canvas"></canvas>

<script>
let kmData = [], gpsPos = null, recording = false;
let photoTotal = 0, batchBuffer = [], savedBatchesCount = 0;
let folderHandle = null;

const video = document.getElementById('webcam');
const canvas = document.getElementById('offscreen-canvas');
const ctx = canvas.getContext('2d');

/* ======= BOOT & CAMERA ======= */
window.onload = () => {
    initCamera();
    loadSNV();
    startGPS();
};

async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            console.log("Resolução Detectada:", canvas.width, "x", canvas.height);
        };
    } catch(e) { alert("Erro ao acessar câmera traseira."); }
}

/* ======= LOGICA DE POSICIONAMENTO KM ======= */
async function loadSNV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const lines = t.split('\n').filter(l => l.includes(';'));
        const h = lines.shift().split(';').map(v => v.trim().toLowerCase());
        const iKm = h.indexOf('km'), iLat = h.findIndex(x => x.includes('lat')), iLon = h.findIndex(x => x.includes('lon'));
        
        kmData = lines.map(l => {
            const c = l.split(';');
            return { k: c[iKm], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
        
        document.getElementById('st-csv').innerText = "SNV (OK)";
        document.getElementById('st-csv').classList.add('on');
    } catch(e) { document.getElementById('st-csv').innerText = "SNV (ERRO)"; }
}

function updateKM() {
    if(!gpsPos || !kmData.length) return;
    let target = null, dist = Infinity;
    for(const p of kmData) {
        const d = Math.hypot(p.lt - gpsPos.lat, p.ln - gpsPos.lon);
        if(d < dist) { dist = d; target = p; }
    }
    if(target) document.getElementById('live-km').innerText = "KM " + target.k;
}

/* ======= MOTOR DE ESTAMPA (RESOLVE FOTO ESTICADA) ======= */
function drawProfessionalStamp(meta) {
    const w = canvas.width, h = canvas.height;
    ctx.save();
    
    // Proporção Dinâmica: Placa ajusta conforme tamanho da foto
    const plateW = w * 0.25;  // 25% da largura da foto
    const plateH = plateW * 0.35;
    const margin = w * 0.02;  // 2% de margem
    const radius = 15;

    // Fundo da Placa (Estilo Rodoviário)
    ctx.shadowColor = "rgba(0,0,0,0.6)"; ctx.shadowBlur = 20;
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.roundRect(margin, h - plateH - margin, plateW, plateH, radius);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = "#056b3c";
    ctx.beginPath();
    ctx.roundRect(margin + 5, h - plateH - margin + 5, plateW - 10, plateH - 10, radius - 5);
    ctx.fill();

    // Texto KM
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = `900 ${plateH * 0.55}px Arial Black`;
    ctx.fillText("KM " + meta.km, margin + (plateW/2), h - margin - (plateH/2) + (plateH * 0.18));

    // Legenda de Dados (Discreta na lateral)
    ctx.textAlign = "left";
    ctx.font = `bold ${plateH * 0.15}px monospace`;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    const infoX = margin + plateW + 20;
    ctx.fillText(`COORD: ${meta.lat}, ${meta.lon}`, infoX, h - margin - (plateH * 0.4));
    ctx.fillText(`DATA : ${meta.ts}`, infoX, h - margin - (plateH * 0.15));

    ctx.restore();
}

/* ======= SALVAMENTO AUTOMÁTICO & PDF ======= */
async function processBatch() {
    if(!batchBuffer.length || !folderHandle) return;
    const currentBatch = [...batchBuffer];
    batchBuffer = [];
    savedBatchesCount++;
    
    // Feedback no Log
    const log = document.getElementById('batch-log');
    log.innerHTML = `⏳ Salvando Lote ${savedBatchesCount}...<br>` + log.innerHTML;

    const doc = new jspdf.jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
    const pw = 297, ph = 210;

    for(let i=0; i < currentBatch.length; i++) {
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                // Limpa e desenha a foto original no canvas
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                // Aplica a estampa fixa dentro da proporção
                drawProfessionalStamp(currentBatch[i]);
                
                // Cálculo para NÃO ESTICAR no PDF (Mantém aspect ratio)
                const imgRatio = canvas.width / canvas.height;
                let finalW = pw, finalH = pw / imgRatio;
                if(finalH > ph) { finalH = ph; finalW = ph * imgRatio; }
                
                const offsetX = (pw - finalW) / 2;
                const offsetY = (ph - finalH) / 2;

                doc.addImage(canvas.toDataURL('image/jpeg', 0.8), 'JPEG', offsetX, offsetY, finalW, finalH);
                res();
            };
            img.src = currentBatch[i].src;
        });
    }

    try {
        const name = `INSPECAO_LOTE_${savedBatchesCount}_KM_${currentBatch.km}.pdf`;
        const file = await folderHandle.getFileHandle(name, {create:true});
        const stream = await file.createWritable();
        await stream.write(doc.output('blob'));
        await stream.close();
        log.innerHTML = `<span style="color:#00ff66">✓ ${name} Salvo</span><br>` + log.innerHTML;
    } catch(e) {
        log.innerHTML = `<span style="color:red">Erro ao salvar lote!</span><br>` + log.innerHTML;
        doc.save(`Lote_Emergencia_${Date.now()}.pdf`);
    }
}

function capture() {
    if(!recording) return;
    
    // Captura o frame bruto
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    batchBuffer.push({
        src: canvas.toDataURL('image/jpeg', 0.6),
        km: document.getElementById('live-km').innerText.replace('KM ',''),
        lat: gpsPos?.lat.toFixed(6) || "0",
        lon: gpsPos?.lon.toFixed(6) || "0",
        ts: new Date().toLocaleString()
    });

    photoTotal++;
    document.getElementById('count-total').innerText = photoTotal;
    document.getElementById('count-buffer').innerText = `${batchBuffer.length} / 50`;

    if(batchBuffer.length >= 50) processBatch();
    setTimeout(capture, 600); // Intervalo de 0.6s
}

/* ======= INTERFACE & GPS ======= */
document.getElementById('btn-dir').onclick = async () => {
    try {
        folderHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-dir').innerText = "PASTA CONFIGURADA ✓";
        document.getElementById('btn-dir').style.background = "#00ff66";
        document.getElementById('btn-start').disabled = false;
    } catch(e) {}
};

document.getElementById('btn-start').onclick = () => {
    recording = true; capture();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
};

document.getElementById('btn-stop').onclick = () => {
    recording = false; processBatch();
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
};

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        gpsPos = { lat: p.coords.latitude, lon: p.coords.longitude };
        document.getElementById('st-gps').innerText = "GPS (OK)";
        document.getElementById('st-gps').classList.add('on');
        updateKM();
    }, null, {enableHighAccuracy:true});
}

function toggleConfig() { alert("Configurações rápidas: Lote de 50 fotos. Sensor: Traseiro."); }
</script>
</body>
</html>
