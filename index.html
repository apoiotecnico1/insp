<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - ESTRUTURA ORIGINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00ff66; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Visual da Tela de Captura */
        #viewport { position: relative; width: 100vw; height: 45vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmDisplay { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 15px;
            font-size: 3.5rem; font-weight: 900; border: 4px solid #fff;
            margin: 10px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Engrenagem e Painel */
        #settings-trigger {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(0,0,0,0.7); border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--accent);
        }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: rgba(10, 20, 30, 0.95); z-index: 2000; transition: 0.3s; padding: 20px;
        }
        #settings-panel.active { right: 0; }
        
        .setting-item { margin: 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        select, input { background: #111; color: #fff; border: 1px solid var(--accent); padding: 8px; border-radius: 5px; }

        /* Controles Inferiores */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px; }
        .stat-card { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btnStart { background: var(--accent); color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        #btnDir { background: #ffd700; color: #000; grid-column: span 2; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h3>CONFIGURAÇÕES</h3>
    <div class="setting-item">
        <span>Câmera:</span>
        <select id="camSelect" onchange="initCamera(this.value)"></select>
    </div>
    <div class="setting-item">
        <span>Modo Noturno:</span>
        <input type="checkbox" id="cfgNight">
    </div>
    <div class="setting-item">Intervalo (ms): <input type="number" id="cfgDelay" value="500" style="width:70px"></div>
    <div class="setting-item">Fotos p/ PDF: <input type="number" id="cfgBatch" value="100" style="width:70px"></div>
    <button onclick="toggleSettings()" style="width:100%; background:var(--highway-green); color:white; margin-top:20px">VOLTAR</button>
</div>

<div id="viewport"><video id="vid" autoplay playsinline muted></video></div>
<div id="kmDisplay">KM --+---</div>

<div class="stats">
    <div class="stat-card">FOTOS<span id="txtTotal" class="stat-val">0</span></div>
    <div class="stat-card">LOTE<span id="txtBuffer" class="stat-val">0</span></div>
    <div class="stat-card" style="background:#003366">PDFs<span id="txtPdfs" class="stat-val">0</span></div>
</div>

<div class="controls">
    <button id="btnDir">1. SELECIONAR PASTA</button>
    <button id="btnStart" disabled>2. INICIAR</button>
    <button id="btnStop" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null, currentStream = null;
let sKm = "0", eKm = "0";

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// LISTAGEM DE TODAS AS CÂMERAS (DEVICE 1, 2, 3...)
async function getCameras() {
    try { await navigator.mediaDevices.getUserMedia({video: true}); } catch(e){}
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('camSelect');
    sel.innerHTML = cams.map((c, i) => `<option value="${c.deviceId}">Câmera ${i+1} (${c.label.slice(0,10)})</option>`).join('');
    initCamera(sel.value);
}

async function initCamera(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id ? {exact: id} : undefined, width: 1920, height: 1080 } 
    });
    vid.srcObject = currentStream;
}

// ESTÉTICA: PLACA DE RODOVIA NO CANTO DA FOTO
function drawHighwayPlaque(data) {
    const w = can.width, h = can.height;
    const b = h / 1080;
    ctx.save();
    
    // Configurações da Placa
    const pW = 420 * b, pH = 150 * b;
    const pX = 40 * b, pY = h - pH - 40 * b;

    // Fundo Verde Arredondado
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 15 * b;
    ctx.beginPath();
    ctx.roundRect(pX, pY, pW, pH, 15 * b);
    ctx.fillStyle = "#056b3c";
    ctx.fill();

    // Borda Branca (Friso)
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4 * b;
    ctx.strokeRect(pX + 10 * b, pY + 10 * b, pW - 20 * b, pH - 20 * b);

    // Texto KM e Infos
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = `bold ${75 * b}px Arial Narrow`;
    ctx.fillText("KM " + data.km, pX + (pW/2), pY + 80 * b);
    
    ctx.font = `bold ${22 * b}px monospace`;
    ctx.fillText(`LAT:${data.lat} LON:${data.lon}`, pX + (pW/2), pY + 115 * b);
    ctx.font = `${20 * b}px monospace`;
    ctx.fillText(data.ts, pX + (pW/2), pY + 140 * b);
    
    ctx.restore();
}

// LOOP DE CAPTURA ORIGINAL
async function capture() {
    if(!isRecording) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    
    if(document.getElementById('cfgNight').checked) ctx.filter = "brightness(1.2) contrast(1.1)";
    ctx.drawImage(vid, 0, 0);
    ctx.filter = "none";

    const currentKm = document.getElementById('kmDisplay').textContent.replace('KM ', '');
    if(activeBuffer.length === 0) sKm = currentKm;
    eKm = currentKm;

    const info = {
        km: currentKm,
        lat: lastPos ? lastPos.lat.toFixed(6) : "0.0000",
        lon: lastPos ? lastPos.lon.toFixed(6) : "0.0000",
        ts: new Date().toLocaleString()
    };

    drawHighwayPlaque(info);
    activeBuffer.push({ img: can.toDataURL('image/jpeg', 0.8) });
    
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;

    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(capture, parseInt(document.getElementById('cfgDelay').value));
}

// PDF SEM BORDAS (PÁGINA INTEIRA)
async function savePDF() {
    if(!activeBuffer.length || !directoryHandle) return;
    const batch = [...activeBuffer];
    const start = sKm, end = eKm;
    activeBuffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
    const now = new Date();
    const time = `${now.getDate()}-${now.getMonth()+1}_${now.getHours()}h${now.getMinutes()}`;

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        // 297x210 mm é o tamanho total do A4 paisagem
        doc.addImage(batch[i].img, 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
    }

    const fileName = `km${start}-km${end}_${time}.pdf`;
    try {
        const fileHandle = await directoryHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch(e) { doc.save(fileName); }
}

// LÓGICA DE GPS E KM ORIGINAL
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const lines = t.split('\n').slice(1);
        kmDataset = lines.map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(d => !isNaN(d.lat));
    } catch(e) {}
}

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    if(kmDataset.length) {
        let best = null, minDist = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < minDist) { minDist = d; best = pt; }
        });
        if(best) document.getElementById('kmDisplay').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

// UI EVENTS
document.getElementById('btnDir').onclick = async () => {
    directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('btnDir').textContent = "PASTA OK ✓";
    document.getElementById('btnStart').disabled = false;
};
document.getElementById('btnStart').onclick = () => { isRecording = true; capture(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

getCameras(); loadCSV();
</script>
</body>
</html>
