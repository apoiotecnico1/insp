<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Técnica Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* Tela de Entrada */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 25px 60px; font-weight: 900; border-radius: 15px; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; }

        /* App Shell */
        #app-shell { position: relative; width: 100vw; height: 100vh; display: none; }
        #vid { width: 100%; height: 100%; object-fit: cover; background: #111; }

        /* HUD */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 25px; border: 3px solid #fff; border-radius: 8px; z-index: 100; }
        #br-txt { font-size: 0.75rem; font-weight: 800; display: block; border-bottom: 1px solid rgba(255,255,255,0.3); margin-bottom: 2px; }
        #km-txt { font-size: 2.2rem; font-weight: 900; margin: 0; }

        /* Controles */
        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; width: 90%; justify-content: center; z-index: 200; }
        .btn-main { border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; flex-grow: 1; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.1s; }
        canvas { display: none; }
        #no-sleep-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

<video id="no-sleep-video" playsinline muted loop></video>
<div id="flash"></div>

<div id="safety-gate">
    <button class="btn-aware" onclick="initApp()">INICIAR SISTEMA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="manualCapture()"></video>
    
    <div id="km-hud">
        <span id="br-txt">AGUARDANDO GPS...</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="startCapture()">Iniciar Rota</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">Finalizar e Salvar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false;
let buffer = [], kmInicialLote = "";
let curLat = 0, curLon = 0, brAtual = "RODOVIA";
let wakeLock = null;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

// 1. Inicialização
async function initApp() {
    try {
        // Solicita Câmera
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: {ideal: 1280} }, 
            audio: false 
        });
        vid.srcObject = stream;
        
        // Esconde botão inicial e mostra app
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        
        // Ativa Anti-Standby
        enableNoSleep();
        // Inicia GPS e Carrega CSV
        initGPS();
        loadCSV();
        
    } catch (err) {
        alert("Erro: Certifique-se de dar permissão à câmera e usar HTTPS.");
        console.error(err);
    }
}

// 2. Anti-Standby (WakeLock + Vídeo)
async function enableNoSleep() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
    const vs = document.getElementById('no-sleep-video');
    vs.src = "https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3";
    vs.play().catch(()=>{});
}

// 3. GPS e CSV
function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude;
        curLon = p.coords.longitude;
        updateKM();
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const lines = t.split('\n').filter(l => l.includes(';'));
        const headers = lines.shift().split(';').map(h => h.trim().toLowerCase());
        
        const iKm = headers.indexOf('km');
        const iLat = headers.findIndex(h => h.includes('lat'));
        const iLon = headers.findIndex(h => h.includes('lon'));

        kmDB = lines.map(line => {
            const cols = line.split(';');
            return {
                km: cols[iKm],
                lat: parseFloat(cols[iLat]?.replace(',', '.')),
                lon: parseFloat(cols[iLon]?.replace(',', '.'))
            };
        }).filter(d => !isNaN(d.lat));
    } catch (e) { console.warn("CSV não encontrado ou erro na carga."); }
}

function updateKM() {
    if (!kmDB.length) return;
    let closest = null, minD = Infinity;
    kmDB.forEach(pt => {
        const d = Math.hypot(pt.lat - curLat, pt.lon - curLon);
        if (d < minD) { minD = d; closest = pt; }
    });
    if (closest) {
        document.getElementById('km-txt').innerText = "Km " + closest.km;
        document.getElementById('br-txt').innerText = "BR-116"; // Ou dinâmico se houver no CSV
    }
}

// 4. Captura
function startCapture() {
    capturing = true;
    buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    loop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) generatePDF();
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
}

function loop() {
    if (!capturing) return;
    
    can.width = vid.videoWidth;
    can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-txt').innerText,
        ts: new Date().toLocaleTimeString()
    });

    if (buffer.length >= 50) {
        generatePDF();
        buffer = [];
    }
    setTimeout(loop, 500); // 2 fotos por segundo
}

async function manualCapture() {
    const f = document.getElementById('flash');
    f.style.opacity = '1';
    setTimeout(() => f.style.opacity = '0', 100);
    
    can.width = vid.videoWidth;
    can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    // Download direto da foto
    const link = document.createElement('a');
    link.download = `FOTO_${Date.now()}.jpg`;
    link.href = can.toDataURL('image/jpeg', 0.9);
    link.click();
}

// 5. PDF (Download automático para mobile)
async function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    
    for (let i = 0; i < buffer.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(buffer[i].img, 'JPEG', 10, 10, 277, 160);
        doc.setFontSize(14);
        doc.text(`${buffer[i].km} - ${buffer[i].ts}`, 15, 185);
    }
    
    doc.save(`Relatorio_KM_${kmInicialLote}.pdf`);
}
</script>
</body>
</html>
