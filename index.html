<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE ENGINE | GPS Precision & Tracking</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0b0e14;
            --slate: #1c2128;
            --accent: #00ff88;
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #e6edf3; margin: 0; padding: 10px; }
        .app { max-width: 900px; margin: auto; }

        /* Monitor de GPS em Tempo Real */
        .gps-monitor {
            background: linear-gradient(145deg, #1c2128, #0d1117);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .km-display { text-align: center; flex: 1; }
        .km-value { font-size: 3.5rem; font-weight: 900; color: var(--gold); font-family: 'Courier New', monospace; line-height: 1; }
        .geo-info { font-size: 0.7rem; opacity: 0.6; font-family: monospace; }
        
        .status-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }

        /* Painel de Entrada */
        .control-panel { background: var(--slate); padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Botão de Ação */
        .btn-main { width: 100%; padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-start { background: var(--gold); color: black; }
        .btn-stop { background: #f85149; color: white; }

        .history { margin-top: 20px; width: 100%; border-collapse: collapse; }
        .history th { text-align: left; color: var(--gold); font-size: 0.8rem; padding: 10px; border-bottom: 1px solid var(--gold); }
        .history td { padding: 10px; border-bottom: 1px solid #30363d; font-size: 0.9rem; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="app">
    <div class="gps-monitor">
        <div style="flex:1">
            <span class="status-dot"></span>
            <small style="color:var(--accent); font-weight:bold;">GPS ATIVO</small>
            <div class="geo-info" id="coords">Lat: -- | Lon: --</div>
        </div>
        <div class="km-display">
            <small>KM ATUAL (ESTIMADO)</small>
            <div class="km-value" id="liveKM">---</div>
        </div>
        <div style="flex:1; text-align:right;">
            <button onclick="getLocation()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.7rem;">CALIBRAR GPS</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <div>
                <label><small>CONFIRMAR KM DO MARCO</small></label>
                <input type="text" id="manualKM" placeholder="Ex: 145+500">
            </div>
            <div>
                <label><small>SENTIDO</small></label>
                <select id="sentido">
                    <option value="Norte">Norte (SP)</option>
                    <option value="Sul">Sul (RJ)</option>
                    <option value="Interno">Interno/Base</option>
                </select>
            </div>
        </div>

        <textarea id="desc" rows="3" placeholder="Descreva a operação técnica aqui..."></textarea>
        
        <div id="timer" style="text-align:center; font-size:2rem; margin:10px; font-family:monospace; color:var(--gold);">00:00:00</div>
        
        <button id="mainBtn" class="btn-main btn-start" onclick="handleOp()">Iniciar Registro</button>
    </div>

    <table class="history">
        <thead>
            <tr>
                <th>KM</th>
                <th>HORÁRIO</th>
                <th>OPERAÇÃO</th>
                <th>COORDENADAS</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="sendWA()" style="flex:2; background:#238636; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">ENVIAR RELATÓRIO WHATSAPP</button>
        <button onclick="clearData()" style="flex:1; background:#30363d; color:white; border:none; padding:15px; border-radius:10px; cursor:pointer;">LIMPAR</button>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('gps_logs')) || [];
    let start = localStorage.getItem('gps_start') ? new Date(localStorage.getItem('gps_start')) : null;
    let timerId;
    let watchId;

    // Inicia monitoramento de GPS ao carregar
    window.onload = () => {
        initGPS();
        render();
        if(start) startUI();
    };

    function initGPS() {
        if ("geolocation" in navigator) {
            watchId = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude.toFixed(5);
                const lon = pos.coords.longitude.toFixed(5);
                document.getElementById('coords').innerText = `Lat: ${lat} | Lon: ${lon}`;
                
                // Lógica de "Sugestão de KM" (Apenas para exibir movimento)
                // Aqui você pode integrar uma API de quilometragem real da rodovia se disponível
                document.getElementById('liveKM').innerText = (Math.abs(lat) * 10).toFixed(0); 
            }, err => {
                console.error("Erro GPS:", err);
            }, { enableHighAccuracy: true });
        }
    }

    function handleOp() {
        const btn = document.getElementById('mainBtn');
        if(!start) {
            start = new Date();
            localStorage.setItem('gps_start', start.toISOString());
            startUI();
        } else {
            const entry = {
                km: document.getElementById('manualKM').value || document.getElementById('liveKM').innerText,
                sentido: document.getElementById('sentido').value,
                desc: document.getElementById('desc').value || "Operação Técnica",
                coords: document.getElementById('coords').innerText,
                inicio: start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fim: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                total: document.getElementById('timer').innerText
            };
            logs.push(entry);
            localStorage.setItem('gps_logs', JSON.stringify(logs));
            start = null;
            localStorage.removeItem('gps_start');
            location.reload();
        }
    }

    function startUI() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "Finalizar e Salvar Local";
        btn.className = "btn-main btn-stop";
        timerId = setInterval(() => {
            const diff = new Date(new Date() - start);
            document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    function render() {
        const body = document.getElementById('logBody');
        body.innerHTML = logs.map(l => `
            <tr>
                <td style="color:var(--gold); font-weight:bold;">KM ${l.km}</td>
                <td>${l.inicio} - ${l.fim}</td>
                <td>${l.desc}</td>
                <td style="font-size:0.6rem; opacity:0.5;">${l.coords}</td>
            </tr>
        `).reverse().join('');
    }

    function sendWA() {
        let t = `*RELATÓRIO TÉCNICO COM EVIDÊNCIA GPS*\n\n`;
        logs.forEach(l => {
            t += `📍 *KM ${l.km} (${l.sentido})*\n🛠 ${l.desc}\n🕒 ${l.inicio} às ${l.fim}\n🌎 ${l.coords}\n\n`;
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    function clearData() { if(confirm("Zerar dia?")) { localStorage.clear(); location.reload(); } }
</script>

</body>
</html>
