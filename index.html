<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom - Inspeção de Fibra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --fiber-ccr: #004a99; --fiber-claro: #ee1d23; --glass: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* Gate de Segurança */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 30px; border-radius: 20px; text-align: center; background: #0a0a0a; max-width: 90%; border-top: 4px solid var(--accent); }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 40px; font-weight: 900; border-radius: 12px; cursor: pointer; margin-top: 20px; width: 100%; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD Técnico */
        #tech-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.7); padding: 15px; 
            border-radius: 12px; border-left: 5px solid var(--accent);
            z-index: 100; backdrop-filter: blur(10px); min-width: 180px;
        }
        #km-txt { font-size: 2rem; font-weight: 900; color: #fff; display: block; }
        #gps-txt { font-size: 0.7rem; color: var(--accent); font-family: monospace; }

        /* Seletor de Equipe Ativa */
        #team-selector {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .team-btn { 
            padding: 10px 15px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2);
            font-size: 0.7rem; font-weight: bold; color: #fff; background: rgba(0,0,0,0.6); cursor: pointer;
        }
        .team-btn.active[data-team="CCR"] { background: var(--fiber-ccr); border-color: #fff; }
        .team-btn.active[data-team="CLARO"] { background: var(--fiber-claro); border-color: #fff; }

        #rec-tag { 
            position: absolute; top: 150px; left: 20px; 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,0,0,0.2); padding: 8px 15px; 
            border-radius: 20px; opacity: 0; pointer-events: none; z-index: 100;
        }
        .dot { width: 10px; height: 10px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Controles Inferiores */
        #ui-controls { 
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 500; 
        }
        .btn-main { border: none; height: 70px; border-radius: 15px; font-weight: 900; cursor: pointer; }
        #btn-capture { width: 70px; background: #fff; border: 5px solid rgba(0,0,0,0.2); border-radius: 50%; }
        #btn-start { background: var(--accent); color: #000; padding: 0 40px; }
        #btn-stop { background: #f44; color: #fff; padding: 0 40px; display: none; }
        #gear-btn { width: 60px; background: rgba(255,255,255,0.1); color: #fff; font-size: 24px; }

        /* Painel Ajustes */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); z-index: 4000; padding: 60px 25px; transition: 0.4s; }
        #settings-panel.open { right: 0; }
        #settings-panel label { display: block; margin-top: 15px; font-size: 0.7rem; color: var(--accent); font-weight: bold; }
        #settings-panel input, #settings-panel select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-top: 5px; }

        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent);">ANGSTROM</h2>
        <p style="margin: 15px 0; font-size: 0.9rem;">Inspeção Técnica de Fibras (CCR & CLARO)</p>
        <button class="btn-aware" onclick="startApp()">INICIAR CONSOLE</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:30px;">← VOLTAR</div>
    <label>Câmera de Inspeção</label>
    <select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Técnico Fiber Tech</label>
    <input type="text" id="cfg-tec-ccr" value="Equipe Fiber Tech">
    <label>Técnico Claro</label>
    <input type="text" id="cfg-tec-claro" value="Equipe Claro">
    <label>Velocidade Captura (ms)</label>
    <input type="number" id="cfg-int" value="500">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="tech-hud">
        <span id="km-txt">Km ---</span>
        <span id="gps-txt">Aguardando GPS...</span>
    </div>

    <div id="team-selector">
        <button class="team-btn active" data-team="CCR" onclick="setTeam('CCR')">FIBRA CCR</button>
        <button class="team-btn" data-team="CLARO" onclick="setTeam('CLARO')">FIBRA CLARO</button>
    </div>

    <div id="rec-tag"><div class="dot"></div><span id="rec-msg">REGISTRANDO LOTE...</span></div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-main" onclick="toggleSet()">⚙</button>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR LOTE</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">GERAR PDF</button>
        <button id="btn-capture" class="btn-main" onclick="takeManualPhoto()"></button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let activeTeam = "CCR", buffer = [];
let curLat = "0.0000", curLon = "0.0000";
let wakeLock = null;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        listCams(); loadCSV(); initGPS();
    } catch(e) { alert("Selecione uma pasta para salvar os laudos."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function setTeam(team) {
    activeTeam = team;
    document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.team-btn[data-team="${team}"]`).classList.add('active');
}

async function takeManualPhoto() {
    if(!hDir) return;
    const flash = document.getElementById('flash');
    flash.style.opacity = "0.5"; setTimeout(() => flash.style.opacity = "0", 100);
    
    const km = document.getElementById('km-txt').innerText;
    const tec = activeTeam === "CCR" ? document.getElementById('cfg-tec-ccr').value : document.getElementById('cfg-tec-claro').value;
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, tec, activeTeam);
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.90));
    const fileName = `INSPECAO_${activeTeam}_${km.replace(' ','_')}_${Date.now()}.jpg`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob); await writable.close();
}

function drawStamp(km, tec, team) {
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    ctx.fillStyle = team === "CCR" ? "#00aaff" : "#ff4444";
    ctx.fillRect(0, can.height - bh, 15, bh);

    ctx.fillStyle = "#fff";
    ctx.font = `bold ${bh * 0.3}px Arial`;
    ctx.fillText(`INSPEÇÃO FIBRA ${team} | ${km}`, 30, can.height - (bh * 0.6));
    
    ctx.font = `${bh * 0.2}px Arial`;
    ctx.fillText(`Técnico: ${tec} | GPS: ${curLat}, ${curLon} | ${new Date().toLocaleString()}`, 30, can.height - (bh * 0.25));
}

function startCapture() {
    capturing = true;
    buffer = [];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer]);
    buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    const km = document.getElementById('km-txt').innerText;
    const tec = activeTeam === "CCR" ? document.getElementById('cfg-tec-ccr').value : document.getElementById('cfg-tec-claro').value;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    drawStamp(km, tec, activeTeam);

    buffer.push({ 
        img: can.toDataURL('image/jpeg', 0.6), 
        name: `FIBRA_${activeTeam}_${km}`
    });

    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 500);
}

async function savePDF(dataList) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(dataList[i].img, 'JPEG', 0, 0, pw, ph);
    }
    
    const fileName = `LAUDO_FIBRA_${activeTeam}_${Date.now()}.pdf`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); 
        curLon = p.coords.longitude.toFixed(6);
        document.getElementById('gps-txt').innerText = `${curLat}, ${curLon}`;
        
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) document.getElementById('km-txt').innerText = "Km " + best.km;
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('km-txt').innerText = "Erro CSV"; }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
