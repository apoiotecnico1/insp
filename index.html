<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA ELITE PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* TELA DE BLOQUEIO INICIAL */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 2px solid var(--danger); padding: 30px; border-radius: 15px; max-width: 500px; background: #111; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .alert-box h2 { color: var(--danger); margin-bottom: 20px; font-size: 1.4rem; }
        .warn-text { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: left; border-left: 5px solid var(--accent); }
        .warn-text p { font-size: 14px; line-height: 1.6; color: #eee; margin-bottom: 10px; }
        .btn-setup { width: 100%; background: var(--accent); color: #000; border: none; padding: 22px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 16px; }

        /* INTERFACE DO APP */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 12px 25px; border: 2px solid #fff; border-radius: 10px; z-index: 10; pointer-events: none; }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        #rec-indicator { position: absolute; top: 20px; right: 20px; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .dot { width: 14px; height: 14px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui-controls { position: absolute; bottom: 50px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100; }
        .btn-main { border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 20px 45px; font-size: 16px; background: var(--accent); color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>⚠️ SEGURANÇA E DESTINO</h2>
        <div class="warn-text">
            <p><strong>1. PASSAGEIRO:</strong> O uso pelo motorista é proibido.</p>
            <p><strong>2. PASTA:</strong> Você deve escolher a pasta de destino agora para permitir o salvamento automático.</p>
            <p><strong>3. PERMISSÃO:</strong> Clique em "Permitir" quando o navegador perguntar para salvar sem interrupções.</p>
        </div>
        <button class="btn-setup" onclick="requestFolder()">Ciente e Escolher Pasta</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-indicator"><div class="dot"></div><span style="font-weight:900; letter-spacing:1px;">GRAVANDO</span></div>
    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="initCapture(); event.stopPropagation();">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture(); event.stopPropagation();">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// ESCONDE BARRA DE NAVEGAÇÃO
function forceFull() {
    const el = document.documentElement;
    if (el.requestFullscreen) {
        el.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
    }
}

// PASSO 1: FORÇA ESCOLHA DA PASTA
async function requestFolder() {
    try {
        if (!window.showDirectoryPicker) {
            alert("Erro: Use o Chrome no Android/Windows para salvamento direto.");
            return;
        }
        // Abre o seletor de pasta do sistema
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        
        // Se chegou aqui, o usuário deu a permissão
        startApp();
    } catch (e) {
        alert("Atenção: Você precisa selecionar uma pasta e clicar em 'Permitir' para o app funcionar sem travar a direção.");
    }
}

// PASSO 2: INICIA CÂMERA E GPS SÓ APÓS A PASTA
async function startApp() {
    forceFull();
    document.getElementById('safety-gate').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    
    const devices = await navigator.mediaDevices.enumerateDevices();
    const backCam = devices.find(d => d.label.toLowerCase().includes('back')) || devices.filter(d => d.kind==='videoinput').pop();
    
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: backCam.deviceId, width: 1280, height: 720 } 
    });
    vid.srcObject = currentStream;
    
    loadCSV();
    initGPS();
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-indicator').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) saveDirectly([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    rec = false; buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        can.width = vid.videoWidth; can.height = vid.videoHeight;
        ctx.drawImage(vid, 0, 0);
        const curKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        buffer.push({ raw: can.toDataURL('image/jpeg', 0.4), km: curKm, ts: new Date().toLocaleTimeString('pt-BR') });
        
        if(buffer.length >= 200) {
            saveDirectly([...buffer], kmInicialLote, curKm);
            buffer = []; kmInicialLote = curKm;
        }
    }
    setTimeout(loop, 200);
}

// SALVAMENTO TOTALMENTE INVISÍVEL
async function saveDirectly(data, ini, fim) {
    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-bh, can.width, bh);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${bh*0.4}px Arial`;
                ctx.fillText(`Km ${data[i].km}`, 40, can.height-(bh*0.45));
                ctx.font = `${bh*0.2}px Arial`;
                ctx.fillText(`${new Date().toLocaleDateString('pt-BR')} | ${data[i].ts}`, 40, can.height-(bh*0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph); r();
            };
            img.src = data[i].raw;
        });
    }

    const d = new Date();
    const pad = (n) => n.toString().padStart(2, '0');
    const dt = pad(d.getDate()) + pad(d.getMonth()+1) + d.getFullYear().toString().slice(-2);
    const hr = pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
    
    // NOME: Relat_...
    const nome = `Relat_KM_${ini}_a_${fim}_${dt}_${hr}.pdf`.replace(/[\s\+]/g, '_');

    try {
        const fileHandle = await dirHandle.getFileHandle(nome, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (e) {
        console.warn("Erro no salvamento direto. Verifique as permissões da pasta.");
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "Km " + b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
