<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura Pro - Proporção Real</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: rgba(0, 77, 33, 0.85); 
            --danger: #ff4444; 
            --glass: rgba(15, 15, 15, 0.95); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; background: #0a0a0a; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 800; border-radius: 12px; cursor: pointer; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: contain; background: #111; }

        /* HUD KM */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: var(--placa-verde); padding: 10px 20px; 
            border-radius: 10px; z-index: 100; border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px); text-align: center;
        }
        #br-txt { font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.8); display: block; }
        #km-txt { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; }

        /* STATUS PDF */
        #rec-tag { 
            position: absolute; top: 25px; right: 25px; display: flex; align-items: center; gap: 8px; 
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 30px; opacity: 0; z-index: 100;
        }
        #rec-tag span { font-size: 0.65rem; font-weight: 800; color: #fff; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; }
        .btn-main { border: none; padding: 18px 45px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 150px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.15); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(25px); z-index: 4000; padding: 60px 25px; transition: 0.4s; }
        #settings-panel.open { right: 0; }
        #settings-panel label { display: block; margin-top: 15px; font-size: 0.7rem; color: var(--accent); font-weight: bold; }
        #settings-panel input, #settings-panel select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-top: 5px; }

        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:15px;">SISTEMA PROFISSIONAL</h2>
        <button class="btn-aware" onclick="startApp()">ATIVAR CÂMERA</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:#fff; cursor:pointer; margin-bottom:25px;">✕ FECHAR</div>
    <label>DISPOSITIVO</label>
    <select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>INTERVALO (ms)</label>
    <input type="number" id="cfg-int" value="300">
    <label>FOTOS POR LOTE</label>
    <input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>
    <div id="km-hud"><span id="br-txt">BR ---</span><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>PDF EM ANDAMENTO...</span></div>
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">Iniciar</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let kmInicialLote = "", buffer = [], brGlobal = "---";
let curLat = "0.0000", curLon = "0.0000";
let wakeLock = null;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');
const flashDiv = document.getElementById('flash');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        listCams(); loadCSV(); initGPS();
    } catch(e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => {
        // Ajusta o canvas exatamente para a resolução nativa da câmera
        can.width = vid.videoWidth;
        can.height = vid.videoHeight;
    };
}

function stampProfessional(br, km) {
    const s = can.height / 1080;
    
    // Placa superior (Escalada)
    const pw = 180 * s, ph = 90 * s;
    ctx.save();
    ctx.fillStyle = "rgba(0, 77, 33, 0.9)";
    ctx.beginPath(); ctx.roundRect(30*s, 30*s, pw, ph, 8*s); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1*s; ctx.stroke();
    
    ctx.textAlign = "center"; ctx.fillStyle = "#fff";
    ctx.font = `bold ${20*s}px Arial`; ctx.fillText("BR " + br, 30*s + pw/2, 30*s + 30*s);
    ctx.font = `900 ${45*s}px Arial`; ctx.fillText("Km " + km, 30*s + pw/2, 30*s + ph - 15*s);

    // Legenda inferior Discreta
    const bh = 45 * s;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.textAlign = "left"; ctx.font = `${16 * s}px Monospace`;
    ctx.fillStyle = "#fff";
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | LAT: ${curLat} LON: ${curLon}`, 20*s, can.height - (bh/2) + (6*s));
    ctx.restore();
}

async function takeManualPhoto() {
    if(!hDir) return;
    flashDiv.style.opacity = "0.3"; setTimeout(() => flashDiv.style.opacity = "0", 100);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    
    // Captura com proporção original
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    stampProfessional(brGlobal, km);

    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fh = await hDir.getFileHandle(`BR${brGlobal}_Km${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

async function captureLoop() {
    if (!capturing) return;
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    stampProfessional(brGlobal, km);
    buffer.push(can.toDataURL('image/jpeg', 0.75));
    
    if (buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) {
        savePDF([...buffer], kmInicialLote, km);
        buffer = []; kmInicialLote = km;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 300);
}

async function savePDF(imgs, k1, k2) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();

    for (let i = 0; i < imgs.length; i++) {
        if (i > 0) doc.addPage();
        
        // Mantém a proporção original da foto no PDF
        const imgProps = doc.getImageProperties(imgs[i]);
        const ratio = imgProps.width / imgProps.height;
        let printW = pageWidth;
        let printH = pageWidth / ratio;

        if (printH > pageHeight) {
            printH = pageHeight;
            printW = pageHeight * ratio;
        }

        const x = (pageWidth - printW) / 2;
        const y = (pageHeight - printH) / 2;

        doc.addImage(imgs[i], 'JPEG', x, y, printW, printH);
    }
    
    const filename = `RELATORIO_BR${brGlobal}_KM_${k1}_${k2}.pdf`;
    const fh = await hDir.getFileHandle(filename, { create: true });
    const sw = await fh.createWritable();
    await sw.write(doc.output('blob')); await sw.close();
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brGlobal = best.br;
            document.getElementById('br-txt').innerText = "BR " + brGlobal;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iB = h.indexOf('br'), iK=h.indexOf('km'), iLt=h.findIndex(x=>x.includes('lat')), iLn=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[iB], km: c[iK], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function handleTouch() {
    takeManualPhoto();
    document.getElementById('ui-controls').style.opacity = "1";
}
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
