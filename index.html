<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>INSPEÇÃO PRO - FLUIDO</title>
    <style>
        :root { --p: #007934; --a: #ffcc00; --w: #25D366; --d: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* Splash Screen de Alta Performance */
        #gate { 
            position: fixed; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .start-btn { 
            background: var(--a); color: #000; border: none; padding: 25px 80px; 
            font-size: 2rem; font-weight: 900; border-radius: 15px; cursor: pointer;
            box-shadow: 0 0 50px rgba(255,204,0,0.3); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        /* App Layout */
        #app { position: relative; width: 100%; height: 100%; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* HUD Técnico - Contraste Extremo */
        #hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--p); border: 4px solid #fff; padding: 15px 30px; 
            border-radius: 12px; z-index: 100; pointer-events: none;
        }
        #br-tag { font-size: 1rem; font-weight: bold; color: var(--a); display: block; }
        #km-display { font-size: 5.5rem; font-weight: 900; line-height: 1; letter-spacing: -3px; }
        
        /* Indicadores de Status */
        #status-bar {
            position: absolute; bottom: 20px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px;
            font-family: monospace; font-size: 12px; border: 1px solid #444;
        }

        /* Botão de Disparo WhatsApp - Área de Toque Ampliada */
        #snap-trigger { 
            position: absolute; bottom: 40px; right: 30px;
            width: 140px; height: 140px; background: var(--w); 
            border-radius: 50%; border: 8px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 500;
        }
        #snap-trigger img { width: 60px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        #snap-trigger span { font-weight: 900; font-size: 14px; margin-top: 5px; color: #fff; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <h1 style="margin-bottom:30px; letter-spacing:2px;">INSPEÇÃO RODOVIÁRIA</h1>
    <button class="start-btn" onclick="bootSystem()">INICIAR AGORA</button>
</div>

<div id="app">
    <video id="v" autoplay playsinline muted></video>
    
    <div id="hud">
        <span id="br-tag">RODOVIA</span>
        <h1 id="km-display">Km ---</h1>
    </div>

    <div id="status-bar">
        LAT: <span id="lat">0.0000</span> | LON: <span id="lon">0.0000</span><br>
        PRECISÃO: <span id="acc">0</span>m | SAT: <span id="sat">OK</span>
    </div>

    <div id="snap-trigger" onclick="actionCapture()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        <span>ENVIAR</span>
    </div>
</div>

<canvas id="c"></canvas>

<script>
    // Configurações de Performance
    const CONFIG = {
        updateRate: 1000, // GPS refresh
        imageQuality: 0.7, // Balanço entre nitidez e peso
        whatsappNum: "5511999999999", // Altere aqui
        csvPath: 'SNVBR116SPRJ.csv'
    };

    let db = [], lat = 0, lon = 0, stream;
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d', { willReadFrequently: true });

    async function bootSystem() {
        // 1. Fullscreen Imediato e Bloqueio de Orientação
        try {
            const doc = document.documentElement;
            if (doc.requestFullscreen) await doc.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        } catch(e) {}

        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        initCamera();
        initData();
        initGPS();
    }

    async function initCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } } 
            });
            v.srcObject = stream;
            v.onloadedmetadata = () => { 
                c.width = v.videoWidth; 
                c.height = v.videoHeight;
                ctx.imageSmoothingEnabled = false; // Ganho de performance
            };
        } catch (e) {
            setTimeout(initCamera, 1000); // Tenta novamente se falhar
        }
    }

    async function initData() {
        try {
            const r = await fetch(CONFIG.csvPath);
            const t = await r.text();
            
            // Auto-detect BR
            if(t.includes("BR-116")) document.getElementById('br-tag').innerText = "BR-116 / RJ";
            else if(t.includes("BR-101")) document.getElementById('br-tag').innerText = "BR-101 / RJ";

            const lines = t.split('\n').slice(1);
            db = lines.map(line => {
                const cols = line.split(';');
                if (cols.length < 3) return null;
                return { km: cols[0], lat: parseFloat(cols[1].replace(',','.')), lon: parseFloat(cols[2].replace(',','.')) };
            }).filter(i => i && !isNaN(i.lat));
        } catch(e) { console.error("Erro CSV"); }
    }

    function initGPS() {
        navigator.geolocation.watchPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            
            document.getElementById('lat').innerText = lat.toFixed(5);
            document.getElementById('lon').innerText = lon.toFixed(5);
            document.getElementById('acc').innerText = pos.coords.accuracy.toFixed(0);

            findNearestKM();
        }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    // Busca de vizinhos otimizada (Algoritmo de distância euclidiana rápida)
    function findNearestKM() {
        if (!db.length) return;
        let minD = Infinity, nearest = db[0];
        
        // Loop otimizado
        for (let i = 0; i < db.length; i++) {
            const d = (db[i].lat - lat)**2 + (db[i].lon - lon)**2;
            if (d < minD) { minD = d; nearest = db[i]; }
        }
        
        const kmDisplay = document.getElementById('km-display');
        if (kmDisplay.innerText !== "Km " + nearest.km) {
            kmDisplay.innerText = "Km " + nearest.km;
        }
    }

    async function actionCapture() {
        const km = document.getElementById('km-display').innerText;
        const info = `${new Date().toLocaleTimeString()} | LAT:${lat.toFixed(5)} LON:${lon.toFixed(5)}`;

        // Renderização ultra-rápida
        ctx.drawImage(v, 0, 0);
        
        // Overlay de Informação
        const h = c.height * 0.15;
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, c.height - h, c.width, h);
        
        ctx.fillStyle = var(--a);
        ctx.font = `bold ${h * 0.4}px sans-serif`;
        ctx.fillText("INSPEÇÃO: " + km, 30, c.height - (h * 0.45));
        
        ctx.fillStyle = "#fff";
        ctx.font = `${h * 0.15}px monospace`;
        ctx.fillText(info, 30, c.height - (h * 0.2));

        // Envio Fluido
        c.toBlob(async (blob) => {
            try {
                await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                window.location.href = `https://wa.me/${CONFIG.whatsappNum}`;
            } catch (err) {
                // Fallback para compartilhamento nativo se o clipboard falhar
                const file = new File([blob], "inspecao.png", {type: "image/png"});
                navigator.share({ files: [file] }).catch(()=>{});
            }
        }, 'image/png');
    }
</script>
</body>
</html>
