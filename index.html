<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO FOTOGRÁFICA - COSMIC EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --glass: rgba(5, 5, 5, 0.92); --cosmic: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* Splash Screen Hipnótico / Cinema */
        #splash { position: fixed; inset: 0; background: var(--cosmic); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Partículas Magnéticas (Simuladas) */
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.3; animation: float 20s infinite linear; }
        @keyframes float { from { transform: translateY(0) rotate(0deg); } to { transform: translateY(-100vh) rotate(360deg); } }

        /* Título Cinematográfico */
        .cinema-title { font-size: 10px; font-weight: 200; letter-spacing: 15px; text-transform: uppercase; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); animation: emerge 4s forwards; opacity: 0; text-align: center; line-height: 2; }
        .cinema-title b { color: var(--accent); font-weight: 300; letter-spacing: 18px; }

        @keyframes emerge { 0% { opacity: 0; transform: scale(0.8) translateZ(-100px); filter: blur(10px); } 100% { opacity: 1; transform: scale(1) translateZ(0); filter: blur(0); } }

        /* Orbe de Atração Magnética */
        .magnetic-orbe { width: 100px; height: 100px; border: 1px solid rgba(255,204,0,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 50px; position: relative; transition: 0.5s; box-shadow: 0 0 30px rgba(255,204,0,0.1); }
        .magnetic-orbe::after { content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 1px solid var(--accent); opacity: 0.5; animation: ripple 2s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.6); opacity: 0; } }
        .magnetic-orbe span { font-size: 24px; color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }

        /* Interface Principal */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 2s; }
        #cam-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI de Operação */
        #km-display { position: absolute; top: 30px; left: 30px; background: var(--safety); padding: 18px 35px; border-radius: 5px; border-left: 10px solid #fff; font-size: 2.5rem; font-weight: 900; z-index: 10; box-shadow: 0 25px 60px rgba(0,0,0,1); }
        #gear-btn { position: absolute; top: 30px; right: 30px; width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #222; z-index: 20; color: #444; }

        #bottom-ctrl { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 40px; width: 92%; max-width: 550px; background: var(--glass); padding: 18px 40px; border-radius: 80px; backdrop-filter: blur(30px); border: 1px solid #222; z-index: 20; justify-content: space-between; }
        .stat-group b { font-size: 1.4rem; color: #fff; display: block; }
        .stat-group small { font-size: 9px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }

        .btn-main { border: none; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 20px 50px; font-size: 12px; background: var(--accent); color: #000; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(255,204,0,0.2); }
        #btn-stop { background: #d00; color: #fff; display: none; }

        /* Menu Oculto */
        #settings { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #050505; z-index: 500; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); padding: 60px 30px; border-left: 1px solid var(--accent); }
        #settings.open { right: 0; }
        .set-row { margin-bottom: 30px; }
        label { display: block; font-size: 9px; color: var(--accent); margin-bottom: 10px; font-weight: bold; letter-spacing: 2px; }
        select, input { width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; padding: 15px; border-radius: 5px; }

        canvas { display: none; }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--glass); padding: 30px 50px; border-radius: 10px; border: 1px solid var(--accent); z-index: 2000; display: none; text-align: center; font-weight: 200; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body onclick="launchSystem()">

<div id="splash">
    <div id="stars-container"></div>
    <div class="cinema-title">
        INSPEÇÃO<br>
        <b>FOTOGRÁFICA</b>
    </div>
    <div class="magnetic-orbe">
        <span>✦</span>
    </div>
    <p style="color: #333; font-size: 9px; margin-top: 40px; letter-spacing: 4px; text-transform: uppercase;">Acesse o Infinito</p>
</div>

<div id="toast">SINCRONIZANDO REPOSITÓRIO...</div>

<div id="settings">
    <div onclick="toggleSet()" style="color:#333; cursor:pointer; margin-bottom:50px; font-size:10px; letter-spacing:2px;">[ VOLTAR AO VAZIO ]</div>
    <div class="set-row"><label>CONEXÃO ÓPTICA</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="set-row"><label>FREQUÊNCIA DE CAPTURA</label><input type="number" id="cfg-int" value="200"></div>
    <div class="set-row"><label>VOLUME DO LOTE</label><input type="number" id="cfg-lote" value="200"></div>
</div>

<div id="app-shell">
    <div id="cam-container">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-display">Km ---+---</div>
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>
        <div id="bottom-ctrl">
            <div class="stat-group"><small>Fotos</small><b id="stat-batch">0</b></div>
            <button id="btn-action" class="btn-main">Iniciar</button>
            <button id="btn-stop" class="btn-main">Concluir</button>
            <div class="stat-group"><small>Geral</small><b id="stat-total">0</b></div>
        </div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null, currentStream = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

// Gerar estrelas magnéticas no Splash
const starsContainer = document.getElementById('stars-container');
for(let i=0; i<50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random() * 3 + 'px';
    star.style.height = star.style.width;
    star.style.left = Math.random() * 100 + 'vw';
    star.style.top = Math.random() * 100 + 'vh';
    star.style.animationDuration = (Math.random() * 10 + 10) + 's';
    starsContainer.appendChild(star);
}

async function launchSystem() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
    }
    const splash = document.getElementById('splash');
    if(splash) {
        splash.style.transform = 'scale(2)';
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.remove();
            const shell = document.getElementById('app-shell');
            shell.style.visibility = 'visible';
            shell.style.opacity = '1';
        }, 1500);
    }
}

window.onload = () => { loadCSV(); initG(); listCams(); };

async function listCams() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        stream.getTracks().forEach(t => t.stop());
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `Lente Pericial ${i + 1}`;
            sel.appendChild(opt);
        });
        if(videoDevices.length > 0) initC(videoDevices.deviceId);
    } catch(e) {}
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(track => track.stop());
    const constraints = { video: { deviceId: id ? { exact: id } : undefined, width: { ideal: 1920 }, height: { ideal: 1080 } } };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream; vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
    } catch (err) {
        const fallback = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id } });
        currentStream = fallback; vid.srcObject = fallback;
    }
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-display').innerText = "Km " + n.km;
}

function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    const barH = h * 0.15;
    const grd = ctx.createLinearGradient(0, h - barH, 0, h);
    grd.addColorStop(0, "transparent");
    grd.addColorStop(1, "rgba(0,0,0,0.9)");
    ctx.fillStyle = grd; ctx.fillRect(0, h - barH, w, barH);
    ctx.lineJoin = "round"; ctx.textAlign = "left";
    const fK = barH * 0.45;
    ctx.font = `900 ${fK}px Arial Black`;
    ctx.lineWidth = 12; ctx.strokeStyle = "#000";
    ctx.strokeText("Km " + m.km, 50, h - (barH * 0.55));
    ctx.fillStyle = "#fff"; ctx.fillText("Km " + m.km, 50, h - (barH * 0.55));
    const fD = barH * 0.22;
    ctx.font = `bold ${fD}px Arial`;
    ctx.lineWidth = 8; ctx.strokeStyle = "#000";
    ctx.strokeText(m.ts, 50, h - (barH * 0.2));
    ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.fillText(m.ts, 50, h - (barH * 0.2));
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const isPortrait = can.width < can.height;
    const orientation = isPortrait ? 'p' : 'l';
    const doc = new jspdf.jsPDF(orientation, 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(orientation);
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.85), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`INSPECAO_LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ raw: can.toDataURL('image/jpeg', 0.4), km: document.getElementById('km-display').innerText.replace("Km ", ""), ts: new Date().toLocaleString('pt-BR') });
        total++;
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-batch').innerText = buffer.length;
        if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 200)) save();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

document.getElementById('btn-action').onclick = async () => {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(async () => {
        try {
            hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
            t.style.display = 'none'; rec = true; loop();
            document.getElementById('btn-action').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';
        } catch(e) { t.style.display = 'none'; }
    }, 1000);
};

document.getElementById('btn-stop').onclick = () => { rec = false; save(); document.getElementById('btn-action').style.display = 'inline-block'; document.getElementById('btn-stop').style.display = 'none'; };
function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
