<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO: THE MOVIE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: #007934; --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* --- SPLASH CINEMATOGRÁFICO E IRÔNICO --- */
        #splash-screen {
            position: fixed; inset: 0; background: #050505; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        .highway {
            position: relative; width: 300px; height: 150px;
            background: #222; transform: perspective(100px) rotateX(45deg);
            overflow: hidden; border: 4px solid #333;
        }
        .road-marks {
            position: absolute; width: 100%; height: 200%;
            background: repeating-linear-gradient(to top, transparent 0, transparent 40px, #fff 40px, #fff 80px);
            animation: moveRoad 0.8s linear infinite;
        }
        @keyframes moveRoad { from { top: -80px; } to { top: 0; } }

        .car-emoji {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) rotateX(-45deg);
            font-size: 50px; filter: drop-shadow(0 0 15px var(--accent));
            animation: shake 0.2s infinite;
        }
        @keyframes shake { 0%, 100% { margin-left: 0; } 50% { margin-left: 3px; } }

        .loading-msg { margin-top: 40px; font-weight: bold; color: var(--accent); text-align: center; height: 30px; }
        .joke { font-size: 10px; color: #666; margin-top: 10px; font-style: italic; }

        /* --- INTERFACE PRINCIPAL --- */
        #main-app { visibility: hidden; position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-display { 
            position: absolute; top: 40px; left: 20px; 
            background: var(--placa); padding: 12px 25px; 
            border: 3px solid #fff; border-radius: 12px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #km-val { font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #000; }

        /* OVERLAY "RAIO" (FANTASMA) */
        #ui-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px 30px;
            pointer-events: none; opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #ui-overlay.active { opacity: 1; pointer-events: auto; }

        #status-pill { 
            align-self: flex-end; background: rgba(0,0,0,0.8); 
            padding: 15px; border-radius: 15px; border: 1px solid #444; backdrop-filter: blur(10px);
        }
        .rec-indicator { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 14px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #555; }
        .dot.on { background: var(--danger); box-shadow: 0 0 15px var(--danger); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .btn-box { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .btn { 
            border: none; border-radius: 50px; font-weight: 900; padding: 22px 50px; 
            background: var(--accent); color: #000; text-transform: uppercase; 
            font-size: 14px; cursor: pointer;
        }
        #btn-stop { background: var(--danger); color: #fff; }
        #gear { background: rgba(255,255,255,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; }

        #gate { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; align-items: center; justify-content: center; text-align: center; }
        #panel { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #111; z-index: 11000; padding: 40px; transition: 0.4s; }
        #panel.open { right: 0; }
        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

    <div id="splash-screen">
        <div class="highway"><div class="road-marks"></div><div class="car-emoji">🚗</div></div>
        <div class="loading-msg" id="msg">INICIALIZANDO MOTORES...</div>
        <div class="joke" id="joke">"Calma, o estagiário está organizando as pastas..."</div>
    </div>

    <div id="gate">
        <div>
            <h1 style="color:var(--accent); margin-bottom:20px;">DIRETÓRIO PRONTO?</h1>
            <button class="btn" onclick="openSys()">SELECIONAR PASTA E VOAR</button>
        </div>
    </div>

    <div id="main-app">
        <video id="v" autoplay playsinline muted></video>
        <div id="km-display"><h1 id="km-val">Km 000+000</h1></div>

        <div id="ui-overlay">
            <div id="status-pill">
                <div class="rec-indicator">
                    <div id="dot" class="dot"></div>
                    <span id="state-txt">SISTEMA EM STANDBY</span>
                </div>
                <div style="font-size: 10px; margin-top: 8px; color: #888;">PDFS GERADOS: <b id="count-pdf" style="color:var(--accent)">0</b></div>
            </div>

            <div class="btn-box">
                <div id="gear" onclick="toggleSettings(event)">⚙️</div>
                <button id="btn-start" class="btn" onclick="startCapturing(event)">Iniciar Captura</button>
                <button id="btn-stop" class="btn" style="display:none;" onclick="stopCapturing(event)">Finalizar PDF</button>
            </div>
        </div>
    </div>

    <div id="panel">
        <h2 style="margin-bottom:20px;">Ajustes</h2>
        <label style="font-size: 10px;">LIMITE DO LOTE</label>
        <input type="number" id="lote-size" value="50" style="width:100%; padding:15px; background:#222; color:#fff; border:none; margin-bottom:20px;">
        <label style="font-size: 10px;">CÂMERA</label>
        <select id="cam-sel" onchange="changeCamera(this.value)" style="width:100%; padding:15px; background:#222; color:#fff; border:none;"></select>
        <button class="btn" style="margin-top:40px; width:100%" onclick="toggleSettings()">Fechar</button>
    </div>

    <canvas id="c"></canvas>

<script>
let kmDB=[], isRec=false, buffer=[], folderHandle=null, uiTimer, activeStream=null, pdfCount=0;
const messages = [
    "CONTAMINANDO O PDF COM DADOS...",
    "CONVENCENDO O GPS A NÃO DAR ERRO...",
    "LIMPANDO A LENTE VIRTUAL...",
    "SAY CHEESE! PREPARANDO AS FOTOS...",
    "ORGANIZANDO A BAGUNÇA DO ESTAGIÁRIO..."
];

const video=document.getElementById('v'), canvas=document.getElementById('c'), ctx=canvas.getContext('2d');

// --- FLUXO DE ENTRADA ---
window.onload = () => {
    let mIdx = 0;
    const interval = setInterval(() => {
        document.getElementById('msg').innerText = messages[mIdx % messages.length];
        mIdx++;
    }, 2000);

    setTimeout(() => {
        clearInterval(interval);
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-screen').remove();
            document.getElementById('gate').style.display = 'flex';
        }, 1000);
    }, 10000); // 10 segundos de splash realista
    loadCSV();
};

async function openSys() {
    try {
        folderHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('main-app').style.visibility = 'visible';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        setupCams();
        startGPS();
        wakeUI();
    } catch(e) { alert("Sem pasta, sem PDF. Escolha uma pasta!"); }
}

// --- LÓGICA DE INTERFACE "RAIO" ---
function wakeUI() {
    const ui = document.getElementById('ui-overlay');
    ui.classList.add('active');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => {
        if(!document.getElementById('panel').classList.contains('open')) {
            ui.classList.remove('active');
        }
    }, 4000);
}

// --- CORREÇÃO DO KM (DEFINITIVA) ---
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.trim().length > 0);
        const header = rows.toLowerCase().split(';');
        
        // Encontra os índices corrigindo possíveis espaços
        const idxKm = header.findIndex(h => h.includes('km'));
        const idxLat = header.findIndex(h => h.includes('lat'));
        const idxLon = header.findIndex(h => h.includes('lon'));

        kmDB = rows.slice(1).map(row => {
            const cols = row.split(';');
            return {
                km: cols[idxKm] ? cols[idxKm].trim() : "000+000",
                lat: parseFloat(cols[idxLat].replace(',', '.')),
                lon: parseFloat(cols[idxLon].replace(',', '.'))
            };
        }).filter(d => !isNaN(d.lat));
        console.log("Base de KM carregada:", kmDB.length);
    } catch(e) { console.error("Erro ao ler CSV:", e); }
}

function startGPS() {
    navigator.geolocation.watchPosition(pos => {
        if(kmDB.length === 0) return;
        let closest = null, minD = Infinity;
        for(const p of kmDB) {
            const d = Math.hypot(p.lat - pos.coords.latitude, p.lon - pos.coords.longitude);
            if(d < minD) { minD = d; closest = p; }
        }
        if(closest) {
            document.getElementById('km-val').innerText = "Km " + closest.km;
        }
    }, err => console.error(err), { enableHighAccuracy: true });
}

// --- CAPTURA E PDF ---
async function startCapturing(e) {
    if(e) e.stopPropagation();
    isRec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('dot').classList.add('on');
    document.getElementById('state-txt').innerText = "CAPTURANDO FOTOS...";
    captureLoop();
}

async function stopCapturing(e) {
    if(e) e.stopPropagation();
    isRec = false;
    document.getElementById('state-txt').innerText = "GERANDO PDF FINAL...";
    if(buffer.length > 0) await saveToPDF();
    
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('dot').classList.remove('on');
    document.getElementById('state-txt').innerText = "SISTEMA EM STANDBY";
}

function captureLoop() {
    if(!isRec) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        buffer.push({ 
            img: canvas.toDataURL('image/jpeg', 0.5), 
            km: document.getElementById('km-val').innerText.replace("Km ", ""),
            time: new Date().toLocaleTimeString('pt-BR')
        });
        
        const max = parseInt(document.getElementById('lote-size').value) || 50;
        if(buffer.length >= max) saveToPDF();
    }
    setTimeout(captureLoop, 400); 
}

async function saveToPDF() {
    if(!buffer.length) return;
    const data = [...buffer]; 
    buffer = []; 
    
    const kStart = data.km.replace('+', '_');
    const isPortrait = window.innerHeight > window.innerWidth;
    const doc = new jspdf.jsPDF(isPortrait ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i < data.length; i++) {
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = canvas.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; 
                ctx.fillRect(0, canvas.height-bh, canvas.width, bh);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${bh * 0.4}px Arial`;
                ctx.fillText("Km " + data[i].km, 50, canvas.height-(bh*0.45));
                ctx.font = `${bh * 0.15}px Arial`;
                ctx.fillText(data[i].time + " | INSPEÇÃO AUTOMÁTICA", 50, canvas.height-(bh*0.15));
                doc.addImage(canvas.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = data[i].img;
        });
    }

    try {
        const fileHandle = await folderHandle.getFileHandle(`Inspeção_Km_${kStart}_${Date.now()}.pdf`, {create:true});
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob')); 
        await writable.close();
        pdfCount++;
        document.getElementById('count-pdf').innerText = pdfCount;
    } catch(err) { console.error("Erro ao salvar arquivo:", err); }
}

// --- HARDWARE ---
async function setupCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-sel');
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Lente ${i+1}`;
        sel.appendChild(opt);
    });
    changeCamera(videoDevices[videoDevices.length-1].deviceId);
}

async function changeCamera(id) {
    if (activeStream) activeStream.getTracks().forEach(t => t.stop());
    activeStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    video.srcObject = activeStream;
    video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; };
}

function toggleSettings(e) { if(e) e.stopPropagation(); document.getElementById('panel').classList.toggle('open'); }
</script>
</body>
</html>
