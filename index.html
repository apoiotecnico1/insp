<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - WORKSTATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Interface Principal */
        #viewport { position: relative; width: 100vw; height: 42vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #kmPlaque { background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; padding: 10px; font-size: 2.8rem; font-weight: 900; border: 4px solid #fff; margin: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* Engrenagem */
        #settings-trigger { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.6); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--accent); font-size: 20px; }

        /* Painel de Configurações Lateral */
        #settings-panel { position: fixed; top: 0; right: -100%; width: 95%; height: 100%; background: #0a0f1c; z-index: 2000; transition: 0.4s; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        #settings-panel.active { right: 0; }

        /* Preview em Tempo Real */
        #preview-container { width: 100%; height: 180px; background: #222; border-radius: 8px; position: relative; overflow: hidden; margin-bottom: 15px; border: 2px solid #444; }
        #preview-bg { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        #preview-label { position: absolute; top: 5px; left: 5px; background: var(--accent); color: #000; font-size: 10px; padding: 2px 5px; font-weight: bold; border-radius: 3px; }
        #preview-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Estilos dos Menus */
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; font-size: 0.85rem; background: #161e31; padding: 8px; border-radius: 6px; }
        select, input[type="number"], input[type="color"] { background: #050a16; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; }
        input[type="range"] { width: 120px; accent-color: var(--accent); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px; }
        .card { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.action { padding: 18px; border-radius: 12px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px">
        <h2 style="margin:0; color:var(--accent); font-size:1.2rem">PREVIEW DO RELATÓRIO</h2>
        <button onclick="toggleSettings()" style="background:red; color:white; border:none; border-radius:50%; width:30px; height:30px">✕</button>
    </div>

    <div id="preview-container">
        <div id="preview-label">PRÉVIA DO PDF</div>
        <img id="preview-bg" src="https://images.unsplash.com/photo-1545143877-4e7f100c882d?auto=format&fit=crop&w=800&q=60">
        <canvas id="preview-canvas"></canvas>
    </div>

    <div style="overflow-y: auto; max-height: 50vh;">
        <div class="setting-item">Fonte: <select id="cfgFont" onchange="updatePreview()"><option value="Arial Black">Arial Black</option><option value="Impact">Impact</option><option value="Courier New">Digital</option><option value="Verdana">Verdana</option></select></div>
        <div class="setting-item">Tamanho do KM: <input type="range" id="cfgFontSize" min="15" max="100" value="45" oninput="updatePreview()"></div>
        <div class="setting-item">Cor Texto: <input type="color" id="cfgColor" value="#ffffff" onchange="updatePreview()"></div>
        <div class="setting-item">Cor Tarja: <input type="color" id="cfgStripeColor" value="#000000" onchange="updatePreview()"></div>
        <div class="setting-item">Opacidade Tarja: <input type="range" id="cfgAlpha" min="0" max="100" value="75" oninput="updatePreview()"></div>
        <div class="setting-item">Fotos por Lote: <input type="number" id="cfgBatch" value="200" style="width:60px"></div>
        <div class="setting-item">Câmera: <select id="cfgCam" onchange="initCamera()"><option value="environment">Traseira</option><option value="user">Frontal</option></select></div>
        <div class="setting-item">Captura (ms): <input type="number" id="cfgDelay" value="200" style="width:60px"></div>
        <div class="setting-item">Exibir GPS: <input type="checkbox" id="cfgShowGps" checked onchange="updatePreview()"></div>
    </div>
</div>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/200</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a">PDF<span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="action">INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');
const pCan = document.getElementById('preview-canvas');
const pCtx = pCan.getContext('2d');

function toggleSettings() { 
    document.getElementById('settings-panel').classList.toggle('active');
    updatePreview();
}

/* ATUALIZA PRÉVIA EM TEMPO REAL */
function updatePreview() {
    pCan.width = pCan.offsetWidth;
    pCan.height = pCan.offsetHeight;
    const w = pCan.width, h = pCan.height;
    
    const fontSize = parseInt(document.getElementById('cfgFontSize').value) * (h/200);
    const font = document.getElementById('cfgFont').value;
    const color = document.getElementById('cfgColor').value;
    const stripeColor = document.getElementById('cfgStripeColor').value;
    const alpha = document.getElementById('cfgAlpha').value / 100;

    pCtx.clearRect(0,0,w,h);
    
    // Tarja
    const sH = h * 0.25;
    pCtx.fillStyle = hexToRgba(stripeColor, alpha);
    pCtx.fillRect(0, h - sH, w, sH);

    // Texto
    pCtx.fillStyle = color;
    pCtx.font = `bold ${fontSize}px ${font}`;
    pCtx.fillText("KM 124+500", 15, h - (sH/2) + (fontSize/3));

    if(document.getElementById('cfgShowGps').checked) {
        pCtx.font = `${fontSize/3}px Arial`;
        pCtx.fillText("25/03/2026 12:00 | GPS: -22.9, -45.4", 15, h - 8);
    }
}

function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${a})`;
}

/* MOTOR DE BUSCA ORIGINAL (HAIVERSINE) */
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

async function loadCSV(){
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const lines = t.split('\n').filter(l => l.includes(';'));
        kmDataset = lines.map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(p => !isNaN(p.lat));
    } catch(e) { console.error("Erro CSV"); }
}

async function initCamera() {
    const mode = document.getElementById('cfgCam').value;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: 1280, height: 720 }, audio: false });
    vid.srcObject = stream;
}

function drawStamp(item) {
    const w = can.width, h = can.height;
    const fontSize = parseInt(document.getElementById('cfgFontSize').value) * (h/720);
    const font = document.getElementById('cfgFont').value;
    const color = document.getElementById('cfgColor').value;
    const stripeColor = document.getElementById('cfgStripeColor').value;
    const alpha = document.getElementById('cfgAlpha').value / 100;

    ctx.save();
    const sH = h * 0.2;
    ctx.fillStyle = hexToRgba(stripeColor, alpha);
    ctx.fillRect(0, h - sH, w, sH);
    ctx.fillStyle = color;
    ctx.font = `bold ${fontSize}px ${font}`;
    ctx.fillText("KM " + item.km, 40, h - (sH/2));
    if(document.getElementById('cfgShowGps').checked) {
        ctx.font = `${fontSize/3}px Arial`;
        ctx.fillText(`${item.ts} | GPS: ${item.lat}, ${item.lon}`, 40, h - 20);
    }
    ctx.restore();
}

async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++; document.getElementById('txtPdfs').innerText = pdfCount;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i>0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                can.width = img.width; can.height = img.height;
                ctx.drawImage(img, 0, 0);
                drawStamp(batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].img;
        });
    }
    doc.save(`INSPECAO_LOTE_${pdfCount}.pdf`);
}

function loop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').innerText.replace('KM ',''),
        lat: lastPos?.lat.toFixed(6) || 0, lon: lastPos?.lon.toFixed(6) || 0,
        ts: new Date().toLocaleString()
    });
    document.getElementById('txtTotal').innerText = ++photoCount;
    document.getElementById('txtBuffer').innerText = `${activeBuffer.length}/${document.getElementById('cfgBatch').value}`;
    if(activeBuffer.length >= parseInt(document.getElementById('cfgBatch').value)) savePDF();
    setTimeout(loop, parseInt(document.getElementById('cfgDelay').value));
}

document.getElementById('btnStart').onclick = () => { isRecording = true; loop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
document.getElementById('btnSaveManual').onclick = savePDF;

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    if(kmDataset.length){
        let best=null, bd=Infinity;
        kmDataset.forEach(pt => {
            const d = hav(lastPos.lat, lastPos.lon, pt.lat, pt.lon);
            if(d < bd){ bd=d; best=pt; }
        });
        if(best) document.getElementById('kmPlaque').innerText = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

loadCSV(); initCamera(); updatePreview();
</script>
</body>
</html>
