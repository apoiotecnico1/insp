<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b7a39">
<title>Painel KM – Estilo DNIT</title>

<style>
:root{
  --green:#0b7a39;
  --green2:#0a6a32;
  --border:#ffffff;
  --text:#ffffff;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

#screen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Placa padrão DNIT */
#sign{
  width:92vw;
  height:80vh;
  background:linear-gradient(180deg,var(--green),var(--green2));
  border:10px solid var(--border);
  border-radius:22px;
  box-shadow:
    inset 0 0 0 4px rgba(255,255,255,.5),
    0 30px 60px rgba(0,0,0,.6);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* KM grande */
#km{
  white-space:nowrap;
  width:100%;
  text-align:center;
  font-weight:900;
  color:var(--text);
  line-height:1;
  font-size:clamp(72px, 16vw, 220px);
  letter-spacing:.04em;
}

#gps{
  margin-top:12px;
  font-size:clamp(12px, 2.4vw, 18px);
  font-weight:700;
  color:#eaf2ff;
}

#bottom{
  position:fixed;
  left:0; right:0; bottom:0;
  height:44px;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  letter-spacing:.08em;
}
</style>
</head>

<body>

<div id="screen">
  <div id="sign">
    <div id="km">KM —</div>
    <div id="gps">GPS: aguardando…</div>
  </div>
</div>

<div id="bottom">DISTÂNCIA LATERAL —</div>

<script>
/* ================= LÓGICA ORIGINAL DE KM ================= */

const kmEl = document.getElementById('km');
const gpsEl = document.getElementById('gps');
const bottomEl = document.getElementById('bottom');

let lastPos = null;   // {lat,lon,acc}
let kmPoints = [];   // {km,lat,lon}

function hav(a,b,c,d){
  const R = 6371000;
  const x = (c-a)*Math.PI/180;
  const y = (d-b)*Math.PI/180;
  const u = Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

function fmtKm(v){
  if(!Number.isFinite(v)) return 'KM —';
  let K=Math.floor(v);
  let m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K++;}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}

function parsePt(v){
  if(!v) return NaN;
  return /,\d+$/.test(v) ? Number(v.replace(/\./g,'').replace(',','.')) : Number(v);
}

/* GPS – igual ao início */
function startGPS(){
  if(!('geolocation' in navigator)) return;
  navigator.geolocation.watchPosition(p=>{
    lastPos = {lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
  },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
}

/* CSV de KM – igual ao início */
async function loadKM(){
  try{
    const txt = await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
    txt.split(/\r?
/).forEach(l=>{
      const c=l.split(';');
      const km=parsePt(c[0]);
      const lat=parsePt(c[1]);
      const lon=parsePt(c[2]);
      if(Number.isFinite(km)&&Number.isFinite(lat)&&Number.isFinite(lon)){
        kmPoints.push({km,lat,lon});
      }
    });
  }catch{}
}

/* Atualização – ponto mais próximo (LÓGICA ORIGINAL) */
function updateKM(){
  let best=null, bestDist=Infinity;

  if(lastPos && kmPoints.length){
    for(const p of kmPoints){
      const d = hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
      if(d < bestDist){ bestDist = d; best = p; }
    }
    kmEl.textContent = best ? fmtKm(best.km) : 'KM —';
    bottomEl.textContent = `DISTÂNCIA LATERAL ${Math.round(bestDist)} m`;
  }

  if(lastPos){
    gpsEl.textContent = `GPS ±${Math.round(lastPos.acc)} m`;
  } else {
    gpsEl.textContent = 'GPS: aguardando…';
  }
}

setInterval(updateKM, 500);

/* START */
startGPS();
loadKM();
if('wakeLock' in navigator){ try{ navigator.wakeLock.request('screen'); }catch{} }
</script>

</body>
</html>
