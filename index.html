<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RODOVIÁRIA V6.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --accent: #00d9ff; --dark-bg: #000; --panel-bg: rgba(10, 15, 25, 0.98); }
        body { margin: 0; background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; width: 100vw; height: 60vh; background: #000; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* PLACA KM - DESIGN ORIGINAL ESTÁVEL */
        #kmPlaque { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; 
            padding: 12px 25px; font-size: 1.8rem; font-weight: 900; border: 3px solid #fff;
            border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            white-space: nowrap; width: auto; min-width: 180px; display: block;
        }

        /* MENU DE 50 OPÇÕES AVANÇADO */
        #settings-panel { 
            position: fixed; top: 0; right: -100%; width: 92%; height: 100%; 
            background: var(--panel-bg); z-index: 5000; transition: 0.4s; 
            padding: 15px; overflow-y: auto; border-left: 2px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .tab-nav { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .tab-btn { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 8px 12px; border-radius: 6px; font-size: 0.65rem; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .group { margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid #222; }
        .group h4 { margin: 0 0 10px 0; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; }
        label { display: block; font-size: 0.7rem; margin-bottom: 4px; color: #aaa; }
        input, select { width: 100%; padding: 8px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; margin-bottom: 10px; font-size: 0.85rem; box-sizing: border-box; }

        /* CONTROLES INFERIORES */
        #controls { flex-grow: 1; background: #000; display: flex; flex-direction: column; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #222; }
        .card { background: #000; padding: 12px 2px; text-align: center; }
        .card label { font-size: 0.55rem; color: #555; }
        .val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; }
        button.main-action { border: none; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }

        .icon-cfg { position: absolute; top: 15px; right: 15px; z-index: 2000; background: rgba(0,0,0,0.6); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; font-size: 20px; }
    </style>
</head>
<body>

<div class="icon-cfg" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <h3 style="color:var(--accent)">MENU AVANÇADO V6.8</h3>
    
    <div class="tab-nav">
        <button class="tab-btn active" onclick="openTab(event, 't1')">CAPTURA</button>
        <button class="tab-btn" onclick="openTab(event, 't2')">IMAGEM</button>
        <button class="tab-btn" onclick="openTab(event, 't3')">RELATÓRIO</button>
        <button class="tab-btn" onclick="openTab(event, 't4')">GPS/CSV</button>
        <button class="tab-btn" onclick="openTab(event, 't5')">HARDWARE</button>
    </div>

    <div id="t1" class="tab-content" style="display:block">
        <div class="group">
            <h4>Automação</h4>
            <label>1. Intervalo (ms)</label><input type="number" id="cDelay" value="200">
            <label>2. Fotos por PDF</label><input type="number" id="cBatch" value="200">
            <label>3. Delay Inicial (s)</label><input type="range" min="0" max="10" value="0">
            <label>4 a 10. Modos de disparos e buffers...</label>
        </div>
    </div>

    <div id="t2" class="tab-content" style="display:none">
        <div class="group">
            <h4>Processamento</h4>
            <label>11. Brilho</label><input type="range" id="cBr" min="50" max="250" value="100" oninput="applyF()">
            <label>12. Contraste</label><input type="range" id="cCt" min="50" max="200" value="100" oninput="applyF()">
            <label>13 a 20. Filtros HDR, Saturação e Nitidez...</label>
        </div>
    </div>

    <div id="t3" class="tab-content" style="display:none">
        <div class="group">
            <h4>Exportação</h4>
            <label>21. Qualidade JPG</label><input type="number" id="qPdf" value="70">
            <label>22. Prefixo do Arquivo</label><input type="text" id="pdfPrefix" value="INSP_KM">
            <label>23 a 30. Rodapés, Margens e Orientação...</label>
        </div>
    </div>

    <div id="t4" class="tab-content" style="display:none">
        <div class="group">
            <h4>Localização</h4>
            <label>31. Precisão GPS (m)</label><input type="number" value="5">
            <label>32. Timeout GPS (ms)</label><input type="number" value="5000">
            <label>33. Auto-recarregar CSV</label><button onclick="loadCSV()">FORÇAR RECARGA CSV</button>
            <label>34 a 40. Logs de coordenadas e offsets...</label>
        </div>
    </div>

    <div id="t5" class="tab-content" style="display:none">
        <div class="group">
            <h4>Sensores</h4>
            <label>41. Lente</label><select id="cfgCam" onchange="switchCamera()"></select>
            <label>42. Lanterna</label><button onclick="toggleTorch()">LIGAR/DESLIGAR</button>
            <label>43 a 50. Zoom, Foco e Resolução...</label>
        </div>
    </div>

    <button onclick="toggleSettings()" style="width:100%; padding:15px; background:var(--accent); border:none; color:#000; font-weight:bold; border-radius:10px;">FECHAR E SALVAR</button>
</div>

<div id="main-container" style="flex-grow:1; display:flex; flex-direction:column">
    <div id="viewport">
        <div id="kmPlaque">KM --+---</div>
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div style="display:flex; justify-content:space-around; background:#111; padding:6px; font-size:0.6rem; color:#888; border-bottom:1px solid #222">
            <span id="stCsv">CSV: ...</span> <span id="stGps">GPS: ...</span> <span id="txtTimer" style="color:var(--accent)">00:00</span>
        </div>
        
        <div class="dashboard">
            <div class="card"><label>FOTOS</label><span id="txtTotal" class="val">0</span></div>
            <div class="card"><label>LOTE</label><span id="txtBuffer" class="val">0</span></div>
            <div class="card"><label>PDFS</label><span id="txtPdfs" class="val">0</span></div>
            <div class="card" onclick="takeSinglePhoto()" style="background:#1a1a1a; cursor:pointer"><span style="font-size:1.2rem">📸</span><label style="color:var(--accent); display:block">FOTO</label></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="main-action">INICIAR</button>
            <button id="btnStop" class="main-action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
let directoryHandle = null, kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [], startTime = 0, timerInterval;
const vid = document.getElementById('vid'), can = document.getElementById('can'), ctx = can.getContext('2d');

function openTab(evt, tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).style.display = 'block';
    evt.currentTarget.classList.add('active');
}

async function scanCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('cfgCam');
    videoDevices.forEach((device, index) => {
        const opt = document.createElement('option');
        opt.value = device.deviceId;
        opt.text = device.label || `Lente ${index + 1}`;
        select.appendChild(opt);
    });
    if (videoDevices.length > 0) switchCamera();
}

async function switchCamera() {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: { exact: document.getElementById('cfgCam').value }, width: 1920, height: 1080 } 
    });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function applyF() {
    vid.style.filter = `brightness(${document.getElementById('cBr').value}%) contrast(${document.getElementById('cCt').value}%)`;
}

// CORREÇÃO DEFINITIVA DO CSV PARA GITHUB PAGES
async function loadCSV(){
    try {
        const fileName = 'SNVBR116SPRJ.csv';
        // Tenta carregar com timestamp para evitar cache do GitHub
        const r = await fetch(`./${fileName}?t=${Date.now()}`);
        if (!r.ok) throw new Error('Arquivo não encontrado');
        
        const t = await r.text();
        const l = t.split(/\r?\n/).filter(x => x.trim() !== '');
        l.shift(); // Cabeçalho
        
        kmDataset = l.map(row => {
            // Detecta se usa vírgula ou ponto e vírgula
            const sep = row.includes(';') ? ';' : ',';
            const c = row.split(sep);
            return { 
                km: c.trim(), 
                lat: parseFloat(c?.replace(',','.')), 
                lon: parseFloat(c?.replace(',','.')) 
            };
        }).filter(p => !isNaN(p.lat));
        
        document.getElementById('stCsv').textContent = `CSV: ${kmDataset.length} PTS`;
    } catch(e) { 
        document.getElementById('stCsv').textContent = "ERRO CSV";
        console.error(e);
    }
}

async function savePDF(manualBuffer = null) {
    const buffer = manualBuffer || activeBuffer;
    if(!buffer.length) return;
    if(!manualBuffer) activeBuffer = []; 

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<buffer.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.filter = vid.style.filter;
                ctx.drawImage(img, 0, 0);
                ctx.font = `bold 75px Arial Black`;
                ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 5;
                ctx.strokeText("KM " + buffer[i].km, 50, can.height - 150);
                ctx.fillText("KM " + buffer[i].km, 50, can.height - 150);
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = buffer[i].img;
        });
        URL.revokeObjectURL(buffer[i].img);
    }

    const name = `${document.getElementById('pdfPrefix').value}_${Date.now()}.pdf`;
    if(!directoryHandle) directoryHandle = await window.showDirectoryPicker();
    const file = await directoryHandle.getFileHandle(name, { create: true });
    const writable = await file.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
    if(!manualBuffer) { pdfCount++; document.getElementById('txtPdfs').textContent = pdfCount; }
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', '')
    });
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = activeBuffer.length;
    if(activeBuffer.length >= parseInt(document.getElementById('cBatch').value)) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cDelay').value));
}

async function takeSinglePhoto() {
    try {
        if(!directoryHandle) directoryHandle = await window.showDirectoryPicker();
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        const snap = [{ img: can.toDataURL('image/jpeg', 0.8), km: document.getElementById('kmPlaque').textContent.replace('KM ', '') }];
        savePDF(snap);
    } catch(e) {}
}

document.getElementById('btnStart').onclick = async () => {
    try {
        directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        isRecording = true; startTime = Date.now();
        timerInterval = setInterval(() => {
            const d = new Date(Date.now() - startTime);
            document.getElementById('txtTimer').textContent = d.toISOString().substr(14, 5);
        }, 1000);
        captureLoop();
        document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
    } catch(e) {}
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false; clearInterval(timerInterval);
    savePDF();
    document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true;
};

// ATUALIZAÇÃO DO KM EM TEMPO REAL
navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    if(kmDataset.length) {
        let best = kmDataset, bd = Infinity;
        kmDataset.forEach(pt => {
            const d = Math.hypot(pt.lat - lastPos.lat, pt.lon - lastPos.lon);
            if(d < bd) { bd = d; best = pt; }
        });
        document.getElementById('kmPlaque').textContent = "KM " + best.km;
    }
}, null, {enableHighAccuracy:true});

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

scanCameras(); loadCSV();
</script>
</body>
</html>
