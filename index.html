<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RIVERSIDE PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        #viewport { width: 100vw; height: 38vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 12px;
            font-size: 3.5rem; font-weight: 900; border: 4px solid #fff;
            margin: 8px; border-radius: 12px; box-shadow: 0 8px 20px #000;
        }

        #noxBox { background: #0b1224; margin: 0 8px; padding: 8px; border: 1px solid #1e2647; border-radius: 8px; min-height: 80px; }
        .nox-row { display: flex; justify-content: space-between; font-family: monospace; padding: 3px 8px; border-bottom: 1px solid #1e2647; font-size: 0.85rem; }
        .top-nox { color: #00ff66; font-weight: bold; background: rgba(0,255,102,0.1); }

        .stat-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 8px; }
        .card { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; color: #00d9ff; }

        .btns { padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        #start { background: #00ff66; color: #000; }
        #stop { background: #ff3333; color: #fff; }
    </style>
</head>
<body>

<div id="viewport"><video id="v" autoplay playsinline muted></video></div>
<div id="kmPlaque">KM --+---</div>

<div id="noxBox">
    <div id="noxItems"></div>
</div>

<div class="stat-bar">
    <div class="card">FOTOS<span id="tPh" class="val">0</span></div>
    <div class="card">LOTE<span id="tLo" class="val">0/200</span></div>
    <div id="save" class="card" style="background:#1e3a8a">PDF<span id="tPd" class="val">0</span></div>
</div>

<div class="btns">
    <button id="start">INICIAR</button>
    <button id="stop" disabled>PARAR</button>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let kmGrid = new Map(), noxData = [];
let lastPos = null, recording = false, photos = [], totalPh = 0, pdfs = 0;
const GRID_SIZE = 0.005; // ~500 metros

// Funções de limpeza idênticas ao seu original que funcionava
function parseV(v){ const s=String(v||'').trim(); return /,\d{1,}$/.test(s)?Number(s.replace(/\./g,'').replace(',','.')):Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,u=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }

async function loadCSVs() {
    try {
        // Carrega KM com lógica de Grid Ultrarrápida
        const rK = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const tK = await rK.text();
        tK.split(/\r?\n/).slice(1).forEach(l => {
            const c = l.split(';');
            const lat = parseV(c), lon = parseV(c);
            if(!isNaN(lat)){
                const key = `${Math.floor(lat/GRID_SIZE)},${Math.floor(lon/GRID_SIZE)}`;
                if(!kmGrid.has(key)) kmGrid.set(key, []);
                kmGrid.get(key).push({km: c, lat, lon});
            }
        });

        // Carrega IDs NOX
        const rN = await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now());
        const tN = await rN.text();
        noxData = tN.split(/\r?\n/).slice(1).map(l => {
            const c = l.split(';');
            return {id: c, lat: parseV(c), lon: parseV(c)};
        }).filter(p => p.id && !isNaN(p.lat));
    } catch(e) { console.error("Erro carga"); }
}

function updateLoc() {
    if(!lastPos) return;
    const {lat, lon} = lastPos;

    // KM por Grid (Velocidade Máxima)
    let bK = null, minK = Infinity;
    const gx = Math.floor(lat/GRID_SIZE), gy = Math.floor(lon/GRID_SIZE);
    for(let x=gx-1; x<=gx+1; x++){
        for(let y=gy-1; y<=gy+1; y++){
            const pts = kmGrid.get(`${x},${y}`);
            if(pts) pts.forEach(p => {
                const d = Math.sqrt((lat-p.lat)**2 + (lon-p.lon)**2);
                if(d < minK){ minK = d; bK = p; }
            });
        }
    }
    if(bK) document.getElementById('kmPlaque').textContent = "KM " + bK.km;

    // IDs Próximos
    const sorted = noxData.map(p => ({...p, d: hav(lat, lon, p.lat, p.lon)}))
        .sort((a,b) => a.d - b.d).slice(0, 4);
    
    document.getElementById('noxItems').innerHTML = sorted.map((n, i) => 
        `<div class="nox-row ${i===0?'top-nox':''}"><span>${n.id}</span><span>${Math.round(n.d)}m</span></div>`
    ).join('');
}

async function genPDF() {
    if(!photos.length) return;
    const batch = [...photos]; photos = []; pdfs++;
    document.getElementById('tPd').textContent = pdfs;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    batch.forEach((p, i) => {
        if(i>0) doc.addPage();
        doc.setFillColor(0); doc.rect(0,0,297,20,'F');
        doc.setTextColor(255); doc.setFontSize(9);
        doc.text(`KM: ${p.km} | ID: ${p.id} | GPS: ${p.lat},${p.lon} | ${p.ts}`, 10, 12);
        doc.addImage(p.img, 'JPEG', 10, 25, 277, 170);
    });
    doc.save(`RELATORIO_${pdfs}.pdf`);
}

function loop() {
    if(!recording) return;
    const can = document.getElementById('c'), vid = document.getElementById('v');
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    can.getContext('2d').drawImage(vid, 0, 0);
    
    photos.push({
        img: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('kmPlaque').textContent.replace('KM ',''),
        id: document.querySelector('.top-nox span')?.textContent || '-',
        lat: lastPos.lat.toFixed(6), lon: lastPos.lon.toFixed(6),
        ts: new Date().toLocaleString()
    });

    totalPh++;
    document.getElementById('tPh').textContent = totalPh;
    document.getElementById('tLo').textContent = `${photos.length}/200`;
    if(photos.length >= 200) genPDF();
    setTimeout(loop, 250);
}

document.getElementById('start').onclick = () => { recording = true; document.getElementById('start').disabled = true; document.getElementById('stop').disabled = false; loop(); };
document.getElementById('stop').onclick = () => { recording = false; document.getElementById('start').disabled = false; document.getElementById('stop').disabled = true; genPDF(); };
document.getElementById('save').onclick = () => genPDF();

async function init() {
    await loadCSVs();
    const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode:'environment', width:1280}, audio:false});
    document.getElementById('v').srcObject = stream;
    navigator.geolocation.watchPosition(p => {
        lastPos = {lat: p.coords.latitude, lon: p.coords.longitude};
        updateLoc();
    }, null, {enableHighAccuracy:true});
}
init();
</script>
</body>
</html>
