<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Portal Técnico Operacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --danger: #ff4444; --glass: rgba(15, 15, 15, 0.95); --success: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* PAINEL PRINCIPAL */
        #portal { 
            position: fixed; inset: 0; z-index: 9000; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;
        }

        .header-box { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; width: 90%; }
        
        #hud-global { 
            background: rgba(0, 77, 33, 0.9); padding: 12px; border-radius: 12px; border: 2px solid #fff;
            margin-bottom: 20px; text-align: center; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #km-display { font-size: 1.8rem; font-weight: 900; display: block; color: #fff; }

        .grid-tech { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 450px; }

        .btn-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 25px 10px;
            display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;
        }
        .btn-card:active { background: #333; transform: scale(0.98); }
        .btn-card span { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #fff; text-align: center; }
        .icon { font-size: 2rem; }

        .full-width { grid-column: span 2; background: linear-gradient(145deg, #333, #111); border-left: 6px solid var(--accent); }

        /* MODAIS */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #note-pad { width: 100%; height: 80%; padding: 20px; background: #111; color: #fff; border: none; font-size: 1.2rem; outline: none; }
        
        .tool-bar { padding: 20px; display: flex; justify-content: space-around; background: #1a1a1a; border-top: 1px solid #333; }
        .btn-action { padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        /* SISTEMA DE VÍDEO/PDF (ESCONDIDO) */
        #app-shell { position: fixed; inset: 0; background: #000; z-index: 9500; display: none; }
        #vid { width: 100%; height: 100%; object-fit: cover; }
        #controls-pdf { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div id="portal">
    <div class="header-box">
        <h2 style="color:var(--accent)">SISTEMA MOTIVA</h2>
        <small id="gps-info" style="color:#888">Iniciando sensores...</small>
    </div>

    <div id="hud-global">
        <span id="br-label" style="font-size: 0.8rem; font-weight: bold;">BR 116</span>
        <span id="km-display">Km ---</span>
    </div>

    <div class="grid-tech">
        <div class="btn-card full-width" onclick="ativarModulo('pdf')">
            <div class="icon">📑</div>
            <span>Relatório em Lote (PDF)</span>
        </div>

        <div class="btn-card" onclick="ativarModulo('anotacao')">
            <div class="icon">📝</div>
            <span>Anotar Serviço</span>
        </div>

        <div class="btn-card" onclick="ativarModulo('audio')">
            <div class="icon">🎤</div>
            <span>Gravar Áudio</span>
        </div>

        <div class="btn-card" onclick="ativarModulo('foto')">
            <div class="icon">📸</div>
            <span>Foto Avulsa</span>
        </div>

        <div class="btn-card" onclick="location.reload()">
            <div class="icon">🔄</div>
            <span>Reiniciar</span>
        </div>
    </div>
</div>

<div id="modal-note" class="overlay">
    <textarea id="note-pad" placeholder="Digite aqui os detalhes do serviço ou ocorrência..."></textarea>
    <div class="tool-bar">
        <button class="btn-action" style="background:var(--accent)" onclick="salvarNota()">SALVAR E ENVIAR</button>
        <button class="btn-action" style="background:#444; color:#fff;" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="modal-audio" class="overlay" style="justify-content:center; align-items:center;">
    <div id="audio-timer" style="font-size:2rem; margin-bottom:20px;">00:00</div>
    <button id="rec-btn" onclick="toggleAudio()" style="width:120px; height:120px; border-radius:60px; background:var(--danger); border:8px solid #333; font-size:3rem;">🎤</button>
    <p id="audio-status" style="margin-top:20px; font-weight:bold;">Toque para gravar relato</p>
    <button class="btn-action" style="margin-top:50px; background:#222; color:#fff" onclick="fecharModais()">VOLTAR AO PORTAL</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="controls-pdf">
        <button id="btn-snap" class="btn-action" style="background:var(--accent)" onclick="capturarFotoPDF()">TIRAR FOTO</button>
        <button class="btn-action" style="background:var(--danger); color:#fff" onclick="fecharSistema()">SAIR</button>
    </div>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let stream, mediaRecorder, chunks = [];
let kmDB = [], brAtual = "116", kmAtual = "---";

// 1. INICIALIZAÇÃO SEGURA
async function startMedia(comAudio = false) {
    try {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 1280, height: 720 },
            audio: comAudio
        });
        document.getElementById('vid').srcObject = stream;
        return true;
    } catch (e) {
        alert("Erro: Permita o acesso à câmera/microfone nas configurações do navegador.");
        return false;
    }
}

// 2. CONTROLE DOS MÓDULOS
async function ativarModulo(tipo) {
    if (tipo === 'pdf' || tipo === 'foto') {
        const ok = await startMedia(false);
        if (ok) {
            document.getElementById('app-shell').style.display = 'block';
            if (tipo === 'foto') document.getElementById('btn-snap').innerText = "CAPTURAR FOTO";
        }
    } else if (tipo === 'anotacao') {
        document.getElementById('modal-note').style.display = 'flex';
    } else if (tipo === 'audio') {
        document.getElementById('modal-audio').style.display = 'flex';
    }
}

function fecharModais() {
    document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
}

function fecharSistema() {
    document.getElementById('app-shell').style.display = 'none';
    if (stream) stream.getTracks().forEach(t => t.stop());
}

// 3. LÓGICA DE ÁUDIO
async function toggleAudio() {
    const btn = document.getElementById('rec-btn');
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        await startMedia(true);
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const file = new File([blob], `Relato_KM${kmAtual}.webm`, { type: 'audio/webm' });
            navigator.share({ files: [file], title: 'Relato de Áudio' });
        };
        mediaRecorder.start();
        btn.style.background = "#fff";
        document.getElementById('audio-status').innerText = "GRAVANDO... Toque para parar";
    } else {
        mediaRecorder.stop();
        btn.style.background = "var(--danger)";
        document.getElementById('audio-status').innerText = "Salvando...";
        setTimeout(fecharModais, 1000);
    }
}

// 4. LÓGICA DE GPS (IDÊNTICA À SUA)
function initGPS() {
    navigator.geolocation.watchPosition(p => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        document.getElementById('gps-info').innerText = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        
        // Se o CSV estiver carregado, busca o KM mais próximo aqui
        if (kmDB.length > 0) {
            let minD = Infinity;
            kmDB.forEach(pt => {
                let d = Math.hypot(pt.lt - lat, pt.ln - lon);
                if (d < minD) { minD = d; kmAtual = pt.km; brAtual = pt.br; }
            });
            document.getElementById('km-display').innerText = `Km ${kmAtual}`;
            document.getElementById('br-label').innerText = `BR ${brAtual}`;
        }
    }, e => console.error(e), { enableHighAccuracy: true });
}

// 5. SALVAR NOTA
function salvarNota() {
    const msg = document.getElementById('note-pad').value;
    if (!msg) return alert("Digite algo antes de salvar.");
    const blob = new Blob([`REGISTRO TÉCNICO\nLocal: BR ${brAtual} Km ${kmAtual}\nData: ${new Date().toLocaleString()}\n\nNota: ${msg}`], { type: 'text/plain' });
    const file = new File([blob], `Nota_KM${kmAtual}.txt`, { type: 'text/plain' });
    navigator.share({ files: [file], title: 'Nota de Serviço' });
    fecharModais();
}

window.onload = () => {
    initGPS();
    // Aqui você pode carregar seu CSV: fetch('seu_arquivo.csv')...
};
</script>
</body>
</html>
