<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta e Inspeção de Campo Otimizada</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333333;
            --text: #e0e0e0;
            --text-dim: #a0a0a0;
            --accent: #00ff66;
            --accent-dim: #00cc52;
            --error: #ff3333;
            --yellow: #ffb703;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { background: var(--bg); color: var(--text); padding: 10px; font-size: 14px; overflow-x: hidden; }
        .container { max-width: 100%; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 14px; color: var(--accent); }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 12px; margin-bottom: 12px; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        textarea { width: 100%; height: 75px; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; resize: none; font-size: 14px; }
        input[type="text"] { flex: 1; min-width: 180px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; font-size: 16px; }
        input[type="text"]:focus { border-color: var(--accent); outline: none; }
        
        .btn { background: var(--border); color: var(--text); border: 1px solid var(--border); padding: 10px 12px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-accent { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        
        /* Botão de Linha Otimizado para Toque com Dedão */
        .btn-action { background: #162a1c; color: var(--accent); border: 1px solid var(--accent); padding: 12px 14px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; text-align: center; display: block; }
        .btn-action.has-data { color: var(--yellow); border-color: var(--yellow); background: #2a2005; }
        
        .hidden { display: none; }
        #status { padding: 8px; font-size: 11px; background: #222; border-left: 4px solid var(--border); margin-bottom: 10px; }
        .success { border-left-color: var(--accent) !important; color: var(--accent); }
        .error { border-left-color: var(--error) !important; color: var(--error); }
        
        /* Tabela Mobile de Baixo Consumo */
        .table-wrapper { overflow-x: auto; max-height: 60vh; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #252525; position: sticky; top: 0; z-index: 10; padding: 12px 10px; border-bottom: 2px solid var(--border); color: var(--accent); font-size: 11px; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 13px; }
        tr:nth-child(even) { background: #1a1a1a; }
        
        .inspected-row { border-left: 4px solid var(--accent); background: rgba(0, 255, 102, 0.03) !important; }
        .counter { font-size: 11px; color: var(--text-dim); }
        .highlight { color: var(--accent); font-weight: bold; background: #00441b; }
        
        /* Modais Otimizados */
        .modal-mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: flex-start; z-index: 99999; padding-top: 15px; overflow-y: auto; }
        .modal-window { background: var(--surface); border: 2px solid var(--border); width: 95%; max-width: 450px; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .modal-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border); padding-bottom: 8px; margin-bottom: 12px; }
        .modal-title { color: var(--accent); font-size: 12px; font-weight: bold; }
        .btn-close { color: var(--error); cursor: pointer; font-size: 26px; font-weight: bold; border: none; background: none; }

        .field-group { margin-bottom: 12px; }
        .field-group label { display: block; color: var(--text-dim); font-size: 11px; margin-bottom: 4px; text-transform: uppercase; }

        /* Galeria Compacta de Evidências */
        .gallery-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; background: var(--bg); padding: 8px; border: 1px dashed var(--border); min-height: 60px; }
        .gallery-cell { position: relative; width: 100%; aspect-ratio: 1; border: 1px solid var(--border); }
        .gallery-cell img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-photo { position: absolute; top: -4px; right: -4px; background: var(--error); color: #fff; border: none; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SYS // COLETOR_MEMORIA_LEVE</h1>
        <div id="db-info" class="counter">Sem base</div>
    </header>

    <div id="import-panel" class="card">
        <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 0;">
            <strong>BASE DE DADOS (SAP / EXCEL)</strong>
            <button class="btn" onclick="toggleElement('import-area')">Configurar</button>
        </div>
        <div id="import-area" class="hidden" style="margin-top: 12px;">
            <div class="row">
                <input type="file" id="file-input" accept=".html,.htm,.xls,.xlsx,.txt,.csv" style="display: none;" onchange="handleFile(this)">
                <button class="btn" onclick="document.getElementById('file-input').click()">📁 Ler Planilha</button>
                <button class="btn btn-accent" onclick="saveToLocalStorage()">💾 Fixar Local</button>
                <button class="btn" style="color: var(--error);" onclick="clearLocalStorage()">🗑️ Limpar</button>
            </div>
            <textarea id="raw-input" placeholder="Ou cole as colunas do Excel aqui..."></textarea>
        </div>
    </div>

    <div id="status">Pronto para operação em campo.</div>

    <div class="row">
        <input type="text" id="search-input" placeholder="🔎 Digite o código do material ou termos..." autocomplete="off">
        <button class="btn" onclick="clearSearch()">X</button>
    </div>

    <div class="counter" id="result-count" style="margin-bottom: 5px;">0 materiais carregados.</div>

    <div class="table-wrapper">
        <table id="results-table">
            <thead>
                <tr id="table-headers"><th>Aguardando carga de dados...</th></tr>
            </thead>
            <tbody id="table-body">
                <tr><td style="color: var(--text-dim); text-align: center; padding: 30px;">Abra a aba 'Configurar' para carregar a listagem.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<input type="file" id="globalCameraInput" accept="image/*" onchange="processGlobalPhotos(this)" style="display:none;">

<div id="modalFoco" class="modal-mask">
    <div class="modal-window">
        <div class="modal-top">
            <h3 id="modalTitle" class="modal-title">COLETA ATIVA</h3>
            <button class="btn-close" onclick="closeModalCPS()">&times;</button>
        </div>
        
        <input type="hidden" id="activeRowKey">

        <div class="field-group">
            <label>Fotos Deste Material:</label>
            <div id="modalGallery" class="gallery-box"></div>
            <button type="button" class="btn" style="margin-top: 8px; width: 100%; background: #1a1a1a; border: 1px dashed var(--accent); color: var(--accent);" onclick="triggerAdditionalPhoto()">📸 Tirar Próxima Foto</button>
        </div>

        <div class="field-group">
            <label>Quantidade Apurada / Estado:</label>
            <input type="text" id="fQtd" placeholder="Ex: 5 un, bom estado, quebrado..." oninput="saveDataCPS()">
        </div>

        <div class="field-group">
            <label>Notas de Inspeção:</label>
            <textarea id="fObs" placeholder="Insira as observações técnicas observadas em campo..." oninput="saveDataCPS()"></textarea>
        </div>

        <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;">
            <button type="button" style="color: var(--error); background:none; border:none; cursor:pointer;" onclick="clearRecordCPS()">[ APAGAR COLETAS ]</button>
            <div id="flashSaved" style="color: var(--accent); font-size: 11px; font-weight: bold; opacity: 0; transition: opacity 0.2s;">● AUTO_GUARDADO</div>
        </div>
    </div>
</div>

<script>
    let DATA_INDEX = [];
    let HEADERS = [];
    let INSPECTION_STORAGE = JSON.parse(localStorage.getItem('sys_inspection_data')) || {};
    let matColIdx = 0;

    window.onload = function() {
        loadFromLocalStorage();
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            // Pequeno atraso inteligente para não travar o teclado enquanto o usuário digita rápido
            searchTimeout = setTimeout(executeSearch, 70); 
        });
    };

    function log(msg, type = '') {
        const el = document.getElementById('status');
        el.innerText = msg; el.className = type;
    }

    function toggleElement(id) {
        document.getElementById(id).classList.toggle('hidden');
    }

    function clearSearch() {
        const input = document.getElementById('search-input');
        input.value = ''; input.focus(); executeSearch();
    }

    /* SISTEMA DE CAPTURA DIRETA */
    let targetedKey = null;
    function directCaptureTrigger(key) {
        targetedKey = key;
        const camInput = document.getElementById('globalCameraInput');
        camInput.value = '';
        camInput.click();
    }

    function triggerAdditionalPhoto() {
        const key = document.getElementById('activeRowKey').value;
        if(key) directCaptureTrigger(key);
    }

    function processGlobalPhotos(input) {
        if (!targetedKey || !input.files.length) return;
        const key = targetedKey;

        if (!INSPECTION_STORAGE[key]) INSPECTION_STORAGE[key] = { qtd: '', obs: '', fotos: [] };
        if (!INSPECTION_STORAGE[key].fotos) INSPECTION_STORAGE[key].fotos = [];

        let filesLoaded = 0;
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 480; // Redução de resolução para economizar espaço de armazenamento local
                    let w = img.width; let h = img.height;

                    if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    const compressed = canvas.toDataURL('image/jpeg', 0.50); 
                    INSPECTION_STORAGE[key].fotos.push(compressed);
                    
                    localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));
                    filesLoaded++;
                    
                    if (filesLoaded === input.files.length) {
                        openModalCPS(key);
                    }
                };
            };
            reader.readAsDataURL(file);
        });
    }

    /* CONTROLE DO MODAL */
    function openModalCPS(key) {
        document.getElementById('activeRowKey').value = key;
        document.getElementById('modalTitle').innerText = `INSPEÇÃO // MATERIAL COD: ${key}`;
        
        const current = INSPECTION_STORAGE[key] || { qtd: '', obs: '', fotos: [] };
        document.getElementById('fQtd').value = current.qtd || '';
        document.getElementById('fObs').value = current.obs || '';
        
        buildGalleryCPS(current.fotos || []);
        document.getElementById('modalFoco').style.display = 'flex';
    }

    function closeModalCPS() {
        document.getElementById('modalFoco').style.display = 'none';
        executeSearch(); 
    }

    function buildGalleryCPS(photos) {
        const box = document.getElementById('modalGallery');
        box.innerHTML = photos.map((p, idx) => `
            <div class="gallery-cell">
                <img src="${p}">
                <button type="button" class="btn-del-photo" onclick="deletePhotoCPS(${idx})">×</button>
            </div>
        `).join('');
    }

    function deletePhotoCPS(idx) {
        const key = document.getElementById('activeRowKey').value;
        if (key && INSPECTION_STORAGE[key] && INSPECTION_STORAGE[key].fotos) {
            INSPECTION_STORAGE[key].fotos.splice(idx, 1);
            localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));
            buildGalleryCPS(INSPECTION_STORAGE[key].fotos);
        }
    }

    let saveTimeout;
    function saveDataCPS() {
        const key = document.getElementById('activeRowKey').value;
        if (!key) return;

        if (!INSPECTION_STORAGE[key]) INSPECTION_STORAGE[key] = { qtd: '', obs: '', fotos: [] };
        INSPECTION_STORAGE[key].qtd = document.getElementById('fQtd').value;
        INSPECTION_STORAGE[key].obs = document.getElementById('fObs').value;

        localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));

        const flash = document.getElementById('flashSaved');
        flash.style.opacity = '1';
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => { flash.style.opacity = '0'; }, 650);
    }

    function clearRecordCPS() {
        const key = document.getElementById('activeRowKey').value;
        if (key && confirm("Apagar dados coletados deste material?")) {
            delete INSPECTION_STORAGE[key];
            localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));
            document.getElementById('fQtd').value = ''; document.getElementById('fObs').value = '';
            buildGalleryCPS([]); closeModalCPS();
        }
    }

    /* PROCESSAMENTO DA TABELA BASE */
    function processRawText(text) {
        if (!text.trim()) return;
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        if (lines.length === 0) return;

        HEADERS = lines[0].split(/\t|,|;|\|/).map(h => h.replace(/["']/g, '').trim());
        DATA_INDEX = [];
        for (let i = 1; i < lines.length; i++) {
            const cells = lines[i].split(/\t|,|;|\|/).map(c => c.replace(/["']/g, '').trim());
            if (cells.length === HEADER_LENGTH_VALID(cells, HEADERS)) DATA_INDEX.push(cells);
        }
        finalizeDataLoad();
    }

    function HEADER_LENGTH_VALID(cells, headers) {
        let hLen = headers.includes('AÇÃO_CAMPO') ? headers.length - 1 : headers.length;
        return cells.length <= hLen ? cells.length : hLen;
    }

    function handleFile(input) {
        const file = input.files[0]; if (!file) return;
        log("Processando listagem...", "");
        const reader = new FileReader();

        if (file.name.endsWith('.txt') || file.name.endsWith('.csv') || file.name.endsWith('.html') || file.name.endsWith('.htm')) {
            reader.onload = function(e) {
                const content = e.target.result;
                if (content.includes('<table') || content.includes('<TABLE')) { parseHtmlTable(content); } 
                else { document.getElementById('raw-input').value = content; processRawText(content); }
            };
            reader.readAsText(file, 'UTF-8');
        } else {
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    if (json.length > 0) {
                        HEADERS = json[0].map(h => String(h || '').trim());
                        DATA_INDEX = json.slice(1).filter(r => r.length > 0).map(r => r.map(c => String(c === null || c === undefined ? '' : c).trim()));
                        finalizeDataLoad();
                    }
                } catch (err) { log("Erro: " + err.message, "error"); }
            };
            reader.readAsArrayBuffer(file);
        }
    }

    function parseHtmlTable(htmlContent) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');
        const rows = doc.querySelectorAll('tr');
        DATA_INDEX = []; HEADERS = [];
        let headerDetected = false;

        rows.forEach((row) => {
            const cells = Array.from(row.querySelectorAll('th, td')).map(c => c.innerText.trim());
            if (cells.length === 0 || cells.join('').includes('----')) return;
            if (!headerDetected) { HEADERS = cells.map(h => h || 'Coluna'); headerDetected = true; } 
            else if (cells.length >= Math.floor(HEADERS.length * 0.5) && cells[0] !== '') { DATA_INDEX.push(cells); }
        });
        finalizeDataLoad();
    }

    function finalizeDataLoad() {
        if(!HEADERS.includes('AÇÃO_CAMPO')) HEADERS.push('AÇÃO_CAMPO');
        matColIdx = HEADERS.findIndex(h => h.toLowerCase().includes('material') || h.toLowerCase().includes('código') || h.toLowerCase().includes('cod'));
        if(matColIdx === -1) matColIdx = 0;
        renderHeaders(); executeSearch(); updateDbInfo();
        log(`Sucesso! ${DATA_INDEX.length} registros prontos.`, 'success');
    }

    function renderHeaders() { document.getElementById('table-headers').innerHTML = HEADERS.map(h => `<th>${h}</th>`).join(''); }

    function executeSearch() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        if (DATA_INDEX.length === 0) return;

        // Se o campo estiver vazio, renderiza apenas 25 itens para não pesar a memória do celular
        if (query === "") {
            renderRows(DATA_INDEX.slice(0, 25));
            document.getElementById('result-count').innerText = `Exibindo primeiros 25 registros de ${DATA_INDEX.length}.`;
            return;
        }

        const terms = query.split(/\s+/);
        const filtered = DATA_INDEX.filter(row => {
            const rowString = row.join(' ').toLowerCase();
            return terms.every(term => rowString.includes(term));
        });

        // Limita a exibição do filtro ativo a no máximo 100 linhas para preservar a renderização da tela
        const sliceLimit = filtered.slice(0, 100);
        renderRows(sliceLimit, terms);
        document.getElementById('result-count').innerText = `Localizados ${filtered.length} (Exibindo ${sliceLimit.length}).`;
    }

    function renderRows(matrix, highlightTerms = []) {
        const tbody = document.getElementById('table-body');
        if (matrix.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${HEADERS.length || 1}" style="text-align:center; padding:20px; color:var(--error);">Nenhum ativo localizado.</td></tr>`;
            return;
        }

        let html = '';
        for (let i = 0; i < matrix.length; i++) {
            const rowData = matrix[i];
            const rowKey = rowData[matColIdx] || 'R_' + i;
            const hasRecord = INSPECTION_STORAGE[rowKey];
            
            html += `<tr ${hasRecord ? 'class="inspected-row"' : ''}>`;
            for (let j = 0; j < HEADERS.length - 1; j++) {
                let cellValue = rowData[j] !== undefined ? rowData[j] : '';
                if (highlightTerms.length > 0 && cellValue !== '') {
                    highlightTerms.forEach(term => {
                        if (term.length > 1) {
                            const regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');
                            cellValue = cellValue.replace(regex, '<span class="highlight">$1</span>');
                        }
                    });
                }
                html += `<td>${cellValue}</td>`;
            }
            
            let btnClass = hasRecord ? 'btn-action has-data' : 'btn-action';
            let btnText = hasRecord ? `📝 EDITAR (${hasRecord.fotos ? hasRecord.fotos.length : 0}F)` : '📸 FOTO / COLETAR';
            html += `<td><button type="button" class="${btnClass}" onclick="directCaptureTrigger('${rowKey}')">${btnText}</button></td>`;
            html += '</tr>';
        }
        tbody.innerHTML = html;
    }

    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function saveToLocalStorage() {
        if (DATA_INDEX.length === 0) return;
        try {
            localStorage.setItem('sys_headers', JSON.stringify(HEADERS));
            localStorage.setItem('sys_data', JSON.stringify(DATA_INDEX));
            log("Base fixada no celular com sucesso!", "success");
            updateDbInfo();
            document.getElementById('import-area').classList.add('hidden');
        } catch (e) { log("Erro de cota local.", "error"); }
    }

    function loadFromLocalStorage() {
        try {
            const localHeaders = localStorage.getItem('sys_headers');
            const localData = localStorage.getItem('sys_data');
            if (localHeaders && localData) {
                HEADERS = JSON.parse(localHeaders); DATA_INDEX = JSON.parse(localData);
                finalizeDataLoad();
            }
        } catch (e) {}
    }

    function clearLocalStorage() {
        if(confirm("Apagar base local?")) {
            localStorage.removeItem('sys_headers'); localStorage.removeItem('sys_data');
            DATA_INDEX = []; HEADERS = [];
            document.getElementById('results-table').querySelector('thead').innerHTML = '<tr id="table-headers"><th>Aguardando carga...</th></tr>';
            document.getElementById('table-body').innerHTML = '<tr><td style="text-align:center; padding:30px;">Base vazia.</td></tr>';
            updateDbInfo(); log("Base removida.", "");
        }
    }

    function updateDbInfo() {
        const info = document.getElementById('db-info');
        info.innerText = DATA_INDEX.length > 0 ? `📦 ATIVOS: ${DATA_INDEX.length}` : "⚠️ SEM BASE ATIVA";
        info.style.color = DATA_INDEX.length > 0 ? "var(--accent)" : "var(--text-dim)";
    }
</script>
</body>
</html>
