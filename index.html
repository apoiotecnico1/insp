<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INSPEÇÃO PRO – KM SINCRONIZADO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --green:#056b3c; --panel:#0b1224; }
body { margin:0; background:#000; color:#fff; font-family:Segoe UI,sans-serif; overflow:hidden; }

/* ===== CAMERA ===== */
#viewport { position:relative; height:60vh; }
video { width:100%; height:100%; object-fit:cover; }

/* ===== PLACA KM ===== */
#kmPlaque{
    position:absolute;
    bottom:18px; left:18px;
    background:linear-gradient(180deg,#0a8a4d,#056b3c);
    color:#fff;
    font-size:2.4rem;
    font-weight:900;
    padding:10px 20px;
    border:4px solid #fff;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,.8);
    text-shadow:2px 2px 4px rgba(0,0,0,.4);
}

/* ===== CONTROLES ===== */
.controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    padding:8px;
}
select,button{
    padding:8px;
    font-size:.9rem;
    font-weight:700;
    border-radius:10px;
    border:none;
}
button{cursor:pointer;}
#btnStart{background:#00ff66;color:#000;}
#btnStop{background:#ff3333;color:#fff;}

/* ===== DASHBOARD ===== */
.dashboard{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:8px;
}
.card{
    background:#111;
    border:1px solid #222;
    border-radius:10px;
    padding:6px;
    text-align:center;
    font-size:.75rem;
}
.val{
    font-size:1.3rem;
    font-weight:900;
    color:#00d9ff;
    display:block;
}

canvas{display:none}
</style>
</head>

<body>

<!-- ===== CAMERA ===== -->
<div id="viewport">
    <video id="vid" autoplay muted playsinline></video>
    <div id="kmPlaque">KM --+---</div>
</div>

<!-- ===== CONTROLES ===== -->
<div class="controls">
    <select id="fps">
        <option value="1000">1 foto / seg</option>
        <option value="500">2 fotos / seg</option>
        <option value="200" selected>5 fotos / seg</option>
        <option value="100">10 fotos / seg</option>
    </select>

    <select id="batch">
        <option>10</option>
        <option>50</option>
        <option>100</option>
        <option selected>200</option>
        <option>300</option>
        <option>400</option>
        <option>500</option>
    </select>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="dashboard">
    <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
    <div class="card">LOTE<span id="txtBuffer" class="val">0</span></div>
    <div class="card">PDF<span id="txtPdfs" class="val">0</span></div>
    <div id="btnPdf" class="card" style="background:#1e3a8a;cursor:pointer">
        GERAR PDF
    </div>
</div>

<div class="controls">
    <button id="btnStart">INICIAR</button>
    <button id="btnStop" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
/* ===== VARIÁVEIS ===== */
let kmDataset=[], lastPos=null;
let isRecording=false, photoCount=0, pdfCount=0;
let activeBuffer=[];

const vid=document.getElementById("vid");
const can=document.getElementById("can");
const ctx=can.getContext("2d",{alpha:false});

/* ===== FUNÇÕES ORIGINAIS CSV / KM ===== */
function normalizeStr(s){
    return String(s||'').trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' ');
}
function findColumnIndex(headers,cands){
    const map=headers.map(h=>normalizeStr(h));
    for(const c of cands){const i=map.indexOf(c);if(i>=0)return i;}
    return -1;
}
function parsePt(v){
    if(v==null)return NaN;
    const s=String(v).trim();
    return /,\d+$/.test(s)
        ? Number(s.replace(/\./g,'').replace(',','.'))
        : Number(s);
}
function hav(a,b,c,d){
    const R=6371000;
    const x=(c-a)*Math.PI/180;
    const y=(d-b)*Math.PI/180;
    const u=Math.sin(x/2)**2+
        Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}

/* ===== CARREGA CSV ===== */
async function loadKMCSV(){
    const r=await fetch("SNVBR116SPRJ.csv?v="+Date.now(),{cache:"no-store"});
    let t=await r.text();
    if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);
    const lines=t.split(/\r?\n/).filter(l=>l.trim());
    const h=lines.shift().split(";");
    const iKm=findColumnIndex(h,["km"]);
    const iLat=findColumnIndex(h,["lat","latitude"]);
    const iLon=findColumnIndex(h,["lon","longitude"]);
    kmDataset=lines.map(l=>{
        const r=l.split(";");
        return{km:r[iKm],lat:parsePt(r[iLat]),lon:parsePt(r[iLon])};
    }).filter(p=>p.km&&Number.isFinite(p.lat)&&Number.isFinite(p.lon));
}

/* ===== ATUALIZA KM REAL ===== */
function updateKMDisplay(){
    if(!lastPos||!kmDataset.length)return;
    let best=null,bd=Infinity;
    for(const p of kmDataset){
        const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
        if(d<bd){bd=d;best=p;}
    }
    if(best) kmPlaque.textContent="KM "+best.km;
}

/* ===== QUEIMA KM NA FOTO ===== */
function drawOverlay(km){
    ctx.fillStyle="#056b3c";
    ctx.strokeStyle="#fff";
    ctx.lineWidth=5;
    ctx.fillRect(20,can.height-120,360,90);
    ctx.strokeRect(20,can.height-120,360,90);
    ctx.fillStyle="#fff";
    ctx.font="bold 42px Segoe UI";
    ctx.fillText("KM "+km,40,can.height-60);
}

/* ===== CAPTURA ===== */
function captureLoop(){
    if(!isRecording)return;

    ctx.drawImage(vid,0,0,can.width,can.height);
    const km=kmPlaque.textContent.replace("KM ","");
    drawOverlay(km);

    activeBuffer.push({img:can.toDataURL("image/jpeg",.7)});
    photoCount++;
    txtTotal.textContent=photoCount;
    txtBuffer.textContent=activeBuffer.length;

    if(activeBuffer.length>=batch.value) savePDF();
    setTimeout(captureLoop, fps.value);
}

/* ===== PDF ===== */
function savePDF(){
    if(!activeBuffer.length)return;
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF("l","mm","a4");
    activeBuffer.forEach((p,i)=>{
        if(i)doc.addPage();
        doc.addImage(p.img,"JPEG",10,10,277,190);
    });
    doc.save(`INSPECAO_${++pdfCount}.pdf`);
    txtPdfs.textContent=pdfCount;
    activeBuffer=[];
}

/* ===== EVENTOS ===== */
btnStart.onclick=()=>{
    isRecording=true;
    btnStart.disabled=true;
    btnStop.disabled=false;
    captureLoop();
};
btnStop.onclick=()=>{
    isRecording=false;
    btnStart.disabled=false;
    btnStop.disabled=true;
    savePDF();
};
btnPdf.onclick=savePDF;

/* ===== INIT ===== */
(async()=>{
    await loadKMCSV();

    const s=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment",width:1280,height:720},
        audio:false
    });
    vid.srcObject=s;
    vid.onloadedmetadata=()=>{
        can.width=vid.videoWidth;
        can.height=vid.videoHeight;
    };

    navigator.geolocation.watchPosition(p=>{
        lastPos={lat:p.coords.latitude,lon:p.coords.longitude};
        updateKMDisplay();
    },null,{enableHighAccuracy:true,maximumAge:0});
})();
</script>
</body>
</html>
