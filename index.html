<!DOCTYPE html>
<html lang="pt-BR">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launcher Multi-App Unificado - Professional Suite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { display: flex; height: 100vh; background: #121212; color: #e0e0e0; overflow: hidden; }
        
        /* Painel Lateral com transição suave */
        #sidebar { width: 340px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; z-index: 10; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar.hidden { margin-left: -340px; }
        
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #00ff66; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        h3 { margin: 15px 0 8px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        
        /* Zona de Upload */
        .upload-area { border: 2px dashed #444; padding: 20px 12px; text-align: center; cursor: pointer; margin-bottom: 15px; border-radius: 4px; font-size: 12px; transition: background 0.2s, border-color 0.2s; }
        .upload-area:hover, .upload-area.dragover { border-color: #00ff66; color: #00ff66; background: #112214; }
        #fileInput { display: none; }

        /* Lista de Botões */
        #systemList { flex: 1; overflow-y: auto; list-style: none; padding-right: 2px; }
        .system-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: #222; margin-bottom: 6px; border-radius: 4px; border-left: 4px solid #555; gap: 5px; }
        .system-item:hover { background: #262626; }
        .system-item.active { border-left-color: #00ff66; background: #2a2a2a; }
        
        .system-btn { background: none; border: none; color: #e0e0e0; cursor: pointer; text-align: left; flex: 1; font-weight: bold; overflow: hidden; text-overflow: ellipsis; font-size: 12px; white-space: nowrap; padding: 4px 0; }
        
        /* Controles de Ação */
        .item-actions { display: flex; align-items: center; gap: 4px; }
        .action-icon { background: none; border: none; cursor: pointer; padding: 4px; font-size: 12px; font-weight: bold; border-radius: 3px; transition: background 0.2s; }
        .edit-btn { color: #00bfff; }
        .edit-btn:hover { background: #003366; color: #66d9ff; }
        .delete-btn { color: #ff3333; font-size: 14px; }
        .delete-btn:hover { background: #551111; color: #ff6666; }

        /* Rodapé de Ações */
        .action-zone { margin-top: auto; padding-top: 15px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 6px; }
        .main-btn { width: 100%; padding: 11px; background: #00ff66; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .main-btn:hover { background: #00cc55; }
        
        /* Grade de Botões Utilitários */
        .util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 2px; }
        .util-btn { padding: 8px; background: #222; color: #ccc; border: 1px solid #343434; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; text-align: center; }
        .util-btn:hover { background: #2d2d2d; color: #fff; border-color: #555; }
        .danger-btn { color: #ff5555; border-color: #552222; }
        .danger-btn:hover { background: #3a1a1a; color: #ff7777; border-color: #773333; }

        /* Painel de Execução Principal */
        #content-area { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #ffffff; display: none; z-index: 5; }
        
        /* Tela de Espera */
        #welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #666; padding: 40px; text-align: center; z-index: 1; }
        #welcome-screen p { font-size: 12px; margin-top: 10px; color: #444; }

        /* Micro Botão Flutuante de Menu/Alternar (Toggle) */
        #toggleMenuBtn {
            position: absolute;
            left: 15px;
            top: 15px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.75);
            color: #00ff66;
            border: 1px solid #333;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            display: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background 0.2s, transform 0.1s;
        }
        #toggleMenuBtn:hover { background: rgba(0, 255, 102, 0.15); border-color: #00ff66; }
        #toggleMenuBtn:active { transform: scale(0.95); }
    </style>

</head>
<body>
    <button id="toggleMenuBtn" onclick="toggleSidebar()" title="Alternar Menu (Tecla Esc)">Menu ☰</button>

    <div id="sidebar">
        <h2>Painel Operacional</h2>
        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Soltar múltiplos HTMLs aqui</span>
            <input type="file" id="fileInput" accept=".html" multiple onchange="handleFileSelect(event)">
        </div>
        <h3>Aplicações Injetadas (<span id="appCount">0</span>)</h3>
        <ul id="systemList"></ul>
        <div class="action-zone">
            <button class="main-btn" onclick="exportCompiledHTML()">Exportar HTML Unificado</button>
            <div class="util-grid">
                <button class="util-btn" onclick="exportBackupJSON()">Criar Backup</button>
                <button class="util-btn" onclick="document.getElementById('backupInput').click()">Fazer Upload</button>
            </div>
            <input type="file" id="backupInput" accept=".json" style="display: none;" onchange="importBackupJSON(event)">
            <button class="util-btn danger-btn" onclick="clearSystemStorage()">Limpar Memória</button>
        </div>
    </div>
    <div id="content-area">
        <div id="welcome-screen">
            <div>[ AGUARDANDO SELEÇÃO DE SISTEMA ]</div>
            <p>Os aplicativos importados estão salvos na estrutura. Clique em qualquer botão para carregar instantaneamente.</p>
        </div>
        <iframe id="appRunner"></iframe>
    </div>
    <script id="embeddedData">
        window.SUITE_DATA_B64 = {};
    </script>
    <script id="mainEngine">
        
        window.SUITE_DATA = {};

        const sidebar = document.getElementById('sidebar');
        const toggleMenuBtn = document.getElementById('toggleMenuBtn');
        const systemList = document.getElementById('systemList');
        const appRunner = document.getElementById('appRunner');
        const welcomeScreen = document.getElementById('welcome-screen');
        const dropZone = document.getElementById('dropZone');
        const appCount = document.getElementById('appCount');
        const uploadLabel = document.getElementById('uploadLabel');
        
        let activeUrls = {};
        let currentActiveKey = null;

        function init() {
            if (window.SUITE_DATA_B64 && Object.keys(window.SUITE_DATA_B64).length > 0) {
                try {
                    Object.keys(window.SUITE_DATA_B64).forEach(key => {
                        window.SUITE_DATA[key] = decodeURIComponent(escape(atob(window.SUITE_DATA_B64[key])));
                    });
                } catch (e) {
                    console.error("Erro ao descriptografar banco de dados embutido:", e);
                }
            } else {
                const localData = localStorage.getItem('LAUNCHER_FIXED_STORAGE');
                if (localData) {
                    try { window.SUITE_DATA = JSON.parse(localData); } catch(e) {}
                }
            }
            
            precompileApps();
            renderList();
            setupDragAndDrop();

            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape" && currentActiveKey) {
                    toggleSidebar();
                }
            });
        }

        function toggleSidebar() {
            sidebar.classList.toggle('hidden');
            if (sidebar.classList.contains('hidden')) {
                toggleMenuBtn.textContent = "Menu ☰";
            } else {
                toggleMenuBtn.textContent = "Fechar ✕";
            }
        }

        function setupDragAndDrop() {
            ['dragenter', 'dragover'].forEach(ev => dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }, false));
            ['dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }, false));
            dropZone.addEventListener('drop', (e) => processFiles(e.dataTransfer.files), false);
        }

        function handleFileSelect(event) {
            processFiles(event.target.files);
            event.target.value = ''; 
        }

        function precompileApps() {
            Object.values(activeUrls).forEach(url => URL.revokeObjectURL(url));
            activeUrls = {};

            Object.keys(window.SUITE_DATA).forEach(name => {
                const blob = new Blob([window.SUITE_DATA[name]], { type: 'text/html;charset=utf-8' });
                activeUrls[name] = URL.createObjectURL(blob);
            });
        }

        function processFiles(files) {
            const validFiles = Array.from(files).filter(f => f.name.endsWith('.html'));
            if (validFiles.length === 0) return;

            let loadedCount = 0;
            uploadLabel.textContent = `Processando ${validFiles.length} itens...`;

            validFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const systemName = file.name.replace('.html', '').replace(/[^a-zA-Z0-9_\-\s]/g, '').trim();
                    window.SUITE_DATA[systemName] = e.target.result;
                    
                    loadedCount++;
                    if (loadedCount === validFiles.length) {
                        saveAndRefresh();
                        uploadLabel.textContent = "Soltar múltiplos HTMLs aqui";
                        loadSystem(systemName);
                    }
                };
                reader.readAsText(file);
            });
        }

        function renderList() {
            const keys = Object.keys(window.SUITE_DATA);
            systemList.innerHTML = '';
            appCount.textContent = keys.length;

            if (keys.length === 0) {
                systemList.innerHTML = `<li style="color: #444; font-size: 11px; padding: 10px; text-align: center;">Diretório Vazio</li>`;
                toggleMenuBtn.style.display = 'none';
                return;
            }

            keys.forEach(name => {
                const li = document.createElement('li');
                li.className = 'system-item';
                li.id = `item-${btoa(encodeURIComponent(name)).replace(/=/g, '')}`; 
                if (name === currentActiveKey) li.classList.add('active');

                const btn = document.createElement('button');
                btn.className = 'system-btn';
                btn.textContent = name;
                btn.title = name;
                btn.onclick = () => loadSystem(name);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'item-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'action-icon edit-btn';
                editBtn.innerHTML = '&#9998;';
                editBtn.onclick = (e) => { e.stopPropagation(); renameSystem(name); };

                const delBtn = document.createElement('button');
                delBtn.className = 'action-icon delete-btn';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = (e) => { e.stopPropagation(); removeSystem(name); };

                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(delBtn);
                li.appendChild(btn);
                li.appendChild(actionsDiv);
                systemList.appendChild(li);
            });
        }

        function renameSystem(oldName) {
            const newName = prompt(`Digite o novo nome para "${oldName}":`, oldName);
            if (newName === null) return;
            
            const sanitizedName = newName.replace(/[^a-zA-Z0-9_\-\s]/g, '').trim();
            if (sanitizedName === '' || sanitizedName === oldName) return;

            if (window.SUITE_DATA[sanitizedName] && !confirm(`Substituir "${sanitizedName}"?`)) return;

            window.SUITE_DATA[sanitizedName] = window.SUITE_DATA[oldName];
            delete window.SUITE_DATA[oldName];

            if (currentActiveKey === oldName) currentActiveKey = sanitizedName;

            saveAndRefresh();
            if (currentActiveKey === sanitizedName) loadSystem(sanitizedName);
        }

        function loadSystem(name) {
            if (!activeUrls[name]) return;

            currentActiveKey = name;
            document.querySelectorAll('.system-item').forEach(el => el.classList.remove('active'));
            
            const targetId = `item-${btoa(encodeURIComponent(name)).replace(/=/g, '')}`;
            const targetItem = document.getElementById(targetId);
            if (targetItem) targetItem.classList.add('active');

            welcomeScreen.style.display = 'none';
            appRunner.style.display = 'block';
            appRunner.src = activeUrls[name];

            toggleMenuBtn.style.display = 'block';
            toggleMenuBtn.textContent = "Menu ☰";
            sidebar.classList.add('hidden');
        }

        function removeSystem(name) {
            if (confirm(`Remover aplicação "${name}"?`)) {
                if (activeUrls[name]) URL.revokeObjectURL(activeUrls[name]);
                delete window.SUITE_DATA[name];
                
                if (currentActiveKey === name) {
                    currentActiveKey = null;
                    appRunner.style.display = 'none';
                    appRunner.src = '';
                    welcomeScreen.style.display = 'flex';
                    toggleMenuBtn.style.display = 'none';
                    sidebar.classList.remove('hidden');
                }
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('LAUNCHER_FIXED_STORAGE', JSON.stringify(window.SUITE_DATA));
            precompileApps();
            renderList();
        }

        function clearSystemStorage() {
            if (confirm("Limpar dados de toda a sessão atual?")) {
                localStorage.removeItem('LAUNCHER_FIXED_STORAGE');
                Object.values(activeUrls).forEach(url => URL.revokeObjectURL(url));
                activeUrls = {};
                window.SUITE_DATA = {};
                window.SUITE_DATA_B64 = {};
                currentActiveKey = null;
                renderList();
                appRunner.style.display = 'none';
                appRunner.src = '';
                welcomeScreen.style.display = 'flex';
                toggleMenuBtn.style.display = 'none';
                sidebar.classList.remove('hidden');
            }
        }

        /* ==========================================================================
           SISTEMA DE RETROALIMENTAÇÃO E BACKUP JSON (GARANTIA ANTI-PERDA DE DADOS)
           ========================================================================== */

        // 1. Exporta o banco de dados atual para um arquivo de texto JSON puro externo
        function exportBackupJSON() {
            if (Object.keys(window.SUITE_DATA).length === 0) {
                alert("Não há dados de aplicações para exportar o backup.");
                return;
            }
            const dataStr = JSON.stringify(window.SUITE_DATA, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });
            
            // Carimba o arquivo com a data e hora exata do momento do snapshot
            const now = new Date();
            const timestamp = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + '-' + String(now.getMinutes()).padStart(2,'0');
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup_sistema_${timestamp}.json`;
            a.click();
        }

        // 2. Importa o arquivo JSON externo e reconstitui o estado completo na hora
        function importBackupJSON(event) {
            const file = event.target.files;
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    
                    // Validação estrutural simples do backup
                    if (typeof parsedData !== 'object' || parsedData === null || Array.isArray(parsedData)) {
                        throw new Error("Formato de backup inválido.");
                    }

                    if (confirm("Isso irá substituir as aplicações atuais pelas do arquivo de backup. Confirmar restauração?")) {
                        window.SUITE_DATA = parsedData;
                        saveAndRefresh();
                        
                        // Reseta a interface gráfica para o estado inicial estável com a nova lista carregada
                        appRunner.style.display = 'none';
                        appRunner.src = '';
                        welcomeScreen.style.display = 'flex';
                        toggleMenuBtn.style.display = 'none';
                        sidebar.classList.remove('hidden');
                        
                        alert("Sistema restaurado com sucesso para o exato momento do backup!");
                    }
                } catch (err) {
                    alert("Erro catastrófico ao ler arquivo de backup: " + err.message);
                }
                event.target.value = ''; // Reseta o input de arquivo
            };
            reader.readAsText(file);
        }

        // 3. Compilador de distribuição estática completa (Injeta os códigos em Base64 estruturado)
        function exportCompiledHTML() {
            const exportB64 = {};
            Object.keys(window.SUITE_DATA).forEach(key => {
                exportB64[key] = btoa(unescape(encodeURIComponent(window.SUITE_DATA[key])));
            });

            const headMarkup = document.head.innerHTML;
            const engineCode = document.getElementById('mainEngine').innerHTML;
            
            const cleanTemplate = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
    ${headMarkup}
</head>
<body>
    <button id="toggleMenuBtn" onclick="toggleSidebar()" title="Alternar Menu (Tecla Esc)">Menu ☰</button>

    <div id="sidebar">
        <h2>Painel Operacional</h2>
        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Soltar múltiplos HTMLs aqui</span>
            <input type="file" id="fileInput" accept=".html" multiple onchange="handleFileSelect(event)">
        </div>
        <h3>Aplicações Injetadas (<span id="appCount">0</span>)</h3>
        <ul id="systemList"></ul>
        <div class="action-zone">
            <button class="main-btn" onclick="exportCompiledHTML()">Exportar HTML Unificado</button>
            <div class="util-grid">
                <button class="util-btn" onclick="exportBackupJSON()">Criar Backup</button>
                <button class="util-btn" onclick="document.getElementById('backupInput').click()">Fazer Upload</button>
            </div>
            <input type="file" id="backupInput" accept=".json" style="display: none;" onchange="importBackupJSON(event)">
            <button class="util-btn danger-btn" onclick="clearSystemStorage()">Limpar Memória</button>
        </div>
    </div>
    <div id="content-area">
        <div id="welcome-screen">
            <div>[ AGUARDANDO SELEÇÃO DE SISTEMA ]</div>
            <p>Os aplicativos importados estão salvos na estrutura. Clique em qualquer botão para carregar instantaneamente.</p>
        </div>
        <iframe id="appRunner"></iframe>
    </div>
    <script id="embeddedData">
        window.SUITE_DATA_B64 = ${JSON.stringify(exportB64, null, 2)};
    <\/script>
    <script id="mainEngine">
        ${engineCode}
    <\/script>
</body>
</html>`;

            const blob = new Blob([cleanTemplate], { type: 'text/html;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'painel_operacional_total.html';
            a.click();
        }

        init();
    
    </script>
</body>
</html>
