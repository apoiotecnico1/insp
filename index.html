<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Relatório Fotográfico – Iluminação (Batch Seguro)</title>

<style>
body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Arial;
  background:#0b1020;
  color:#e8eeff;
}
button{
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:900;
}
#cam{
  width:100%;
  max-height:45vh;
  background:black;
}
#gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;
}
.thumb{border:1px solid #333}
</style>
</head>

<body>

<h2 style="text-align:center">📸 Relatório Fotográfico – Seguro</h2>

<video id="cam" autoplay playsinline muted></video>
<canvas id="can" style="display:none"></canvas>

<div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px">
  <button id="btnCap">📷 Foto</button>
  <button id="btnAuto">🎬 Auto</button>
  <button id="btnClear">🧹 Limpar Sessão</button>
</div>

<div id="status" style="padding:10px;font-weight:700">Fotos: 0 | Relatórios: 0</div>

<div id="gallery"></div>

<script>
/* ================= CONFIGURAÇÃO CRÍTICA ================= */
const AUTO_BATCH_SIZE = 50;

let photos = [];
let reportCount = 1;
let isAuto = false;
let autoTimer = null;

/* ================= CAMERA ================= */
const video = document.getElementById('cam');
const canvas = document.getElementById('can');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({ video:{facingMode:'environment'}, audio:false })
.then(stream => video.srcObject = stream);

/* ================= INDEXEDDB ================= */
let db;
indexedDB.open('SAFE_PHOTOS_DB',1).onupgradeneeded = e=>{
  db = e.target.result;
  db.createObjectStore('photos',{keyPath:'id'});
};
indexedDB.open('SAFE_PHOTOS_DB',1).onsuccess = e=> db = e.target.result;

function savePhotoDB(photo){
  const tx = db.transaction('photos','readwrite');
  tx.objectStore('photos').put(photo);
}

/* ================= CAPTURA ================= */
async function capture(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);

  const url = canvas.toDataURL('image/jpeg',0.9);
  const id = Date.now()+'_'+Math.random();

  const rec = { id, url, ts:new Date().toLocaleString() };

  savePhotoDB(rec);
  photos.push(rec);

  addThumb(url);
  updateStatus();

  if(photos.length >= AUTO_BATCH_SIZE){
    setTimeout(generateAutoReport,200);
  }
}

/* ================= UI ================= */
function addThumb(url){
  const d = document.createElement('div');
  d.className='thumb';
  const i = document.createElement('img');
  i.src=url;
  i.style.width='100%';
  d.appendChild(i);
  gallery.appendChild(d);
}

function updateStatus(){
  status.textContent = `Fotos: ${photos.length} | Relatórios: ${reportCount-1}`;
}

/* ================= RELATÓRIO AUTOMÁTICO ================= */
async function generateAutoReport(){
  isAuto = false;
  clearInterval(autoTimer);

  const imgs = [...photos];
  photos.length = 0;

  const blob = new Blob(
    imgs.map(p=>atob(p.url.split(',')[1])),
    {type:'application/pdf'}
  ); // PDF simplificado seguro

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `RELATORIO_${reportCount}.pdf`;
  a.click();
  URL.revokeObjectURL(a.href);

  reportCount++;
  clearMemory();
  updateStatus();
}

/* ================= LIMPEZA ================= */
function clearMemory(){
  gallery.innerHTML='';
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* ================= BOTÕES ================= */
btnCap.onclick = capture;

btnAuto.onclick = ()=>{
  if(isAuto){
    clearInterval(autoTimer);
    isAuto=false;
    btnAuto.textContent='🎬 Auto';
  }else{
    isAuto=true;
    btnAuto.textContent='⏹️ Parar';
    autoTimer = setInterval(capture,700);
  }
};

btnClear.onclick = ()=>{
  if(confirm('Limpar sessão atual?')){
    photos.length=0;
    clearMemory();
    updateStatus();
  }
};

/* ================= RECUPERAÇÃO ================= */
window.addEventListener('load',()=>{
  const tx = db?.transaction('photos','readonly');
  if(!tx) return;
  tx.objectStore('photos').getAll().onsuccess = e=>{
    e.target.result.forEach(p=>{
      photos.push(p);
      addThumb(p.url);
    });
    updateStatus();
  };
});
</script>
</body>
</html>
