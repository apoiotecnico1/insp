<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom Ultra Pro - Live GPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --ccr: #00aaff; --claro: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD DE QUILOMETRAGEM AO VIVO */
        #km-hud { 
            position: absolute; top: 25px; left: 20px; 
            background: rgba(0, 121, 52, 0.9); 
            padding: 10px 25px; 
            border: 4px solid #fff; 
            border-radius: 12px; 
            z-index: 500; 
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #km-txt { font-size: 2.8rem; font-weight: 900; line-height: 1; display: block; }
        #gps-status { font-size: 0.7rem; font-weight: bold; color: #fff; text-transform: uppercase; margin-top: 5px; opacity: 0.8; }

        /* BOTÕES DE EVENTO */
        #event-bar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 500;
        }
        .event-btn {
            width: 85px; height: 85px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.4);
            background: rgba(20,20,20,0.8); color: #fff; font-size: 0.7rem; font-weight: 900;
            backdrop-filter: blur(10px);
        }
        .btn-ccr { border-left: 8px solid var(--ccr); }
        .btn-claro { border-left: 8px solid var(--claro); }

        /* CONTROLES */
        #controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 500;
        }
        .trigger { width: 90px; height: 90px; border-radius: 50%; border: 6px solid #fff; background: transparent; }
        .btn-rec { background: var(--accent); color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; border: none; }
        .recording { background: #ff1744 !important; color: #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.7; } }

        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color:var(--accent); margin-bottom:20px;">SISTEMA ANGSTROM</h2>
    <button class="btn-rec" onclick="startApp()">ATIVAR HUD AO VIVO</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <span id="km-txt">Km ---</span>
        <div id="gps-status">Aguardando GPS...</div>
    </div>

    <div id="event-bar">
        <button class="event-btn btn-ccr" onclick="mark('FIBRA CCR')">FIBRA<br>CCR</button>
        <button class="event-btn btn-claro" onclick="mark('FIBRA CLARO')">FIBRA<br>CLARO</button>
        <button class="event-btn" onclick="mark('CAIXA')">CAIXA<br>EMENDA</button>
    </div>

    <div id="controls">
        <button id="btn-rec" class="btn-rec" onclick="toggleCapture()">INICIAR LOTE</button>
        <button class="trigger" onclick="snap()"></button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false, hDir = null, buffer = [], currentLabel = "INSPEÇÃO";
let curLat = 0, curLon = 0;

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker();
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        // Câmera
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
        document.getElementById('vid').srcObject = stream;
        document.getElementById('vid').onloadedmetadata = () => { 
            document.getElementById('c').width = 1920; 
            document.getElementById('c').height = 1080; 
        };

        loadCSV();
        initGPS();
    } catch(e) { alert("Erro de permissão!"); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude;
        curLon = p.coords.longitude;
        updateLiveKm();
    }, e => console.error(e), { enableHighAccuracy: true, maximumAge: 0 });
}

function updateLiveKm() {
    if (kmDB.length === 0) return;
    
    let closest = null;
    let minDiff = Infinity;

    for (let i = 0; i < kmDB.length; i++) {
        // Cálculo rápido de distância (Pitágoras simples para performance)
        const d = Math.sqrt(Math.pow(kmDB[i].lt - curLat, 2) + Math.pow(kmDB[i].ln - curLon, 2));
        if (d < minDiff) {
            minDiff = d;
            closest = kmDB[i];
        }
    }

    if (closest) {
        document.getElementById('km-txt').innerText = `Km ${closest.km}`;
        document.getElementById('gps-status').innerText = `Sinal GPS: OK`;
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const text = await r.text();
        const rows = text.split('\n').filter(row => row.includes(';'));
        const headers = rows.shift().split(';').map(h => h.trim().toLowerCase());
        
        const iKm = headers.indexOf('km');
        const iLat = headers.findIndex(h => h.includes('lat'));
        const iLon = headers.findIndex(h => h.includes('lon'));

        kmDB = rows.map(r => {
            const cols = r.split(';');
            return {
                km: cols[iKm],
                lt: parseFloat(cols[iLat].replace(',', '.')),
                ln: parseFloat(cols[iLon].replace(',', '.'))
            };
        }).filter(d => !isNaN(d.lt));
        
        document.getElementById('gps-status').innerText = "Banco de KM Carregado";
    } catch(e) {
        document.getElementById('gps-status').innerText = "Erro ao carregar CSV";
    }
}

function mark(txt) {
    currentLabel = txt;
    document.getElementById('km-hud').style.borderColor = "#ffcc00";
    setTimeout(() => { 
        currentLabel = "INSPEÇÃO"; 
        document.getElementById('km-hud').style.borderColor = "#fff";
    }, 1500);
}

function snap() { saveFrame(true); }

function toggleCapture() {
    capturing = !capturing;
    const btn = document.getElementById('btn-rec');
    if (capturing) {
        btn.innerText = "FINALIZAR";
        btn.classList.add('recording');
        buffer = [];
        loop();
    } else {
        btn.innerText = "PROCESSANDO...";
        btn.classList.remove('recording');
        savePDF();
    }
}

function loop() {
    if (!capturing) return;
    saveFrame(false);
    setTimeout(loop, 400); 
}

async function saveFrame(isManual) {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    const km = document.getElementById('km-txt').innerText;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    // Carimbo
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 45px Arial";
    ctx.fillText(`${currentLabel} | ${km}`, 40, can.height - 60);
    ctx.font = "25px Arial";
    ctx.fillText(`${new Date().toLocaleString()} | GPS: ${curLat.toFixed(6)}, ${curLon.toFixed(6)}`, 40, can.height - 25);

    const data = can.toDataURL('image/jpeg', 0.7);
    if (isManual) {
        const blob = await (await fetch(data)).blob();
        const handle = await hDir.getFileHandle(`FOTO_${km}_${Date.now()}.jpg`, {create:true});
        const w = await handle.createWritable();
        await w.write(blob); await w.close();
    } else {
        buffer.push(data);
    }
}

async function savePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < buffer.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const blob = doc.output('blob');
    const handle = await hDir.getFileHandle(`LAUDO_${Date.now()}.pdf`, {create:true});
    const w = await handle.createWritable();
    await w.write(blob); await w.close();
    document.getElementById('btn-rec').innerText = "INICIAR LOTE";
    alert("PDF Gerado!");
}
</script>
</body>
</html>
