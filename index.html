<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6.0 - ENGENHARIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --panel: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; }

        #container { display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 10px; }
        
        @media (orientation: landscape) {
            #container { flex-direction: row; }
            #monitor { flex: 2; border: 3px solid #333; border-radius: 12px; position: relative; overflow: hidden; }
            #sidebar { flex: 0.7; display: flex; flex-direction: column; gap: 10px; }
        }

        /* Monitor de Vídeo */
        #monitor { background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* KM Minimalista no Vídeo */
        #live-overlay {
            position: absolute; top: 15px; left: 15px; background: var(--highway-green);
            padding: 8px 20px; border-radius: 8px; border: 2px solid #fff;
            font-size: 1.8rem; font-weight: 900; box-shadow: 0 4px 10px #000;
        }

        /* Sidebar e Botões Clássicos */
        .card { background: var(--panel); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .card b { font-size: 1.5rem; color: var(--gold); }
        
        .btn { width: 100%; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-dir { background: var(--gold); color: #000; height: 55px; margin-top: auto; }
        .btn-start { background: var(--highway-green); color: #fff; height: 75px; font-size: 1.2rem; }
        .btn-stop { background: var(--danger); color: #fff; height: 75px; font-size: 1.2rem; }
        
        button:disabled { opacity: 0.2; }
        #log { font-size: 0.7rem; color: #888; text-align: center; min-height: 20px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="container">
    <div id="monitor">
        <video id="vid" autoplay playsinline muted></video>
        <div id="live-overlay">KM ---+---</div>
    </div>

    <div id="sidebar">
        <div class="card">
            <small>LOTE ATUAL</small><br>
            <b id="count-batch">0/50</b>
        </div>
        
        <div class="card">
            <small>TOTAL GERAL</small><br>
            <b id="count-total">0</b>
        </div>

        <div id="log">Aguardando definição de pasta...</div>

        <button id="btn-dir" class="btn btn-dir">📁 SELECIONAR PASTA</button>
        <button id="btn-start" class="btn btn-start" disabled>▶ INICIAR INSPEÇÃO</button>
        <button id="btn-stop" class="btn btn-stop" disabled>■ FINALIZAR LOTE</button>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmData = [], pos = null, isRecording = false;
let batch = [], totalPhotos = 0, batchIdx = 0, dir = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

window.onload = () => {
    startCam();
    loadCSV();
    startGPS();
    // Heartbeat para garantir que a câmera não trave
    setInterval(() => { if(vid.paused && !isRecording) vid.play(); }, 2000);
};

async function startCam() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} }
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
            vid.play();
        };
    } catch(e) { alert("Erro ao acessar câmera traseira."); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iK = h.indexOf('km'), iLt = h.findIndex(x => x.includes('lat')), iLn = h.findIndex(x => x.includes('lon'));
        
        kmData = rows.map(r => {
            const c = r.split(';');
            return { k: c[iK], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('log').innerText = "Erro SNV!"; }
}

function updateKM() {
    if(!pos || !kmData.length) return;
    let near = null, dMin = Infinity;
    for(const p of kmData) {
        const d = Math.hypot(p.lt - pos.lat, p.ln - pos.lon);
        if(d < dMin) { dMin = d; near = p; }
    }
    if(near) document.getElementById('live-overlay').innerText = near.k;
}

/* ======= ESTAMPA TÉCNICA (TOP-KM / BOTTOM-DATA) ======= */
function stampPhoto(meta) {
    const w = can.width, h = can.height;
    ctx.save();

    // 1. Moldura do KM no Topo (Estilo Placa de Regulamentação)
    const pW = w * 0.22;
    const pH = pW * 0.35;
    const margin = 25;
    
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.roundRect(margin, margin, pW, pH, 12);
    ctx.fill();

    ctx.fillStyle = "#056b3c";
    ctx.beginPath();
    ctx.roundRect(margin + 4, margin + 4, pW - 8, pH - 8, 8);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = `bold ${pH * 0.6}px Arial`;
    ctx.fillText(meta.km, margin + (pW/2), margin + (pH * 0.72));

    // 2. Data e Hora no Rodapé (Tarja sutil para não cobrir a pista)
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, h - 60, w, 60);

    ctx.fillStyle = "white";
    ctx.textAlign = "right";
    ctx.font = "bold 35px monospace";
    ctx.fillText(meta.ts, w - 30, h - 20);

    ctx.restore();
}

async function savePDF() {
    if(!batch.length || !dir) return;
    const items = [...batch]; batch = [];
    batchIdx++;
    document.getElementById('log').innerText = `💾 SALVANDO LOTE ${batchIdx}...`;

    const doc = new jspdf.jsPDF('l', 'mm', 'a4');

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                stampPhoto(items[i]);
                
                const ratio = can.width / can.height;
                let dw = 297, dh = 297/ratio;
                if(dh > 210) { dh = 210; dw = 210*ratio; }
                
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', (297-dw)/2, (210-dh)/2, dw, dh);
                res();
            };
            img.src = items[i].raw;
        });
    }

    const file = await dir.getFileHandle(`INSPECAO_LOTE_${batchIdx}.pdf`, {create:true});
    const stream = await file.createWritable();
    await stream.write(doc.output('blob'));
    await stream.close();
    document.getElementById('log').innerText = `LOTE ${batchIdx} SALVO COM SUCESSO!`;
}

function loop() {
    if(!isRecording) return;
    
    // Captura o frame bruto para processar depois (evita lag no vídeo)
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    batch.push({
        raw: can.toDataURL('image/jpeg', 0.6),
        km: document.getElementById('live-overlay').innerText,
        ts: new Date().toLocaleString('pt-BR')
    });

    totalPhotos++;
    document.getElementById('count-total').innerText = totalPhotos;
    document.getElementById('count-batch').innerText = `${batch.length}/50`;

    if(batch.length >= 50) savePDF();
    setTimeout(loop, 700);
}

document.getElementById('btn-dir').onclick = async () => {
    try {
        dir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-dir').innerText = "PASTA OK ✓";
        document.getElementById('btn-start').disabled = false;
        vid.play();
    } catch(e) {}
};

document.getElementById('btn-start').onclick = () => {
    isRecording = true; loop();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
};

document.getElementById('btn-stop').onclick = () => {
    isRecording = false; savePDF();
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
};

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        pos = { lat: p.coords.latitude, lon: p.coords.longitude };
        updateKM();
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
