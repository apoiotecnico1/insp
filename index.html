<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ordem Administrativa - Seguro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --warning: #e74c3c;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .timer-box { background: #34495e; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        #currentTime { font-size: 2em; font-weight: bold; font-family: monospace; }

        .shortcuts { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 15px; max-height: 250px; overflow-y: auto; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-shortcut { padding: 8px; font-size: 0.75rem; cursor: pointer; background: #ebf0f1; border: 1px solid #bdc3c7; border-radius: 4px; transition: 0.2s; }
        .btn-shortcut:hover { background: #d5dbdb; }

        .input-group { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }

        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: var(--accent); color: white; }
        .btn-clear { background: var(--warning); color: white; margin-top: 10px; width: 100%; }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }

        .footer-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-copy { background: #3498db; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="timer-box">
        <div id="status">Status: Pronto para iniciar</div>
        <div id="currentTime">00:00:00</div>
    </div>

    <div class="input-group">
        <label><b>Selecione ou digite a atividade:</b></label>
        <div class="shortcuts" id="shortcutList">
            </div>
        <input type="text" id="desc" placeholder="Ou digite outra atividade aqui...">
    </div>

    <div class="main-actions">
        <button class="btn-start" onclick="startTask()">▶ Iniciar Agora</button>
        <button class="btn-stop" onclick="stopTask()">✔ Finalizar e Salvar</button>
    </div>

    <div class="table-container">
        <table id="logTable">
            <thead>
                <tr>
                    <th>Início</th>
                    <th>Fim</th>
                    <th>Duração</th>
                    <th>Atividade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="footer-actions">
        <button class="btn-wa" onclick="sendWhatsApp()">📱 Enviar WhatsApp</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 Copiar Texto</button>
    </div>

    <button class="btn-clear" onclick="clearAllData()">⚠ Limpar Tela e Dados (Zerar Dia)</button>
</div>

<script>
    const atalhos = [
        "Material para Anderson", "Material para Fiber Tech", "Atendimento Fiber Tech", "Atendimento Anderson",
        "Reuniões de equipe terceira", "Reuniões internas", "Verificação dos sistemas", "E-mails", "Documentação",
        "Fibra ótica", "Acompanhamento de terceiras", "Descarte de materiais", "Separação de materiais",
        "Apoio técnico interno", "Apoio ao técnico local", "Inspeção noturna", "Inspeção de passarelas",
        "Transporte de materiais", "Inspeção elétrica", "Análise comportamental", "Levantamento de material",
        "Levantamento de procedimentos", "Ajustes", "Programação de obras", "Manutenção de Frota",
        "Feedback com técnicos", "Apoio local/fone"
    ];

    let activities = JSON.parse(localStorage.getItem('activities')) || [];
    let startTime = localStorage.getItem('startTime') ? new Date(localStorage.getItem('startTime')) : null;

    // Inicialização
    window.onload = () => {
        renderShortcuts();
        renderTable();
        if (startTime) {
            document.getElementById('status').innerText = "Status: Tarefa em andamento...";
            updateTicker();
        }
    };

    function renderShortcuts() {
        const container = document.getElementById('shortcutList');
        atalhos.forEach(item => {
            let btn = document.createElement('button');
            btn.className = 'btn-shortcut';
            btn.innerText = item;
            btn.onclick = () => document.getElementById('desc').value = item;
            container.appendChild(btn);
        });
    }

    function startTask() {
        if (startTime) return alert("Já existe uma tarefa em andamento!");
        startTime = new Date();
        localStorage.setItem('startTime', startTime.toISOString());
        document.getElementById('status').innerText = "Status: Tarefa em andamento...";
        updateTicker();
    }

    function updateTicker() {
        if (!startTime) return;
        const now = new Date();
        const diff = new Date(now - startTime);
        document.getElementById('currentTime').innerText = diff.toISOString().substr(11, 8);
        setTimeout(updateTicker, 1000);
    }

    function stopTask() {
        if (!startTime) return alert("Inicie uma tarefa primeiro!");
        
        const endTime = new Date();
        const desc = document.getElementById('desc').value || "Atividade Geral";
        const duration = document.getElementById('currentTime').innerText;
        
        const entry = {
            start: startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            end: endTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            duration: duration,
            desc: desc
        };

        activities.push(entry);
        localStorage.setItem('activities', JSON.stringify(activities));
        
        // Reset
        startTime = null;
        localStorage.removeItem('startTime');
        document.getElementById('status').innerText = "Status: Salvo com sucesso!";
        document.getElementById('currentTime').innerText = "00:00:00";
        document.getElementById('desc').value = "";
        
        renderTable();
    }

    function renderTable() {
        const tbody = document.querySelector("#logTable tbody");
        tbody.innerHTML = activities.map(a => `
            <tr>
                <td>${a.start}</td>
                <td>${a.end}</td>
                <td>${a.duration}</td>
                <td>${a.desc}</td>
            </tr>
        `).reverse().join(''); // Mais recentes no topo
    }

    function getFormatedReport() {
        return activities.map(a => `📌 *${a.start} - ${a.end}* (${a.duration})\n_${a.desc}_`).join('\n\n');
    }

    function sendWhatsApp() {
        const text = encodeURIComponent("*RELATÓRIO DE ORDENS - ADM*\n\n" + getFormatedReport());
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function copyToClipboard() {
        const text = getFormatedReport().replace(/\*/g, '').replace(/_/g, '');
        navigator.clipboard.writeText(text);
        alert("Relatório copiado!");
    }

    function clearAllData() {
        if (confirm("Deseja realmente limpar toda a lista e zerar o dia?")) {
            localStorage.clear();
            activities = [];
            startTime = null;
            location.reload();
        }
    }
</script>

</body>
</html>
