<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA ELITE PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #333; padding: 30px; border-radius: 15px; max-width: 400px; background: #0a0a0a; text-align: center; }
        .btn-aware { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }

        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); padding: 10px 20px; 
            border: 2px solid #fff; border-radius: 8px; z-index: 10;
        }
        #km-hud h1 { font-size: calc(1.5rem + 1vw); font-weight: 900; }

        #rec-indicator { 
            position: absolute; top: 20px; right: 20px; 
            display: none; align-items: center; gap: 8px; 
            background: rgba(0,0,0,0.6); padding: 8px 15px; 
            border-radius: 30px; z-index: 10;
        }
        .dot { width: 12px; height: 12px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui-controls { 
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100;
        }

        .btn-main { border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 18px 40px; font-size: 14px; background: var(--accent); color: #000; }
        #gear-btn { width: 55px; height: 55px; border-radius: 12px; background: rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 300px; height: 100%; 
            background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); z-index: 4000; 
            padding: 30px 20px; transition: 0.4s; border-left: 1px solid #333;
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:15px">OPERAÇÃO DE CAMPO</h2>
        <p style="color: #ccc; font-size: 13px; margin-bottom: 20px;">Permita o acesso à pasta para salvar os arquivos automaticamente.</p>
        <button class="btn-aware" onclick="startApp()">Autorizar Pasta</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:25px; font-size:14px;">AJUSTES</h3>
    <div class="field"><label>Câmera</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Fotos por Lote</label><input type="number" id="cfg-lote" value="200"></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <button class="btn-aware" onclick="toggleSet()">Voltar</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-indicator"><div class="dot"></div><span style="font-weight:900;font-size:14px">REC</span></div>
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>
        <button id="btn-start" class="btn-main" onclick="initCapture()">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// Impedir fechamento
window.addEventListener('beforeunload', (e) => { if (rec) { e.preventDefault(); e.returnValue = ''; } });

async function requestWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function startApp() {
    try {
        // Solicita acesso à pasta e pede permissão de ESCRITA explicitamente
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        
        // Verifica se temos permissão de escrita (Chrome exige isso para FileSystem API)
        const options = { mode: 'readwrite' };
        if ((await hDir.queryPermission(options)) !== 'granted') {
            await hDir.requestPermission(options);
        }

        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        await listCams(); loadCSV(); initGPS(); requestWakeLock();
    } catch(e) { 
        alert("Erro: Para salvar os arquivos, você deve selecionar a pasta e confirmar a permissão no topo do Chrome."); 
    }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-indicator').style.display = 'flex';
    loop();
}

function stopCapture() {
    rec = false;
    if(buffer.length > 0) {
        const temp = [...buffer];
        savePDF(temp, kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    }
    buffer = [];
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        can.width = vid.videoWidth; 
        can.height = vid.videoHeight;
        ctx.drawImage(vid, 0, 0);
        const curKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.5), 
            km: curKm, 
            ts: new Date().toLocaleTimeString('pt-BR') 
        });
        
        const limit = parseInt(document.getElementById('cfg-lote').value) || 200;
        if(buffer.length >= limit) {
            const temp = [...buffer];
            const kIni = kmInicialLote;
            const kFim = curKm;
            buffer = [];
            kmInicialLote = curKm;
            savePDF(temp, kIni, kFim);
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(data, ini, fim) {
    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-bh, can.width, bh);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${bh*0.4}px Arial`;
                ctx.fillText(`Km ${data[i].km}`, 40, can.height-(bh*0.45));
                ctx.font = `${bh*0.2}px Arial`;
                ctx.fillText(`${new Date().toLocaleDateString('pt-BR')} | ${data[i].ts}`, 40, can.height-(bh*0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph); r();
            };
            img.src = data[i].raw;
        });
    }

    const d = new Date();
    const pad = (n) => n.toString().padStart(2, '0');
    const dataAbrev = pad(d.getDate()) + pad(d.getMonth()+1) + d.getFullYear().toString().substring(2);
    const horaAbrev = pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
    
    // Nome limpo para evitar erros no Chrome/Android
    const safeIni = ini.replace(/[^0-9]/g, '');
    const safeFim = fim.replace(/[^0-9]/g, '');
    const nome = `Relat_KM_${safeIni}_a_${safeFim}_${dataAbrev}_${horaAbrev}.pdf`;

    try {
        // ESSENCIAL PARA O CHROME: Criar o arquivo e escrever o blob
        const fileHandle = await hDir.getFileHandle(nome, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
        console.log("Salvo com sucesso: " + nome);
    } catch(e) { 
        console.error("Erro ao gravar arquivo. Verifique a permissão da pasta no topo do Chrome.", e);
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "Km " + b.km;
    }, null, {enableHighAccuracy:true});
}
document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible') requestWakeLock(); });
</script>
</body>
</html>
