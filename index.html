<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>SISTEMA APOIO V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --accent: #00f2ff;
            --danger: #ff0055;
            --road-green: #007934;
            --glass: rgba(10, 10, 10, 0.75);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }

        /* Gate de Segurança Modernizado */
        #safety-gate {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .gate-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            padding: 50px; border-radius: 30px; text-align: center;
            border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* HUD Estilo Placa Refinada */
        #km-hud {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px;
            background: var(--road-green);
            padding: 10px 25px; border: 4px solid #fff; border-radius: 12px;
            z-index: 1000; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center;
        }
        #br-txt { font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; color: #fff; margin-bottom: -5px; opacity: 0.9; }
        #km-txt { font-size: 2.8rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 0px rgba(0,0,0,0.3); }

        /* App Shell e Vídeo */
        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* Controles Estilo Mobile Pro */
        #ui-controls {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 30px; z-index: 2000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ui-hidden { opacity: 0; pointer-events: none; transform: translate(-50%, 20px); }

        .btn-rec {
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
            background: transparent; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }
        .btn-rec::after {
            content: ''; width: 60px; height: 60px; background: #fff; border-radius: 50%;
            transition: all 0.3s;
        }
        .capturing .btn-rec::after { background: var(--danger); border-radius: 8px; scale: 0.6; }
        .capturing .btn-rec { border-color: var(--danger); animation: pulse-red 1.5s infinite; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 0, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); } }

        .btn-side {
            width: 55px; height: 55px; background: var(--glass);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; color: #fff; font-size: 20px; cursor: pointer;
        }

        /* Barra de Status Inferior */
        #meta-bar {
            position: absolute; bottom: 0; width: 100%; padding: 10px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex; justify-content: space-between; font-size: 11px;
            color: rgba(255,255,255,0.7); pointer-events: none;
        }

        /* Settings Panel */
        #settings-panel {
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 350px; height: 100%;
            background: var(--glass); backdrop-filter: blur(30px); z-index: 4000;
            padding: 40px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        #settings-panel.open { right: 0; }
        .set-item { margin-bottom: 25px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
        input, select {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444;
            padding: 12px; border-radius: 10px; color: #fff;
        }

        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 3000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="safety-gate">
    <div class="gate-card">
        <h1 style="color:var(--accent); font-size: 1.5rem; letter-spacing: 4px; margin-bottom: 10px;">PRO-APOIO</h1>
        <p style="color:#666; font-size: 0.8rem; margin-bottom: 30px;">SISTEMA DE MONITORAMENTO DE ATIVOS</p>
        <button onclick="startApp()" style="background:#fff; color:#000; border:none; padding:15px 40px; border-radius:50px; font-weight:900; cursor:pointer;">INICIAR SESSÃO</button>
    </div>
</div>

<div id="settings-panel">
    <h2 style="margin-bottom:30px; font-weight:200;">Configurações</h2>
    <div class="set-item">
        <label>Dispositivo de Vídeo</label>
        <select id="cam-select" onchange="switchCam(this.value)"></select>
    </div>
    <div class="set-item">
        <label>Frequência (ms)</label>
        <input type="number" id="cfg-int" value="400">
    </div>
    <div class="set-item">
        <label>Fotos por PDF</label>
        <input type="number" id="cfg-lote" value="50">
    </div>
    <button onclick="toggleSet()" style="background:var(--accent); color:#000; border:none; width:100%; padding:15px; border-radius:10px; font-weight:bold; margin-top:20px;">SALVAR E VOLTAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="userInteraction()"></video>
    
    <div id="km-hud">
        <span id="br-txt">---</span>
        <h1 id="km-txt">---</h1>
    </div>

    <div id="ui-controls">
        <button class="btn-side" onclick="toggleSet()">⚙️</button>
        <div id="btn-rec-container" onclick="toggleCapture()" class="btn-rec"></div>
        <button class="btn-side" onclick="takeManualPhoto()">📸</button>
    </div>

    <div id="meta-bar">
        <span id="gps-display">GPS: Aguardando sinal...</span>
        <span id="status-display">SISTEMA PRONTO</span>
    </div>
</div>

<canvas id="c"></canvas>

<script>
    let kmDB=[], capturing=false, hDir=null, currentStream=null;
    let kmInicialLote = "", brAtual = "", buffer = [];
    let curLat = "0.0000", curLon = "0.0000";
    let hideTimeout;

    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');

    // Inicialização
    async function startApp() {
        try {
            hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('safety-gate').remove();
            document.getElementById('app-shell').style.visibility = 'visible';
            
            if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
            
            await listCams();
            loadCSV();
            initGPS();
            userInteraction();
        } catch(e) { alert("Permissão de pasta necessária para salvar arquivos."); }
    }

    // UX: Esconde UI automaticamente
    function userInteraction() {
        const ui = document.getElementById('ui-controls');
        ui.classList.remove('ui-hidden');
        clearTimeout(hideTimeout);
        if(!capturing) {
            hideTimeout = setTimeout(() => ui.classList.add('ui-hidden'), 5000);
        }
    }

    async function listCams() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const vids = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
        if(vids.length) switchCam(vids[vids.length-1].deviceId);
    }

    async function switchCam(id) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        currentStream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        vid.srcObject = currentStream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    }

    // Marca d'água Profissional
    async function drawWatermark(km, br) {
        const h = can.height;
        const w = can.width;
        const barH = h * 0.12;

        // Overlay inferior
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, h - barH, w, barH);
        
        // Linha Accent
        ctx.fillStyle = "#00f2ff";
        ctx.fillRect(0, h - barH, 5, barH);

        ctx.fillStyle = "#fff";
        ctx.font = `bold ${h * 0.05}px var(--font-main)`;
        ctx.fillText(`BR ${br} | Km ${km}`, 30, h - (barH * 0.45));
        
        ctx.font = `400 ${h * 0.02}px monospace`;
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fillText(`${new Date().toLocaleString()} | LAT: ${curLat} LON: ${curLon}`, 30, h - (barH * 0.2));
    }

    async function takeManualPhoto() {
        if(!hDir) return;
        document.getElementById('flash').style.opacity = "0.4";
        setTimeout(() => document.getElementById('flash').style.opacity = "0", 100);

        ctx.drawImage(vid, 0, 0, can.width, can.height);
        await drawWatermark(document.getElementById('km-txt').innerText, brAtual);
        
        const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
        const name = `MANUAL_${brAtual}_KM${document.getElementById('km-txt').innerText}_${Date.now()}.jpg`;
        const handle = await hDir.getFileHandle(name, { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
    }

    function toggleCapture() {
        capturing = !capturing;
        const btn = document.getElementById('btn-rec-container');
        const status = document.getElementById('status-display');

        if(capturing) {
            document.getElementById('app-shell').classList.add('capturing');
            status.innerText = "GRAVANDO SESSÃO...";
            buffer = [];
            kmInicialLote = document.getElementById('km-txt').innerText;
            captureLoop();
        } else {
            document.getElementById('app-shell').classList.remove('capturing');
            status.innerText = "GERANDO PDF FINAL...";
            if(buffer.length > 0) finalizePDF();
        }
    }

    async function captureLoop() {
        if (!capturing) return;
        const currentKm = document.getElementById('km-txt').innerText;
        
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            img: can.toDataURL('image/jpeg', 0.5), 
            km: currentKm, 
            br: brAtual 
        });

        if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
            const tempBuffer = [...buffer];
            buffer = [];
            await savePDF(tempBuffer, kmInicialLote, currentKm);
            kmInicialLote = currentKm;
        }
        setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
    }

    async function finalizePDF() {
        await savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText);
        buffer = [];
        document.getElementById('status-display').innerText = "SISTEMA PRONTO";
    }

    async function savePDF(dataList, kmIni, kmFim) {
        const doc = new jspdf.jsPDF('l', 'mm', 'a4');
        const pw = doc.internal.pageSize.getWidth();
        const ph = doc.internal.pageSize.getHeight();

        for (let i = 0; i < dataList.length; i++) {
            if (i > 0) doc.addPage();
            const img = new Image();
            img.src = dataList[i].img;
            await new Promise(res => {
                img.onload = async () => {
                    ctx.drawImage(img, 0, 0, can.width, can.height);
                    await drawWatermark(dataList[i].km, dataList[i].br);
                    doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                    res();
                };
            });
        }
        const name = `RELAT_BR${brAtual}_KM${kmIni}_A_${kmFim}.pdf`;
        const handle = await hDir.getFileHandle(name, { create: true });
        const writable = await handle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    }

    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            curLat = p.coords.latitude.toFixed(6);
            curLon = p.coords.longitude.toFixed(6);
            document.getElementById('gps-display').innerText = `LAT: ${curLat} | LON: ${curLon}`;
            
            if (!kmDB.length) return;
            let best = null, minD = Infinity;
            for (const pt of kmDB) {
                const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
                if (d < minD) { minD = d; best = pt; }
            }
            if (best) {
                brAtual = best.br;
                document.getElementById('br-txt').innerText = "BR " + best.br;
                document.getElementById('km-txt').innerText = best.km;
            }
        }, null, { enableHighAccuracy: true });
    }

    async function loadCSV() {
        try {
            const r = await fetch('SNVBR116SPRJ.csv');
            const t = await r.text();
            const rows = t.split('\n').filter(l => l.includes(';'));
            const h = rows.shift().toLowerCase().split(';');
            const ibr=h.indexOf('br'), ikm=h.indexOf('km'), ilat=h.findIndex(x=>x.includes('lat')), ilon=h.findIndex(x=>x.includes('lon'));
            kmDB = rows.map(r => {
                const c = r.split(';');
                return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat]?.replace(',','.')), ln: parseFloat(c[ilon]?.replace(',','.')) };
            }).filter(d => !isNaN(d.lt));
        } catch(e) { console.error("CSV Load Error"); }
    }

    function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
