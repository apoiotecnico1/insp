<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom Technical V9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --blue: #00d4ff; --red: #ff3d00; --warn: #ffea00; --glass: rgba(10, 10, 10, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; user-select: none; }
        body { background: #000; color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* Interface de Vídeo */
        #viewport { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD Técnico Superior */
        #hud { position: absolute; top: 15px; left: 15px; display: flex; gap: 12px; z-index: 1000; }
        .hud-card { 
            background: var(--glass); padding: 10px 18px; border-radius: 12px; 
            border-left: 4px solid var(--accent); backdrop-filter: blur(15px);
        }
        .hud-val { font-size: 2rem; font-weight: 900; color: #fff; display: block; line-height: 1; }
        .hud-lbl { font-size: 0.6rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }

        /* Grade de Botões (Lateral Direita) */
        #action-panel {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: grid; grid-template-columns: repeat(2, 70px); gap: 6px; z-index: 1000;
        }
        .btn {
            height: 46px; border-radius: 6px; border: none; background: var(--glass);
            color: #fff; font-size: 0.45rem; font-weight: 800; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; text-align: center;
            backdrop-filter: blur(5px); transition: 0.1s;
        }
        .btn:active { transform: scale(0.9); background: #fff; color: #000; }
        
        /* Botões Especiais */
        .btn-full { grid-column: span 2; height: 38px; font-size: 0.6rem; }
        .b-clean { background: rgba(255,255,255,0.15); border: 1px solid #fff; }
        .b-norm { border-bottom: 4px solid #fff; }
        .b-ilum { border-bottom: 4px solid var(--accent); }
        .b-def { border-bottom: 4px solid var(--red); }
        .b-fib { border-bottom: 4px solid var(--blue); }
        .b-aten { border-bottom: 4px solid var(--warn); }

        /* Rodapé de Comandos */
        #footer {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 1000;
        }
        .btn-main { 
            background: var(--accent); color: #000; border: none; padding: 16px 45px; 
            border-radius: 50px; font-weight: 900; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .rec-active { background: var(--red) !important; color: #fff; animation: blink 1s infinite; }
        .gear { background: var(--glass); border: 1px solid #fff; color: #fff; width: 50px; height: 50px; border-radius: 50%; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }

        @keyframes blink { 50% { opacity: 0.6; } }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 2000; }
        #config { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { display: none; }
    </style>
</head>
<body onclick="if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen()">

<div id="flash"></div>

<div id="gate">
    <h1 style="color:var(--accent); font-weight:900; margin-bottom:10px;">ANGSTROM V9</h1>
    <p style="color:#666; margin-bottom:30px; font-size:0.8rem;">APOIO TÉCNICO - INFRAESTRUTURA</p>
    <button class="btn-main" onclick="init()">INICIAR CONSOLE</button>
</div>

<div id="config">
    <h2 style="color:var(--accent); margin-bottom:20px;">CONFIGURAÇÕES</h2>
    <select id="camList" onchange="switchCam()" style="width:280px; padding:15px; background:#222; color:#fff; border:1px solid var(--accent); border-radius:8px;"></select>
    <button class="btn-main" style="margin-top:40px;" onclick="document.getElementById('config').style.display='none'">VOLTAR</button>
</div>

<div id="viewport">
    <video id="vid" autoplay playsinline muted></video>

    <div id="hud">
        <div class="hud-card"><span class="hud-lbl">Km Rodovia</span><span id="km" class="hud-val">---</span></div>
        <div class="hud-card"><span class="hud-lbl">Fotos Lote</span><span id="counter" class="hud-val">000</span></div>
    </div>

    <div id="action-panel">
        <button class="btn btn-full b-clean" onclick="trigger('FOTO LIMPA')">📷 FOTO LIMPA (S/ KM)</button>
        <button class="btn b-ilum" onclick="trigger('ILUMINAÇÃO APAGADA')">ILUM. APAGADA</button>
        <button class="btn b-ilum" onclick="trigger('ABRIR O.S.')">ABRIR O.S.</button>
        <button class="btn b-def" onclick="trigger('POSTE APAGADO')">POSTE APAGADO</button>
        <button class="btn b-def" onclick="trigger('LUMINÁRIA APAGADA')">LUM. APAGADA</button>
        <button class="btn b-fib" onclick="trigger('FIBRA ROMPIDA')">FIBRA ROMPIDA</button>
        <button class="btn b-fib" onclick="trigger('BACKBONE ABERTA')">BACKBONE ABERTA</button>
        <button class="btn b-fib" onclick="trigger('ALARME DE FIBRA')">ALARME FIBRA</button>
        <button class="btn b-fib" onclick="trigger('INOPERANTE')">INOPERANTE</button>
        <button class="btn b-aten" onclick="trigger('VANDALISMO')">VANDALISMO</button>
        <button class="btn b-aten" onclick="trigger('DANIFICADO')">DANIFICADO</button>
        <button class="btn b-aten" onclick="trigger('ATENÇÃO')">ATENÇÃO</button>
        <button class="btn btn-full b-norm" onclick="trigger('NORMALIZADO')">✅ SISTEMA NORMALIZADO</button>
    </div>

    <div id="footer">
        <button class="gear" onclick="document.getElementById('config').style.display='flex'">⚙️</button>
        <button id="recBtn" class="btn-main" onclick="toggleRec()">GRAVAR LOTE</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
let db = [], isRec = false, hDir = null, pdfBuffer = [], tag = "INSPEÇÃO";
let lat = 0, lon = 0, stream = null;

async function init() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('viewport').style.visibility = 'visible';
        await getCams(); await startCam(); loadCSV(); startGPS();
    } catch(e) { console.log("Permissão necessária"); }
}

async function getCams() {
    const d = await navigator.mediaDevices.enumerateDevices();
    const v = d.filter(i => i.kind === 'videoinput');
    document.getElementById('camList').innerHTML = v.map(c => `<option value="${c.deviceId}">${c.label || 'Camera'}</option>`).join('');
}

async function startCam(id) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id ? {exact:id} : undefined, width: 1920, height: 1080 } });
    document.getElementById('vid').srcObject = stream;
}

function switchCam() { startCam(document.getElementById('camList').value); }

function trigger(label) {
    tag = label;
    const f = document.getElementById('flash');
    f.style.opacity = "0.6"; setTimeout(() => f.style.opacity = "0", 50);
    snap(true);
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude; lon = p.coords.longitude;
        if (db.length) {
            let close = db.reduce((prev, curr) => Math.hypot(curr.lt-lat, curr.ln-lon) < Math.hypot(prev.lt-lat, prev.ln-lon) ? curr : prev);
            document.getElementById('km').innerText = close.km;
        }
    }, null, { enableHighAccuracy: true });
}

function toggleRec() {
    isRec = !isRec;
    const b = document.getElementById('recBtn');
    if (isRec) {
        b.innerText = "FINALIZAR PDF"; b.classList.add('rec-active');
        pdfBuffer = []; loop();
    } else {
        b.innerText = "SALVANDO..."; b.classList.remove('rec-active');
        savePDF();
    }
}

function loop() { if (isRec) { snap(false); setTimeout(loop, 500); } }

async function snap(saveJPG) {
    const v = document.getElementById('vid');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    const kmStr = document.getElementById('km').innerText;

    ctx.drawImage(v, 0, 0);
    
    // Design do Carimbo (Otimizado)
    const h = c.height * 0.10;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, c.height - h, c.width, h);

    ctx.fillStyle = "#fff";
    if (tag === 'FOTO LIMPA') {
        ctx.font = "24px Arial";
        ctx.fillText(`REGISTRO TÉCNICO: ${new Date().toLocaleString()}`, 50, c.height - (h/2) + 10);
    } else {
        ctx.fillStyle = tag.includes('FIBRA') ? varColor('--blue') : (tag.includes('NORMAL') ? varColor('--accent') : varColor('--red'));
        ctx.fillRect(0, c.height - h, 15, h);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 42px Arial";
        ctx.fillText(`${tag} | Km ${kmStr}`, 40, c.height - (h*0.58));
        ctx.font = "22px Arial";
        ctx.fillText(`${new Date().toLocaleString()} | GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)}`, 40, c.height - (h*0.25));
    }

    const img = c.toDataURL('image/jpeg', 0.85);
    pdfBuffer.push(img);
    document.getElementById('counter').innerText = pdfBuffer.length.toString().padStart(3, '0');

    if (saveJPG) {
        const blob = await (await fetch(img)).blob();
        const file = await hDir.getFileHandle(`${tag.replace(' ','_')}_Km${kmStr}_${Date.now()}.jpg`, {create:true});
        const w = await file.createWritable();
        await w.write(blob); await w.close();
        tag = "INSPEÇÃO";
    }
}

const varColor = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

async function savePDF() {
    if (!pdfBuffer.length) return;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for (let i=0; i<pdfBuffer.length; i++) {
        if (i>0) doc.addPage();
        doc.addImage(pdfBuffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const blob = doc.output('blob');
    const file = await hDir.getFileHandle(`RELATORIO_${Date.now()}.pdf`, {create:true});
    const w = await file.createWritable();
    await w.write(blob); await w.close();
    document.getElementById('recBtn').innerText = "GRAVAR LOTE";
    document.getElementById('counter').innerText = "000";
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().toLowerCase().split(';');
        const iK = h.indexOf('km'), iLt = h.findIndex(s=>s.includes('lat')), iLn = h.findIndex(s=>s.includes('lon'));
        db = rows.map(r => {
            const c = r.split(';');
            return { km: c[iK], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        });
    } catch(e) {}
}
</script>
</body>
</html>
