<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V11 - PREMIUM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --danger: #cc0000; --glass: rgba(15, 15, 15, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .loader { width: 50px; height: 50px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* App Layout */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }
        #cam-container { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay UI Discreta */
        .overlay { position: absolute; z-index: 10; pointer-events: none; }
        #km-display { top: 20px; left: 20px; background: var(--safety); padding: 12px 25px; border-radius: 4px; border-left: 5px solid #fff; font-size: 2.4rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.8); letter-spacing: -1px; }
        
        #side-bar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .icon-btn { width: 55px; height: 55px; background: var(--glass); border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; transition: 0.3s; font-size: 20px; }
        .icon-btn:active { transform: scale(0.9); border-color: var(--accent); }

        /* Painel de Controle Inferior */
        #bottom-ctrl { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; pointer-events: auto; width: 90%; max-width: 600px; background: var(--glass); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid #333; justify-content: space-between; }
        .status-dot { display: flex; flex-direction: column; align-items: center; }
        .status-dot small { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .status-dot b { font-size: 1.2rem; color: var(--accent); }

        .main-btn { border: none; border-radius: 30px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; padding: 15px 35px; font-size: 14px; }
        #btn-start { background: var(--safety); color: #fff; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        .main-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* Ajustes Modal */
        #settings { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #0a0a0a; z-index: 500; transition: 0.4s; padding: 40px 25px; border-left: 2px solid var(--accent); }
        #settings.open { right: 0; }
        .close-settings { position: absolute; top: 15px; right: 15px; color: #666; cursor: pointer; font-size: 12px; }
        .set-group { margin-bottom: 25px; }
        .set-group label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 8px; font-weight: bold; }
        .set-group select, .set-group input { width: 100%; background: #151515; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader"></div>
    <h2 style="letter-spacing: 4px; font-weight: 200;">INSPEÇÃO<b style="color:var(--accent)">PRO</b></h2>
    <p id="boot-status" style="font-size: 10px; color: #555; margin-top: 10px;">INICIALIZANDO SISTEMA ÓPTICO...</p>
</div>

<div id="settings">
    <div class="close-settings" onclick="toggleSet()">FECHAR [X]</div>
    <h3 style="margin-bottom: 30px; font-weight: 300;">PREFERÊNCIAS</h3>
    <div class="set-group">
        <label>HARDWARE DE CAPTURA</label>
        <select id="cam-select" onchange="switchCam(this.value)"></select>
    </div>
    <div class="set-group">
        <label>FREQUÊNCIA DE CICLO (MS)</label>
        <input type="number" id="cfg-int" value="200">
    </div>
    <div class="set-group">
        <label>LIMITE DE LOTE (PÁGINAS)</label>
        <input type="number" id="cfg-lote" value="200">
    </div>
</div>

<div id="app-shell">
    <div id="cam-container">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-display" class="overlay">Km ---+---</div>
        
        <div id="side-bar">
            <div class="icon-btn" onclick="toggleSet()">⚙️</div>
            <div id="btn-folder" class="icon-btn" title="Definir Pasta">📁</div>
        </div>

        <div id="bottom-ctrl">
            <div class="status-dot">
                <small>Lote Atual</small>
                <b id="stat-batch">0/200</b>
            </div>
            
            <button id="btn-start" class="main-btn" disabled>Iniciar Captura</button>
            <button id="btn-stop" class="main-btn">Finalizar PDF</button>

            <div class="status-dot">
                <small>Total Geral</small>
                <b id="stat-total">0</b>
            </div>
        </div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null, currentStream = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

window.onload = async () => {
    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
    setTimeout(() => document.getElementById('splash').remove(), 800); }, 2000);
    listCams(); loadCSV(); initG();
};

async function listCams() {
    try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `LENTE TÉCNICA ${i + 1}`;
            sel.appendChild(opt);
        });
        if(videoDevices.length > 0) initC(videoDevices.deviceId);
    } catch(e) { document.getElementById('boot-status').innerText = "ERRO: ACESSO À CÂMERA NEGADO"; }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const s = await navigator.mediaDevices.getUserMedia({video:{deviceId: id ? {exact: id} : undefined, width:1920, height:1080}});
    currentStream = s;
    vid.srcObject = s;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Database offline"); }
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-display').innerText = "Km " + n.km;
}

/* ======= MOLDURA E ESTAMPA PREMIUM ======= */
function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    
    // Moldura Interna Técnica
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.strokeRect(20, 20, w-40, h-40);

    // Tarja de Dados Integrada
    const barH = h * 0.15;
    const grd = ctx.createLinearGradient(0, h - barH, 0, h);
    grd.addColorStop(0, "transparent");
    grd.addColorStop(1, "rgba(0,0,0,0.9)");
    ctx.fillStyle = grd;
    ctx.fillRect(0, h - barH, w, barH);

    ctx.lineJoin = "round";
    ctx.textAlign = "left";
    
    // KM Estilo Pericial
    const fK = barH * 0.4;
    ctx.font = `900 ${fK}px Arial Black`;
    ctx.lineWidth = 12; ctx.strokeStyle = "#000";
    ctx.strokeText("Km " + m.km, 50, h - (barH * 0.5));
    ctx.fillStyle = "#fff";
    ctx.fillText("Km " + m.km, 50, h - (barH * 0.5));

    // Data/Hora Menor
    const fD = barH * 0.18;
    ctx.font = `bold ${fD}px Arial`;
    ctx.lineWidth = 6; ctx.strokeStyle = "#000";
    ctx.strokeText(m.ts, 50, h - (barH * 0.22));
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillText(m.ts, 50, h - (barH * 0.22));
    
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = 297, ph = 210;

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                
                // Cálculo de Proporção Inteligente
                const imgRatio = can.width / can.height;
                const pgRatio = pw / ph;
                let dw, dh, dx, dy;

                if(imgRatio > pgRatio) {
                    dw = pw; dh = pw / imgRatio; dx = 0; dy = (ph - dh) / 2;
                } else {
                    dh = ph; dw = ph * imgRatio; dy = 0; dx = (pw - dw) / 2;
                }

                doc.setFillColor(10, 10, 10);
                doc.rect(0, 0, pw, ph, 'F'); // Fundo escuro luxo
                doc.addImage(can.toDataURL('image/jpeg', 0.9), 'JPEG', dx, dy, dw, dh);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`RELATORIO_TECNICO_LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const limit = parseInt(document.getElementById('cfg-lote').value) || 200;
    buffer.push({
        raw: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('km-display').innerText.replace("Km ", ""),
        ts: new Date().toLocaleString('pt-BR')
    });
    total++;
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-batch').innerText = `${buffer.length}/${limit}`;
    if(buffer.length >= limit) save();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

document.getElementById('btn-folder').onclick = async () => {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        // Entrar em Full Screen Automático
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        document.getElementById('btn-folder').style.background = "var(--safety)";
        document.getElementById('btn-start').disabled = false;
    } catch(e) {}
};

document.getElementById('btn-start').onclick = () => {
    rec = true; loop();
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
};

document.getElementById('btn-stop').onclick = () => {
    rec = false; save();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
};

function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
