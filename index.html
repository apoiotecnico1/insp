<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b7a39" />
<title>Inspeção Contínua – Vídeo HQ com KM</title>
<style>
  :root{
    --green:#0b7a39; --green2:#085e2c; --fg:#eaf2ff; --border:#e6f0ea;
    --glass: rgba(0,0,0,.55);
    --btn:#22c55e; --btn2:#35eb85; --bad:#ef4444; --muted:#a8b7d6;
  }
  html,body{
    margin:0;height:100%;background:#000;overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial
  }
  /* O vídeo real vem da câmera; renderizamos em canvas para que a gravação inclua a sobreposição. */
  #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:contain; background:#000; z-index:0; }
  #mix { position:fixed; inset:0; width:100%; height:100%; z-index:1; touch-action:none; }

  /* Placa KM (também desenhada no vídeo gravado, mas aparece em overlay para operador) */
  #kmBox{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,var(--green),var(--green2)); color:#fff;
    padding:14px 24px; border-radius:18px; border:6px solid var(--border);
    font-size:clamp(28px,8vw,120px); font-weight:1000; text-shadow:0 1px 0 rgba(0,0,0,.45);
    box-shadow:0 14px 28px rgba(0,0,0,.5), inset 0 0 0 3px rgba(255,255,255,.5);
    z-index:3; user-select:none; letter-spacing:.5px
  }

  /* Barra inferior */
  #bar{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom)); z-index:4;
    display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;
    background:var(--glass); border:1px solid rgba(255,255,255,.12);
    padding:8px; border-radius:14px; backdrop-filter: blur(8px);
    box-shadow:0 8px 24px rgba(0,0,0,.45); max-width:min(100vw - 16px, 1200px);
  }
  .control{
    height:52px; min-width:160px;
    padding:0 16px; border-radius:12px; border:1px solid rgba(255,255,255,.18);
    font-weight:1000; font-size:1rem; cursor:pointer; line-height:1;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    user-select:none; outline:none;
    transition:transform .06s ease, filter .12s ease, opacity .12s ease;
    color:#062a1a; background:linear-gradient(180deg,#35eb85,#22c55e);
  }
  .control:active{ transform:translateY(1px) }
  .control.stop{ background:linear-gradient(180deg,#f2544b,#cc3e36); color:#fff; }
  .chip{
    height:52px; padding:0 12px; border-radius:12px;
    border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.45); color:#eaf2ff;
    display:inline-flex; align-items:center; gap:8px; font-weight:900
  }
  .chip select, .chip input[type="checkbox"]{
    height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:#0d1731; color:#eaf2ff; padding:0 8px; font-weight:900; outline:none;
  }
  .muted{color:#cbd5e1; font-size:.9rem}

  /* Estado */
  #state{
    position:fixed; bottom:calc(78px + env(safe-area-inset-bottom));
    left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.6); color:#fff; padding:6px 14px; border-radius:10px;
    font-size:.92rem; z-index:3
  }

  /* Overlay inicial */
  #startOverlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.78)); color:var(--fg); gap:10px; padding:22px; text-align:center; z-index:5
  }
  #startOverlay h2{margin:0 0 6px; font-size:1.14rem}
  #btnStart{
    margin-top:10px; min-width:240px; height:56px; padding:0 18px; border-radius:14px; border:2px solid #0caa52;
    background:linear-gradient(180deg,#35eb85,#22c55e); color:#062a1a; font-weight:1000; font-size:1.02rem; cursor:pointer
  }
  #btnStart:active{ transform:translateY(1px) }

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:calc(16px + env(safe-area-inset-bottom)); transform:translateX(-50%); display:none;
    background:rgba(0,0,0,.78); color:#fff; border:1px solid rgba(255,255,255,.18);
    padding:8px 12px; border-radius:10px; font-size:.95rem; z-index:6
  }

  @media (max-width:760px){
    .control{min-width:140px; font-size:.95rem}
    .chip{font-size:.95rem}
  }
</style>
</head>
<body>

<!-- Vídeo da câmera (somente visual; a gravação usa o canvas mix) -->
<video id="cam" autoplay playsinline muted></video>
<!-- Canvas que renderiza vídeo + over (é dele que gravamos) -->
<canvas id="mix"></canvas>

<div id="kmBox">KM —</div>
<div id="state">Toque em “INICIAR (VÍDEO)”</div>

<!-- Barra -->
<div id="bar" role="toolbar" aria-label="Controles">
  <button id="btnStartStop" class="control" aria-pressed="false">▶ INICIAR (VÍDEO)</button>

  <div class="chip" title="Qualidade de gravação">
    🎞️ Qualidade
    <select id="quality">
      <option value="1080p_30_10">1080p / 30 fps / 10 Mbps</option>
      <option value="1080p_30_8" selected>1080p / 30 fps / 8 Mbps</option>
      <option value="720p_30_5">720p / 30 fps / 5 Mbps</option>
      <option value="1440p_30_16">1440p / 30 fps / 16 Mbps (se suportar)</option>
    </select>
  </div>

  <div class="chip" title="Duração de cada arquivo (segmento)">
    ⏱️ Segmento
    <select id="segDur">
      <option value="5" selected>5 min</option>
      <option value="10">10 min</option>
      <option value="15">15 min</option>
    </select>
  </div>

  <div class="chip" title="Áudio do ambiente (opcional)">
    🔊 Áudio
    <label style="display:inline-flex;align-items:center;gap:6px;">
      <input id="useAudio" type="checkbox"> microfone
    </label>
  </div>
</div>

<!-- Overlay inicial -->
<div id="startOverlay">
  <h2>Inspeção – Vídeo HQ com KM no quadro</h2>
  <p class="muted">Em 1 clique: escolhe/recupera pasta, liga Câmera + GPS e inicia gravação contínua (segmentos ≥5 min).</p>
  <button id="btnStart">▶ INICIAR (VÍDEO)</button>
  <p class="muted">Requisitos: <b>HTTPS</b>, permitir <b>Câmera</b> e <b>Localização</b>, e escolher a <b>Pasta</b>.</p>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ================= CONFIG ================= */
const CSV_PATH = './SNVBR116SPRJ.csv'; // km;lat;lon
const PREFERRED_MIME_TYPES = [
  'video/webm;codecs=vp9',
  'video/webm;codecs=vp8',
  'video/webm',
  'video/mp4;codecs=h264',
  'video/mp4'
];
/* ========================================== */

/* ================= REFS/STATE ============== */
const cam = document.getElementById('cam');
const mix = document.getElementById('mix');
const g = mix.getContext('2d', {alpha:false});

const kmBox = document.getElementById('kmBox');
const stateEl = document.getElementById('state');
const startOverlay = document.getElementById('startOverlay');
const btnStartOverlay = document.getElementById('btnStart');
const btnStartStop = document.getElementById('btnStartStop');
const toast = document.getElementById('toast');

const qualitySel = document.getElementById('quality');
const segDurSel = document.getElementById('segDur');
const useAudioChk = document.getElementById('useAudio');

let dirHandle = null;
let running = false;

let kmPoints = [];     // {km,lat,lon}
let lastPos = null;    // {lat,lon,acc}
let currentKMStr = 'KM —';

let sessionStart = null;
let segmentIndex = 0;

/* Vídeo/Captura */
let cameraStream = null;
let micStream = null;
let canvasStream = null;
let mediaRecorder = null;
let writable = null; // FileSystemWritableFileStream
let segmentTimer = null;
let bytesWritten = 0;
let drawRAF = 0;

/* ========== UTILS ========== */
function showToast(msg, ms=1400){ toast.textContent=msg; toast.style.display='block'; clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.style.display='none',ms); }
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d+$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }
function fmtKm(v){ if(!Number.isFinite(v)) return 'KM —'; let K=Math.floor(v), m=Math.round((v-K)*1000); if(m>=1000){m-=1000;K+=1} return `KM ${K}+${String(m).padStart(3,'0')}`; }
const z2 = v => String(v).padStart(2,'0');
function stampNow(){ const d=new Date(); return `${d.getFullYear()}-${z2(d.getMonth()+1)}-${z2(d.getDate())}_${z2(d.getHours())}-${z2(d.getMinutes())}-${z2(d.getSeconds())}`; }

/* ====== KM ====== */
async function loadKM(){
  try{
    const txt=await fetch(CSV_PATH,{cache:'no-store'}).then(r=>r.text());
    kmPoints.length=0;
    txt.split(/\r?\n/).forEach(l=>{
      const c=l.split(';'); const km=parsePt(c[0]), lat=parsePt(c[1]), lon=parsePt(c[2]);
      if(Number.isFinite(km)&&Number.isFinite(lat)&&Number.isFinite(lon)) kmPoints.push({km,lat,lon});
    });
  }catch(e){ console.warn('KM CSV', e); }
}
function updateKM(){
  if(lastPos && kmPoints.length){
    let b=null, bd=Infinity;
    for(const p of kmPoints){ const d=hav(lastPos.lat,lastPos.lon,p.lat,p.lon); if(d<bd){bd=d;b=p;} }
    currentKMStr = b? fmtKm(b.km):'KM —';
  }else currentKMStr='KM —';
  kmBox.textContent=currentKMStr;
}
setInterval(updateKM, 700);

/* ====== GPS ====== */
function startGPS(){
  return new Promise((resolve)=>{
    if(!('geolocation' in navigator)){ resolve(); return; }
    navigator.geolocation.getCurrentPosition(p=>{
      lastPos={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy};
      resolve();
      navigator.geolocation.watchPosition(pp=>{
        lastPos={lat:pp.coords.latitude, lon:pp.coords.longitude, acc:pp.coords.accuracy};
      },()=>{}, {enableHighAccuracy:true, maximumAge:800, timeout:15000});
    },()=>resolve(), {enableHighAccuracy:true, timeout:10000});
  });
}

/* ====== CÂMERA/MIC ====== */
async function startCameraAndMic(){
  // Ajusta resolução de entrada conforme preset (vamos desenhar em "contain" no canvas)
  const {width, height, fps} = getQualityPreset();
  const constraints = {
    video:{
      facingMode:{ideal:'environment'},
      width:{ideal:width}, height:{ideal:height},
      frameRate:{ideal:fps, max:fps}
    },
    audio:false
  };
  cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
  cam.srcObject = cameraStream;
  await new Promise(r=>{ if(cam.readyState>=1&&cam.videoWidth) r(); else cam.onloadedmetadata=r; });

  if(useAudioChk.checked){
    // Mic separado (evita pegar áudio do stream da câmera frontal por engano)
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    }catch(e){ showToast('Sem acesso ao microfone (prosseguindo sem áudio)'); micStream=null; }
  }else{
    micStream = null;
  }
}

/* ====== PRESET QUALIDADE ====== */
function getQualityPreset(){
  // value: "<height>p_<fps>_<mbps>"
  const v = qualitySel.value || '1080p_30_8';
  const [hp, fps, mbps] = v.split('_');
  const height = Number(hp.replace('p','')) || 1080;
  const width = Math.round(height * 16/9);
  const videoBitsPerSecond = Math.round((Number(mbps)||8) * 1000 * 1000);
  return {width, height, fps:Number(fps)||30, videoBitsPerSecond};
}

/* ====== DRAW (vídeo + overlay) ====== */
function resizeCanvasToPreset(){
  const {width, height} = getQualityPreset();
  mix.width = width; mix.height = height;
  mix.style.width = '100%'; mix.style.height = '100%';
}
function drawFrame(){
  if(!(cam.videoWidth && cam.videoHeight)) { drawRAF = requestAnimationFrame(drawFrame); return; }

  const W = mix.width, H = mix.height;
  // Fundo preto
  g.fillStyle = '#000'; g.fillRect(0,0,W,H);

  // Desenha vídeo em "contain"
  const vw = cam.videoWidth, vh = cam.videoHeight;
  const sc = Math.min(W/vw, H/vh);
  const dw = Math.round(vw*sc), dh = Math.round(vh*sc);
  const dx = Math.round((W-dw)/2), dy = Math.round((H-dh)/2);
  g.drawImage(cam, dx, dy, dw, dh);

  // Placa KM no topo
  const plateH = Math.max(90, Math.round(H*0.10));
  const plateW = Math.min(W*0.78, Math.round(W*0.90));
  const px = Math.round((W - plateW)/2), py = Math.round(16);
  // moldura
  g.fillStyle = '#e6f0ea'; g.fillRect(px-6, py-6, plateW+12, plateH+12);
  const gr = g.createLinearGradient(0,py,0,py+plateH);
  gr.addColorStop(0,'#0b7a39'); gr.addColorStop(1,'#085e2c');
  g.fillStyle = gr; g.fillRect(px, py, plateW, plateH);
  g.strokeStyle='rgba(255,255,255,.6)'; g.lineWidth=3; g.strokeRect(px+3,py+3,plateW-6,plateH-6);
  const fs = Math.round(plateH*0.55);
  g.fillStyle='#fff'; g.font=`900 ${fs}px system-ui`; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(currentKMStr, Math.round(W/2), Math.round(py + plateH/2));

  // Rodapé: faixa + horário + GPS
  const bandH=Math.max(110, Math.round(H*0.15));
  g.fillStyle='rgba(0,0,0,.60)'; g.fillRect(0,H-bandH,W,bandH);
  const d=new Date();
  const ts=`${z2(d.getDate())}/${z2(d.getMonth()+1)}/${d.getFullYear()} ${z2(d.getHours())}:${z2(d.getMinutes())}:${z2(d.getSeconds())}`;
  g.textAlign='left'; g.fillStyle='#fff'; g.font=`700 ${Math.round(H*0.028)}px system-ui`;
  g.fillText(ts, 16, H-14);
  if(lastPos){
    g.fillStyle='#cfe7ff'; g.font=`600 ${Math.round(H*0.026)}px system-ui`;
    g.fillText(`${lastPos.lat?.toFixed(6)}, ${lastPos.lon?.toFixed(6)}  ±${Math.round(lastPos.acc||0)}m`, 16, H-bandH+28);
  }

  drawRAF = requestAnimationFrame(drawFrame);
}

/* ====== MEDIA RECORDER ====== */
function pickMimeType(){
  for(const mt of PREFERRED_MIME_TYPES){ if(MediaRecorder.isTypeSupported(mt)) return mt; }
  return '';
}

async function openSegmentFile(){
  // Nome baseado no início da sessão + índice
  const baseStart = (sessionStart||new Date()).toISOString().replace(/[:.]/g,'-');
  const name = `VIDEO_${baseStart}_seg${String(++segmentIndex).padStart(2,'0')}.webm`;
  try{
    const fh = await dirHandle.getFileHandle(name, {create:true});
    writable = await fh.createWritable();
    bytesWritten = 0;
    return true;
  }catch(e){
    console.error(e); showToast('Falha ao abrir arquivo para escrever'); return false;
  }
}

async function closeSegmentFile(){
  try{
    if(writable){ await writable.close(); writable=null; }
  }catch(e){ console.error('closeSegmentFile', e); }
}

async function startRecorder(){
  // Stream do canvas + (opcional) áudio do mic
  const {fps, videoBitsPerSecond} = getQualityPreset();
  canvasStream = mix.captureStream(fps || 30);

  let combined = new MediaStream();
  canvasStream.getVideoTracks().forEach(t=> combined.addTrack(t));
  if(micStream){ micStream.getAudioTracks().forEach(t=> combined.addTrack(t)); }

  const mimeType = pickMimeType();
  const opts = { mimeType, videoBitsPerSecond };
  // (Opcional) áudio: alguns navegadores respeitam audioBitsPerSecond
  if(micStream) opts.audioBitsPerSecond = 128e3;

  try{
    mediaRecorder = new MediaRecorder(combined, opts);
  }catch(e){
    console.warn('MediaRecorder opts falharam, tentando sem opts', e);
    mediaRecorder = new MediaRecorder(combined);
  }

  mediaRecorder.ondataavailable = async (ev)=>{
    if(!ev.data || !ev.data.size) return;
    try{
      if(writable){
        await writable.write(await ev.data.arrayBuffer());
        bytesWritten += ev.data.size;
      }else{
        // fallback: download em pedaços (não ideal)
        const a=document.createElement('a');
        a.href=URL.createObjectURL(ev.data); a.download='segment.webm'; a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href),0);
      }
    }catch(err){
      console.error('write chunk', err);
      showToast('Falha ao gravar chunk (ver espaço/perm.)', 2000);
    }
  };

  mediaRecorder.onstart = ()=>{
    stateEl.textContent = `Gravando… seg ${segmentIndex} • ${qualitySel.value} • ${mediaRecorder.mimeType||'auto'}`;
  };
  mediaRecorder.onstop = async ()=>{
    await closeSegmentFile();
    stateEl.textContent = `Segmento ${segmentIndex} finalizado • ${(bytesWritten/1e6).toFixed(1)} MB`;
  };

  // Escreve em fluxo contínuo (chunk a cada 2s para não acumular memória)
  mediaRecorder.start(2000);
}

async function stopRecorder(){
  try{
    if(mediaRecorder && mediaRecorder.state !== 'inactive'){
      mediaRecorder.stop();
    }
  }catch(e){ console.error(e); }
  mediaRecorder = null;
  if(canvasStream){ canvasStream.getTracks().forEach(t=>t.stop()); canvasStream=null; }
  await closeSegmentFile();
}

/* ====== SEGMENTAÇÃO (≥ 5 minutos) ====== */
function getSegmentMs(){
  const mins = Math.max(5, Number(segDurSel.value)||5);
  return mins * 60 * 1000;
}
function startSegmentTimer(){
  clearTimeout(segmentTimer);
  segmentTimer = setTimeout(async ()=>{
    // Fecha segmento atual e inicia o próximo automaticamente se ainda rodando
    await stopRecorder();
    if(running){
      if(await openSegmentFile()){
        await startRecorder();
        startSegmentTimer();
      }
    }
  }, getSegmentMs());
}
function stopSegmentTimer(){ clearTimeout(segmentTimer); }

/* ====== Fluxo principal ====== */
async function startAll(){
  // Pasta
  let restored = await restoreFolderIfPossible();
  if(!restored) await pickFolder();

  // Câmera/Mic + GPS + CSV + Canvas
  await startCameraAndMic();
  await startGPS();
  await loadKM();
  resizeCanvasToPreset();
  cancelAnimationFrame(drawRAF);
  drawFrame();

  // Wake Lock
  if('wakeLock' in navigator){ try{ await navigator.wakeLock.request('screen'); }catch{} }

  // Inicia gravação contínua (abre arquivo, recorder e timer)
  if(!(await openSegmentFile())) throw new Error('no-writable');
  await startRecorder();
  startSegmentTimer();

  startOverlay.style.display='none';
  sessionStart = new Date();
  running = true;
  btnStartStop.setAttribute('aria-pressed','true');
  btnStartStop.classList.add('stop');
  btnStartStop.textContent = '⏹ PARAR';
  showToast('Gravação iniciada');
}

async function stopAll(){
  running = false;
  btnStartStop.setAttribute('aria-pressed','false');
  btnStartStop.classList.remove('stop');
  btnStartStop.textContent = '▶ INICIAR (VÍDEO)';
  stopSegmentTimer();
  await stopRecorder();
  cancelAnimationFrame(drawRAF);
  // Não paramos a câmera por conveniência; se quiser, pare:
  // cameraStream?.getTracks().forEach(t=>t.stop());
  // micStream?.getTracks().forEach(t=>t.stop());
}

/* ======== Persistência do Handle (IndexedDB) ======== */
const DB_NAME='insp_persist'; const DB_STORE='fs_handles'; const DB_KEY='dirHandle';
function idbOpen(){
  return new Promise((res,rej)=>{
    const rq=indexedDB.open(DB_NAME,1);
    rq.onupgradeneeded=()=>{ rq.result.createObjectStore(DB_STORE); };
    rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);
  });
}
function idbSet(key, val){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readwrite'); tx.objectStore(DB_STORE).put(val,key);
    tx.oncomplete=()=>{db.close(); res(true)}; tx.onerror=()=>{db.close(); rej(tx.error)}
  }));
}
function idbGet(key){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,'readonly'); const rq=tx.objectStore(DB_STORE).get(key);
    rq.onsuccess=()=>{ const v=rq.result; db.close(); res(v); }; rq.onerror=()=>{ db.close(); rej(rq.error) }
  }));
}
async function ensureDirPermission(handle){
  if(!handle) return false;
  if (await handle.queryPermission({mode:'readwrite'}) === 'granted') return true;
  if (await handle.requestPermission({mode:'readwrite'}) === 'granted') return true;
  return false;
}
async function restoreFolderIfPossible(){
  try{
    const saved = await idbGet(DB_KEY);
    if(saved){
      const ok = await ensureDirPermission(saved);
      if(ok){ dirHandle = saved; showToast('Pasta OK • restaurada', 1200); return true; }
    }
  }catch(e){}
  return false;
}
async function pickFolder(){
  try{
    if('storage' in navigator && navigator.storage && navigator.storage.persist) {
      try{ await navigator.storage.persist(); }catch{}
    }
    dirHandle = await window.showDirectoryPicker({mode:'readwrite'});
    try{ await idbSet(DB_KEY, dirHandle); }catch{}
    showToast('Pasta OK',900);
  }catch{ showToast('É necessário escolher a pasta'); throw new Error('no-folder'); }
}

/* ======== Eventos UI ======== */
btnStartOverlay.addEventListener('click', async ()=>{
  try{ await startAll(); }catch(e){ console.error(e); showToast('Falha ao iniciar'); }
});
btnStartStop.addEventListener('click', async ()=>{
  if(running){ await stopAll(); stateEl.textContent='PARADO'; }
  else{
    try{ await startAll(); }catch(e){ console.error(e); showToast('Falha ao iniciar'); }
  }
});
qualitySel.addEventListener('change', ()=>{
  // Se estiver gravando, mantemos o canvas atual; no próximo segmento, aplica novo preset
  if(!running){ resizeCanvasToPreset(); }
});
segDurSel.addEventListener('change', ()=>{
  if(running){ stopSegmentTimer(); startSegmentTimer(); }
});
useAudioChk.addEventListener('change', ()=>{
  showToast('Áudio será aplicado no próximo início de gravação/segmento', 1600);
});

/* Resize canvas (mantendo resolução alvo) apenas re-renderiza na tela; gravação usa dimensões do canvas */
window.addEventListener('resize', ()=>{
  // apenas ajusta exibição CSS; o canvas físico segue o preset
  mix.style.width = '100%'; mix.style.height = '100%';
});
</script>
