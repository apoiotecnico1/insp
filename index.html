<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5 - BR-116</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; --glass: rgba(5, 5, 5, 0.92); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }

        /* GATE DE SEGURANÇA */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #333; padding: 30px; border-radius: 12px; max-width: 500px; background: #080808; }
        .alert-box h2 { color: var(--accent); margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem; }
        .checklist .item { margin-bottom: 12px; font-size: 14px; color: #bbb; display: flex; gap: 10px; }
        .item b { color: var(--accent); }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 6px; width: 100%; cursor: pointer; }

        /* CAMERA SHELL */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA BR-116 / KM */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: var(--placa-verde); border: 3px solid #fff; 
            border-radius: 8px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .placa-br { background: #fff; color: #000; font-size: 0.7rem; font-weight: 900; text-align: center; padding: 2px 0; }
        .placa-km { padding: 5px 15px; color: #fff; text-align: center; }
        .placa-km h1 { font-size: 2rem; font-weight: 900; line-height: 1; }

        /* STATUS GRAVAÇÃO */
        #rec-tag { 
            position: absolute; top: 25px; right: 25px; 
            display: flex; align-items: center; gap: 10px; 
            background: var(--glass); padding: 12px 20px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2); opacity: 0; transition: 0.3s;
        }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; transition: 0.5s; }
        .btn-ui { padding: 18px 40px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: rgba(255,255,255,0.1); color: #fff; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

        /* PAINEL SETTINGS */
        #settings-panel { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(15px); padding: 50px 25px; transition: 0.4s; z-index: 2000; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select, input { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>Inspeção Fotográfica BR-116</h2>
        <div class="checklist">
            <div class="item"><b>1.</b> O sistema capturará fotos a cada intervalo definido.</div>
            <div class="item"><b>2.</b> Cada foto será carimbada com o KM e Data/Hora.</div>
            <div class="item"><b>3.</b> O PDF será gerado automaticamente na pasta escolhida.</div>
        </div>
        <button class="btn-aware" onclick="acceptSafety()">Selecionar Pasta e Iniciar</button>
    </div>
</div>

<div id="settings-panel">
    <div style="color:var(--accent); margin-bottom:30px; cursor:pointer;" onclick="toggleSet()">✕ FECHAR</div>
    <div class="field"><label>Câmera Ativa</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo de Foto (ms)</label><input type="number" id="cfg-int" value="1000"></div>
    <div class="field"><label>Fotos por PDF</label><input type="number" id="cfg-lote" value="20"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud">
        <div class="placa-br">BR-116</div>
        <div class="placa-km"><h1 id="km-txt">---</h1></div>
    </div>

    <div id="rec-tag">
        <div class="dot"></div>
        <span style="font-size: 10px; font-weight: 900; letter-spacing: 1px;">CAPTURA ATIVA</span>
    </div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-ui" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" onclick="stopCapture()">Gerar PDF Final</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
    let kmDB = [], rec = false, buffer = [], hDir = null, currentStream = null, uiTimer;
    const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

    async function acceptSafety() {
        try {
            hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('safety-gate').style.display = 'none';
            document.getElementById('app-shell').style.display = 'block';
            listCams();
            initG();
            loadCSV();
        } catch(e) { alert("Acesso à pasta é obrigatório para salvar as fotos."); }
    }

    function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

    async function listCams() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const vds = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        vds.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId; opt.text = `Câmera ${i+1}`;
            sel.appendChild(opt);
        });
        if(vds.length) initC(vds[vds.length-1].deviceId);
    }

    async function initC(id) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        currentStream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: id, width: 1920, height: 1080 } 
        });
        vid.srcObject = currentStream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    }

    function switchCam(id) { initC(id); }

    function wakeUI() {
        document.getElementById('ui-controls').style.opacity = '1';
        clearTimeout(uiTimer);
        if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').style.opacity = '0.2', 3000);
    }

    function initCapture() {
        rec = true;
        buffer = [];
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'block';
        document.getElementById('rec-tag').style.opacity = '1';
        loop();
    }

    async function stopCapture() {
        rec = false;
        document.getElementById('btn-start').style.display = 'block';
        document.getElementById('btn-stop').style.display = 'none';
        document.getElementById('rec-tag').style.opacity = '0';
        await savePDF();
    }

    function loop() {
        if(!rec) return;
        if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
            ctx.drawImage(vid, 0, 0, can.width, can.height);
            buffer.push({
                img: can.toDataURL('image/jpeg', 0.6),
                km: document.getElementById('km-txt').innerText,
                ts: new Date().toLocaleString()
            });
            
            const limit = parseInt(document.getElementById('cfg-lote').value) || 20;
            if(buffer.length >= limit) savePDF();
        }
        setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 1000);
    }

    async function savePDF() {
        if(!buffer.length) return;
        const items = [...buffer]; 
        buffer = [];

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const pw = doc.internal.pageSize.getWidth();
        const ph = doc.internal.pageSize.getHeight();

        for(let i=0; i<items.length; i++) {
            if(i > 0) doc.addPage('l');
            
            const tempImg = new Image();
            tempImg.src = items[i].img;
            await new Promise(r => {
                tempImg.onload = () => {
                    // Desenha no canvas para carimbar
                    ctx.drawImage(tempImg, 0, 0);
                    const h = can.height;
                    const w = can.width;
                    
                    // Carimbo
                    ctx.fillStyle = "rgba(0,0,0,0.7)";
                    ctx.fillRect(0, h - 150, w, 150);
                    ctx.fillStyle = "#ffcc00";
                    ctx.font = "bold 60px Arial";
                    ctx.fillText(`KM: ${items[i].km} | BR-116`, 50, h - 60);
                    ctx.fillStyle = "#fff";
                    ctx.font = "40px Arial";
                    ctx.fillText(items[i].ts, w - 500, h - 60);

                    doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                    r();
                }
            });
        }

        const nome = `INSPECAO_BR116_KM_${items.km}_${Date.now()}.pdf`;
        const fileHandle = await hDir.getFileHandle(nome, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    }

    async function loadCSV() {
        try {
            const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
            const t = await r.text();
            const rows = t.split('\n').filter(l => l.includes(';'));
            rows.shift();
            kmDB = rows.map(r => {
                const c = r.split(';');
                return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
            }).filter(d => !isNaN(d.lt));
        } catch(e) { console.error("Erro CSV"); }
    }

    function initG() {
        navigator.geolocation.watchPosition(p => {
            if(!kmDB.length) return;
            let n = null, dM = Infinity;
            for(const pt of kmDB) {
                const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
                if(d < dM) { dM = d; n = pt; }
            }
            if(n) document.getElementById('km-txt').innerText = n.km;
        }, null, {enableHighAccuracy:true});
    }
</script>
</body>
</html>
