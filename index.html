<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V7 - MODO SOLITÁRIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; --warning: #ffcc00; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Viewport e Placa */
        #viewport { position: relative; width: 100vw; height: 40vh; background: #000; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #kmPlaque { background: linear-gradient(180deg, #0a8a4d, #056b3c); color: white; text-align: center; padding: 12px; font-size: 3.2rem; font-weight: 900; border: 5px solid #fff; margin: 10px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* Engrenagem Discreta */
        #settings-trigger { position: absolute; top: 15px; right: 15px; z-index: 1000; background: rgba(0,0,0,0.5); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--accent); }

        /* Super Menu de Ajustes (50+ combinações) */
        #settings-panel { position: fixed; top: 0; right: -100%; width: 90%; height: 100%; background: rgba(11, 18, 36, 0.98); z-index: 2000; transition: 0.4s; overflow-y: auto; padding: 20px; border-left: 3px solid var(--accent); }
        #settings-panel.active { right: 0; }
        .menu-tab { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .setting-item { background: #1a2235; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem; border: 1px solid #333; }
        .setting-item label { display: block; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; background: #050a16; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; box-sizing: border-box; }

        /* Dashboard e Botões */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px; }
        .card { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .btn-row { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        button.action { padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; }
        #btnStart { background: #00ff66; color: #000; box-shadow: 0 0 20px rgba(0,255,102,0.3); }
        #btnStop { background: #ff3333; color: #fff; }

        /* Indicador de Inspeção Ativa (Solitária) */
        #recording-dot { position: absolute; top: 15px; left: 15px; width: 15px; height: 15px; background: red; border-radius: 50%; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="recording-dot"></div>
<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0; color:var(--accent)">AJUSTES DE ELITE</h2>
        <button onclick="toggleSettings()" style="background:red; color:white; border:none; padding:10px; border-radius:5px">FECHAR</button>
    </div>

    <div class="setting-item">
        <label>📸 MODO DE INSPEÇÃO</label>
        <select id="cfgMode">
            <option value="manual">Manual (Padrão)</option>
            <option value="auto">Solitário (Mãos Livres - 1 Toque)</option>
        </select>
    </div>

    <div class="setting-item">
        <label>🖼️ LAYOUT DO RELATÓRIO (FONTES)</label>
        <select id="cfgFont">
            <option value="Arial Black">Engenharia (Arial Black)</option>
            <option value="Impact">Fiscalização (Impact)</option>
            <option value="Courier New">Digital (Courier)</option>
            <option value="Verdana">Limpo (Verdana)</option>
            <option value="Times New Roman">Clássico (Times)</option>
        </select>
    </div>

    <div class="setting-item">
        <label>📏 TAMANHO DO KM NO PDF</label>
        <input type="range" id="cfgFontSize" min="20" max="150" value="60">
    </div>

    <div class="setting-item">
        <label>🎨 CORES DO CARIMBO</label>
        <div style="display:flex; gap:10px">
            <input type="color" id="cfgColor" value="#ffffff"> Texto
            <input type="color" id="cfgStripe" value="#000000"> Tarja
        </div>
    </div>

    <div class="setting-item">
        <label>⏱️ VELOCIDADE DE CAPTURA (MS)</label>
        <input type="number" id="cfgDelay" value="200" step="100">
        <small>200ms = 5 fotos/seg | 1000ms = 1 foto/seg</small>
    </div>

    <div class="setting-item">
        <label>📦 TAMANHO DO LOTE (FOTOS/PDF)</label>
        <select id="cfgBatch">
            <option value="50">50 Fotos</option>
            <option value="100">100 Fotos</option>
            <option value="200" selected>200 Fotos (Padrão)</option>
            <option value="500">500 Fotos (Longo)</option>
        </select>
    </div>

    <div class="setting-item">
        <label>🔄 CÂMERA ATIVA</label>
        <select id="cfgCam" onchange="initCamera()"><option value="environment">Traseira</option><option value="user">Frontal</option></select>
    </div>

    <div class="setting-item">
        <label>🛰️ PRECISÃO GPS</label>
        <select id="cfgGps"><option value="high">Máxima (Consome Bateria)</option><option value="low">Econômica</option></select>
    </div>
</div>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/200</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer">GERAR PDF<span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="btnStart" class="action">INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
/* ======= LÓGICA OPERACIONAL RECUPERADA (KM SINCRONIZADO) ======= */
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

// Lógica de Sincronização KM (Base Haversine)
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

async function loadCSV(){
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const lines = t.split('\n').filter(l => l.includes(';'));
        kmDataset = lines.map(l => {
            const c = l.split(';');
            return { km: c, lat: parseFloat(c?.replace(',','.')), lon: parseFloat(c?.replace(',','.')) };
        }).filter(p => !isNaN(p.lat));
    } catch(e) { console.error("CSV não carregou"); }
}

async function initCamera() {
    const mode = document.getElementById('cfgCam').value;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: 1280, height: 720 }, audio: false });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

/* CARIMBO DINÂMICO NO PDF */
function drawStamp(item) {
    const w = can.width, h = can.height;
    const fontSize = parseInt(document.getElementById('cfgFontSize').value) * (h/720);
    const font = document.getElementById('cfgFont').value;
    const color = document.getElementById('cfgColor').value;
    const stripe = document.getElementById('cfgStripe').value;

    ctx.save();
    // Tarja Profissional
    ctx.fillStyle = stripe + "CC"; // CC adiciona transparência (80%)
    const sH = h * 0.18;
    ctx.fillRect(0, h - sH, w, sH);

    // Texto KM
    ctx.fillStyle = color;
    ctx.font = `bold ${fontSize}px "${font}"`;
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
    ctx.fillText("KM " + item.km, 40, h - (sH/2) + (fontSize/3));

    // Data e Hora
    ctx.font = `${fontSize/3}px Arial`;
    ctx.fillText(item.ts + " | GPS: " + item.lat + ", " + item.lon, 40, h - 20);
    ctx.restore();
}

async function savePDF() {
    if(!activeBuffer.length) return;
    const batch = [...activeBuffer]; activeBuffer = [];
    pdfCount++; document.getElementById('txtPdfs').innerText = pdfCount;
    document.getElementById('txtBuffer').innerText = `0/${document.getElementById('cfgBatch').value}`;
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i>0) doc.addPage();
        const img = new Image();
        await new Promise(res => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawStamp(batch[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210);
                res();
            };
            img.src = batch[i].img;
        });
    }
    doc.save(`INSPECAO_LOTE_${pdfCount}.pdf`);
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('kmPlaque').innerText.replace('KM ',''),
        lat: lastPos?.lat.toFixed(6) || 0,
        lon: lastPos?.lon.toFixed(6) || 0,
        ts: new Date().toLocaleString()
    });

    photoCount++;
    document.getElementById('txtTotal').innerText = photoCount;
    const limit = parseInt(document.getElementById('cfgBatch').value);
    document.getElementById('txtBuffer').innerText = `${activeBuffer.length}/${limit}`;

    if(activeBuffer.length >= limit) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

/* ======= BOTÕES ======= */
document.getElementById('btnStart').onclick = () => {
    isRecording = true;
    document.getElementById('recording-dot').style.display = 'block';
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    captureLoop();
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false;
    document.getElementById('recording-dot').style.display = 'none';
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    savePDF();
};

document.getElementById('btnSaveManual').onclick = savePDF;

// GPS e Busca de KM
navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    if(kmDataset.length){
        let best=null, bd=Infinity;
        kmDataset.forEach(pt => {
            const d = hav(lastPos.lat, lastPos.lon, pt.lat, pt.lon);
            if(d < bd){ bd=d; best=pt; }
        });
        if(best) document.getElementById('kmPlaque').innerText = "KM " + best.km;
    }
}, null, {enableHighAccuracy: true});

loadCSV(); initCamera();
</script>
</body>
</html>
