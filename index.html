<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>INSPEÇÃO BACKUP V27 - VALIDATOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --safety: #2ecc71; --alert: #e74c3c; --dark: #0d0d0d; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; }
        
        #setup-screen { position: fixed; inset: 0; background: var(--dark); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .config-box { background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #333; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { font-size: 14px; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .input-row { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #777; margin-bottom: 8px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #0f0; padding: 12px; border-radius: 4px; font-family: monospace; outline: none; }
        input:focus { border-color: var(--neon); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn-test { background: transparent; border: 1px solid var(--neon); color: var(--neon); margin-bottom: 10px; }
        .btn-test:hover { background: var(--neon); color: #000; }
        .btn-ready { background: var(--safety); color: #fff; display: none; }

        #diag-msg { font-size: 11px; margin-top: 15px; padding: 10px; border-radius: 4px; display: none; background: rgba(0,0,0,0.3); }

        /* MODO OPERACIONAL */
        #main-app { display: grid; grid-template-rows: 1fr 80px; height: 100vh; visibility: hidden; }
        #monitor { background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        #cam-raw { max-width: 100%; max-height: 100%; border: 1px solid #222; }
        
        .hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 4px; border-left: 3px solid var(--safety); }
        .hud p { margin: 0; font-size: 10px; color: #888; }
        .hud b { font-size: 14px; color: #fff; display: block; }

        #footer { background: #151515; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-top: 1px solid #333; }
        .rec-dot { width: 12px; height: 12px; background: var(--alert); border-radius: 50%; animation: blink 1s infinite; display: inline-block; margin-right: 10px; }
        @keyframes blink { 50% { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="config-box">
        <h2>Target Cam Validator</h2>
        <div class="input-row">
            <label>IP DA CÂMERA NA REDE LOCAL</label>
            <input type="text" id="target-ip" placeholder="Ex: 192.168.1.50" value="">
        </div>
        <div class="input-row">
            <label>PATH DO SNAPSHOT (OPCIONAL)</label>
            <input type="text" id="target-path" placeholder="/cgi-bin/snapshot.cgi" value="/cgi-bin/snapshot.cgi">
        </div>
        
        <button class="btn btn-test" onclick="validateCam()">Testar Conexão Local</button>
        <button id="btn-ready" class="btn btn-ready" onclick="engageSystem()">Iniciar Sistema de Backup</button>
        
        <div id="diag-msg"></div>
    </div>
</div>

<div id="main-app">
    <div id="monitor">
        <div class="hud">
            <p>ALVO FIXADO:</p>
            <b id="hud-ip">0.0.0.0</b>
            <p style="margin-top:10px">STATUS:</p>
            <b id="hud-status" style="color:var(--safety)">MONITORANDO MOVIMENTO</b>
            <p style="margin-top:10px">CAPTURED:</p>
            <b id="hud-count">0 IMAGENS</b>
        </div>
        <img id="cam-raw" crossorigin="anonymous">
        <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;"></div>
    </div>
    <div id="footer">
        <div><span class="rec-dot"></span> <span id="clock">00:00:00</span></div>
        <button class="btn" style="width:200px; background:var(--alert); color:#fff;" onclick="finishAndSave()">Encerrar e Gerar PDF</button>
    </div>
</div>

<canvas id="proc"></canvas>

<script>
let lastImgData = null;
let reportSet = [];
let targetUrl = "";
let isLive = false;
let hDir = null;

// Carrega o último IP usado
window.onload = () => {
    const savedIP = localStorage.getItem('last_ip');
    if(savedIP) document.getElementById('target-ip').value = savedIP;
};

async function validateCam() {
    const ip = document.getElementById('target-ip').value;
    const path = document.getElementById('target-path').value;
    const msg = document.getElementById('diag-msg');
    
    if(!ip) return alert("Insira o IP primeiro!");
    
    msg.style.display = "block";
    msg.style.color = "#aaa";
    msg.innerText = "Sincronizando com a câmera...";
    
    targetUrl = `http://${ip}${path}`;
    const start = Date.now();
    
    const testImg = new Image();
    testImg.crossOrigin = "anonymous";
    
    testImg.onload = () => {
        const lat = Date.now() - start;
        msg.style.color = "var(--safety)";
        msg.innerText = `CONEXÃO OK! Latência: ${lat}ms | Resolução: ${testImg.width}x${testImg.height}`;
        document.getElementById('btn-ready').style.display = "block";
        localStorage.setItem('last_ip', ip);
    };
    
    testImg.onerror = () => {
        msg.style.color = "var(--alert)";
        msg.innerText = "FALHA: Câmera offline ou URL de snapshot incorreta. Verifique o IP e o Path.";
    };
    
    testImg.src = targetUrl + "?t=" + Date.now();
}

async function engageSystem() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('setup-screen').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('main-app').style.visibility = "visible";
            document.getElementById('hud-ip').innerText = document.getElementById('target-ip').value;
            isLive = true;
            runLoop();
        }, 500);
    } catch(e) { alert("Permissão de pasta necessária para o backup."); }
}

function runLoop() {
    if(!isLive) return;
    
    const display = document.getElementById('cam-raw');
    const temp = new Image();
    temp.crossOrigin = "anonymous";
    temp.src = targetUrl + "?t=" + Date.now();
    
    temp.onload = () => {
        display.src = temp.src;
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        
        const can = document.getElementById('proc');
        const ctx = can.getContext('2d');
        can.width = temp.width; can.height = temp.height;
        ctx.drawImage(temp, 0, 0);
        
        const currentData = ctx.getImageData(0,0, can.width, can.height);
        
        if(lastImgData) {
            if(detectMotion(lastImgData, currentData)) {
                triggerBackup(temp);
            }
        }
        lastImgData = currentData;
        setTimeout(runLoop, 300); // 3 FPS para monitoramento de tráfego
    };
}

function detectMotion(oldD, newD) {
    let diff = 0;
    const d1 = oldD.data;
    const d2 = newD.data;
    for(let i=0; i<d1.length; i+=100) { // Salto de 100 pixels para performance
        if(Math.abs(d1[i] - d2[i]) > 50) diff++;
    }
    return diff > (d1.length / 2000); // Sensibilidade ajustada para carros
}

function triggerBackup(imgObj) {
    const flash = document.getElementById('flash');
    flash.style.opacity = "1";
    setTimeout(() => flash.style.opacity = "0", 100);

    const can = document.getElementById('proc');
    const ctx = can.getContext('2d');
    ctx.drawImage(imgObj, 0, 0);
    
    // Tarja de Auditoria
    const h = can.height;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, h - 60, can.width, 60);
    ctx.fillStyle = "#0f0";
    ctx.font = "bold 20px monospace";
    ctx.fillText(`BACKUP LOG: ${new Date().toLocaleString()} | TARGET: ${document.getElementById('target-ip').value}`, 30, h - 25);

    reportSet.push(can.toDataURL('image/jpeg', 0.6));
    document.getElementById('hud-count').innerText = `${reportSet.length} IMAGENS`;
}

async function finishAndSave() {
    isLive = false;
    if(reportSet.length === 0) return alert("Nenhum movimento registrado.");
    
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<reportSet.length; i++) {
        if(i > 0) doc.addPage('l');
        doc.addImage(reportSet[i], 'JPEG', 0, 0, 297, 210);
    }
    
    const f = await hDir.getFileHandle(`BACKUP_TRAFEGO_${Date.now()}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob'));
    await s.close();
    alert("Relatório de Backup Finalizado!");
    location.reload();
}
</script>
</body>
</html>
