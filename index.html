<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sistema de Foto-Captura v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; background: #0a0a0a; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 900; border-radius: 8px; cursor: pointer; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 15px 25px; border: 3px solid #fff; border-radius: 8px; z-index: 100; }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; margin: 0; }

        /* Botão Print WhatsApp Transparente no Meio */
        #btn-print-wa { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(37, 211, 102, 0.3); border: 1px solid rgba(255,255,255,0.2);
            padding: 10px; border-radius: 15px; text-align: center; cursor: pointer; z-index: 200;
        }
        #btn-print-wa span { font-size: 10px; display: block; font-weight: bold; }

        #ui-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .btn-main { border: none; padding: 20px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #btn-start { background: var(--accent); }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: rgba(255,255,255,0.1); width: 60px; height: 60px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: rgba(0,0,0,0.9); padding: 40px 20px; transition: 0.4s; z-index: 4000; }
        #settings-panel.open { right: 0; }

        canvas { display: none; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--danger)">SEGURANÇA</h2>
        <p>NÃO USE O CELULAR AO DIRIGIR</p>
        <button class="btn-aware" onclick="startApp()">ENTRAR NO SISTEMA</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>

    <div id="btn-print-wa" onclick="shareWhatsApp()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30">
        <span>PRINT WHATSAPP</span>
    </div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR TUDO</button>
    </div>
</div>

<div id="settings-panel" id="settings-panel">
    <button onclick="toggleSet()" style="color:#fff; background:none; border:none;">← VOLTAR</button>
    <div style="margin-top:20px">
        <label>Número WhatsApp (DDD+Nº):</label>
        <input type="text" id="cfg-wa" style="width:100%; padding:10px; margin-top:5px" placeholder="5511999999999">
        <br><br>
        <label>Câmera:</label>
        <select id="cam-select" onchange="switchCam(this.value)" style="width:100%; padding:10px"></select>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker();
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams();
        initGPS();
    } catch(e) { alert("Selecione uma pasta para salvar os PDFs."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

// CORREÇÃO: GPS AO VIVO
function initGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(p => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        
        if (kmDB.length > 0) {
            let closest = null;
            let minDistance = Infinity;
            
            kmDB.forEach(point => {
                const d = Math.sqrt(Math.pow(point.lt - lat, 2) + Math.pow(point.ln - lon, 2));
                if (d < minDistance) {
                    minDistance = d;
                    closest = point;
                }
            });
            
            if (closest) {
                document.getElementById('km-txt').innerText = "Km " + closest.km;
            }
        }
    }, e => console.error(e), { enableHighAccuracy: true });
}

// CORREÇÃO: ESTAMPAR E COPIAR FOTO
async function shareWhatsApp() {
    const currentKm = document.getElementById('km-txt').innerText;
    const now = new Date().toLocaleString('pt-BR');
    
    // Desenha a foto atual + Tarja preta + Textos
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.15;
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${bh * 0.4}px Arial`;
    ctx.fillText(currentKm, 40, can.height - (bh * 0.45));
    ctx.font = `${bh * 0.2}px Arial`;
    ctx.fillText(now, 40, can.height - (bh * 0.15));

    // Converte para Blob para poder copiar como IMAGEM
    can.toBlob(async (blob) => {
        try {
            const data = [new ClipboardItem({ [blob.type]: blob })];
            await navigator.clipboard.write(data);
            
            const num = document.getElementById('cfg-wa').value;
            const msg = encodeURIComponent(`Foto Registro: ${currentKm} em ${now}`);
            
            alert("FOTO COM KM COPIADA!\nO WhatsApp vai abrir, agora é só COLAR a imagem.");
            window.open(`https://api.whatsapp.com/send?phone=${num}&text=${msg}`, '_blank');
        } catch (err) {
            alert("Erro ao copiar foto. Verifique as permissões do navegador.");
        }
    }, 'image/png');
}

// Lógica original de captura de PDF mantida...
async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Erro CSV:", e); }
}

function startCapture() { capturing = true; document.getElementById('btn-start').style.display='none'; document.getElementById('btn-stop').style.display='block'; }
function stopCapture() { capturing = false; document.getElementById('btn-start').style.display='block'; document.getElementById('btn-stop').style.display='none'; }

window.onload = loadCSV;
</script>
</body>
</html>
