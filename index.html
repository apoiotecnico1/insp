<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Apoio - Ajuste PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: rgba(0, 121, 52, 0.7); --danger: #ff4444; --glass: rgba(10, 10, 10, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 25px 60px; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 1.2rem; text-transform: uppercase; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa); padding: 12px 25px; 
            border: 3px solid #fff; border-radius: 10px; 
            z-index: 100; pointer-events: none; text-align: center;
        }
        #br-txt { font-size: 0.9rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.4); display: block; margin-bottom: 4px; }
        #km-txt { font-size: 2.4rem; font-weight: 900; line-height: 1; }

        #rec-tag { 
            position: absolute; top: 25px; right: 15px; 
            display: flex; align-items: center; gap: 6px; 
            background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; opacity: 0; 
        }
        #rec-tag span { font-size: 0.75rem; font-weight: bold; }
        .dot { width: 8px; height: 8px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; transition: 0.3s; }
        .ui-hidden { opacity: 0; visibility: hidden; }
        .btn-main { border: none; padding: 20px 45px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 160px; font-size: 1rem; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(15px); z-index: 4000; padding: 60px 25px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        #settings-panel label { display: block; margin-top: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        #settings-panel select, #settings-panel input { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-top: 5px; }

        #pixel-lock { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; z-index: -1; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body>

<video id="pixel-lock" playsinline loop muted>
    <source src="https://raw.githubusercontent.com/anars/blank-video/master/250ms.mp4" type="video/mp4">
</video>

<div id="flash"></div>

<div id="safety-gate">
    <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:30px; font-weight: 900;">← VOLTAR</div>
    <label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Tempo (ms)</label><input type="number" id="cfg-int" value="200">
    <label>Fotos por PDF</label><input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>
    <div id="km-hud"><span id="br-txt">BR ---</span><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>Gerando PDF</span></div>
    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "", brAtual = "---", buffer = [], curLat = "0.00", curLon = "0.00";

const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');
const pixelLock = document.getElementById('pixel-lock');

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        pixelLock.play().catch(() => {});
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen').catch(() => {});
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams(); loadCSV(); initGPS();
    } catch(e) { alert("Permissão de pasta necessária."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function handleTouch() {
    if(capturing) takeManualPhoto();
    document.getElementById('ui-controls').classList.remove('ui-hidden');
}

// Função centralizada para desenhar a legenda sem cortar
function drawSafeWatermark(km, br, lat, lon, ts) {
    const barHeight = can.height * 0.12; // Altura da barra preta
    const padding = 40; // Recuo lateral e inferior de segurança
    
    // Desenha barra de fundo
    ctx.fillStyle = "rgba(0,0,0,0.65)";
    ctx.fillRect(0, can.height - barHeight, can.width, barHeight);
    
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "left";
    
    // Título (BR e KM)
    const titleSize = barHeight * 0.35;
    ctx.font = `bold ${titleSize}px Arial`;
    ctx.fillText(`BR ${br}  Km ${km}`, padding, can.height - (barHeight * 0.55));
    
    // Subtítulo (Data e GPS)
    const subSize = barHeight * 0.18;
    ctx.font = `${subSize}px Arial`;
    ctx.fillText(`${ts} | GPS: ${lat}, ${lon}`, padding, can.height - (barHeight * 0.25));
}

async function takeManualPhoto() {
    document.getElementById('flash').style.opacity = "0.2"; 
    setTimeout(() => { document.getElementById('flash').style.opacity = "0"; }, 70);
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawSafeWatermark(currentKm, brAtual, curLat, curLon, new Date().toLocaleString('pt-BR'));
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fileName = `FOTO_BR${brAtual}_Km${currentKm}_${Date.now()}.jpg`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob); await writable.close();
}

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    document.getElementById('ui-controls').classList.add('ui-hidden'); 
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    document.getElementById('ui-controls').classList.remove('ui-hidden'); 
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    // Salva apenas os dados brutos no buffer (sem legenda ainda para economizar RAM)
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ 
        imgData: can.toDataURL('image/jpeg', 0.5), 
        km: currentKm, 
        ts: new Date().toLocaleString('pt-BR'),
        lat: curLat, lon: curLon
    });

    if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
        savePDF([...buffer], kmInicialLote, currentKm);
        buffer = []; kmInicialLote = currentKm;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        await new Promise(res => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, can.width, can.height);
                // Desenha a legenda na hora de gerar o PDF para garantir que não corte
                drawSafeWatermark(dataList[i].km, brAtual, dataList[i].lat, dataList[i].lon, dataList[i].ts);
                doc.addImage(can.toDataURL('image/jpeg', 0.75), 'JPEG', 0, 0, pw, ph);
                res();
            };
            img.src = dataList[i].imgData;
        });
    }
    const fileName = `REL_BR${brAtual}_Km${kmIni}_ao_${kmFim}_${Date.now()}.pdf`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(doc.output('blob')); await writable.close();
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brAtual = best.br;
            document.getElementById('br-txt').innerText = "BR " + brAtual;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr=h.indexOf('br'), ikm=h.indexOf('km'), ilat=h.findIndex(x=>x.includes('lat')), ilon=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat].replace(',','.')), ln: parseFloat(c[ilon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
