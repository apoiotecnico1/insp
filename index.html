<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INSPEÇÃO PRO V24 - OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* MANTIDO EXATAMENTE IGUAL AO SEU ANTERIOR */
        :root { 
            --accent: #00f2ff; 
            --danger: #ff003c; 
            --placa-verde: #0a8a4d;
            --panel: rgba(10, 15, 20, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
        }

        #safety-gate { 
            position: fixed; inset: 0; background: #000; z-index: 8000; 
            display: flex; align-items: center; justify-content: center; padding: 25px;
        }
        .alert-box { 
            border: 1px solid #333; padding: 30px; border-radius: 20px; 
            max-width: 400px; background: #111; text-align: center;
        }
        .btn-aware { 
            background: var(--accent); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 12px; cursor: pointer; width: 100%; 
            text-transform: uppercase; margin-top: 20px;
        }

        #app-shell { visibility: hidden; opacity: 0; transition: 0.5s; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        #km-container { position: absolute; top: 30px; left: 25px; z-index: 100; pointer-events: none; }
        #km-plate { 
            background: var(--placa-verde); 
            padding: 15px 35px; border: 6px solid #ffffff; border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #km-txt { 
            font-size: 3.5rem; font-weight: 900; color: #ffffff;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5); letter-spacing: -2px; line-height: 1;
        }

        #rec-tag { 
            position: absolute; top: 35px; right: 30px; z-index: 100;
            background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 12px;
            color: #fff; font-size: 13px; font-weight: bold; text-align: right;
        }
        .dot { display: inline-block; width: 10px; height: 10px; background: #ff0000; border-radius: 50%; margin-right: 8px; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            z-index: 500; display: flex; gap: 20px; transition: 0.4s;
        }
        .ui-hidden { opacity: 0; transform: translate(-50%, 40px); pointer-events: none; }

        .btn-main { 
            border: none; border-radius: 18px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; padding: 20px 45px; font-size: 14px; box-shadow: 0 10px 30px #000;
        }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: #333; color: #fff; padding: 20px; }

        #settings-panel { 
            position: fixed; right: -360px; top: 0; width: 340px; height: 100%; 
            background: var(--panel); backdrop-filter: blur(20px); z-index: 2000; 
            padding: 40px 30px; transition: 0.3s; border-left: 2px solid var(--accent);
            overflow-y: auto; /* Adicionado para garantir rolagem se muitas opções */
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent)">INSPEÇÃO PRO V24</h2>
        <p style="font-size: 13px; color: #aaa; margin-top: 10px;">Configure a pasta de salvamento e inicie a câmera em tela cheia.</p>
        <button class="btn-aware" onclick="initFullSystem()">Configurar e Iniciar</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-container">
        <div id="km-plate"><h1 id="km-txt">KM ---</h1></div>
    </div>

    <div id="rec-tag">
        <div id="rec-blink" style="display:none;"><span class="dot"></span> GRAVANDO</div>
        <div id="batch-info">LOTE: 0</div>
        <div id="total-info">TOTAL: 0</div>
    </div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-main" onclick="toggleSet(); event.stopPropagation();">⚙</button>
        <button id="btn-start" class="btn-main" onclick="startCapture(); event.stopPropagation();">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture(); event.stopPropagation();">Finalizar Relatório</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:25px">OPÇÕES</h3>
    
    <div class="field">
        <label>Câmera Ativa</label>
        <select id="cam-select" onchange="initCam(this.value)"></select>
    </div>
    
    <div class="field">
        <label>Qualidade do PDF</label>
        <select id="cfg-qual">
            <option value="0.4">BAIXA</option>
            <option value="0.7" selected>MÉDIA</option>
            <option value="0.9">ALTA</option>
        </select>
    </div>
    
    <div class="field">
        <label>Fotos por Lote PDF</label>
        <input type="number" id="cfg-lote" value="50">
    </div>
    
    <div class="field">
        <label>Intervalo Captura (ms)</label>
        <input type="number" id="cfg-int" value="400">
    </div>
    
    <div class="field">
        <label>Mostrar GPS no PDF?</label>
        <select id="cfg-gps">
            <option value="sim">SIM</option>
            <option value="nao">NÃO</option>
        </select>
    </div>

    <button class="btn-aware" onclick="toggleSet()" style="background:#333; color:#fff">Fechar</button>
</div>

<canvas id="c"></canvas>

<script>
/* LÓGICA MANTIDA IGUAL, APENAS ADAPTANDO A CAPTURA DAS NOVAS OPÇÕES */
let kmDB=[], buffer=[], hDir=null, stream=null, rec=false, uiTimer, lastPos=null, totalSessao=0;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function initFullSystem() {
    try {
        if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        await listCams();
        loadKM();
        initGPS();
    } catch(e) { alert("Permissão necessária para continuar."); }
}

async function loadKM() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.warn("CSV não encontrado."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude };
        if(!kmDB.length) return;
        let nearest = kmDB, minDist = Infinity;
        kmDB.forEach(pt => {
            const d = Math.hypot(lastPos.lt - pt.lt, lastPos.ln - pt.ln);
            if(d < minDist) { minDist = d; nearest = pt; }
        });
        document.getElementById('km-txt').innerText = "KM " + nearest.km;
    }, null, {enableHighAccuracy:true});
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Lente ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initCam(video[video.length-1].deviceId);
}

async function initCam(id) {
    if(stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-blink').style.display = 'block';
    loop();
}

function stopCapture() {
    rec = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-blink').style.display = 'none';
    savePDF();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    // Captura qualidade selecionada no momento
    const qual = parseFloat(document.getElementById('cfg-qual').value);
    const int = parseInt(document.getElementById('cfg-int').value);
    
    buffer.push({
        img: can.toDataURL('image/jpeg', qual),
        km: document.getElementById('km-txt').innerText.replace('KM ', ''),
        lat: lastPos?.lt.toFixed(6),
        lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleString('pt-BR')
    });

    totalSessao++;
    document.getElementById('batch-info').innerText = `LOTE: ${buffer.length}`;
    document.getElementById('total-info').innerText = `TOTAL: ${totalSessao}`;

    if(buffer.length >= parseInt(document.getElementById('cfg-lote').value)) savePDF();
    setTimeout(loop, int);
}

async function savePDF() {
    if(!buffer.length) return;
    const batch = [...buffer];
    buffer = []; 
    
    const kmStart = batch.km;
    const kmEnd = batch[batch.length-1].km;
    
    // Captura opção GPS selecionada
    const showGPS = document.getElementById('cfg-gps').value === 'sim';

    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<batch.length; i++) {
        if(i > 0) doc.addPage('l');
        
        const img = new Image();
        await new Promise(resolve => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const hT = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, can.height - hT, can.width, hT);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = `bold ${hT * 0.45}px Arial`;
                ctx.fillText("KM " + batch[i].km, 50, can.height - (hT * 0.42));
                
                // Lógica mantida: só mostra se 'Sim' estiver selecionado
                if(showGPS) {
                    ctx.font = `${hT * 0.15}px Arial`;
                    ctx.fillText(`${batch[i].ts} | GPS: ${batch[i].lat}, ${batch[i].lon}`, 50, can.height - (hT * 0.18));
                }
                
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                resolve();
            };
            img.src = batch[i].img;
        });
    }

    const fileName = `KM_${kmStart}_AO_${kmEnd}_${Date.now()}.pdf`;
    try {
        const fh = await hDir.getFileHandle(fileName, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch(e) { doc.save(fileName); }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}
</script>
</body>
</html>
