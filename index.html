<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Campo - Ultra Leve</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #00ff66;
            --yellow: #ffb703;
            --error: #ff3333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body { background: var(--bg); color: var(--text); padding: 8px; font-size: 13px; overflow-x: hidden; }
        .container { max-width: 100%; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        h1 { font-size: 13px; color: var(--accent); }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 10px; margin-bottom: 8px; }
        .row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        textarea { width: 100%; height: 60px; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 8px; resize: none; font-size: 12px; }
        
        input[type="text"] { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; font-size: 16px; border-radius: 4px; }
        input[type="text"]:focus { border-color: var(--accent); outline: none; }
        
        .btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px; cursor: pointer; font-weight: bold; font-size: 12px; border-radius: 4px; }
        .btn-accent { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        
        /* Botão de Toque Rápido para Android */
        .btn-action { background: #112215; color: var(--accent); border: 1px solid var(--accent); padding: 10px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; text-align: center; display: block; min-height: 42px; }
        .btn-action.has-data { color: var(--yellow); border-color: var(--yellow); background: #221a05; }
        
        .hidden { display: none; }
        #status { padding: 6px; font-size: 11px; background: #161616; border-left: 3px solid var(--border); margin-bottom: 8px; }
        .success { border-left-color: var(--accent) !important; color: var(--accent); }
        .error { border-left-color: var(--error) !important; color: var(--error); }
        
        /* Tabela Otimizada com Virtualização por Scroll */
        .table-wrapper { overflow-x: auto; max-height: 65vh; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; background: var(--surface); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #222222; position: sticky; top: 0; z-index: 10; padding: 10px; border-bottom: 1px solid var(--border); color: var(--accent); font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 13px; }
        tr:nth-child(even) { background: #171717; }
        .inspected-row { border-left: 3px solid var(--accent); background: rgba(0, 255, 102, 0.02) !important; }
        
        .counter { font-size: 11px; color: var(--text-dim); }
        .highlight { color: var(--accent); font-weight: bold; background: #003314; padding: 0 2px; }
        
        /* Modais Leves */
        .modal-mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: flex-start; z-index: 9999; padding-top: 12px; overflow-y: auto; }
        .modal-window { background: var(--surface); border: 1px solid var(--border); width: 96%; max-width: 420px; padding: 12px; border-radius: 6px; }
        .modal-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border); padding-bottom: 6px; margin-bottom: 10px; }
        .modal-title { color: var(--accent); font-size: 11px; font-weight: bold; }
        .btn-close { color: var(--error); cursor: pointer; font-size: 24px; font-weight: bold; border: none; background: none; }
        .field-group { margin-bottom: 10px; }
        .field-group label { display: block; color: var(--text-dim); font-size: 11px; margin-bottom: 3px; text-transform: uppercase; }

        /* Fotos Compactas */
        .gallery-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 6px; background: var(--bg); padding: 6px; border: 1px dashed var(--border); min-height: 50px; }
        .gallery-cell { position: relative; width: 100%; aspect-ratio: 1; border: 1px solid var(--border); }
        .gallery-cell img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-photo { position: absolute; top: -3px; right: -3px; background: var(--error); color: #fff; border: none; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SYS // LIGHT_SPEED_FIELD</h1>
        <div id="db-info" class="counter">Sem dados</div>
    </header>

    <div id="import-panel" class="card">
        <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 0;">
            <strong>FONTE DE DADOS (SAP / EXCEL)</strong>
            <button class="btn" onclick="toggleElement('import-area')">Injetar/Ver</button>
        </div>
        <div id="import-area" class="hidden" style="margin-top: 10px;">
            <div class="row">
                <input type="file" id="file-input" accept=".html,.htm,.xls,.xlsx,.txt,.csv" style="display: none;" onchange="handleFile(this)">
                <button class="btn" onclick="document.getElementById('file-input').click()">📁 Escolher Arquivo</button>
                <button class="btn btn-accent" onclick="saveToLocalStorage()">💾 Travar no Celular</button>
                <button class="btn" style="color: var(--error);" onclick="clearLocalStorage()">🗑️ Limpar</button>
            </div>
            <textarea id="raw-input" placeholder="Cole as linhas do relatório se preferir..."></textarea>
        </div>
    </div>

    <div id="status">Pronto para pesquisa rápida.</div>

    <div class="row">
        <input type="text" id="search-input" placeholder="🔎 Digite o material ou termo para filtrar..." autocomplete="off">
        <button class="btn" onclick="clearSearch()">X</button>
    </div>

    <div class="counter" id="result-count" style="margin-bottom: 4px;">0 itens indexados.</div>

    <div class="table-wrapper" id="scroll-container">
        <table id="results-table">
            <thead>
                <tr id="table-headers"><th>Aguardando importação...</th></tr>
            </thead>
            <tbody id="table-body">
                <tr><td style="color: var(--text-dim); text-align: center; padding: 20px;">Use a aba superior para injetar sua planilha.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<input type="file" id="globalCameraInput" accept="image/*" onchange="processGlobalPhotos(this)" style="display:none;">

<div id="modalFoco" class="modal-mask">
    <div class="modal-window">
        <div class="modal-top">
            <h3 id="modalTitle" class="modal-title">INSPEÇÃO ATIVA</h3>
            <button class="btn-close" onclick="closeModalCPS()">&times;</button>
        </div>
        <input type="hidden" id="activeRowKey">

        <div class="field-group">
            <label>Evidências Fotográficas:</label>
            <div id="modalGallery" class="gallery-box"></div>
            <button type="button" class="btn" style="margin-top: 6px; width: 100%; background: #141414; border: 1px dashed var(--accent); color: var(--accent); min-height: 40px;" onclick="triggerAdditionalPhoto()">📸 Abrir Câmera Traseira</button>
        </div>

        <div class="field-group">
            <label>Qtd Encontrada / Estado:</label>
            <input type="text" id="fQtd" placeholder="Ex: 10 pçs, regular, avariado..." oninput="saveDataCPS()">
        </div>

        <div class="field-group">
            <label>Notas de Campo:</label>
            <textarea id="fObs" placeholder="Observações e anotações visuais..." oninput="saveDataCPS()"></textarea>
        </div>

        <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px;">
            <button type="button" style="color: var(--error); background:none; border:none; font-size:11px;" onclick="clearRecordCPS()">[ APAGAR REGISTROS ]</button>
            <div id="flashSaved" style="color: var(--accent); font-size: 11px; font-weight: bold; opacity: 0; transition: opacity 0.15s;">● SALVO</div>
        </div>
    </div>
</div>

<script>
    let DATA_INDEX = []; 
    let FILTERED_DATA = []; 
    let HEADERS = [];
    let INSPECTION_STORAGE = JSON.parse(localStorage.getItem('sys_inspection_data')) || {};
    let matColIdx = 0;
    
    // Configurações do Scroll Paginado Inteligente
    let itemsRendered = 0;
    const PAGE_SIZE = 30; 

    window.onload = function() {
        loadFromLocalStorage();
        
        // Input otimizado: Busca em tempo real enquanto digita sem travar a escrita
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(executeSearch, 50); 
        });

        // Evento que detecta se o usuário rolou até o fim da tabela para carregar mais dados
        document.getElementById('scroll-container').addEventListener('scroll', function(e) {
            const container = e.target;
            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 60) {
                appendNextPage();
            }
        });
    };

    function log(msg, type = '') {
        const el = document.getElementById('status');
        el.innerText = msg; el.className = type;
    }

    function toggleElement(id) {
        document.getElementById(id).classList.toggle('hidden');
    }

    function clearSearch() {
        const input = document.getElementById('search-input');
        input.value = ''; input.focus(); executeSearch();
    }

    /* CONTROLE DE DISPARO DA CÂMERA */
    let targetedKey = null;
    function directCaptureTrigger(key) {
        targetedKey = key;
        const camInput = document.getElementById('globalCameraInput');
        camInput.value = '';
        camInput.click();
    }

    function triggerAdditionalPhoto() {
        const key = document.getElementById('activeRowKey').value;
        if(key) directCaptureTrigger(key);
    }

    function processGlobalPhotos(input) {
        if (!targetedKey || !input.files.length) return;
        const key = targetedKey;

        if (!INSPECTION_STORAGE[key]) INSPECTION_STORAGE[key] = { qtd: '', obs: '', fotos: [] };
        if (!INSPECTION_STORAGE[key].fotos) INSPECTION_STORAGE[key].fotos = [];

        let file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_W = 400; // Resolução ultra-enxuta para não estourar o espaço interno do Android
                let w = img.width; let h = img.height;

                if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                canvas.width = w; canvas.height = h;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                
                // Compressão agressiva (0.45) para salvar milhares de fotos sem gargalos de escrita
                const compressed = canvas.toDataURL('image/jpeg', 0.45); 
                INSPECTION_STORAGE[key].fotos.push(compressed);
                
                localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));
                openModalCPS(key);
            };
        };
        reader.readAsDataURL(file);
    }

    /* CONTROLE DE REGISTROS */
    function openModalCPS(key) {
        document.getElementById('activeRowKey').value = key;
        document.getElementById('modalTitle').innerText = `ITEM ID: ${key}`;
        
        const current = INSPECTION_STORAGE[key] || { qtd: '', obs: '', fotos: [] };
        document.getElementById('fQtd').value = current.qtd || '';
        document.getElementById('fObs').value = current.obs || '';
        
        buildGalleryCPS(current.fotos || []);
        document.getElementById('modalFoco').style.display = 'flex';
    }

    function closeModalCPS() {
        document.getElementById('modalFoco').style.display = 'none';
        updateVisibleRowState(document.getElementById('activeRowKey').value);
    }

    function buildGalleryCPS(photos) {
        document.getElementById('modalGallery').innerHTML = photos.map((p, idx) => `
            <div class="gallery-cell">
                <img src="${p}">
                <button type="button" class="btn-del-photo" onclick="deletePhotoCPS(${idx})">×</button>
            </div>
        `).join('');
    }

    function deletePhotoCPS(idx) {
        const key = document.getElementById('activeRowKey').value;
        if (key && INSPECTION_STORAGE[key]?.fotos) {
            INSPECTION_STORAGE[key].fotos.splice(idx, 1);
            localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));
            buildGalleryCPS(INSPECTION_STORAGE[key].fotos);
        }
    }

    let saveTimeout;
    function saveDataCPS() {
        const key = document.getElementById('activeRowKey').value;
        if (!key) return;

        if (!INSPECTION_STORAGE[key]) INSPECTION_STORAGE[key] = { qtd: '', obs: '', fotos: [] };
        INSPECTION_STORAGE[key].qtd = document.getElementById('fQtd').value;
        INSPECTION_STORAGE[key].obs = document.getElementById('fObs').value;

        localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));

        const flash = document.getElementById('flashSaved');
        flash.style.opacity = '1';
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => { flash.style.opacity = '0'; }, 500);
    }

    function clearRecordCPS() {
        const key = document.getElementById('activeRowKey').value;
        if (key && confirm("Apagar dados deste material?")) {
            delete INSPECTION_STORAGE[key];
            localStorage.setItem('sys_inspection_data', JSON.stringify(INSPECTION_STORAGE));
            document.getElementById('fQtd').value = ''; document.getElementById('fObs').value = '';
            buildGalleryCPS([]); closeModalCPS();
        }
    }

    /* ENGINE DE BUSCA DE ALTA VELOCIDADE E RENDERIZAÇÃO PARCIAL */
    function executeSearch() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        document.getElementById('scroll-container').scrollTop = 0; // Joga o scroll para o topo

        if (DATA_INDEX.length === 0) return;

        if (query === "") {
            FILTERED_DATA = DATA_INDEX;
        } else {
            const terms = query.split(/\s+/);
            FILTERED_DATA = DATA_INDEX.filter(row => {
                const rowString = row.join(' ').toLowerCase();
                return terms.every(term => rowString.includes(term));
            });
        }

        document.getElementById('result-count').innerText = `Encontrados: ${FILTERED_DATA.length} de ${DATA_INDEX.length}`;
        
        // Reseta o renderizador para a primeira página
        document.getElementById('table-body').innerHTML = "";
        itemsRendered = 0;
        appendNextPage();
    }

    // Injeta blocos de linhas sob demanda para evitar gargalos na tela do Android
    function appendNextPage() {
        if (itemsRendered >= FILTERED_DATA.length) return;

        const tbody = document.getElementById('table-body');
        const start = itemsRendered;
        const end = Math.min(start + PAGE_SIZE, FILTERED_DATA.length);
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const terms = query !== "" ? query.split(/\s+/) : [];

        let chunkHtml = '';
        for (let i = start; i < end; i++) {
            const rowData = FILTERED_DATA[i];
            const rowKey = rowData[matColIdx] || 'R_' + i;
            const hasRecord = INSPECTION_STORAGE[rowKey];
            
            chunkHtml += `<tr id="row-id-${rowKey}" ${hasRecord ? 'class="inspected-row"' : ''}>`;
            for (let j = 0; j < HEADERS.length - 1; j++) {
                let cellValue = rowData[j] !== undefined ? rowData[j] : '';
                if (terms.length > 0 && cellValue !== '') {
                    terms.forEach(term => {
                        if (term.length > 1) {
                            const regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');
                            cellValue = cellValue.replace(regex, '<span class="highlight">$1</span>');
                        }
                    });
                }
                chunkHtml += `<td>${cellValue}</td>`;
            }
            
            let btnClass = hasRecord ? 'btn-action has-data' : 'btn-action';
            let btnText = hasRecord ? `📝 EDITAR (${hasRecord.fotos?.length || 0}F)` : '📸 FOTO / COLETAR';
            chunkHtml += `<td><button type="button" class="${btnClass}" onclick="directCaptureTrigger('${rowKey}')">${btnText}</button></td>`;
            chunkHtml += '</tr>';
        }

        tbody.insertAdjacentHTML('beforeend', chunkHtml);
        itemsRendered = end;
    }

    // Atualiza apenas a linha modificada sem precisar remontar o HTML inteiro da tela
    function updateVisibleRowState(key) {
        const tr = document.getElementById(`row-id-${key}`);
        if (!tr) return;
        const hasRecord = INSPECTION_STORAGE[key];
        const btn = tr.querySelector('.btn-action');
        
        if (hasRecord) {
            tr.classList.add('inspected-row');
            btn.className = 'btn-action has-data';
            btn.innerText = `📝 EDITAR (${hasRecord.fotos?.length || 0}F)`;
        } else {
            tr.classList.remove('inspected-row');
            btn.className = 'btn-action';
            btn.innerText = '📸 FOTO / COLETAR';
        }
    }

    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    /* PARSERS E TRATAMENTO DA BASE */
    function handleFile(input) {
        const file = input.files[0]; if (!file) return;
        log("Lendo arquivo...", "");
        const reader = new FileReader();

        if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    if (json.length > 0) {
                        HEADERS = json[0].map(h => String(h || '').trim());
                        DATA_INDEX = json.slice(1).filter(r => r.length > 0).map(r => r.map(c => String(c ?? '').trim()));
                        finalizeDataLoad();
                    }
                } catch (err) { log("Falha na leitura Excel.", "error"); }
            };
            reader.readAsArrayBuffer(file);
        } else {
            reader.onload = function(e) {
                const content = e.target.result;
                if (content.includes('<table') || content.includes('<TABLE')) { parseHtmlTable(content); } 
                else { parseRawText(content); }
            };
            reader.readAsText(file, 'UTF-8');
        }
    }

    function parseHtmlTable(htmlContent) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');
        const rows = doc.querySelectorAll('tr');
        DATA_INDEX = []; HEADERS = [];
        let headerDetected = false;

        rows.forEach((row) => {
            const cells = Array.from(row.querySelectorAll('th, td')).map(c => c.innerText.trim());
            if (cells.length === 0 || cells.join('').includes('----')) return;
            if (!headerDetected) { HEADERS = cells.map(h => h || 'Coluna'); headerDetected = true; } 
            else if (cells.length >= Math.floor(HEADERS.length * 0.5) && cells[0] !== '') { DATA_INDEX.push(cells); }
        });
        finalizeDataLoad();
    }

    function parseRawText(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (!lines.length) return;
        HEADERS = lines[0].split(/\t|,|;|\|/).map(h => h.replace(/["']/g, '').trim());
        DATA_INDEX = [];
        for (let i = 1; i < lines.length; i++) {
            const cells = lines[i].split(/\t|,|;|\|/).map(c => c.replace(/["']/g, '').trim());
            if (cells.length <= HEADERS.length) DATA_INDEX.push(cells);
        }
        finalizeDataLoad();
    }

    function finalizeDataLoad() {
        if(!HEADERS.includes('AÇÃO_CAMPO')) HEADERS.push('AÇÃO_CAMPO');
        matColIdx = HEADERS.findIndex(h => h.toLowerCase().includes('material') || h.toLowerCase().includes('código') || h.toLowerCase().includes('cod'));
        if(matColIdx === -1) matColIdx = 0;
        document.getElementById('table-headers').innerHTML = HEADERS.map(h => `<th>${h}</th>`).join('');
        executeSearch(); updateDbInfo();
        log(`Sucesso! ${DATA_INDEX.length} ativos indexados.`, 'success');
    }

    function saveToLocalStorage() {
        if (!DATA_INDEX.length) return;
        try {
            localStorage.setItem('sys_headers', JSON.stringify(HEADERS));
            localStorage.setItem('sys_data', JSON.stringify(DATA_INDEX));
            log("Base fixada no aparelho!", "success");
            updateDbInfo();
            document.getElementById('import-area').classList.add('hidden');
        } catch (e) { log("Erro: Limite de cota excedido.", "error"); }
    }

    function loadFromLocalStorage() {
        try {
            const lh = localStorage.getItem('sys_headers');
            const ld = localStorage.getItem('sys_data');
            if (lh && ld) { HEADERS = JSON.parse(lh); DATA_INDEX = JSON.parse(ld); finalizeDataLoad(); }
        } catch (e) {}
    }

    function clearLocalStorage() {
        if(confirm("Apagar base local?")) {
            localStorage.removeItem('sys_headers'); localStorage.removeItem('sys_data');
            DATA_INDEX = []; FILTERED_DATA = []; HEADERS = [];
            document.getElementById('table-headers').innerHTML = '<th>Aguardando carga...</th>';
            document.getElementById('table-body').innerHTML = '<tr><td style="text-align:center; padding:20px;">Vazio.</td></tr>';
            updateDbInfo(); log("Base removida.", "");
        }
    }

    function updateDbInfo() {
        const info = document.getElementById('db-info');
        info.innerText = DATA_INDEX.length > 0 ? `📦 BANCO: ${DATA_INDEX.length}` : "⚠️ SEM BASE";
        info.style.color = DATA_INDEX.length > 0 ? "var(--accent)" : "var(--text-dim)";
    }
</script>
</body>
</html>
