<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V5 - MODO FULL PAGE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --panel-bg: #0b1224; --accent: #00d9ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 65vw !important; height: 100vh !important; }
            #controls { width: 35vw; height: 100vh; overflow-y: auto; background: #050a16; }
            #kmPlaque { font-size: 2.2rem !important; }
        }

        #viewport { position: relative; width: 100vw; height: 42vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 10px;
            font-size: 2.8rem; font-weight: 900; border: 4px solid #fff;
            margin: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #settings-trigger {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.5); border-radius: 50%; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3); font-size: 18px;
        }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%;
            background: rgba(10, 15, 28, 0.98); z-index: 2000; transition: 0.4s;
            overflow-y: auto; padding: 15px; border-left: 3px solid var(--accent);
        }
        #settings-panel.active { right: 0; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; border-bottom: 1px solid #333; }
        .tab-btn { background: #1a2235; border: none; color: #888; padding: 8px 15px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .setting-group { display: none; }
        .setting-group.active { display: block; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.8rem; border-bottom: 1px solid #1a1a1a; }
        
        select, input { background: #050a16; color: white; border: 1px solid #444; padding: 4px; border-radius: 4px; font-size: 0.8rem; }

        .status-bar { display: flex; justify-content: space-around; padding: 5px; background: var(--panel-bg); font-size: 0.65rem; }
        .st { padding: 2px 8px; border-radius: 10px; border: 1px solid #333; }
        .ok { color: #00ff66; border-color: #00ff66; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px; }
        .card { background: #111; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--accent); }

        .btn-row { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.action { padding: 15px; border-radius: 10px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }

        #dirSelector { background: var(--gold); color: #000; grid-column: span 2; margin-top: 10px; font-weight: bold; }
        #dirSelector.ready { background: #00ff66; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="settings-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px">
        <h3 style="margin:0; color:var(--accent)">SETUP DE RELATÓRIO</h3>
        <button onclick="toggleSettings()" style="background:red; color:white; border:none; padding:5px 10px">OK</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tabCam')">IMAGEM</button>
        <button class="tab-btn" onclick="openTab(event, 'tabAuto')">SISTEMA</button>
    </div>

    <div id="tabCam" class="setting-group active">
        <div class="setting-item">Lente: <select id="cfgCam" onchange="initCamera()"><option value="environment">Traseira</option><option value="user">Frontal</option></select></div>
        <div class="setting-item">Tamanho Fonte: <input type="range" id="cfgFontSize" min="20" max="100" value="50"></div>
        <div class="setting-item">Brilho: <input type="range" id="cfgBright" min="50" max="150" value="100"></div>
        <div class="setting-item">Contraste: <input type="range" id="cfgContrast" min="50" max="150" value="100"></div>
    </div>

    <div id="tabAuto" class="setting-group">
        <div class="setting-item">Fotos p/ Lote: <input type="number" id="cfgBatch" value="100" style="width:60px"></div>
        <div class="setting-item">Intervalo (ms): <input type="number" id="cfgDelay" value="500" style="width:60px"></div>
        <div class="setting-item">Exibir GPS: <input type="checkbox" id="cfgShowGps" checked></div>
    </div>
</div>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="status-bar">
            <div id="stCsv" class="st">CSV: ...</div>
            <div id="stGps" class="st">GPS: ...</div>
        </div>

        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE<span id="txtBuffer" class="val">0/100</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer">GERAR LOTE<span id="txtPdfs" class="val">0</span></div>
        </div>

        <div class="btn-row">
            <button id="dirSelector" class="action">1. DEFINIR PASTA</button>
            <button id="btnStart" class="action" disabled>2. INICIAR</button>
            <button id="btnStop" class="action" disabled>PARAR</button>
        </div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// LÓGICA GEOGRÁFICA
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){ 
    const map=headers.map(h=>normalizeStr(h)); 
    for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; } 
    return -1; 
}
function parsePt(v){ 
    if(v==null) return NaN; 
    const s=String(v).trim(); 
    return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); 
}
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

async function loadKMCSV(){
    try {
        const resp = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        let text = await resp.text();
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        const head = lines.shift().split(';');
        const iKm = findColumnIndex(head, ['km']), iLat = findColumnIndex(head, ['lat']), iLon = findColumnIndex(head, ['lon']);
        kmDataset = lines.map(l => {
            const r = l.split(';');
            return { km: r[iKm], lat: parsePt(r[iLat]), lon: parsePt(r[iLon]) };
        }).filter(p => p.km && !isNaN(p.lat));
        document.getElementById('stCsv').textContent = "CSV: OK";
        document.getElementById('stCsv').classList.add('ok');
    } catch(e) { document.getElementById('stCsv').textContent = "CSV: ERRO"; }
}

function updateKM() {
    if(!lastPos || !kmDataset.length) return;
    let best = null, bd = Infinity;
    for(const p of kmDataset){
        const d = hav(lastPos.lat, lastPos.lon, p.lat, p.lon);
        if(d < bd){ bd = d; best = p; }
    }
    if(best) document.getElementById('kmPlaque').textContent = "KM " + best.km;
}

// CÂMERA E DIRETÓRIO
document.getElementById('dirSelector').onclick = async () => {
    try {
        directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('dirSelector').textContent = "PASTA OK ✓";
        document.getElementById('dirSelector').classList.add('ready');
        document.getElementById('btnStart').disabled = false;
    } catch (err) { alert("Permissão necessária."); }
};

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
function openTab(evt, tabName) {
    const groups = document.getElementsByClassName("setting-group");
    for (let i = 0; i < groups.length; i++) groups[i].className = "setting-group";
    const btns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < btns.length; i++) btns[i].className = "tab-btn";
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

async function initCamera() {
    const mode = document.getElementById('cfgCam').value;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: mode, width: {ideal: 1920}, height: {ideal: 1080} },
            audio: false
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    } catch(e) { alert("Câmera indisponível."); }
}

// ESTAMPA TÉCNICA (INTERNA À FOTO)
function drawStamp(item) {
    const w = can.width, h = can.height;
    const scale = h / 720;
    const fontSize = parseInt(document.getElementById('cfgFontSize').value) * scale;
    
    ctx.save();
    const sH = h * 0.16;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, h - sH, w, sH); // Tarja preta transparente

    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 1 * scale;
    ctx.beginPath(); ctx.moveTo(0, h-sH); ctx.lineTo(w, h-sH); ctx.stroke(); // Linha técnica

    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${fontSize}px "Courier New", monospace`;
    ctx.shadowColor = "black"; ctx.shadowBlur = 8 * scale;
    
    ctx.fillText(`LOCALIZAÇÃO: KM ${item.km}`, 40 * scale, h - (sH * 0.52));

    if(document.getElementById('cfgShowGps').checked) {
        ctx.font = `bold ${fontSize * 0.35}px "Courier New", monospace`;
        ctx.fillText(`LAT: ${item.lat} | LON: ${item.lon} | DATA: ${item.ts}`, 40 * scale, h - (sH * 0.18));
    }
    ctx.restore();
}

// MOTOR PDF: PREENCHIMENTO TOTAL DA PÁGINA (CROP/COVER)
async function savePDF() {
    if(!activeBuffer.length || !directoryHandle) return;
    const batch = [...activeBuffer]; activeBuffer = []; 
    pdfCount++; 
    document.getElementById('txtPdfs').textContent = pdfCount;
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4'); // A4 Horizontal
    
    const pdfW = 297, pdfH = 210, m = 10; // Margem técnica de 10mm
    const areaW = pdfW - (m * 2);
    const areaH = pdfH - (m * 2);

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        
        await new Promise(res => {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, can.width, can.height);
                ctx.filter = `brightness(${document.getElementById('cfgBright').value}%) contrast(${document.getElementById('cfgContrast').value}%)`;
                ctx.drawImage(img, 0, 0, can.width, can.height);
                ctx.filter = "none";
                drawStamp(batch[i]);

                // LÓGICA DE PREENCHIMENTO TOTAL (CROP)
                const imgRatio = can.width / can.height;
                const areaRatio = areaW / areaH;
                let sW, sH, sX, sY;

                if (imgRatio > areaRatio) {
                    sH = can.height; sW = can.height * areaRatio;
                    sX = (can.width - sW) / 2; sY = 0;
                } else {
                    sW = can.width; sH = can.width / areaRatio;
                    sX = 0; sY = (can.height - sH) / 2;
                }

                // Recorta e Redimensiona para o PDF
                const tempCan = document.createElement('canvas');
                tempCan.width = 1600; tempCan.height = 1600 / areaRatio;
                tempCan.getContext('2d').drawImage(can, sX, sY, sW, sH, 0, 0, tempCan.width, tempCan.height);

                // Desenha moldura técnica no PDF
                doc.setDrawColor(0); doc.setLineWidth(0.4);
                doc.rect(m, m, areaW, areaH);

                // Insere foto preenchendo a moldura
                doc.addImage(tempCan.toDataURL('image/jpeg', 0.9), 'JPEG', m, m, areaW, areaH);
                
                // Texto de rodapé fora da moldura
                doc.setFont("courier", "bold"); doc.setFontSize(8); doc.setTextColor(80);
                doc.text(`INSPEÇÃO TÉCNICA - LOTE ${pdfCount} | FOTO ${i+1}/${batch.length}`, m, pdfH - 5);

                res();
            };
            img.src = batch[i].img;
        });
    }
    
    try {
        const file = await directoryHandle.getFileHandle(`INSPECAO_LOTE_${pdfCount}.pdf`, { create: true });
        const stream = await file.createWritable();
        await stream.write(doc.output('blob'));
        await stream.close();
    } catch (e) { doc.save(`RELATORIO_${pdfCount}.pdf`); }
}

function captureLoop() {
    if(!isRecording) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('kmPlaque').textContent.replace('KM ', ''),
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        ts: new Date().toLocaleString()
    });
    photoCount++;
    const limit = parseInt(document.getElementById('cfgBatch').value);
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${limit}`;
    if(activeBuffer.length >= limit) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfgDelay').value));
}

document.getElementById('btnStart').onclick = () => { isRecording = true; captureLoop(); document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false; };
document.getElementById('btnStop').onclick = () => { isRecording = false; savePDF(); document.getElementById('btnStart').disabled = false; document.getElementById('btnStop').disabled = true; };
document.getElementById('btnSaveManual').onclick = savePDF;

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    document.getElementById('stGps').textContent = "GPS: OK";
    document.getElementById('stGps').classList.add('ok');
    updateKM();
}, null, {enableHighAccuracy:true});

loadKMCSV(); initCamera();
</script>
</body>
</html>
