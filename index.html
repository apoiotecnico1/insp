<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angstrom - Zero Dano Fibra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --danger: #dc3545; --success: #198754; }
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .app-container { max-width: 500px; margin: auto; background: white; min-height: 100vh; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .camera-section { background: #e9ecef; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 2px solid #dee2e6; }
        .preview-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 3px solid var(--success); }
        .btn-camera { background: #6c757d; color: white; width: 100%; margin-bottom: 5px; }
        .status-lock { font-size: 0.8rem; font-weight: bold; text-align: center; color: var(--danger); padding: 10px; }
        #comprovanteFinal { display: none; padding: 20px; border: 2px solid #000; background: #fff; }
    </style>
</head>
<body>

<div class="app-container" id="main-ui">
    <div class="text-center mb-4">
        <h5 class="fw-bold text-uppercase mt-2">Liberação de Escavação</h5>
        <span class="badge bg-dark">SISTEMA ANTI-ROMPIMENTO</span>
    </div>

    <div class="mb-3">
        <label class="form-label small fw-bold">KM e Sentido:</label>
        <div class="input-group">
            <input type="text" id="km" class="form-control" placeholder="KM 145+200">
            <select id="sentido" class="form-select">
                <option value="Norte">Norte</option>
                <option value="Sul">Sul</option>
            </select>
        </div>
    </div>

    <div class="camera-section">
        <div class="d-flex justify-content-between align-items-center">
            <span class="badge bg-danger">FIBRA CLARO</span>
            <div class="form-check form-switch small">
                <input class="form-check-input" type="checkbox" id="presencaClaro" onchange="checkLibere()">
                <label class="form-check-label">Equipe Local</label>
            </div>
        </div>
        <label class="btn btn-camera mt-2">
            <i class="bi bi-camera-fill me-2"></i>Tirar Foto da Sondagem
            <input type="file" accept="image/*" capture="camera" id="fotoClaro" hidden onchange="previewFile('Claro')">
        </label>
        <img id="imgClaro" class="preview-img">
    </div>

    <div class="camera-section" style="border-color: #004a99;">
        <div class="d-flex justify-content-between align-items-center">
            <span class="badge bg-primary">FIBRA CCR</span>
            <div class="form-check form-switch small">
                <input class="form-check-input" type="checkbox" id="presencaCCR" onchange="checkLibere()">
                <label class="form-check-label">Equipe Local</label>
            </div>
        </div>
        <label class="btn btn-camera mt-2">
            <i class="bi bi-camera-fill me-2"></i>Tirar Foto da Sondagem
            <input type="file" accept="image/*" capture="camera" id="fotoCCR" hidden onchange="previewFile('CCR')">
        </label>
        <img id="imgCCR" class="preview-img">
    </div>

    <div id="msgTrava" class="status-lock">
        <i class="bi bi-lock-fill"></i> TIRE AS FOTOS E CONFIRME AS EQUIPES PARA LIBERAR
    </div>

    <button id="btnZap" class="btn btn-success w-100 p-3 fw-bold shadow" style="display:none;" onclick="gerarProtocolo()">
        <i class="bi bi-whatsapp me-2"></i>GERAR PROTOCOLO FINAL
    </button>
</div>

<div id="comprovanteFinal" class="text-center">
    <h3>LIBERAÇÃO DE OBRA</h3>
    <p id="p_km" class="fw-bold h4"></p>
    <div class="row">
        <div class="col-6">
            <p class="small mb-0">CLARO</p>
            <img id="resClaro" style="width:100%; border-radius:5px;">
        </div>
        <div class="col-6">
            <p class="small mb-0">CCR</p>
            <img id="resCCR" style="width:100%; border-radius:5px;">
        </div>
    </div>
    <div class="mt-3 p-2 bg-dark text-white" id="p_hash"></div>
    <p class="mt-2 small">Tire print deste comprovante para auditoria</p>
    <button class="btn btn-primary btn-sm no-print" onclick="window.location.reload()">Novo Registro</button>
</div>

<script>
    function previewFile(setor) {
        const file = document.querySelector(`#foto${setor}`).files;
        const preview = document.querySelector(`#img${setor}`);
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "block";
            checkLibere();
        }

        if (file) { reader.readAsDataURL(file); }
    }

    function checkLibere() {
        const okClaro = document.getElementById('presencaClaro').checked && document.getElementById('fotoClaro').files.length > 0;
        const okCCR = document.getElementById('presencaCCR').checked && document.getElementById('fotoCCR').files.length > 0;
        const km = document.getElementById('km').value;

        if(okClaro && okCCR && km) {
            document.getElementById('btnZap').style.display = "block";
            document.getElementById('msgTrava').style.display = "none";
        } else {
            document.getElementById('btnZap').style.display = "none";
            document.getElementById('msgTrava').style.display = "block";
        }
    }

    function gerarProtocolo() {
        const km = document.getElementById('km').value;
        const sentido = document.getElementById('sentido').value;
        const hash = "ANT-" + Math.floor(Math.random() * 90000);
        
        // Prepara tela final
        document.getElementById('main-ui').style.display = "none";
        document.getElementById('comprovanteFinal').style.display = "block";
        document.getElementById('p_km').innerText = `KM ${km} - ${sentido}`;
        document.getElementById('p_hash').innerText = `PROTOCOLO: ${hash}`;
        document.getElementById('resClaro').src = document.getElementById('imgClaro').src;
        document.getElementById('resCCR').src = document.getElementById('imgCCR').src;

        // Texto resumido para o WhatsApp
        const texto = encodeURIComponent(
            `*AUTO DE LIBERAÇÃO - ANGSTROM*\n` +
            `📍 *KM:* ${km} (${sentido})\n` +
            `✅ *STATUS:* 100% LIBERADO\n` +
            `🔐 *PROTOCOLO:* ${hash}\n\n` +
            `_As fotos da sondagem foram registradas no sistema de auditoria._`
        );
        
        setTimeout(() => {
            window.open(`https://wa.me/?text=${texto}`);
        }, 500);
    }
</script>

</body>
</html>
