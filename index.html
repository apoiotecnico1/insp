<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --gold: #ffd700;
            --placa-verde: #006a4d; 
            --danger: #ff4444; 
            --glass: rgba(10, 15, 28, 0.85); 
            --bg: #050505;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden; 
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- SPLASH SCREEN --- */
        #splash-hypnos { 
            position: fixed; inset: 0; background: #000; z-index: 9000; 
            display: flex; align-items: center; justify-content: center; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vortex {
            width: 120px; height: 120px; border: 2px solid var(--accent); border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            animation: rotate-vortex 3s linear infinite, morph 4s ease-in-out infinite alternate;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.2);
        }
        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }
        @keyframes morph { 0% { border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; } 100% { border-radius: 70% 30% 30% 70% / 60% 40% 60% 40%; } }

        /* --- SAFETY GATE --- */
        #safety-gate { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 8000; 
            display: none; align-items: center; justify-content: center; padding: 25px; 
        }
        .alert-box { 
            border: 1px solid var(--border); padding: 30px; border-radius: 24px; 
            max-width: 400px; background: #111; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .alert-box h2 { color: var(--accent); margin-bottom: 20px; font-size: 1.1rem; letter-spacing: 2px; }
        .checklist { text-align: left; margin-bottom: 30px; font-size: 0.95rem; color: #ddd; line-height: 1.8; }
        .checklist b { color: var(--accent); font-weight: 600; }
        .btn-aware { 
            background: var(--accent); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 12px; cursor: pointer; width: 100%; 
            text-transform: uppercase; transition: transform 0.2s;
        }
        .btn-aware:active { transform: scale(0.98); }

        /* --- UI PRINCIPAL --- */
        #app-shell { visibility: hidden; opacity: 0; transition: 1.5s; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD SUPERIOR */
        .hud-top-left { position: absolute; top: 40px; left: 20px; z-index: 100; pointer-events: none; }
        #km-hud { 
            background: var(--placa-verde); 
            padding: 12px 25px; 
            border: 4px solid #fff; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            display: inline-block;
        }
        #km-hud h1 { font-family: 'Arial Black', sans-serif; font-size: 2.2rem; color: #fff; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        
        #id-chip { 
            margin-top: 15px; background: var(--glass); padding: 8px 15px; border-radius: 30px; 
            border: 1px solid var(--accent); font-size: 0.75rem; color: var(--accent);
            backdrop-filter: blur(10px); font-weight: 800; letter-spacing: 1px;
        }

        /* STATUS TAGS */
        .hud-top-right { position: absolute; top: 40px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 100; }
        .status-badge { 
            background: var(--glass); padding: 5px 12px; border-radius: 6px; font-size: 10px; 
            color: #fff; border: 1px solid var(--border); text-transform: uppercase; font-weight: bold;
        }
        .status-badge.ok { border-color: #00ff66; color: #00ff66; background: rgba(0, 255, 102, 0.1); }
        
        #rec-tag { 
            display: none; align-items: center; gap: 8px; color: var(--danger); 
            background: rgba(255, 51, 51, 0.15); border: 1px solid var(--danger);
            padding: 5px 12px; border-radius: 6px; font-weight: 900; font-size: 12px;
        }
        .dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* CONTROLES INFERIORES */
        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 15px; z-index: 500; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ui-hidden { opacity: 0; transform: translate(-50%, 40px) !important; pointer-events: none; }
        
        .btn-circle { 
            width: 65px; height: 65px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .btn-rect { 
            padding: 0 40px; height: 65px; border-radius: 35px; border: none; 
            font-weight: 900; font-size: 13px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #btn-whatsapp { background: #25d366; color: #fff; width: 65px; }
        #gear-btn { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(15px); border: 1px solid var(--border); }

        /* PAINEL CONFIGURAÇÕES */
        #settings-panel { 
            position: fixed; right: -360px; top: 0; width: 340px; height: 100%; 
            background: #0a0a0a; border-left: 1px solid var(--border); z-index: 2000; 
            padding: 50px 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        #settings-panel.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .field { margin-bottom: 25px; }
        .field label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        select, input { 
            width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; 
            padding: 15px; border-radius: 12px; font-size: 0.9rem;
        }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-hypnos">
    <div class="vortex"></div>
</div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="font-family: serif; color: #fff;">OMNI <span style="color:var(--accent)">V6</span></h2>
        <div class="checklist">
            <p><b>•</b> Veículo <b>estacionado</b> para configuração.</p>
            <p><b>•</b> Dispositivo fixo no <b>suporte</b>.</p>
            <p><b>•</b> Atenção total à <b>via</b>.</p>
            <p><b>•</b> Salve em local com <b>sinal</b>.</p>
        </div>
        <button class="btn-aware" onclick="acceptSafety()">Inicializar Protocolos</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div class="hud-top-left">
        <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
        <div id="id-chip">📡 ATIVO: <span id="id-txt">LOCALIZANDO...</span></div>
    </div>

    <div class="hud-top-right">
        <div id="rec-tag"><div class="dot"></div> REC</div>
        <div id="st-gps" class="status-badge">GPS: OFF</div>
        <div id="st-csv" class="status-badge">KM-DB: OFF</div>
        <div id="st-ids" class="status-badge">ID-DB: OFF</div>
    </div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-circle" onclick="toggleSet()">⚙</button>
        <button id="btn-start" class="btn-rect" onclick="startInspeção()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-rect" onclick="stopInspeção()">Finalizar</button>
        <button id="btn-whatsapp" class="btn-circle" onclick="sendWhatsapp()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.031 6.172c-2.32 0-4.191 1.871-4.191 4.191 0 2.32 1.871 4.191 4.191 4.191 2.32 0 4.191-1.871 4.191-4.191 0-2.32-1.871-4.191-4.191-4.191zm0 7.212c-1.666 0-3.021-1.355-3.021-3.021 0-1.666 1.355-3.021 3.021-3.021s3.021 1.355 3.021 3.021c0 1.666-1.355 3.021-3.021 3.021zm3.111-7.258l.617-1.127c.074-.135.216-.219.37-.219h3.871v1h-3.414l-.547 1h-1.932l.215-.436-.18-.218zm-8.222 0l-.617-1.127c-.074-.135-.216-.219-.37-.219h-3.871v1h3.414l.547 1h1.932l-.215-.436.18-.218z"/></svg>
        </button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:30px; letter-spacing:2px">SISTEMA V6</h3>
    <div class="field"><label>Selecione a Câmera</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Taxa de Captura (ms)</label><input type="number" id="cfg-int" value="300"></div>
    <div class="field"><label>Fotos por PDF</label><input type="number" id="cfg-lote" value="50"></div>
    <div class="field"><label>Qualidade (0.1 - 1.0)</label><input type="number" id="cfg-qual" value="0.7" step="0.1"></div>
    <button class="btn-aware" onclick="toggleSet()" style="background:#222; color:#fff; margin-top:20px">Voltar à Operação</button>
</div>

<canvas id="c"></canvas>

<script>
// Mantive toda a sua lógica de script intacta para garantir que funcione, apenas ajustei a inicialização do delay visual
let kmDB=[], idDB=[], buffer=[], hDir=null, currentStream=null, rec=false, uiTimer, lastPos=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash-hypnos').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-hypnos').remove();
            document.getElementById('safety-gate').style.display = 'flex';
        }, 1000);
    }, 3000);
    loadAllCSVs();
    initGPS();
};

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        const shell = document.getElementById('app-shell');
        shell.style.visibility = 'visible';
        shell.style.opacity = '1';
        listCams();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        wakeUI();
    } catch(e) { alert("Permissão necessária para salvar os relatórios."); }
}

// Funções de GPS, CSV, Camera e Exportação permanecem as mesmas que as suas
// (Omitidas aqui para brevidade, mas devem ser as mesmas do seu código original)

/* Reaproveite as funções: hav, loadAllCSVs, initGPS, updateHUD, listCams, initC, startInspeção, stopInspeção, captureLoop, savePDF, sendWhatsapp aqui */

// RE-INSERINDO LOGICA COMPLETA DE INTERAÇÃO PARA GARANTIR FUNCIONAMENTO:

function hav(a,b,c,d){ const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }

async function loadAllCSVs() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
        document.getElementById('st-csv').textContent = "KM-DB: OK";
        document.getElementById('st-csv').classList.add('ok');
    } catch(e) { console.error("Erro KM"); }

    try {
        const r = await fetch('dados.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iId=h.findIndex(x=>x.includes('id')), iLt=h.findIndex(x=>x.includes('lat')), iLn=h.findIndex(x=>x.includes('lon'));
        idDB = rows.map(r => {
            const c = r.split(';');
            return { id: c[iId], lt: parseFloat(c[iLt].replace(',','.')), ln: parseFloat(c[iLn].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
        document.getElementById('st-ids').textContent = "ID-DB: OK";
        document.getElementById('st-ids').classList.add('ok');
    } catch(e) { console.error("Erro IDS"); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude, acc: p.coords.accuracy };
        document.getElementById('st-gps').textContent = `GPS: ±${Math.round(p.coords.accuracy)}M`;
        document.getElementById('st-gps').classList.add('ok');
        updateHUD();
    }, null, {enableHighAccuracy:true});
}

function updateHUD() {
    if(!lastPos) return;
    let bestKM = null, distKM = Infinity;
    for(const pt of kmDB) {
        const d = hav(lastPos.lt, lastPos.ln, pt.lt, pt.ln);
        if(d < distKM) { distKM = d; bestKM = pt; }
    }
    if(bestKM) document.getElementById('km-txt').innerText = "KM " + bestKM.km;

    let bestID = null, distID = Infinity;
    for(const pt of idDB) {
        const d = hav(lastPos.lt, lastPos.ln, pt.lt, pt.ln);
        if(d < distID) { distID = d; bestID = pt; }
    }
    if(bestID) document.getElementById('id-txt').innerText = `${bestID.id} (${Math.round(distID)}m)`;
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initC(video[video.length-1].deviceId);
}

async function initC(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startInspeção() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.display = 'flex';
    captureLoop();
}

function stopInspeção() {
    rec = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
    savePDF();
}

function captureLoop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', parseFloat(document.getElementById('cfg-qual').value)),
        km: document.getElementById('km-txt').innerText,
        id: document.getElementById('id-txt').innerText,
        lat: lastPos?.lt.toFixed(6),
        lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleString()
    });
    const limit = parseInt(document.getElementById('cfg-lote').value);
    if(buffer.length >= limit) savePDF();
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const batch = [...buffer];
    buffer = [];
    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, can.height - barH, can.width, barH);
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${barH * 0.3}px Arial`;
                ctx.fillText(batch[i].km + " | " + batch[i].id, 40, can.height - (barH*0.5));
                ctx.font = `${barH * 0.15}px Arial`;
                ctx.fillText(`${batch[i].ts} | LAT: ${batch[i].lat} LON: ${batch[i].lon}`, 40, can.height - (barH*0.2));
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = batch[i].img;
        });
    }

    const d = new Date();
    const nome = `Relatorio_V6_${Date.now()}.pdf`;
    try {
        const file = await hDir.getFileHandle(nome, { create: true });
        const writable = await file.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch(e) { doc.save(nome); }
}

function sendWhatsapp() {
    if(!lastPos) return alert("Aguardando GPS...");
    const tx = `*OMNI PRO V6*\n📍 ${lastPos.lt}, ${lastPos.ln}\n🛣️ ${document.getElementById('km-txt').innerText}\n⏰ ${new Date().toLocaleString()}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(tx)}`, '_blank');
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { if(rec) document.getElementById('ui-controls').classList.add('ui-hidden'); }, 4000);
}
</script>
</body>
</html>
