<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angstrom - Sistema de Barreira Técnica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --claro: #ee1d23; --ccr: #004a99; }
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; }
        .safety-container { max-width: 550px; margin: 20px auto; padding: 15px; }
        .fiber-card { background: #1f2833; border-radius: 12px; border: 2px solid #45a29e; padding: 20px; }
        .photo-preview { width: 100%; height: 180px; background: #0b0c10; border: 2px dashed #45a29e; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-top: 10px; overflow: hidden; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .presence-alert { border-left: 5px solid #ffc107; background: rgba(255, 193, 7, 0.1); padding: 10px; font-size: 0.85rem; color: #ffc107; margin-bottom: 15px; }
        .btn-critical { background: #45a29e; color: white; border: none; padding: 15px; font-weight: bold; width: 100%; border-radius: 8px; }
        .btn-critical:disabled { background: #1f2833; border: 1px solid #444; color: #666; }
        .badge-sector { padding: 5px 12px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="safety-container">
    <div class="text-center mb-4">
        <h4 class="text-white fw-bold mb-1">AUDITORIA DE IMPLANTAÇÃO</h4>
        <div class="badge bg-danger">🚫 PROIBIDO ESCAVAR SEM PROTOCOLO</div>
    </div>

    <div class="fiber-card shadow-lg">
        <div class="mb-4 text-center">
            <div class="presence-alert">
                <i class="bi bi-person-badge-fill me-2"></i>
                <b>EXIGÊNCIA:</b> Só liberar com equipe de fibra no local.
            </div>
            <div class="row g-2">
                <div class="col-6 text-start">
                    <label class="small text-muted uppercase">KM Rodovia</label>
                    <input type="text" id="km" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="125+300">
                </div>
                <div class="col-6 text-start">
                    <label class="small text-muted">Sentido</label>
                    <select id="sentido" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="Norte">Norte (RJ)</option>
                        <option value="Sul">Sul (SP)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mb-4 pb-3 border-bottom border-secondary">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="badge-sector text-white" style="background: var(--claro)">FIBRA CLARO (LADO A)</span>
                <div class="form-check form-switch small">
                    <input class="form-check-input" type="checkbox" id="presencaClaro" onchange="validar()">
                    <label class="form-check-label">Apoio em Campo</label>
                </div>
            </div>
            <input type="file" accept="image/*" id="fotoClaro" class="form-control form-control-sm bg-dark text-white border-secondary mb-2" onchange="preview('Claro')">
            <div id="prevClaro" class="photo-preview text-muted small">Evidência da Sondagem</div>
        </div>

        <div class="mb-4 pb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="badge-sector text-white" style="background: var(--ccr)">FIBRA CCR (LADO B)</span>
                <div class="form-check form-switch small">
                    <input class="form-check-input" type="checkbox" id="presencaCCR" onchange="validar()">
                    <label class="form-check-label">Apoio em Campo</label>
                </div>
            </div>
            <input type="file" accept="image/*" id="fotoCCR" class="form-control form-control-sm bg-dark text-white border-secondary mb-2" onchange="preview('CCR')">
            <div id="prevCCR" class="photo-preview text-muted small">Evidência da Sondagem</div>
        </div>

        <button id="btnLiberar" class="btn btn-critical" onclick="enviarRelatorio()" disabled>
            LIBERAR INÍCIO DE ESCAVAÇÃO
        </button>
        <p class="text-center mt-3 mb-0" style="font-size: 10px; color: #888;">
            Ao liberar, você confirma que a fibra foi visualizada e a equipe de apoio está presente.
        </p>
    </div>
</div>

<script>
    function preview(setor) {
        const file = document.getElementById('foto' + setor).files;
        const display = document.getElementById('prev' + setor);
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                display.innerHTML = `<img src="${e.target.result}">`;
                validar();
            }
            reader.readAsDataURL(file);
        }
    }

    function validar() {
        const km = document.getElementById('km').value;
        const pClaro = document.getElementById('presencaClaro').checked;
        const pCCR = document.getElementById('presencaCCR').checked;
        const fClaro = document.getElementById('fotoClaro').files.length > 0;
        const fCCR = document.getElementById('fotoCCR').files.length > 0;

        // O botão só libera se o KM estiver preenchido, 
        // as duas equipes estiverem presentes e as duas fotos anexadas.
        const liberado = (km !== "" && pClaro && pCCR && fClaro && fCCR);
        document.getElementById('btnLiberar').disabled = !liberado;
    }

    function enviarRelatorio() {
        const km = document.getElementById('km').value;
        const sentido = document.getElementById('sentido').value;
        const cod = "SEG-" + Math.floor(1000 + Math.random() * 9000);
        
        const texto = encodeURIComponent(
            `🚨 *AUTORIZAÇÃO TÉCNICA DE ESCAVAÇÃO*\n` +
            `📍 *LOCAL:* KM ${km} (${sentido})\n` +
            `----------------------------------\n` +
            `✅ *VISTORIA:* Realizada com Sucesso\n` +
            `📷 *FOTOS:* Anexadas no Protocolo Interno\n` +
            `👥 *EQUIPES EM CAMPO:* CLARO & CCR Presentes\n` +
            `----------------------------------\n` +
            `🛑 *STATUS:* LIBERADO PARA IMPLANTAÇÃO\n` +
            `🔐 *PROTOCOLO DE SEGURANÇA:* ${cod}`
        );

        window.open(`https://wa.me/?text=${texto}`);
    }
</script>

</body>
</html>
