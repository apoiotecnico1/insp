<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA INSPEÇÃO PRO - VISION EXPERT V5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00ffcc; 
            --danger: #ff0055; 
            --warning: #ffcc00;
            --panel-bg: rgba(10, 10, 10, 0.98);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* Gateway de Segurança Profissional */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border-left: 10px solid var(--accent); padding: 40px; background: #0a0a0a; max-width: 500px; }
        .alert-box h1 { font-size: 1.5rem; margin-bottom: 15px; letter-spacing: 2px; color: var(--accent); }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 1.1rem; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        
        /* Renderização da Câmera com WDR Virtual */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: filter 0.2s;
        }

        /* HUD Técnico de Engenharia */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: #fff; color: #000; 
            padding: 15px 40px; border: 6px solid #000; 
            z-index: 100; box-shadow: 10px 10px 0 var(--accent);
        }
        #km-hud h1 { font-size: 3rem; font-weight: 900; font-family: 'Courier New', monospace; }

        #rec-tag { 
            position: absolute; top: 25px; right: 25px; 
            background: var(--danger); padding: 12px 25px; 
            font-weight: 900; border-radius: 0; display: none; align-items: center; gap: 10px;
            box-shadow: 0 0 20px rgba(255,0,85,0.4);
        }
        .dot { width: 15px; height: 15px; background: #fff; border-radius: 50%; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Seletor de Inteligência de Imagem */
        #settings-panel { 
            position: fixed; left: -380px; top: 0; width: 360px; height: 100%; 
            background: var(--panel-bg); z-index: 5000; padding: 25px; 
            transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); border-right: 3px solid var(--accent);
            overflow-y: auto;
        }
        #settings-panel.open { left: 0; }
        
        .section-header { font-size: 11px; color: var(--accent); border-bottom: 1px solid #333; margin: 20px 0 10px; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; color: #777; text-transform: uppercase; }
        select, input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; font-family: monospace; }

        /* Controles Inferiores */
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn-main { border: none; padding: 25px 45px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 70px; background: #1a1a1a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid #333; }

        canvas { display: none; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <h1>SISTEMA DE APOIO TÉCNICO V5</h1>
        <p style="color:#888; font-size: 14px; margin-bottom: 30px;">Algoritmo de Supressão de Ofuscamento Ativo.<br>Otimizado para BR-116 Dutra (Alta Velocidade).</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR SENSORES</button>
    </div>
</div>

<div id="settings-panel">
    <div class="section-header">Hardware Opcional</div>
    <div class="field"><label>Sensor Ativo</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Frequência de Amostragem (ms)</label><input type="number" id="cfg-int" value="120"></div>
    
    <div class="section-header">Inteligência de Visão (60+ Modos)</div>
    <div class="field">
        <label>Algoritmo de Processamento</label>
        <select id="cfg-filter" onchange="applyFilter(this.value)">
            <optgroup label="MODOS EXPERT (ANTI-OFUSCAMENTO)">
                <option value="brightness(0.4) contrast(2.5) grayscale(1)">EVIDÊNCIA DE FALHA (ULTRA-BLACK)</option>
                <option value="contrast(4) saturate(0) brightness(0.5)">DETECTOR DE POSTE (SILHUETA)</option>
                <option value="sepia(1) contrast(2) brightness(0.6)">SUPRESSÃO DE FAROL (ÂMBAR)</option>
                <option value="invert(1) grayscale(1) contrast(2)">MODO RAIO-X (NEGATIVO TÉCNICO)</option>
            </optgroup>
            <optgroup label="FILTROS DE ANÁLISE TÉCNICA"></optgroup>
        </select>
    </div>
    <button class="btn-aware" onclick="toggleSet()">CONFIRMAR CONFIGURAÇÃO</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>RECORDING DATA</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR ROTEIRO</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">GERAR RELATÓRIO</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer = [], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// Expansão de Filtros para 60+ opções técnicas
function buildExpertFilters() {
    const group = document.getElementById('cfg-filter').querySelector('optgroup[label="FILTROS DE ANÁLISE TÉCNICA"]');
    for(let i=1; i<=60; i++) {
        let o = document.createElement('option');
        o.value = `hue-rotate(${i*6}deg) contrast(${1.5+(i/20)}) brightness(${0.8-(i/100)})`;
        o.innerText = `Filtro de Frequência Óptica T-${i.toString().padStart(2, '0')}`;
        group.appendChild(o);
    }
}

async function refreshWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        buildExpertFilters();
        listCams();
    } catch(e) { alert("Selecione a pasta para salvar os arquivos."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Sensor ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: 1920, height: 1080, frameRate: 60 } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function applyFilter(v) { vid.style.filter = v; }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true;
    buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.display = 'flex';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
}

function captureLoop() {
    if (!capturing) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        const curKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        const curFil = getComputedStyle(vid).filter;
        
        ctx.filter = curFil;
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        buffer.push({ 
            img: can.toDataURL('image/jpeg', 0.5), 
            km: curKm, 
            ts: new Date().toLocaleTimeString('pt-BR'),
            filterName: document.getElementById('cfg-filter').options[document.getElementById('cfg-filter').selectedIndex].text
        });

        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if (buffer.length >= limit) {
            const b = [...buffer]; 
            const kf = curKm; const ki = kmInicialLote;
            buffer = []; kmInicialLote = curKm;
            savePDF(b, ki, kf);
        }
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 120);
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                const tCan = document.createElement('canvas');
                tCan.width = can.width; tCan.height = can.height;
                const tCtx = tCan.getContext('2d');
                tCtx.drawImage(img, 0, 0);
                
                // BARRA DE DADOS TÉCNICOS DE ALTA PERFORMANCE
                const bh = tCan.height * 0.16;
                tCtx.fillStyle = "#000";
                tCtx.fillRect(0, tCan.height - bh, tCan.width, bh);
                
                // Km com Estilo Placa de Rodovia
                tCtx.fillStyle = "#00ffcc";
                tCtx.font = `900 ${bh * 0.5}px Courier New`;
                tCtx.fillText(`LOCALIZAÇÃO: Km ${dataList[i].km}`, 50, tCan.height - (bh * 0.45));
                
                tCtx.fillStyle = "#fff";
                tCtx.font = `${bh * 0.18}px Arial`;
                tCtx.fillText(`TIME: ${dataList[i].ts} | SENSOR: ${dataList[i].filterName}`, 50, tCan.height - (bh * 0.15));
                
                doc.addImage(tCan.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = dataList[i].img;
        });
    }

    const agora = new Date();
    const nome = `INSPECAO_TECNICA_Km_${kmIni}_AO_${kmFim}.pdf`;
    try {
        const h = await hDir.getFileHandle(nome, { create: true });
        const w = await h.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch (e) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) document.getElementById('km-txt').innerText = "Km " + best.km;
    }, null, { enableHighAccuracy: true });
}

window.onload = () => { loadCSV(); initGPS(); };
</script>
</body>
</html>
