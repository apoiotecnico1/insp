<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RODOVIÁRIA PRO V5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --safety-green: #22c55e; --dark: #0f172a; --blue-road: #1e40af; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }
        
        /* Câmera Full */
        #cam-layer { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Placa de KM (O Verdinho Master) */
        #kmOverlay { 
            position: absolute; top: 20px; left: 15px; right: 15px; z-index: 10;
            background: var(--safety-green); color: #fff;
            border: 4px solid #fff; border-radius: 20px; padding: 12px;
            text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .km-head { font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; opacity: 0.9; }
        .km-main { font-size: 4.5rem; font-weight: 1000; line-height: 1; margin-top: 2px; display: block; }

        /* Dados do Equipamento */
        #noxStatus {
            position: absolute; top: 145px; left: 20px; right: 20px; z-index: 10;
            background: rgba(15, 23, 42, 0.85); border-radius: 12px;
            padding: 10px 18px; border-left: 6px solid #fff;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Botões Flutuantes de Lente */
        .glass-btn { 
            position: absolute; right: 15px; top: 45%; z-index: 20;
            display: flex; flex-direction: column; gap: 15px;
        }
        .btn-round { 
            width: 65px; height: 65px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15); color: #fff; font-size: 1.6rem;
            backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center;
        }

        /* Rodapé de Controle */
        .footer-panel { 
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: linear-gradient(0deg, #000 85%, transparent); padding: 25px 20px 40px;
        }
        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { 
            padding: 22px; border-radius: 18px; border: none; font-weight: 900; 
            font-size: 1rem; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        #btnRec { background: #ef4444; color: #fff; }
        #btnPdf { background: #fff; color: #000; }
        #btnStop { background: #334155; color: #fff; width: 100%; margin-top: 15px; display: none; }

        .status-labels { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-bottom: 15px; font-weight: 700; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="cam-layer"><video id="vid" autoplay playsinline muted></video></div>

<div id="kmOverlay">
    <span class="km-head">BR-116 RODOVIA</span>
    <span id="kmDisplay" class="km-main">--+---</span>
</div>

<div id="noxStatus">
    <span id="noxID" style="font-weight:800; color:var(--safety-green)">SCANNING NOX...</span>
    <span id="noxDist" style="font-size: 0.9rem; opacity: 0.7;">0m</span>
</div>

<div class="glass-btn">
    <button id="btnSwitch" class="btn-round">🔄</button>
    <button id="btnZoom" class="btn-round">🔍</button>
</div>

<div class="footer-panel">
    <div class="status-labels">
        <span id="gpsTxt">🛰️ GPS: BUSCANDO...</span> &nbsp; | &nbsp;
        <span id="phCount">📸 FOTOS: 0</span>
    </div>
    <div class="btn-box">
        <button id="btnRec" class="action-btn">Gravar Vídeo</button>
        <button id="btnPdf" class="action-btn">Captura PDF</button>
    </div>
    <button id="btnStop" class="action-btn">FINALIZAR E SALVAR</button>
</div>

<canvas id="offscreen"></canvas>

<script>
let kmBase = [], noxBase = [], gps = null, recPhotos = false, recVideo = false;
let photoArray = [], count = 0, camFacing = "environment", zoomLevel = 1;
let mRecorder; let videoBlobs = [];

const vid = document.getElementById('vid');
const can = document.getElementById('offscreen');
const ctx = can.getContext('2d');

// Lógica de Limpeza e Busca (Resgatada e Corrigida)
function clean(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' '); }
function getIdx(headers, keys){ const h=headers.map(v=>clean(v)); for(const k of keys){ const i=h.indexOf(k); if(i>=0) return i; } return -1; }
function toNum(v){ 
    if(!v) return NaN;
    let s = String(v).replace(/[^\d.,-]/g, ''); 
    if(s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
    else if(s.includes(',')) s = s.replace(',', '.');
    return parseFloat(s);
}

// Haversine Preciso (Riverside)
function getDist(la1, lo1, la2, lo2) {
    const R = 6371000;
    const dLat = (la2 - la1) * Math.PI / 180;
    const dLon = (lo2 - lo1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function loadFiles() {
    try {
        const [r1, r2] = await Promise.all([
            fetch('SNVBR116SPRJ.csv?v='+Date.now()),
            fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now())
        ]);
        const t1 = await r1.text(), t2 = await r2.text();
        
        // Processa KM Rodovia
        const l1 = t1.split('\n').filter(r => r.length > 5);
        const h1 = l1.shift().split(';');
        const iK = getIdx(h1, ['km']), iLaK = getIdx(h1, ['lat']), iLoK = getIdx(h1, ['lon']);
        kmBase = l1.map(r => {
            const c = r.split(';');
            return { k: c[iK], la: toNum(c[iLaK]), lo: toNum(c[iLoK]) };
        }).filter(p => !isNaN(p.la) && !isNaN(p.lo));

        // Processa NOX
        const l2 = t2.split('\n').filter(r => r.length > 5);
        const h2 = l2.shift().split(';');
        const iI = getIdx(h2, ['id', 'idnox']), iLaN = getIdx(h2, ['lat']), iLoN = getIdx(h2, ['lon']);
        noxBase = l2.map(r => {
            const c = r.split(';');
            return { id: c[iI], la: toNum(c[iLaN]), lo: toNum(c[iLoN]) };
        }).filter(p => !isNaN(p.la));
        
        console.log("Bases carregadas. KM:", kmBase.length);
    } catch(e) { alert("Erro ao ler arquivos CSV."); }
}

function updateGPS() {
    if(!gps || kmBase.length === 0) return;
    
    // Busca o ponto mais próximo ignorando erros de 200km
    let best = null, dMin = Infinity;
    kmBase.forEach(p => {
        const d = getDist(gps.lat, gps.lon, p.la, p.lo);
        if(d < dMin) { dMin = d; best = p; }
    });
    
    if(best) document.getElementById('kmDisplay').textContent = best.k;

    let bN = null, dN = Infinity;
    noxBase.forEach(p => {
        const d = getDist(gps.lat, gps.lon, p.la, p.lo);
        if(d < dN) { dN = d; bN = p; }
    });
    if(bN) {
        document.getElementById('noxID').textContent = "ID: " + bN.id;
        document.getElementById('noxDist').textContent = Math.round(dN) + "m";
    }
}

// Renderizador com Tarja de Auditoria
function render() {
    if(!recVideo && !recPhotos) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    // Layout da Tarja no Vídeo/Foto
    ctx.fillStyle = "rgba(34, 197, 94, 0.95)";
    ctx.fillRect(40, 40, 550, 160);
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 5; ctx.strokeRect(40, 40, 550, 160);
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 80px Arial";
    ctx.fillText("KM: " + document.getElementById('kmDisplay').textContent, 60, 125);
    ctx.font = "40px Arial";
    ctx.fillText(document.getElementById('noxID').textContent, 60, 175);

    if(recPhotos && Date.now() % 500 < 50) {
        photoArray.push({
            img: can.toDataURL('image/jpeg', 0.5),
            km: document.getElementById('kmDisplay').textContent,
            id: document.getElementById('noxID').textContent,
            gps: `${gps.lat},${gps.lon}`
        });
        count++;
        document.getElementById('phCount').textContent = "📸 FOTOS: " + count;
    }
    requestAnimationFrame(render);
}

// Gravação de Vídeo
document.getElementById('btnRec').onclick = async () => {
    recVideo = true; videoBlobs = [];
    const stream = can.captureStream(30);
    mRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
    mRecorder.ondataavailable = e => videoBlobs.push(e.data);
    mRecorder.onstop = () => {
        const blob = new Blob(videoBlobs, {type:'video/webm'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `AUDITORIA_BR116_${Date.now()}.webm`; a.click();
    };
    mRecorder.start();
    document.getElementById('btnStop').style.display = 'block';
    render();
};

document.getElementById('btnPdf').onclick = () => {
    recPhotos = true;
    document.getElementById('btnStop').style.display = 'block';
    render();
};

document.getElementById('btnStop').onclick = () => {
    if(recVideo) { mRecorder.stop(); recVideo = false; }
    if(recPhotos) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF('l','mm','a4');
        photoArray.forEach((p, i) => { 
            if(i>0) doc.addPage(); 
            doc.setFillColor(34, 197, 94); doc.rect(0,0,297,15,'F');
            doc.setTextColor(255); doc.text(`KM: ${p.km} | ${p.id} | GPS: ${p.gps}`, 10, 10);
            doc.addImage(p.img, 'JPEG', 5, 20, 287, 180);
        });
        doc.save(`INSPECAO_PDF_${Date.now()}.pdf`);
        recPhotos = false; photoArray = [];
    }
    document.getElementById('btnStop').style.display = 'none';
};

// Start
async function start() {
    await loadFiles();
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing, width:{ideal:1920}}, audio:false});
    vid.srcObject = stream;
    
    navigator.geolocation.watchPosition(p => {
        gps = {lat: p.coords.latitude, lon: p.coords.longitude};
        document.getElementById('gpsTxt').textContent = "🛰️ GPS: OK";
        updateGPS();
    }, null, {enableHighAccuracy:true});

    const [track] = stream.getVideoTracks();
    const caps = track.getCapabilities();
    document.getElementById('btnZoom').onclick = () => {
        if(caps.zoom) {
            zoomLevel = zoomLevel >= caps.zoom.max ? 1 : zoomLevel + 1;
            track.applyConstraints({ advanced: [{ zoom: zoomLevel }] });
        }
    };
}

document.getElementById('btnSwitch').onclick = () => { camFacing = camFacing==="environment"?"user":"environment"; start(); };

start();
</script>
</body>
</html>
