<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - TURBO OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00d9ff; --gold: #ffd700; --placa-verde: #056b3c; 
            --danger: #ff3333; --glass: rgba(10, 15, 28, 0.95); --bg: #000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }

        /* --- SPLASH & SAFETY --- */
        #splash-hypnos { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s; }
        .vortex { width: 120px; height: 120px; border: 3px solid var(--accent); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; animation: rotate 4s linear infinite; box-shadow: 0 0 20px var(--accent); }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .alert-box { border: 1px solid #222; padding: 30px; border-radius: 15px; max-width: 400px; background: #0a0a0a; text-align: center; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 900; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 20px; }

        /* --- UI PRINCIPAL --- */
        #app-shell { visibility: hidden; opacity: 0; transition: 1s; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM (Topo Esquerda) */
        .hud-top-left { position: absolute; top: 25px; left: 25px; z-index: 100; }
        #km-hud { background: var(--placa-verde); padding: 12px 25px; border: 3px solid #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }

        /* LISTA NOX (Lateral Direita) */
        #nox-list-container { 
            position: absolute; right: 20px; top: 80px; width: 180px; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            max-height: 65vh; overflow-y: auto; transition: 0.5s;
        }
        .nox-item { font-size: 11px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #888; cursor: pointer; }
        .nox-item.active { color: var(--accent); font-weight: 900; border-left: 3px solid var(--accent); padding-left: 10px; background: rgba(0,217,255,0.05); }

        /* STATUS GPS (Topo Direita) */
        #st-gps { position: absolute; top: 25px; right: 25px; font-size: 10px; color: #555; font-weight: 800; text-transform: uppercase; }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 15px; z-index: 500; transition: 0.5s; }
        .btn-main { border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 20px 40px; font-size: 12px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { background: rgba(255,255,255,0.1); color: #fff; padding: 20px; width: 60px; }
        .ui-hidden { opacity: 0; pointer-events: none; transform: translate(-50%, 20px); }

        /* PAINEL CONFIGS */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(25px); z-index: 2000; 
            padding: 40px 25px; transition: 0.5s; border-left: 1px solid #333; 
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 10px; color: #666; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; }

        #rec-indicator { position: absolute; top: 110px; left: 25px; color: var(--danger); font-size: 12px; font-weight: 900; animation: blink 1s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="wakeUI()">

<div id="splash-hypnos"><div class="vortex"></div></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2>ACESSO REQUERIDO</h2>
        <p style="font-size:12px; color:#666; margin:15px 0">Selecione a pasta de destino para os relatórios.</p>
        <button class="btn-aware" onclick="acceptSafety()">Definir Pasta de Trabalho</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div class="hud-top-left">
        <div id="km-hud"><h1 id="km-txt">KM ---+---</h1></div>
        <div id="rec-indicator">● GRAVANDO LOTE</div>
    </div>

    <div id="nox-list-container">
        <div style="font-size: 9px; color: var(--accent); font-weight: 900; margin-bottom: 10px; letter-spacing: 1px;">IDS PRÓXIMOS (NOX)</div>
        <div id="nox-items"></div>
    </div>

    <div id="st-gps">Aguardando GPS...</div>

    <div id="ui-controls">
        <button id="gear-btn" class="btn-main" onclick="toggleSet()">⚙</button>
        <button id="btn-start" class="btn-main" onclick="startCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">Finalizar Relatório</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:25px">OPÇÕES TURBO</h3>
    
    <div class="field">
        <label>WhatsApp para Envio (55129...)</label>
        <input type="text" id="cfg-zap" placeholder="5512999999999">
    </div>

    <div class="field">
        <label>Fotos por Lote (Auto-Zap)</label>
        <input type="number" id="cfg-lote" value="25">
    </div>

    <div class="field">
        <label>Exibir IDs na tela</label>
        <select id="cfg-id-qty">
            <option value="1">Apenas o mais próximo</option>
            <option value="5" selected>5 mais próximos</option>
            <option value="10">10 mais próximos</option>
        </select>
    </div>

    <div class="field"><label>Câmera</label><select id="cam-select" onchange="initC(this.value)"></select></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="350"></div>

    <button class="btn-aware" onclick="toggleSet()" style="background:#222; color:#fff">SALVAR E FECHAR</button>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let kmDB=[], idDB=[], buffer=[], hDir=null, currentStream=null, rec=false, lastPos=null, uiTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash-hypnos').style.opacity = '0';
        setTimeout(() => { document.getElementById('splash-hypnos').remove(); document.getElementById('safety-gate').style.display = 'flex'; }, 800);
    }, 2000);
    loadCSVs();
    initGPS();
};

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        wakeUI();
    } catch(e) { alert("Acesso à pasta é obrigatório para salvar PDFs."); }
}

async function loadCSVs() {
    try {
        const rK = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const tK = await rK.text();
        const rowsK = tK.split('\n').filter(l => l.includes(';'));
        kmDB = rowsK.map(r => {
            const c = r.split(';');
            return { km: c.trim(), lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));

        // NOME DO ARQUIVO ATUALIZADO CONFORME SOLICITAÇÃO
        const rI = await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now());
        const tI = await rI.text();
        const rowsI = tI.split('\n').filter(l => l.includes(';'));
        idDB = rowsI.map(r => {
            const c = r.split(';');
            return { id: c.trim(), lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.warn("CSV não encontrado ou erro de leitura."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude, acc: p.coords.accuracy };
        document.getElementById('st-gps').textContent = `GPS: ±${Math.round(p.coords.accuracy)}m`;
        updateHUD();
    }, null, {enableHighAccuracy:true});
}

function updateHUD() {
    if(!lastPos) return;
    
    // KM
    let bestKM = kmDB.map(pt => ({ ...pt, d: Math.hypot(pt.lt - lastPos.lt, pt.ln - lastPos.ln) })).sort((a,b) => a.d - b.d);
    if(bestKM) document.getElementById('km-txt').innerText = "KM " + bestKM.km;

    // NOX IDs
    let scored = idDB.map(pt => ({ ...pt, d: Math.hypot(pt.lt - lastPos.lt, pt.ln - lastPos.ln) })).sort((a,b) => a.d - b.d);
    const qty = parseInt(document.getElementById('cfg-id-qty').value);
    const nearest = scored.slice(0, qty);
    
    const container = document.getElementById('nox-items');
    container.innerHTML = "";
    nearest.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = `nox-item ${idx === 0 ? 'active' : ''}`;
        div.innerText = item.id;
        container.appendChild(div);
    });
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Lente ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initC(video[video.length-1].deviceId);
}

async function initC(id) {
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-indicator').style.display = 'block';
    loop();
}

function stopCapture() {
    rec = false;
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
    saveAndSend();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-txt').innerText,
        id: document.querySelector('.nox-item.active')?.innerText || "---",
        lat: lastPos?.lt.toFixed(6),
        lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleTimeString('pt-BR')
    });
    if(buffer.length >= parseInt(document.getElementById('cfg-lote').value)) saveAndSend();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

async function saveAndSend() {
    if(!buffer.length) return;
    const batch = [...buffer]; buffer = [];
    const zap = document.getElementById('cfg-zap').value;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        doc.addImage(batch[i].img, 'JPEG', 0, 0, 297, 210);
        doc.setFillColor(0,0,0,0.85); doc.rect(0, 185, 297, 25, 'F');
        doc.setTextColor(255,255,255); doc.setFontSize(16);
        doc.text(`${batch[i].km} | ID: ${batch[i].id} | ${batch[i].ts}`, 15, 200);
        doc.setFontSize(10);
        doc.text(`LAT: ${batch[i].lat} LON: ${batch[i].lon}`, 15, 206);
    }

    const nome = `Inspecao_${batch.km}_${Date.now()}.pdf`.replace(/\+/g,'_');
    if(hDir) {
        try {
            const f = await hDir.getFileHandle(nome, {create:true});
            const s = await f.createWritable();
            await s.write(doc.output('blob')); await s.close();
        } catch(e) {}
    }

    if(zap) {
        const text = `*NOVO LOTE TURBO*\n📍 KM Inicial: ${batch.km}\n🛠️ Ativo: ${batch.id}\n⏰ Hora: ${batch.ts}\n📂 Salvo como: ${nome}`;
        window.open(`https://wa.me/${zap}?text=${encodeURIComponent(text)}`, '_blank');
    }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    document.getElementById('nox-list-container').style.opacity = "1";
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { if(rec) { document.getElementById('ui-controls').classList.add('ui-hidden'); document.getElementById('nox-list-container').style.opacity = "0.2"; } }, 5000);
}
</script>
</body>
</html>
