<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom Ultra V3 - Manutenção & Fibra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --blue: #007bff; --red: #ff1744; --orange: #ff9100; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM AO VIVO */
        #km-hud { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0, 50, 0, 0.85); 
            padding: 10px 20px; border: 3px solid var(--accent); border-radius: 8px; 
            z-index: 500; text-align: center; backdrop-filter: blur(5px);
        }
        #km-txt { font-size: 2.2rem; font-weight: 900; line-height: 1; display: block; }
        #gps-status { font-size: 0.6rem; margin-top: 3px; opacity: 0.8; }

        /* GRADE DE BOTÕES DE AÇÃO RÁPIDA (DIREITA) */
        #action-grid {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: grid; grid-template-columns: repeat(2, 85px); gap: 8px; z-index: 500;
        }
        .act-btn {
            height: 75px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(20,20,20,0.9); color: #fff; font-size: 0.55rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center; text-align: center;
            text-transform: uppercase; backdrop-filter: blur(10px); padding: 5px;
        }
        .act-btn:active { background: #fff; color: #000; transform: scale(0.92); }
        
        /* Cores por Categoria */
        .c-ilum { border-bottom: 4px solid var(--accent); }
        .c-def { border-bottom: 4px solid var(--red); }
        .c-fib { border-bottom: 4px solid var(--blue); }
        .c-aten { border-bottom: 4px solid var(--orange); }

        /* RODAPÉ */
        #footer {
            position: absolute; bottom: 25px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 40px; z-index: 500;
        }
        .btn-rec { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; }
        .recording { background: var(--red) !important; color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse { 50% { opacity: 0.5; } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate">
    <h2 style="color:var(--accent); font-weight:900;">ANGSTROM MAINTENANCE</h2>
    <p style="color:#888; font-size: 0.8rem; margin: 15px 0 30px;">SISTEMA DE INSPEÇÃO E ABERTURA DE O.S.</p>
    <button class="btn-rec" onclick="startApp()">INICIAR SISTEMA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-hud">
        <span id="km-txt">Km ---</span>
        <div id="gps-status">LOCALIZANDO...</div>
    </div>

    <div id="action-grid">
        <button class="act-btn c-ilum" onclick="quickAction('ILUMINAÇÃO APAGADA')">ILUMINAÇÃO<br>APAGADA</button>
        <button class="act-btn c-ilum" onclick="quickAction('ABRIR ORDEM DE SERVIÇO')">ABRIR O.S.<br>DEFEITO</button>
        
        <button class="act-btn c-def" onclick="quickAction('POSTE APAGADO')">POSTE<br>APAGADO</button>
        <button class="act-btn c-def" onclick="quickAction('LUMINÁRIA APAGADA')">LUMINÁRIA<br>APAGADA</button>
        
        <button class="act-btn c-fib" onclick="quickAction('FIBRA ROMPIDA')">FIBRA<br>ROMPIDA</button>
        <button class="act-btn c-fib" onclick="quickAction('BACKBONE ABERTA')">BACKBONE<br>ABERTA</button>
        <button class="act-btn c-fib" onclick="quickAction('ALARME DE FIBRA')">ALARME DE<br>FIBRA</button>
        <button class="act-btn c-fib" onclick="quickAction('INOPERANTE')">SISTEMA<br>INOPERANTE</button>

        <button class="act-btn c-aten" onclick="quickAction('VANDALISMO')">ITEM DE<br>VANDALISMO</button>
        <button class="act-btn c-aten" onclick="quickAction('QUEBRADO/DANIFICADO')">QUEBRADO<br>DANIFICADO</button>
        <button class="act-btn c-aten" onclick="quickAction('ITEM DE ATENÇÃO')">ITEM DE<br>ATENÇÃO</button>
        
        <button class="act-btn" style="border-bottom: 4px solid #fff;" onclick="quickAction('SISTEMA NORMALIZADO')">SISTEMA<br>NORMALIZADO</button>
    </div>

    <div id="footer">
        <button id="btn-rec" class="btn-rec" onclick="toggleRec()">GRAVAR LOTE PDF</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false, hDir = null, buffer = [], currentLabel = "INSPEÇÃO NORMAL";
let curLat = 0, curLon = 0;

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker();
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
        document.getElementById('vid').srcObject = stream;
        document.getElementById('vid').onloadedmetadata = () => { 
            const can = document.getElementById('c');
            can.width = vid.videoWidth; can.height = vid.videoHeight;
        };
        loadCSV(); initGPS();
    } catch(e) { }
}

// AÇÃO DE UM CLIQUE: Tira foto, carimba e salva
async function quickAction(label) {
    currentLabel = label;
    // Flash visual
    const f = document.getElementById('flash');
    f.style.opacity = "0.6"; setTimeout(() => f.style.opacity = "0", 80);
    
    await renderFrame(true); // Salva JPG na pasta e adiciona ao buffer do PDF
    currentLabel = "INSPEÇÃO NORMAL"; // Reseta após o clique
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude; curLon = p.coords.longitude;
        if (kmDB.length) {
            let closest = null, minD = Infinity;
            for (let pt of kmDB) {
                const d = Math.hypot(pt.lt - curLat, pt.ln - curLon);
                if (d < minD) { minD = d; closest = pt; }
            }
            if (closest) {
                document.getElementById('km-txt').innerText = `Km ${closest.km}`;
                document.getElementById('gps-status').innerText = `${curLat.toFixed(5)}, ${curLon.toFixed(5)}`;
            }
        }
    }, null, { enableHighAccuracy: true });
}

function toggleRec() {
    capturing = !capturing;
    const btn = document.getElementById('btn-rec');
    if (capturing) {
        btn.innerText = "FINALIZAR E GERAR PDF";
        btn.classList.add('recording');
        buffer = [];
    } else {
        btn.innerText = "SALVANDO PDF...";
        btn.classList.remove('recording');
        generatePDF();
    }
}

async function renderFrame(isManual) {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    const km = document.getElementById('km-txt').innerText;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    // Cor do carimbo baseada no label
    ctx.fillStyle = currentLabel.includes('NORMALIZADO') ? '#fff' : (currentLabel.includes('FIBRA') || currentLabel.includes('BACKBONE') ? '#007bff' : '#ff1744');
    ctx.fillRect(0, can.height - bh, 18, bh);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 44px Arial";
    ctx.fillText(`${currentLabel} | ${km}`, 40, can.height - (bh * 0.55));
    ctx.font = "24px Arial";
    ctx.fillText(`${new Date().toLocaleString()} | GPS: ${curLat.toFixed(6)}, ${curLon.toFixed(6)}`, 40, can.height - (bh * 0.22));

    const data = can.toDataURL('image/jpeg', 0.8);
    buffer.push(data); // Sempre vai pro buffer do PDF

    if (isManual) {
        const blob = await (await fetch(data)).blob();
        const safeLabel = currentLabel.replace(/\//g, '_');
        const handle = await hDir.getFileHandle(`${safeLabel}_${km}_${Date.now()}.jpg`, {create:true});
        const w = await handle.createWritable();
        await w.write(blob); await w.close();
    }
}

async function generatePDF() {
    if (buffer.length === 0) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < buffer.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const blob = doc.output('blob');
    const handle = await hDir.getFileHandle(`RELATORIO_MANUTENCAO_${Date.now()}.pdf`, {create:true});
    const w = await handle.createWritable();
    await w.write(blob); await w.close();
    
    document.getElementById('btn-rec').innerText = "GRAVAR LOTE PDF";
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const text = await r.text();
        const rows = text.split('\n').filter(row => row.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iKm = h.indexOf('km'), iLat = h.findIndex(v => v.includes('lat')), iLon = h.findIndex(v => v.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[iKm], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { }
}
</script>
</body>
</html>
