<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA INSPEÇÃO PRO - ULTRA VISION V4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00e5ff; 
            --danger: #ff1744; 
            --panel-bg: rgba(5, 5, 5, 0.98);
            --neon-green: #39ff14;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* Gateway de Segurança */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; border: 10px solid #111; }
        .alert-box { border: 1px solid var(--accent); padding: 40px; text-align: center; max-width: 450px; background: #0a0a0a; box-shadow: 0 0 50px rgba(0,229,255,0.2); }
        .alert-box h1 { color: var(--accent); font-size: 1.2rem; margin-bottom: 10px; letter-spacing: 2px; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        
        /* Câmera e Filtros */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: filter 0.3s ease;
        }

        /* HUD - Design de Engenharia de Qualidade */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: #fff; color: #000; 
            padding: 15px 30px; border: 4px solid #000; 
            z-index: 100; box-shadow: 8px 8px 0 var(--accent);
        }
        #km-hud h1 { font-size: 2.5rem; font-weight: 900; font-family: 'Consolas', monospace; }

        #rec-tag { 
            position: absolute; top: 20px; right: 20px; 
            background: var(--danger); padding: 10px 20px; 
            font-weight: bold; border-radius: 2px; display: none; align-items: center; gap: 10px;
        }

        /* Painel de Filtros e Ajustes */
        #settings-panel { 
            position: fixed; left: -360px; top: 0; width: 350px; height: 100%; 
            background: var(--panel-bg); z-index: 5000; padding: 20px; 
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); border-right: 2px solid var(--accent);
            overflow-y: auto;
        }
        #settings-panel.open { left: 0; }
        
        .section-title { font-size: 10px; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #888; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; font-size: 14px; }

        /* Controles */
        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .btn-main { border: none; padding: 20px 35px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; background: #222; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 1px solid #444; }

        canvas { display: none; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <h1>SISTEMA DE APOIO TÉCNICO</h1>
        <p style="color:#666; font-size: 13px; margin-bottom: 25px;">Engenharia de Qualidade: Alta Performance Noturna</p>
        <button class="btn-aware" onclick="startApp()">INICIAR UNIDADE</button>
    </div>
</div>

<div id="settings-panel">
    <div class="section-title">Parâmetros de Captura</div>
    <div class="field"><label>Câmera de Inspeção</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo (ms) [Padrão: 150]</label><input type="number" id="cfg-int" value="150"></div>
    <div class="field"><label>Fotos por PDF [Padrão: 50]</label><input type="number" id="cfg-lote" value="50"></div>
    
    <div class="section-title">Matriz de Filtros (Análise Noturna)</div>
    <div class="field">
        <label>Selecione o Filtro de Evidência</label>
        <select id="cfg-filter" onchange="applyFilter(this.value)">
            <optgroup label="SUPRESSÃO DE BRILHO">
                <option value="none">Normal (Sem Filtro)</option>
                <option value="brightness(0.6) contrast(2)">Supressão Máxima (Vapor de Sódio)</option>
                <option value="brightness(0.5) contrast(1.5) grayscale(1)">LED Neutro (Preto e Branco)</option>
                <option value="contrast(3) grayscale(1) invert(1)">Busca de Poste Apagado (Inversão)</option>
            </optgroup>
            <optgroup label="ENGENHARIA E ESTRUTURA">
                <option value="sepia(1) contrast(1.5) brightness(0.7)">Filtro Âmbar (Neblina)</option>
                <option value="hue-rotate(180deg) saturate(3)">Infravermelho Falsa Cor</option>
                <option value="grayscale(1) contrast(5)">Raio-X (Realce de Braço e Poste)</option>
                <option value="saturate(5) contrast(1.2)">Realce de Corrosão/Oxidação</option>
            </optgroup>
            <optgroup label="LABORATÓRIO EXPERIMENTAL"></optgroup>
        </select>
    </div>
    <p id="filter-count" style="font-size: 10px; color: #444;"></p>
    <button class="btn-aware" onclick="toggleSet()" style="margin-top:20px;">CONFIRMAR AJUSTES</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>GRAVAÇÃO ATIVA</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR INSPEÇÃO</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR RELATÓRIO</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer = [], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "";
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

// Gerador de Filtros Automático (Expansão para 60 opções)
function generateFilters() {
    const sel = document.getElementById('cfg-filter').querySelector('optgroup[label="LABORATÓRIO EXPERIMENTAL"]');
    for(let i=1; i<=50; i++) {
        let opt = document.createElement('option');
        let val = `hue-rotate(${i*7}deg) contrast(${1 + (i/10)}) brightness(${0.9 - (i/100)})`;
        opt.value = val;
        opt.innerText = `Filtro de Análise Técnica #${i}`;
        sel.appendChild(opt);
    }
    document.getElementById('filter-count').innerText = "64 MODOS DE ANÁLISE DISPONÍVEIS";
}

async function refreshWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        generateFilters();
        listCams();
    } catch(e) { alert("Atenção: Selecione uma pasta para salvar os dados."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Sensor Óptico ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080}, frameRate: {ideal: 60} } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function applyFilter(val) { vid.style.filter = val; }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true;
    buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.display = 'flex';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.display = 'none';
}

function captureLoop() {
    if (!capturing) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
        const currentFilter = getComputedStyle(vid).filter;
        
        // Renderiza no canvas com o filtro ativo (O segredo da evidência)
        ctx.filter = currentFilter;
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        buffer.push({ 
            img: can.toDataURL('image/jpeg', 0.6), 
            km: currentKm, 
            ts: new Date().toLocaleTimeString('pt-BR'),
            filter: document.getElementById('cfg-filter').options[document.getElementById('cfg-filter').selectedIndex].text
        });

        if (buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) {
            const batch = [...buffer];
            const kmF = currentKm;
            const kmI = kmInicialLote;
            buffer = []; kmInicialLote = currentKm;
            savePDF(batch, kmI, kmF);
        }
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 150);
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                const tempCan = document.createElement('canvas');
                tempCan.width = can.width; tempCan.height = can.height;
                const tCtx = tempCan.getContext('2d');
                tCtx.drawImage(img, 0, 0);
                
                // BARRA TÉCNICA DE ALTA VISIBILIDADE
                const bh = tempCan.height * 0.15;
                tCtx.fillStyle = "#000";
                tCtx.fillRect(0, tempCan.height - bh, tempCan.width, bh);
                tCtx.strokeStyle = var(--accent);
                tCtx.lineWidth = 10;
                tCtx.strokeRect(0, tempCan.height - bh, tempCan.width, bh);
                
                tCtx.fillStyle = "#fff";
                tCtx.font = `bold ${bh * 0.4}px monospace`;
                tCtx.fillText(`Km ${dataList[i].km}`, 40, tempCan.height - (bh * 0.5));
                
                tCtx.font = `${bh * 0.15}px Arial`;
                tCtx.fillText(`DATA: ${new Date().toLocaleDateString()} | HORA: ${dataList[i].ts} | SENSOR: ${dataList[i].filter}`, 40, tempCan.height - (bh * 0.2));
                
                doc.addImage(tempCan.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = dataList[i].img;
        });
    }

    const nome = `RELATORIO_DT_Km_${kmIni}_AO_${kmFim}.pdf`;
    try {
        const fileHandle = await hDir.getFileHandle(nome, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(doc.output('blob'));
        await writable.close();
    } catch (e) { console.error("Erro ao salvar PDF", e); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) document.getElementById('km-txt').innerText = "Km " + best.km;
    }, null, { enableHighAccuracy: true });
}

window.onload = () => { loadCSV(); initGPS(); };
</script>
</body>
</html>
