<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b7a39">
<title>Inspeção Rodovia – Modo Painel</title>

<style>
html,body{
  margin:0; height:100%; background:#000; overflow:hidden;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
}
video{
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:contain; background:#000;
}

/* Placa KM */
#kmBox{
  position:fixed; top:14px; left:50%;
  transform:translateX(-50%);
  background:linear-gradient(180deg,#0b7a39,#085e2c);
  color:#fff;
  padding:10px 18px;
  border-radius:14px;
  border:4px solid #e6f0ea;
  font-size:1.25rem;
  font-weight:900;
  text-shadow:0 1px 0 rgba(0,0,0,.4);
}

/* ID */
#idBox{
  position:fixed; top:72px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.55);
  color:#eafff5;
  padding:6px 14px;
  border-radius:12px;
  font-size:1rem;
  font-weight:800;
}

/* Estado */
#state{
  position:fixed; bottom:14px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  color:#fff;
  padding:6px 14px;
  border-radius:10px;
  font-size:.85rem;
  opacity:.9;
}
</style>
</head>
<body>

<video id="vid" autoplay playsinline muted></video>

<div id="kmBox">KM —</div>
<div id="idBox">ID —</div>
<div id="state">INICIANDO…</div>

<script>
/* ================= CONFIG ================= */
const INTERVAL_MS = 500;      // 0,5 s fixo
const MAX_DIM = 1600;
const JPEG_Q = 0.88;
/* ========================================== */

const vid = document.getElementById('vid');
const kmBox = document.getElementById('kmBox');
const idBox = document.getElementById('idBox');
const state = document.getElementById('state');

let dirHandle=null;
let lastPos=null;
let running=true;
let busy=false;

/* ================= GPS ================= */
navigator.geolocation.watchPosition(p=>{
  lastPos = {
    lat:p.coords.latitude,
    lon:p.coords.longitude,
    acc:p.coords.accuracy
  };
},{},{enableHighAccuracy:true,maximumAge:500});

/* ================= KM CSV ================= */
let kmPoints=[];
function parsePt(v){
  if(v==null) return NaN;
  const s=String(v).trim();
  return /,\d+$/.test(s)?Number(s.replace(/\./g,'').replace(',','.')):Number(s);
}
function hav(a,b,c,d){
  const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2+
          Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function fmtKm(v){
  let K=Math.floor(v), m=Math.round((v-K)*1000);
  if(m>=1000){m-=1000;K++}
  return `KM ${K}+${String(m).padStart(3,'0')}`;
}

async function loadKM(){
  const txt = await fetch('./SNVBR116SPRJ.csv',{cache:'no-store'}).then(r=>r.text());
  txt.split(/\r?\n/).forEach(l=>{
    const c=l.split(';');
    const t1={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
    if(isFinite(t1.km)&&isFinite(t1.lat)) kmPoints.push(t1);
  });
}
function nearestKM(){
  if(!lastPos||!kmPoints.length) return null;
  let b=null,d=1e20;
  for(const p of kmPoints){
    const h=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
    if(h<d){d=h;b=p}
  }
  return b;
}

/* ================= ID CSV ================= */
let ids=[];
async function loadIDs(){
  let f=await fetch('./dados.csv',{cache:'no-store'});
  if(!f.ok) f=await fetch('./Dados_Completos_Grupo_2_all.csv',{cache:'no-store'});
  const txt=await f.text();
  const lines=txt.split(/\r?\n/).filter(Boolean);
  const head=lines.shift().split(';').map(h=>h.toLowerCase());
  const iId=head.findIndex(h=>h.includes('id'));
  const iLat=head.findIndex(h=>h.includes('lat'));
  const iLon=head.findIndex(h=>h.includes('lon'));
  lines.forEach(l=>{
    const c=l.split(';');
    const id=c[iId]; const lat=parsePt(c[iLat]); const lon=parsePt(c[iLon]);
    if(id && isFinite(lat)) ids.push({id,lat,lon});
  });
}
function nearestID(){
  if(!lastPos||!ids.length) return null;
  let b=null,d=1e20;
  for(const p of ids){
    const h=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
    if(h<d){d=h;b=p}
  }
  return b;
}

/* ================= CAMERA ================= */
async function startCamera(){
  const s=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment',width:1920,height:1080},
    audio:false
  });
  vid.srcObject=s;
  await new Promise(r=>vid.onloadedmetadata=r);
}

/* ================= FOTO ================= */
const can=document.createElement('canvas');
const ctx=can.getContext('2d',{alpha:false});

async function capture(){
  if(busy||!running||!dirHandle||!lastPos) return;
  busy=true;
  try{
    const vw=vid.videoWidth,vh=vid.videoHeight;
    const sc=Math.min(1,MAX_DIM/Math.max(vw,vh));
    const w=vw*sc,h=vh*sc;
    can.width=w; can.height=h;
    ctx.drawImage(vid,0,0,w,h);

    const kmN=nearestKM();
    const kmStr=kmN?fmtKm(kmN.km):'KM —';
    const idN=nearestID();
    const idStr=idN?idN.id:'—';

    // overlay simples
    ctx.fillStyle='rgba(0,0,0,.6)';
    ctx.fillRect(0,h-90,w,90);
    ctx.fillStyle='#b7ffcf';
    ctx.font='bold 36px system-ui';
    ctx.fillText(kmStr,20,h-40);
    ctx.fillStyle='#fff';
    ctx.font='bold 22px system-ui';
    ctx.fillText(
      `${idStr} | ${new Date().toLocaleString()}`,
      20,h-12
    );

    const blob=await new Promise(r=>can.toBlob(r,'image/jpeg',JPEG_Q));
    if(!blob||!blob.size) return;

    const name=`FOTO_${kmStr.replace(' ','').replace('+','_')}_${Date.now()}.jpg`;
    const fh=await dirHandle.getFileHandle(name,{create:true});
    const wri=await fh.createWritable();
    await wri.write(blob);
    await wri.close();

  }finally{ busy=false; }
}

/* ================= LOOP ================= */
setInterval(capture,INTERVAL_MS);

/* ================= PAUSE (toque longo) ================= */
let t0=0;
document.addEventListener('touchstart',()=>t0=Date.now());
document.addEventListener('touchend',()=>{
  if(Date.now()-t0>2000){
    running=!running;
    state.textContent=running?'CAPTURANDO':'PAUSADO';
  }
});

/* ================= BOOT ================= */
(async ()=>{
  state.textContent='AUTORIZAÇÕES…';
  dirHandle=await showDirectoryPicker({mode:'readwrite'});
  await loadKM();
  await loadIDs();
  await startCamera();
  state.textContent='CAPTURANDO';
})();
</script>
</body>
</html>
