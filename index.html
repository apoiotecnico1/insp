<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - KM FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; --glass: rgba(5, 5, 5, 0.96); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 0.8s; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* PLACA DE KM - REDIMENSIONADA E PRIORITÁRIA */
        #km-hud { 
            position: absolute; top: 25px; left: 25px; 
            background: var(--placa-verde); padding: 12px 25px; 
            border: 2px solid #fff; border-radius: 5px; z-index: 100; 
            pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -1px; }

        /* INDICADOR REC */
        #rec-tag { 
            position: absolute; top: 25px; right: 25px; 
            display: flex; align-items: center; gap: 10px; z-index: 100; 
            opacity: 0; transition: 0.5s; background: var(--glass); 
            padding: 10px 20px; border-radius: 8px; border: 2px solid var(--accent);
        }
        #rec-tag span { font-size: 12px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .dot { width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; transition: 0.6s; z-index: 1000; }
        .ui-hidden { opacity: 0; bottom: 15px; pointer-events: none; }
        .btn-ui { border: none; border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 18px 45px; font-size: 11px; background: var(--accent); color: #000; }
        #gear-btn { width: 50px; height: 50px; border-radius: 6px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }

        /* PAINÉIS */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 2000; padding: 60px 25px; transition: 0.5s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        input, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; margin-top: 5px; }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate">
    <div style="background:#080808; padding:30px; border-radius:12px; border:1px solid #333; max-width:450px; text-align:center;">
        <h2 style="color:var(--accent); margin-bottom:20px;">INSPEÇÃO PRO</h2>
        <p style="font-size:14px; color:#ccc; margin-bottom:25px;">Selecione a pasta de destino para habilitar o salvamento dos relatórios.</p>
        <button class="btn-ui" style="width:100%" onclick="acceptSafety()">INICIAR SISTEMA</button>
    </div>
</div>

<div id="settings-panel">
    <div style="text-align:right; margin-bottom:20px; cursor:pointer; color:#777;" onclick="toggleSet()">FECHAR ×</div>
    <div style="margin-bottom:20px;">
        <label style="font-size:11px; color:#777;">CÂMERA</label>
        <select id="cam-select" onchange="switchCam(this.value)"></select>
    </div>
    <div style="margin-bottom:20px;">
        <label style="font-size:11px; color:#777;">FOTOS POR PDF</label>
        <input type="number" id="cfg-lote" value="50">
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud"><h1 id="km-txt">KM ---+---</h1></div>
    
    <div id="rec-tag">
        <div class="dot"></div>
        <span>CAPTURA ATIVA</span>
    </div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-ui" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-ui" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Finalizar PDF</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        document.getElementById('app-shell').style.opacity = '1';
        listCams();
        loadCSV();
        initG();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        wakeUI();
    } catch(e) { alert("Pasta obrigatória!"); }
}

function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = `Lente ${i + 1}`;
        sel.appendChild(opt);
    });
    if(videoDevices.length) { 
        const last = videoDevices[videoDevices.length-1].deviceId;
        sel.value = last; initC(last); 
    }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function switchCam(id) { initC(id); }

function initCapture() {
    rec = true; buffer = [];
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    wakeUI();
    loop();
}

async function stopCapture() {
    rec = false;
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    await savePDF();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.5), 
            km: document.getElementById('km-txt').innerText, 
            ts: new Date().toLocaleString() 
        });
        const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
        if(buffer.length >= limit) savePDF();
    }
    setTimeout(loop, 1000); 
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = [];
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage('l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.16;
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, can.height-barH, can.width, barH);
                ctx.fillStyle = "#ffcc00"; ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText(items[i].km, 60, can.height-(barH*0.5));
                ctx.fillStyle = "#fff"; ctx.font = `${barH * 0.18}px Arial`;
                ctx.fillText(items[i].ts, 60, can.height-(barH*0.22));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const nome = `RELATORIO_${Date.now()}.pdf`;
    const f = await hDir.getFileHandle(nome, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initG() { 
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "KM " + n.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
