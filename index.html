<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO RODOVIÁRIA - KM ATUAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #viewport { width: 100vw; height: 42vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Placa de KM destaque */
        #kmDisplay { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 12px;
            font-size: 3.8rem; font-weight: 900; border: 5px solid #fff;
            margin: 10px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .status-container { display: flex; justify-content: space-around; padding: 10px; background: #0b1224; }
        .indicator { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #333; }
        .active { border-color: #00ff66; color: #00ff66; font-weight: bold; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px; }
        .info-box { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .info-box span { display: block; font-size: 1.3rem; font-weight: bold; color: #00d9ff; }

        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 22px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #btnStart { background: #00ff66; color: #000; }
        #btnStop { background: #ff3333; color: #fff; }
        
        #log { font-size: 0.7rem; color: #444; text-align: center; margin-top: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="viewport"><video id="video" autoplay playsinline muted></video></div>

<div id="kmDisplay">BUSCANDO KM...</div>

<div class="status-container">
    <div id="stCsv" class="indicator">CSV: CARREGANDO...</div>
    <div id="stGps" class="indicator">GPS: AGUARDANDO...</div>
</div>

<div class="info-grid">
    <div class="info-box">FOTOS<span id="txtPhotos">0</span></div>
    <div class="info-box">LOTE<span id="txtBatch">0/200</span></div>
    <div class="info-box" id="btnManualPdf" style="border-color:#1e3a8a">PDF<span id="txtPdfs">0</span></div>
</div>

<div class="controls">
    <button id="btnStart">INICIAR</button>
    <button id="btnStop" disabled>PARAR</button>
</div>

<div id="log">Sincronizado com SNVBR116SPRJ.csv</div>

<canvas id="canvas"></canvas>

<script>
let kmDatabase = [];
let buffer = [];
let recording = false;
let totalPhotos = 0;
let pdfCount = 0;
let currentPos = null;

const vid = document.getElementById('video');
const can = document.getElementById('canvas');
const ctx = can.getContext('2d');

/* ======= CARREGAMENTO AUTOMÁTICO DO GITHUB ======= */
async function loadData() {
    try {
        // Busca o arquivo na mesma pasta do seu index.html no GitHub Pages
        const response = await fetch('SNVBR116SPRJ.csv');
        if (!response.ok) throw new Error("Erro no Fetch");
        
        const text = await response.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== '');
        
        kmDatabase = rows.map(row => {
            const cols = row.split(';'); // Padrão ponto e vírgula do seu arquivo
            return {
                km: cols,
                lat: parseFloat(cols?.replace(',', '.')),
                lon: parseFloat(cols?.replace(',', '.'))
            };
        }).filter(p => !isNaN(p.lat));

        document.getElementById('stCsv').textContent = "CSV: OK (" + kmDatabase.length + ")";
        document.getElementById('stCsv').classList.add('active');
    } catch (err) {
        document.getElementById('stCsv').textContent = "CSV: ERRO";
        console.error(err);
    }
}

/* ======= LÓGICA DE KM RÁPIDA (BUSCA POR DISTÂNCIA) ======= */
function findNearestKM(lat, lon) {
    if (kmDatabase.length === 0) return;

    let closest = null;
    let minD = Infinity;

    // Varredura rápida para encontrar o ponto mais próximo da sua coordenada
    for (let i = 0; i < kmDatabase.length; i++) {
        const p = kmDatabase[i];
        const d = Math.sqrt(Math.pow(lat - p.lat, 2) + Math.pow(lon - p.lon, 2));
        if (d < minD) {
            minD = d;
            closest = p;
        }
    }

    if (closest) {
        document.getElementById('kmDisplay').textContent = "KM " + closest.km;
    }
}

/* ======= FUNÇÕES DE CAPTURA E PDF ======= */
async function generatePDF() {
    if (buffer.length === 0) return;
    const items = [...buffer];
    buffer = [];
    pdfCount++;
    document.getElementById('txtPdfs').textContent = pdfCount;
    document.getElementById('txtBatch').textContent = "0/200";

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    items.forEach((data, i) => {
        if (i > 0) doc.addPage();
        doc.setFillColor(0, 0, 0); doc.rect(0, 0, 297, 20, 'F');
        doc.setTextColor(255, 255, 255);
        doc.text(`KM: ${data.km} | GPS: ${data.lat}, ${data.lon} | ${data.time}`, 10, 12);
        doc.addImage(data.img, 'JPEG', 10, 25, 277, 170);
    });

    doc.save(`INSPECAO_KM_${items.km}_A_${items[items.length-1].km}.pdf`);
}

function processFrame() {
    if (!recording) return;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('kmDisplay').textContent.replace('KM ', ''),
        lat: currentPos ? currentPos.lat.toFixed(6) : "0",
        lon: currentPos ? currentPos.lon.toFixed(6) : "0",
        time: new Date().toLocaleTimeString()
    });

    totalPhotos++;
    document.getElementById('txtPhotos').textContent = totalPhotos;
    document.getElementById('txtBatch').textContent = `${buffer.length}/200`;

    if (buffer.length >= 200) generatePDF();
    setTimeout(processFrame, 200);
}

/* ======= INICIALIZAÇÃO ======= */
document.getElementById('btnStart').onclick = () => {
    recording = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    processFrame();
};

document.getElementById('btnStop').onclick = () => {
    recording = false;
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    generatePDF();
};

document.getElementById('btnManualPdf').onclick = () => generatePDF();

async function start() {
    await loadData();

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 1280, height: 720 },
            audio: false
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    } catch(e) { alert("Câmera não permitida."); }

    navigator.geolocation.watchPosition(pos => {
        currentPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        document.getElementById('stGps').textContent = "GPS: OK";
        document.getElementById('stGps').classList.add('active');
        findNearestKM(currentPos.lat, currentPos.lon);
    }, null, { enableHighAccuracy: true });
}

start();
</script>
</body>
</html>
