<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Log - Performance Técnica</title>
    <style>
        :root {
            --tech-blue: #0a3d62;
            --tech-green: #3c6382;
            --gold: #f39c12;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0c121e; color: #d1d8e0; margin: 0; padding: 10px; }
        .app-container { max-width: 900px; margin: auto; background: #1e272e; border-radius: 15px; border: 1px solid #34495e; padding: 20px; }
        
        /* Header Dinâmico */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--tech-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .score-box { text-align: center; background: var(--tech-blue); padding: 10px 20px; border-radius: 10px; }
        #taskCount { font-size: 1.8em; font-weight: bold; color: var(--gold); }

        /* Grade de Botões Inteligentes */
        .grid-tech { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .btn-tech { 
            background: #2f3542; border: 1px solid #57606f; color: #f1f2f6; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85em;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .btn-tech:hover { background: var(--tech-blue); border-color: var(--gold); transform: translateY(-2px); }

        /* Área de Input */
        .input-section { background: #2f3542; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        textarea { width: 100%; background: #1e272e; border: 1px solid #57606f; color: white; padding: 12px; border-radius: 5px; resize: none; margin-bottom: 10px; font-size: 1em; }
        
        .timer-display { font-family: 'Courier New', monospace; font-size: 1.5em; color: var(--gold); margin: 10px 0; display: block; text-align: center;}

        .main-btn { width: 100%; padding: 15px; font-weight: bold; font-size: 1.1em; border-radius: 8px; border: none; cursor: pointer; margin-bottom: 10px; }
        .start { background: #27ae60; color: white; }
        .stop { background: #e67e22; color: white; }

        /* Tabela Profissional */
        .table-resumo { width: 100%; border-collapse: collapse; margin-top: 20px; background: #2f3542; border-radius: 8px; overflow: hidden; }
        .table-resumo th { background: var(--tech-blue); padding: 12px; font-size: 0.9em; }
        .table-resumo td { padding: 10px; border-bottom: 1px solid #3e444e; font-size: 0.85em; }

        .footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-export { flex: 1; padding: 12px; background: #57606f; color: white; border-radius: 5px; border: none; cursor: pointer; }
        .btn-whatsapp { flex: 1; padding: 12px; background: #25D366; color: white; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h2 style="margin:0; color:var(--gold);">SISTEMA DE EVIDÊNCIA TÉCNICA</h2>
            <small id="data-atual"></small>
        </div>
        <div class="score-box">
            <small>ATIVIDADES</small>
            <div id="taskCount">0</div>
        </div>
    </div>

    <div class="input-section">
        <label style="color:var(--gold); display:block; margin-bottom:5px;">DESCRIÇÃO DA OPERAÇÃO:</label>
        <textarea id="desc" rows="3" placeholder="Selecione um botão abaixo ou descreva a ação..."></textarea>
        
        <span class="timer-display" id="timerDisplay">00:00:00</span>
        
        <button id="btnMain" class="main-btn start" onclick="toggleTask()">▶ INICIAR OPERAÇÃO TÉCNICA</button>
    </div>

    <div class="grid-tech" id="buttonGrid">
        </div>

    <div class="table-container">
        <table class="table-resumo">
            <thead>
                <tr>
                    <th>HORÁRIO</th>
                    <th>OPERAÇÃO REALIZADA</th>
                    <th>IMPACTO</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <button class="btn-export" onclick="limparTudo()">ZERAR SISTEMA</button>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">📱 ENVIAR RELATÓRIO EXECUTIVO</button>
    </div>
</div>

<script>
    // Dicionário que transforma o que você faz em linguagem de alta performance
    const acoesPro = {
        "Material Anderson/Fiber": {txt: "Gestão e Logística de Materiais Críticos", impacto: "Garantia de suprimentos para continuidade operacional"},
        "Atendimento Técnico": {txt: "Suporte Técnico Especializado em Campo", impacto: "Restabelecimento de serviços e SLA"},
        "Reunião de Equipe": {txt: "Alinhamento Estratégico e Coordenação Operacional", impacto: "Sincronismo de metas e redução de erros"},
        "Verificação de Sistemas": {txt: "Auditoria e Monitoramento de Ativos de Rede/Energia", impacto: "Prevenção de falhas catastróficas"},
        "Documentação": {txt: "Atualização de Base de Conhecimento e AS-BUILT", impacto: "Conformidade normativa e rastreabilidade"},
        "Fibra Ótica": {txt: "Intervenção em Infraestrutura de Transporte Ótico", impacto: "Otimização da largura de banda e integridade física"},
        "Descarte/Sucata": {txt: "Gestão de Resíduos e Logística Reversa", impacto: "Conformidade ambiental e organização de estoque"},
        "Inspeção Noturna": {txt: "Monitoramento de Visibilidade e Segurança (Ciclo Noturno)", impacto: "Garantia de segurança ao usuário 24h"},
        "Análise Comportamental": {txt: "Avaliação de Desempenho Técnico de Campo", impacto: "Melhoria contínua e padronização de processos"},
        "Manutenção de Frota": {txt: "Gestão de Ativos de Mobilidade", impacto: "Disponibilidade de deslocamento da equipe"},
        "Apoio a Outros Técnicos": {txt: "Mentoria e Suporte de Nível 2 (Remoto/Local)", impacto: "Resolução de problemas complexos inter-equipes"}
    };

    let activities = JSON.parse(localStorage.getItem('master_activities')) || [];
    let startTime = localStorage.getItem('master_startTime') ? new Date(localStorage.getItem('master_startTime')) : null;
    let timerInterval;

    window.onload = () => {
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-br', {weekday: 'long', day: '2-digit', month: 'long'});
        renderButtons();
        renderTable();
        if(startTime) startTimerUI();
    };

    function renderButtons() {
        const grid = document.getElementById('buttonGrid');
        Object.keys(acoesPro).forEach(key => {
            let b = document.createElement('button');
            b.className = 'btn-tech';
            b.innerText = key;
            b.onclick = () => {
                document.getElementById('desc').value = acoesPro[key].txt;
                document.getElementById('desc').dataset.impacto = acoesPro[key].impacto;
            };
            grid.appendChild(b);
        });
    }

    function toggleTask() {
        const btn = document.getElementById('btnMain');
        if (!startTime) {
            // Iniciar
            startTime = new Date();
            localStorage.setItem('master_startTime', startTime.toISOString());
            btn.innerText = "■ FINALIZAR E REGISTRAR IMPACTO";
            btn.className = "main-btn stop";
            startTimerUI();
        } else {
            // Finalizar
            const endTime = new Date();
            const desc = document.getElementById('desc').value || "Atividade Técnica Geral";
            const impacto = document.getElementById('desc').dataset.impacto || "Manutenção da continuidade operacional";
            const duration = document.getElementById('timerDisplay').innerText;

            activities.push({
                inicio: startTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fim: endTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                txt: desc,
                impacto: impacto,
                total: duration
            });

            localStorage.setItem('master_activities', JSON.stringify(activities));
            startTime = null;
            localStorage.removeItem('master_startTime');
            clearInterval(timerInterval);
            
            btn.innerText = "▶ INICIAR OPERAÇÃO TÉCNICA";
            btn.className = "main-btn start";
            document.getElementById('timerDisplay').innerText = "00:00:00";
            document.getElementById('desc').value = "";
            
            renderTable();
        }
    }

    function startTimerUI() {
        const btn = document.getElementById('btnMain');
        btn.innerText = "■ FINALIZAR E REGISTRAR IMPACTO";
        btn.className = "main-btn stop";
        
        timerInterval = setInterval(() => {
            if(!startTime) return;
            const diff = new Date(new Date() - startTime);
            document.getElementById('timerDisplay').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    function renderTable() {
        const body = document.getElementById('logBody');
        body.innerHTML = activities.map(a => `
            <tr>
                <td><b>${a.inicio} - ${a.fim}</b><br><small>${a.total}</small></td>
                <td>${a.txt}</td>
                <td style="color:var(--gold)">${a.impacto}</td>
            </tr>
        `).reverse().join('');
        document.getElementById('taskCount').innerText = activities.length;
    }

    function enviarWhatsApp() {
        let relatorio = `*RELATÓRIO EXECUTIVO DE ATIVIDADES*\n_Data: ${new Date().toLocaleDateString()}_\n\n`;
        activities.forEach(a => {
            relatorio += `🕒 *${a.inicio} às ${a.fim}*\n🛠 *Ação:* ${a.txt}\n🚀 *Impacto:* ${a.impacto}\n\n`;
        });
        relatorio += `\n*Total de Operações:* ${activities.length}\n_Gerado por Master Log Performance_`;
        window.open(`https://wa.me/?text=${encodeURIComponent(relatorio)}`, '_blank');
    }

    function limparTudo() {
        if(confirm("Deseja encerrar o turno e limpar os dados?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
