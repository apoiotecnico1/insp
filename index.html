<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Técnico - Inspeção de Campo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --dark-bg: #121212; --card-bg: #1e1e1e; --accent: #00e676; }
        body { background-color: var(--dark-bg); color: #e0e0e0; font-family: sans-serif; padding-bottom: 50px; }
        .main-container { max-width: 500px; margin: auto; padding: 20px; }
        .card-tech { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-giant { padding: 20px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-camera { background: #333; color: white; border: 2px dashed #444; }
        .btn-save { background: var(--accent); color: #000; font-size: 1.2rem; }
        .btn-folder { background: #2196f3; color: white; margin-bottom: 20px; }
        .preview-img { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #444; }
        .form-control, .form-select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; }
        .form-control:focus { background: #333; color: white; border-color: var(--accent); box-shadow: none; }
        #pdf-render { background: white; color: black; padding: 40px; position: absolute; left: -9999px; width: 800px; }
    </style>
</head>
<body>

<div class="main-container">
    <h4 class="fw-bold mb-4">INSPEÇÃO DE CAMPO</h4>

    <button class="btn btn-giant btn-folder" onclick="requestFolderPermission()">
        <i class="bi bi-folder-fill me-2"></i>1. DEFINIR PASTA DE DESTINO
    </button>
    <div id="folder-status" class="small text-muted mb-3 text-center">Pasta não selecionada</div>

    <div class="card-tech shadow">
        <label class="small fw-bold text-uppercase opacity-50">Localização</label>
        <div class="row g-2 mt-1">
            <div class="col-8"><input type="text" id="km" class="form-control" placeholder="KM 000+000"></div>
            <div class="col-4">
                <select id="sentido" class="form-select">
                    <option value="Norte">Norte</option>
                    <option value="Sul">Sul</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card-tech shadow">
        <label class="small fw-bold text-uppercase opacity-50">Sondagem Fiber Tech (CCR)</label>
        <input type="text" id="tecCCR" class="form-control mt-2" placeholder="Nome do Técnico">
        <label class="btn btn-giant btn-camera" id="lblCCR">
            FOTO SONDAGEM CCR
            <input type="file" accept="image/*" capture="camera" hidden onchange="processImage(this, 'viewCCR', 'lblCCR')">
        </label>
        <img id="viewCCR" class="preview-img">
    </div>

    <div class="card-tech shadow">
        <label class="small fw-bold text-uppercase opacity-50">Sondagem Equipe Claro</label>
        <input type="text" id="tecClaro" class="form-control mt-2" placeholder="Nome do Técnico">
        <label class="btn btn-giant btn-camera" id="lblClaro">
            FOTO SONDAGEM CLARO
            <input type="file" accept="image/*" capture="camera" hidden onchange="processImage(this, 'viewClaro', 'lblClaro')">
        </label>
        <img id="viewClaro" class="preview-img">
    </div>

    <button class="btn btn-giant btn-save shadow-lg" onclick="finalizarInspeção()">
        FINALIZAR E SALVAR PDF
    </button>
</div>

<div id="pdf-render">
    <div style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
        <h2>Relatório Técnico de Inspeção</h2>
        <p id="pdf-data-hora"></p>
    </div>
    <div style="margin-bottom: 20px;">
        <p><strong>LOCALIZAÇÃO:</strong> <span id="pdf-km"></span> - Sentido <span id="pdf-sentido"></span></p>
    </div>
    <div style="display: flex; gap: 20px;">
        <div style="flex: 1;">
            <h4>Sondagem CCR</h4>
            <p>Técnico: <span id="pdf-tecCCR"></span></p>
            <img id="pdf-imgCCR" style="width: 100%; border: 1px solid #ccc;">
        </div>
        <div style="flex: 1;">
            <h4>Sondagem Claro</h4>
            <p>Técnico: <span id="pdf-tecClaro"></span></p>
            <img id="pdf-imgClaro" style="width: 100%; border: 1px solid #ccc;">
        </div>
    </div>
    <div style="margin-top: 30px; font-size: 12px; color: #666; border-top: 1px solid #eee; padding-top: 10px;">
        Documento gerado eletronicamente para fins de acompanhamento de infraestrutura.
    </div>
</div>

<script>
    let folderHandle;

    async function requestFolderPermission() {
        try {
            folderHandle = await window.showDirectoryPicker();
            document.getElementById('folder-status').innerText = "✓ Pasta vinculada com sucesso";
            document.getElementById('folder-status').classList.replace('text-muted', 'text-success');
        } catch (err) {
            console.error("Usuário cancelou a seleção da pasta.");
        }
    }

    function processImage(input, imgId, lblId) {
        const file = input.files;
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById(lblId).style.background = '#1b5e20';
                document.getElementById(lblId).innerText = 'FOTO REGISTRADA ✓';
            };
            reader.readAsDataURL(file);
        }
    }

    async function finalizarInspeção() {
        const km = document.getElementById('km').value;
        if (!km) return alert("Por favor, informe o KM.");

        const agora = new Date();
        const dataStr = agora.toLocaleDateString('pt-BR').replace(/\//g, '-');
        const horaStr = agora.toLocaleTimeString('pt-BR').replace(/:/g, '-');
        const nomeArquivo = `Relatorio_KM_${km.replace('+', '-')}_${dataStr}_${horaStr}.pdf`;

        // Preencher PDF oculto
        document.getElementById('pdf-data-hora').innerText = `Gerado em: ${agora.toLocaleString()}`;
        document.getElementById('pdf-km').innerText = km;
        document.getElementById('pdf-sentido').innerText = document.getElementById('sentido').value;
        document.getElementById('pdf-tecCCR').innerText = document.getElementById('tecCCR').value;
        document.getElementById('pdf-tecClaro').innerText = document.getElementById('tecClaro').value;
        document.getElementById('pdf-imgCCR').src = document.getElementById('viewCCR').src;
        document.getElementById('pdf-imgClaro').src = document.getElementById('viewClaro').src;

        const element = document.getElementById('pdf-render');
        
        // Gerar Blob do PDF
        const pdfBlob = await html2pdf().from(element).set({
            margin: 0.5,
            filename: nomeArquivo,
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        }).output('blob');

        // Salvar na pasta selecionada ou baixar se não tiver permissão de pasta
        if (folderHandle) {
            try {
                const fileHandle = await folderHandle.getFileHandle(nomeArquivo, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(pdfBlob);
                await writable.close();
                alert("Sucesso! Relatório salvo na sua pasta.");
            } catch (e) {
                saveFallback(pdfBlob, nomeArquivo);
            }
        } else {
            saveFallback(pdfBlob, nomeArquivo);
        }
    }

    function saveFallback(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
        alert("PDF gerado! Salve-o na pasta desejada.");
    }
</script>

</body>
</html>
