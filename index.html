<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Captura Técnica Rodoviária</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --primary: #0056b3; /* Azul Cobalto Técnico */
            --accent: #ff8800;  /* Laranja Alerta */
            --danger: #ff4444; 
            --bg: #050505;
            --glass: rgba(20, 20, 20, 0.85); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE INÍCIO - NOVAS CORES */
        #safety-gate { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #001f3f 0%, #000 100%); 
            z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; 
            border: 10px solid var(--primary);
        }
        .alert-box { text-align: center; padding: 30px; }
        .btn-aware { 
            background: var(--accent); color: #fff; border: none; 
            padding: 22px 60px; font-weight: 900; border-radius: 50px; 
            cursor: pointer; font-size: 1.3rem; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 136, 0, 0.4);
            transition: transform 0.2s;
        }
        .btn-aware:active { transform: scale(0.95); }

        /* HUD E INTERFACE */
        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video#vid { width: 100%; height: 100%; object-fit: cover; }

        #wake-status { 
            position: absolute; top: 15px; right: 15px; font-size: 10px; 
            padding: 6px 12px; border-radius: 20px; background: var(--glass); 
            border: 1px solid #444; z-index: 200; 
        }
        .status-on { color: #00ff88; font-weight: bold; }

        #km-hud { 
            position: absolute; top: 60px; left: 20px; 
            background: var(--primary); padding: 15px; 
            border: 3px solid #fff; border-radius: 12px; z-index: 100; 
            min-width: 140px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #br-txt { font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }
        #km-txt { font-size: 2rem; font-weight: 900; line-height: 1.1; }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn-ui { 
            padding: 18px 30px; border-radius: 15px; border: 2px solid #fff; 
            background: var(--glass); color: #fff; font-weight: 800; cursor: pointer; 
            backdrop-filter: blur(10px);
        }
        #btn-start { border-color: var(--accent); color: var(--accent); }
        #btn-stop { background: var(--danger); border: none; display: none; }

        /* CONFIGURAÇÕES */
        #settings-panel { 
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%; 
            background: #111; z-index: 500; padding: 60px 20px; transition: 0.3s; 
            border-left: 2px solid var(--primary); 
        }
        #settings-panel.open { right: 0; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 11px; color: var(--accent); margin-bottom: 8px; font-weight: bold; }
        .input-group input, select { width: 100%; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="safety-gate">
    <div class="alert-box">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">CAPTURA <span style="color:var(--accent)">TÉCNICA</span></h1>
        <p style="color: #aaa; margin-bottom: 40px;">SISTEMA DE MONITORAMENTO RODOVIÁRIO</p>
        <button class="btn-aware" onclick="initApp()">Ativar Operação</button>
        <p style="margin-top: 25px; font-size: 0.8rem; color: #555;">BLOQUEIO DE STAND-BY AUTOMÁTICO</p>
    </div>
</div>

<div id="app-shell">
    <div id="wake-status">MODO: <span id="status-txt" class="status-on">SOLICITANDO...</span></div>
    
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-hud">
        <span id="br-txt">RODOVIA</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="ui-controls">
        <button class="btn-ui" onclick="toggleSet()">⚙️</button>
        <button id="btn-start" class="btn-ui" onclick="startCapture()">INICIAR PDF</button>
        <button id="btn-stop" class="btn-ui" onclick="stopCapture()">PARAR E SALVAR</button>
    </div>
</div>

<div id="settings-panel">
    <h2 onclick="toggleSet()" style="cursor:pointer; margin-bottom:30px; color: var(--danger)">✖ FECHAR</h2>
    <div class="input-group"><label>INTERVALO ENTRE FOTOS (MS)</label><input type="number" id="cfg-int" value="500"></div>
    <div class="input-group"><label>LIMITE DE FOTOS POR PDF</label><input type="number" id="cfg-lote" value="50"></div>
    <div class="input-group"><label>SELECIONAR LENTE</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
</div>

<canvas id="c"></canvas>

<script>
let wakeLock = null;
let kmDB = [], capturing = false, buffer = [], hDir = null, currentStream = null;
let brAtual = "BR-000", kmInicialLote = "";

const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

// --- GARANTIA DE TELA LIGADA ---
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById('status-txt').innerText = "TELA ATIVA";
            document.getElementById('status-txt').className = "status-on";
        }
    } catch (err) {
        document.getElementById('status-txt').innerText = "ERRO WAKE";
    }
}

document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock();
});

async function initApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        await requestWakeLock();

        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.visibility = 'visible';
        
        listCams(); loadCSV(); initGPS();
    } catch (e) {
        alert("Atenção: É necessário aceitar as permissões para a operação.");
    }
}

// --- LÓGICA DE VÍDEO E GPS ---
async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText);
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
}

function captureLoop() {
    if (!capturing) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('km-txt').innerText,
        br: brAtual,
        ts: new Date().toLocaleString()
    });
    
    if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
        const b = [...buffer]; const kF = document.getElementById('km-txt').innerText;
        const kI = kmInicialLote; buffer = []; kmInicialLote = kF;
        savePDF(b, kI, kF);
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value)); 
}

async function savePDF(data, kI, kF) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < data.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(data[i].img, 'JPEG', 0, 0, pw, ph);
        doc.setFillColor(0, 86, 179, 200); // Azul Cobalto no Rodapé
        doc.rect(0, ph-20, pw, 20, 'F');
        doc.setTextColor(255,255,255);
        doc.text(`${data[i].br} - ${data[i].km} | ${data[i].ts}`, 10, ph-8);
    }
    const nome = `REL_${brAtual}_KM_${kI}_ao_${kF}.pdf`.replace(/\s+/g, '');
    const f = await hDir.getFileHandle(nome, { create: true });
    const s = await f.createWritable(); await s.write(doc.output('blob')); await s.close();
}

function loadCSV() {
    fetch('SNVBR116SPRJ.csv').then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon')), ibr = h.indexOf('br');
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')), br: ibr !== -1 ? c[ibr] : "BR-116" };
        });
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            brAtual = best.br;
            document.getElementById('br-txt').innerText = brAtual;
        }
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
