<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberação Rápida - Angstrom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .btn-grande { padding: 25px; font-size: 1.2rem; font-weight: bold; border-radius: 15px; border: none; width: 100%; transition: 0.2s; }
        .btn-foto { background-color: #333; color: #fff; border: 2px dashed #555; }
        .btn-foto.com-foto { background-color: #198754; border-style: solid; }
        .btn-zap { background-color: #25d366; color: white; margin-top: 20px; display: none; }
        .campo-texto { background-color: #222; border: 1px solid #444; color: white; padding: 15px; font-size: 1.2rem; border-radius: 10px; }
        .label-equipe { font-size: 0.8rem; color: #aaa; text-transform: uppercase; margin-bottom: 5px; margin-top: 15px; }
        .foto-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 450px;">
    
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-0">LIBERAÇÃO</h2>
        <small class="text-muted text-uppercase">Sondagem de Fibra Óptica</small>
    </div>

    <div class="mb-4">
        <div class="row g-2">
            <div class="col-8">
                <input type="text" id="km" class="form-control campo-texto" placeholder="KM 000+000" oninput="validar()">
            </div>
            <div class="col-4">
                <select id="sentido" class="form-select campo-texto" onchange="validar()">
                    <option value="Norte">N</option>
                    <option value="Sul">S</option>
                </select>
            </div>
        </div>
    </div>

    <div class="label-equipe">1. Fiber Tech (CCR)</div>
    <input type="text" id="tecnicoCCR" class="form-control campo-texto mb-2" placeholder="Nome do Técnico" oninput="validar()">
    <label class="btn btn-grande btn-foto" id="btnFotoCCR">
        <i class="bi bi-camera-fill me-2"></i>FOTO SONDAGEM CCR
        <input type="file" accept="image/*" capture="camera" hidden id="inCCR" onchange="preview('CCR')">
    </label>
    <img id="viewCCR" class="foto-preview">

    <div class="label-equipe">2. Equipe Claro</div>
    <input type="text" id="tecnicoClaro" class="form-control campo-texto mb-2" placeholder="Nome do Técnico" oninput="validar()">
    <label class="btn btn-grande btn-foto" id="btnFotoClaro">
        <i class="bi bi-camera-fill me-2"></i>FOTO SONDAGEM CLARO
        <input type="file" accept="image/*" capture="camera" hidden id="inClaro" onchange="preview('Claro')">
    </label>
    <img id="viewClaro" class="foto-preview">

    <button id="btnFinal" class="btn btn-grande btn-zap shadow-lg" onclick="enviarRelatorio()">
        <i class="bi bi-whatsapp me-2"></i>ENVIAR AGORA
    </button>

</div>

<script>
    function preview(setor) {
        const file = document.getElementById('in' + setor).files;
        const img = document.getElementById('view' + setor);
        const btn = document.getElementById('btnFoto' + setor);
        
        const reader = new FileReader();
        reader.onloadend = function () {
            img.src = reader.result;
            img.style.display = "block";
            btn.classList.add('com-foto');
            btn.innerHTML = `<i class="bi bi-check-lg me-2"></i>FOTO OK`;
            validar();
        }
        if (file) reader.readAsDataURL(file);
    }

    function validar() {
        const km = document.getElementById('km').value;
        const fClaro = document.getElementById('inClaro').files.length > 0;
        const fCCR = document.getElementById('inCCR').files.length > 0;
        const tClaro = document.getElementById('tecnicoClaro').value;
        const tCCR = document.getElementById('tecnicoCCR').value;

        const btnFinal = document.getElementById('btnFinal');
        if (km && fClaro && fCCR && tClaro && tCCR) {
            btnFinal.style.display = "block";
        } else {
            btnFinal.style.display = "none";
        }
    }

    function enviarRelatorio() {
        const km = document.getElementById('km').value;
        const sentido = document.getElementById('sentido').value;
        const tCCR = document.getElementById('tecnicoCCR').value;
        const tClaro = document.getElementById('tecnicoClaro').value;
        const prot = "ANG-" + Math.floor(1000 + Math.random() * 9000);

        const msg = encodeURIComponent(
            `✅ *LIBERAÇÃO DE TRECHO OK*\n\n` +
            `📍 *KM:* ${km} (${sentido})\n` +
            `----------------------------------\n` +
            `🔍 *SONDAGEM CCR:* Realizada\n` +
            `👤 *Técnico:* ${tCCR}\n\n` +
            `🔍 *SONDAGEM CLARO:* Realizada\n` +
            `👤 *Técnico:* ${tClaro}\n` +
            `----------------------------------\n` +
            `🛑 *STATUS:* LIBERADO PARA IMPLANTAÇÃO\n` +
            `🔐 *PROTOCOLO:* ${prot}`
        );

        window.open(`https://wa.me/?text=${msg}`);
    }
</script>

</body>
</html>
