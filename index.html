<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>INSPEÇÃO PRO - CORE ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --placa-verde: linear-gradient(180deg, #007934 0%, #005a27 100%); 
            --accent: #00ff88; 
            --warning: #ffcc00;
            --danger: #ff4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; color: #fff; }

        /* HUD SUPERIOR - PLACA DE RODOVIA */
        #hud-top {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        #placa { 
            background: var(--placa-verde); 
            padding: 10px 25px; 
            border: 4px solid #fff; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            min-width: 180px;
            transition: all 0.3s ease;
        }
        #br-txt { font-size: 1rem; font-weight: 800; border-bottom: 2px solid rgba(255,255,255,0.3); margin-bottom: 5px; text-transform: uppercase; }
        #km-txt { font-size: 3.2rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }

        /* TELEMETRIA LATERAL */
        #telemetria {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; font-family: monospace;
            border-left: 3px solid var(--accent);
        }

        /* VÍDEO FULLSCREEN */
        #vid { width: 100vw; height: 100vh; object-fit: cover; }

        /* CONTROLES INFERIORES */
        #controls { 
            position: absolute; bottom: 40px; width: 100%; 
            display: flex; justify-content: center; gap: 20px; z-index: 200; 
        }
        .btn { 
            border: none; padding: 20px 40px; border-radius: 18px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            font-size: 1.1rem; letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: transform 0.1s active;
        }
        .btn:active { transform: scale(0.95); }
        #btn-pdf-start { background: #fff; color: #000; }
        #btn-pdf-stop { background: var(--danger); color: #fff; display: none; }

        /* TELA DE INICIALIZAÇÃO */
        #splash { 
            position: fixed; inset: 0; background: #0b0b0b; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .loader { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 500; }
    </style>
</head>
<body onload="checkEnv()">

<div id="flash"></div>

<div id="splash">
    <div class="loader" id="loader-icon"></div>
    <h2 style="letter-spacing:4px; margin-bottom:10px;">INSPEÇÃO PRO</h2>
    <p id="status-msg" style="color:#888; font-size:0.9rem; margin-bottom:30px;">Aguardando permissão de pasta...</p>
    <button class="btn" style="background:var(--accent); color:#000;" onclick="startEngine()">LIBERAR ACESSO</button>
</div>

<div id="app-ui" style="display:none;">
    <div id="hud-top">
        <div id="placa">
            <div id="br-txt">AGUARDANDO...</div>
            <div id="km-txt">Km ---</div>
        </div>
        <div id="telemetria">
            GPS: <span id="lat-view">0.000</span>, <span id="lon-view">0.000</span><br>
            PRECISÃO: <span id="acc-view">--</span>m
        </div>
    </div>

    <video id="vid" autoplay playsinline muted onclick="manualCapture()"></video>

    <div id="controls">
        <button id="btn-pdf-start" class="btn" onclick="startReporting()">Iniciar Relatório</button>
        <button id="btn-pdf-stop" class="btn" onclick="stopReporting()">Finalizar e Salvar</button>
    </div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
let kmDB = [], saveFolder = null, isReporting = false, frames = [];
let state = { br: "BR", km: "---", lat: 0, lon: 0, acc: 0 };

// 1. CARREGAR AMBIENTE (GITHUB PAGES)
async function startEngine() {
    try {
        saveFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('status-msg').innerText = "Carregando base de dados...";
        
        await loadCSV();
        await setupMedia();
        initGPS();
        
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app-ui').style.display = 'block';
    } catch(e) {
        document.getElementById('status-msg').innerText = "Erro: Acesso à pasta é obrigatório.";
        document.getElementById('status-msg').style.color = "var(--danger)";
    }
}

async function loadCSV() {
    try {
        const res = await fetch('SNVBR116SPRJ.csv');
        const txt = await res.text();
        const lines = txt.split('\n').filter(l => l.length > 5);
        const head = lines.shift().toLowerCase();
        const sep = head.includes(';') ? ';' : ',';

        kmDB = lines.map(line => {
            const c = line.split(sep);
            return {
                br: c[0].trim(),
                km: c[1].trim(),
                lt: parseFloat(c[2].replace(',', '.')),
                ln: parseFloat(c[3].replace(',', '.'))
            };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("CSV não encontrado no GitHub."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        state.lat = p.coords.latitude;
        state.lon = p.coords.longitude;
        state.acc = p.coords.accuracy.toFixed(0);
        
        document.getElementById('lat-view').innerText = state.lat.toFixed(4);
        document.getElementById('lon-view').innerText = state.lon.toFixed(4);
        document.getElementById('acc-view').innerText = state.acc;

        if(kmDB.length > 0) {
            let min = Infinity, match = null;
            kmDB.forEach(pt => {
                const dist = Math.hypot(pt.lt - state.lat, pt.ln - state.lon);
                if(dist < min) { min = dist; match = pt; }
            });
            if(match) {
                state.br = "BR-" + match.br;
                state.km = match.km;
                document.getElementById('br-txt').innerText = state.br;
                document.getElementById('km-txt').innerText = "Km " + state.km;
            }
        }
    }, null, { enableHighAccuracy: true });
}

async function setupMedia() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    document.getElementById('vid').srcObject = stream;
}

function drawBrandedLegend(ctx, w, h) {
    const hL = h * 0.16;
    // Faixa Verde Placa
    const g = ctx.createLinearGradient(0, h-hL, 0, h);
    g.addColorStop(0, "#007934"); g.addColorStop(1, "#004d22");
    ctx.fillStyle = g;
    ctx.fillRect(0, h-hL, w, hL);
    
    // Borda Superior
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, h-hL, w, 6);

    ctx.shadowColor = "rgba(0,0,0,0.6)"; ctx.shadowBlur = 10;
    
    // BR e KM
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${hL * 0.22}px sans-serif`;
    ctx.fillText(state.br, 40, h - (hL * 0.62));
    ctx.font = `900 ${hL * 0.48}px sans-serif`;
    ctx.fillText("Km " + state.km, 40, h - (hL * 0.18));

    // Infos Direita
    ctx.textAlign = "right";
    ctx.font = `bold ${hL * 0.14}px monospace`;
    ctx.fillText(new Date().toLocaleString('pt-BR'), w - 40, h - (hL * 0.45));
    ctx.fillText(`GPS: ${state.lat.toFixed(6)}, ${state.lon.toFixed(6)} (±${state.acc}m)`, w - 40, h - (hL * 0.22));
    ctx.textAlign = "left";
    ctx.shadowBlur = 0;
}

async function manualCapture() {
    const f = document.getElementById('flash');
    f.style.opacity = 1; setTimeout(() => f.style.opacity = 0, 50);

    const v = document.getElementById('vid');
    const can = document.getElementById('c');
    can.width = v.videoWidth; can.height = v.videoHeight;
    const ctx = can.getContext('2d');
    ctx.drawImage(v, 0, 0);
    drawBrandedLegend(ctx, can.width, can.height);
    
    const blob = await new Promise(r => can.toBlob(r, 'image/jpeg', 0.95));
    const name = `IMG_${state.br}_KM${state.km.replace(',','-')}_${Date.now()}.jpg`;
    const handle = await saveFolder.getFileHandle(name, {create:true});
    const write = await handle.createWritable();
    await write.write(blob); await write.close();
}

function startReporting() {
    isReporting = true; frames = [];
    document.getElementById('btn-pdf-start').style.display = 'none';
    document.getElementById('btn-pdf-stop').style.display = 'block';
    reportLoop();
}

async function reportLoop() {
    if(!isReporting) return;
    const v = document.getElementById('vid');
    const can = document.getElementById('c');
    can.width = v.videoWidth; can.height = v.videoHeight;
    const ctx = can.getContext('2d');
    ctx.drawImage(v, 0, 0);
    drawBrandedLegend(ctx, can.width, can.height);
    frames.push(can.toDataURL('image/jpeg', 0.75));
    setTimeout(reportLoop, 2500); // Intervalo de captura do PDF
}

async function stopReporting() {
    isReporting = false;
    if(frames.length === 0) return;
    const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
    frames.forEach((img, i) => {
        if(i > 0) pdf.addPage();
        pdf.addImage(img, 'JPEG', 0, 0, 297, 210);
    });
    const handle = await saveFolder.getFileHandle(`REPORT_${state.br}_${Date.now()}.pdf`, {create:true});
    const write = await handle.createWritable();
    await write.write(pdf.output('blob')); await write.close();
    location.reload();
}
</script>
</body>
</html>
