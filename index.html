<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA ELITE PRO v3.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #cc0000; --info: #0066ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* ADVERTÊNCIA INICIAL LIMPA (SEM ÍCONE) */
        #safety-gate { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; padding: 30px; 
        }
        .safety-box { 
            max-width: 500px; text-align: center; border: 2px solid #333; 
            padding: 50px 30px; border-radius: 12px; background: #050505;
        }
        .safety-box h2 { color: var(--accent); font-size: 20px; margin-bottom: 25px; font-weight: 900; letter-spacing: 1px; }
        .safety-box p { 
            font-size: 20px; line-height: 1.6; color: #fff; margin-bottom: 45px; 
            font-weight: 600; text-transform: uppercase;
        }
        .btn-proceed { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 22px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; font-size: 16px; border-radius: 6px; 
        }

        /* INTERFACE PRINCIPAL LIMPA */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        /* HUD PLACA KM */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 12px 25px; border: 3px solid #fff; border-radius: 12px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #km-hud h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }

        /* STATUS GPS E REC */
        #status-bar { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .status-pill { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
        #gps-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* CONTROLES SIMPLIFICADOS */
        #ui-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100; }
        .btn-main { border: none; font-weight: 900; cursor: pointer; padding: 22px 50px; font-size: 15px; background: var(--accent); color: #000; text-transform: uppercase; border-radius: 8px; min-width: 200px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .btn-circle { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 28px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        #btn-event { background: var(--info); color: #fff; }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="safety-box">
        <h2>AVISO DE PREVENÇÃO</h2>
        <p>PARA SUA SEGURANÇA, NÃO UTILIZE ESTE SISTEMA ENQUANTO ESTIVER DIRIGINDO.</p>
        <button class="btn-proceed" onclick="requestAccess()">ESTOU CIENTE</button>
    </div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    
    <div id="status-bar">
        <div class="status-pill"><div id="gps-dot"></div><span id="gps-txt">BUSCANDO GPS...</span></div>
        <div id="rec-status" class="status-pill" style="display:none;"><div class="rec-dot"></div><span>GRAVANDO</span></div>
    </div>

    <div id="ui-controls">
        <button id="btn-start" class="btn-main" onclick="initCapture(); event.stopPropagation();">INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture(); event.stopPropagation();">FINALIZAR LOTE</button>
        <button id="btn-event" class="btn-circle" onclick="markEvent(); event.stopPropagation();">⚠️</button>
    </div>
</div>

<canvas id="can_cap"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null, lastPos={lat:0, lng:0, acc:0};
let kmInicialLote = "", eventFlag = false;
const vid=document.getElementById('vid'), canCap=document.getElementById('can_cap'), ctxCap=canCap.getContext('2d');
const canOff = document.createElement('canvas'), ctxOff = canOff.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBip(f=880) {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination); o.frequency.value=f; g.gain.value=0.1; o.start(); o.stop(audioCtx.currentTime+0.1);
}

function forceFull() { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen({ navigationUI: "hide" }).catch(()=>{}); }
function markEvent() { eventFlag = true; playBip(1200); }

async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (await dirHandle.queryPermission({mode:'readwrite'}) !== 'granted') await dirHandle.requestPermission({mode:'readwrite'});
        if(dirHandle) {
            document.getElementById('safety-gate').style.display = 'none';
            document.getElementById('app-shell').style.display = 'block';
            forceFull(); await initCamera();
            if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            loadCSV(); initGPS();
        }
    } catch (e) { alert("Acesso à pasta necessário para salvar os arquivos."); }
}

async function initCamera() {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const backCam = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { 
            deviceId: backCam ? { exact: backCam.deviceId } : undefined,
            width: { ideal: 1920 }, 
            height: { ideal: 1080 } 
        } 
    });
    vid.srcObject = currentStream;
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("KM ","");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) saveAuto([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("KM ",""));
    rec = false; buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        canCap.width = vid.videoWidth; canCap.height = vid.videoHeight;
        ctxCap.drawImage(vid, 0, 0);
        buffer.push({ 
            raw: canCap.toDataURL('image/jpeg', 0.5), 
            km: document.getElementById('km-txt').innerText.replace("KM ",""), 
            ts: new Date().toLocaleTimeString('pt-BR'),
            lat: lastPos.lat, lng: lastPos.lng,
            isEvent: eventFlag
        });
        eventFlag = false;
        if(buffer.length >= 200) { // Lote padrão de 200 fotos
            saveAuto([...buffer], kmInicialLote, buffer[buffer.length-1].km);
            buffer = []; kmInicialLote = document.getElementById('km-txt').innerText.replace("KM ","");
        }
    }
    setTimeout(loop, 200); // Intervalo fixo de 200ms
}

async function saveAuto(data, ini, fim) {
    playBip();
    const doc = new jspdf.jsPDF(canCap.width > canCap.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        await new Promise(r => {
            const img = new Image();
            img.onload = () => {
                canOff.width = canCap.width; canOff.height = canCap.height;
                const bh = canOff.height * 0.14;
                ctxOff.drawImage(img, 0, 0);
                ctxOff.fillStyle = data[i].isEvent ? "rgba(200,0,0,0.9)" : "rgba(0,0,0,0.8)";
                ctxOff.fillRect(0, canOff.height-bh, canOff.width, bh);
                ctxOff.fillStyle = "#fff";
                ctxOff.font = `bold ${bh*0.3}px Arial`;
                ctxOff.fillText(`KM ${data[i].km} ${data[i].isEvent ? '[OCORRÊNCIA]' : ''}`, 50, canOff.height-(bh*0.6));
                ctxOff.font = `${bh*0.18}px Arial`;
                ctxOff.fillText(`LAT: ${data[i].lat.toFixed(6)} | LNG: ${data[i].lng.toFixed(6)} | HORA: ${data[i].ts}`, 50, canOff.height-(bh*0.2));
                doc.addImage(canOff.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph); r();
            };
            img.src = data[i].raw;
        });
    }
    const nome = `INSP_KM_${ini}_a_${fim}_${Date.now()}.pdf`;
    const fh = await dirHandle.getFileHandle(nome, { create: true });
    const wr = await fh.createWritable();
    await wr.write(doc.output('blob'));
    await wr.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        rows.shift();
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = {lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy};
        document.getElementById('gps-dot').style.background = lastPos.acc < 20 ? "#0f0" : "#f00";
        document.getElementById('gps-txt').innerText = `${Math.round(lastPos.acc)}m`;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - lastPos.lat, pt.ln - lastPos.lng);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "KM " + b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
