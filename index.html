<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Apoio - Captura Pro BR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.9); --highway-green: #007934; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; background: #0a0a0a; max-width: 90%; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: 20px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; cursor: crosshair; }

        /* PLACA DE KM ESTILO RODOVIA */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background-color: var(--highway-green);
            padding: 10px 20px; border: 3px solid #fff; 
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2), 0 6px 15px rgba(0,0,0,0.6);
            border-radius: 12px; z-index: 100; pointer-events: none; 
            min-width: 120px; display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.3s;
        }
        #br-txt { font-size: 0.8rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 1px 1px 2px #000; }
        #km-txt { font-size: 2rem; font-weight: 900; line-height: 1; color: #fff; text-shadow: 2px 2px 2px #000; }

        /* CONTROLES */
        #ui-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 15px; z-index: 500; transition: opacity 0.3s, visibility 0.3s; 
        }
        .btn-main { 
            border: 3px solid #fff; padding: 15px 25px; border-radius: 12px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            min-width: 130px; font-size: 1.1rem; color: #000;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
        }
        #btn-start { background: var(--accent); }
        #btn-stop { background: var(--danger); color: #fff; text-shadow: 1px 1px 2px #000; display: none; }
        #btn-hide { background: #444; color: #fff; min-width: 80px; font-size: 0.9rem; text-shadow: 1px 1px 2px #000; }

        #rec-tag { 
            position: absolute; bottom: 120px; right: 20px; 
            display: flex; align-items: center; gap: 6px; 
            background: rgba(0,0,0,0.7); padding: 6px 12px; 
            border-radius: 20px; opacity: 0; font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2); z-index: 90;
        }

        #gear-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .ui-hidden { opacity: 0 !important; visibility: hidden !important; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 4000; padding: 60px 25px; transition: 0.4s; }
        #settings-panel.open { right: 0; }
        #settings-panel label { display: block; margin-top: 10px; font-size: 0.9rem; color: var(--accent); }
        #settings-panel input, #settings-panel select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 10px; }

        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
        .dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="showUI()">

<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent); margin-bottom:10px;">SISTEMA DE APOIO</h2>
        <p style="margin-bottom:15px; font-size:0.9rem; color:#ccc;">Selecione a pasta de destino para começar</p>
        <button class="btn-aware" onclick="startApp()">ATIVAR SISTEMA</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:20px; font-weight: bold;">← FECHAR</div>
    <label>Câmera</label>
    <select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Intervalo de Captura (ms)</label>
    <input type="number" id="cfg-int" value="200">
    <label>Fotos por PDF</label>
    <input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="takeManualPhoto()"></video>
    
    <div id="km-hud">
        <span id="br-txt">AGUARDANDO...</span>
        <h1 id="km-txt">---</h1>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>Gerando PDF...</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="event.stopPropagation(); toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="event.stopPropagation(); startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="event.stopPropagation(); stopCapture()">FINALIZAR</button>
        <button id="btn-hide" class="btn-main" onclick="event.stopPropagation(); hideUI()">HIDE</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let kmInicialLote = "", brAtual = "", buffer = [];
let curLat = "0.0000", curLon = "0.0000";
let wakeLock = null;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');
const flashDiv = document.getElementById('flash');

// UI Controls
function hideUI() {
    document.getElementById('ui-controls').classList.add('ui-hidden');
    document.getElementById('km-hud').classList.add('ui-hidden');
}
function showUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    document.getElementById('km-hud').classList.remove('ui-hidden');
}
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

// Inicialização
async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        listCams(); loadCSV(); initGPS();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Permissão de pasta necessária para salvar os arquivos."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// Lógica de Foto e Watermark
async function drawWatermark(km, br) {
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
    ctx.font = `bold ${bh * 0.4}px Arial`;
    ctx.fillText(`BR-${br}  Km ${km}`, 30, can.height - (bh * 0.5));
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.font = `${bh * 0.18}px Arial`;
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`, 30, can.height - (bh * 0.2));
}

async function takeManualPhoto() {
    if(!hDir || capturing) return; 
    flashDiv.style.opacity = "0.3"; setTimeout(() => flashDiv.style.opacity = "0", 100);
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const cleanKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    await drawWatermark(cleanKm, brAtual);
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fileName = `MANUAL_BR${brAtual}_Km${cleanKm}_${Date.now()}.jpg`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob); await writable.close();
}

// Loop de Captura para PDF
function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    const cleanKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, cleanKm);
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ img: can.toDataURL('image/jpeg', 0.5), km: currentKm, br: brAtual });
    if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
        savePDF([...buffer], kmInicialLote, currentKm);
        buffer = []; kmInicialLote = currentKm;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        img.src = dataList[i].img;
        await new Promise(res => { img.onload = async () => {
            ctx.drawImage(img, 0, 0, can.width, can.height);
            await drawWatermark(dataList[i].km, dataList[i].br);
            doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
            res();
        };});
    }
    const fileName = `RELATORIO_BR${brAtual}_Km${kmIni}_ao_${kmFim}_${Date.now()}.pdf`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
}

// GPS e CSV
function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brAtual = best.br;
            document.getElementById('br-txt').innerText = "BR-" + best.br;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, e => console.error(e), { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr = h.indexOf('br'), ikm = h.indexOf('km'), ilat = h.findIndex(x=>x.includes('lat')), ilon = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            if(c.length < 4) return null;
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat].replace(',','.')), ln: parseFloat(c[ilon].replace(',','.')) };
        }).filter(d => d && !isNaN(d.lt));
        console.log("Banco de dados carregado:", kmDB.length, "pontos.");
    } catch(e) { console.error("Erro ao carregar CSV:", e); }
}
</script>
</body>
</html>
