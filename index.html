<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE RELATÓRIO PROFISSIONAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: #007934; 
            --danger: #cc0000; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        html, body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* ADVERTÊNCIA INICIAL */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .safety-box { max-width: 500px; text-align: center; border: 1px solid #333; padding: 40px; border-radius: 12px; }
        .safety-box h2 { color: var(--danger); margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; }
        .safety-box p { font-size: 18px; margin-bottom: 30px; font-weight: bold; }
        .btn-proceed { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; }

        /* INTERFACE */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }
        #draw-layer { position: absolute; inset: 0; z-index: 5; pointer-events: auto; }

        /* KM HUD */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 12px 25px; border: 3px solid #fff; border-radius: 12px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none; }
        #km-hud h1 { font-size: 2.5rem; font-weight: 900; }

        /* REC STATUS */
        #rec-status { position: absolute; top: 20px; right: 20px; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 4px; z-index: 10; border: 1px solid #f00; font-weight: bold; color: #f00; }
        .dot { width: 12px; height: 12px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* FERRAMENTAS DESENHO */
        #draw-tools { position: absolute; right: 20px; top: 100px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .mini-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        #btn-clear { display: none; background: var(--danger); border-color: #fff; }

        /* CONFIGURAÇÕES */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #111; z-index: 4000; padding: 30px; transition: 0.3s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        select { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 15px; font-size: 16px; border-radius: 8px; font-weight: bold; appearance: none; }

        /* CONTROLES */
        #ui-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 100; }
        .btn-main { border: none; font-weight: 900; cursor: pointer; padding: 20px 40px; font-size: 14px; background: var(--accent); color: #000; text-transform: uppercase; border-radius: 4px; min-width: 180px; }
        #gear-btn { width: 55px; height: 55px; background: #222; color: #fff; border: none; cursor: pointer; font-size: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        
        canvas#final-canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="safety-box">
        <h2>PROIBIDO A UTILIZAÇÃO ENQUANTO DIRIGE</h2>
        <p>SEJA CONSCIENTE</p>
        <button class="btn-proceed" onclick="requestAccess()">ESTOU CIENTE</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="font-size: 14px; color: #fff; margin-bottom: 25px;">CONFIGURAÇÕES</h3>
    <div class="field">
        <label>Câmera</label>
        <select id="cam-select" onchange="initC(this.value)"></select>
    </div>
    <div class="field">
        <label>Fotos por Lote</label>
        <select id="cfg-lote">
            <option value="50">50 Fotos</option>
            <option value="100">100 Fotos</option>
            <option value="200" selected>200 Fotos</option>
            <option value="500">500 Fotos</option>
        </select>
    </div>
    <div class="field">
        <label>Velocidade (ms)</label>
        <select id="cfg-int">
            <option value="100">100 ms</option>
            <option value="200" selected>200 ms</option>
            <option value="500">500 ms</option>
            <option value="1000">1000 ms (1s)</option>
        </select>
    </div>
    <button class="btn-main" style="width:100%; background: #fff;" onclick="toggleSet()">FECHAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="draw-layer"></canvas>
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    <div id="rec-status"><div class="dot"></div><span>GRAVANDO</span></div>

    <div id="draw-tools">
        <div class="mini-btn">✏️</div>
        <div class="mini-btn" id="btn-clear" onclick="clearBoard()">🗑️</div>
    </div>

    <div id="ui-controls">
        <button id="gear-btn" onclick="toggleSet(); event.stopPropagation();">⚙️</button>
        <button id="btn-start" class="btn-main" onclick="initCapture(); event.stopPropagation();">INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture(); event.stopPropagation();">FINALIZAR LOTE</button>
    </div>
</div>

<canvas id="final-canvas"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null;
let kmInicialLote = "";
const vid=document.getElementById('vid');
const drawCanvas=document.getElementById('draw-layer'), dctx=drawCanvas.getContext('2d');
const finalCanvas=document.getElementById('final-canvas'), fctx=finalCanvas.getContext('2d');

function forceFull() { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen({ navigationUI: "hide" }).catch(() => {}); }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

// TRAVA DE TELA (REFORÇADA)
async function keepAlive() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
}
setInterval(keepAlive, 25000); // Reativa a cada 25s

// LÓGICA DE DESENHO
let drawing = false;
function setupDraw() {
    drawCanvas.width = window.innerWidth;
    drawCanvas.height = window.innerHeight;
    dctx.strokeStyle = '#ff0000'; dctx.lineWidth = 6; dctx.lineCap = 'round';
    const getXY = (e) => { const t = e.touches ? e.touches : e; return { x: t.clientX, y: t.clientY }; };
    drawCanvas.addEventListener('touchstart', (e) => {
        drawing = true; const p = getXY(e); dctx.beginPath(); dctx.moveTo(p.x, p.y);
        document.getElementById('btn-clear').style.display = 'flex';
    });
    drawCanvas.addEventListener('touchmove', (e) => {
        if(!drawing) return; const p = getXY(e); dctx.lineTo(p.x, p.y); dctx.stroke();
    });
    drawCanvas.addEventListener('touchend', () => drawing = false);
}

function clearBoard() {
    dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    document.getElementById('btn-clear').style.display = 'none';
}

// CORE DO SISTEMA
async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        setupDraw(); forceFull(); await keepAlive();
        await listCams(); loadCSV(); initGPS();
    } catch (e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">CÂMERA ${i+1}</option>`).join('');
    if(vids.length > 0) { sel.value = vids[vids.length-1].deviceId; initC(sel.value); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = currentStream;
}

function initCapture() {
    buffer = []; // LIMPEZA TOTAL DE SESSÃO
    rec = true; 
    kmInicialLote = document.getElementById('km-txt').innerText.replace("KM ","");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        finalCanvas.width = vid.videoWidth; finalCanvas.height = vid.videoHeight;
        fctx.drawImage(vid, 0, 0);
        fctx.drawImage(drawCanvas, 0, 0, finalCanvas.width, finalCanvas.height);
        
        const curKm = document.getElementById('km-txt').innerText.replace("KM ","");
        buffer.push({ raw: finalCanvas.toDataURL('image/jpeg', 0.5), km: curKm, ts: new Date().toLocaleTimeString('pt-BR') });
        
        let limite = parseInt(document.getElementById('cfg-lote').value);
        if(buffer.length >= limite) {
            const dataToSave = [...buffer];
            buffer = []; 
            saveAuto(dataToSave, kmInicialLote, curKm);
            kmInicialLote = curKm;
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

function stopCapture() {
    if(buffer.length > 0) saveAuto([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("KM ",""));
    rec = false; buffer = []; 
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

// RELATÓRIO FIEL AO ÚLTIMO MODELO
async function saveAuto(data, ini, fim) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        doc.addImage(data[i].raw, 'JPEG', 0, 0, pw, ph);
        
        // FAIXA PRETA SEMI-TRANSPARENTE
        doc.setFillColor(0, 0, 0, 0.6);
        doc.rect(0, ph - 18, 95, 18, 'F');
        
        // TEXTO KM (DESTAQUE)
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text(`KM ${data[i].km}`, 8, ph - 10);
        
        // DATA E HORA
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        const dAtual = new Date().toLocaleDateString('pt-BR');
        doc.text(`${dAtual} | ${data[i].ts}`, 8, ph - 5);
    }

    const d = new Date();
    const nome = `Relat_Km_${ini}_a_${fim}_Dia_${d.getDate()}_${d.getHours()}h${d.getMinutes()}m.pdf`;
    try {
        const fh = await dirHandle.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch (e) {}
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "KM " + b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
