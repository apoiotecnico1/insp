<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sistema de Foto-Captura Técnica Rodoviária</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            /* Placa Verde mais sólida (85%) */
            --placa-verde: rgba(0, 121, 52, 0.85); 
            --danger: #ff4444; 
            --glass-dark: rgba(10, 10, 10, 0.9); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; max-width: 90%; background: #0a0a0a; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM ESTILO PLACA DE TRÂNSITO */
        #km-hud { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--placa-verde); 
            backdrop-filter: blur(10px); 
            padding: 12px 25px; 
            border: 4px solid #fff; /* Contorno Branco */
            border-radius: 12px; 
            z-index: 100; 
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        #br-txt { font-size: 0.9rem; font-weight: 800; color: #fff; text-transform: uppercase; display: block; border-bottom: 2px solid rgba(255,255,255,0.4); margin-bottom: 4px; padding-bottom: 2px; }
        #km-hud h1 { font-size: 2.6rem; font-weight: 900; margin: 0; line-height: 1.1; color: #fff; letter-spacing: -1px; }

        /* BOTÃO CENTRAL DISCRETO */
        #quick-shutter-container {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            z-index: 60; cursor: pointer;
        }
        #quick-shutter { 
            width: 75px; height: 75px; 
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
        }
        #quick-shutter::after { content: ''; width: 30px; height: 30px; background: #fff; border-radius: 50%; opacity: 0.8; }
        .shutter-label {
            margin-top: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.5px; color: #fff; text-shadow: 0 2px 4px #000;
            background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 4px;
        }

        #rec-tag { position: absolute; top: 25px; right: 25px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; opacity: 0; z-index: 100; border: 1px solid var(--danger); }
        .dot { width: 12px; height: 12px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; align-items: center; }
        .btn-main { border: none; padding: 20px 40px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 64px; height: 64px; background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass-dark); backdrop-filter: blur(20px); z-index: 4000; padding: 60px 25px; transition: 0.4s; }
        #settings-panel.open { right: 0; }
        .flash { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 6000; pointer-events: none; }
        canvas { display: none; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<div id="flash-effect" class="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <h2 style="color:var(--accent)">SISTEMA TÉCNICO</h2>
        <p style="margin: 15px 0;">PROIBIDO OPERAR EM MOVIMENTO</p>
        <button class="btn-aware" onclick="startApp()">ESTOU CIENTE</button>
    </div>
</div>

<div id="app-shell">
    <div id="quick-shutter-container" onclick="takeInstantJPG()">
        <div id="quick-shutter"></div>
        <div class="shutter-label">[ CAPTURA FOTO ATUAL .JPG ]</div>
    </div>
    
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><span id="br-txt">---</span><h1 id="km-txt">Km ---</h1></div>
    <div id="rec-tag"><div class="dot"></div><span>GRAVANDO PDF</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR PDF</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">PARAR E SALVAR</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:30px;">← VOLTAR</div>
    <div class="field"><label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Fotos por Lote</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer = [], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "", brAtual = "RODOVIA";

const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function refreshWakeLock() {
    if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams(); loadCSV(); initGPS(); refreshWakeLock();
    } catch(e) { alert("Acesso à pasta necessário."); }
}

function stampData(km, br, dataHora) {
    const bh = can.height * 0.15;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    // Sombra Estilosa (Drop Shadow técnica)
    ctx.shadowColor = "black";
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 4;
    ctx.shadowOffsetY = 4;
    
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${bh * 0.38}px Arial`;
    ctx.fillText(`${br} - Km ${km}`, 40, can.height - (bh * 0.48));
    
    ctx.font = `${bh * 0.22}px Arial`;
    ctx.fillText(dataHora, 40, can.height - (bh * 0.18));
    
    // Reset sombra
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
}

async function takeInstantJPG() {
    if (!hDir) return;
    document.getElementById('flash-effect').style.opacity = '0.6';
    setTimeout(() => document.getElementById('flash-effect').style.opacity = '0', 100);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const dt = new Date().toLocaleString('pt-BR');
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    stampData(km, brAtual, dt);
    can.toBlob(async (blob) => {
        const handle = await hDir.getFileHandle(`FOTO_${brAtual}_KM_${km}_${Date.now()}.jpg`.replace(/ /g,'_'), { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob); await writable.close();
    }, 'image/jpeg', 0.95);
}

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        const km = document.getElementById('km-txt').innerText.replace("Km ", "");
        const dt = new Date().toLocaleString('pt-BR');
        stampData(km, brAtual, dt);
        buffer.push({ img: can.toDataURL('image/jpeg', 0.5), km: km });
        if (buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) {
            const b = [...buffer]; savePDF(b, kmInicialLote, km);
            buffer = []; kmInicialLote = km;
        }
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(dataList, kmI, kmF) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(dataList[i].img, 'JPEG', 0, 0, pw, ph);
    }
    const f = await hDir.getFileHandle(`REL_${brAtual}_KM_${kmI}_ao_${kmF}_${Date.now()}.pdf`.replace(/ /g,'_'), { create: true });
    const s = await f.createWritable(); await s.write(doc.output('blob')); await s.close();
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function loadCSV() {
    fetch('SNVBR116SPRJ.csv').then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon')), ibr = h.indexOf('br');
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')), br: ibr !== -1 ? c[ibr] : "BR-116" };
        });
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            brAtual = best.br || "BR-116";
            document.getElementById('br-txt').innerText = brAtual;
        }
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
