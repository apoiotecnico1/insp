<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Inspeção Rodoviária – NOX</title>

<style>
body{margin:0;background:#05080f;color:#e8eeff;font-family:system-ui}
#cam{height:45vh;background:#000}
video{width:100%;height:100%;object-fit:contain}
#panel{height:55vh;padding:10px;overflow:auto;background:#0b1224}
.badge{padding:6px 12px;border-radius:999px;background:#0f1733;font-weight:800;font-size:13px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
button{padding:14px;font-size:15px;font-weight:900;border:none;border-radius:14px}
#folder{background:#22c55e;color:#022}
#start{background:#fb923c}
#stop{background:#ef4444;color:#fff}
#pdf{background:#eab308;color:#231c00}
</style>
</head>

<body>

<div id="cam">
  <video id="vid" autoplay playsinline muted></video>
</div>

<div id="panel">
  <div class="row">
    <span class="badge" id="kmView">KM —</span>
    <span class="badge" id="idView">IDs: —</span>
    <span class="badge" id="countView">📸 0</span>
  </div>

  <div class="row">
    <button id="folder">📁 Pasta</button>
    <button id="start">▶ Capturar</button>
    <button id="stop" disabled>⏹ Parar</button>
    <button id="pdf" disabled>📄 PDF</button>
  </div>
</div>

<canvas id="can" hidden></canvas>

<script>
/* ========= UTIL ========= */
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const hav=(a,b,c,d)=>{
 const R=6371;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}
const fmtKm=v=>`KM ${Math.floor(v)}+${String(Math.round((v%1)*1000)).padStart(3,'0')}`;
const pnum=v=>Number(String(v).replace(',','.'))

/* ========= ESTADO ========= */
let pontos=[], kms=[]
let lastPos=null, root=null
let run=false, fotos=0
let blobs=[]

/* ========= CAMERA ========= */
navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
.then(s=>vid.srcObject=s)

/* ========= GPS ========= */
navigator.geolocation.watchPosition(p=>{
 lastPos={lat:p.coords.latitude,lon:p.coords.longitude}
},{},{enableHighAccuracy:true})

/* ========= CSV ========= */
fetch('./Dados_Completos_Grupo_2_all.csv').then(r=>r.text()).then(t=>{
 const l=t.split(/\r?\n/); const h=l[0].toLowerCase().split(';')
 const iId=h.indexOf('id'), iLat=h.indexOf('lat'), iLon=h.indexOf('lon')
 for(let i=1;i<l.length;i++){
  const c=l[i].split(';')
  pontos.push({id:c[iId],lat:pnum(c[iLat]),lon:pnum(c[iLon])})
 }
})

fetch('./SNVBR116SPRJ.csv').then(r=>r.text()).then(t=>{
 t.split(/\r?\n/).forEach(l=>{
  const c=l.split(';')
  kms.push({km:pnum(c[0]),lat:pnum(c[1]),lon:pnum(c[2])})
 })
})

/* ========= PROXIMIDADE (BASE NOX) ========= */
function kmAtual(){
 let best=null,d=1e9
 kms.forEach(p=>{
  const h=hav(lastPos.lat,lastPos.lon,p.lat,p.lon)
  if(h<d){d=h;best=p}
 })
 return best
}
function idsProx(){
 return pontos
 .map(p=>({...p,d:hav(lastPos.lat,lastPos.lon,p.lat,p.lon)}))
 .sort((a,b)=>a.d-b.d)
 .slice(0,5)
}

/* ========= UI AO VIVO ========= */
setInterval(()=>{
 if(!lastPos)return
 const k=kmAtual()
 if(k) kmView.textContent=fmtKm(k.km)
 const ids=idsProx().map(p=>p.id).join(' • ')
 idView.textContent='IDs: '+ids
},400)

/* ========= CAPTURA ========= */
async function capture(){
 const w=vid.videoWidth,h=vid.videoHeight
 can.width=w;can.height=h
 const ctx=can.getContext('2d')
 ctx.drawImage(vid,0,0,w,h)
 const k=kmAtual()
 const ids=idsProx().map(p=>p.id).join(' • ')
 ctx.fillStyle='rgba(0,0,0,.7)'
 ctx.fillRect(0,h-140,w,140)
 ctx.fillStyle='#b7ffcf'
 ctx.font='40px system-ui'
 ctx.fillText(fmtKm(k.km),20,h-90)
 ctx.font='22px system-ui'
 ctx.fillText(ids,20,h-40)

 const blob=await new Promise(r=>can.toBlob(r,'image/jpeg',0.85))
 const f=await root.getFileHandle(`FOTO_${Date.now()}.jpg`,{create:true})
 const wr=await f.createWritable()
 await wr.write(blob);await wr.close()
 blobs.push(blob); fotos++; countView.textContent=`📸 ${fotos}`
}

/* ========= LOOP ========= */
async function loop(){
 run=true
 while(run){ await capture(); await sleep(1200) }
}

/* ========= PDF ========= */
pdf.onclick=()=>{
 const w=window.open()
 let h='<html><body>'
 blobs.forEach(b=>h+=`<img src="${URL.createObjectURL(b)}" style="width:100%;page-break-after:always">`)
 w.document.write(h+'</body></html>')
 w.print()
}

/* ========= CONTROLES ========= */
folder.onclick=async()=>{
 root=await window.showDirectoryPicker({mode:'readwrite'})
 pdf.disabled=false
}
start.onclick=()=>{if(!root)return alert('Selecione pasta');start.disabled=true;stop.disabled=false;loop()}
stop.onclick=()=>{run=false;start.disabled=false;stop.disabled=true}
</script>
</body>
</html>
