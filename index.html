<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Angstrom Ultra V4 - No Interruption</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --blue: #007bff; --red: #ff1744; --orange: #ff9100; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        #vid { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM AO VIVO */
        #km-hud { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0, 40, 0, 0.9); 
            padding: 10px 20px; border: 3px solid var(--accent); border-radius: 8px; 
            z-index: 500; text-align: center; backdrop-filter: blur(8px);
        }
        #km-txt { font-size: 2.5rem; font-weight: 900; line-height: 1; display: block; color: #fff; }

        /* GRADE DE BOTÕES (DIREITA) */
        #action-grid {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: grid; grid-template-columns: repeat(2, 90px); gap: 10px; z-index: 500;
        }
        .act-btn {
            height: 80px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(15,15,15,0.95); color: #fff; font-size: 0.58rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center; text-align: center;
            text-transform: uppercase; backdrop-filter: blur(10px); padding: 5px;
        }
        .act-btn:active { background: var(--accent); color: #000; transform: scale(0.9); }
        
        .c-ilum { border-bottom: 5px solid var(--accent); }
        .c-def { border-bottom: 5px solid var(--red); }
        .c-fib { border-bottom: 5px solid var(--blue); }
        .c-aten { border-bottom: 5px solid var(--orange); }

        #footer {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; z-index: 500;
        }
        .btn-rec { background: var(--accent); color: #000; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1rem; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .recording { background: var(--red) !important; color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse { 50% { opacity: 0.5; } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.1s; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate">
    <h2 style="color:var(--accent); font-weight:900; margin-bottom: 20px;">ANGSTROM ULTRA V4</h2>
    <button class="btn-rec" onclick="startApp()">INICIAR EM FULLSCREEN</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>

    <div id="km-hud">
        <span id="km-txt">Km ---</span>
    </div>

    <div id="action-grid">
        <button class="act-btn c-ilum" onclick="quickAction('ILUMINAÇÃO APAGADA')">ILUMINAÇÃO<br>APAGADA</button>
        <button class="act-btn c-ilum" onclick="quickAction('ABRIR ORDEM DE SERVIÇO')">ABRIR O.S.<br>DEFEITO</button>
        <button class="act-btn c-def" onclick="quickAction('POSTE APAGADO')">POSTE<br>APAGADO</button>
        <button class="act-btn c-def" onclick="quickAction('LUMINÁRIA APAGADA')">LUMINÁRIA<br>APAGADA</button>
        <button class="act-btn c-fib" onclick="quickAction('FIBRA ROMPIDA')">FIBRA<br>ROMPIDA</button>
        <button class="act-btn c-fib" onclick="quickAction('BACKBONE ABERTA')">BACKBONE<br>ABERTA</button>
        <button class="act-btn c-fib" onclick="quickAction('ALARME DE FIBRA')">ALARME DE<br>FIBRA</button>
        <button class="act-btn c-fib" onclick="quickAction('INOPERANTE')">SISTEMA<br>INOPERANTE</button>
        <button class="act-btn c-aten" onclick="quickAction('VANDALISMO')">ITEM DE<br>VANDALISMO</button>
        <button class="act-btn c-aten" onclick="quickAction('QUEBRADO/DANIFICADO')">QUEBRADO<br>DANIFICADO</button>
        <button class="act-btn c-aten" onclick="quickAction('ITEM DE ATENÇÃO')">ITEM DE<br>ATENÇÃO</button>
        <button class="act-btn" style="border-bottom: 5px solid #fff;" onclick="quickAction('SISTEMA NORMALIZADO')">SISTEMA<br>NORMALIZADO</button>
    </div>

    <div id="footer">
        <button id="btn-rec" class="btn-rec" onclick="toggleRec()">GRAVAR LOTE PDF</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], capturing = false, hDir = null, buffer = [], currentLabel = "INSPEÇÃO NORMAL";
let curLat = 0, curLon = 0;

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        // Ativa Fullscreen sem perguntar de novo
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }

        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        document.getElementById('vid').srcObject = stream;
        document.getElementById('vid').onloadedmetadata = () => { 
            const can = document.getElementById('c');
            can.width = vid.videoWidth; can.height = vid.videoHeight;
        };
        loadCSV(); initGPS();
    } catch(e) { console.error("Erro ao iniciar."); }
}

async function quickAction(label) {
    currentLabel = label;
    // Feedback de Flash (apenas visual, não sai do modo tela cheia)
    const f = document.getElementById('flash');
    f.style.opacity = "0.4"; 
    setTimeout(() => f.style.opacity = "0", 60);
    
    // Captura e salva silenciosamente
    await renderFrame(true); 
    currentLabel = "INSPEÇÃO NORMAL";
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude; curLon = p.coords.longitude;
        if (kmDB.length) {
            let closest = null, minD = Infinity;
            for (let pt of kmDB) {
                const d = Math.hypot(pt.lt - curLat, pt.ln - curLon);
                if (d < minD) { minD = d; closest = pt; }
            }
            if (closest) document.getElementById('km-txt').innerText = `Km ${closest.km}`;
        }
    }, null, { enableHighAccuracy: true });
}

function toggleRec() {
    capturing = !capturing;
    const btn = document.getElementById('btn-rec');
    if (capturing) {
        btn.innerText = "PARAR E SALVAR PDF";
        btn.classList.add('recording');
        buffer = [];
    } else {
        btn.innerText = "GERANDO PDF...";
        btn.classList.remove('recording');
        generatePDF();
    }
}

async function renderFrame(isManual) {
    const vid = document.getElementById('vid');
    const can = document.getElementById('c');
    const ctx = can.getContext('2d');
    const km = document.getElementById('km-txt').innerText;

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    
    ctx.fillStyle = currentLabel.includes('NORMALIZADO') ? '#fff' : (currentLabel.includes('FIBRA') ? '#007bff' : '#ff1744');
    ctx.fillRect(0, can.height - bh, 20, bh);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 44px Arial";
    ctx.fillText(`${currentLabel} | ${km}`, 45, can.height - (bh * 0.55));
    ctx.font = "24px Arial";
    ctx.fillText(`${new Date().toLocaleString()} | GPS: ${curLat.toFixed(6)}, ${curLon.toFixed(6)}`, 45, can.height - (bh * 0.22));

    const data = can.toDataURL('image/jpeg', 0.8);
    buffer.push(data); 

    if (isManual) {
        // Gravação direta sem diálogos
        try {
            const blob = await (await fetch(data)).blob();
            const safeLabel = currentLabel.replace(/[\/\\?%*:|"<>]/g, '-');
            const handle = await hDir.getFileHandle(`${safeLabel}_${km.replace(' ','_')}_${Date.now()}.jpg`, {create:true});
            const w = await handle.createWritable();
            await w.write(blob); 
            await w.close();
        } catch(e) { console.error("Erro ao salvar JPG silenciado."); }
    }
}

async function generatePDF() {
    if (buffer.length === 0) return;
    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        for (let i = 0; i < buffer.length; i++) {
            if (i > 0) doc.addPage();
            doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
        }
        const blob = doc.output('blob');
        const handle = await hDir.getFileHandle(`RELATORIO_${Date.now()}.pdf`, {create:true});
        const w = await handle.createWritable();
        await w.write(blob); 
        await w.close();
    } catch(e) { }
    document.getElementById('btn-rec').innerText = "GRAVAR LOTE PDF";
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const text = await r.text();
        const rows = text.split('\n').filter(row => row.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const iKm = h.indexOf('km'), iLat = h.findIndex(v => v.includes('lat')), iLon = h.findIndex(v => v.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[iKm], lt: parseFloat(c[iLat].replace(',','.')), ln: parseFloat(c[iLon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { }
}
</script>
</body>
</html>
