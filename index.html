<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b1020">
<title>Inspeção Rodoviária – Captura Direta</title>

<style>
:root{
  --bg:#0a1026; --fg:#eaf2ff; --muted:#b7c6ee;
  --hud:rgba(6,12,30,.78); --ok:#22c55e; --warn:#eab308; --danger:#ef4444;
  --border:#1d2a58; --shadow:0 14px 36px rgba(0,0,0,.45);
  --btnH:64px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:linear-gradient(180deg,#0b122b,#0a1024);
  color:var(--fg); font-family:system-ui,-apple-system,"Segoe UI",Roboto;
  overflow:hidden;
}
#camWrap{position:absolute;inset:0;background:#000}
video{width:100%;height:100%;object-fit:contain}
.hud{position:absolute;left:0;right:0;display:flex;gap:8px;padding:10px;pointer-events:none}
#hudTop{top:0} #hudBottom{bottom:0;justify-content:center}
.chip{
  pointer-events:auto;
  background:var(--hud);border:1px solid rgba(255,255,255,.18);
  border-radius:12px;padding:8px 12px;font-weight:900;
  box-shadow:var(--shadow);display:flex;gap:10px;align-items:center
}
.controls{display:flex;gap:14px}
.btn{
  height:var(--btnH);padding:0 20px;border-radius:14px;
  border:1px solid var(--border);font-weight:900;font-size:1.05rem;
  background:linear-gradient(180deg,#101a44,#0c1436);
  color:var(--fg);cursor:pointer;box-shadow:var(--shadow)
}
.btn.primary{background:#22c55e;color:#062a1a}
.btn.auto-on{background:#ff8f49;color:#1b0b02}
.btn.rec-on{background:#ef4444;color:#fff}
#folderGate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#060a12;z-index:9}
.gateCard{background:#0e173b;border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;width:90vw;max-width:420px}
#toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  background:#000c;border:1px solid #fff2;padding:10px 14px;border-radius:12px;display:none}
</style>
</head>

<body>

<div id="camWrap">
  <video id="vid" autoplay playsinline muted></video>

  <div class="hud" id="hudTop">
    <div class="chip">🛣️ <span id="kmLive">KM —</span></div>
    <div class="chip">🆔 <span id="idLive">—</span></div>
  </div>

  <div class="hud" id="hudBottom">
    <div class="controls">
      <button id="btnAuto" class="btn primary">🎬 AUTO</button>
      <button id="btnRec" class="btn">⏺ REC</button>
    </div>
  </div>
</div>

<div id="folderGate">
  <div class="gateCard">
    <h2>Selecionar Pasta</h2>
    <button id="btnPickFolder" class="btn primary">📁 Escolher Pasta</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== UTIL ===== */
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const hav=(a,b,c,d)=>{
 const R=6371000;
 const dLat=(c-a)*Math.PI/180, dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
};
const fmtKm=v=>{
 let k=Math.floor(v),m=Math.round((v-k)*1000);
 return `KM ${k}+${String(m).padStart(3,'0')}`;
};
const parsePt=v=>Number(String(v).replace(',','.'));
const toast=(m,t=1200)=>{toastEl.textContent=m;toastEl.style.display='block';
 clearTimeout(toast.t); toast.t=setTimeout(()=>toastEl.style.display='none',t)};

/* ===== ESTADO ===== */
let root=null,lastPos=null;
let ids=[],kms=[];
let isAuto=false,autoT=null;
let camOK=false;

/* ===== REFS ===== */
const vid=vid=document.getElementById('vid');
const kmLive=document.getElementById('kmLive');
const idLive=document.getElementById('idLive');
const btnAuto=document.getElementById('btnAuto');
const btnRec=document.getElementById('btnRec');
const toastEl=document.getElementById('toast');

/* ===== CAMERA ===== */
navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
.then(s=>{vid.srcObject=s;camOK=true});

/* ===== GPS ===== */
navigator.geolocation.watchPosition(p=>{
 lastPos={lat:p.coords.latitude,lon:p.coords.longitude};
},{},{enableHighAccuracy:true});

/* ===== CSV IDs ===== */
fetch('./Dados_Completos_Grupo_2_all.csv').then(r=>r.text()).then(t=>{
 t.split(/\r?\n/).slice(1).forEach(l=>{
  const c=l.split(';');
  const p={id:c[0],lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(isFinite(p.lat)&&isFinite(p.lon)) ids.push(p);
 });
});

/* ===== CSV KM ===== */
fetch('./SNVBR116SPRJ.csv').then(r=>r.text()).then(t=>{
 t.split(/\r?\n/).forEach(l=>{
  const c=l.split(';');
  const p={km:parsePt(c[0]),lat:parsePt(c[1]),lon:parsePt(c[2])};
  if(isFinite(p.km)&&isFinite(p.lat)) kms.push(p);
 });
});

/* ===== CÁLCULO BASE (IGUAL AO QUE FUNCIONAVA) ===== */
function nearestKm(){
 let b=null,d=1e12;
 kms.forEach(p=>{
  const h=hav(lastPos.lat,lastPos.lon,p.lat,p.lon);
  if(h<d){d=h;b=p}
 });
 return b;
}
function nearestIds(n=5){
 return ids.map(p=>({...p,d:hav(lastPos.lat,lastPos.lon,p.lat,p.lon)}))
 .sort((a,b)=>a.d-b.d).slice(0,n);
}

/* ===== HUD AO VIVO ===== */
setInterval(()=>{
 if(!lastPos)return;
 const k=nearestKm();
 if(k) kmLive.textContent=fmtKm(k.km);
 const list=nearestIds().map(i=>i.id).join(' • ');
 idLive.textContent=list||'—';
},400);

/* ===== PASTA ===== */
btnPickFolder.onclick=async()=>{
 root=await showDirectoryPicker({mode:'readwrite'});
 document.getElementById('folderGate').style.display='none';
 toast('Pasta OK');
};

/* ===== AUTO FOTO ===== */
async function capture(){
 if(!root||!camOK||!lastPos)return;
 const c=document.createElement('canvas');
 c.width=vid.videoWidth; c.height=vid.videoHeight;
 const ctx=c.getContext('2d');
 ctx.drawImage(vid,0,0,c.width,c.height);

 const km=nearestKm();
 const text=`${fmtKm(km.km)} | ${nearestIds().map(i=>i.id).join(' • ')}`;
 ctx.fillStyle='rgba(0,0,0,.7)';
 ctx.fillRect(0,c.height-100,c.width,100);
 ctx.fillStyle='#22c55e';ctx.font='32px system-ui';
 ctx.fillText(text,20,c.height-40);

 const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.85));
 const fh=await root.getFileHandle(`FOTO_${Date.now()}.jpg`,{create:true});
 const wr=await fh.createWritable(); await wr.write(blob); await wr.close();
}

/* ===== CONTROLES ===== */
btnAuto.onclick=()=>{
 if(isAuto){clearInterval(autoT);isAuto=false;btnAuto.classList.remove('auto-on');}
 else{
  if(!root)return toast('Escolha a pasta');
  isAuto=true;btnAuto.classList.add('auto-on');
  autoT=setInterval(()=>capture().catch(()=>{}),800);
 }
};
</script>
</body>
</html>
