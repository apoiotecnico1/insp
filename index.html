<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Relatório Fotográfico – V2 Campo</title>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:system-ui, -apple-system, Arial, sans-serif;
  padding:10px;
  overflow-x: hidden;
}
h1{font-size:1.1rem;text-align:center;margin:8px 0; color:#38bdf8}
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
#camCard{
  position:fixed;
  top:env(safe-area-inset-top, 10px);
  left:50%;
  transform:translateX(-50%);
  width:calc(100vw - 20px);
  max-width:800px;
  height:35vh;
  background:#000;
  border-radius:12px;
  z-index:100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#camWrap{width:100%;height:100%;overflow:hidden;border-radius:12px}
video{width:100%;height:100%;object-fit:cover}
#spacer{height:38vh}

#kmPlaque{
  text-align:center;
  background:#1e3a8a;
  border:2px solid #ffffff;
  border-radius:10px;
  padding:8px;
  font-weight:900;
  font-size:1.4rem;
  margin-bottom:10px;
  text-shadow: 1px 1px 2px #000;
}

.row{display:flex;gap:10px;flex-wrap:wrap}
button{
  flex:1;
  padding:15px;
  border-radius:10px;
  border:0;
  font-weight:800;
  font-size:0.9rem;
  transition: opacity 0.2s;
}
button:active{opacity:0.7}
button:disabled{background:#374151 !important; color:#9ca3af; cursor:not-allowed}

#btnFolder{background:#0ea5e9; color:#fff}
#btnAuto{background:#16a34a; color:#fff}
#btnStop{background:#dc2626; color:#fff}

.stat{font-size:.9rem;margin:4px 0; color:#9ca3af}
.stat span{color:#fff; font-weight:bold}
.log{max-height:150px;overflow-y:auto;background:#020617;padding:10px;border-radius:8px; border: 1px solid #1f2937}
.log div{font-size:.75rem; border-bottom:1px solid #111827; padding:2px 0; color:#8899a6}
</style>
</head>

<body>

<div id="camCard">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>
  </div>
</div>

<div id="spacer"></div>

<h1>📸 Relatório Fotográfico</h1>

<div id="kmPlaque"><span id="kmTop">KM 0+000</span></div>

<div class="card">
  <div class="stat">Fotos Salvas: <span id="stFotos">0</span></div>
  <div class="stat">Local: <span id="stFolder">Não definido</span></div>
</div>

<div class="card row">
  <button id="btnFolder">📁 Pasta Destino</button>
  <button id="btnAuto">▶️ Iniciar Captura</button>
  <button id="btnStop" disabled>⏹️ Parar</button>
</div>

<div class="card">
  <h3 style="font-size:0.9rem; margin-top:0">Log de Atividades</h3>
  <div id="log" class="log"></div>
</div>

<canvas id="can" style="display:none"></canvas>

<script>
/* ========= CONFIGURAÇÕES ========= */
const QUALIDADE_FOTO = 0.75;
const INTERVALO_MS = 1200; // Tempo entre fotos (ajustado para estabilidade do disco)

let folderHandle = null;
let seq = 0;
let isRunning = false;
let lastCaptureTime = 0;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { alpha: false }); // Performance: sem canal alpha
const kmTop = document.getElementById('kmTop');
const logBox = document.getElementById('log');

/* ===== LOG OTIMIZADO ===== */
function addLog(msg) {
    const d = document.createElement('div');
    d.textContent = `[${new Date().toLocaleTimeString('pt-BR')}] ${msg}`;
    logBox.prepend(d);
    if (logBox.children.length > 40) logBox.lastChild.remove();
}

/* ===== ACESSO À CÂMERA ===== */
async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
            addLog("Câmera pronta.");
        };
    } catch (e) {
        addLog("Erro ao acessar câmera. Verifique HTTPS.");
    }
}

/* ===== SELEÇÃO DE PASTA (File System API) ===== */
async function selectFolder() {
    try {
        folderHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('stFolder').textContent = folderHandle.name;
        addLog("Pasta vinculada com sucesso.");
    } catch (e) {
        addLog("Seleção de pasta cancelada.");
    }
}

/* ===== LOOP DE CAPTURA (High Performance) ===== */
async function captureLoop() {
    if (!isRunning) return;

    const now = Date.now();
    if (now - lastCaptureTime >= INTERVALO_MS) {
        lastCaptureTime = now;
        seq++;

        // Desenha frame atual
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        
        // Atualiza KM (Lógica de 250m por foto ou ajuste conforme necessário)
        const kmStr = `KM ${Math.floor(seq / 4)}+${(seq % 4) * 250}`;
        kmTop.textContent = kmStr;

        // Gera o Blob e salva direto no Handle da pasta
        can.toBlob(async (blob) => {
            if (blob && folderHandle) {
                try {
                    const name = `IMG_${String(seq).padStart(5, '0')}.jpg`;
                    const fileHandle = await folderHandle.getFileHandle(name, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    
                    document.getElementById('stFotos').textContent = seq;
                    addLog(`Salvo: ${name}`);
                } catch (err) {
                    addLog("Erro de gravação no disco.");
                }
            }
        }, 'image/jpeg', QUALIDADE_FOTO);
    }

    // Mantém o loop fluido sem travar a UI
    requestAnimationFrame(captureLoop);
}

/* ===== CONTROLES PRINCIPAIS ===== */
document.getElementById('btnFolder').onclick = selectFolder;

document.getElementById('btnAuto').onclick = () => {
    if (!folderHandle) {
        alert("Por favor, selecione a pasta de destino primeiro!");
        return;
    }
    isRunning = true;
    document.getElementById('btnAuto').disabled = true;
    document.getElementById('btnStop').disabled = false;
    addLog("Iniciando captura automática...");
    requestAnimationFrame(captureLoop);
};

document.getElementById('btnStop').onclick = () => {
    isRunning = false;
    document.getElementById('btnAuto').disabled = false;
    document.getElementById('btnStop').disabled = true;
    addLog("Captura parada.");
};

// Iniciar câmera ao abrir
initCamera();
</script>

</body>
</html>
