<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; touch-action: manipulation; }

        /* --- CINEMATIC SPLASH --- */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; transition: opacity 1s ease-out;
        }

        /* Estrada em Perspectiva */
        .road {
            position: absolute; bottom: 0; width: 200px; height: 100%;
            background: linear-gradient(to top, #222 0%, transparent 100%);
            clip-path: polygon(45% 0%, 55% 0%, 100% 100%, 0% 100%);
            opacity: 0; animation: fadeIn 1s forwards 0.5s;
        }
        .road-line {
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
            background: repeating-linear-gradient(to top, var(--accent) 0, var(--accent) 50px, transparent 50px, transparent 100px);
            transform: translateX(-50%);
            animation: roadMove 1.5s linear infinite;
        }

        /* Elementos de Captura (GPS e Câmera) */
        .capture-icon {
            position: absolute; font-size: 24px; opacity: 0;
            animation: iconPop 2s ease-in-out infinite;
        }
        .gps { left: 20%; bottom: 30%; animation-delay: 1.5s; }
        .cam { right: 20%; bottom: 40%; animation-delay: 2s; }

        /* Fusão (O Cubo/PDF) */
        .fusion-core {
            width: 80px; height: 80px; border: 2px solid var(--accent);
            position: relative; transform: rotate(45deg); opacity: 0;
            box-shadow: 0 0 20px var(--accent);
            animation: cubeForm 2s forwards 3s;
        }
        .fusion-core::after { content: 'PDF'; position: absolute; transform: rotate(-45deg); inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; }

        /* Pasta de Destino */
        .folder-final {
            font-size: 50px; margin-top: 20px; opacity: 0;
            animation: folderIn 1s forwards 5s;
        }

        /* Texto Final */
        .brand-title {
            margin-top: 30px; text-align: center; opacity: 0;
            animation: fadeIn 1.5s forwards 6s;
        }
        .brand-title h1 { letter-spacing: 8px; font-weight: 200; font-size: 1.2rem; color: var(--accent); }

        /* Keyframes Cinematográficos */
        @keyframes roadMove { from { background-position: 0 0; } to { background-position: 0 300px; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes iconPop { 
            0% { transform: scale(0) translateY(0); opacity: 0; }
            50% { opacity: 1; transform: scale(1.2) translateY(-50px); }
            100% { transform: scale(0.8) translateY(-100px); opacity: 0; }
        }
        @keyframes cubeForm {
            0% { transform: rotate(0) scale(0); opacity: 0; }
            100% { transform: rotate(405deg) scale(1); opacity: 1; }
        }
        @keyframes folderIn { to { opacity: 1; transform: translateY(-10px); } }

        /* --- INTERFACE DO APP --- */
        #gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; align-items: center; justify-content: center; }
        .btn-ready { background: var(--accent); color: #000; border: none; padding: 25px 50px; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        #app-main { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { 
            position: absolute; top: 40px; left: 20px; 
            background: var(--placa-verde); padding: 12px 25px; 
            border: 2px solid #fff; border-radius: 10px; z-index: 10;
        }
        #km-txt { font-size: 2.2rem; font-weight: 900; }

        /* Overlay Flutuante */
        #ui-layer {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 50px 30px;
            pointer-events: none; opacity: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #ui-layer.visible { opacity: 1; pointer-events: auto; }

        #status-box { align-self: flex-end; text-align: right; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .indicator { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-weight: 900; font-size: 14px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #444; }
        .dot.active { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }

        #controls-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .btn-main { border: none; border-radius: 60px; font-weight: 900; padding: 22px 60px; background: var(--accent); color: #000; text-transform: uppercase; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        #btn-stop { background: var(--danger); color: #fff; }
        #gear-icon { background: rgba(255,255,255,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        #settings-side { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: rgba(10,10,10,0.98); z-index: 2000; padding: 50px 25px; transition: 0.4s ease; border-left: 1px solid #333; }
        #settings-side.open { right: 0; }
        canvas { display: none; }
    </style>
</head>
<body onclick="triggerUI()">

    <div id="splash">
        <div class="road"><div class="road-line"></div></div>
        <div class="capture-icon gps">📍</div>
        <div class="capture-icon cam">📸</div>
        <div class="fusion-core"></div>
        <div class="folder-final">📁</div>
        <div class="brand-title">
            <h1>INSPEÇÃO PRO</h1>
            <p style="font-size: 10px; opacity: 0.6; margin-top: 10px; letter-spacing: 3px;">DO CAMINHO AO RELATÓRIO</p>
        </div>
    </div>

    <div id="gate">
        <button class="btn-ready" onclick="startApp()">Acessar Sistema</button>
    </div>

    <div id="app-main">
        <video id="v" autoplay playsinline muted></video>
        
        <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>

        <div id="ui-layer">
            <div id="status-box">
                <div class="indicator">
                    <div id="status-dot" class="dot"></div>
                    <span id="status-label">SISTEMA PRONTO</span>
                </div>
                <div style="font-size: 10px; margin-top: 8px; opacity: 0.8;">PDFs GERADOS: <b id="pdf-count" style="color:var(--accent)">0</b></div>
            </div>

            <div id="controls-row">
                <div id="gear-icon" onclick="openMenu(event)">⚙️</div>
                <button id="btn-start" class="btn-main" onclick="run(event)">Iniciar</button>
                <button id="btn-stop" class="btn-main" style="display:none;" onclick="halt(event)">Finalizar</button>
            </div>
        </div>
    </div>

    <div id="settings-side">
        <div style="text-align:right; font-size: 20px; margin-bottom: 40px;" onclick="openMenu(event)">✕</div>
        <label style="font-size: 11px; color: #555;">CÂMERA ATIVA</label>
        <select id="cam-list" onchange="changeCam(this.value)" style="width:100%; padding:15px; background:#222; color:#fff; border:none; border-radius:8px; margin: 10px 0 30px 0;"></select>
        <label style="font-size: 11px; color: #555;">FOTOS POR LOTE</label>
        <input type="number" id="lote-val" value="50" style="width:100%; padding:15px; background:#222; color:#fff; border:none; border-radius:8px; margin-top: 10px;">
    </div>

    <canvas id="c"></canvas>

<script>
let db=[], active=false, buffer=[], hDir=null, uiHold, stream=null, pdfs=0;
const v=document.getElementById('v'), c=document.getElementById('c'), ctx=c.getContext('2d');

// Fluxo de Splash
window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').remove();
            document.getElementById('gate').style.display = 'flex';
        }, 1000);
    }, 7500); // Duração da animação cinematográfica
    loadData();
};

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-main').style.visibility = 'visible';
        
        // Fullscreen Automático
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        setupHardware();
        initGPS();
        triggerUI();
    } catch(e) { alert("Permissão de pasta necessária."); }
}

function triggerUI() {
    const layer = document.getElementById('ui-layer');
    layer.classList.add('visible');
    clearTimeout(uiHold);
    uiHold = setTimeout(() => {
        if(!document.getElementById('settings-side').classList.contains('open')){
            layer.classList.remove('visible');
        }
    }, 3500);
}

async function run(e) {
    if(e) e.stopPropagation();
    active = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('status-dot').classList.add('active');
    document.getElementById('status-label').innerText = "CAPTURANDO...";
    engine();
}

async function halt(e) {
    if(e) e.stopPropagation();
    active = false;
    document.getElementById('status-label').innerText = "SALVANDO PDF FINAL...";
    if(buffer.length > 0) await createPDF();
    
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('status-dot').classList.remove('active');
    document.getElementById('status-label').innerText = "SISTEMA PRONTO";
}

function engine() {
    if(!active) return;
    if (v.readyState === v.HAVE_ENOUGH_DATA) {
        ctx.drawImage(v, 0, 0, c.width, c.height);
        buffer.push({ 
            img: c.toDataURL('image/jpeg', 0.5), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            time: new Date().toLocaleTimeString('pt-BR') 
        });
        
        const limit = parseInt(document.getElementById('lote-val').value) || 50;
        if(buffer.length >= limit) createPDF();
    }
    setTimeout(engine, 400); 
}

async function createPDF() {
    if(!buffer.length) return;
    const stack = [...buffer]; 
    buffer = []; 
    
    const k1 = stack.km.replace(/\+/g, '_');
    const k2 = stack[stack.length - 1].km.replace(/\+/g, '_');
    const isP = window.innerHeight > window.innerWidth;
    const doc = new jspdf.jsPDF(isP?'p':'l', 'mm', 'a4');
    const w = doc.internal.pageSize.getWidth();
    const h = doc.internal.pageSize.getHeight();

    for(let i=0; i<stack.length; i++){
        if(i > 0) doc.addPage(isP?'p':'l');
        const imgObj = new Image();
        await new Promise(res => {
            imgObj.onload = () => {
                ctx.drawImage(imgObj, 0, 0);
                const bh = c.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.85)"; 
                ctx.fillRect(0, c.height-bh, c.width, bh);
                ctx.fillStyle = "#fff"; 
                ctx.font = `bold ${bh * 0.4}px Arial`;
                ctx.fillText("Km " + stack[i].km, 50, c.height-(bh*0.45));
                ctx.font = `${bh * 0.15}px Arial`;
                ctx.fillText(stack[i].time + " | INSPEÇÃO FOTOGRÁFICA", 50, c.height-(bh*0.18));
                doc.addImage(c.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, w, h, undefined, 'FAST');
                res();
            };
            imgObj.src = stack[i].img;
        });
    }

    try {
        const file = await hDir.getFileHandle(`Relatorio_KM_${k1}_${Date.now()}.pdf`, {create:true});
        const stream = await file.createWritable();
        await stream.write(doc.output('blob')); 
        await stream.close();
        pdfs++;
        document.getElementById('pdf-count').innerText = pdfs;
    } catch(err) {}
}

async function setupHardware() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d => d.kind === 'videoinput');
    const list = document.getElementById('cam-list');
    cams.forEach((cm, i) => {
        const o = document.createElement('option');
        o.value = cm.deviceId; o.text = cm.label || `Lente ${i+1}`;
        list.appendChild(o);
    });
    bindCam(cams[cams.length-1].deviceId);
}

async function bindCam(id) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    v.srcObject = stream;
    v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
}

function openMenu(e) { if(e) e.stopPropagation(); document.getElementById('settings-side').classList.toggle('open'); }
function changeCam(id) { bindCam(id); }

async function loadData() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const txt = await r.text();
        const lines = txt.split('\n').filter(l => l.includes(';'));
        const head = lines.shift().split(';');
        const ik = head.indexOf('km'), ilt = head.findIndex(x=>x.toLowerCase().includes('lat')), iln = head.findIndex(x=>x.toLowerCase().includes('lon'));
        db = lines.map(ln => {
            const c = ln.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() { 
    navigator.geolocation.watchPosition(p => {
        if(!db.length) return;
        let best = null, minD = Infinity;
        for(const pt of db) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < minD) { minD = d; best = pt; }
        }
        if(best) document.getElementById('km-txt').innerText = "Km " + best.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
