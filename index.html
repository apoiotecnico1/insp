<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Sistema de Apoio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.8); --success: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* TELA INICIAL REESTRUTURADA */
        #safety-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; backdrop-filter: blur(5px); }
        .intro-header { text-align: center; background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid #444; }
        
        .action-area { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        
        /* BOTÕES */
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 1rem; }
        .btn-whatsapp { background: var(--success); color: #fff; border: none; padding: 18px; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; }
        #vid { width: 100%; height: 100%; object-fit: cover; cursor: crosshair; }

        /* HUD PLACA VERDE */
        #km-hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(0, 121, 52, 0.8); 
            padding: 10px 20px; 
            border: 2px solid rgba(255, 255, 255, 0.6); 
            border-radius: 12px; 
            z-index: 10000; /* Acima do safety gate */
            pointer-events: none; 
            min-width: 130px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        #br-txt { font-size: 1rem; font-weight: 800; color: #eee; text-shadow: 1px 1px 2px #000; }
        #km-txt { font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 2px 2px 0px #004d21; line-height: 1; }

        #rec-tag { position: absolute; top: 25px; right: 15px; display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
        .dot { width: 6px; height: 6px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 2000; }
        .ui-hidden { display: none !important; }
        .btn-main { border: none; padding: 18px 35px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; min-width: 150px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: var(--glass); backdrop-filter: blur(20px); z-index: 11000; padding: 50px 20px; transition: 0.4s; }
        #settings-panel.open { right: 0; }
        #settings-panel input, #settings-panel select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin: 5px 0 15px 0; }

        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1500; }
    </style>
</head>
<body onload="preInit()">

<div id="flash"></div>

<div id="km-hud">
    <span id="br-txt">BR ---</span>
    <h1 id="km-txt">Km ---</h1>
</div>

<div id="safety-gate">
    <div class="intro-header">
        <h2 style="color:var(--accent); font-size: 1.2rem;">SISTEMA DE APOIO</h2>
        <p style="font-size: 0.8rem; opacity: 0.8;">Câmera Ativa para Relatórios</p>
    </div>

    <div class="action-area">
        <button class="btn-whatsapp" onclick="shareWhatsApp()">
            <span>SINALIZAR NO WHATSAPP</span>
        </button>
        <button class="btn-aware" onclick="unlockSystem()">ENTRAR NO SISTEMA PDF</button>
    </div>
</div>

<div id="settings-panel">
    <div onclick="toggleSet()" style="color:var(--accent); cursor:pointer; margin-bottom:20px; font-weight: bold;">← FECHAR</div>
    <label>Câmera</label>
    <select id="cam-select" onchange="switchCam(this.value)"></select>
    <label>Intervalo (ms)</label>
    <input type="number" id="cfg-int" value="200">
    <label>Fotos/Lote (PDF)</label>
    <input type="number" id="cfg-lote" value="50">
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="handleTouch()"></video>
    <div id="rec-tag"><div class="dot"></div><span>Gerando PDF</span></div>
    <div id="ui-controls" class="ui-hidden">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null;
let kmInicialLote = "", brAtual = "", buffer = [];
let curLat = "0.0000", curLon = "0.0000";
let wakeLock = null;

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');
const flashDiv = document.getElementById('flash');

// Inicia câmera e GPS assim que abre a página
async function preInit() {
    initGPS();
    loadCSV();
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function unlockSystem() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('ui-controls').classList.remove('ui-hidden');
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Para gerar PDF, é necessário selecionar uma pasta."); }
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

// Função para capturar e enviar via WhatsApp
async function shareWhatsApp() {
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    const br = brAtual || "---";
    
    // Efeito de Flash
    flashDiv.style.opacity = "0.3"; 
    setTimeout(() => { flashDiv.style.opacity = "0"; }, 100);

    // Desenha imagem com marca d'água
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    await drawWatermark(km, br);

    // Converte para arquivo real
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.90));
    const file = new File([blob], `Ocorrencia_BR${br}_Km${km}.jpg`, { type: 'image/jpeg' });

    // Tenta usar a API de compartilhamento nativa (Funciona em Android/iOS)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: `Sinalização BR-${br} Km ${km}`,
                text: `Registro técnico: BR ${br} Km ${km} - ${new Date().toLocaleString()}`
            });
        } catch (err) {
            console.log("Compartilhamento cancelado");
        }
    } else {
        alert("Seu navegador não suporta compartilhamento de arquivos. Use o sistema de PDF.");
    }
}

async function drawWatermark(km, br) {
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
    ctx.font = `bold ${bh * 0.4}px Arial`;
    ctx.fillText(`BR ${br}  Km ${km}`, 30, can.height - (bh * 0.5));
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.font = `${bh * 0.18}px Arial`;
    ctx.fillText(`${new Date().toLocaleString('pt-BR')} | GPS: ${curLat}, ${curLon}`, 30, can.height - (bh * 0.2));
}

function handleTouch() {
    if(hDir) takeManualPhoto();
}

async function takeManualPhoto() {
    flashDiv.style.opacity = "0.3"; 
    setTimeout(() => { flashDiv.style.opacity = "0"; }, 100);
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    await drawWatermark(document.getElementById('km-txt').innerText.replace("Km ", ""), brAtual);
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fileName = `BR_${brAtual}_Km_${document.getElementById('km-txt').innerText.replace("Km ", "")}_${Date.now()}.jpg`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob); await writable.close();
}

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('gear-btn').classList.add('ui-hidden');
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    document.getElementById('gear-btn').classList.remove('ui-hidden');
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.getElementById('km-txt').innerText.replace("Km ", "");
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({ img: can.toDataURL('image/jpeg', 0.5), km: currentKm, br: brAtual, gps: `${curLat}, ${curLon}`, ts: new Date().toLocaleString('pt-BR') });
    if (buffer.length >= parseInt(document.getElementById('cfg-lote').value)) {
        savePDF([...buffer], kmInicialLote, currentKm);
        buffer = []; kmInicialLote = currentKm;
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF(dataList, kmIni, kmFim) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < dataList.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        img.src = dataList[i].img;
        await new Promise(res => { img.onload = async () => {
            ctx.drawImage(img, 0, 0, can.width, can.height);
            await drawWatermark(dataList[i].km, dataList[i].br);
            doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
            res();
        };});
    }
    const fileName = `Relatorio_BR${brAtual}_Km${kmIni}_ao_${kmFim}.pdf`;
    const fileHandle = await hDir.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(doc.output('blob'));
    await writable.close();
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        curLat = p.coords.latitude.toFixed(6); curLon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            brAtual = best.br;
            document.getElementById('br-txt').innerText = "BR " + best.br;
            document.getElementById('km-txt').innerText = "Km " + best.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr = h.indexOf('br'), ikm = h.indexOf('km'), ilat = h.findIndex(x=>x.includes('lat')), ilon = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat].replace(',','.')), ln: parseFloat(c[ilon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Erro CSV:", e); }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
</script>
</body>
</html>
