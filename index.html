<!DOCTYPE html>
<html lang="pt-BR" data-theme="original">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>Inspeção Noturna – Iluminação Rodoviária</title>

<style>
/* ================= BASE VISUAL ================= */
:root{
  --bg:#0b1220;
  --surface:#0f1733;
  --fg:#e8eeff;
  --ok:#22c55e;
  --warn:#eab308;
  --danger:#ef4444;
  --border:#1e2a5a;
  --radius:14px;
  --camH:42vh;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  padding:10px;
}
h1{text-align:center;font-size:1.2rem;margin:4px 0 8px}

/* ================= CÂMERA ================= */
#camCard{
  position:sticky;
  top:0;
  background:#000;
  border:2px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  height:var(--camH);
}
video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* ================= STATUS ================= */
#status{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:center;
  margin:6px 0;
}
.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:800;
  background:#111;
  border:1px solid var(--border);
}
.ok{color:#b6ffd6}
.warn{color:#fff1aa}

/* ================= BOTÕES ================= */
button{
  width:100%;
  padding:14px;
  font-size:1rem;
  font-weight:900;
  border-radius:14px;
  border:none;
  margin:6px 0;
  background:#f97316;
  color:#1b0b02;
}
button.stop{
  background:#ef4444;
  color:#fff;
}

/* ================= KM ================= */
#kmTop{
  text-align:center;
  font-size:1.05rem;
  font-weight:900;
  margin:6px 0;
}
</style>
</head>

<body>

<h1>📸 Inspeção de Iluminação</h1>

<div id="camCard">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="can" style="display:none"></canvas>
</div>

<div id="kmTop">KM —</div>

<div id="status">
  <span class="badge" id="stCam">Câmera…</span>
  <span class="badge" id="stGps">GPS…</span>
  <span class="badge" id="stFotos">Fotos: 0</span>
</div>

<button id="btnAuto">▶️ Iniciar Inspeção</button>

<script>
/* ================= ESTADO ================= */
const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');
const btnAuto = document.getElementById('btnAuto');
const kmTop = document.getElementById('kmTop');

let photoCount = 0;
let isRunning = false;
let lastPos = null;

/* ================= GPS ================= */
navigator.geolocation.watchPosition(p=>{
  lastPos = {
    lat:p.coords.latitude,
    lon:p.coords.longitude,
    acc:p.coords.accuracy
  };
  document.getElementById('stGps').textContent = `GPS ±${Math.round(lastPos.acc)}m`;
  document.getElementById('stGps').className = 'badge ok';
},{},{enableHighAccuracy:true});

/* ================= CÂMERA ================= */
async function startCamera(){
  const st = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'}},
    audio:false
  });
  vid.srcObject = st;
  await new Promise(r=>vid.onloadedmetadata=r);
  document.getElementById('stCam').textContent = 'Câmera OK';
  document.getElementById('stCam').className = 'badge ok';
}
startCamera();

/* ================= KM MOCK (substitui SNV) ================= */
function fmtKmFake(){
  if(!lastPos) return 'KM —';
  const km = 123 + ((Date.now()/1000)%1);
  return `KM ${Math.floor(km)}+${String(Math.floor((km%1)*1000)).padStart(3,'0')}`;
}

/* ================= CAPTURA ================= */
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function captureOnce(){
  const vw = vid.videoWidth;
  const vh = vid.videoHeight;

  const isNight = new Date().getHours() >= 18 || new Date().getHours() <= 6;
  const maxDim = isNight ? 2200 : 1600;
  const s = Math.min(1, maxDim/Math.max(vw,vh));

  const w = Math.round(vw*s);
  const h = Math.round(vh*s);
  can.width=w; can.height=h;

  ctx.filter = isNight ? 'contrast(1.15) brightness(1.1)' : 'none';
  ctx.drawImage(vid,0,0,w,h);
  ctx.filter='none';

  const kmStr = fmtKmFake();
  const ts = new Date().toLocaleString();

  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillRect(0,h-140,w,140);

  ctx.fillStyle='#b7ffcf';
  ctx.font=`900 ${Math.round(h*0.06)}px system-ui`;
  ctx.fillText(kmStr,20,h-70);

  ctx.fillStyle='#fff';
  ctx.font=`700 ${Math.round(h*0.03)}px system-ui`;
  ctx.fillText(ts,20,h-30);

  await new Promise(res=>can.toBlob(res,'image/jpeg',isNight?0.92:0.85));

  photoCount++;
  document.getElementById('stFotos').textContent = `Fotos: ${photoCount}`;
  kmTop.textContent = kmStr;
}

/* ================= LOOP SEGURO ================= */
async function captureLoop(){
  while(isRunning){
    const ini = performance.now();
    if(lastPos) await captureOnce();
    const dt = performance.now()-ini;
    await sleep(Math.max(0,1200-dt));
  }
}

/* ================= BOTÃO ================= */
btnAuto.onclick = ()=>{
  isRunning = !isRunning;
  if(isRunning){
    btnAuto.textContent = '⏹️ Parar Inspeção';
    btnAuto.classList.add('stop');
    captureLoop();
  }else{
    btnAuto.textContent = '▶️ Iniciar Inspeção';
    btnAuto.classList.remove('stop');
  }
};
</script>

</body>
</html>
