<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sistema de Foto-Captura automatica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa-verde: #007934; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 1px solid #333; padding: 40px; border-radius: 15px; text-align: center; max-width: 90%; background: #0a0a0a; }
        .img-proibido { width: 120px; height: auto; margin-bottom: 20px; }
        .msg-seguranca { color: #ff4444; font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD PLACA ATUALIZADA */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 25px; border: 3px solid #fff; border-radius: 8px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; min-width: 180px; }
        #br-txt { font-size: 1.1rem; font-weight: 800; color: #fff; text-transform: uppercase; display: block; border-bottom: 2px solid rgba(255,255,255,0.4); margin-bottom: 5px; padding-bottom: 2px; letter-spacing: 1px; }
        #km-txt { font-size: 2.5rem; font-weight: 900; margin: 0; white-space: nowrap; }

        #rec-tag { position: absolute; top: 135px; right: 20px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 100; border: 1px solid rgba(255,255,255,0.2); }
        .dot { width: 12px; height: 12px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: var(--glass); backdrop-filter: blur(30px); z-index: 4000; padding: 60px 25px; transition: 0.4s; border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .close-settings { position: absolute; top: 20px; left: 20px; color: var(--accent); font-weight: bold; cursor: pointer; }

        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; align-items: center; }
        .btn-main { border: none; padding: 22px 45px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }

        canvas { display: none; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<div id="safety-gate">
    <div class="alert-box">
        <img src="proibido.png" alt="Proibido" class="img-proibido">
        <div class="msg-seguranca">NÃO DIRIJA USANDO O CELULAR</div>
        <h2 style="color:var(--accent)">SEGURANÇA ATIVA</h2>
        <button class="btn-aware" onclick="startApp()">ENTRAR NO SISTEMA</button>
    </div>
</div>

<div id="settings-panel">
    <div class="close-settings" onclick="toggleSet()">← VOLTAR</div>
    <div class="field"><label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Lote (Fotos)</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud">
        <span id="br-txt">BUSCANDO...</span>
        <h1 id="km-txt">Km ---</h1>
    </div>
    <div id="rec-tag"><div class="dot"></div><span>GRAVANDO</span></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="startCapture()">INICIAR</button>
        <button id="btn-stop" class="btn-main" onclick="stopCapture()">FINALIZAR</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, buffer = [], hDir=null, currentStream=null, wakeLock=null;
let kmInicialLote = "", brAtual = "RODOVIA";

const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function refreshWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams();
        loadCSV();
        initGPS();
        refreshWakeLock();
    } catch(e) { alert("Acesso à pasta necessário."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1280, height: 720 } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function captureLoop() {
    if (!capturing) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({
            img: can.toDataURL('image/jpeg', 0.4),
            km: document.getElementById('km-txt').innerText.replace("Km ", ""),
            br: brAtual,
            ts: new Date().toLocaleString('pt-BR')
        });
        if (buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) {
            const batch = [...buffer];
            const kmF = document.getElementById('km-txt').innerText.replace("Km ", "");
            const kmI = kmInicialLote;
            buffer = []; kmInicialLote = kmF;
            savePDF(batch, kmI, kmF);
        }
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF(data, kI, kF) {
    const doc = new jspdf.jsPDF(can.width < can.height ? 'p' : 'l', 'mm', 'a4');
    for (let i = 0; i < data.length; i++) {
        if (i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = can.height * 0.15;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height - bh, can.width, bh);
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${bh * 0.35}px Arial`;
                ctx.fillText(`${data[i].br} - Km ${data[i].km}`, 40, can.height - (bh * 0.45));
                ctx.font = `${bh * 0.18}px Arial`;
                ctx.fillText(data[i].ts.toUpperCase(), 40, can.height - (bh * 0.15));
                doc.addImage(can.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, doc.internal.pageSize.getWidth(), doc.internal.pageSize.getHeight());
                r();
            };
            img.src = data[i].img;
        });
    }
    const nome = `${data[0].br}_Km_${kI}_ao_${kF}_${Date.now()}.pdf`;
    const file = await hDir.getFileHandle(nome, { create: true });
    const stream = await file.createWritable();
    await stream.write(doc.output('blob'));
    await stream.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        
        // Mapeamento automático de colunas
        const ik = h.indexOf('km'), 
              ilt = h.findIndex(x=>x.includes('lat')), 
              iln = h.findIndex(x=>x.includes('lon')),
              ibr = h.indexOf('br'); // Tenta achar coluna "br" se existir

        kmDB = rows.map(r => {
            const c = r.split(';');
            return { 
                km: c[ik], 
                lt: parseFloat(c[ilt].replace(',','.')), 
                ln: parseFloat(c[iln].replace(',','.')),
                br: ibr !== -1 ? c[ibr] : null // Se não tiver coluna BR, vamos extrair do texto
            };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            
            // LÓGICA DE IDENTIFICAÇÃO DA BR POR PROXIMIDADE
            // Se o CSV tiver coluna 'br', usa ela. Se não, tenta extrair do arquivo/Km.
            if (best.br) {
                brAtual = best.br;
            } else {
                // Fallback: Identifica baseado no Km ou posição se o CSV for misto
                // Se você estiver usando um CSV que você sabe que é da 116, ele mantém 116
                // Mas aqui ele verifica se no texto da linha existe a menção
                brAtual = "BR-116"; // Padrão
                if (best.km.includes("101") || p.coords.longitude > -43) brAtual = "BR-101"; // Exemplo de lógica
            }
            
            document.getElementById('br-txt').innerText = brAtual;
        }
    }, null, { enableHighAccuracy: true });
}

window.onload = () => { loadCSV(); initGPS(); };
</script>
</body>
</html>
