<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V12 - OBSIDIAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --danger: #cc0000; --glass: rgba(10, 10, 10, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* Splash Profissional */
        #splash { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .loader { width: 45px; height: 45px; border: 2px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avisos Temporários */
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--glass); padding: 20px 40px; border-radius: 12px; border: 1px solid var(--accent); z-index: 2000; display: none; backdrop-filter: blur(10px); font-weight: bold; text-align: center; }

        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }
        #cam-container { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* KM Display Flutuante */
        #km-display { position: absolute; top: 25px; left: 25px; background: var(--safety); padding: 15px 30px; border-radius: 8px; border-left: 8px solid #fff; font-size: 2.5rem; font-weight: 900; z-index: 10; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
        
        /* Botão de Ajustes Discreto */
        #gear-btn { position: absolute; top: 25px; right: 25px; width: 50px; height: 50px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #666; cursor: pointer; border: 1px solid #333; transition: 0.3s; z-index: 20; }
        #gear-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* Barra de Controle Inferior Minimalista */
        #bottom-ctrl { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 30px; width: 90%; max-width: 500px; background: var(--glass); padding: 12px 35px; border-radius: 60px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 20; justify-content: space-between; }
        .stat-group { text-align: center; }
        .stat-group small { font-size: 10px; color: #555; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .stat-group b { font-size: 1.2rem; color: #fff; }

        .btn-main { border: none; border-radius: 35px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 16px 45px; font-size: 14px; transition: 0.3s; }
        #btn-action { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }

        /* Menu Lateral */
        #settings { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #080808; z-index: 500; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 30px; border-left: 2px solid var(--accent); }
        #settings.open { right: 0; }
        .set-row { margin-bottom: 30px; }
        .set-row label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        select, input { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 14px; border-radius: 10px; font-size: 14px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader"></div>
    <h2 style="margin-top:25px; font-weight: 300; letter-spacing: 5px;">INSPEÇÃO<b style="color:var(--accent)">PRO</b></h2>
</div>

<div id="toast">CONFIGURANDO REPOSITÓRIO...</div>

<div id="settings">
    <div onclick="toggleSet()" style="color:#444; cursor:pointer; margin-bottom:30px; font-size:12px; font-weight: bold;">[ FECHAR AJUSTES ]</div>
    <div class="set-row">
        <label>LENTE ÓPTICA</label>
        <select id="cam-select" onchange="switchCam(this.value)"></select>
    </div>
    <div class="set-row">
        <label>TAXA DE CAPTURA (MS)</label>
        <input type="number" id="cfg-int" value="200">
    </div>
    <div class="set-row">
        <label>LIMITE DO LOTE</label>
        <input type="number" id="cfg-lote" value="200">
    </div>
</div>

<div id="app-shell">
    <div id="cam-container">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-display">Km ---+---</div>
        <div id="gear-btn" onclick="toggleSet()">⚙️</div>

        <div id="bottom-ctrl">
            <div class="stat-group"><small>Lote</small><b id="stat-batch">0</b></div>
            <button id="btn-action" class="btn-main">Iniciar Inspeção</button>
            <button id="btn-stop" class="btn-main">Finalizar Lote</button>
            <div class="stat-group"><small>Total</small><b id="stat-total">0</b></div>
        </div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null, currentStream = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

window.onload = () => {
    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
    setTimeout(() => document.getElementById('splash').remove(), 800); }, 1800);
    listCams(); loadCSV(); initG();
};

async function listCams() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        stream.getTracks().forEach(t => t.stop());
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `Câmera de Inspeção ${i + 1}`;
            sel.appendChild(opt);
        });
        if(videoDevices.length > 0) initC(videoDevices.deviceId);
    } catch(e) { console.error("Hardware Lock"); }
}

async function initC(id) {
    if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); vid.srcObject = null; }
    const constraints = { video: { deviceId: id ? { exact: id } : undefined, width: { ideal: 1920 }, height: { ideal: 1080 } } };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream; vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
    } catch (err) {
        const fallback = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id } });
        currentStream = fallback; vid.srcObject = fallback;
    }
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-display').innerText = "Km " + n.km;
}

function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 4;
    ctx.strokeRect(12, 12, w-24, h-24);
    const barH = h * 0.16;
    const grd = ctx.createLinearGradient(0, h - barH, 0, h);
    grd.addColorStop(0, "transparent");
    grd.addColorStop(1, "rgba(0,0,0,0.8)");
    ctx.fillStyle = grd; ctx.fillRect(0, h - barH, w, barH);
    ctx.lineJoin = "round"; ctx.textAlign = "left";
    const fK = barH * 0.42;
    ctx.font = `900 ${fK}px Arial Black`;
    ctx.lineWidth = 12; ctx.strokeStyle = "#000";
    ctx.strokeText("Km " + m.km, 50, h - (barH * 0.55));
    ctx.fillStyle = "#fff"; ctx.fillText("Km " + m.km, 50, h - (barH * 0.55));
    const fD = barH * 0.20;
    ctx.font = `bold ${fD}px Arial`;
    ctx.lineWidth = 8; ctx.strokeStyle = "#000";
    ctx.strokeText(m.ts, 50, h - (barH * 0.22));
    ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.fillText(m.ts, 50, h - (barH * 0.22));
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = 297, ph = 210;
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                const imgRatio = can.width / can.height;
                let dw = pw, dh = pw / imgRatio;
                let dx = 0, dy = (ph - dh) / 2;
                if(dh > ph) { dh = ph; dw = ph * imgRatio; dy = 0; dx = (pw - dw) / 2; }
                doc.setFillColor(12, 12, 12); doc.rect(0, 0, pw, ph, 'F'); 
                doc.addImage(can.toDataURL('image/jpeg', 0.85), 'JPEG', dx, dy, dw, dh);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`INSPECAO_LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ raw: can.toDataURL('image/jpeg', 0.45), km: document.getElementById('km-display').innerText.replace("Km ", ""), ts: new Date().toLocaleString('pt-BR') });
        total++;
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-batch').innerText = buffer.length;
        if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 200)) save();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

document.getElementById('btn-action').onclick = async () => {
    // 1. Full Screen Imediato
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    
    // 2. Mostrar aviso e abrir pasta
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    toast.innerText = "SELECIONE A PASTA DE DESTINO...";
    
    setTimeout(async () => {
        try {
            hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
            toast.style.display = 'none';
            rec = true; loop();
            document.getElementById('btn-action').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';
        } catch(e) { toast.style.display = 'none'; }
    }, 1500);
};

document.getElementById('btn-stop').onclick = () => {
    rec = false; save();
    document.getElementById('btn-action').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
};

function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
