<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V12 - KM FIXO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --danger: #ff4444; --glass: rgba(10, 10, 10, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* VÍDEO FUNDO TOTAL */
        #cam-layer { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD SUPERIOR - KM SEMPRE VISÍVEL */
        #hud-top { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 100;
        }
        .placa-km { 
            background: linear-gradient(180deg, #056b3c 0%, #01311b 100%); 
            padding: 10px 30px; border: 2px solid #fff; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); pointer-events: none;
            transition: transform 0.3s ease;
        }
        #km-txt { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; color: #fff; }

        /* BOTÕES DE AJUSTE (SOMEM NO HIDE) */
        #side-btns { display: flex; flex-direction: column; gap: 15px; transition: 0.5s; }
        .circle-btn { 
            width: 50px; height: 50px; background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2); font-size: 22px; cursor: pointer;
        }

        /* DOCK DE COMANDOS (AUTO-HIDE) */
        #ui-dock {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; background: var(--glass); backdrop-filter: blur(25px);
            padding: 22px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        
        /* ESTADOS DE OCULTAÇÃO */
        .hide-ui { bottom: -180px !important; opacity: 0; pointer-events: none; }
        .hide-controls { opacity: 0; pointer-events: none; transform: translateX(20px); }

        /* BOTÕES */
        .btn-main { width: 100%; border: none; border-radius: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-start { background: linear-gradient(90deg, #00ff88, #009e54); color: #00331b; height: 85px; font-size: 1.2rem; }
        .btn-stop { background: linear-gradient(90deg, #ff4444, #b30000); color: #fff; height: 85px; font-size: 1.2rem; }
        .btn-folder { background: #fff; color: #000; height: 48px; margin-bottom: 12px; font-size: 13px; }
        .btn-main:active { transform: scale(0.95); filter: brightness(1.2); }

        /* STATUS E INFO */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .box-stat { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 15px; text-align: center; }
        .box-stat b { font-size: 1.4rem; color: var(--gold); font-family: monospace; }
        .box-stat small { color: #888; font-weight: bold; font-size: 10px; }

        /* PAINEL DE AJUSTES */
        #side-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 5000; display: none; padding: 45px 30px; }
        .panel-row { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        label { color: var(--gold); font-size: 11px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; }
        select, input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 15px; outline: none; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="cam-layer"><video id="vid" autoplay playsinline muted></video></div>

<div id="hud-top">
    <div class="placa-km"><div id="km-txt">KM ---+---</div></div>
    
    <div id="side-btns">
        <div class="circle-btn" onclick="toggleSettings()">⚙️</div>
        <div class="circle-btn" onclick="switchCam()">🔄</div>
    </div>
</div>

<div id="ui-dock">
    <div class="grid-stats">
        <div class="box-stat"><small>LOTE ATUAL</small><br><b id="v-batch">0/50</b></div>
        <div class="box-stat"><small>TOTAL PDF</small><br><b id="v-total">0</b></div>
    </div>
    <button id="btn-dir" class="btn-main btn-folder" onclick="pickFolder()">📁 SELECIONAR PASTA DESTINO</button>
    <button id="btn-start" class="btn-main btn-start" disabled onclick="startApp()">▶ INICIAR INSPEÇÃO</button>
    <button id="btn-stop" class="btn-main btn-stop" style="display:none" onclick="stopApp()">■ FINALIZAR LOTE</button>
    <div id="status" style="font-size:10px; color:#555; text-align:center; margin-top:8px; letter-spacing:1px;">ENGINE V12 | KM FIXED MODE</div>
</div>

<div id="side-panel">
    <h2 style="margin-bottom:35px; font-weight:900; letter-spacing:-1px; border-bottom:2px solid var(--gold); padding-bottom:10px;">AJUSTES TÉCNICOS</h2>
    <div class="panel-row">
        <label>Câmera Ativa</label>
        <select id="cam-list" onchange="initCam(this.value)"></select>
    </div>
    <div class="panel-row">
        <label>Fotos por PDF</label>
        <input type="number" id="cfg-batch" value="50">
    </div>
    <div class="panel-row">
        <label>Intervalo de Captura (ms)</label>
        <input type="number" id="cfg-ms" value="800">
    </div>
    <div class="panel-row">
        <label>Qualidade do Arquivo</label>
        <select id="cfg-quality"><option value="0.5">Econômica</option><option value="0.75" selected>Padrão</option><option value="0.9">Alta Definição</option></select>
    </div>
    <button class="btn-main btn-folder" onclick="toggleSettings()">SALVAR E VOLTAR</button>
</div>

<canvas id="proc"></canvas>

<script>
let kmDB=[], gps=null, active=false, buffer=[], total=0, batchCount=0, hFolder=null, uiTimer, cams=[];
const vid=document.getElementById('vid'), proc=document.getElementById('proc'), ctx=proc.getContext('2d');

window.onload = async () => { await loadCams(); loadCSV(); initGPS(); wakeUI(); };

async function loadCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    cams = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-list');
    cams.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = c.deviceId; opt.text = c.label || `Lente ${i+1}`;
        sel.appendChild(opt);
    });
    if(cams.length) initCam(cams[cams.length-1].deviceId);
}

async function initCam(id) {
    if(vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { proc.width = vid.videoWidth; proc.height = vid.videoHeight; vid.play(); };
}

function switchCam() {
    let current = document.getElementById('cam-list').selectedIndex;
    let next = (current + 1) % cams.length;
    document.getElementById('cam-list').selectedIndex = next;
    initCam(cams[next].deviceId);
    vibrate(30);
}

function wakeUI() {
    document.getElementById('ui-dock').classList.remove('hide-ui');
    document.getElementById('side-btns').classList.remove('hide-controls');
    clearTimeout(uiTimer);
    if(active) {
        uiTimer = setTimeout(() => {
            document.getElementById('ui-dock').classList.add('hide-ui');
            document.getElementById('side-btns').classList.add('hide-controls');
        }, 4000);
    }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const head = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=head.indexOf('km'), ilt=head.findIndex(x=>x.includes('lat')), iln=head.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        gps = { lat: p.coords.latitude, lon: p.coords.longitude };
        if(kmDB.length) {
            let near = null, dMin = Infinity;
            for(const pt of kmDB) {
                const d = Math.hypot(pt.lt - gps.lat, pt.ln - gps.lon);
                if(d < dMin) { dMin = d; near = pt; }
            }
            if(near) document.getElementById('km-txt').innerText = "KM " + near.km;
        }
    }, null, {enableHighAccuracy: true});
}

async function pickFolder() {
    try {
        hFolder = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-dir').innerText = "✓ PASTA PRONTA";
        document.getElementById('btn-start').disabled = false;
        vibrate(50);
    } catch(e) {}
}

function startApp() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    active = true;
    vibrate();
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';
    loop();
}

function stopApp() {
    active = false;
    vibrate(200);
    document.getElementById('btn-start').style.display = 'flex';
    document.getElementById('btn-stop').style.display = 'none';
    saveBatch();
}

function loop() {
    if(!active) return;
    ctx.drawImage(vid, 0, 0, proc.width, proc.height);
    const q = parseFloat(document.getElementById('cfg-quality').value);
    buffer.push({
        raw: proc.toDataURL('image/jpeg', q),
        km: document.getElementById('km-txt').innerText.replace("KM ", ""),
        ts: new Date().toLocaleString('pt-BR').toUpperCase()
    });
    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${document.getElementById('cfg-batch').value}`;
    if(buffer.length >= parseInt(document.getElementById('cfg-batch').value)) saveBatch();
    setTimeout(loop, parseInt(document.getElementById('cfg-ms').value));
}

async function saveBatch() {
    if(!buffer.length || !hFolder) return;
    const items = [...buffer]; buffer = []; batchCount++;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const bh = proc.height * 0.16;
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, proc.height-bh, proc.width, bh);
                ctx.fillStyle = "#ffcc00"; ctx.font = `bold ${bh*0.48}px Arial`;
                ctx.fillText("KM " + items[i].km, 60, proc.height-(bh*0.42));
                ctx.fillStyle = "#fff"; ctx.font = `${bh*0.16}px monospace`;
                ctx.fillText(items[i].ts, 60, proc.height-(bh*0.18));
                doc.addImage(proc.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    const fName = `LOTE_${batchCount}_KM_${items.km.replace('+','-')}.pdf`;
    const handle = await hFolder.getFileHandle(fName, {create:true});
    const writable = await handle.createWritable();
    await writable.write(doc.output('blob')); await writable.close();
    vibrate();
}

function toggleSettings() { 
    const p = document.getElementById('side-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
    vibrate(10);
}

function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
</script>
</body>
</html>
