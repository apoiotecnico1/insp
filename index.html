<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Apoio Tecnico Relatorio Km</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00ff41; /* Verde Matrix */
            --danger: #ff0000; 
            --glass: rgba(0, 0, 0, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* Gate de Segurança Profissional */
        #safety-gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .alert-box { border: 2px solid var(--accent); padding: 40px; border-radius: 5px; text-align: center; max-width: 90%; background: #050505; }
        .msg-seguranca { color: var(--danger); font-weight: 900; margin-bottom: 20px; font-size: 1.4rem; border: 1px solid var(--danger); padding: 10px; text-transform: uppercase; }
        .btn-aware { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* Interface Principal */
        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: contrast(1.5) brightness(0.8) grayscale(0.5); 
        }
        
        .technical-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            border: 1px solid rgba(0, 255, 65, 0.1);
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4) 100%);
        }

        /* HUD de Engenharia */
        #km-hud { 
            position: absolute; top: 30px; left: 30px; 
            background: #fff; color: #000; 
            padding: 10px 25px; border: 5px solid #000; 
            z-index: 100; box-shadow: 8px 8px 0 var(--accent);
            text-align: center; min-width: 180px;
        }
        #br-txt { font-size: 0.9rem; font-weight: 900; display: block; border-bottom: 2px solid #000; margin-bottom: 4px; text-transform: uppercase; }
        #km-txt { font-size: 2.8rem; font-weight: 900; font-family: 'Courier New', monospace; line-height: 1; }

        #rec-tag { 
            position: absolute; top: 30px; right: 30px; 
            background: var(--danger); color: #fff; 
            padding: 10px 20px; font-weight: bold; font-size: 1.1rem;
            display: flex; align-items: center; gap: 10px; border-radius: 4px; opacity: 0; z-index: 100;
        }
        .dot { width: 14px; height: 14px; background: #fff; border-radius: 50%; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Controles */
        .auto-hide { transition: opacity 0.5s ease; opacity: 1; }
        .hidden { opacity: 0; pointer-events: none; }

        #ui-controls { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 500; }
        .btn-main { border: none; padding: 22px 35px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; border-radius: 4px; }
        #btn-start { background: var(--accent); color: #000; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        #gear-btn { width: 65px; background: #333; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 4px; }

        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%; 
            background: var(--glass); z-index: 4000; padding: 40px 25px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 2px solid var(--accent); 
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: var(--accent); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 0; }

        #no-sleep-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display: none; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body onclick="refreshWakeLock()">

<video id="no-sleep-video" playsinline muted loop></video>
<div id="flash"></div>

<div id="safety-gate">
    <div class="alert-box">
        <div class="msg-seguranca">OPERAÇÃO TÉCNICA EM RODOVIA</div>
        <h2 style="margin-bottom: 10px;">FOTO-CAPTURA PROFISSIONAL</h2>
        <p style="margin-bottom: 30px; color: #888;">NÃO DIRIJA USANDO O CELULAR.<br>Sistema de monitoramento e inspeção ativo.</p>
        <button class="btn-aware" onclick="startApp()">Acessar</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom: 20px;">CONFIGURAÇÕES</h3>
    <div class="field"><label>Câmera / Sensor</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo de Captura (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Fotos por Relatório (Lote)</label><input type="number" id="cfg-lote" value="50"></div>
    <div class="field"><label>Filtro de Visão</label>
        <select id="cfg-filter" onchange="applyLiveFilter(this.value)">
            <option value="grayscale(0.5) contrast(1.5)">Análise Noturna (Padrão)</option>
            <option value="sepia(1) contrast(1.2)">Redução de Ofuscamento</option>
            <option value="none">Cores Reais</option>
            <option value="invert(1) grayscale(1)">Raio-X (Estruturas)</option>
        </select>
    </div>
    <button class="btn-aware" onclick="toggleSet()" style="width: 100%; padding: 12px; font-size: 10px;">FECHAR</button>
</div>

<div id="app-shell">
    <div class="video-container">
        <video id="vid" autoplay playsinline muted onclick="handleScreenClick(event)"></video>
        <div class="technical-overlay"></div>
    </div>
    
    <div id="km-hud">
        <span id="br-txt">Inicializando GPS</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="rec-tag"><div class="dot"></div><span>ON</span></div>

    <div id="ui-controls" class="auto-hide">
        <div id="gear-btn" onclick="event.stopPropagation(); toggleSet()">⚙</div>
        <button id="btn-start" class="btn-main" onclick="event.stopPropagation(); startCapture()">Iniciar Captura</button>
        <button id="btn-stop" class="btn-main" onclick="event.stopPropagation(); stopCapture()">Fechar relatorio</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, currentStream=null, wakeLock=null, hideTimeout;
let kmInicialLote = "", brAtual = "RODOVIA", buffer = [];
let curLat = "0.0000", curLon = "0.0000";

const vid = document.getElementById('vid');
const noSleepVid = document.getElementById('no-sleep-video');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function refreshWakeLock() {
    if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
}

async function keepScreenAlive() {
    refreshWakeLock();
    if (noSleepVid.paused) {
        noSleepVid.src = "https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3";
        noSleepVid.play().catch(()=>{});
    }
}
setInterval(keepScreenAlive, 15000);

function handleScreenClick(e) {
    const controls = document.querySelector('.auto-hide');
    controls.classList.remove('hidden');
    captureJPG(); 
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => { if(capturing) controls.classList.add('hidden'); }, 3000);
}

function doFlash() {
    const f = document.getElementById('flash');
    f.style.opacity = '0.5';
    setTimeout(() => f.style.opacity = '0', 150);
}

async function startApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        keepScreenAlive();
        listCams(); 
        await loadCSV(); 
        initGPS();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    } catch(e) { alert("Selecione a pasta de destino."); }
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Sensor ${i+1}</option>`).join('');
    if(vids.length) switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ 
        video: { deviceId: id, width: {ideal: 1920}, height: {ideal: 1080} } 
    });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function applyLiveFilter(val) { vid.style.filter = val; }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("Km ", "");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-tag').style.opacity = '1';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if(buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("Km ", ""));
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
    document.querySelector('.auto-hide').classList.remove('hidden');
}

function captureLoop() {
    if (!capturing) return;
    const currentKm = document.
