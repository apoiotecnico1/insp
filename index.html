<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE RELATÓRIO FOTOGRÁFICO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --placa-verde: #007934; 
            --danger: #cc0000; 
            --dark-bg: #121212;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

        /* TELA DE ADVERTÊNCIA DIRETA */
        #safety-gate { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 30px; 
        }
        .safety-box { max-width: 500px; text-align: center; border: 1px solid #333; padding: 40px; border-radius: 12px; background: #0a0a0a; }
        .safety-box h2 { color: var(--danger); margin-bottom: 25px; font-size: 1.5rem; text-transform: uppercase; }
        .safety-box p { font-size: 18px; line-height: 1.6; color: #ccc; margin-bottom: 35px; }
        .btn-proceed { width: 100%; background: var(--accent); color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; border-radius: 8px; }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: none; height: 100vh; width: 100vw; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }

        /* HUD DE INFORMAÇÕES */
        #km-hud { position: absolute; top: 20px; left: 20px; background: var(--placa-verde); padding: 10px 20px; border: 2px solid #fff; border-radius: 8px; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #km-hud h1 { font-size: 2rem; font-weight: 800; }

        #rec-status { position: absolute; top: 20px; right: 20px; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 6px; z-index: 10; border: 1px solid #f00; color: #f00; font-weight: bold; }
        .dot { width: 10px; height: 10px; background: #f00; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* PAINEL DE CONFIGURAÇÕES LATERAIS */
        #settings-panel { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #1a1a1a; z-index: 4000; padding: 30px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #333; }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; font-size: 14px; border-radius: 6px; }

        /* BOTÕES DE CONTROLE */
        #ui-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100; }
        .btn-main { border: none; font-weight: bold; cursor: pointer; padding: 18px 35px; font-size: 14px; background: var(--accent); color: #000; text-transform: uppercase; border-radius: 8px; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.95); }
        #gear-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); color: #fff; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-size: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        canvas { display: none; }
    </style>
</head>
<body onclick="forceFull()">

<div id="safety-gate">
    <div class="safety-box">
        <h2>AVISO DE SEGURANÇA</h2>
        <p>O uso deste aplicativo é restrito a <b>passageiros</b>. Nunca manuseie o dispositivo enquanto estiver dirigindo.</p>
        <button class="btn-proceed" onclick="requestAccess()">ACEITAR E CONTINUAR</button>
    </div>
</div>

<div id="settings-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <span style="font-size: 14px; font-weight: bold; color: #fff;">CONFIGURAÇÕES</span>
        <button onclick="toggleSet()" style="background:none; border:none; color:#777; font-size: 24px;">×</button>
    </div>

    <div class="field">
        <label>Câmera Disponível</label>
        <select id="cam-select" onchange="initC(this.value)"></select>
    </div>
    <div class="field">
        <label>Fotos por Lote (PDF)</label>
        <input type="number" id="cfg-lote" value="200">
    </div>
    <div class="field">
        <label>Intervalo entre capturas (ms)</label>
        <input type="number" id="cfg-int" value="200">
    </div>
    
    <button class="btn-main" style="width:100%; margin-top: 20px;" onclick="toggleSet()">SALVAR E VOLTAR</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    
    <div id="km-hud"><h1 id="km-txt">KM ---</h1></div>
    
    <div id="rec-status"><div class="dot"></div><span>GRAVANDO</span></div>

    <div id="ui-controls">
        <button id="gear-btn" onclick="toggleSet(); event.stopPropagation();">⚙️</button>
        <button id="btn-start" class="btn-main" onclick="initCapture(); event.stopPropagation();">INICIAR CAPTURA</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture(); event.stopPropagation();">PARAR E SALVAR</button>
    </div>
</div>

<canvas id="can_cap"></canvas>

<script>
let kmDB=[], rec=false, buffer=[], currentStream=null, wakeLock=null, dirHandle=null;
let kmInicialLote = "";
const vid=document.getElementById('vid');
const canCap=document.getElementById('can_cap'), ctxCap=canCap.getContext('2d');
const canOff = document.createElement('canvas');
const ctxOff = canOff.getContext('2d');

function forceFull() { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen({ navigationUI: "hide" }).catch(() => {}); }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

async function requestAccess() {
    try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (await dirHandle.queryPermission({mode:'readwrite'}) !== 'granted') await dirHandle.requestPermission({mode:'readwrite'});
        if(dirHandle) unlockSystem();
    } catch (e) { alert("É necessário conceder permissão à pasta para salvar os arquivos."); }
}

async function unlockSystem() {
    document.getElementById('safety-gate').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    forceFull();
    await listCams();
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    loadCSV(); 
    initGPS();
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">CÂMERA ${i+1} ${d.label ? '- ' + d.label : ''}</option>`).join('');
    const back = vids.find(d => d.label.toLowerCase().includes('back')) || vids[vids.length-1];
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: {ideal: 1280}, height: {ideal: 720} } });
    vid.srcObject = currentStream;
}

function initCapture() {
    rec = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText.replace("KM ","");
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('rec-status').style.display = 'flex';
    loop();
}

function stopCapture() {
    if(buffer.length > 0) saveAuto([...buffer], kmInicialLote, document.getElementById('km-txt').innerText.replace("KM ",""));
    rec = false; buffer = [];
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-status').style.display = 'none';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        canCap.width = vid.videoWidth; canCap.height = vid.videoHeight;
        ctxCap.drawImage(vid, 0, 0);
        const curKm = document.getElementById('km-txt').innerText.replace("KM ","");
        buffer.push({ raw: canCap.toDataURL('image/jpeg', 0.4), km: curKm, ts: new Date().toLocaleTimeString('pt-BR') });
        let limite = parseInt(document.getElementById('cfg-lote').value) || 200;
        if(buffer.length >= limite) {
            saveAuto([...buffer], kmInicialLote, curKm);
            buffer = []; kmInicialLote = curKm;
        }
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function saveAuto(data, ini, fim) {
    const pdfW = canCap.width, pdfH = canCap.height;
    canOff.width = pdfW; canOff.height = pdfH;
    const doc = new jspdf.jsPDF(pdfW > pdfH ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<data.length; i++){
        if(i > 0) doc.addPage();
        await new Promise(r => {
            const img = new Image();
            img.onload = () => {
                ctxOff.drawImage(img, 0, 0);
                const bh = pdfH * 0.12;
                ctxOff.fillStyle = "rgba(0,0,0,0.8)"; ctxOff.fillRect(0, pdfH-bh, pdfW, bh);
                ctxOff.fillStyle = "#fff"; ctxOff.font = `bold ${bh*0.4}px Arial`;
                ctxOff.fillText(`Km ${data[i].km}`, 40, pdfH-(bh*0.45));
                ctxOff.font = `${bh*0.2}px Arial`;
                ctxOff.fillText(`${new Date().toLocaleDateString('pt-BR')} | ${data[i].ts}`, 40, pdfH-(bh*0.15));
                doc.addImage(canOff.toDataURL('image/jpeg', 0.6), 'JPEG', 0, 0, pw, ph); r();
            };
            img.src = data[i].raw;
        });
    }
    const d = new Date();
    const p = (n) => n.toString().padStart(2, '0');
    const nome = `Km_${ini}_a_${fim}_${p(d.getDate())}${p(d.getMonth()+1)}.pdf`;
    try {
        const fh = await dirHandle.getFileHandle(nome, { create: true });
        const wr = await fh.createWritable();
        await wr.write(doc.output('blob'));
        await wr.close();
    } catch (e) { console.error("Erro ao salvar PDF:", e); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';');
        const ik = h.findIndex(x=>x.toLowerCase().includes('km')), ilt = h.findIndex(x=>x.toLowerCase().includes('lat')), iln = h.findIndex(x=>x.toLowerCase().includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.warn("CSV não carregado. Verifique se o arquivo SNVBR116SPRJ.csv está na pasta."); }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let b = null, mD = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < mD) { mD = d; b = pt; }
        }
        if(b) document.getElementById('km-txt').innerText = "KM " + b.km;
    }, null, {enableHighAccuracy:true});
}
</script>
</body>
</html>
