<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA INSPEÇÃO ORIGINAL V1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --highway-green: #056b3c; --bg-dark: #0b1224; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        #video-viewport { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* PLACA DE KM ORIGINAL (A QUE FUNCIONA) */
        #kmBoard { 
            position: absolute; top: 15px; left: 10px; right: 10px; z-index: 10;
            background: #fff; color: #0b1224; border: 4px solid #1e3a8a;
            border-radius: 12px; padding: 12px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .label { font-size: 0.8rem; font-weight: 800; color: #1e3a8a; display: block; }
        .km-display { font-size: 3.8rem; font-weight: 1000; letter-spacing: -2px; line-height: 1; }

        /* LISTA NOX E BOTÕES LATERAIS */
        #noxItems { position: absolute; top: 140px; left: 10px; right: 10px; z-index: 10; background: rgba(11,16,32,0.8); border-radius: 8px; padding: 5px; font-size: 0.8rem; border: 1px solid #1e2647; }
        .nox-row { display: flex; justify-content: space-between; padding: 3px 8px; border-bottom: 1px solid #1e2647; }
        .active-nox { color: #00ff66; font-weight: bold; }

        .side-bar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .btn-c { width: 55px; height: 55px; border-radius: 50%; border: none; background: rgba(255,255,255,0.25); color: #fff; font-size: 1.4rem; backdrop-filter: blur(5px); }

        /* CONTROLES INFERIORES */
        .hud-bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; background: linear-gradient(0deg, #000 85%, transparent); padding: 20px 15px 35px; }
        .rec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-act { padding: 18px; border-radius: 12px; border: none; font-weight: 900; text-transform: uppercase; font-size: 0.95rem; }
        #btnRec { background: #ff3333; color: #fff; }
        #btnPhoto { background: #fff; color: #000; }
        #btnStop { background: #444; color: #fff; width: 100%; margin-top: 10px; }

        .status-info { font-size: 0.7rem; color: #888; display: flex; justify-content: center; gap: 20px; margin-bottom: 8px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="video-viewport"><video id="vid" autoplay playsinline muted></video></div>

<div id="kmBoard">
    <span class="label">KM BR-116</span>
    <span id="kmValue" class="km-display">--+---</span>
</div>

<div id="noxItems"></div>

<div class="side-bar">
    <button id="btnCam" class="btn-c">🔄</button>
    <button id="btnZoom" class="btn-c">🔍</button>
</div>

<div class="hud-bottom">
    <div class="status-info">
        <span id="stGps">GPS: BUSCANDO...</span>
        <span id="stPh">FOTOS: 0</span>
    </div>
    <div class="rec-grid">
        <button id="btnRec" class="btn-act">GRAVAR VÍDEO</button>
        <button id="btnPhoto" class="btn-act">INICIAR FOTOS</button>
    </div>
    <button id="btnStop" class="btn-act" disabled>PARAR E SALVAR TUDO</button>
</div>

<canvas id="procCanvas"></canvas>

<script>
// MOTOR DE DADOS DO SEU PRIMEIRO ARQUIVO (FUNCIONAL)
let kmDataset = [], noxDataset = [];
let lastPos = null, isRecording = false, isVideo = false;
let buffer = [], photoCount = 0, currentFacing = "environment", zoomLvl = 1;

const vid = document.getElementById('vid');
const can = document.getElementById('procCanvas');
const ctx = can.getContext('2d');

// LÓGICA DE TRATAMENTO IDÊNTICA AO SEU PRIMEIRO ARQUIVO
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){ 
    const map=headers.map(h=>normalizeStr(h)); 
    for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; } 
    return -1; 
}
function parsePt(v){ 
    if(v==null) return NaN; 
    const s=String(v).trim(); 
    return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); 
}
function hav(a,b,c,d){ 
    const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; 
    const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; 
    return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); 
}

// CARGA DOS CSVs
async function load() {
    try {
        const rK = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const tK = await rK.text();
        const lK = tK.split(/\r?\n/).filter(l => l.trim() !== '');
        const hK = lK.shift().split(';');
        const iK=findColumnIndex(hK,['km']), iLaK=findColumnIndex(hK,['lat']), iLoK=findColumnIndex(hK,['lon']);
        kmDataset = lK.map(l => {
            const r = l.split(';');
            return { km: r[iK], lat: parsePt(r[iLaK]), lon: parsePt(r[iLoK]) };
        }).filter(p => !isNaN(p.lat));

        const rN = await fetch('Dados_Completos_Grupo_2_all.csv?v=' + Date.now());
        const tN = await rN.text();
        const lN = tN.split(/\r?\n/).filter(l => l.trim() !== '');
        const hN = lN.shift().split(';');
        const iI=findColumnIndex(hN,['id','idnox']), iLaN=findColumnIndex(hN,['lat']), iLoN=findColumnIndex(hN,['lon']);
        noxDataset = lN.map(l => {
            const r = l.split(';');
            return { id: r[iI], lat: parsePt(r[iLaN]), lon: parsePt(r[iLoN]) };
        }).filter(p => p.id && !isNaN(p.lat));
    } catch(e) { console.error("Erro carga"); }
}

// ATUALIZAÇÃO GPS (VARREDURA COMPLETA - A QUE DAVA CERTO)
function updateLocation() {
    if(!lastPos) return;
    const {lat, lon} = lastPos;

    let bestK = null, minD = Infinity;
    kmDataset.forEach(p => {
        const d = hav(lat, lon, p.lat, p.lon);
        if(d < minD) { minD = d; bestK = p; }
    });
    if(bestK) document.getElementById('kmValue').textContent = bestK.km;

    const nSort = noxDataset.map(p => ({...p, d: hav(lat, lon, p.lat, p.lon)}))
        .sort((a,b) => a.d - b.d).slice(0, 3);
    document.getElementById('noxItems').innerHTML = nSort.map((n, i) => 
        `<div class="nox-row ${i===0?'active-nox':''}"><span>ID: ${n.id}</span><span>${Math.round(n.d)}m</span></div>`
    ).join('');
}

// GRAVAÇÃO VÍDEO E PDF
let mediaRec; let chunks = [];
async function startRecVideo() {
    chunks = [];
    const stream = can.captureStream(24);
    mediaRec = new MediaRecorder(stream, { mimeType: 'video/webm' });
    mediaRec.ondataavailable = e => chunks.push(e.data);
    mediaRec.onstop = () => {
        const blob = new Blob(chunks, {type:'video/webm'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `VIDEO_AUDITORIA_${Date.now()}.webm`;
        a.click();
    };
    mediaRec.start();
}

function processingLoop() {
    if(!isRecording && !isVideo) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    // Overlay de dados no vídeo/foto
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(20, 20, 400, 110);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 50px Arial";
    ctx.fillText("KM: " + document.getElementById('kmValue').textContent, 40, 75);
    ctx.font = "25px Arial";
    ctx.fillText(document.querySelector('.active-nox span')?.textContent || "Buscando...", 40, 110);

    if(isRecording && Date.now() % 400 < 50) {
        buffer.push({
            img: can.toDataURL('image/jpeg', 0.5),
            km: document.getElementById('kmValue').textContent,
            id: document.querySelector('.active-nox span')?.textContent || '-',
            lat: lastPos.lat, lon: lastPos.lon
        });
        photoCount++;
        document.getElementById('stPh').textContent = "FOTOS: " + photoCount;
    }
    requestAnimationFrame(processingLoop);
}

// BOTÕES
document.getElementById('btnPhoto').onclick = () => { isRecording = true; document.getElementById('btnStop').disabled = false; processingLoop(); };
document.getElementById('btnRec').onclick = () => { isVideo = true; startRecVideo(); document.getElementById('btnStop').disabled = false; processingLoop(); };
document.getElementById('btnStop').onclick = async () => {
    if(isVideo) { mediaRec.stop(); isVideo = false; }
    if(isRecording) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF('l','mm','a4');
        buffer.forEach((p, i) => { if(i>0) doc.addPage(); doc.text(`KM: ${p.km} | ID: ${p.id} | GPS: ${p.lat},${p.lon}`, 10, 10); doc.addImage(p.img,'JPEG',5,15,287,180); });
        doc.save(`RELATORIO_${Date.now()}.pdf`);
        isRecording = false; buffer = [];
    }
    document.getElementById('btnStop').disabled = true;
};

// CÂMERA E GPS
async function init() {
    await load();
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing, width:1280}, audio:false});
    vid.srcObject = s;
    navigator.geolocation.watchPosition(p=>{
        lastPos={lat:p.coords.latitude, lon:p.coords.longitude};
        document.getElementById('stGps').textContent="GPS: OK";
        updateLocation();
    }, null, {enableHighAccuracy:true});
}

document.getElementById('btnCam').onclick = () => { currentFacing = (currentFacing==="environment"?"user":"environment"); init(); };

init();
</script>
</body>
</html>
