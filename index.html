<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO FOTOGRÁFICA V17</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --glass: rgba(5, 5, 5, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* Splash */
        #splash { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.8s; }
        .title-main { font-size: 28px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .title-main b { color: var(--accent); }
        .orbe { width: 50px; height: 50px; border: 1px solid var(--accent); border-radius: 50%; margin-top: 30px; display: flex; align-items: center; justify-content: center; color: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; transform: scale(1.1); } }

        /* Interface */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { position: absolute; top: 30px; left: 30px; background: var(--safety); padding: 15px 35px; border-radius: 4px; border-left: 10px solid #fff; z-index: 10; box-shadow: 0 20px 50px #000; }
        #km-hud h1 { font-size: 3rem; font-weight: 900; }
        
        #gear-btn { position: absolute; top: 30px; right: 30px; width: 50px; height: 50px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #555; cursor: pointer; border: 1px solid #222; z-index: 20; }

        #action-bar { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 40px; width: 92%; max-width: 500px; background: var(--glass); padding: 15px 40px; border-radius: 80px; backdrop-filter: blur(20px); border: 1px solid #222; z-index: 100; justify-content: space-between; }
        .stat-group b { font-size: 1.3rem; color: #fff; display: block; }
        .stat-group small { font-size: 9px; color: var(--accent); text-transform: uppercase; font-weight: bold; }
        .btn-main { border: none; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 18px 45px; font-size: 13px; background: var(--accent); color: #000; }

        /* Ajustes */
        #settings { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #080808; z-index: 500; transition: 0.5s; padding: 60px 30px; border-left: 1px solid var(--accent); }
        #settings.open { right: 0; }
        .close-x { position: absolute; top: 20px; right: 20px; font-size: 28px; color: #444; cursor: pointer; line-height: 1; }
        
        .field { margin-bottom: 30px; }
        .field label { font-size: 10px; color: var(--accent); margin-bottom: 8px; font-weight: bold; display: block; text-transform: uppercase; }
        select, input { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 8px; font-size: 14px; }

        canvas { display: none; }
    </style>
</head>
<body onclick="launch()">

<div id="splash">
    <div class="title-main">INSPEÇÃO <b>FOTOGRÁFICA</b></div>
    <div class="orbe">✦</div>
</div>

<div id="settings">
    <div class="close-x" onclick="toggleSet()">×</div>
    <div class="field"><label>Câmera</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Intervalo (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Fotos/Lote</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="gear-btn" onclick="toggleSet()">⚙️</div>
    <div id="action-bar">
        <div class="stat-group"><small>Lote</small><b id="stat-batch">0</b></div>
        <button id="btn-action" class="btn-main" onclick="startRec()">Iniciar</button>
        <button id="btn-stop" class="btn-main" style="display:none; background:#d00; color:#fff;" onclick="stopRec()">Concluir</button>
        <div class="stat-group"><small>Geral</small><b id="stat-total">0</b></div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], gps=null, rec=false, buffer=[], total=0, batchIdx=0, hDir=null, currentStream=null;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function launch() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    const s = document.getElementById('splash'); 
    if(s) { 
        s.style.opacity='0'; 
        setTimeout(()=>{
            s.remove(); 
            document.getElementById('app-shell').style.visibility='visible'; 
            document.getElementById('app-shell').style.opacity='1';
        }, 800); 
    }
}

window.onload = () => { loadCSV(); initG(); listCams(); };

async function listCams() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        stream.getTracks().forEach(t => t.stop());
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId; opt.text = `Lente ${i + 1}`;
            sel.appendChild(opt);
        });
        // Inicia automaticamente com a câmera traseira se disponível
        const backCam = videoDevices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('traseira')) || videoDevices;
        if(backCam) {
            sel.value = backCam.deviceId;
            initC(backCam.deviceId);
        }
    } catch(e) {}
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const constraints = { video: { deviceId: id ? { exact: id } : undefined, width: { ideal: 1920 }, height: { ideal: 1080 } } };
    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream; vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
    } catch (err) {
        const fallback = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        currentStream = fallback; vid.srcObject = fallback;
    }
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
}

function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    const barH = h * 0.16;
    const grd = ctx.createLinearGradient(0, h-barH, 0, h);
    grd.addColorStop(0, "transparent"); grd.addColorStop(1, "rgba(0,0,0,0.9)");
    ctx.fillStyle = grd; ctx.fillRect(0, h-barH, w, barH);
    ctx.lineJoin = "round"; ctx.textAlign = "left";
    const fK = barH * 0.45;
    ctx.font = `900 ${fK}px Inter, sans-serif`;
    ctx.lineWidth = 14; ctx.strokeStyle = "#000";
    ctx.strokeText("Km " + m.km, 60, h-(barH*0.55));
    ctx.fillStyle = "#fff"; ctx.fillText("Km " + m.km, 60, h-(barH*0.55));
    const fD = barH * 0.22;
    ctx.font = `500 ${fD}px Inter, sans-serif`;
    ctx.lineWidth = 8; ctx.strokeStyle = "#000";
    ctx.strokeText(m.ts, 60, h-(barH*0.2));
    ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.fillText(m.ts, 60, h-(barH*0.2));
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ raw: can.toDataURL('image/jpeg', 0.45), km: document.getElementById('km-txt').innerText.replace("Km ", ""), ts: new Date().toLocaleString('pt-BR').toUpperCase() });
        total++;
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-batch').innerText = buffer.length;
        if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) save();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function startRec() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        rec = true; loop();
        document.getElementById('btn-action').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'inline-block';
    } catch(e) {}
}

function stopRec() {
    rec = false; save();
    document.getElementById('btn-action').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
}

function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
