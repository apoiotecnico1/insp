<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Captura Técnica BR-116</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --placa: #007934; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* Gate de Entrada */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .box { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 20px; }
        .btn-go { background: var(--accent); color: #000; border: none; padding: 20px 50px; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }

        /* App Principal */
        #app { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD KM */
        #hud { position: absolute; top: 20px; left: 20px; background: var(--placa); padding: 15px 25px; border: 3px solid #fff; border-radius: 10px; z-index: 100; }
        #hud h1 { font-size: 2.5rem; font-weight: 900; }

        /* BOTÃO WHATSAPP (GRANDE E FLUTUANTE) */
        #wa-btn { 
            position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
            background: var(--whatsapp); width: 90px; height: 90px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #fff; z-index: 500; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #wa-btn span { font-size: 10px; font-weight: bold; margin-top: 5px; color: #fff; }

        /* Controles Inferiores */
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; align-items: center; }
        .btn { padding: 20px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #start { background: var(--accent); }
        #stop { background: #f00; color: #fff; display: none; }
        #gear { background: rgba(255,255,255,0.2); font-size: 24px; padding: 15px; }

        #panel { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.9); padding: 50px 20px; transition: 0.3s; z-index: 1000; }
        #panel.open { right: 0; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <div class="box">
        <h2 style="color:red; margin-bottom:20px;">SEGURANÇA EM PRIMEIRO LUGAR</h2>
        <button class="btn-go" onclick="init()">INICIAR SISTEMA</button>
    </div>
</div>

<div id="app">
    <video id="v" autoplay playsinline muted></video>
    <div id="hud"><h1 id="km-display">Km ---+---</h1></div>

    <div id="wa-btn" onclick="snapAndShare()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="40">
        <span>ENVIAR FOTO</span>
    </div>

    <div id="controls">
        <button id="gear" onclick="document.getElementById('panel').classList.toggle('open')">⚙️</button>
        <button id="start" class="btn" onclick="startCapture()">Iniciar Relatório PDF</button>
        <button id="stop" class="btn" onclick="stopCapture()">Finalizar e Salvar</button>
    </div>
</div>

<div id="panel">
    <button onclick="document.getElementById('panel').classList.remove('open')" style="color:yellow; background:none; border:none; margin-bottom:20px;">X FECHAR</button>
    <div style="margin-bottom:15px;">
        <label>Câmera:</label><br>
        <select id="cam-sel" onchange="changeCam(this.value)" style="width:100%; padding:10px;"></select>
    </div>
    <div style="margin-bottom:15px;">
        <label>WhatsApp Destino:</label><br>
        <input type="text" id="wa-num" placeholder="5511999999999" style="width:100%; padding:10px;">
    </div>
</div>

<canvas id="c"></canvas>

<script>
let stream, db = [], capturing = false, buffer = [], folder;
const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');

async function init() {
    try {
        folder = await window.showDirectoryPicker();
        document.getElementById('gate').remove();
        document.getElementById('app').style.visibility = 'visible';
        
        // Ativar Fullscreen
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-sel');
        sel.innerHTML = cams.map((d, i) => `<option value="${d.deviceId}">Câmera ${i+1}</option>`).join('');
        
        changeCam(cams[cams.length-1].deviceId);
        loadCSV();
        startGPS();
    } catch (e) { alert("Acesso à pasta necessário."); }
}

async function changeCam(id) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    v.srcObject = stream;
    v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
}

// --- FUNÇÃO DE WHATSAPP COM FOTO ESTAMPADA ---
async function snapAndShare() {
    const km = document.getElementById('km-display').innerText;
    const data = new Date().toLocaleString('pt-BR');

    // Desenha no Canvas para "queimar" as letras na foto
    ctx.drawImage(v, 0, 0, c.width, c.height);
    
    const h = c.height * 0.15;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, c.height - h, c.width, h);
    
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${h * 0.4}px Arial`;
    ctx.fillText(km, 30, c.height - (h * 0.45));
    ctx.font = `${h * 0.2}px Arial`;
    ctx.fillText(data, 30, c.height - (h * 0.15));

    // COPIA A FOTO PARA O CLIPBOARD (MEMÓRIA DO CELULAR)
    c.toBlob(async (blob) => {
        try {
            const item = new ClipboardItem({ "image/png": blob });
            await navigator.clipboard.write([item]);
            
            const num = document.getElementById('wa-num').value;
            const link = num ? `https://wa.me/${num}` : `whatsapp://send`;
            
            alert("FOTO COM KM COPIADA!\nAo abrir o WhatsApp, pressione na barra de texto e escolha 'COLAR'.");
            window.location.href = link;
        } catch (err) {
            alert("Erro ao copiar foto. Tente novamente.");
        }
    }, 'image/png');
}

// --- LÓGICA DE PDF E GPS (MANTIDAS) ---
function startCapture() {
    capturing = true;
    buffer = [];
    document.getElementById('start').style.display = 'none';
    document.getElementById('stop').style.display = 'block';
    loop();
}

function stopCapture() {
    capturing = false;
    savePDF();
    document.getElementById('start').style.display = 'block';
    document.getElementById('stop').style.display = 'none';
}

function loop() {
    if (!capturing) return;
    ctx.drawImage(v, 0, 0, c.width, c.height);
    buffer.push({
        img: c.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-display').innerText,
        dt: new Date().toLocaleString()
    });
    setTimeout(loop, 500);
}

async function savePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < buffer.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(buffer[i].img, 'JPEG', 0, 0, 297, 210);
        doc.setFillColor(0,0,0,0.8);
        doc.rect(0, 180, 297, 30, 'F');
        doc.setTextColor(255,255,255);
        doc.text(`${buffer[i].km} - ${buffer[i].dt}`, 10, 195);
    }
    const blob = doc.output('blob');
    const handle = await folder.getFileHandle(`Relatorio_${Date.now()}.pdf`, {create:true});
    const writable = await handle.createWritable();
    await writable.write(blob);
    await writable.close();
    buffer = [];
}

async function loadCSV() {
    const r = await fetch('SNVBR116SPRJ.csv');
    const t = await r.text();
    const rows = t.split('\n').slice(1);
    db = rows.map(row => {
        const cols = row.split(';');
        return { km: cols[0], lat: parseFloat(cols[1]), lon: parseFloat(cols[2]) };
    }).filter(d => !isNaN(d.lat));
}

function startGPS() {
    navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        let closest = db[0], minDist = Infinity;
        db.forEach(p => {
            const d = Math.hypot(p.lat - lat, p.lon - lon);
            if (d < minDist) { minDist = d; closest = p; }
        });
        if (closest) document.getElementById('km-display').innerText = "Km " + closest.km;
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
