<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INSPEÇÃO FOTOGRÁFICA V4</title>

<style>
:root {
    --highway-green: #056b3c;
    --accent: #00ff66;
}

body {
    margin: 0; background: #000; color: #fff;
    font-family: sans-serif; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
}

/* TELA DE BLOQUEIO (OBRIGAR PASTA) */
#lockScreen {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 9999; display: flex; align-items: center; justify-content: center;
}
.lockBox {
    background: #111; border: 2px solid var(--accent);
    padding: 30px; border-radius: 15px; text-align: center;
}
.lockBox button {
    padding: 15px 25px; background: var(--accent); border: none;
    font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px;
}

/* INTERFACE PRINCIPAL */
#viewport { height: 60vh; background: #000; position: relative; }
video { width: 100%; height: 100%; object-fit: cover; }

#kmDisplay {
    background: var(--highway-green); text-align: center;
    font-size: 3rem; font-weight: 900; padding: 15px;
    border-bottom: 4px solid #fff;
}

#controls {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr;
    gap: 15px; padding: 15px; background: #111;
}

.btn {
    border: none; border-radius: 12px; font-size: 1.2rem;
    font-weight: bold; cursor: pointer;
}

#btnStart { background: var(--accent); color: #000; }
#btnStop { background: #ff3333; color: #fff; }

canvas { display: none; }
</style>
</head>

<body>

<div id="lockScreen">
    <div class="lockBox">
        <h2 style="color:var(--accent)">CONFIGURAÇÃO</h2>
        <p>Primeiro, selecione a pasta<br>onde as fotos serão salvas.</p>
        <button onclick="configurarPasta()">SELECIONAR PASTA</button>
    </div>
</div>

<div id="kmDisplay">KM --+---</div>

<div id="viewport">
    <video id="vid" autoplay muted playsinline></video>
</div>

<div id="controls">
    <button id="btnStart" class="btn" onclick="iniciar()" disabled>INICIAR</button>
    <button id="btnStop" class="btn" onclick="parar()" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
let handle = null;
let gravando = false;
const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d');

// Ativa câmera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(s => vid.srcObject = s);

// Função obrigatória para liberar o app
async function configurarPasta() {
    try {
        handle = await window.showDirectoryPicker({ mode: "readwrite" });
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('btnStart').disabled = false;
    } catch (e) {
        alert("A pasta é necessária para salvar as fotos.");
    }
}

async function salvarFoto() {
    if (!gravando) return;

    can.width = vid.videoWidth;
    can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);

    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.8));
    const nome = `Foto_${Date.now()}.jpg`;
    
    const fileHandle = await handle.getFileHandle(nome, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();

    // Loop de 1 segundo
    if (gravando) setTimeout(salvarFoto, 1000);
}

function iniciar() {
    gravando = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    salvarFoto();
}

function parar() {
    gravando = false;
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
}
</script>

</body>
</html>
