<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V9.5 - PERÍCIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --green: #056b3c; --gold: #ffcc00; --danger: #cc0000; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        @media (orientation: landscape) { #app-shell { flex-direction: row; } #cam-v { flex: 3; } #ui-p { flex: 0.9; } }
        @media (orientation: portrait) { #cam-v { height: 62vh; } #ui-p { height: 38vh; } }

        #cam-v { position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #km-live { position: absolute; top: 15px; left: 15px; background: var(--green); padding: 12px 22px; border: 2px solid #fff; border-radius: 10px; font-size: 2rem; font-weight: 900; z-index: 10; box-shadow: 0 4px 15px #000; }

        #gear-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid #666; cursor: pointer; z-index: 100; font-size: 26px; }

        #set-panel { position: fixed; top: 0; right: -100%; width: 290px; height: 100%; background: #111; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; border-left: 4px solid var(--gold); overflow-y: auto; }
        #set-panel.open { right: 0; }
        .set-row { margin-bottom: 20px; }
        label { font-size: 11px; color: var(--gold); display: block; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }
        select, input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 14px; }

        #ui-p { background: #0a0a0a; display: flex; flex-direction: column; padding: 20px; gap: 12px; justify-content: center; border-left: 1px solid #222; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat { background: #181818; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat small { color: #888; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .stat b { font-size: 1.6rem; color: #fff; display: block; margin-top: 5px; }

        .btn { width: 100%; border: none; border-radius: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-f { background: var(--gold); color: #000; height: 55px; font-size: 0.85rem; }
        .btn-on { background: var(--green); color: #fff; height: 85px; font-size: 1.3rem; }
        .btn-off { background: var(--danger); color: #fff; height: 85px; font-size: 1.3rem; }
        button:disabled { opacity: 0.15; filter: grayscale(1); }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="gear-btn" onclick="toggleS()">⚙️</div>

<div id="set-panel">
    <h3 style="margin-bottom:30px; letter-spacing:1px; border-bottom: 1px solid #333; padding-bottom: 10px;">CONFIGURAÇÕES</h3>
    <div class="set-row">
        <label>Fotos por Página (PDF)</label>
        <select id="cfg-grid">
            <option value="1">1 FOTO (MÁXIMA)</option>
            <option value="4">4 FOTOS (2x2)</option>
            <option value="9">9 FOTOS (3x3)</option>
            <option value="16">16 FOTOS (4x4)</option>
        </select>
    </div>
    <div class="set-row">
        <label>Exibir Data e Hora</label>
        <select id="cfg-date"><option value="S">SIM</option><option value="N">NÃO</option></select>
    </div>
    <div class="set-row">
        <label>Total de Fotos por Lote</label>
        <input type="number" id="cfg-lote" value="50">
    </div>
    <div class="set-row">
        <label>Intervalo de Disparo (ms)</label>
        <input type="number" id="cfg-int" value="750">
    </div>
    <button id="btn-save-cfg" onclick="toggleS()" style="width:100%; padding:18px; background:var(--danger); border:none; color:#fff; border-radius:12px; font-weight:bold; margin-top:20px;">FECHAR E SALVAR</button>
</div>

<div id="app-shell">
    <div id="cam-v">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-live">Km ---+---</div>
    </div>
    <div id="ui-p">
        <div class="grid-stats">
            <div class="stat"><small>Lote Atual</small><b id="v-batch">0/50</b></div>
            <div class="stat"><small>Total Geral</small><b id="v-total">0</b></div>
        </div>
        <button id="btn-f" class="btn btn-f">📁 1. SELECIONAR PASTA</button>
        <button id="btn-on" class="btn btn-on" disabled>▶ 2. INICIAR INSPEÇÃO</button>
        <button id="btn-off" class="btn btn-off" disabled>■ PARAR E GERAR PDF</button>
        <div id="st" style="font-size:11px; color:#555; text-align:center; font-weight: bold;">AGUARDANDO DEFINIÇÃO DE PASTA</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

window.onload = () => { initC(); loadCSV(); initG(); };

async function initC() {
    try {
        const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:1920, height:1080}});
        vid.srcObject = s;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
    } catch(e) { alert("Câmera não encontrada!"); }
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { document.getElementById('st').innerText = "ERRO: CSV NÃO ENCONTRADO"; }
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-live').innerText = "Km " + n.km;
}

/* ======= ESTAMPA DO RELATÓRIO (KM ACIMA DA DATA) ======= */
function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    
    // Tarja de fundo
    const barH = h * 0.14; 
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h - barH, w, barH);

    // Configuração de texto com contorno (Anti-embaço)
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 8;
    ctx.lineWidth = 5;
    ctx.strokeStyle = "black";
    ctx.lineJoin = "round";
    ctx.fillStyle = "white";

    // KM - POSICIONADO MAIS ACIMA (Lado Esquerdo)
    const fK = barH * 0.45;
    ctx.font = `900 ${fK}px Arial`;
    ctx.textAlign = "left";
    // Desenha contorno primeiro para não embaçar
    ctx.strokeText("Km " + m.km, w * 0.04, h - (barH * 0.45));
    ctx.fillText("Km " + m.km, w * 0.04, h - (barH * 0.45));

    // DATA E HORA - POSICIONADO ABAIXO (Lado Direito)
    if(document.getElementById('cfg-date').value === 'S') {
        const fD = barH * 0.22;
        ctx.font = `bold ${fD}px monospace`;
        ctx.textAlign = "right";
        ctx.strokeText(m.ts, w * 0.96, h - (barH * 0.15));
        ctx.fillText(m.ts, w * 0.96, h - (barH * 0.15));
    }
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    document.getElementById('st').innerText = `PROCESSANDO LOTE ${batchIdx}...`;
    
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const grid = parseInt(document.getElementById('cfg-grid').value); 
    const cols = Math.sqrt(grid);
    const rows = cols;
    const pw = 297, ph = 210;
    const iw = pw / cols, ih = ph / rows;

    for(let i=0; i<items.length; i++){
        const col = i % grid % cols;
        const row = Math.floor((i % grid) / cols);
        
        if(i > 0 && i % grid === 0) doc.addPage();
        
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                drawS(items[i]);
                // Qualidade 0.85 para manter nitidez sem arquivo gigante
                doc.addImage(can.toDataURL('image/jpeg', 0.85), 'JPEG', col*iw, row*ih, iw, ih);
                r();
            };
            img.src = items[i].raw;
        });
    }

    try {
        const f = await hDir.getFileHandle(`LOTE_${batchIdx}_INSPECAO.pdf`, {create:true});
        const s = await f.createWritable();
        await s.write(doc.output('blob')); await s.close();
        document.getElementById('st').innerText = `LOTE ${batchIdx} SALVO COM SUCESSO!`;
    } catch(e) {
        document.getElementById('st').innerText = "ERRO AO SALVAR ARQUIVO!";
    }
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const limit = parseInt(document.getElementById('cfg-lote').value) || 50;
    
    buffer.push({
        raw: can.toDataURL('image/jpeg', 0.5),
        km: document.getElementById('km-live').innerText.replace("Km ", ""),
        ts: getFullTS()
    });

    total++;
    document.getElementById('v-total').innerText = total;
    document.getElementById('v-batch').innerText = `${buffer.length}/${limit}`;

    if(buffer.length >= limit) save();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 750);
}

function getFullTS() {
    const d = new Date();
    const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];
    return `${dias[d.getDay()]} ${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
}

document.getElementById('btn-f').onclick = async () => {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('btn-f').innerText = "PASTA SELECIONADA ✓";
        document.getElementById('btn-f').style.background = "#fff";
        document.getElementById('btn-on').disabled = false;
        document.getElementById('st').innerText = "SISTEMA PRONTO PARA INICIAR";
    } catch(e) {}
};

document.getElementById('btn-on').onclick = () => {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    rec = true; loop();
    document.getElementById('btn-on').disabled = true;
    document.getElementById('btn-off').disabled = false;
    document.getElementById('st').innerText = "INSPEÇÃO EM CURSO...";
};

document.getElementById('btn-off').onclick = () => {
    rec = false; save();
    document.getElementById('btn-on').disabled = false;
    document.getElementById('btn-off').disabled = true;
    document.getElementById('st').innerText = "INSPEÇÃO FINALIZADA.";
};

function toggleS() { document.getElementById('set-panel').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
