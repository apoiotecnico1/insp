<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V8 - RIVERSIDE PREMIUM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --highway-green: #056b3c; --panel-bg: #0b1224; 
            --accent: #00d9ff; --gold: #ffd700; --alert: #ff3333;
            --radar-bg: rgba(5, 10, 22, 0.75);
        }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; user-select: none; }
        
        #main-container { display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        @media (orientation: landscape) {
            #main-container { flex-direction: row; }
            #viewport { width: 65vw !important; height: 100vh !important; }
            #controls { width: 35vw; height: 100vh; overflow-y: auto; background: #050a16; }
            #kmPlaque { font-size: 2.5rem !important; }
        }

        /* --- VIEWPORT & VIDEO --- */
        #viewport { position: relative; width: 100vw; height: 45vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* --- RADAR DE 5 IDs (HUD LATERAL) --- */
        #radar-panel {
            position: absolute; right: 10px; top: 10px; width: 180px;
            background: var(--radar-bg); backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 217, 255, 0.3); border-radius: 8px;
            padding: 10px; z-index: 50; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .radar-title { font-size: 0.65rem; color: var(--accent); font-weight: 900; margin-bottom: 8px; letter-spacing: 1px; }
        .radar-item { font-size: 0.75rem; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .radar-item.active { color: #fff; font-weight: bold; border-left: 3px solid var(--accent); background: rgba(0, 217, 255, 0.1); padding-left: 8px; }

        /* --- PLACA KM --- */
        #kmPlaque { 
            background: linear-gradient(180deg, #0a8a4d, #056b3c);
            color: white; text-align: center; padding: 12px;
            font-size: 3rem; font-weight: 900; border: 4px solid #fff;
            margin: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.9);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: -1px;
        }

        /* --- STATUS & DASHBOARD --- */
        .status-bar { display: flex; justify-content: space-around; padding: 8px; background: var(--panel-bg); font-size: 0.7rem; font-weight: bold; border-bottom: 1px solid #222; }
        .st { padding: 4px 10px; border-radius: 12px; border: 1px solid #444; color: #888; }
        .ok { color: #00ff66; border-color: #00ff66; background: rgba(0,255,102,0.1); }
        .err { color: var(--alert); border-color: var(--alert); background: rgba(255,51,51,0.1); animation: blink 1s infinite; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; font-size: 0.75rem; color: #888; }
        .val { display: block; font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-top: 5px; }

        /* --- BOTÕES DE AÇÃO --- */
        .btn-row { padding: 0 15px 15px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button.action { padding: 18px; border-radius: 8px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.85rem; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button.action:active { transform: scale(0.96); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        #dirSelector { background: var(--gold); color: #000; grid-column: span 2; }
        #dirSelector.ready { background: #00ff66; color: #000; }
        #btnStart { background: var(--accent); color: #000; }
        #btnStop { background: var(--alert); color: #fff; display: none; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="viewport">
        <video id="vid" autoplay playsinline muted></video>
        
        <div id="radar-panel">
            <div class="radar-title">ALVOS PRÓXIMOS</div>
            <div id="radar-list">
                <div class="radar-item">Aguardando GPS...</div>
            </div>
        </div>
    </div>

    <div id="controls">
        <div id="kmPlaque">KM --+---</div>
        
        <div class="status-bar">
            <div id="stGps" class="st err">SINAL GPS</div>
            <div id="stCsv" class="st err">DADOS KM</div>
            <div id="stNox" class="st err">DADOS NOX</div>
        </div>

        <div class="dashboard">
            <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
            <div class="card">LOTE ATUAL<span id="txtBuffer" class="val">0/20</span></div>
            <div id="btnSaveManual" class="card" style="background:#1e3a8a; cursor:pointer; color:#fff; border-color:#4a80f5;">GERAR PDF<span id="txtPdfs" class="val" style="color:#fff;">0</span></div>
        </div>

        <div class="btn-row">
            <button id="dirSelector" class="action">1. LIBERAR PASTA DE TRABALHO</button>
            <button id="btnStart" class="action" disabled>2. INICIAR RONDA</button>
            <button id="btnStop" class="action">PARAR GRAVAÇÃO</button>
        </div>
        <div style="font-size:0.65rem; text-align:center; color:#555; padding:5px; font-weight:bold;">SISTEMA BLINDADO V8 | AUTO-SAVE ATIVO</div>
    </div>
</div>

<canvas id="can"></canvas>

<script>
/* ======= CORE: BANCOS DE DADOS E GPS ======= */
let kmDB = [], noxDB = [], lastPos = null, isRecording = false;
let photoCount = 0, pdfCount = 0, activeBuffer = [];
let directoryHandle = null; 
const batchLimit = 20; // Limite de fotos por PDF para não estourar memória

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { willReadFrequently: true });

function parsePt(v){ 
    if(!v) return NaN; 
    return Number(String(v).trim().replace(',','.')); 
}
function calcDist(lt1, ln1, lt2, ln2) { return Math.hypot(lt1 - lt2, ln1 - ln2); } // Rápido para curtas distâncias

async function loadDatabases(){
    // Carrega KM
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v=' + Date.now());
        const t = await r.text();
        kmDB = t.split('\n').map(l => {
            const c = l.split(';');
            return { km: c?.trim(), lat: parsePt(c), lon: parsePt(c) };
        }).filter(p => p.km && !isNaN(p.lat));
        document.getElementById('stCsv').className = "st ok";
    } catch(e) { console.warn("Erro KM CSV"); }

    // Carrega NOX
    try {
        const r2 = await fetch('Dados_Completos_Grupo_2_all.csv?v=' + Date.now());
        const t2 = await r2.text();
        noxDB = t2.split('\n').map(l => {
            const c = l.split(';');
            return { id: c?.trim(), lat: parsePt(c), lon: parsePt(c) };
        }).filter(p => p.id && !isNaN(p.lat));
        document.getElementById('stNox').className = "st ok";
    } catch(e) { console.warn("Erro NOX CSV"); }
}

function updateLocation() {
    if(!lastPos) return;

    // Atualiza Placa KM
    if(kmDB.length > 0) {
        let bestKM = kmDB.reduce((prev, curr) => calcDist(curr.lat, curr.lon, lastPos.lat, lastPos.lon) < calcDist(prev.lat, prev.lon, lastPos.lat, lastPos.lon) ? curr : prev);
        document.getElementById('kmPlaque').textContent = "KM " + bestKM.km;
    }

    // Atualiza Radar NOX (5 mais próximos)
    if(noxDB.length > 0) {
        let scored = noxDB.map(pt => ({ ...pt, d: calcDist(pt.lat, pt.lon, lastPos.lat, lastPos.lon) })).sort((a,b) => a.d - b.d);
        const container = document.getElementById('radar-list');
        container.innerHTML = "";
        
        scored.slice(0, 5).forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = `radar-item ${idx === 0 ? 'active' : ''}`;
            div.innerText = item.id;
            container.appendChild(div);
        });
    }
}

/* ======= SISTEMA DE DIRETÓRIO AUTOMÁTICO ======= */
document.getElementById('dirSelector').onclick = async () => {
    try {
        directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('dirSelector').textContent = "PASTA LIBERADA ✓";
        document.getElementById('dirSelector').className = "action ready";
        document.getElementById('btnStart').disabled = false;
    } catch (err) { alert("Permissão de pasta necessária para o auto-save premium."); }
};

/* ======= ÓPTICA ======= */
async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} } });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
    } catch(e) { alert("Erro de acesso à câmera"); }
}

/* ======= MOTOR DE RELATÓRIO PDF VETORIAL (SEM SOBREPOSIÇÃO) ======= */
async function savePDF() {
    if(!activeBuffer.length) return;
    
    const batch = [...activeBuffer]; 
    activeBuffer = []; 
    pdfCount++; 
    document.getElementById('txtPdfs').textContent = pdfCount;
    document.getElementById('txtBuffer').textContent = `0/${batchLimit}`;
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4'); // Paisagem, milímetros, A4 (297x210mm)

    for(let i=0; i<batch.length; i++){
        if(i>0) doc.addPage();
        
        // 1. Adiciona a foto limpa
        doc.addImage(batch[i].img, 'JPEG', 0, 0, 297, 210);
        
        // 2. Desenha a Tarja de Fundo Escura
        doc.setFillColor(10, 15, 25, 0.85); // Azul escuro premium transparente
        doc.rect(0, 185, 297, 25, 'F');
        
        // 3. Imprime Texto Vetorial (Nunca Sobrepõe)
        doc.setTextColor(255, 255, 255);
        
        // Linha Principal (KM e Ativo)
        doc.setFontSize(16);
        doc.setFont("helvetica", "bold");
        doc.text(`LOCAL: ${batch[i].km}   |   ALVO NOX: ${batch[i].id}`, 15, 195);
        
        // Linha Secundária (Cartografia e Tempo)
        doc.setFontSize(11);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(200, 220, 255); // Azul clarinho
        doc.text(`DATA: ${batch[i].data} às ${batch[i].hora}   |   COORDENADAS: LAT ${batch[i].lat} / LON ${batch[i].lon}`, 15, 204);
    }
    
    const fileName = `RELATORIO_${batch.km.replace(/\s/g,'_')}_LOTE${pdfCount}.pdf`;
    
    // Auto-Save Direto no HD/Celular
    if(directoryHandle) {
        try {
            const fileHandle = await directoryHandle.getFileHandle(fileName, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(doc.output('blob'));
            await writable.close();
        } catch (e) {
            console.error("Falha no auto-save profundo", e);
            doc.save(fileName); // Fallback
        }
    } else {
        doc.save(fileName);
    }
}

/* ======= CONTROLE DE CAPTURA ======= */
function captureLoop() {
    if(!isRecording) return;
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    const now = new Date();
    const activeNox = document.querySelector('.radar-item.active');

    activeBuffer.push({
        img: can.toDataURL('image/jpeg', 0.6), // Compressão otimizada
        km: document.getElementById('kmPlaque').textContent,
        id: activeNox ? activeNox.innerText : "N/A",
        lat: lastPos?.lat.toFixed(6) || "0.000000",
        lon: lastPos?.lon.toFixed(6) || "0.000000",
        data: now.toLocaleDateString('pt-BR'),
        hora: now.toLocaleTimeString('pt-BR')
    });
    
    photoCount++;
    document.getElementById('txtTotal').textContent = photoCount;
    document.getElementById('txtBuffer').textContent = `${activeBuffer.length}/${batchLimit}`;
    
    if(activeBuffer.length >= batchLimit) {
        savePDF();
    }
    
    // Dispara a cada 600ms
    setTimeout(captureLoop, 600);
}

/* ======= EVENTOS ======= */
document.getElementById('btnStart').onclick = () => { 
    isRecording = true; 
    captureLoop(); 
    document.getElementById('btnStart').style.display = 'none'; 
    document.getElementById('btnStop').style.display = 'block'; 
};

document.getElementById('btnStop').onclick = () => { 
    isRecording = false; 
    savePDF(); 
    document.getElementById('btnStart').style.display = 'block'; 
    document.getElementById('btnStop').style.display = 'none'; 
};

document.getElementById('btnSaveManual').onclick = savePDF;

navigator.geolocation.watchPosition(p => {
    lastPos = { lat: p.coords.latitude, lon: p.coords.longitude };
    const stGps = document.getElementById('stGps');
    stGps.className = "st ok";
    stGps.textContent = `GPS OK (±${Math.round(p.coords.accuracy)}m)`;
    updateLocation();
}, () => {
    document.getElementById('stGps').className = "st err";
    document.getElementById('stGps').textContent = "SEM GPS";
}, {enableHighAccuracy:true});

// Inicialização
loadDatabases();
initCamera();
</script>
</body>
</html>
