<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ter Fé Muda Tudo</title>
    <style>
        /* Reset de margens e preenchimentos */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Configuração do fundo azul cobrindo toda a tela */
        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1128 0%, #1c355e 50%, #001f54 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container centralizador */
        .center-container {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        /* Estilização da frase com as animações incorporadas */
        .animated-text {
            color: #ffffff;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            /* Sombra suave para dar efeito de brilho/profundidade */
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 0;
            /* Executa o surgimento suave (fadeIn) e depois mantém o efeito flutuante (float) continuo */
            animation: fadeIn 2.5s ease-out forwards, float 4s ease-in-out infinite 2.5s;
        }

        /* Animação 1: Entrada suave com desfoque e subida */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* Animação 2: Efeito flutuante e pulsação de brilho contínua */
        @keyframes float {
            0% {
                transform: translateY(0px);
                text-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 4px 10px rgba(0, 0, 0, 0.3);
            }
            50% {
                transform: translateY(-15px);
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 4px 20px rgba(255, 255, 255, 0.3);
            }
            100% {
                transform: translateY(0px);
                text-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 4px 10px rgba(0, 0, 0, 0.3);
            }
        }

        /* Ajustes de tamanho de fonte para telas menores (celulares) */
        @media (max-width: 600px) {
            .animated-text {
                font-size: 1.8rem;
                letter-spacing: 0px;
            }
        }
    </style>
</head>
<body>

    <div class="center-container">
        <h1 class="animated-text">Ter fé muda tudo.</h1>
    </div>

</body>
</html>
