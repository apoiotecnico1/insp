<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Captura Técnica Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --primary: #0056b3; 
            --accent: #ff8800;  
            --glass: rgba(0, 86, 179, 0.45); /* KM Transparente */
            --bg: #050505;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE INÍCIO */
        #safety-gate { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #001f3f 0%, #000 100%); 
            z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }
        .btn-aware { 
            background: var(--accent); color: #fff; border: none; 
            padding: 22px 60px; font-weight: 900; border-radius: 50px; 
            cursor: pointer; font-size: 1.3rem; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 136, 0, 0.3);
        }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        video#vid { width: 100%; height: 100%; object-fit: cover; }

        /* PAINEL KM TRANSPARENTE */
        #km-hud { 
            position: absolute; top: 60px; left: 20px; 
            background: var(--glass); 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 12px; z-index: 100; 
            backdrop-filter: blur(8px); /* Efeito de vidro */
            min-width: 140px; text-align: center;
        }
        #br-txt { font-size: 0.8rem; font-weight: bold; opacity: 0.9; }
        #km-txt { font-size: 2.2rem; font-weight: 900; }

        /* MICROBOTÃO DE CAPTURA RÁPIDA (FOTO ATUAL) */
        #quick-shutter { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 65px; height: 65px; 
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            z-index: 60; cursor: pointer;
        }
        #quick-shutter::after {
            content: ''; width: 25px; height: 25px; 
            background: #fff; border-radius: 50%; opacity: 0.8;
        }

        /* CONTROLES INFERIORES */
        #ui-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn-ui { 
            padding: 18px 30px; border-radius: 15px; border: 1px solid #fff; 
            background: rgba(0,0,0,0.7); color: #fff; font-weight: 800; cursor: pointer; 
        }
        #btn-start { border-color: var(--accent); color: var(--accent); }
        #btn-stop { background: #ff4444; border: none; display: none; }

        #settings-panel { 
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%; 
            background: #111; z-index: 500; padding: 60px 20px; transition: 0.3s; 
            border-left: 2px solid var(--primary); 
        }
        #settings-panel.open { right: 0; }
        canvas { display: none; }
        .flash { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 1000; pointer-events: none; transition: 0.1s; }
    </style>
</head>
<body>

<div id="flash-effect" class="flash"></div>

<div id="safety-gate">
    <button class="btn-aware" onclick="initApp()">Iniciar Operação</button>
</div>

<div id="app-shell">
    <!-- O Microbotão de captura de foto avulsa -->
    <div id="quick-shutter" onclick="takeInstantJPG()"></div>

    <video id="vid" autoplay playsinline muted></video>

    <div id="km-hud">
        <span id="br-txt">RODOVIA</span>
        <h1 id="km-txt">Km ---</h1>
    </div>

    <div id="ui-controls">
        <button class="btn-ui" onclick="toggleSet()">⚙️</button>
        <button id="btn-start" class="btn-ui" onclick="startCapture()">GRAVAR PDF</button>
        <button id="btn-stop" class="btn-ui" onclick="stopCapture()">SALVAR PDF</button>
    </div>
</div>

<div id="settings-panel">
    <h2 onclick="toggleSet()" style="cursor:pointer; color: var(--accent)">✖ FECHAR</h2>
    <div style="margin-top:30px">
        <label style="font-size:10px">INTERVALO (MS)</label>
        <input type="number" id="cfg-int" value="500" style="width:100%; padding:10px; margin-bottom:20px">
        <label style="font-size:10px">LENTE</label>
        <select id="cam-select" onchange="switchCam(this.value)" style="width:100%; padding:10px"></select>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let wakeLock = null;
let kmDB = [], capturing = false, buffer = [], hDir = null, currentStream = null;
let brAtual = "BR-000", kmInicialLote = "";

const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
    } catch (err) {}
}

async function initApp() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        await requestWakeLock();
        document.getElementById('safety-gate').style.display = 'none';
        document.getElementById('app-shell').style.visibility = 'visible';
        listCams(); loadCSV(); initGPS();
    } catch (e) { alert("Permissões necessárias."); }
}

async function takeInstantJPG() {
    if (!hDir) return;
    // Efeito de flash visual
    const flash = document.getElementById('flash-effect');
    flash.style.opacity = "0.6"; setTimeout(() => flash.style.opacity = "0", 100);

    const kmRaw = document.getElementById('km-txt').innerText;
    const agora = new Date();
    
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const bh = can.height * 0.12;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, can.height - bh, can.width, bh);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${bh * 0.4}px Arial`;
    ctx.fillText(`${brAtual} - ${kmRaw}`, 30, can.height - (bh * 0.45));

    can.toBlob(async (blob) => {
        const nome = `FOTO_${brAtual}_KM_${kmRaw.replace('Km ','')}_${agora.getTime()}.jpg`;
        const handle = await hDir.getFileHandle(nome, { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
    }, 'image/jpeg', 0.95);
}

// Funções de PDF e Sistema
function startCapture() {
    capturing = true; buffer = [];
    kmInicialLote = document.getElementById('km-txt').innerText;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    captureLoop();
}

function stopCapture() {
    capturing = false;
    if (buffer.length > 0) savePDF([...buffer], kmInicialLote, document.getElementById('km-txt').innerText);
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
}

function captureLoop() {
    if (!capturing) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    buffer.push({
        img: can.toDataURL('image/jpeg', 0.4),
        km: document.getElementById('km-txt').innerText,
        br: brAtual, ts: new Date().toLocaleString()
    });
    if (buffer.length >= 50) { // Auto-save a cada 50 fotos
        const b = [...buffer]; const kF = document.getElementById('km-txt').innerText;
        const kI = kmInicialLote; buffer = []; kmInicialLote = kF;
        savePDF(b, kI, kF);
    }
    setTimeout(captureLoop, parseInt(document.getElementById('cfg-int').value)); 
}

async function savePDF(data, kI, kF) {
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for (let i = 0; i < data.length; i++) {
        if (i > 0) doc.addPage();
        doc.addImage(data[i].img, 'JPEG', 0, 0, pw, ph);
        doc.setFillColor(0, 86, 179, 180);
        doc.rect(0, ph-15, pw, 15, 'F');
        doc.setTextColor(255,255,255);
        doc.setFontSize(10);
        doc.text(`${data[i].br} - ${data[i].km} | ${data[i].ts}`, 10, ph-6);
    }
    const nome = `PDF_${brAtual}_KM_${kI}_AO_${kF}.pdf`.replace(/\s+/g, '');
    const f = await hDir.getFileHandle(nome, { create: true });
    const s = await f.createWritable(); await s.write(doc.output('blob')); await s.close();
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const vids = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = vids.map((d, i) => `<option value="${d.deviceId}">Lente ${i+1}</option>`).join('');
    switchCam(vids[vids.length-1].deviceId);
}

async function switchCam(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    vid.srcObject = currentStream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

function loadCSV() {
    fetch('SNVBR116SPRJ.csv').then(r => r.text()).then(t => {
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik = h.indexOf('km'), ilt = h.findIndex(x=>x.includes('lat')), iln = h.findIndex(x=>x.includes('lon')), ibr = h.indexOf('br');
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')), br: ibr !== -1 ? c[ibr] : "BR-116" };
        });
    });
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        if (!kmDB.length) return;
        let best = null, minD = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < minD) { minD = d; best = pt; }
        }
        if (best) {
            document.getElementById('km-txt').innerText = "Km " + best.km;
            brAtual = best.br;
            document.getElementById('br-txt').innerText = brAtual;
        }
    }, null, { enableHighAccuracy: true });
}
</script>
</body>
</html>
