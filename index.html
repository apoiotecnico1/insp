<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Captura High-End BR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --glass-verde: rgba(0, 121, 52, 0.8); 
            --sombra-3d: 3px 3px 0px #003d1a, 5px 5px 15px rgba(0,0,0,0.7);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        #app-shell { position: relative; width: 100vw; height: 100vh; visibility: hidden; }

        #vid { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; 
            object-fit: cover; z-index: 1;
        }

        /* HUD - PLACA COM EFEITO SOMBRA LINDO */
        #km-hud { 
            position: absolute; 
            top: env(safe-area-inset-top, 30px); 
            left: 25px; 
            z-index: 100; 
        }

        .placa-container {
            background: var(--glass-verde);
            padding: 15px 25px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 18px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 180px;
        }

        .br-label { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: -5px;
            letter-spacing: 1px;
        }

        .km-label { 
            font-size: 3rem; 
            font-weight: 900; 
            color: #fff;
            /* Efeito Sombra 3D que você pediu */
            text-shadow: var(--sombra-3d);
        }

        /* Controles */
        #ui { 
            position: absolute; bottom: env(safe-area-inset-bottom, 35px); 
            left: 0; width: 100%; display: flex; justify-content: center; 
            gap: 20px; z-index: 500; align-items: center;
        }

        .btn { 
            border: none; padding: 20px 40px; border-radius: 50px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #btn-go { background: var(--accent); color: #000; }
        #btn-stop { background: #ff4444; color: #fff; display: none; }
        
        .circle-tool {
            width: 60px; height: 60px; background: rgba(0,0,0,0.6);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        }

        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 0.1s; }
        #rec-indicator { color: #ff4444; font-weight: bold; display: none; text-shadow: 1px 1px 2px #000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="gate" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <button class="btn" id="btn-go" onclick="init()">ATIVAR SISTEMA & PASTA</button>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted onclick="snap()"></video>
    
    <div id="km-hud">
        <div class="placa-container">
            <span class="br-label" id="br-txt">BR ---</span>
            <span class="km-label" id="km-txt">Km ---</span>
        </div>
    </div>

    <div id="ui">
        <div class="circle-tool" onclick="document.documentElement.requestFullscreen()">⛶</div>
        <button id="btn-start-rec" class="btn" style="background:var(--accent)" onclick="startLote()">INICIAR LOTE</button>
        <button id="btn-stop-rec" class="btn" style="background:#ff4444; display:none; color:white;" onclick="stopLote()">GERAR PDF</button>
        <div id="rec-indicator">● REC</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], capturing=false, hDir=null, stream=null;
let buffer = [], brGlobal = "---", lat="0", lon="0";

const vid = document.getElementById('vid');
const can = document.getElementById('c');
const ctx = can.getContext('2d');

async function init() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('gate').remove();
        document.getElementById('app-shell').style.visibility = 'visible';
        
        const d = await navigator.mediaDevices.enumerateDevices();
        const v = d.filter(i => i.kind === 'videoinput');
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: v[v.length-1].deviceId, width: 1920, height: 1080 } 
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
        
        loadCSV(); startGPS();
    } catch(e) { alert("Selecione uma pasta para salvar os arquivos."); }
}

function drawPlaca(km, br) {
    const s = can.height / 1080;
    ctx.save();
    
    const w = 340 * s, h = 170 * s;
    ctx.translate(50 * s, 50 * s);
    
    // Sombra da Placa Toda
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur = 25 * s;
    ctx.shadowOffsetX = 10 * s;
    ctx.shadowOffsetY = 10 * s;
    
    // Fundo Verde
    ctx.fillStyle = "rgba(0, 121, 52, 0.9)";
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, 20 * s);
    ctx.fill();
    
    // Borda Fina
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 3 * s;
    ctx.stroke();

    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.textAlign = "center";
    
    // Texto BR
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${48 * s}px Arial`;
    ctx.fillText("BR " + br, w/2, 60 * s);
    
    // Texto KM com Efeito Sombra 3D (IGUAL À TELA)
    ctx.font = `900 ${95 * s}px Arial`;
    ctx.shadowColor = "#003314";
    ctx.shadowOffsetX = 4 * s;
    ctx.shadowOffsetY = 4 * s;
    ctx.fillText("Km " + km, w/2, 138 * s);
    
    ctx.restore();
}

async function snap() {
    if(!hDir) return;
    document.getElementById('flash').style.opacity = "1";
    setTimeout(() => document.getElementById('flash').style.opacity = "0", 100);

    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawPlaca(km, brGlobal);
    
    const blob = await new Promise(res => can.toBlob(res, 'image/jpeg', 0.95));
    const fh = await hDir.getFileHandle(`BR${brGlobal}_KM${km}_${Date.now()}.jpg`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(blob); await sw.close();
}

function startLote() {
    capturing = true; buffer = [];
    document.getElementById('btn-start-rec').style.display = 'none';
    document.getElementById('btn-stop-rec').style.display = 'block';
    document.getElementById('rec-indicator').style.display = 'block';
    loop();
}

function stopLote() {
    capturing = false;
    document.getElementById('btn-start-rec').style.display = 'block';
    document.getElementById('btn-stop-rec').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
    if(buffer.length > 0) savePDF([...buffer]);
}

async function loop() {
    if (!capturing) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const km = document.getElementById('km-txt').innerText.replace("Km ", "");
    drawPlaca(km, brGlobal);
    buffer.push(can.toDataURL('image/jpeg', 0.6));
    
    if (buffer.length >= 50) { savePDF([...buffer]); buffer = []; }
    setTimeout(loop, 500);
}

async function savePDF(imgs) {
    const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
    for (let i = 0; i < imgs.length; i++) {
        if (i > 0) pdf.addPage();
        pdf.addImage(imgs[i], 'JPEG', 0, 0, 297, 210);
    }
    const fh = await hDir.getFileHandle(`LOTE_BR${brGlobal}_${Date.now()}.pdf`, { create: true });
    const sw = await fh.createWritable();
    await sw.write(pdf.output('blob')); await sw.close();
}

function startGPS() {
    navigator.geolocation.watchPosition(p => {
        lat = p.coords.latitude.toFixed(6); lon = p.coords.longitude.toFixed(6);
        if (!kmDB.length) return;
        let b = null, m = Infinity;
        for (const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if (d < m) { m = d; b = pt; }
        }
        if (b) {
            brGlobal = b.br;
            document.getElementById('br-txt').innerText = "BR " + brGlobal;
            document.getElementById('km-txt').innerText = "Km " + b.km;
        }
    }, null, { enableHighAccuracy: true });
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv');
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ibr = h.indexOf('br'), ikm = h.indexOf('km'), ilat = h.findIndex(x=>x.includes('lat')), ilon = h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { br: c[ibr], km: c[ikm], lt: parseFloat(c[ilat].replace(',','.')), ln: parseFloat(c[ilon].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) { console.error("Erro CSV:", e); }
}
</script>
</body>
</html>
