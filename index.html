<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Captura Pro - Versão Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #app-shell { position: relative; width: 100vw; height: 100vh; }
        #vid { width: 100%; height: 100%; object-fit: cover; }
        #hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .data-box { background: rgba(0, 121, 52, 0.7); padding: 10px 20px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; border: 2px solid #fff; }
        .btn-action { position: absolute; bottom: 50px; right: 50px; padding: 30px 60px; font-size: 1.5rem; font-weight: 900; border-radius: 15px; border: none; cursor: pointer; z-index: 200; }
    </style>
</head>
<body>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="hud-top">
        <div class="data-box" id="info-km">Km: ---</div>
        <div class="data-box" id="info-time">--:--:--</div>
    </div>
    <button id="btn-ctrl" class="btn-action" style="background:#ffcc00" onclick="toggleCapture()">GRAVAR</button>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
let stream, rec, hDir, capturing = false, buffer = [], notaAtual = "", falando = false, pos = {lat:0, lon:0};
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

async function init() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        vid.srcObject = stream;
        
        navigator.geolocation.watchPosition(p => { pos = {lat: p.coords.latitude.toFixed(5), lon: p.coords.longitude.toFixed(5)}; });
        
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        rec = new SR();
        rec.lang = 'pt-BR'; rec.continuous = true; rec.interimResults = true;
        rec.onresult = (e) => { 
            let t = ""; for(let i=e.resultIndex; i<e.results.length; i++) t += e.results[i][0].transcript;
            if(t.length > 2) { notaAtual = t; falando = true; }
        };
        rec.onspeechend = () => setTimeout(() => { falando = false; }, 3000);
        rec.onend = () => { try { rec.start(); } catch(e){} };
        rec.start();
        setInterval(updateHUD, 1000);
    } catch(e) { alert("Permissões necessárias!"); }
}

function updateHUD() {
    document.getElementById('info-time').innerText = new Date().toLocaleTimeString();
}

function toggleCapture() {
    capturing = !capturing;
    document.getElementById('btn-ctrl').innerText = capturing ? "PARAR" : "GRAVAR";
    document.getElementById('btn-ctrl').style.background = capturing ? "#ff4444" : "#ffcc00";
    if(capturing) loop(); else savePDF();
}

function loop() {
    if(!capturing) return;
    can.width = vid.videoWidth; can.height = vid.videoHeight;
    ctx.drawImage(vid, 0, 0);
    
    // Desenho dos dados (O que sai na foto)
    ctx.fillStyle = "rgba(0,121,52,0.7)"; ctx.fillRect(20, 20, 400, 100);
    ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial";
    ctx.fillText(`GPS: ${pos.lat}, ${pos.lon}`, 40, 85);
    
    if(falando) {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-150, can.width, 150);
        ctx.fillStyle = "#ffcc00"; ctx.font = "bold 35px Arial";
        ctx.fillText(notaAtual.substring(0, 70), 40, can.height-60);
    }
    
    buffer.push(can.toDataURL('image/jpeg', 0.8));
    if(buffer.length >= 20) savePDF();
    setTimeout(loop, 1000);
}

async function savePDF() {
    if(buffer.length === 0) return;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    for(let i=0; i<buffer.length; i++) {
        if(i > 0) doc.addPage();
        doc.addImage(buffer[i], 'JPEG', 0, 0, 297, 210);
    }
    const fh = await hDir.getFileHandle(`Relatorio_${Date.now()}.pdf`, { create: true });
    const w = await fh.createWritable();
    await w.write(doc.output('blob'));
    await w.close();
    buffer = [];
}

window.onload = init;
</script>
</body>
</html>
