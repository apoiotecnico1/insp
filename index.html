<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V6 - OMNI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --danger: #ff003c; 
            --placa-verde: #06723b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        /* --- VIDEO & PERFORMANCE --- */
        #vid { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; inset: 0; z-index: 1;
            will-change: transform;
        }

        /* --- HUD LAYOUT (ANTI-SOBREPOSIÇÃO) --- */
        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }

        #km-hud { 
            background: var(--placa-verde); 
            padding: 12px 25px; 
            border: 4px solid #fff; 
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
        }
        #km-hud h1 { 
            font-size: clamp(2rem, 6vw, 3.5rem); 
            font-weight: 900; 
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #stats-hud {
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            text-align: right;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-row { font-size: 13px; font-weight: bold; margin-bottom: 2px; letter-spacing: 0.5px; }
        #rec-indicator { color: var(--danger); animation: blink 1s steps(2) infinite; display: none; }
        @keyframes blink { to { visibility: hidden; } }

        /* --- CONTROLES --- */
        #ui-controls { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; z-index: 500; transition: opacity 0.3s, transform 0.3s;
        }
        .ui-hidden { opacity: 0; transform: translate(-50%, 50px); pointer-events: none; }
        
        .btn { 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer; 
            padding: 20px 40px; text-transform: uppercase; font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #btn-start-insp { background: var(--accent); color: #000; }
        #btn-stop-insp { background: var(--danger); color: #fff; display: none; }
        #btn-settings { background: #333; color: #fff; padding: 20px; }

        /* --- SETTINGS PANEL --- */
        #settings-panel { 
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%; 
            background: rgba(15,15,15,0.98); backdrop-filter: blur(20px); z-index: 1000; 
            padding: 40px 25px; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            border-left: 1px solid #333;
        }
        #settings-panel.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { font-size: 11px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 8px; }
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; }

        #gate { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body onclick="wakeUI()">

<div id="gate">
    <h1 style="color:var(--accent); margin-bottom:5px;">INSPEÇÃO PRO V6</h1>
    <p style="color:#555; margin-bottom:30px; font-size:14px;">MÓDULO DE CAPTURA RODOVIÁRIA</p>
    <button class="btn" id="btn-start-insp" onclick="launchSystem()">ATIVAR SISTEMA</button>
</div>

<div id="app-shell" style="display:none;">
    <video id="vid" autoplay playsinline muted></video>

    <div class="hud-header">
        <div id="km-hud">
            <h1 id="km-txt">KM ---</h1>
        </div>
        
        <div id="stats-hud">
            <div id="rec-indicator" class="stat-row">● GRAVANDO</div>
            <div id="st-lote" class="stat-row">LOTE: 0/0</div>
            <div id="st-sessao" class="stat-row">TOTAL: 0</div>
        </div>
    </div>

    <div id="ui-controls">
        <button id="btn-settings" class="btn" onclick="toggleSet()">⚙</button>
        <button id="btn-start-ui" class="btn" onclick="startInsp()">Iniciar Inspeção</button>
        <button id="btn-stop-ui" class="btn" onclick="stopInsp()" style="display:none;">Finalizar Relatório</button>
    </div>
</div>

<div id="settings-panel">
    <h3 style="color:var(--accent); margin-bottom:25px">CONFIGURAÇÕES</h3>
    
    <div class="field">
        <label>Qualidade Relatório</label>
        <select id="cfg-qual">
            <option value="0.4">BAIXA (Rápido)</option>
            <option value="0.7" selected>MÉDIA (Equilibrado)</option>
            <option value="0.9">ALTA (Definição)</option>
        </select>
    </div>

    <div class="field">
        <label>Mostrar Coordenadas GPS</label>
        <select id="cfg-coords">
            <option value="sim">SIM</option>
            <option value="nao">NÃO</option>
        </select>
    </div>

    <div class="field">
        <label>Fotos por Lote</label>
        <input type="number" id="cfg-lote" value="50">
    </div>

    <div class="field">
        <label>Intervalo Captura (ms)</label>
        <input type="number" id="cfg-int" value="400">
    </div>

    <div class="field">
        <label>Lente</label>
        <select id="cam-select" onchange="initCam(this.value)"></select>
    </div>

    <button class="btn" style="width:100%; background:#222; color:#fff;" onclick="toggleSet()">VOLTAR</button>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
let kmDB=[], buffer=[], hDir=null, stream=null, rec=false, uiTimer, lastPos=null, total=0;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function launchSystem() {
    try {
        // 1. Fullscreen primeiro (Gatilho de confiança)
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }

        // 2. Pasta depois
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });

        // 3. Montar interface
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        
        await listCams();
        loadCSV();
        initGPS();
    } catch(e) {
        alert("Erro ao iniciar. Certifique-se de dar as permissões de tela cheia e pasta.");
    }
}

function initGPS() {
    navigator.geolocation.watchPosition(p => {
        lastPos = { lt: p.coords.latitude, ln: p.coords.longitude };
        updateKM();
    }, null, {enableHighAccuracy:true});
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const lines = t.split('\n').filter(l => l.includes(';'));
        lines.shift();
        kmDB = lines.map(l => {
            const c = l.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!lastPos || !kmDB.length) return;
    let nearest = kmDB, minDist = Infinity;
    for(const pt of kmDB) {
        const d = Math.hypot(lastPos.lt - pt.lt, lastPos.ln - pt.ln);
        if(d < minDist) { minDist = d; nearest = pt; }
    }
    document.getElementById('km-txt').innerText = "KM " + nearest.km;
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const video = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    video.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = d.label || `Câmera ${i+1}`;
        sel.appendChild(opt);
    });
    if(video.length) initCam(video[video.length-1].deviceId);
}

async function initCam(id) {
    if(stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 1920, height: 1080 } });
    vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; };
}

function startInsp() {
    rec = true;
    document.getElementById('btn-start-ui').style.display = 'none';
    document.getElementById('btn-stop-ui').style.display = 'block';
    document.getElementById('rec-indicator').style.display = 'block';
    loop();
}

function stopInsp() {
    rec = false;
    document.getElementById('btn-start-ui').style.display = 'block';
    document.getElementById('btn-stop-ui').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
    savePDF();
}

function loop() {
    if(!rec) return;
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    const limit = parseInt(document.getElementById('cfg-lote').value);
    
    buffer.push({
        img: can.toDataURL('image/jpeg', parseFloat(document.getElementById('cfg-qual').value)),
        km: document.getElementById('km-txt').innerText,
        lat: lastPos?.lt.toFixed(6),
        lon: lastPos?.ln.toFixed(6),
        ts: new Date().toLocaleString()
    });

    total++;
    document.getElementById('st-lote').innerText = `LOTE: ${buffer.length}/${limit}`;
    document.getElementById('st-sessao').innerText = `TOTAL: ${total}`;

    if(buffer.length >= limit) savePDF();
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value));
}

async function savePDF() {
    if(!buffer.length) return;
    const batch = [...buffer];
    buffer = [];
    const showCoords = document.getElementById('cfg-coords').value === 'sim';

    const doc = new jspdf.jsPDF(can.width > can.height ? 'l' : 'p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    for(let i=0; i<batch.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const h = can.height * 0.12;
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, can.height - h, can.width, h);
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${h * 0.4}px Arial`;
                ctx.fillText(batch[i].km, 50, can.height - (h * 0.45));
                
                if(showCoords) {
                    ctx.font = `${h * 0.15}px Arial`;
                    ctx.fillText(`${batch[i].ts} | GPS: ${batch[i].lat}, ${batch[i].lon}`, 50, can.height - (h * 0.2));
                }
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph);
                r();
            };
            img.src = batch[i].img;
        });
    }

    const name = `REL_${Date.now()}.pdf`;
    try {
        const f = await hDir.getFileHandle(name, { create: true });
        const w = await f.createWritable();
        await w.write(doc.output('blob'));
        await w.close();
    } catch(e) { doc.save(name); }
}

function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }
function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => { if(rec) document.getElementById('ui-controls').classList.add('ui-hidden'); }, 4000);
}
</script>
</body>
</html>
