<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>INSPEÇÃO PRO V11.1 - ULTRA STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --danger: #cc0000; --glass: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* Splash Screen Profissional */
        #splash { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .loader { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }
        #cam-container { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        /* Interface Flutuante */
        #km-display { position: absolute; top: 20px; left: 20px; background: var(--safety); padding: 12px 25px; border-radius: 5px; border-left: 6px solid #fff; font-size: 2.2rem; font-weight: 900; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        #side-bar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .icon-btn { width: 55px; height: 55px; background: var(--glass); border: 1.5px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; font-size: 20px; pointer-events: auto; }

        #bottom-ctrl { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; width: 90%; max-width: 550px; background: var(--glass); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid #333; z-index: 20; justify-content: space-between; }
        .stat-box { text-align: center; }
        .stat-box small { font-size: 9px; color: #777; text-transform: uppercase; display: block; }
        .stat-box b { font-size: 1.1rem; color: var(--accent); }

        .btn-main { border: none; border-radius: 30px; font-weight: 800; cursor: pointer; text-transform: uppercase; padding: 14px 30px; font-size: 13px; }
        #btn-start { background: var(--safety); color: #fff; }
        #btn-stop { background: var(--danger); color: #fff; display: none; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Painel Lateral */
        #settings { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: #0a0a0a; z-index: 500; transition: 0.4s; padding: 30px; border-left: 3px solid var(--accent); }
        #settings.open { right: 0; }
        .set-row { margin-bottom: 25px; }
        .set-row label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 8px; font-weight: bold; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader"></div>
    <h2 style="margin-top:20px; font-weight: 200; letter-spacing: 3px;">ESTABILIZANDO <b style="color:var(--accent)">LENTES</b></h2>
</div>

<div id="settings">
    <div onclick="toggleSet()" style="color:#555; cursor:pointer; margin-bottom:20px; font-size:12px">FECHAR [X]</div>
    <div class="set-row">
        <label>HARDWARE DISPONÍVEL</label>
        <select id="cam-select" onchange="switchCam(this.value)"></select>
    </div>
    <div class="set-row">
        <label>VELOCIDADE (MS)</label>
        <input type="number" id="cfg-int" value="200">
    </div>
    <div class="set-row">
        <label>FOTOS POR LOTE</label>
        <input type="number" id="cfg-lote" value="200">
    </div>
</div>

<div id="app-shell">
    <div id="cam-container">
        <video id="vid" autoplay playsinline muted></video>
        <div id="km-display">Km ---+---</div>
        
        <div id="side-bar">
            <div class="icon-btn" onclick="toggleSet()">⚙️</div>
            <div id="btn-folder" class="icon-btn">📁</div>
        </div>

        <div id="bottom-ctrl">
            <div class="stat-box"><small>Lote</small><b id="stat-batch">0/200</b></div>
            <button id="btn-start" class="btn-main" disabled>Iniciar</button>
            <button id="btn-stop" class="btn-main">Parar</button>
            <div class="stat-box"><small>Total</small><b id="stat-total">0</b></div>
        </div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB = [], gps = null, rec = false, buffer = [], total = 0, batchIdx = 0, hDir = null, currentStream = null;
const vid = document.getElementById('vid'), can = document.getElementById('c'), ctx = can.getContext('2d');

window.onload = () => {
    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
    setTimeout(() => document.getElementById('splash').remove(), 800); }, 1500);
    listCams(); loadCSV(); initG();
};

async function listCams() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        stream.getTracks().forEach(t => t.stop()); // Limpa teste inicial
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const sel = document.getElementById('cam-select');
        sel.innerHTML = "";
        videoDevices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `Lente Técnica ${i + 1}`;
            sel.appendChild(opt);
        });
        if(videoDevices.length > 0) initC(videoDevices.deviceId);
    } catch(e) { alert("Erro de Permissão de Câmera"); }
}

async function initC(id) {
    // 1. Matar qualquer stream ativa antes de começar
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        vid.srcObject = null;
    }

    // 2. Configurações de Resolução Adaptativa (Tenta 1080p, senão aceita qualquer uma)
    const constraints = {
        video: {
            deviceId: id ? { exact: id } : undefined,
            width: { ideal: 1920, min: 640 },
            height: { ideal: 1080, min: 480 }
        }
    };

    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream;
        vid.srcObject = stream;
        
        vid.onloadedmetadata = () => {
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
            vid.play().catch(e => console.error("Erro Play:", e));
        };
    } catch (err) {
        console.warn("Falha na resolução ideal, tentando modo automático...", err);
        // 3. Fallback: Tenta abrir a câmera sem restrição de resolução se a primeira falhar
        try {
            const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id } });
            currentStream = fallbackStream;
            vid.srcObject = fallbackStream;
        } catch (fatal) {
            alert("Erro fatal ao acessar esta lente específica.");
        }
    }
}

function switchCam(id) { initC(id); }

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        const h = rows.shift().split(';').map(v => v.trim().toLowerCase());
        const ik=h.indexOf('km'), ilt=h.findIndex(x=>x.includes('lat')), iln=h.findIndex(x=>x.includes('lon'));
        kmDB = rows.map(r => {
            const c = r.split(';');
            return { km: c[ik], lt: parseFloat(c[ilt].replace(',','.')), ln: parseFloat(c[iln].replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function updateKM() {
    if(!gps || !kmDB.length) return;
    let n = null, dM = Infinity;
    for(const p of kmDB) {
        const d = Math.hypot(p.lt - gps.lat, p.ln - gps.lon);
        if(d < dM) { dM = d; n = p; }
    }
    if(n) document.getElementById('km-display').innerText = "Km " + n.km;
}

function drawS(m) {
    const w = can.width, h = can.height;
    ctx.save();
    
    // Moldura de Obra de Arte
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 4;
    ctx.strokeRect(10, 10, w-20, h-20);

    const barH = h * 0.16;
    const grd = ctx.createLinearGradient(0, h - barH, 0, h);
    grd.addColorStop(0, "transparent");
    grd.addColorStop(1, "rgba(0,0,0,0.85)");
    ctx.fillStyle = grd;
    ctx.fillRect(0, h - barH, w, barH);

    ctx.lineJoin = "round";
    ctx.textAlign = "left";
    
    const fK = barH * 0.45;
    ctx.font = `900 ${fK}px Arial Black`;
    ctx.lineWidth = 12; ctx.strokeStyle = "#000";
    ctx.strokeText("Km " + m.km, 50, h - (barH * 0.55));
    ctx.fillStyle = "#fff";
    ctx.fillText("Km " + m.km, 50, h - (barH * 0.55));

    const fD = barH * 0.22;
    ctx.font = `bold ${fD}px Arial`;
    ctx.lineWidth = 8; ctx.strokeStyle = "#000";
    ctx.strokeText(m.ts, 50, h - (barH * 0.2));
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fillText(m.ts, 50, h - (barH * 0.2));
    
    ctx.restore();
}

async function save() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = []; batchIdx++;
    const doc = new jspdf.jsPDF('l', 'mm', 'a4');
    const pw = 297, ph = 210;

    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage();
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0); drawS(items[i]);
                const imgRatio = can.width / can.height;
                let dw = pw, dh = pw / imgRatio;
                let dx = 0, dy = (ph - dh) / 2;
                if(dh > ph) { dh = ph; dw = ph * imgRatio; dy = 0; dx = (pw - dw) / 2; }

                doc.setFillColor(15, 15, 15);
                doc.rect(0, 0, pw, ph, 'F'); 
                doc.addImage(can.toDataURL('image/jpeg', 0.85), 'JPEG', dx, dy, dw, dh);
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`INSPECAO_LOTE_${batchIdx}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

function loop() {
    if(!rec) return;
    // Proteção contra frames vazios
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        const limit = parseInt(document.getElementById('cfg-lote').value) || 200;
        buffer.push({
            raw: can.toDataURL('image/jpeg', 0.45),
            km: document.getElementById('km-display').innerText.replace("Km ", ""),
            ts: new Date().toLocaleString('pt-BR')
        });
        total++;
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-batch').innerText = `${buffer.length}/${limit}`;
        if(buffer.length >= limit) save();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

document.getElementById('btn-folder').onclick = async () => {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        document.getElementById('btn-folder').style.background = "var(--safety)";
        document.getElementById('btn-start').disabled = false;
    } catch(e) {}
};

document.getElementById('btn-start').onclick = () => {
    rec = true; loop();
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
};

document.getElementById('btn-stop').onclick = () => {
    rec = false; save();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
};

function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
function initG() { navigator.geolocation.watchPosition(p => { gps = { lat: p.coords.latitude, lon: p.coords.longitude }; updateKM(); }, null, {enableHighAccuracy:true}); }
</script>
</body>
</html>
