<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INSPEÇÃO PRO V8.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{--green:#056b3c;--gold:#ffcc00;--danger:#c00;--bg:#050505}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh}
#app-shell{display:flex;flex-direction:column;height:100vh}
@media(orientation:landscape){#app-shell{flex-direction:row}#cam-view{flex:3}#ui-panel{flex:.9}}
#cam-view{position:relative;background:#000}
video{width:100%;height:100%;object-fit:cover}
#km-live{position:absolute;top:15px;left:15px;background:var(--green);padding:10px 20px;font-size:1.6rem;font-weight:900;border-radius:8px}
#ui-panel{background:var(--bg);padding:10px;display:flex;flex-direction:column;gap:8px;justify-content:center}
button{border:0;border-radius:10px;font-weight:900}
.btn-on{background:var(--green);color:#fff;height:70px}
.btn-off{background:var(--danger);color:#fff;height:70px}
.btn-f{background:var(--gold);color:#000;height:40px;font-size:.8rem}
.counter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.counter-item{background:#111;border:1px solid #222;border-radius:8px;text-align:center;padding:8px}
canvas{display:none}
#gear-btn{position:absolute;top:10px;right:10px;z-index:50}
#settings-flyout{position:fixed;right:-100%;top:0;width:260px;height:100%;background:#111;z-index:200;transition:.3s;padding:15px;border-left:3px solid var(--gold)}
#settings-flyout.open{right:0}
.set-row{margin-bottom:12px;border-bottom:1px solid #222;padding-bottom:8px}
label{font-size:10px;color:var(--gold)}
select,input{width:100%;background:#222;color:#fff;border:1px solid #444;padding:6px;border-radius:5px}
</style>
</head>

<body>

<div id="gear-btn" onclick="toggleSet()">⚙️</div>

<div id="settings-flyout">
<h4>AJUSTES</h4>

<div class="set-row">
<label>Câmera</label>
<select id="cfg-camera">
<option value="0">1</option><option value="1">2</option>
<option value="2">3</option><option value="3">4</option>
</select>
</div>

<div class="set-row">
<label>Zoom Digital</label>
<input type="range" id="cfg-zoom" min="1" max="3" step="0.1" value="1">
</div>

<div class="set-row">
<label>Sentido do KM</label>
<select id="cfg-dir">
<option value="LIVRE">Livre</option>
<option value="UP">Crescente</option>
<option value="DOWN">Decrescente</option>
</select>
</div>

<div class="set-row">
<label>Intervalo (ms)</label>
<input type="number" id="cfg-interval" value="200">
</div>

<button onclick="toggleSet()" style="width:100%;padding:10px;background:var(--danger);color:white">SALVAR</button>
</div>

<div id="app-shell">
<div id="cam-view">
<video id="vid" autoplay muted playsinline></video>
<div id="km-live">Km ---</div>
</div>

<div id="ui-panel">
<div class="counter-grid">
<div class="counter-item"><small>LOTE</small><b id="v-batch">0</b></div>
<div class="counter-item"><small>TOTAL</small><b id="v-total">0</b></div>
</div>

<button id="btn-dir" class="btn-f">📁 PASTA</button>
<button id="btn-start" class="btn-on" disabled>▶ INICIAR</button>
<button id="btn-stop" class="btn-off" disabled>■ FINALIZAR</button>
<div id="status" style="font-size:9px;text-align:center;color:#555"></div>
</div>
</div>

<canvas id="proc"></canvas>

<script>
let gps=null,kmDB=[],active=false,buffer=[],total=0,batch=0;
let kmStart="",kmEnd="",lastKmNum=null;
const vid=document.getElementById("vid");
const proc=document.getElementById("proc");
const ctx=proc.getContext("2d");

async function initCam(){
const devs=await navigator.mediaDevices.enumerateDevices();
const cams=devs.filter(d=>d.kind==="videoinput");
const id=cams[+cfg-camera.value]?.deviceId;
const s=await navigator.mediaDevices.getUserMedia({video:id?{deviceId:{exact:id}}:{facingMode:"environment"}});
vid.srcObject=s;vid.onloadedmetadata=()=>{proc.width=vid.videoWidth*.6;proc.height=vid.videoHeight*.6;}
}

function drawFrame(){
const z=parseFloat(cfg-zoom.value);
const sw=proc.width/z,sh=proc.height/z;
ctx.drawImage(vid,(proc.width-sw)/2,(proc.height-sh)/2,sw,sh,0,0,proc.width,proc.height);
}

function validKm(km){
const n=parseInt(km.replace(/\D/g,""));
if(lastKmNum===null){lastKmNum=n;return true;}
if(cfg-dir.value==="UP"&&n<lastKmNum)return false;
if(cfg-dir.value==="DOWN"&&n>lastKmNum)return false;
lastKmNum=n;return true;
}

function loop(){
if(!active)return;
drawFrame();
const km=document.getElementById("km-live").innerText.replace("Km ","");
if(!validKm(km)){setTimeout(loop,cfg-interval.value);return;}
if(!kmStart)kmStart=km;kmEnd=km;

buffer.push({img:proc.toDataURL("image/jpeg",0.45),km});
v-total.innerText=++total;
v-batch.innerText=buffer.length;
setTimeout(loop,cfg-interval.value);
}

async function saveBatch(){
if(!buffer.length)return;
batch++;
const pdf=new jspdf.jsPDF("l","mm","a4");
for(let i=0;i<buffer.length;i++){
if(i)pdf.addPage();
pdf.addImage(buffer[i].img,"JPEG",10,10,277,190);
}
const name=`INSPECAO_KM_${kmStart}_A_${kmEnd}_LOTE_${batch}.pdf`;
const f=await hFolder.getFileHandle(name,{create:true});
const w=await f.createWritable();
await w.write(pdf.output("blob"));await w.close();
buffer=[];kmStart="";kmEnd="";
}

btn-dir.onclick=async()=>{hFolder=await showDirectoryPicker();btn-start.disabled=false}
btn-start.onclick=()=>{active=true;loop();btn-start.disabled=true;btn-stop.disabled=false}
btn-stop.onclick=()=>{active=false;saveBatch();btn-start.disabled=false;btn-stop.disabled=true}
cfg-camera.onchange=initCam;

navigator.geolocation.watchPosition(p=>gps=p.coords);
window.onload=initCam;
function toggleSet(){settings-flyout.classList.toggle("open")}
</script>
</body>
</html>
