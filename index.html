<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SISTEMA DE INSPEÇÃO V21</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --safety: #056b3c; --danger: #d00; --glass: rgba(10, 10, 10, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* TELA DE ALERTA INICIAL */
        #safety-gate { 
            position: fixed; inset: 0; background: #000; z-index: 3000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }
        .alert-box { 
            border: 2px solid var(--accent); padding: 30px; border-radius: 15px; 
            max-width: 500px; text-align: center; background: #0a0a0a;
        }
        .alert-box h2 { color: var(--accent); margin-bottom: 15px; font-size: 20px; text-transform: uppercase; }
        .alert-box p { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 25px; }
        .btn-aware { 
            background: var(--accent); color: #000; border: none; padding: 15px 40px; 
            font-weight: 900; border-radius: 30px; cursor: pointer; text-transform: uppercase;
        }

        /* INTERFACE PRINCIPAL */
        #app-shell { display: flex; height: 100vh; width: 100vw; position: relative; visibility: hidden; opacity: 0; transition: 1s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #km-hud { position: absolute; top: 30px; left: 30px; background: var(--safety); padding: 12px 30px; border-radius: 4px; border-left: 10px solid #fff; z-index: 10; pointer-events: none; }
        #km-hud h1 { font-size: 3rem; font-weight: 900; }

        #rec-tag { position: absolute; top: 35px; right: 35px; display: flex; align-items: center; gap: 8px; z-index: 10; opacity: 0; transition: 0.5s; font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; }
        .dot { width: 7px; height: 7px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* AJUSTES LATERAIS */
        #settings-panel { 
            position: fixed; right: -350px; top: 0; width: 300px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(15px); z-index: 2000; 
            padding: 50px 25px; transition: 0.5s; border-left: 2px solid var(--accent);
        }
        #settings-panel.open { right: 0; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #555; }
        .field { margin-bottom: 25px; }
        .field label { font-size: 10px; color: var(--accent); display: block; margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        select, input { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; }

        /* CONTROLES FLUTUANTES */
        #ui-controls { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 20px; transition: 0.5s; z-index: 100;
        }
        .ui-hidden { opacity: 0; bottom: 20px; pointer-events: none; }
        .btn-round { border: none; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; padding: 18px 40px; font-size: 12px; background: var(--accent); color: #000; }
        #gear-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--glass); border: 1px solid #333; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        canvas { display: none; }
    </style>
</head>
<body onclick="wakeUI()">

<div id="safety-gate">
    <div class="alert-box">
        <h2>⚠ AVISO DE SEGURANÇA</h2>
        <p>Este sistema captura imagens automaticamente para relatórios de inspeção. <br><br>
        <b>Mantenha as mãos no volante.</b> O manuseio do celular em movimento é proibido e perigoso. A responsabilidade pela condução segura é exclusiva do motorista.</p>
        <button class="btn-aware" onclick="acceptSafety()">Estou Ciente e Seguro</button>
    </div>
</div>

<div id="settings-panel">
    <div class="close-x" onclick="toggleSet()">×</div>
    <div class="field"><label>Câmera Disponível</label><select id="cam-select" onchange="switchCam(this.value)"></select></div>
    <div class="field"><label>Tempo da Foto (ms)</label><input type="number" id="cfg-int" value="200"></div>
    <div class="field"><label>Fotos por Lote</label><input type="number" id="cfg-lote" value="50"></div>
</div>

<div id="app-shell">
    <video id="vid" autoplay playsinline muted></video>
    <div id="km-hud"><h1 id="km-txt">Km ---+---</h1></div>
    <div id="rec-tag"><span>Captura Automática</span><div class="dot"></div></div>

    <div id="ui-controls">
        <div id="gear-btn" onclick="toggleSet()">⚙</div>
        <button id="btn-start" class="btn-round" onclick="initCapture()">Iniciar Inspeção</button>
        <button id="btn-stop" class="btn-round" style="display:none; background:var(--danger); color:#fff;" onclick="stopCapture()">Parar e Salvar</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
let kmDB=[], gps=null, rec=false, buffer=[], hDir=null, currentStream=null, uiTimer;
const vid=document.getElementById('vid'), can=document.getElementById('c'), ctx=can.getContext('2d');

async function acceptSafety() {
    try {
        hDir = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('safety-gate').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('safety-gate').remove();
            document.getElementById('app-shell').style.visibility = 'visible';
            document.getElementById('app-shell').style.opacity = '1';
            listCams();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            wakeUI();
        }, 600);
    } catch(e) { alert("É necessário selecionar uma pasta para continuar."); }
}

function wakeUI() {
    document.getElementById('ui-controls').classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    if(rec) uiTimer = setTimeout(() => document.getElementById('ui-controls').classList.add('ui-hidden'), 4000);
}

async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-select');
    sel.innerHTML = "";
    videoDevices.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId; opt.text = `Lente ${i + 1}`;
        sel.appendChild(opt);
    });
    const back = videoDevices.find(d => d.label.toLowerCase().includes('back')) || videoDevices;
    if(back) { sel.value = back.deviceId; initC(back.deviceId); }
}

async function initC(id) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: { ideal: 1920 }, height: { ideal: 1080 } } });
    currentStream = stream; vid.srcObject = stream;
    vid.onloadedmetadata = () => { can.width = vid.videoWidth; can.height = vid.videoHeight; vid.play(); };
}

function switchCam(id) { initC(id); }
function toggleSet() { document.getElementById('settings-panel').classList.toggle('open'); }

async function initCapture() {
    rec = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('rec-tag').style.opacity = '1';
    wakeUI();
    loop();
}

function stopCapture() {
    rec = false;
    savePDF();
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('rec-tag').style.opacity = '0';
}

function loop() {
    if(!rec) return;
    if (vid.readyState === vid.HAVE_ENOUGH_DATA) {
        ctx.drawImage(vid, 0, 0, can.width, can.height);
        buffer.push({ 
            raw: can.toDataURL('image/jpeg', 0.45), 
            km: document.getElementById('km-txt').innerText.replace("Km ", ""), 
            ts: new Date().toLocaleString('pt-BR').toUpperCase() 
        });
        if(buffer.length >= (parseInt(document.getElementById('cfg-lote').value) || 50)) savePDF();
    }
    setTimeout(loop, parseInt(document.getElementById('cfg-int').value) || 200);
}

async function savePDF() {
    if(!buffer.length || !hDir) return;
    const items = [...buffer]; buffer = [];
    const isPortrait = can.width < can.height;
    const doc = new jspdf.jsPDF(isPortrait?'p':'l', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    for(let i=0; i<items.length; i++){
        if(i > 0) doc.addPage(isPortrait?'p':'l');
        const img = new Image();
        await new Promise(r => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                const barH = can.height * 0.16;
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, can.height-barH, can.width, barH);
                ctx.fillStyle = "#fff"; ctx.font = `bold ${barH * 0.4}px Arial`;
                ctx.fillText("Km " + items[i].km, 60, can.height-(barH*0.5));
                ctx.font = `${barH * 0.18}px Arial`;
                ctx.fillText(items[i].ts, 60, can.height-(barH*0.25));
                doc.addImage(can.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                r();
            };
            img.src = items[i].raw;
        });
    }
    const f = await hDir.getFileHandle(`INSPECAO_${Date.now()}.pdf`, {create:true});
    const s = await f.createWritable();
    await s.write(doc.output('blob')); await s.close();
}

async function loadCSV() {
    try {
        const r = await fetch('SNVBR116SPRJ.csv?v='+Date.now());
        const t = await r.text();
        const rows = t.split('\n').filter(l => l.includes(';'));
        kmDB = rows.slice(1).map(r => {
            const c = r.split(';');
            return { km: c, lt: parseFloat(c.replace(',','.')), ln: parseFloat(c.replace(',','.')) };
        }).filter(d => !isNaN(d.lt));
    } catch(e) {}
}

function initG() { 
    navigator.geolocation.watchPosition(p => {
        if(!kmDB.length) return;
        let n = null, dM = Infinity;
        for(const pt of kmDB) {
            const d = Math.hypot(pt.lt - p.coords.latitude, pt.ln - p.coords.longitude);
            if(d < dM) { dM = d; n = pt; }
        }
        if(n) document.getElementById('km-txt').innerText = "Km " + n.km;
    }, null, {enableHighAccuracy:true});
}

window.onload = () => { loadCSV(); initG(); };
</script>
</body>
</html>
