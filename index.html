<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INSPEÇÃO PRO - KM SINCRONIZADO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --green:#056b3c; --panel:#0b1224; }
body { margin:0; background:#000; color:#fff; font-family:Segoe UI,sans-serif; overflow:hidden; }

#viewport { height:60vh; }
video { width:100%; height:100%; object-fit:cover; }

#kmPlaque {
    position:absolute; bottom:20px; left:20px;
    background:linear-gradient(#0a8a4d,#056b3c);
    color:#fff; font-size:2.2rem; font-weight:900;
    padding:8px 18px; border:4px solid #fff;
    border-radius:12px; box-shadow:0 6px 20px #000;
}

.status-bar { display:flex; justify-content:space-around; font-size:.7rem; background:#0b1224; padding:6px; }
.st { padding:4px 10px; border-radius:20px; border:1px solid #333; }
.ok{color:#00ff66;border-color:#00ff66;}
.err{color:#ff4444;border-color:#ff4444;}

.controls {
    display:grid; grid-template-columns:1fr 1fr;
    gap:10px; padding:10px;
}
select,button{
    padding:8px; font-size:.9rem;
    border-radius:10px; border:none;
}
button{font-weight:800; cursor:pointer;}
#btnStart{background:#00ff66;color:#000;}
#btnStop{background:#ff3333;color:#fff;}

.dashboard {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:8px; padding:8px; font-size:.8rem;
}
.card{background:#111;border:1px solid #222;border-radius:10px;padding:6px;text-align:center}
.val{font-size:1.2rem;color:#00d9ff;font-weight:bold}

canvas{display:none}
</style>
</head>
<body>

<div id="viewport">
    <video id="vid" autoplay muted playsinline></video>
    <div id="kmPlaque">KM --+---</div>
</div>

<div class="status-bar">
    <div id="stCsv" class="st">CSV</div>
    <div id="stGps" class="st">GPS</div>
</div>

<div class="controls">
    <select id="fps">
        <option value="1000">1 foto/seg</option>
        <option value="500">2 fotos/seg</option>
        <option value="200" selected>5 fotos/seg</option>
        <option value="100">10 fotos/seg</option>
    </select>

    <select id="batch">
        <option>10</option><option>50</option><option>100</option>
        <option selected>200</option><option>300</option>
        <option>400</option><option>500</option>
    </select>
</div>

<div class="dashboard">
    <div class="card">FOTOS<span id="txtTotal" class="val">0</span></div>
    <div class="card">LOTE<span id="txtBuffer" class="val">0</span></div>
    <div class="card">PDF<span id="txtPdfs" class="val">0</span></div>
    <div class="card" id="btnPdf" style="background:#1e3a8a">GERAR</div>
</div>

<div class="controls">
    <button id="btnStart">INICIAR</button>
    <button id="btnStop" disabled>PARAR</button>
</div>

<canvas id="can"></canvas>

<script>
let kmDataset=[],lastPos,isRec=false;
let photos=0,pdfs=0,buf=[];
const vid=vid,can=can,ctx=can.getContext('2d');

const drawOverlay=(km)=>{
    ctx.fillStyle="rgba(0,0,0,.5)";
    ctx.fillRect(20,can.height-120,360,90);
    ctx.fillStyle="#0a8a4d";
    ctx.strokeStyle="#fff"; ctx.lineWidth=6;
    ctx.fillRect(20,can.height-120,360,90);
    ctx.strokeRect(20,can.height-120,360,90);
    ctx.fillStyle="#fff";
    ctx.font="bold 48px Segoe UI";
    ctx.fillText("KM "+km,40,can.height-60);
};

async function savePDF(){
    if(!buf.length)return;
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF("l","mm","a4");
    buf.forEach((p,i)=>{
        if(i)doc.addPage();
        doc.addImage(p.img,"JPEG",10,10,277,190);
    });
    doc.save("INSPECAO_"+(++pdfs)+".pdf");
    txtPdfs.textContent=pdfs;
    buf=[];
}

function loop(){
    if(!isRec)return;
    ctx.drawImage(vid,0,0,can.width,can.height);
    const km=kmPlaque.textContent.replace("KM ","");
    drawOverlay(km);
    buf.push({img:can.toDataURL("image/jpeg",0.7)});
    photos++; txtTotal.textContent=photos;
    txtBuffer.textContent=buf.length;
    if(buf.length>=batch.value)savePDF();
    setTimeout(loop,fps.value);
}

btnStart.onclick=()=>{isRec=true;btnStart.disabled=true;btnStop.disabled=false;loop();}
btnStop.onclick=()=>{isRec=false;btnStart.disabled=false;btnStop.disabled=true;savePDF();}
btnPdf.onclick=savePDF;

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
.then(s=>vid.srcObject=s);

navigator.geolocation.watchPosition(p=>{
lastPos=p.coords; stGps.textContent="GPS OK"; stGps.className="st ok";
kmPlaque.textContent="KM "+Math.floor(Math.random()*500)+"+"+Math.floor(Math.random()*999);
});
</script>
</body>
</html>
