<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Scanner Iluminação Noturna - SNV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #0070f3; --red: #ff0000; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: monospace; overflow: hidden; }
        
        /* HUD de Inspeção */
        #viewport { position: relative; width: 100vw; height: 50vh; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #overlay {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px;
        }

        .km-panel {
            background: #1e3a8a; border: 2px solid #fff;
            text-align: center; padding: 10px; margin: 10px;
            border-radius: 8px; box-shadow: 0 0 15px rgba(30,58,138,0.8);
        }
        #kmLabel { font-size: 2.5rem; font-weight: 900; display: block; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        button { 
            padding: 20px; border-radius: 12px; border: none; 
            font-weight: bold; font-size: 1rem; color: #fff;
        }
        #btnStart { background: #16a34a; }
        #btnStop { background: var(--red); }
        #btnPdf { background: #9333ea; grid-column: span 2; }

        .stats { padding: 0 20px; font-size: 0.8rem; color: #aaa; }
        #log { height: 60px; overflow-y: hidden; font-size: 0.7rem; padding: 10px; color: #0f0; }
    </style>
</head>
<body>

<div id="viewport">
    <video id="vid" autoplay playsinline muted></video>
    <div id="overlay">
        <span id="osd-clock">00:00:00</span>
        <span id="osd-acc">GPS: ---</span>
    </div>
</div>

<div class="km-panel">
    <span id="kmLabel">KM 0+000</span>
    <small id="snv-ids">Buscando IDs próximos...</small>
</div>

<div class="stats">
    Fotos no Buffer: <span id="stCount">0</span> | Intervalo: <span id="stRate">100ms</span>
</div>

<div class="controls">
    <button id="btnStart">▶ INICIAR INSPEÇÃO</button>
    <button id="btnStop" disabled>⏹ PARAR</button>
    <button id="btnPdf" disabled>📄 GERAR PDF AGORA</button>
</div>

<div id="log"></div>

<canvas id="can" style="display:none"></canvas>

<script>
const { jsPDF } = window.jspdf;
let doc = new jsPDF('l', 'mm', 'a4');
let isRecording = false;
let photoSeq = 0;
let currentKM = "0+000";
let lastCoords = { lat: 0, lon: 0 };
let timer = null;

const vid = document.getElementById('vid');
const can = document.getElementById('can');
const ctx = can.getContext('2d', { alpha: false, desynchronized: true });

// Lógica de GPS e SNV
function startGPS() {
    navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        lastCoords = { lat, lon };
        
        // Simulação SNV (Metragem baseada na variação decimal da latitude)
        const kmBase = Math.abs(Math.floor(lat * 10) % 500);
        const metros = Math.abs(Math.floor(lat * 100000) % 999);
        currentKM = `${kmBase}+${metros.toString().padStart(3, '0')}`;
        
        document.getElementById('kmLabel').textContent = `KM ${currentKM}`;
        document.getElementById('osd-acc').textContent = `Precisão: ${pos.coords.accuracy.toFixed(1)}m`;
        
        // Simulação de IDs próximos do SNV (5 IDs aleatórios próximos ao KM)
        const idBase = Math.floor(lat * -1000);
        document.getElementById('snv-ids').textContent = `IDs: ${idBase}, ${idBase+1}, ${idBase+2}, ${idBase+3}, ${idBase+4}`;
    }, null, { enableHighAccuracy: true });
}

async function captureFrame() {
    if (!isRecording) return;

    photoSeq++;
    const timestamp = new Date().toLocaleString();
    
    // Desenho com filtro leve para noite (ganho de exposição via software)
    ctx.filter = "brightness(1.2) contrast(1.1)";
    ctx.drawImage(vid, 0, 0, can.width, can.height);
    
    // Converte para Base64 ultra-leve (JPEG 0.4 de qualidade para PDF não travar)
    const imgData = can.toDataURL('image/jpeg', 0.4);

    // Adiciona ao PDF em background
    if (photoSeq > 1) doc.addPage();
    doc.addImage(imgData, 'JPEG', 10, 20, 277, 150);
    doc.setFontSize(12);
    doc.setTextColor(255, 255, 255);
    doc.rect(10, 10, 277, 10, 'F'); // Tarja preta
    doc.text(`INSPEÇÃO NOTURNA | KM: ${currentKM} | DATA: ${timestamp} | SEQ: ${photoSeq}`, 15, 17);

    document.getElementById('stCount').textContent = photoSeq;
    
    // Relógio OSD
    document.getElementById('osd-clock').textContent = new Date().toLocaleTimeString();
    
    timer = setTimeout(captureFrame, 150); // Velocidade de ~150ms (ajustável)
}

document.getElementById('btnStart').onclick = () => {
    isRecording = true;
    photoSeq = 0;
    doc = new jsPDF('l', 'mm', 'a4'); // Novo PDF
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('btnPdf').disabled = true;
    captureFrame();
};

document.getElementById('btnStop').onclick = () => {
    isRecording = false;
    clearTimeout(timer);
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnPdf').disabled = false;
    const l = document.createElement('div');
    l.textContent = `>> Captura finalizada com ${photoSeq} frames.`;
    document.getElementById('log').prepend(l);
};

document.getElementById('btnPdf').onclick = () => {
    const filename = `INSPECAO_ILUM_KM_${currentKM.replace('+', '_')}.pdf`;
    doc.save(filename);
};

// Setup Câmera
async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 1280, height: 720 },
            audio: false
        });
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
        };
        startGPS();
    } catch (e) { alert("Câmera não disponível."); }
}

init();
</script>
</body>
</html>
